<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>

    <style>
        /* 6/6 #131 ④ 登録後オンボーディング */
        .ob-wrap { max-width: 440px; margin: 0 auto; padding: 24px 16px 48px; }
        .ob-done { text-align: center; margin: 6px 0 18px; }
        .ob-done__icon { color: var(--color-primary); font-size: 44px; }
        .ob-done__title { font-size: 20px; font-weight: 800; margin-top: 4px; }
        .ob-done__sub { font-size: 13px; color: var(--color-text-sub); margin-top: 6px; }

        .ob-step { display: flex; gap: 12px; align-items: flex-start; background: #fff; border: 1px solid var(--color-border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
        .ob-step__ic { width: 40px; height: 40px; border-radius: 11px; background: var(--color-cta-lt); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--color-cta); }
        .ob-step__ic .material-symbols-outlined { font-size: 22px; }
        .ob-step__body { flex: 1; min-width: 0; }
        .ob-step__title { font-size: 15px; font-weight: 800; }
        .ob-step__desc { font-size: 12.5px; color: var(--color-text-sub); margin-top: 3px; line-height: 1.5; }
        .ob-step__btn { margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--color-cta); border: 1px solid var(--color-cta); border-radius: 9px; padding: 8px 14px; background: var(--color-cta-lt); cursor: pointer; font-family: inherit; text-decoration: none; }
        .ob-step__btn--done { color: var(--color-primary); border-color: var(--color-primary); background: var(--color-primary-lt); cursor: default; }
        .ob-step__hint { margin-top: 8px; font-size: 11.5px; color: #b45309; background: #fff7e6; border: 1px solid #f3d998; border-radius: 8px; padding: 8px 10px; line-height: 1.5; display: none; }
        .ob-step__hint.show { display: block; }

        /* 端末別の手順図解 */
        .ob-plat { margin-top: 10px; }
        .ob-plat__label { font-size: 11px; font-weight: 800; color: var(--color-text); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .ob-plat__label .material-symbols-outlined { font-size: 16px; }
        .ob-steps-row { display: flex; align-items: center; gap: 4px; background: var(--color-cta-lt); border: 1px solid #d7e6f5; border-radius: 10px; padding: 9px 7px; }
        .ob-fig { flex: 1; text-align: center; }
        .ob-fig .material-symbols-outlined { font-size: 22px; color: var(--color-cta); line-height: 1; }
        .ob-fig__l { font-size: 9.5px; color: var(--color-text-sub); font-weight: 700; margin-top: 4px; line-height: 1.25; }
        .ob-arrow { color: #9aa3b0; font-weight: 800; font-size: 13px; }
        .ob-autonote { margin-top: 8px; font-size: 11px; color: var(--color-text-sub); }

        /* 音ステップ（端末操作の図のみ・チェックなし） */
        .ob-sound-row { display: flex; align-items: center; gap: 6px; margin-top: 9px; }

        /* 農家のみ：送金先 */
        .ob-step--farmer { border-color: #f3d998; background: #fffbf2; }
        .ob-step--farmer .ob-step__ic { background: #fff1d6; color: #b36a00; }

        .ob-actions { margin-top: 8px; }
        .ob-later { text-align: center; margin-top: 14px; }
        .ob-later a { color: var(--color-text-sub); font-size: 13px; font-weight: 600; text-decoration: none; }
        .ob-later a:hover { text-decoration: underline; }
    </style>
</head>

<body>
    <!-- 言語セレクター -->
    <div class="lang-selector-wrap">
        <select id="lang-selector">
            <option value="km">ខ្មែរ</option>
            <option value="en">ENGLISH</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="ob-wrap">

        <div class="ob-done">
            <span class="material-symbols-outlined ob-done__icon">check_circle</span>
            <div class="ob-done__title" data-i18n="onboarding.doneTitle"></div>
            <div class="ob-done__sub" data-i18n="onboarding.doneSub"></div>
        </div>

        <!-- ① ホーム画面に追加（端末別図解・自動判別） -->
        <div class="ob-step" id="step-home">
            <div class="ob-step__ic"><span class="material-symbols-outlined">add_to_home_screen</span></div>
            <div class="ob-step__body">
                <div class="ob-step__title" data-i18n="onboarding.homeTitle"></div>
                <div class="ob-step__desc" data-i18n="onboarding.homeDesc"></div>

                <!-- iOS -->
                <div class="ob-plat" id="plat-ios">
                    <div class="ob-plat__label"><span class="material-symbols-outlined">phone_iphone</span><span data-i18n="onboarding.iosLabel"></span></div>
                    <div class="ob-steps-row">
                        <div class="ob-fig"><span class="material-symbols-outlined">ios_share</span><div class="ob-fig__l" data-i18n="onboarding.iosStep1"></div></div>
                        <span class="ob-arrow">›</span>
                        <div class="ob-fig"><span class="material-symbols-outlined">add_box</span><div class="ob-fig__l" data-i18n="onboarding.iosStep2"></div></div>
                        <span class="ob-arrow">›</span>
                        <div class="ob-fig"><span class="material-symbols-outlined">check_circle</span><div class="ob-fig__l" data-i18n="onboarding.stepAdd"></div></div>
                    </div>
                </div>

                <!-- Android -->
                <div class="ob-plat" id="plat-android">
                    <div class="ob-plat__label"><span class="material-symbols-outlined">smartphone</span><span data-i18n="onboarding.androidLabel"></span></div>
                    <div class="ob-steps-row">
                        <div class="ob-fig"><span class="material-symbols-outlined">more_vert</span><div class="ob-fig__l" data-i18n="onboarding.androidStep1"></div></div>
                        <span class="ob-arrow">›</span>
                        <div class="ob-fig"><span class="material-symbols-outlined">add_to_home_screen</span><div class="ob-fig__l" data-i18n="onboarding.androidStep2"></div></div>
                        <span class="ob-arrow">›</span>
                        <div class="ob-fig"><span class="material-symbols-outlined">check_circle</span><div class="ob-fig__l" data-i18n="onboarding.stepAdd"></div></div>
                    </div>
                </div>

                <div class="ob-autonote" id="home-autonote" data-i18n="onboarding.homeAutoNote"></div>
                <div class="ob-step__btn ob-step__btn--done" id="home-done" style="display:none;">
                    <span class="material-symbols-outlined" style="font-size:16px;">check</span>
                    <span data-i18n="onboarding.installed"></span>
                </div>
            </div>
        </div>

        <!-- ② 通知を許可 -->
        <div class="ob-step" id="step-notify">
            <div class="ob-step__ic"><span class="material-symbols-outlined">notifications</span></div>
            <div class="ob-step__body">
                <div class="ob-step__title" data-i18n="onboarding.notifyTitle"></div>
                <div class="ob-step__desc" data-i18n="onboarding.notifyDesc"></div>
                <button type="button" class="ob-step__btn" id="notify-btn">
                    <span class="material-symbols-outlined" style="font-size:16px;">notifications_active</span>
                    <span data-i18n="onboarding.notifyBtn"></span>
                </button>
                <div class="ob-step__btn ob-step__btn--done" id="notify-done" style="display:none;">
                    <span class="material-symbols-outlined" style="font-size:16px;">check</span>
                    <span data-i18n="onboarding.notifyDone"></span>
                </div>
                <div class="ob-step__hint" id="notify-hint" data-i18n="onboarding.notifyDeniedHint"></div>
            </div>
        </div>

        <!-- ③ 端末の音をオン（操作の図のみ・チェックなし） -->
        <div class="ob-step" id="step-sound">
            <div class="ob-step__ic"><span class="material-symbols-outlined">volume_up</span></div>
            <div class="ob-step__body">
                <div class="ob-step__title" data-i18n="onboarding.soundTitle"></div>
                <div class="ob-step__desc" data-i18n="onboarding.soundDesc"></div>
                <div class="ob-steps-row ob-sound-row">
                    <div class="ob-fig"><span class="material-symbols-outlined">notifications_active</span><div class="ob-fig__l" data-i18n="onboarding.soundFig1"></div></div>
                    <span class="ob-arrow">＋</span>
                    <div class="ob-fig"><span class="material-symbols-outlined">volume_up</span><div class="ob-fig__l" data-i18n="onboarding.soundFig2"></div></div>
                </div>
            </div>
        </div>

        <!-- 農家のみ：送金先を登録 -->
        <div class="ob-step ob-step--farmer" id="step-payout" style="display:none;">
            <div class="ob-step__ic"><span class="material-symbols-outlined">account_balance_wallet</span></div>
            <div class="ob-step__body">
                <div class="ob-step__title" data-i18n="onboarding.payoutTitle"></div>
                <div class="ob-step__desc" data-i18n="onboarding.payoutDesc"></div>
                <a class="ob-step__btn" href="/pages/farmer/account/payment.html">
                    <span class="material-symbols-outlined" style="font-size:16px;">account_balance_wallet</span>
                    <span data-i18n="onboarding.payoutBtn"></span>
                </a>
            </div>
        </div>

        <div class="ob-actions">
            <button class="btn btn-primary btn-cta" id="start-btn" data-i18n="onboarding.start"></button>
        </div>
        <div class="ob-later"><a href="#" id="later-link" data-i18n="onboarding.later"></a></div>

    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';

        // SW 登録（更新検出で自動リロード）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then((registration) => {
                    registration.update();
                    registration.addEventListener('updatefound', () => {
                        const newSW = registration.installing;
                        if (!newSW) return;
                        newSW.addEventListener('statechange', () => {
                            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(console.error);
        }

        // 直後の登録ユーザーはログイン済み。requireAuth で保護（FCMトークンもここで発行される）。
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        document.body.classList.add('app-ready');
        document.getElementById('loading').classList.remove('show');

        // ── ロール判定（query > currentUserData） ───────────────────
        const params = new URLSearchParams(location.search);
        let role = params.get('role') || '';
        function resolveRole() {
            if (!role && window.currentUserData?.role) role = window.currentUserData.role;
            if (role === 'farmer') document.getElementById('step-payout').style.display = 'flex';
        }
        resolveRole();
        // currentUserData が遅れて入るケースに備える
        const roleTimer = setInterval(() => {
            if (window.currentUserData) { resolveRole(); clearInterval(roleTimer); }
        }, 200);
        setTimeout(() => clearInterval(roleTimer), 4000);

        function dashboardUrl() {
            const r = role || window.currentUserData?.role;
            return r === 'farmer' ? '/pages/farmer/dashboard.html' : '/pages/restaurant/dashboard.html';
        }

        // ── ① ホーム画面追加：端末自動判別 ──────────────────────────
        const ua = navigator.userAgent || '';
        const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/.test(ua);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        if (isStandalone) {
            // すでにPWAとして起動中 → 完了表示・手順図は隠す
            document.getElementById('plat-ios').style.display = 'none';
            document.getElementById('plat-android').style.display = 'none';
            document.getElementById('home-autonote').style.display = 'none';
            document.getElementById('home-done').style.display = 'inline-flex';
        } else if (isIOS) {
            document.getElementById('plat-android').style.display = 'none';
            document.getElementById('home-autonote').style.display = 'none';
        } else if (isAndroid) {
            document.getElementById('plat-ios').style.display = 'none';
            document.getElementById('home-autonote').style.display = 'none';
        }
        // 判別不能（PCなど）は両方表示＋autonote のまま

        // ── ② 通知を許可 ───────────────────────────────────────────
        const notifyBtn = document.getElementById('notify-btn');
        const notifyDone = document.getElementById('notify-done');
        const notifyHint = document.getElementById('notify-hint');

        function reflectNotifyState() {
            if (!('Notification' in window)) {
                notifyBtn.style.display = 'none';
                return;
            }
            const p = Notification.permission;
            if (p === 'granted') {
                notifyBtn.style.display = 'none';
                notifyDone.style.display = 'inline-flex';
                notifyHint.classList.remove('show');
            } else if (p === 'denied') {
                // 拒否済み → 押しても無反応で詰まないよう「設定から許可」導線に切替
                notifyBtn.style.display = 'none';
                notifyHint.classList.add('show');
            } else {
                notifyBtn.style.display = 'inline-flex';
                notifyDone.style.display = 'none';
                notifyHint.classList.remove('show');
            }
        }
        reflectNotifyState();

        notifyBtn.addEventListener('click', async () => {
            if (!('Notification' in window)) return;
            try {
                await Notification.requestPermission();
            } catch (e) { /* ignore */ }
            reflectNotifyState();
        });

        // ── 完了 ────────────────────────────────────────────────────
        document.getElementById('start-btn').addEventListener('click', () => {
            window.location.href = dashboardUrl();
        });
        document.getElementById('later-link').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = dashboardUrl();
        });
    </script>
</body>

</html>
