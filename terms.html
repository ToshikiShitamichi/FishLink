<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>

    <style>
        .legal { max-width: 560px; margin: 0 auto; padding: 16px 18px 48px; }
        .legal__back { display: inline-flex; align-items: center; gap: 4px; color: var(--color-text-sub); font-size: 13px; text-decoration: none; margin-bottom: 10px; }
        .legal__title { font-size: 20px; font-weight: 800; margin: 4px 0 4px; }
        .legal__draft { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; color: #b45309; background: #fff7e6; border: 1px solid #f3d998; border-radius: 8px; padding: 6px 10px; margin-bottom: 14px; }
        .legal h2 { font-size: 15px; font-weight: 800; margin: 18px 0 6px; color: var(--color-text); }
        .legal p { font-size: 13.5px; line-height: 1.8; color: var(--color-text); margin: 0 0 8px; }
        .legal__updated { font-size: 12px; color: var(--color-text-sub); margin-top: 20px; }
    </style>
</head>

<body>
    <div class="legal">
        <a href="#" class="legal__back" id="legal-back">
            <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>
            <span data-i18n="legal.back"></span>
        </a>
        <div class="legal__title" data-i18n="terms.title"></div>
        <div class="legal__draft">
            <span class="material-symbols-outlined" style="font-size:15px;">edit_note</span>
            <span data-i18n="legal.draftNote"></span>
        </div>

        <h2 data-i18n="terms.s1Title"></h2>
        <p data-i18n="terms.s1Body"></p>
        <h2 data-i18n="terms.s2Title"></h2>
        <p data-i18n="terms.s2Body"></p>
        <h2 data-i18n="terms.s3Title"></h2>
        <p data-i18n="terms.s3Body"></p>
        <h2 data-i18n="terms.s4Title"></h2>
        <p data-i18n="terms.s4Body"></p>
        <h2 data-i18n="terms.s5Title"></h2>
        <p data-i18n="terms.s5Body"></p>

        <div class="legal__updated" data-i18n="legal.updated"></div>
    </div>

    <script type="module">
        import { initI18n } from '/js/i18n.js';
        await initI18n();
        document.body.classList.add('app-ready');

        // 6/9 #131: register から target="_blank"（新規タブ）で開かれるため、新規タブは履歴が無く
        //   history.back() で戻れない。タブを閉じる → 閉じられない/同タブなら前のページ or register へ。
        document.getElementById('legal-back')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (window.opener || window.history.length <= 1) {
                window.close();
            }
            // フォールバック（close がブロックされた／同タブで開かれた場合）
            setTimeout(() => {
                if (window.history.length > 1) history.back();
                else window.location.href = '/register.html';
            }, 150);
        });
    </script>
</body>

</html>
