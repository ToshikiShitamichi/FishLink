<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>

    <style>
        .legal { max-width: 560px; margin: 0 auto; padding: 16px 18px 48px; }
        .legal__bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .legal__back { display: inline-flex; align-items: center; gap: 4px; color: var(--color-text-sub); font-size: 13px; text-decoration: none; flex: 0 0 auto; white-space: nowrap; }
        /* ⚠️ グローバル select{width:100%}（style.css）に勝つため width:auto を明示＝全幅化で「戻る」が縦潰れするのを防ぐ（#169と同根）。 */
        .legal__bar #lang-selector { width: auto; flex: 0 0 auto; font-size: 13px; padding: 6px 10px; border: 1px solid var(--color-border); border-radius: 20px; background: var(--color-surface); color: var(--color-text-sub); }
        .legal__title { font-size: 20px; font-weight: 800; margin: 4px 0 4px; }
        .legal__updated { font-size: 12px; color: var(--color-text-sub); margin: 2px 0 16px; }
        .legal h2 { font-size: 15px; font-weight: 800; margin: 18px 0 6px; color: var(--color-text); }
        .legal p { font-size: 13.5px; line-height: 1.8; color: var(--color-text); margin: 0 0 8px; }
        /* Firestore 公開版の本文＝改行保持のプレーンテキスト（textContent で描画＝XSS安全） */
        .legal__body { font-size: 13.5px; line-height: 1.85; color: var(--color-text); white-space: pre-wrap; }
    </style>
</head>

<body>
    <div class="legal">
        <div class="legal__bar">
            <a href="#" class="legal__back" id="legal-back">
                <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>
                <span data-i18n="legal.back"></span>
            </a>
            <select id="lang-selector">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="legal__title" id="doc-title"></div>
        <div class="legal__updated" id="doc-updated"></div>

        <!-- Firestore 公開版の本文（あれば表示） -->
        <div class="legal__body" id="doc-body" style="display:none;"></div>

        <!-- フォールバック（運営が未公開＝現行 i18n セクション。draft バッジは出さない＝spec §3） -->
        <div id="doc-fallback">
            <h2 data-i18n="privacy.s1Title"></h2>
            <p data-i18n="privacy.s1Body"></p>
            <h2 data-i18n="privacy.s2Title"></h2>
            <p data-i18n="privacy.s2Body"></p>
            <h2 data-i18n="privacy.s3Title"></h2>
            <p data-i18n="privacy.s3Body"></p>
            <h2 data-i18n="privacy.s4Title"></h2>
            <p data-i18n="privacy.s4Body"></p>
            <h2 data-i18n="privacy.s5Title"></h2>
            <p data-i18n="privacy.s5Body"></p>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { loadLegalDoc, legalPubText, formatUpdatedYearMonth } from '/js/legal-display.js';
        await initI18n();
        initLangSelector();
        document.body.classList.add('app-ready');

        const DOC_TYPE = 'privacy';
        let legalData = null;

        function currentLang() { return (i18next.language || 'km').split('-')[0]; }

        function renderDoc() {
            const lang = currentLang();
            const titleEl = document.getElementById('doc-title');
            const updatedEl = document.getElementById('doc-updated');
            const bodyEl = document.getElementById('doc-body');
            const fallbackEl = document.getElementById('doc-fallback');

            const pub = (legalData && legalData.published) ? legalPubText(legalData, lang) : null;
            if (pub && pub.body) {
                fallbackEl.style.display = 'none';
                bodyEl.style.display = 'block';
                bodyEl.textContent = pub.body;
                titleEl.textContent = pub.title || i18next.t('privacy.title');
                const ym = formatUpdatedYearMonth(legalData.updatedAt, lang);
                updatedEl.textContent = ym ? `${i18next.t('legal.updatedPrefix')}${ym}` : i18next.t('legal.updated');
            } else {
                bodyEl.style.display = 'none';
                fallbackEl.style.display = 'block';
                titleEl.textContent = i18next.t('privacy.title');
                updatedEl.textContent = i18next.t('legal.updated');
            }
        }

        renderDoc();
        loadLegalDoc(DOC_TYPE).then(d => { legalData = d; renderDoc(); });
        onLanguageChange(() => renderDoc());

        // 6/9 #131: register から新規タブで開かれる → history.back できないため close→fallback。
        document.getElementById('legal-back')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (window.opener || window.history.length <= 1) {
                window.close();
            }
            setTimeout(() => {
                if (window.history.length > 1) history.back();
                else window.location.href = '/register.html';
            }, 150);
        });
    </script>
</body>

</html>
