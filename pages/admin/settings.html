<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink Admin</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .admin-shell { max-width: 1280px; margin: 0 auto; padding: 24px; }

        /* フォームは広すぎると間延びするので中央に制限 */
        .settings-content { max-width: 880px; margin: 0 auto; }

        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
        }
        .admin-brand { font-size: 13px; color: #64748b; }
        .admin-title { font-size: 26px; font-weight: 700; color: #0f172a; margin-top: 2px; }
        .admin-subtitle { font-size: 13px; color: #475569; margin-top: 4px; }

        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-nav a {
            text-decoration: none; color: #475569; padding: 8px 14px;
            border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600;
        }
        .admin-nav a.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .admin-nav a:hover:not(.active) { background: #f1f5f9; }

        #lang-selector {
            width: auto; font-size: 13px; padding: 6px 10px;
            border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; color: #475569;
        }

        .card {
            background: #fff; border-radius: 20px; border: 1px solid #e2e8f0;
            padding: 24px; margin-bottom: 16px;
        }

        .section-heading {
            font-size: 16px; font-weight: 700; color: #0f172a;
            padding-bottom: 12px; margin-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }

        .form-row {
            padding: 14px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .form-row:last-child { border-bottom: none; }

        .form-row__header {
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px;
        }

        .form-row__label {
            font-size: 14px; font-weight: 600; color: #0f172a;
        }

        .form-row__hint {
            font-size: 12px; color: #64748b; margin-top: 4px;
            line-height: 1.6;
        }

        .num-input {
            width: 140px; border: 1.5px solid #cbd5e1; border-radius: 12px;
            padding: 8px 12px; font-size: 15px; font-weight: 600;
            text-align: right;
            background: #fff;
        }
        .num-input:focus {
            outline: none; border-color: #0f172a;
        }

        .num-unit { font-size: 14px; color: #475569; margin-left: 6px; }

        .toggle {
            position: relative; width: 48px; height: 26px;
            background: #cbd5e1; border-radius: 20px; cursor: pointer;
            transition: background .2s;
        }
        .toggle.on { background: #16a34a; }
        .toggle__knob {
            position: absolute; top: 3px; left: 3px;
            width: 20px; height: 20px; background: #fff;
            border-radius: 50%; transition: left .2s;
        }
        .toggle.on .toggle__knob { left: 25px; }

        .save-row {
            display: flex; justify-content: flex-end; gap: 10px;
            align-items: center; margin-top: 20px;
        }
        .save-note { font-size: 13px; color: #16a34a; opacity: 0; transition: opacity .3s; }
        .save-note.show { opacity: 1; }
        .save-error { font-size: 13px; color: #ef4444; opacity: 0; transition: opacity .3s; }
        .save-error.show { opacity: 1; }

        .save-btn {
            border: none; background: #0f172a; color: #fff;
            font-weight: 700; font-size: 14px; padding: 10px 24px;
            border-radius: 12px; cursor: pointer;
        }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .admin-header__right {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            justify-content: flex-end;
        }
        .admin-nav a { white-space: nowrap; }

        @media (max-width: 1024px) {
            .admin-shell { padding: 20px; }
            .admin-title { font-size: 24px; }
        }
        @media (max-width: 720px) {
            .admin-shell { padding: 14px; }
            .admin-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .admin-header__right { justify-content: flex-start; }
            .admin-title { font-size: 20px; }
            .admin-subtitle { font-size: 12px; }
            .admin-nav a { padding: 7px 12px; font-size: 12px; }

            .card { padding: 16px; }
            .form-row__header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .form-row__header > div:last-child { align-self: flex-end; }
            .num-input { width: 120px; }
            .save-row { flex-wrap: wrap; justify-content: stretch; }
            .save-btn { width: 100%; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.settings.title"></div>
                <div class="admin-subtitle" data-i18n="admin.settings.subtitle"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/settings.html" class="active" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/caa.html" data-i18n="admin.navCaa"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option><option value="en">EN</option><option value="ja">JA</option>
                </select>
            </div>
        </div>

        <div class="settings-content">
            <!-- レストラン側 -->
            <div class="card">
                <div class="section-heading" data-i18n="admin.settings.restaurantSection"></div>

                <div class="form-row">
                    <div class="form-row__header">
                        <div>
                            <div class="form-row__label" data-i18n="admin.settings.serviceRateLabel"></div>
                            <div class="form-row__hint" data-i18n="admin.settings.serviceRateHint"></div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <input type="number" id="service-rate" class="num-input" step="0.1" min="0" max="100">
                            <span class="num-unit">%</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-row__header">
                        <div>
                            <div class="form-row__label" data-i18n="admin.settings.campaignActiveLabel"></div>
                            <div class="form-row__hint" data-i18n="admin.settings.campaignActiveHint"></div>
                        </div>
                        <div class="toggle" id="campaign-toggle"><div class="toggle__knob"></div></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-row__header">
                        <div>
                            <div class="form-row__label" data-i18n="admin.settings.campaignDiscountLabel"></div>
                            <div class="form-row__hint" data-i18n="admin.settings.campaignDiscountHint"></div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <input type="number" id="campaign-discount" class="num-input" step="0.1" min="0" max="100">
                            <span class="num-unit">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 農家側 -->
            <div class="card">
                <div class="section-heading" data-i18n="admin.settings.farmerSection"></div>

                <div class="form-row">
                    <div class="form-row__header">
                        <div>
                            <div class="form-row__label" data-i18n="admin.settings.farmerRateLabel"></div>
                            <div class="form-row__hint" data-i18n="admin.settings.farmerRateHint"></div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <input type="number" id="farmer-rate" class="num-input" step="0.1" min="0" max="100">
                            <span class="num-unit">%</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-row__header">
                        <div>
                            <div class="form-row__label" data-i18n="admin.settings.farmerCampaignActiveLabel"></div>
                            <div class="form-row__hint" data-i18n="admin.settings.farmerCampaignActiveHint"></div>
                        </div>
                        <div class="toggle" id="farmer-campaign-toggle"><div class="toggle__knob"></div></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-row__header">
                        <div>
                            <div class="form-row__label" data-i18n="admin.settings.farmerCampaignDiscountLabel"></div>
                            <div class="form-row__hint" data-i18n="admin.settings.farmerCampaignDiscountHint"></div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <input type="number" id="farmer-campaign-discount" class="num-input" step="0.1" min="0" max="100">
                            <span class="num-unit">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="save-row" style="margin-top:0;">
                    <span class="save-note" id="save-note" data-i18n="admin.settings.saved"></span>
                    <span class="save-error" id="save-error" data-i18n="admin.settings.errorSave"></span>
                    <button class="save-btn" id="save-btn" data-i18n="admin.settings.save"></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            doc, getDoc, setDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        const toggle = document.getElementById('campaign-toggle');
        toggle.addEventListener('click', () => toggle.classList.toggle('on'));
        const farmerToggle = document.getElementById('farmer-campaign-toggle');
        farmerToggle.addEventListener('click', () => farmerToggle.classList.toggle('on'));

        waitForUserData(async () => {
            if (window.currentUserData?.role !== 'admin') {
                alert('Admin access required');
                location.href = '/index.html';
                return;
            }
            loading.classList.add('show');
            try {
                const snap = await getDoc(doc(db, 'settings', 'campaign'));
                const data = snap.exists() ? snap.data() : {};
                // レストラン側
                const serviceRate = data.serviceRate ?? 0.05;
                const campaignDiscount = data.campaignDiscount ?? 0;
                const campaignActive = data.campaignActive === true;
                // 農家側（未設定時は 5% / 0% / OFF をデフォルト）
                const farmerRate = data.farmerRate ?? 0.05;
                const farmerCampaignDiscount = data.farmerCampaignDiscount ?? 0;
                const farmerCampaignActive = data.farmerCampaignActive === true;

                document.getElementById('service-rate').value = (serviceRate * 100).toFixed(1);
                document.getElementById('campaign-discount').value = (campaignDiscount * 100).toFixed(1);
                toggle.classList.toggle('on', campaignActive);

                document.getElementById('farmer-rate').value = (farmerRate * 100).toFixed(1);
                document.getElementById('farmer-campaign-discount').value = (farmerCampaignDiscount * 100).toFixed(1);
                farmerToggle.classList.toggle('on', farmerCampaignActive);
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show');
            }
        });

        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            const note = document.getElementById('save-note');
            const errEl = document.getElementById('save-error');
            note.classList.remove('show');
            errEl.classList.remove('show');
            btn.disabled = true;

            const serviceRate = parseFloat(document.getElementById('service-rate').value) / 100 || 0;
            const campaignDiscount = parseFloat(document.getElementById('campaign-discount').value) / 100 || 0;
            const campaignActive = toggle.classList.contains('on');

            const farmerRate = parseFloat(document.getElementById('farmer-rate').value) / 100 || 0;
            const farmerCampaignDiscount = parseFloat(document.getElementById('farmer-campaign-discount').value) / 100 || 0;
            const farmerCampaignActive = farmerToggle.classList.contains('on');

            try {
                await setDoc(doc(db, 'settings', 'campaign'), {
                    serviceRate, campaignDiscount, campaignActive,
                    farmerRate, farmerCampaignDiscount, farmerCampaignActive
                }, { merge: true });
                note.classList.add('show');
                setTimeout(() => note.classList.remove('show'), 1800);
            } catch (err) {
                console.error(err);
                errEl.classList.add('show');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
