<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK Admin - Legal</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }
        .admin-shell { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .admin-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
        }
        .admin-header__right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .admin-brand { font-size: 13px; color: #64748b; margin-bottom: 2px; }
        .admin-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: #0f172a; }
        .admin-subtitle { font-size: 13px; color: #475569; margin-top: 4px; }
        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-nav a {
            text-decoration: none; color: #475569; padding: 8px 14px;
            border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .admin-nav a.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .admin-nav a:hover:not(.active) { background: #f1f5f9; }
        /* 画面言語の切替＝右上のコンパクトなドロップダウン（「編集する言語」タブとは別物・faq.html と同じ）。 */
        #lang-selector {
            width: auto; font-size: 13px; padding: 6px 10px;
            border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; color: #475569;
            cursor: pointer; flex: 0 0 auto;
        }

        .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; }

        /* ドキュメント選択（利用規約／プライバシーポリシー） */
        .doc-chips { display: flex; gap: 8px; margin-bottom: 16px; }
        .doc-chip {
            font-size: 13px; font-weight: 800; padding: 8px 16px; border-radius: 10px;
            border: 1px solid #dce3ea; background: #fff; color: #5a6470; cursor: pointer; font-family: inherit;
        }
        .doc-chip.on { background: var(--color-cta-lt); color: var(--color-cta); border-color: #bbd3ec; }

        .lg-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
        .lang-tabs { display: flex; gap: 6px; align-items: center; }
        .lang-tab {
            font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 14px;
            border: 1px solid #cbd5e1; color: #475569; background: #fff; cursor: pointer;
        }
        .lang-tab.on { background: #1e293b; color: #fff; border-color: #1e293b; }
        .lg-status { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .lg-badge { font-size: 11.5px; font-weight: 800; padding: 4px 11px; border-radius: 11px; }
        .lg-badge.pub { background: #e7f4ec; color: #2e7d32; }
        .lg-badge.draft { background: #eef1f4; color: #8a93a0; }
        .lg-meta { font-size: 11.5px; color: #9aa3b0; }

        .lg-editor .fl { font-size: 12px; color: #475569; font-weight: 700; margin: 12px 0 5px; }
        .lg-editor .inp {
            width: 100%; background: #fff; border: 1px solid #cbd5e1; border-radius: 8px;
            padding: 10px 12px; font-size: 14px; color: #0f172a; font-family: inherit;
        }
        .lg-editor textarea.inp { min-height: 320px; resize: vertical; line-height: 1.8; }

        .hint { font-size: 11.5px; color: #8a6a2a; background: #fff7e6; border: 1px solid #f3d998; border-radius: 9px; padding: 9px 12px; margin: 14px 0; line-height: 1.55; }
        .hint b { color: #7a5a1a; }
        .edit-err { color: #dc2626; font-size: 12px; font-weight: 600; margin-top: 8px; display: none; }

        .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
        .btn { border: none; border-radius: 10px; padding: 11px 20px; font-size: 13.5px; font-weight: 800; cursor: pointer; font-family: inherit; }
        .btn.sec { background: #eef1f4; color: #475569; }
        .btn.pri { background: var(--color-cta); color: #fff; }
        .btn:disabled { opacity: .6; cursor: not-allowed; }

        /* 7/23 #217: 言語タブの公開状態バッジ（言語別公開） */
        .lang-tab { display: inline-flex; align-items: center; gap: 6px; }
        .lang-tab__badge { font-size: 9.5px; font-weight: 800; padding: 2px 6px; border-radius: 7px; }
        .lang-tab__badge.pub { background: #E4F6E9; color: #1E8E4E; }
        .lang-tab__badge.unpub { background: #EEF1F5; color: #8A94A3; }
        .lang-tab.on .lang-tab__badge.unpub { background: rgba(255,255,255,.20); color: #dbe2ea; }
        /* 施行日欄（オレンジ破線・追加分） */
        .lg-effective { border: 1.5px dashed #E0A93B; background: #FFFCF5; border-radius: 10px; padding: 12px 14px; margin: 14px 0; }
        .lg-effective .inp-date { width: auto; }
        .lg-effective__hint { font-size: 11.5px; color: #8A94A3; margin-top: 6px; line-height: 1.5; }
        /* 公開のルール（青ボックス） */
        .lg-rule { display: flex; gap: 10px; align-items: flex-start; background: #EAF1FB; border: 1px solid #B9D4F2; color: #204a76; border-radius: 10px; padding: 12px 14px; margin: 14px 0; font-size: 12px; line-height: 1.6; }
        .lg-rule > .material-symbols-outlined { flex: 0 0 auto; color: var(--color-cta); }
        .lg-rule b { color: #163a5f; }
        .lg-rule__status { margin-top: 6px; font-weight: 700; }
        .lg-rule__status.ok { color: #1E8E4E; }
        .lg-rule__status.warn { color: #B37A00; }

        @media (max-width: 480px) {
            .admin-shell { padding: 14px; }
            .admin-title { font-size: 22px; }
            .panel { padding: 12px; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.legal.title"></div>
                <div class="admin-subtitle" data-i18n="admin.legal.subtitle"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/analytics.html" data-i18n="admin.navAnalytics"></a>
                    <a href="/pages/admin/users.html" data-i18n="admin.navUsers"></a>
                    <a href="/pages/admin/settings.html" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/referral.html" data-i18n="admin.navReferral"></a>
                    <a href="/pages/admin/caa.html" data-i18n="admin.navCaa"></a>
                    <a href="/pages/admin/reports.html" data-i18n="admin.navReports"></a>
                    <a href="/pages/admin/faq.html" data-i18n="admin.navFaq"></a>
                    <a href="/pages/admin/legal.html" class="active" data-i18n="admin.navLegal"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option>
                    <option value="en">ENGLISH</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
        </div>

        <div class="panel">
            <div class="doc-chips" id="doc-chips">
                <button type="button" class="doc-chip on" data-doc="terms" data-i18n="terms.title"></button>
                <button type="button" class="doc-chip" data-doc="privacy" data-i18n="privacy.title"></button>
            </div>

            <div class="lg-toolbar">
                <label class="l" style="font-size:12px; color:#64748b; font-weight:700;" data-i18n="admin.faq.contentLangLabel"></label>
                <div class="lang-tabs" id="lang-tabs">
                    <button type="button" class="lang-tab on" data-lang="ja"><span data-i18n="admin.faq.langJa"></span><span class="lang-tab__badge" data-lang-badge="ja"></span></button>
                    <button type="button" class="lang-tab" data-lang="en"><span data-i18n="admin.faq.langEn"></span><span class="lang-tab__badge" data-lang-badge="en"></span></button>
                    <button type="button" class="lang-tab" data-lang="km"><span data-i18n="admin.faq.langKm"></span><span class="lang-tab__badge" data-lang-badge="km"></span></button>
                </div>
                <div class="lg-status">
                    <span class="lg-badge" id="pub-badge"></span>
                    <span class="lg-meta" id="updated-meta"></span>
                </div>
            </div>

            <div class="lg-editor">
                <div class="fl" data-i18n="admin.legal.fieldTitle"></div>
                <input class="inp" id="e-title" data-i18n="[placeholder]admin.legal.titlePlaceholder">
                <!-- 7/23 #217 3-2: 施行日（言語別） -->
                <div class="lg-effective">
                    <div class="fl" style="margin-top:0;" data-i18n="admin.legal.fieldEffectiveDate"></div>
                    <input class="inp inp-date" id="e-effective" type="date">
                    <div class="lg-effective__hint" data-i18n="admin.legal.effectiveDateHint"></div>
                </div>
                <div class="fl" data-i18n="admin.legal.fieldBody"></div>
                <textarea class="inp" id="e-body" data-i18n="[placeholder]admin.legal.bodyPlaceholder"></textarea>
            </div>

            <div class="hint"><span class="material-symbols-outlined" style="font-size:15px; vertical-align:-2px;">lightbulb</span> <span data-i18n="admin.legal.hint"></span></div>
            <div class="edit-err" id="edit-err"></div>

            <!-- 7/23 #217 3-1: 公開のルール（未公開言語のフォールバック） -->
            <div class="lg-rule">
                <span class="material-symbols-outlined">shield</span>
                <div>
                    <b data-i18n="admin.legal.ruleTitle"></b>
                    <div style="margin-top:4px;" data-i18n="admin.legal.ruleLine1"></div>
                    <div data-i18n="admin.legal.ruleLine2"></div>
                    <div class="lg-rule__status" id="lg-rule-status"></div>
                </div>
            </div>

            <div class="actions">
                <button type="button" class="btn sec" id="btn-draft" data-i18n="admin.legal.saveDraft"></button>
                <button type="button" class="btn pri" id="btn-publish" data-i18n="admin.legal.publish"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initAdminReportBadge } from '/js/admin-report-badge.js';
        import { showToast } from '/js/toast.js';
        import { DEFAULT_LEGAL, formatUpdatedYearMonth } from '/js/legal-display.js';
        import { doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        const LEGAL_TYPES = ['terms', 'privacy'];
        const LEGAL_LANGS = ['ja', 'en', 'km'];   // タブ順＝日→英→クメール（spec §5）

        let docType = 'terms';
        let editLang = 'ja';
        // 7/23 #217: docState = draft{ja,en,km}{title,body}（編集中）／pub{...同}（公開版）／
        //   pubLangs{ja,en,km}(bool・言語別公開)／effectiveDate{ja,en,km}('YYYY-MM-DD'・施行日の編集値=下書き側)／
        //   pubEffectiveDate{ja,en,km}(公開版の施行日＝公開時のみ昇格・ユーザー表示はこれ)／published/updatedAt。
        let docState = null;

        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initAdminReportBadge();

        document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); logout(); });

        function waitAdmin(cb) {
            if (window.currentUserData) {
                if (window.currentUserData.role !== 'admin') { location.href = '/index.html'; return; }
                cb();
            } else { setTimeout(() => waitAdmin(cb), 200); }
        }

        function blankLang() { return { title: '', body: '' }; }
        function emptyDraft() {
            const o = {};
            LEGAL_LANGS.forEach(l => { o[l] = blankLang(); });
            return o;
        }

        function emptyPubLangs() { return { ja: false, en: false, km: false }; }
        function emptyEffective() { return { ja: '', en: '', km: '' }; }

        async function loadDoc() {
            loading.classList.add('show');
            try {
                const snap = await getDoc(doc(db, 'legal', docType));
                const draft = emptyDraft();
                if (snap.exists()) {
                    const data = snap.data();
                    const src = data.draft || {};
                    const pub = emptyDraft();
                    LEGAL_LANGS.forEach(l => {
                        draft[l] = { title: src[l]?.title || '', body: src[l]?.body || '' };
                        pub[l] = { title: data.pub?.[l]?.title || '', body: data.pub?.[l]?.body || '' };
                    });
                    // 公開状態：pubLangs があればそれ／無ければ旧 doc（published(bool)＋pub 本文）から推定＝後方互換。
                    const pubLangs = emptyPubLangs();
                    LEGAL_LANGS.forEach(l => {
                        pubLangs[l] = data.pubLangs ? data.pubLangs[l] === true
                            : (data.published === true && !!pub[l].body);
                    });
                    const effectiveDate = emptyEffective();
                    const pubEffectiveDate = emptyEffective();
                    LEGAL_LANGS.forEach(l => {
                        effectiveDate[l] = (data.effectiveDate && data.effectiveDate[l]) || '';
                        pubEffectiveDate[l] = (data.pubEffectiveDate && data.pubEffectiveDate[l]) || '';
                    });
                    docState = { draft, pub, pubLangs, effectiveDate, pubEffectiveDate, published: LEGAL_LANGS.some(l => pubLangs[l]), updatedAt: data.updatedAt || null };
                } else {
                    // 初回：日本語を現行ドラフト（DEFAULT_LEGAL）でプリフィル＝移行の下訳元。
                    draft.ja = { ...DEFAULT_LEGAL[docType].ja };
                    docState = { draft, pub: emptyDraft(), pubLangs: emptyPubLangs(), effectiveDate: emptyEffective(), pubEffectiveDate: emptyEffective(), published: false, updatedAt: null };
                }
                render();
            } catch (e) {
                console.error('loadDoc failed:', e);
                const draft = emptyDraft();
                draft.ja = { ...DEFAULT_LEGAL[docType].ja };
                docState = { draft, pub: emptyDraft(), pubLangs: emptyPubLangs(), effectiveDate: emptyEffective(), pubEffectiveDate: emptyEffective(), published: false, updatedAt: null };
                render();
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 表示中の入力欄の値を docState に取り込む（言語切替・ドキュメント切替・保存の前に呼ぶ）
        function captureInputs() {
            if (!docState) return;
            const t = document.getElementById('e-title');
            const b = document.getElementById('e-body');
            const e = document.getElementById('e-effective');
            if (t) docState.draft[editLang].title = t.value;
            if (b) docState.draft[editLang].body = b.value;
            if (e) docState.effectiveDate[editLang] = e.value;
        }

        function render() {
            if (!docState) return;
            // ドキュメントチップ／言語タブのアクティブ
            document.querySelectorAll('#doc-chips .doc-chip').forEach(c => c.classList.toggle('on', c.dataset.doc === docType));
            document.querySelectorAll('#lang-tabs .lang-tab').forEach(t => t.classList.toggle('on', t.dataset.lang === editLang));
            // 入力欄
            const cur = docState.draft[editLang] || blankLang();
            document.getElementById('e-title').value = cur.title || '';
            document.getElementById('e-body').value = cur.body || '';
            document.getElementById('e-effective').value = docState.effectiveDate[editLang] || '';
            // 言語タブの公開状態バッジ（言語別）。日本語は「未公開・運営用」の特別文言。
            LEGAL_LANGS.forEach(l => {
                const b = document.querySelector(`#lang-tabs [data-lang-badge="${l}"]`);
                if (!b) return;
                const isPub = docState.pubLangs[l] === true;
                b.textContent = i18next.t(isPub ? 'admin.legal.badgePub' : (l === 'ja' ? 'admin.legal.badgeStaffUnpub' : 'admin.legal.badgeUnpub'));
                b.className = 'lang-tab__badge ' + (isPub ? 'pub' : 'unpub');
            });
            // 現在の編集言語の状態バッジ（従来の #pub-badge を流用）＋最終更新
            const badge = document.getElementById('pub-badge');
            const curPub = docState.pubLangs[editLang] === true;
            badge.textContent = i18next.t(curPub ? 'admin.legal.badgePublished' : 'admin.legal.badgeDraft');
            badge.className = 'lg-badge ' + (curPub ? 'pub' : 'draft');
            const meta = document.getElementById('updated-meta');
            const lang = (i18next.language || 'ja').split('-')[0];
            const ym = formatUpdatedYearMonth(docState.updatedAt, lang);
            meta.textContent = ym ? `${i18next.t('legal.updatedPrefix')}${ym}` : '';
            renderRuleStatus();
            // エラー欄は状況に応じて隠す
            const err = document.getElementById('edit-err');
            if (err) err.style.display = 'none';
        }

        // 公開ルールの現在状態（ユーザー向け言語 km/en が1つでも公開されているか）
        function renderRuleStatus() {
            const el = document.getElementById('lg-rule-status');
            if (!el || !docState) return;
            const hasUser = docState.pubLangs.km === true || docState.pubLangs.en === true;
            el.textContent = i18next.t(hasUser ? 'admin.legal.ruleStatusOk' : 'admin.legal.ruleStatusNone');
            el.className = 'lg-rule__status ' + (hasUser ? 'ok' : 'warn');
        }

        function showEditErr(msg) {
            const err = document.getElementById('edit-err');
            if (err) { err.textContent = msg; err.style.display = 'block'; }
        }

        async function saveDraft() {
            captureInputs();
            const btn = document.getElementById('btn-draft');
            btn.disabled = true; loading.classList.add('show');
            try {
                // 下書き保存＝draft と施行日のみ更新（pub/pubLangs/published は不変）。
                await setDoc(doc(db, 'legal', docType), { draft: docState.draft, effectiveDate: docState.effectiveDate }, { merge: true });
                showToast(i18next.t('account.saved'));
            } catch (e) {
                console.error('saveDraft failed:', e);
                showError(e);
            } finally {
                loading.classList.remove('show'); btn.disabled = false;
            }
        }

        // 7/23 #217: 公開は「編集中の言語」単位。その言語の draft を pub へ昇格＋pubLangs[lang]=true。
        async function publish() {
            captureInputs();
            const L = editLang;
            const cur = docState.draft[L] || {};
            // 公開する言語のタイトル・本文が必須。
            if (!cur.title?.trim() || !cur.body?.trim()) {
                showEditErr(i18next.t('admin.legal.needContent'));
                return;
            }
            // ガード：ユーザー向け言語（km/en）が1つも公開されていない状態で日本語だけを公開しようとしたらブロック。
            //   （日本語は運営用＝ユーザーに出ない。"空っぽ"を根絶するため先に km/en を公開させる。）
            if (L === 'ja' && !(docState.pubLangs.km === true || docState.pubLangs.en === true)) {
                showEditErr(i18next.t('admin.legal.needUserLang'));
                return;
            }
            const btn = document.getElementById('btn-publish');
            btn.disabled = true; loading.classList.add('show');
            try {
                // 編集中の言語だけを pub へ昇格。他言語の公開状態・本文は不変。
                docState.pub[L] = { title: cur.title.trim(), body: cur.body.trim() };
                docState.pubLangs[L] = true;
                docState.effectiveDate[L] = (document.getElementById('e-effective').value || '');
                docState.pubEffectiveDate[L] = docState.effectiveDate[L];   // 施行日を公開版へ昇格（下書き保存では公開版は変わらない）
                docState.published = LEGAL_LANGS.some(l => docState.pubLangs[l]);
                await setDoc(doc(db, 'legal', docType), {
                    draft: docState.draft,
                    pub: docState.pub,
                    pubLangs: docState.pubLangs,
                    effectiveDate: docState.effectiveDate,
                    pubEffectiveDate: docState.pubEffectiveDate,
                    published: docState.published,   // 「いずれか公開なら true」＝firestore.rules 変更不要
                    updatedAt: serverTimestamp(),
                }, { merge: true });
                showToast(i18next.t('admin.legal.publishedToast'));
                await loadDoc();   // updatedAt/バッジを反映
            } catch (e) {
                console.error('publish failed:', e);
                showError(e);
            } finally {
                loading.classList.remove('show'); btn.disabled = false;
            }
        }

        function showError(e) {
            const detail = e?.code || e?.message || String(e);
            const err = document.getElementById('edit-err');
            if (err) { err.textContent = i18next.t('admin.legal.saveFailed') + (detail ? ` [${String(detail).slice(0, 120)}]` : ''); err.style.display = 'block'; }
        }

        // ── イベント配線 ──────────────────────────────────────────────
        document.getElementById('doc-chips').addEventListener('click', (e) => {
            const chip = e.target.closest('.doc-chip');
            if (!chip || chip.dataset.doc === docType) return;
            captureInputs();
            docType = chip.dataset.doc;
            loadDoc();
        });
        document.getElementById('lang-tabs').addEventListener('click', (e) => {
            const btn = e.target.closest('.lang-tab');
            if (!btn || btn.dataset.lang === editLang) return;
            captureInputs();
            editLang = btn.dataset.lang;
            render();
        });
        document.getElementById('btn-draft').addEventListener('click', saveDraft);
        document.getElementById('btn-publish').addEventListener('click', publish);

        onLanguageChange(() => { captureInputs(); render(); });

        waitAdmin(() => { loadDoc(); });
    </script>
</body>

</html>
