<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink Admin</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .admin-shell { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
        }
        .admin-brand { font-size: 13px; color: #64748b; }
        .admin-title { font-size: 26px; font-weight: 700; color: #0f172a; margin-top: 2px; }
        .admin-subtitle { font-size: 13px; color: #475569; margin-top: 4px; }

        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-nav a {
            text-decoration: none; color: #475569; padding: 8px 14px;
            border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .admin-nav a.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .admin-nav a:hover:not(.active) { background: #f1f5f9; }

        #lang-selector {
            width: auto; font-size: 13px; padding: 6px 10px;
            border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; color: #475569;
        }

        .admin-header__right {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* ── マトリクス表 ─────────────────── */
        .matrix-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            overflow: hidden;
        }

        .matrix-scroll {
            overflow: auto;
            max-height: calc(100vh - 280px);
            min-height: 400px;
        }

        .matrix-table {
            border-collapse: separate;
            border-spacing: 0;
            min-width: 100%;
        }

        .matrix-table th,
        .matrix-table td {
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #f1f5f9;
            padding: 10px 12px;
            vertical-align: middle;
            background: #fff;
        }

        .matrix-table thead th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            color: #334155;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            z-index: 2;
            min-width: 150px;
            padding: 12px 10px;
        }

        /* 州列（左固定） */
        .matrix-table th.col-prov,
        .matrix-table td.col-prov {
            position: sticky;
            left: 0;
            background: #f8fafc;
            font-weight: 700;
            font-size: 13px;
            color: #0f172a;
            white-space: nowrap;
            z-index: 1;
            min-width: 140px;
            box-shadow: 1px 0 0 #e2e8f0;
        }
        .matrix-table thead th.col-prov {
            background: #e2e8f0;
            z-index: 3;
        }

        .matrix-table th .km-name {
            display: block;
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
            margin-top: 2px;
        }

        .cell-inputs {
            display: flex; flex-direction: column; gap: 6px;
            min-width: 170px;
            align-items: flex-start;
        }
        .cell-row {
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; color: #475569;
        }
        .cell-row input {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 12px;
            background: #fff;
            text-align: right;
            -moz-appearance: textfield;
        }
        .cell-row input::-webkit-outer-spin-button,
        .cell-row input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        .cell-row input:focus { outline: none; border-color: #0f172a; }
        .cell-row input.range-num { width: 60px; }
        .cell-row input.size-num { width: 50px; }
        .cell-row .sep { color: #94a3b8; padding: 0 1px; }
        .cell-row .unit { color: #475569; font-size: 11px; margin-left: 2px; }

        /* ゼブラ */
        .matrix-table tbody tr:nth-child(even) td { background: #fafafa; }
        .matrix-table tbody tr:nth-child(even) td.col-prov { background: #f1f5f9; }

        /* 保存バー */
        .save-bar {
            position: sticky; bottom: 0; left: 0;
            margin-top: 14px;
            background: rgba(255,255,255,.97);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 12px 18px;
            display: flex; justify-content: flex-end; align-items: center; gap: 12px;
            flex-wrap: wrap;
        }
        .save-note { font-size: 13px; color: #16a34a; opacity: 0; transition: opacity .3s; }
        .save-note.show { opacity: 1; }
        .save-err { font-size: 13px; color: #ef4444; opacity: 0; transition: opacity .3s; }
        .save-err.show { opacity: 1; }
        .history-btn {
            padding: 10px 18px; border-radius: 10px;
            border: 1px solid #cbd5e1; background: #fff;
            color: #334155; font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .history-btn:hover { background: #f1f5f9; }
        .history-btn .material-symbols-outlined { font-size: 18px; }

        /* 履歴ドロワー */
        .history-drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,.45);
            display: none; z-index: 100;
        }
        .history-drawer-overlay.show { display: block; }
        .history-drawer {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: 380px; max-width: 92vw;
            background: #fff;
            box-shadow: -4px 0 20px rgba(0,0,0,.15);
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            display: flex; flex-direction: column;
            z-index: 101;
        }
        .history-drawer.show { transform: translateX(0); }
        .history-drawer__head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 18px;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-drawer__title { font-size: 16px; font-weight: 700; }
        .history-drawer__close {
            width: 32px; height: 32px;
            border-radius: 50%; border: none; background: #f1f5f9;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
        }
        .history-drawer__list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-drawer__empty {
            padding: 40px 20px; text-align: center;
            color: #94a3b8; font-size: 13px;
        }
        .history-item {
            border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 12px 14px; margin-bottom: 8px;
            cursor: pointer; background: #fff;
            transition: background 0.1s;
        }
        .history-item:hover { background: #f8fafc; }
        .history-item.active { border-color: #0f172a; background: #f1f5f9; }
        .history-item__date { font-size: 14px; font-weight: 700; color: #0f172a; }
        .history-item__user { font-size: 11px; color: #64748b; margin-top: 3px; }

        /* 履歴閲覧バナー */
        .history-banner {
            background: #fef3c7;
            border: 1px solid #fbbf24;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 14px;
            display: none;
            align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }
        .history-banner.show { display: flex; }
        .history-banner__text {
            font-size: 13px; color: #92400e; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .history-banner__btn {
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid #fbbf24; background: #fff;
            color: #92400e; font-size: 12px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }

        /* 閲覧モード（入力disabled） */
        .viewing-history input { pointer-events: none; background: #f8fafc !important; }
        .viewing-history .save-btn { display: none; }

        .save-btn {
            border: none; background: #0f172a; color: #fff;
            font-weight: 700; font-size: 14px; padding: 10px 24px;
            border-radius: 12px; cursor: pointer;
        }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .clear-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff; color: #b91c1c;
            border: 1px solid #fecaca;
            font-weight: 700; font-size: 13px; padding: 9px 14px;
            border-radius: 12px; cursor: pointer;
        }
        .clear-btn:hover { background: #fef2f2; }
        .clear-btn .material-symbols-outlined { font-size: 18px; }
        .viewing-history .clear-btn { display: none; }

        .loading-msg {
            padding: 40px 16px; text-align: center; color: #94a3b8;
        }

        /* ── OCR 取り込みパネル ─────────── */
        .ocr-panel {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }
        .ocr-panel__head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }
        .ocr-panel__title {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ocr-panel__hint {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .ocr-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .ocr-btn {
            border: 1px solid #e2e8f0;
            background: #f1f5f9;
            color: #0f172a;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .ocr-btn.primary { background: #0f172a; color: #fff; border-color: #0f172a; }
        .ocr-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ocr-progress {
            font-size: 12px;
            color: #0369a1;
            display: none;
            margin-left: 8px;
        }
        .ocr-progress.show { display: inline; }
        .ocr-preview {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .ocr-preview__img {
            flex: 1;
            min-width: 200px;
            max-width: 380px;
        }
        .ocr-preview__img img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .ocr-preview__text {
            flex: 2;
            min-width: 280px;
        }
        .ocr-preview__text textarea {
            width: 100%;
            min-height: 180px;
            font-family: ui-monospace, Menlo, monospace;
            font-size: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            resize: vertical;
            background: #f8fafc;
            color: #0f172a;
        }
        .ocr-preview__text .label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
        }

        /* ── レスポンシブ ─────────────────── */
        @media (max-width: 1024px) {
            .admin-shell { padding: 20px; }
            .admin-title { font-size: 24px; }
        }
        @media (max-width: 720px) {
            .admin-shell { padding: 14px; }
            .admin-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .admin-header__right { justify-content: flex-start; }
            .admin-title { font-size: 20px; }
            .admin-subtitle { font-size: 12px; }
            .admin-nav a { padding: 7px 12px; font-size: 12px; }

            .matrix-scroll { max-height: calc(100vh - 220px); }
            .matrix-table thead th { min-width: 130px; padding: 10px 8px; }
            .matrix-table th.col-prov,
            .matrix-table td.col-prov { min-width: 110px; font-size: 12px; }
            .cell-inputs { min-width: 110px; }
            .cell-inputs input { padding: 5px 7px; font-size: 11px; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.caa.title"></div>
                <div class="admin-subtitle" data-i18n="admin.caa.subtitle"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/users.html" data-i18n="admin.navUsers"></a>
                    <a href="/pages/admin/settings.html" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/caa.html" class="active" data-i18n="admin.navCaa"></a>
                    <a href="/pages/admin/reports.html" data-i18n="admin.navReports"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
                </select>
            </div>
        </div>

        <!-- OCR 取り込みパネル（画像から価格表テキストを抽出） -->
        <div class="ocr-panel">
            <div class="ocr-panel__head">
                <div class="ocr-panel__title">
                    <span class="material-symbols-outlined" style="font-size:18px;">image</span>
                    <span data-i18n="admin.caa.ocrTitle"></span>
                </div>
            </div>
            <div class="ocr-panel__hint" data-i18n="admin.caa.ocrHint"></div>
            <div class="ocr-actions">
                <input type="file" id="ocr-file" accept="image/*" multiple style="display:none;">
                <button type="button" class="ocr-btn primary" id="ocr-pick">
                    <span class="material-symbols-outlined" style="font-size:14px;">upload</span>
                    <span data-i18n="admin.caa.ocrPick"></span>
                </button>
                <button type="button" class="ocr-btn" id="ocr-run" disabled data-i18n="admin.caa.ocrRun"></button>
                <button type="button" class="ocr-btn" id="ocr-autofill" disabled data-i18n="admin.caa.ocrAutofill"></button>
                <span class="ocr-progress" id="ocr-progress"></span>
            </div>
            <div class="ocr-preview" id="ocr-preview" style="display:none;">
                <div class="ocr-preview__img">
                    <div class="label" data-i18n="admin.caa.ocrPreview"></div>
                    <div id="ocr-imgs" style="display:flex; flex-direction:column; gap:8px;"></div>
                </div>
                <div class="ocr-preview__text">
                    <div class="label" data-i18n="admin.caa.ocrText"></div>
                    <textarea id="ocr-text" readonly data-i18n="[placeholder]admin.caa.ocrTextPlaceholder"></textarea>
                </div>
            </div>
        </div>

        <!-- 履歴閲覧中バナー -->
        <div class="history-banner" id="history-banner">
            <div class="history-banner__text">
                <span class="material-symbols-outlined" style="font-size:18px;">history</span>
                <span id="history-banner-text"></span>
            </div>
            <button class="history-banner__btn" id="history-back-btn" data-i18n="admin.caa.backToCurrent"></button>
        </div>

        <div class="matrix-card" id="matrix-card">
            <div class="matrix-scroll">
                <table class="matrix-table">
                    <thead>
                        <tr id="matrix-header"></tr>
                    </thead>
                    <tbody id="matrix-body">
                        <tr><td class="loading-msg" colspan="11" data-i18n="admin.caa.loadingData"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="save-bar" id="save-bar">
            <span class="save-note" id="save-note" data-i18n="admin.caa.saved"></span>
            <span class="save-err" id="save-err" data-i18n="admin.settings.errorSave"></span>
            <button class="history-btn" id="history-open-btn" type="button">
                <span class="material-symbols-outlined">history</span>
                <span data-i18n="admin.caa.historyBtn"></span>
            </button>
            <button class="clear-btn" id="clear-btn" type="button">
                <span class="material-symbols-outlined">backspace</span>
                <span data-i18n="admin.caa.clearBtn"></span>
            </button>
            <button class="save-btn" id="save-btn" data-i18n="admin.caa.save"></button>
        </div>
    </div>

    <!-- 履歴ドロワー -->
    <div class="history-drawer-overlay" id="history-drawer-overlay"></div>
    <div class="history-drawer" id="history-drawer">
        <div class="history-drawer__head">
            <div class="history-drawer__title" data-i18n="admin.caa.historyTitle"></div>
            <button class="history-drawer__close" id="history-drawer-close" type="button">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="history-drawer__list" id="history-list">
            <div class="history-drawer__empty" data-i18n="admin.caa.historyLoading"></div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initAdminReportBadge } from '/js/admin-report-badge.js';
        import {
            doc, getDoc, setDoc, addDoc, writeBatch, collection,
            query, orderBy, limit, getDocs, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initAdminReportBadge();

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        // CAA公開資料の並び順（画像と同じ）
        const FISH_TYPES = [
            'striped_snakehead', 'walking_catfish', 'red_tilapia', 'nile_tilapia',
            'silver_barb', 'spot_pangasius', 'pangasius', 'giant_snakehead',
            'climbing_perch', 'frog'
        ];
        const PROVINCES = [
            'Kandal', 'Takeo', 'Prey Veng', 'Kg. Cham', 'Kg. Thom',
            'Siemreap', 'Battambang', 'Pursat', 'Kg. Chhnang', 'BMC'
        ];

        // 旧形式（{range, size} 文字列）→ 新形式（数値4フィールド）への変換
        function normalizeEntry(e) {
            if (!e) return null;
            if ('rangeMin' in e || 'sizeMin' in e) return e;  // 既に新形式
            // 旧形式パース
            const result = { rangeMin: '', rangeMax: '', sizeMin: '', sizeMax: '' };
            if (typeof e.range === 'string') {
                const parts = e.range.replace(/[,\s]/g, '').split(/[-–]/).map(parseFloat);
                if (!isNaN(parts[0])) result.rangeMin = parts[0];
                if (!isNaN(parts[1])) result.rangeMax = parts[1];
            }
            if (typeof e.size === 'string') {
                const cleaned = e.size.replace(/kg/gi, '').trim();
                const parts = cleaned.split(/[-–]/).map(parseFloat);
                if (!isNaN(parts[0])) result.sizeMin = parts[0];
                if (!isNaN(parts[1])) result.sizeMax = parts[1];
            }
            return result;
        }

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        let allData = {}; // { fishType: { provinceName: { range, size } } }

        waitForUserData(async () => {
            if (window.currentUserData?.role !== 'admin') {
                alert('Admin access required');
                location.href = '/index.html';
                return;
            }
            loading.classList.add('show');
            try {
                await Promise.all(FISH_TYPES.map(async ft => {
                    const snap = await getDoc(doc(db, 'caaPrice', ft));
                    allData[ft] = snap.exists() ? snap.data() : {};
                }));
                render();
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show');
            }
        });

        function render() {
            // ヘッダー：州列 + 魚種10列
            const header = document.getElementById('matrix-header');
            header.innerHTML = `<th class="col-prov">${i18next.t('admin.caa.colProvince')}</th>`
                + FISH_TYPES.map(ft => {
                    const ja = i18next.t(`fish.${ft}`, { lng: 'ja' }) || ft;
                    const label = i18next.exists(`fish.${ft}`) ? i18next.t(`fish.${ft}`) : ft;
                    return `<th>${label}</th>`;
                }).join('');

            // ボディ：各州につき1行、10魚種分のセル
            const body = document.getElementById('matrix-body');
            body.innerHTML = PROVINCES.map(p => {
                const cells = FISH_TYPES.map(ft => {
                    const entry = normalizeEntry(allData[ft]?.[p]) || {};
                    const v = (k) => (entry[k] === 0 || entry[k] ? entry[k] : '');
                    return `
                        <td>
                            <div class="cell-inputs">
                                <div class="cell-row">
                                    <input type="number" class="range-num" step="1" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="rangeMin"
                                        value="${v('rangeMin')}">
                                    <span class="sep">–</span>
                                    <input type="number" class="range-num" step="1" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="rangeMax"
                                        value="${v('rangeMax')}">
                                </div>
                                <div class="cell-row">
                                    <input type="number" class="size-num" step="0.01" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="sizeMin"
                                        value="${v('sizeMin')}">
                                    <span class="sep">–</span>
                                    <input type="number" class="size-num" step="0.01" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="sizeMax"
                                        value="${v('sizeMax')}">
                                    <span class="unit">kg</span>
                                </div>
                            </div>
                        </td>
                    `;
                }).join('');
                return `<tr><td class="col-prov">${p}</td>${cells}</tr>`;
            }).join('');
        }

        // ── 一括クリア（保存前の入力リセット）─────────
        document.getElementById('clear-btn').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell-inputs input');
            const filledCount = Array.from(inputs).filter(i => i.value !== '').length;
            if (filledCount === 0) return;
            if (!confirm(i18next.t('admin.caa.clearConfirm', { count: filledCount }))) return;
            inputs.forEach(inp => { inp.value = ''; });
        });

        // ── 一括保存 ─────────────────────────────
        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            const note = document.getElementById('save-note');
            const err = document.getElementById('save-err');
            note.classList.remove('show');
            err.classList.remove('show');
            btn.disabled = true;
            loading.classList.add('show');

            // 入力値を魚種 → 州 → {rangeMin, rangeMax, sizeMin, sizeMax} に集約
            const payloads = {};
            FISH_TYPES.forEach(ft => { payloads[ft] = {}; });

            document.querySelectorAll('.cell-inputs input').forEach(inp => {
                const { fish, prov, field } = inp.dataset;
                if (!payloads[fish][prov]) {
                    payloads[fish][prov] = { rangeMin: null, rangeMax: null, sizeMin: null, sizeMax: null };
                }
                const v = inp.value.trim();
                payloads[fish][prov][field] = v === '' ? null : Number(v);
            });

            // 全フィールドが空の州エントリは削除（= データなし）
            FISH_TYPES.forEach(ft => {
                Object.keys(payloads[ft]).forEach(p => {
                    const e = payloads[ft][p];
                    if (e.rangeMin == null && e.rangeMax == null
                        && e.sizeMin == null && e.sizeMax == null) {
                        delete payloads[ft][p];
                    }
                });
            });

            try {
                // 保存前にスナップショット履歴を作成（現在のDB状態を caaPriceHistory に保存）
                const historyData = {};
                FISH_TYPES.forEach(ft => {
                    historyData[ft] = JSON.parse(JSON.stringify(allData[ft] || {}));
                });
                await addDoc(collection(db, 'caaPriceHistory'), {
                    savedAt: serverTimestamp(),
                    savedBy: window.currentUser?.uid || null,
                    savedByName: window.currentUserData?.displayName || '',
                    data: historyData,
                });

                // 新しい値を caaPrice に保存（writeBatch で10件原子的に）
                const batch = writeBatch(db);
                FISH_TYPES.forEach(ft => {
                    batch.set(doc(db, 'caaPrice', ft), payloads[ft]);
                });
                await batch.commit();

                // 保存後のデータをメモリにも反映
                allData = payloads;
                note.classList.add('show');
                setTimeout(() => note.classList.remove('show'), 2000);
            } catch (e) {
                console.error(e);
                err.classList.add('show');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        });

        // ── 履歴ドロワー ─────────────────────────────
        let historyList = [];
        let viewingHistoryId = null;

        function openHistoryDrawer() {
            document.getElementById('history-drawer-overlay').classList.add('show');
            document.getElementById('history-drawer').classList.add('show');
            loadHistoryList();
        }
        function closeHistoryDrawer() {
            document.getElementById('history-drawer-overlay').classList.remove('show');
            document.getElementById('history-drawer').classList.remove('show');
        }

        async function loadHistoryList() {
            const listEl = document.getElementById('history-list');
            listEl.innerHTML = `<div class="history-drawer__empty">${i18next.t('admin.caa.historyLoading')}</div>`;
            try {
                const q = query(
                    collection(db, 'caaPriceHistory'),
                    orderBy('savedAt', 'desc'),
                    limit(50)
                );
                const snap = await getDocs(q);
                historyList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (historyList.length === 0) {
                    listEl.innerHTML = `<div class="history-drawer__empty">${i18next.t('admin.caa.historyEmpty')}</div>`;
                    return;
                }
                listEl.innerHTML = historyList.map(h => {
                    const d = h.savedAt?.toDate?.() || new Date();
                    const pad = n => String(n).padStart(2, '0');
                    const dateStr = `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                    const user = h.savedByName || h.savedBy || '';
                    const activeCls = viewingHistoryId === h.id ? ' active' : '';
                    return `
                        <div class="history-item${activeCls}" data-id="${h.id}">
                            <div class="history-item__date">${dateStr}</div>
                            ${user ? `<div class="history-item__user">${escapeHtml(user)}</div>` : ''}
                        </div>
                    `;
                }).join('');
                // クリックで閲覧
                listEl.querySelectorAll('.history-item').forEach(itemEl => {
                    itemEl.addEventListener('click', () => {
                        const id = itemEl.dataset.id;
                        const entry = historyList.find(h => h.id === id);
                        if (entry) viewHistorySnapshot(entry);
                    });
                });
            } catch (e) {
                console.error(e);
                listEl.innerHTML = `<div class="history-drawer__empty">${i18next.t('admin.caa.historyError')}</div>`;
            }
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // スナップショット閲覧：マトリクスを履歴データで描画、入力を閉じる
        function viewHistorySnapshot(entry) {
            viewingHistoryId = entry.id;
            const d = entry.savedAt?.toDate?.() || new Date();
            const pad = n => String(n).padStart(2, '0');
            const dateStr = `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;

            // マトリクスのデータ差し替え
            const snapshotData = entry.data || {};
            // allDataの一時退避 → render書き換え
            const origData = allData;
            allData = {};
            FISH_TYPES.forEach(ft => {
                allData[ft] = snapshotData[ft] || {};
            });
            render();
            // 閲覧モードON
            document.body.classList.add('viewing-history');
            const banner = document.getElementById('history-banner');
            document.getElementById('history-banner-text').textContent =
                i18next.t('admin.caa.viewingHistory', { date: dateStr });
            banner.classList.add('show');
            // 元のデータは復帰時に再ロードする
            window._caaOriginalData = origData;
            closeHistoryDrawer();
            // リスト上のアクティブを更新（次回開いたとき）
        }

        // 閲覧モードから現在に戻る
        async function backToCurrent() {
            viewingHistoryId = null;
            document.body.classList.remove('viewing-history');
            document.getElementById('history-banner').classList.remove('show');
            // 最新 caaPrice を再取得
            loading.classList.add('show');
            try {
                await Promise.all(FISH_TYPES.map(async ft => {
                    const snap = await getDoc(doc(db, 'caaPrice', ft));
                    allData[ft] = snap.exists() ? snap.data() : {};
                }));
                render();
            } catch (e) { console.error(e); }
            finally { loading.classList.remove('show'); }
        }

        document.getElementById('history-open-btn').addEventListener('click', openHistoryDrawer);
        document.getElementById('history-drawer-close').addEventListener('click', closeHistoryDrawer);
        document.getElementById('history-drawer-overlay').addEventListener('click', closeHistoryDrawer);
        document.getElementById('history-back-btn').addEventListener('click', backToCurrent);

        onLanguageChange(() => {
            if (Object.keys(allData).length > 0) render();
        });

        // ── AI抽出（Gemini 2.5 Flash・複数画像対応） ──────────────
        // 1) 画像を Cloud Function (extractCaaPrices) に送信
        // 2) Gemini が表構造を理解して JSON で返す（空セル † は除外済み）
        // 3) 受け取った entries[] を対応するセルに直接流し込む
        let ocrFiles = [];        // 選択された画像 File オブジェクト
        let ocrEntries = [];      // [{ province, fishType, rangeMin, rangeMax, sizeMin, sizeMax }]
        const ocrPickBtn = document.getElementById('ocr-pick');
        const ocrRunBtn = document.getElementById('ocr-run');
        const ocrAutofillBtn = document.getElementById('ocr-autofill');
        const ocrProgress = document.getElementById('ocr-progress');
        const ocrFileInput = document.getElementById('ocr-file');
        const ocrPreview = document.getElementById('ocr-preview');
        const ocrImgsContainer = document.getElementById('ocr-imgs');
        const ocrTextarea = document.getElementById('ocr-text');

        ocrPickBtn.addEventListener('click', () => ocrFileInput.click());

        ocrFileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            if (!files.length) return;
            ocrFiles = files;
            ocrImgsContainer.innerHTML = '';
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    ocrImgsContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            ocrPreview.style.display = 'flex';
            ocrRunBtn.disabled = false;
            ocrTextarea.value = '';
            ocrEntries = [];
            ocrAutofillBtn.disabled = true;
        });

        // File → { mimeType, data(base64) } へ変換
        function fileToInlineData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const s = String(reader.result || '');
                    const comma = s.indexOf(',');
                    resolve({
                        mimeType: file.type || 'image/jpeg',
                        data: comma >= 0 ? s.substring(comma + 1) : s,
                    });
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        ocrRunBtn.addEventListener('click', async () => {
            if (!ocrFiles.length) return;
            ocrRunBtn.disabled = true;
            ocrPickBtn.disabled = true;
            ocrProgress.classList.add('show');

            try {
                const { firebaseApp } = await import('/js/firebase-config.js');
                const functions = getFunctions(firebaseApp, 'asia-southeast1');
                // Pro は Flash より時間がかかる（10〜60秒）ため、クライアントタイムアウトを 3 分に伸ばす
                const extractFn = httpsCallable(functions, 'extractCaaPrices', { timeout: 180000 });

                ocrProgress.textContent = `${i18next.t('admin.caa.ocrRunning')} (${ocrFiles.length} ${ocrFiles.length === 1 ? 'image' : 'images'})`;
                const images = await Promise.all(ocrFiles.map(f => fileToInlineData(f)));
                const res = await extractFn({ images });
                ocrEntries = Array.isArray(res.data?.entries) ? res.data.entries : [];

                ocrTextarea.value = JSON.stringify(ocrEntries, null, 2);
                ocrProgress.textContent = `${i18next.t('admin.caa.ocrDone')} (${ocrEntries.length} cells)`;
                ocrAutofillBtn.disabled = ocrEntries.length === 0;
            } catch (err) {
                console.error(err);
                ocrProgress.textContent = `${i18next.t('admin.caa.ocrError')}: ${err.message || err}`;
            } finally {
                ocrRunBtn.disabled = false;
                ocrPickBtn.disabled = false;
            }
        });

        // 抽出済み entries[] をセルに反映
        ocrAutofillBtn.addEventListener('click', () => {
            if (!ocrEntries.length) return;

            let filled = 0;
            const skipped = [];

            ocrEntries.forEach(entry => {
                const { province, fishType, rangeMin, rangeMax, sizeMin, sizeMax } = entry || {};
                if (!PROVINCES.includes(province) || !FISH_TYPES.includes(fishType)) {
                    skipped.push(`${province ?? '?'} × ${fishType ?? '?'}`);
                    return;
                }
                const fields = [
                    ['rangeMin', rangeMin],
                    ['rangeMax', rangeMax],
                    ['sizeMin', sizeMin],
                    ['sizeMax', sizeMax],
                ];
                fields.forEach(([field, val]) => {
                    if (val == null || isNaN(Number(val))) return;
                    const input = document.querySelector(
                        `.cell-inputs input[data-fish="${fishType}"][data-prov="${province}"][data-field="${field}"]`
                    );
                    if (input) { input.value = Number(val); filled++; }
                });
            });

            let msg = i18next.t('admin.caa.ocrAutofillDone', { count: filled });
            if (skipped.length > 0) {
                msg += `\n\n${i18next.t('admin.caa.ocrAutofillMissing')}:\n` + skipped.join(', ');
            }
            alert(msg);
        });
    </script>
</body>
</html>
