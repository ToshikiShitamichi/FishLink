<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink Admin</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .admin-shell { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
        }
        .admin-brand { font-size: 13px; color: #64748b; }
        .admin-title { font-size: 26px; font-weight: 700; color: #0f172a; margin-top: 2px; }
        .admin-subtitle { font-size: 13px; color: #475569; margin-top: 4px; }

        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-nav a {
            text-decoration: none; color: #475569; padding: 8px 14px;
            border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .admin-nav a.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .admin-nav a:hover:not(.active) { background: #f1f5f9; }

        #lang-selector {
            width: auto; font-size: 13px; padding: 6px 10px;
            border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; color: #475569;
        }

        .admin-header__right {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* ── マトリクス表 ─────────────────── */
        .matrix-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            overflow: hidden;
        }

        .matrix-scroll {
            overflow: auto;
            max-height: calc(100vh - 280px);
            min-height: 400px;
        }

        .matrix-table {
            border-collapse: separate;
            border-spacing: 0;
            min-width: 100%;
        }

        .matrix-table th,
        .matrix-table td {
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #f1f5f9;
            padding: 10px 12px;
            vertical-align: middle;
            background: #fff;
        }

        .matrix-table thead th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            color: #334155;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            z-index: 2;
            min-width: 150px;
            padding: 12px 10px;
        }

        /* 州列（左固定） */
        .matrix-table th.col-prov,
        .matrix-table td.col-prov {
            position: sticky;
            left: 0;
            background: #f8fafc;
            font-weight: 700;
            font-size: 13px;
            color: #0f172a;
            white-space: nowrap;
            z-index: 1;
            min-width: 140px;
            box-shadow: 1px 0 0 #e2e8f0;
        }
        .matrix-table thead th.col-prov {
            background: #e2e8f0;
            z-index: 3;
        }

        .matrix-table th .km-name {
            display: block;
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
            margin-top: 2px;
        }

        .cell-inputs {
            display: flex; flex-direction: column; gap: 6px;
            min-width: 170px;
            align-items: flex-start;
        }
        .cell-row {
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; color: #475569;
        }
        .cell-row input {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 12px;
            background: #fff;
            text-align: right;
            -moz-appearance: textfield;
        }
        .cell-row input::-webkit-outer-spin-button,
        .cell-row input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        .cell-row input:focus { outline: none; border-color: #0f172a; }
        .cell-row input.range-num { width: 60px; }
        .cell-row input.size-num { width: 50px; }
        .cell-row .sep { color: #94a3b8; padding: 0 1px; }
        .cell-row .unit { color: #475569; font-size: 11px; margin-left: 2px; }

        /* ゼブラ */
        .matrix-table tbody tr:nth-child(even) td { background: #fafafa; }
        .matrix-table tbody tr:nth-child(even) td.col-prov { background: #f1f5f9; }

        /* 保存バー */
        .save-bar {
            position: sticky; bottom: 0; left: 0;
            margin-top: 14px;
            background: rgba(255,255,255,.97);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 12px 18px;
            display: flex; justify-content: flex-end; align-items: center; gap: 12px;
            flex-wrap: wrap;
        }
        .save-note { font-size: 13px; color: #16a34a; opacity: 0; transition: opacity .3s; }
        .save-note.show { opacity: 1; }
        .save-err { font-size: 13px; color: #ef4444; opacity: 0; transition: opacity .3s; }
        .save-err.show { opacity: 1; }
        .save-btn {
            border: none; background: #0f172a; color: #fff;
            font-weight: 700; font-size: 14px; padding: 10px 24px;
            border-radius: 12px; cursor: pointer;
        }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading-msg {
            padding: 40px 16px; text-align: center; color: #94a3b8;
        }

        /* ── レスポンシブ ─────────────────── */
        @media (max-width: 1024px) {
            .admin-shell { padding: 20px; }
            .admin-title { font-size: 24px; }
        }
        @media (max-width: 720px) {
            .admin-shell { padding: 14px; }
            .admin-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .admin-header__right { justify-content: flex-start; }
            .admin-title { font-size: 20px; }
            .admin-subtitle { font-size: 12px; }
            .admin-nav a { padding: 7px 12px; font-size: 12px; }

            .matrix-scroll { max-height: calc(100vh - 220px); }
            .matrix-table thead th { min-width: 130px; padding: 10px 8px; }
            .matrix-table th.col-prov,
            .matrix-table td.col-prov { min-width: 110px; font-size: 12px; }
            .cell-inputs { min-width: 110px; }
            .cell-inputs input { padding: 5px 7px; font-size: 11px; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.caa.title"></div>
                <div class="admin-subtitle" data-i18n="admin.caa.subtitle"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/settings.html" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/caa.html" class="active" data-i18n="admin.navCaa"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option><option value="en">EN</option><option value="ja">JA</option>
                </select>
            </div>
        </div>

        <div class="matrix-card">
            <div class="matrix-scroll">
                <table class="matrix-table">
                    <thead>
                        <tr id="matrix-header"></tr>
                    </thead>
                    <tbody id="matrix-body">
                        <tr><td class="loading-msg" colspan="11" data-i18n="admin.caa.loadingData"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="save-bar">
            <span class="save-note" id="save-note" data-i18n="admin.caa.saved"></span>
            <span class="save-err" id="save-err" data-i18n="admin.settings.errorSave"></span>
            <button class="save-btn" id="save-btn" data-i18n="admin.caa.save"></button>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            doc, getDoc, setDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        // CAA公開資料の並び順（画像と同じ）
        const FISH_TYPES = [
            'striped_snakehead', 'walking_catfish', 'red_tilapia', 'nile_tilapia',
            'silver_barb', 'spot_pangasius', 'pangasius', 'giant_snakehead',
            'climbing_perch', 'frog'
        ];
        const PROVINCES = [
            'Kandal', 'Takeo', 'Prey Veng', 'Kg. Cham', 'Kg. Thom',
            'Siemreap', 'Battambang', 'Pursat', 'Kg. Chhnang', 'BMC'
        ];

        // 旧形式（{range, size} 文字列）→ 新形式（数値4フィールド）への変換
        function normalizeEntry(e) {
            if (!e) return null;
            if ('rangeMin' in e || 'sizeMin' in e) return e;  // 既に新形式
            // 旧形式パース
            const result = { rangeMin: '', rangeMax: '', sizeMin: '', sizeMax: '' };
            if (typeof e.range === 'string') {
                const parts = e.range.replace(/[,\s]/g, '').split(/[-–]/).map(parseFloat);
                if (!isNaN(parts[0])) result.rangeMin = parts[0];
                if (!isNaN(parts[1])) result.rangeMax = parts[1];
            }
            if (typeof e.size === 'string') {
                const cleaned = e.size.replace(/kg/gi, '').trim();
                const parts = cleaned.split(/[-–]/).map(parseFloat);
                if (!isNaN(parts[0])) result.sizeMin = parts[0];
                if (!isNaN(parts[1])) result.sizeMax = parts[1];
            }
            return result;
        }

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        let allData = {}; // { fishType: { provinceName: { range, size } } }

        waitForUserData(async () => {
            if (window.currentUserData?.role !== 'admin') {
                alert('Admin access required');
                location.href = '/index.html';
                return;
            }
            loading.classList.add('show');
            try {
                await Promise.all(FISH_TYPES.map(async ft => {
                    const snap = await getDoc(doc(db, 'caaPrice', ft));
                    allData[ft] = snap.exists() ? snap.data() : {};
                }));
                render();
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show');
            }
        });

        function render() {
            // ヘッダー：州列 + 魚種10列
            const header = document.getElementById('matrix-header');
            header.innerHTML = `<th class="col-prov">${i18next.t('admin.caa.colProvince')}</th>`
                + FISH_TYPES.map(ft => {
                    const ja = i18next.t(`fish.${ft}`, { lng: 'ja' }) || ft;
                    const label = i18next.exists(`fish.${ft}`) ? i18next.t(`fish.${ft}`) : ft;
                    return `<th>${label}</th>`;
                }).join('');

            // ボディ：各州につき1行、10魚種分のセル
            const body = document.getElementById('matrix-body');
            body.innerHTML = PROVINCES.map(p => {
                const cells = FISH_TYPES.map(ft => {
                    const entry = normalizeEntry(allData[ft]?.[p]) || {};
                    const v = (k) => (entry[k] === 0 || entry[k] ? entry[k] : '');
                    return `
                        <td>
                            <div class="cell-inputs">
                                <div class="cell-row">
                                    <input type="number" class="range-num" step="1" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="rangeMin"
                                        value="${v('rangeMin')}">
                                    <span class="sep">–</span>
                                    <input type="number" class="range-num" step="1" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="rangeMax"
                                        value="${v('rangeMax')}">
                                </div>
                                <div class="cell-row">
                                    <input type="number" class="size-num" step="0.01" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="sizeMin"
                                        value="${v('sizeMin')}">
                                    <span class="sep">–</span>
                                    <input type="number" class="size-num" step="0.01" min="0"
                                        data-fish="${ft}" data-prov="${p}" data-field="sizeMax"
                                        value="${v('sizeMax')}">
                                    <span class="unit">kg</span>
                                </div>
                            </div>
                        </td>
                    `;
                }).join('');
                return `<tr><td class="col-prov">${p}</td>${cells}</tr>`;
            }).join('');
        }

        // ── 一括保存 ─────────────────────────────
        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            const note = document.getElementById('save-note');
            const err = document.getElementById('save-err');
            note.classList.remove('show');
            err.classList.remove('show');
            btn.disabled = true;
            loading.classList.add('show');

            // 入力値を魚種 → 州 → {rangeMin, rangeMax, sizeMin, sizeMax} に集約
            const payloads = {};
            FISH_TYPES.forEach(ft => { payloads[ft] = {}; });

            document.querySelectorAll('.cell-inputs input').forEach(inp => {
                const { fish, prov, field } = inp.dataset;
                if (!payloads[fish][prov]) {
                    payloads[fish][prov] = { rangeMin: null, rangeMax: null, sizeMin: null, sizeMax: null };
                }
                const v = inp.value.trim();
                payloads[fish][prov][field] = v === '' ? null : Number(v);
            });

            // 全フィールドが空の州エントリは削除（= データなし）
            FISH_TYPES.forEach(ft => {
                Object.keys(payloads[ft]).forEach(p => {
                    const e = payloads[ft][p];
                    if (e.rangeMin == null && e.rangeMax == null
                        && e.sizeMin == null && e.sizeMax == null) {
                        delete payloads[ft][p];
                    }
                });
            });

            try {
                await Promise.all(FISH_TYPES.map(ft =>
                    setDoc(doc(db, 'caaPrice', ft), payloads[ft], { merge: false })
                ));
                // 保存後のデータをメモリにも反映
                allData = payloads;
                note.classList.add('show');
                setTimeout(() => note.classList.remove('show'), 2000);
            } catch (e) {
                console.error(e);
                err.classList.add('show');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        });

        onLanguageChange(() => {
            if (Object.keys(allData).length > 0) render();
        });
    </script>
</body>
</html>
