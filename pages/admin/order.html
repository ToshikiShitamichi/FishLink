<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink Admin</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .admin-shell { max-width: 1280px; margin: 0 auto; padding: 24px; padding-bottom: 120px; }

        /* 詳細セクション群は最大1100pxに抑えて読みやすく */
        .order-content { max-width: 1100px; margin: 0 auto; }

        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
        }
        .admin-brand { font-size: 13px; color: #64748b; }
        .admin-title { font-size: 26px; font-weight: 700; color: #0f172a; margin-top: 2px; }
        .admin-subtitle { font-size: 13px; color: #475569; margin-top: 4px; }

        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-nav a {
            text-decoration: none; color: #475569; padding: 8px 14px;
            border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600;
        }
        .admin-nav a.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .admin-nav a:hover:not(.active) { background: #f1f5f9; }

        #lang-selector {
            width: auto; font-size: 13px; padding: 6px 10px;
            border: 1px solid #e2e8f0; border-radius: 20px; background: #fff; color: #475569;
        }

        .status-chip {
            display: inline-block; padding: 4px 12px; border-radius: 999px;
            font-size: 13px; font-weight: 600;
        }
        .chip-amber { background: #fef3c7; color: #854d0e; }
        .chip-emerald { background: #d1fae5; color: #065f46; }
        .chip-teal { background: #ccfbf1; color: #0f766e; }
        .chip-slate { background: #0f172a; color: #fff; }
        .chip-violet { background: #ede9fe; color: #6d28d9; }
        .chip-blue { background: #dbeafe; color: #1e40af; }

        .pill {
            display: inline-block; padding: 4px 12px; border-radius: 999px;
            font-size: 12px; background: #fff; border: 1px solid #e2e8f0; color: #475569;
        }

        .summary-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .summary-card {
            background: #fff; border-radius: 16px; border: 1px solid #e2e8f0;
            padding: 16px 18px;
        }
        .summary-card__label { font-size: 12px; color: #64748b; }
        .summary-card__value { font-size: 22px; font-weight: 700; color: #0f172a; margin-top: 4px; }
        .summary-card__desc { font-size: 12px; color: #64748b; margin-top: 6px; }

        .section {
            background: #fff; border-radius: 20px; border: 1px solid #e2e8f0;
            padding: 20px; margin-bottom: 16px;
        }
        .section__head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; gap: 12px;
        }
        .section__title { font-size: 17px; font-weight: 700; color: #0f172a; }

        .section-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }

        .sub-card {
            background: #f8fafc; border-radius: 14px; padding: 14px 16px;
        }
        .sub-card__label { font-size: 12px; color: #64748b; margin-bottom: 10px; }

        .kv-row {
            display: flex; justify-content: space-between; gap: 12px;
            padding: 5px 0; font-size: 13px;
        }
        .kv-row__k { color: #64748b; }
        .kv-row__v { color: #0f172a; font-weight: 500; }
        .kv-row__v.bold { font-weight: 700; }
        .kv-row__v.minus { color: #ef4444; }
        /* 6/7 #135: 紹介クーポン／ボーナスは amber（金額の足し算を合わせる行） */
        .kv-row__v.amber { color: #b36a00; }

        .divider-dashed {
            border-top: 1px dashed #cbd5e1; margin: 8px 0;
        }

        .primary-btn {
            width: 100%; border: none; border-radius: 14px;
            background: #0f172a; color: #fff; font-weight: 600;
            font-size: 14px; padding: 12px; cursor: pointer; margin-top: 14px;
        }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .secondary-btn {
            width: 100%; border: 1px solid #cbd5e1; border-radius: 14px;
            background: #fff; color: #334155; font-weight: 600;
            font-size: 14px; padding: 12px; cursor: pointer; margin-top: 14px;
        }
        .secondary-btn:hover { background: #f1f5f9; }
        .secondary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .qr-preview {
            display: flex; align-items: center; justify-content: center;
            background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
            padding: 12px; margin-top: 8px;
            min-height: 140px;
        }
        .qr-preview img { max-width: 180px; width: 100%; height: auto; }
        .qr-preview__empty { color: #94a3b8; font-size: 12px; }

        textarea.memo-area {
            width: 100%; border: 1px solid #cbd5e1; border-radius: 14px;
            padding: 12px 14px; font-family: inherit; font-size: 13px;
            resize: vertical; min-height: 120px;
            background: #f8fafc;
        }

        .memo-save-row {
            display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px;
            align-items: center;
        }
        .memo-save-row__note { font-size: 12px; color: #16a34a; opacity: 0; transition: opacity .3s; }
        .memo-save-row__note.show { opacity: 1; }

        .finalize-bar {
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            max-width: 1024px; margin: 0 auto;
            background: rgba(255,255,255,.95); backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0; border-radius: 20px;
            box-shadow: 0 8px 24px rgba(15,23,42,.08);
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 16px; flex-wrap: wrap;
        }
        .finalize-bar__text__title { font-weight: 700; color: #0f172a; }
        .finalize-bar__text__desc { font-size: 12px; color: #475569; margin-top: 2px; }
        .finalize-bar__btn {
            border: none; border-radius: 14px;
            background: #059669; color: #fff; font-weight: 700;
            font-size: 15px; padding: 12px 22px; cursor: pointer;
        }
        .finalize-bar__btn:disabled { opacity: 0.45; cursor: not-allowed; background: #94a3b8; }

        .external-link {
            word-break: break-all; font-size: 12px; color: #0284c7;
            text-decoration: none; display: block; margin-top: 8px;
        }

        /* 6/5 #129 ⑥: 入金控え／送金控え（証拠を残す）＋金額コピー＋保留通知 */
        .proof-block { margin-top: 14px; border-top: 1px dashed #cbd5e1; padding-top: 12px; }
        .proof-label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        .proof-input {
            width: 100%; border: 1px solid #cbd5e1; border-radius: 10px;
            padding: 9px 11px; font-size: 13px; font-family: inherit; margin-bottom: 8px;
            background: #fff; box-sizing: border-box;
        }
        .proof-memo {
            width: 100%; border: 1px solid #cbd5e1; border-radius: 10px;
            padding: 9px 11px; font-size: 13px; font-family: inherit;
            min-height: 56px; resize: vertical; background: #fff; box-sizing: border-box;
        }
        .proof-attach-row { display: flex; gap: 10px; align-items: center; margin-top: 9px; }
        .attach-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600; color: #0b5fb0;
            border: 1px dashed #9cc2e6; border-radius: 10px; padding: 8px 12px;
            background: #f4f9fe; cursor: pointer;
        }
        .attach-btn .material-symbols-outlined { font-size: 18px; }
        .proof-thumb img { width: 56px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid #cbd5e1; display: block; }
        .copy-remit-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 600; color: #0b5fb0;
            border: 1px solid #bfdbfe; background: #eff6ff; border-radius: 10px;
            padding: 8px 12px; margin-top: 10px; cursor: pointer; font-family: inherit;
        }
        .copy-remit-btn .material-symbols-outlined { font-size: 18px; }
        .hold-notice {
            display: flex; gap: 9px; align-items: flex-start;
            background: #fef3c7; border: 1px solid #fde68a; border-radius: 14px;
            padding: 12px 14px; margin-bottom: 14px;
        }
        .hold-notice .material-symbols-outlined { color: #b45309; }
        .hold-notice__t { font-size: 13px; font-weight: 700; color: #854d0e; }
        .hold-notice__s { font-size: 12px; color: #92700e; margin-top: 2px; }
        .hold-notice__release {
            margin-left: auto; align-self: center; white-space: nowrap;
            border: 1px solid #cbd5e1; background: #fff; color: #334155;
            border-radius: 10px; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
        }

        .admin-header__right {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            justify-content: flex-end;
        }
        .admin-nav a { white-space: nowrap; }

        /* 7/10 #204: 案B 入金照合（買い手の控え・照合ガイド・2択アクション・未確認ストリップ・確認モーダル） */
        .buyer-proof {
            border: 1px solid #e3e8ee; border-radius: 12px; padding: 12px;
            margin-top: 14px; margin-bottom: 12px; background: #f7fafe;
        }
        .buyer-proof.none { background: #fafbfc; }
        .buyer-proof__label {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; color: #0b5fb0; margin-bottom: 8px;
        }
        .buyer-proof__label .material-symbols-outlined { font-size: 18px; }
        .buyer-proof__img { display: inline-block; }
        .buyer-proof__img img {
            width: 150px; max-width: 100%; height: auto; border-radius: 9px;
            border: 1px solid #dce4ec; display: block; cursor: zoom-in;
        }
        .buyer-proof__none {
            font-size: 12.5px; color: #9aa3b0; text-align: center; padding: 12px 0; line-height: 1.6;
        }
        .match-hint {
            font-size: 12px; color: #5a6470; line-height: 1.6;
            background: #f7f9fb; border: 1px solid #eef1f4; border-radius: 10px;
            padding: 10px 12px; margin-bottom: 12px;
        }
        .btn-sub { font-size: 11px; color: #64748b; text-align: center; margin-top: 4px; line-height: 1.5; }
        .unconfirm-btn {
            width: 100%; border: 1.5px solid #f0c97a; border-radius: 14px;
            background: #fff7e6; color: #b36a00; font-weight: 600;
            font-size: 14px; padding: 12px; cursor: pointer; margin-top: 12px;
            font-family: inherit;
        }
        .unconfirm-btn:hover { background: #fdefd4; }
        .unconfirmed-strip {
            background: #fff7e6; border: 1px solid #f0c97a; border-radius: 12px;
            padding: 12px 14px; margin-top: 14px; margin-bottom: 4px;
        }
        .unconfirmed-strip__t {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 700; color: #b36a00;
        }
        .unconfirmed-strip__t .material-symbols-outlined { font-size: 18px; }
        .unconfirmed-strip__r { font-size: 12px; color: #7a5a20; margin-top: 5px; line-height: 1.5; word-break: break-word; }

        /* お支払い未確認 確認モーダル（中央） */
        .uc-modal-ov {
            position: fixed; inset: 0; background: rgba(15,23,42,.5);
            display: none; align-items: center; justify-content: center;
            padding: 20px; z-index: 1200;
        }
        .uc-modal {
            width: 100%; max-width: 440px; background: #fff;
            border: 1px solid #f0c97a; border-radius: 16px;
            padding: 20px 22px; box-shadow: 0 10px 30px rgba(0,0,0,.15);
        }
        .uc-modal__title { font-size: 16px; font-weight: 800; color: #b36a00; margin-bottom: 8px; }
        .uc-modal__body { font-size: 12.5px; color: #5a6470; line-height: 1.6; margin-bottom: 14px; }
        .uc-modal__flabel { font-size: 12px; font-weight: 700; color: #1a2330; margin-bottom: 6px; }
        .uc-modal__flabel .uc-req { color: #e5453f; margin-left: 4px; }
        .uc-modal__ta {
            width: 100%; border: 1px solid #dce4ec; border-radius: 10px;
            padding: 10px 12px; font-size: 12.5px; font-family: inherit;
            min-height: 64px; resize: vertical; box-sizing: border-box;
        }
        .uc-modal__ta.uc-err { border-color: #e5453f; }
        .uc-modal__err { font-size: 12px; color: #e5453f; margin-top: 6px; }
        .uc-modal__actions { display: flex; gap: 10px; margin-top: 14px; }
        .uc-modal__actions button {
            flex: 1; border-radius: 10px; padding: 12px; font-size: 13.5px;
            font-weight: 700; cursor: pointer; font-family: inherit; border: none;
        }
        .uc-btn--cancel { background: #eef1f4; color: #5a6470; }
        .uc-btn--ok { background: #b36a00; color: #fff; }

        /* ── タブレット ── */
        @media (max-width: 1024px) {
            .admin-shell { padding: 20px; padding-bottom: 140px; }
            .admin-title { font-size: 24px; }
            .section-grid { grid-template-columns: 1fr; }
        }

        /* ── モバイル ── */
        @media (max-width: 720px) {
            .admin-shell { padding: 14px; padding-bottom: 160px; }
            .admin-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .admin-header__right { justify-content: flex-start; }
            .admin-title { font-size: 20px; }
            .admin-subtitle { font-size: 12px; }
            .admin-nav a { padding: 7px 12px; font-size: 12px; }

            .summary-grid { grid-template-columns: 1fr; gap: 10px; }
            .summary-card__value { font-size: 18px; }

            .section { padding: 16px; }
            .section__title { font-size: 15px; }

            .sub-card { padding: 12px 14px; }

            .finalize-bar {
                left: 10px; right: 10px; bottom: 10px; padding: 12px 14px;
                flex-direction: column; align-items: stretch; gap: 8px;
            }
            .finalize-bar__btn { width: 100%; padding: 12px; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div style="margin-bottom:6px;">
                    <a href="/pages/admin/index.html" style="display:inline-flex; align-items:center; gap:4px; color:#475569; text-decoration:none; font-size:13px; font-weight:600;">
                        <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>
                        <span data-i18n="admin.order.backToList"></span>
                    </a>
                </div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.order.title"></div>
                <div class="admin-subtitle" data-i18n="admin.order.subtitle"></div>
                <div id="order-no-display" style="font-family:monospace; font-size:13px; color:#475569; margin-top:6px;"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" class="active" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/users.html" data-i18n="admin.navUsers"></a>
                    <a href="/pages/admin/settings.html" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/referral.html" data-i18n="admin.navReferral"></a>
                    <a href="/pages/admin/caa.html" data-i18n="admin.navCaa"></a>
                    <a href="/pages/admin/reports.html" data-i18n="admin.navReports"></a>
                    <a href="/pages/admin/faq.html" data-i18n="admin.navFaq"></a>
                    <a href="/pages/admin/legal.html" data-i18n="admin.navLegal"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
                </select>
            </div>
        </div>

        <div class="order-content">
        <!-- 上部ステータス -->
        <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
            <span id="top-status-chip" class="status-chip chip-amber"></span>
            <span id="top-date-pill" class="pill"></span>
        </div>

        <!-- 6/5 #129 ④/§8: 問題報告で農家送金を保留中 -->
        <div class="hold-notice" id="hold-notice" style="display:none;">
            <span class="material-symbols-outlined">report</span>
            <div>
                <div class="hold-notice__t" data-i18n="admin.order.holdTitle"></div>
                <div class="hold-notice__s" data-i18n="admin.order.holdDesc"></div>
            </div>
            <button class="hold-notice__release" id="release-hold-btn" data-i18n="admin.order.releaseHold"></button>
        </div>

        <!-- サマリー3カード -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="admin.order.currentStatus"></div>
                <div class="summary-card__value" id="summary-status"></div>
                <div class="summary-card__desc" id="summary-next-step"></div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="admin.order.restaurantPay"></div>
                <div class="summary-card__value" id="summary-pay">0 KHR</div>
                <div class="summary-card__desc" data-i18n="admin.order.includesNote"></div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="admin.order.farmerRemit"></div>
                <div class="summary-card__value" id="summary-remit">0 KHR</div>
                <div class="summary-card__desc" data-i18n="admin.order.afterFeeNote"></div>
            </div>
        </div>

        <!-- 注文情報 -->
        <section class="section">
            <div class="section__head">
                <div class="section__title" data-i18n="admin.order.orderInfoTitle"></div>
                <span class="pill" data-i18n="admin.order.orderInfoBadge"></span>
            </div>
            <div class="section-grid">
                <div class="sub-card">
                    <div class="sub-card__label" data-i18n="admin.order.basicInfo"></div>
                    <div id="basic-info"></div>
                </div>
                <div class="sub-card">
                    <div class="sub-card__label" data-i18n="admin.order.deliveryCondition"></div>
                    <div id="delivery-info"></div>
                </div>
            </div>
        </section>

        <!-- レストラン入金確認 -->
        <section class="section">
            <div class="section__head">
                <div class="section__title" data-i18n="admin.order.paymentCheckTitle"></div>
                <span class="pill" style="background:#fef3c7; color:#854d0e; border-color:#fde68a;" data-i18n="admin.order.paymentCheckBadge"></span>
            </div>
            <div class="section-grid">
                <div class="sub-card">
                    <div class="sub-card__label" data-i18n="admin.order.payPreview"></div>
                    <div id="pay-breakdown"></div>
                </div>
                <div class="sub-card">
                    <div class="sub-card__label" data-i18n="admin.order.paymentInfo"></div>
                    <div id="payment-info"></div>

                    <!-- 7/10 #204: お支払い未確認ストリップ（前払い・paymentUnconfirmed 時のみ表示） -->
                    <div class="unconfirmed-strip" id="unconfirmed-strip" style="display:none;">
                        <div class="unconfirmed-strip__t">
                            <span class="material-symbols-outlined">warning</span>
                            <span data-i18n="admin.order.unconfirmedStatusTitle"></span>
                        </div>
                        <div class="unconfirmed-strip__r">
                            <span data-i18n="admin.order.unconfirmedReasonPrefix"></span>
                            <span id="unconfirmed-reason"></span>
                        </div>
                    </div>

                    <!-- 7/10 #204: 買い手が添付した支払い控え（前払いのみ） -->
                    <div class="buyer-proof" id="buyer-proof-block" style="display:none;">
                        <div class="buyer-proof__label">
                            <span class="material-symbols-outlined">attach_file</span>
                            <span data-i18n="admin.order.buyerProofLabel"></span>
                        </div>
                        <div id="buyer-proof-body"></div>
                    </div>

                    <!-- 7/10 #204: 照合ガイド（前払いのみ・控えの有無で出し分け） -->
                    <div class="match-hint" id="match-hint" style="display:none;"></div>

                    <!-- 入金確認済にする（青・前払い/旧 共通） -->
                    <button class="primary-btn" id="confirm-payment-btn" data-i18n="admin.order.markPaymentConfirmed"></button>
                    <div class="btn-sub" id="confirm-payment-sub" data-i18n="admin.order.markPaymentConfirmedSub"></div>

                    <!-- 7/10 #204: お支払い未確認にする（amber・前払いのみ） -->
                    <button class="unconfirm-btn" id="unconfirm-payment-btn" style="display:none;" data-i18n="admin.order.markPaymentUnconfirmed"></button>
                    <div class="btn-sub" id="unconfirm-payment-sub" style="display:none;" data-i18n="admin.order.markPaymentUnconfirmedSub"></div>

                    <!-- 6/5 #129 ⑥: 入金控え（入金スクショ＋メモ＋振込元名義）＝証拠を毎回残す -->
                    <div class="proof-block">
                        <div class="proof-label" data-i18n="admin.order.depositProofLabel"></div>
                        <input class="proof-input" id="payer-name-input" data-i18n="[placeholder]admin.order.payerNamePlaceholder">
                        <textarea class="proof-memo" id="deposit-memo" data-i18n="[placeholder]admin.order.depositMemoPlaceholder"></textarea>
                        <div class="proof-attach-row">
                            <label class="attach-btn">
                                <span class="material-symbols-outlined">attach_file</span>
                                <span data-i18n="admin.order.attachDepositProof"></span>
                                <input type="file" accept="image/*" id="deposit-proof-file" hidden>
                            </label>
                            <a class="proof-thumb" id="deposit-proof-thumb" style="display:none;" target="_blank" rel="noopener"></a>
                        </div>
                        <div class="memo-save-row">
                            <span class="memo-save-row__note" id="deposit-saved" data-i18n="admin.order.memoSaved"></span>
                            <button style="border:1px solid #cbd5e1; background:#fff; color:#334155; font-weight:600; font-size:13px; padding:8px 16px; border-radius:10px; cursor:pointer;" id="save-deposit-btn" data-i18n="admin.order.saveMemo"></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 農家送金 -->
        <section class="section">
            <div class="section__head">
                <div class="section__title" data-i18n="admin.order.remittanceTitle"></div>
                <span class="pill" style="background:#d1fae5; color:#065f46; border-color:#a7f3d0;" data-i18n="admin.order.remittanceBadge"></span>
            </div>
            <div class="section-grid">
                <div class="sub-card">
                    <div class="sub-card__label" data-i18n="admin.order.remitPreview"></div>
                    <div id="remit-breakdown"></div>
                    <!-- 6/5 #129 ⑥: 送金額をコピー（銀行アプリに正確な額を入力） -->
                    <button class="copy-remit-btn" id="copy-remit-btn">
                        <span class="material-symbols-outlined">content_copy</span>
                        <span data-i18n="admin.order.copyRemitAmount"></span>
                    </button>
                </div>
                <div class="sub-card">
                    <div class="sub-card__label" data-i18n="admin.order.remitTarget"></div>
                    <div id="remit-target"></div>
                    <button class="secondary-btn" id="mark-remit-btn" data-i18n="admin.order.markRemitted"></button>
                    <!-- 6/5 #129 ⑥: 送金控え（送金スクショを添付）＝証拠 -->
                    <div class="proof-block">
                        <div class="proof-label" data-i18n="admin.order.remitProofLabel"></div>
                        <div class="proof-attach-row">
                            <label class="attach-btn">
                                <span class="material-symbols-outlined">attach_file</span>
                                <span data-i18n="admin.order.attachRemitProof"></span>
                                <input type="file" accept="image/*" id="remit-proof-file" hidden>
                            </label>
                            <a class="proof-thumb" id="remit-proof-thumb" style="display:none;" target="_blank" rel="noopener"></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 内部メモ -->
        <section class="section">
            <div class="section__head">
                <div class="section__title" data-i18n="admin.order.memoTitle"></div>
                <span class="pill" data-i18n="admin.order.memoBadge"></span>
            </div>
            <textarea class="memo-area" id="admin-memo" data-i18n="[placeholder]admin.order.memoPlaceholder"></textarea>
            <div class="memo-save-row">
                <span class="memo-save-row__note" id="memo-saved" data-i18n="admin.order.memoSaved"></span>
                <button style="border:1px solid #cbd5e1; background:#fff; color:#334155; font-weight:600; font-size:13px; padding:8px 16px; border-radius:10px; cursor:pointer;" id="save-memo-btn" data-i18n="admin.order.saveMemo"></button>
            </div>
        </section>
        </div>
    </div>

    <!-- 固定フッター -->
    <div class="finalize-bar">
        <div class="finalize-bar__text">
            <div class="finalize-bar__text__title" data-i18n="admin.order.finalTitle"></div>
            <div class="finalize-bar__text__desc" data-i18n="admin.order.finalDesc"></div>
        </div>
        <button class="finalize-bar__btn" id="done-btn" data-i18n="admin.order.markDone"></button>
    </div>

    <!-- 7/10 #204: お支払い未確認 確認モーダル（理由メモ必須・中央） -->
    <div class="uc-modal-ov" id="unconfirm-modal">
        <div class="uc-modal">
            <div class="uc-modal__title" data-i18n="admin.order.unconfirmModalTitle"></div>
            <div class="uc-modal__body" data-i18n="admin.order.unconfirmModalBody"></div>
            <div class="uc-modal__flabel">
                <span data-i18n="admin.order.unconfirmReasonLabel"></span>
                <span class="uc-req" data-i18n="admin.order.unconfirmReasonRequired"></span>
            </div>
            <textarea class="uc-modal__ta" id="unconfirm-reason-input" data-i18n="[placeholder]admin.order.unconfirmReasonPlaceholder"></textarea>
            <div class="uc-modal__err" id="unconfirm-reason-err" data-i18n="admin.order.unconfirmReasonEmpty" style="display:none;"></div>
            <div class="uc-modal__actions">
                <button class="uc-btn--cancel" id="unconfirm-cancel-btn" data-i18n="admin.order.unconfirmModalCancel"></button>
                <button class="uc-btn--ok" id="unconfirm-ok-btn" data-i18n="admin.order.unconfirmModalOk"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import { initAdminReportBadge } from '/js/admin-report-badge.js';
        import {
            doc, getDoc, updateDoc, onSnapshot, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 6/5 #129 ⑥: 入金/送金スクショの添付（証拠）
        import { ref } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { uploadImageResized } from '/js/image-resize.js';
        // 5/23 #69 Phase F: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initAdminReportBadge();

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        const params = new URLSearchParams(location.search);
        const orderId = params.get('id');
        if (!orderId) location.href = '/pages/admin/index.html';

        let orderData = null;
        let farmerData = null;
        let restData = null;
        let listingData = null;
        let lastRemitAmount = 0; // 6/5 #129 ⑥: コピー用に保持

        // 2026-07-17 #210③: 桁区切りは必ず 'en-US' を明示する。
        //   ロケール引数なしの toLocaleString() は端末の既定ロケールに従うため、
        //   区切りが「.」になる端末（de-DE/id-ID/vi-VN 等）で「41.000 KHR」のように化ける。
        //   アプリの言語設定とは無関係に端末次第で化けるので、金額表示はこのページ内すべて 'en-US' に統一
        //   （買い手カート cart.html・js/reel-ui.js が既に 'en-US' 固定＝そちらが正）。
        //   ⚠ 入金照合・送金額のコピーで運営が読む数字なので、桁区切りのブレは特に危険。
        const KHR_LOCALE = 'en-US';

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元（onSnapshot 初回到達で上書きされる）
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`admin_order:${orderId}`);
            if (cached) {
                const setIfHtml = (id, html) => { const el = document.getElementById(id); if (el && html) el.innerHTML = html; };
                const setIfText = (id, txt) => { const el = document.getElementById(id); if (el && txt) el.textContent = txt; };
                setIfText('order-no-display', cached.orderNo);
                setIfText('top-date-pill', cached.topDate);
                setIfText('summary-status', cached.summaryStatus);
                setIfText('summary-next-step', cached.nextStep);
                setIfText('summary-pay', cached.summaryPay);
                setIfText('summary-remit', cached.summaryRemit);
                setIfHtml('basic-info', cached.basicInfoHtml);
                setIfHtml('delivery-info', cached.deliveryInfoHtml);
                setIfHtml('pay-breakdown', cached.payBreakdownHtml);
                setIfHtml('payment-info', cached.paymentInfoHtml);
                setIfHtml('remit-breakdown', cached.remitBreakdownHtml);
                if (cached.statusChipText) {
                    const chip = document.getElementById('top-status-chip');
                    if (chip) {
                        chip.textContent = cached.statusChipText;
                        if (cached.statusChipClass) chip.className = cached.statusChipClass;
                    }
                }
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { /* ignore */ }

        waitForUserData(async () => {
            if (window.currentUserData?.role !== 'admin') {
                alert('Admin access required');
                location.href = '/index.html';
                return;
            }
            if (!cachedRendered) loading.classList.add('show');
            try {
                // リアルタイム購読
                onSnapshot(doc(db, 'orders', orderId), async (snap) => {
                    if (!snap.exists()) { location.href = '/pages/admin/index.html'; return; }
                    orderData = snap.data();

                    // 初回のみ関連データ取得
                    if (!farmerData && orderData.farmerId) {
                        const f = await getDoc(doc(db, 'users', orderData.farmerId));
                        farmerData = f.data() || {};
                    }
                    if (!restData && orderData.restaurantId) {
                        const r = await getDoc(doc(db, 'users', orderData.restaurantId));
                        restData = r.data() || {};
                    }
                    if (!listingData && orderData.listingId) {
                        const l = await getDoc(doc(db, 'fishListings', orderData.listingId));
                        listingData = l.data() || {};
                    }

                    // 取引番号表示
                    const orderNo = orderData.orderNumber || `FL-${orderId.slice(0, 8).toUpperCase()}`;
                    document.getElementById('order-no-display').textContent = orderNo;

                    render();
                    loading.classList.remove('show'); document.body.classList.add('app-ready');
                });
            } catch (err) {
                console.error(err);
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        function adminDisplayKey() {
            if (orderData.adminStatus === 'done') return 'done';
            if (orderData.adminStatus === 'remitted') return 'remitted';
            if (orderData.adminStatus === 'payment_confirmed') return 'paymentConfirmed';
            // 4/28: 旧 delivered は completed として扱う
            if (orderData.status === 'completed' || orderData.status === 'delivered') return 'completed';
            if (orderData.status === 'delivering') return 'delivering';
            if (orderData.status === 'preparing') return 'preparing';
            if (orderData.status === 'approved') return 'approved';
            if (orderData.status === 'declined') return 'declined';
            return 'pending';
        }

        function chipClass(key) {
            const map = {
                done: 'chip-slate',
                remitted: 'chip-teal',
                paymentConfirmed: 'chip-emerald',
                completed: 'chip-amber',
                delivered: 'chip-violet',
                delivering: 'chip-blue',
                preparing: 'chip-blue',
                approved: 'chip-blue',
                pending: 'chip-amber',
                declined: 'chip-amber',
            };
            return map[key] || 'chip-amber';
        }

        function render() {
            const key = adminDisplayKey();
            const label = i18next.t(`admin.tx.status${cap(key)}`) || key;
            const chip = document.getElementById('top-status-chip');
            chip.className = `status-chip ${chipClass(key)}`;
            chip.textContent = label;

            // 注文日時
            const created = orderData.createdAt?.toDate ? orderData.createdAt.toDate() : null;
            document.getElementById('top-date-pill').textContent = created ? formatDate(created) : '';

            document.getElementById('summary-status').textContent = label;

            // 次の操作
            let nextStepKey = 'stepAllDone';
            if (orderData.status !== 'completed') {
                nextStepKey = ''; // 受取完了前は「操作なし」
            } else if (!orderData.adminStatus) {
                nextStepKey = 'stepNoPayment';
            } else if (orderData.adminStatus === 'payment_confirmed') {
                nextStepKey = 'stepNoRemit';
            } else if (orderData.adminStatus === 'remitted') {
                nextStepKey = 'stepNoDone';
            } else {
                nextStepKey = 'stepAllDone';
            }
            document.getElementById('summary-next-step').textContent = nextStepKey ? `${i18next.t('admin.order.nextStep')}: ${i18next.t(`admin.order.${nextStepKey}`)}` : '';

            // 金額
            const total = orderData.totalAmount || 0;
            document.getElementById('summary-pay').textContent = `${total.toLocaleString(KHR_LOCALE)} KHR`;

            const fishPrice = orderData.fishPrice || 0;
            const deliveryFee = orderData.deliveryFee || 0;
            // 注文時点の手数料を優先（旧注文は5%でフォールバック）
            const commission = (orderData.farmerCommission != null)
                ? orderData.farmerCommission
                : Math.round(fishPrice * 0.05);
            const commissionRate = (orderData.farmerRateUsed != null)
                ? (orderData.farmerRateUsed * 100)
                : 5;
            const remitAmount = (orderData.farmerReceiveAmount != null)
                ? orderData.farmerReceiveAmount
                : (fishPrice - commission + deliveryFee);
            lastRemitAmount = remitAmount;
            document.getElementById('summary-remit').textContent = `${remitAmount.toLocaleString(KHR_LOCALE)} KHR`;

            // 注文情報（スナップショット優先）
            const fishTypeKey = orderData.snapFishType || listingData?.fishType;
            const fishName = fishTypeKey
                ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey)
                : '-';
            const fishSize = orderData.snapSize || listingData?.size || '-';

            document.getElementById('basic-info').innerHTML = `
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.restaurantName')}</span><span class="kv-row__v">${restData?.displayName || '-'}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.farmerName')}</span><span class="kv-row__v">${farmerData?.displayName || '-'}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.fishType')}</span><span class="kv-row__v">${fishName}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.fishSize')}</span><span class="kv-row__v">${fishSize} head/kg</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.qty')}</span><span class="kv-row__v">${orderData.quantity || 0} kg</span></div>
            `;

            document.getElementById('delivery-info').innerHTML = `
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.deliveryDate')}</span><span class="kv-row__v">${orderData.deliveryDate || '-'}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.deliveryTime')}</span><span class="kv-row__v">${orderData.deliveryTime || '-'}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.gutProcessing')}</span><span class="kv-row__v">${orderData.gutProcessing ? i18next.t('admin.order.gutYes') : i18next.t('admin.order.gutNo')}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.status')}</span><span class="kv-row__v">${label}</span></div>
            `;

            // 支払内訳
            const campaign = orderData.campaignDiscount || 0;
            const serviceFee = orderData.serviceFee || 0;
            let payHtml = `
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.fishPrice')}</span><span class="kv-row__v">${fishPrice.toLocaleString(KHR_LOCALE)} KHR</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.deliveryFee')}</span><span class="kv-row__v">${deliveryFee.toLocaleString(KHR_LOCALE)} KHR</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.serviceFee')}</span><span class="kv-row__v">${serviceFee.toLocaleString(KHR_LOCALE)} KHR</span></div>
            `;
            if (campaign > 0) {
                payHtml += `<div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.campaignDiscount')}</span><span class="kv-row__v minus">-${campaign.toLocaleString(KHR_LOCALE)} KHR</span></div>`;
            }
            // 6/7 #135 ①: 紹介クーポン割引行（カートで適用済みのみ）。これが無いと合計が合わない。
            const referralDiscount = orderData.referralDiscountAmount || 0;
            if (referralDiscount > 0) {
                payHtml += `<div class="kv-row"><span class="kv-row__k">${i18next.t('order.referralCouponDiscount')}</span><span class="kv-row__v amber">-${referralDiscount.toLocaleString(KHR_LOCALE)} KHR</span></div>`;
            }
            payHtml += `
                <div class="divider-dashed"></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.total')}</span><span class="kv-row__v bold">${total.toLocaleString(KHR_LOCALE)} KHR</span></div>
            `;
            document.getElementById('pay-breakdown').innerHTML = payHtml;

            // 入金情報（PoCでは未取得、手動確認のためN/A表示）
            // 将来的にPayway APIと連携するなら自動取得可能
            document.getElementById('payment-info').innerHTML = `
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.fromName')}</span><span class="kv-row__v">${restData?.accountName || '-'}</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.fromAccount')}</span><span class="kv-row__v">-</span></div>
            `;

            // 送金内訳
            // 6/7 #135 ②: 紹介ボーナス行（取引完了時に order へ加算済みのみ）。これが無いと合計が合わない。
            //   農家送金は常に満額（クーポンは FishLink 負担）＝ボーナスは受取額に上乗せ。
            const remitBonus = orderData.referralBonusAmount || 0;
            const remitBonusLine = remitBonus > 0
                ? `<div class="kv-row"><span class="kv-row__k">${i18next.t('order.referralBonus')}</span><span class="kv-row__v amber">+${remitBonus.toLocaleString(KHR_LOCALE)} KHR</span></div>`
                : '';
            document.getElementById('remit-breakdown').innerHTML = `
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.fishPrice')}</span><span class="kv-row__v">${fishPrice.toLocaleString(KHR_LOCALE)} KHR</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.deliveryFee')}</span><span class="kv-row__v">${deliveryFee.toLocaleString(KHR_LOCALE)} KHR</span></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.commissionDeduct', { rate: commissionRate })}</span><span class="kv-row__v minus">-${commission.toLocaleString(KHR_LOCALE)} KHR</span></div>
                ${remitBonusLine}
                <div class="divider-dashed"></div>
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.total')}</span><span class="kv-row__v bold">${remitAmount.toLocaleString(KHR_LOCALE)} KHR</span></div>
            `;

            // 送金先情報
            const qrImage = farmerData?.qrImageUrl
                ? `<img ${asCachedImgAttrs(farmerData.qrImageUrl)} alt="QR">`
                : `<span class="qr-preview__empty">${i18next.t('admin.order.noQr')}</span>`;
            const qrLink = farmerData?.qrLink
                ? `<a href="${farmerData.qrLink}" target="_blank" rel="noopener" class="external-link">${farmerData.qrLink}</a>`
                : `<div style="font-size:12px; color:#94a3b8; margin-top:8px;">${i18next.t('admin.order.noQrLink')}</div>`;

            document.getElementById('remit-target').innerHTML = `
                <div class="kv-row"><span class="kv-row__k">${i18next.t('admin.order.remitTargetName')}</span><span class="kv-row__v">${farmerData?.accountName || farmerData?.displayName || '-'}</span></div>
                <div style="margin-top:8px; font-size:12px; color:#64748b;">${i18next.t('admin.order.remitQrImage')}</div>
                <div class="qr-preview">${qrImage}</div>
                <div style="margin-top:12px; font-size:12px; color:#64748b;">${i18next.t('admin.order.remitQrLink')}</div>
                ${qrLink}
            `;

            // ボタン有効/無効（フロー順序）
            const confirmBtn = document.getElementById('confirm-payment-btn');
            const remitBtn = document.getElementById('mark-remit-btn');
            const doneBtn = document.getElementById('done-btn');

            // 受取完了後（status===completed）のみ adminフロー開始
            const canStartAdmin = orderData.status === 'completed';
            const isPaymentConfirmed = ['payment_confirmed', 'remitted', 'done'].includes(orderData.adminStatus);
            const isRemitted = ['remitted', 'done'].includes(orderData.adminStatus);
            const isDone = orderData.adminStatus === 'done';

            // 7/10 #204: 案B（前払い）は depositConfirmed/paymentUnconfirmed で照合。旧（受取時払い）は adminStatus。
            const isPrepaid = orderData.prepaid === true;
            const depositConfirmed = orderData.depositConfirmed === true;
            const paymentUnconfirmed = orderData.paymentUnconfirmed === true;
            const depositOk = isPrepaid ? depositConfirmed : isPaymentConfirmed;

            const confirmSub = document.getElementById('confirm-payment-sub');
            const unconfirmBtn = document.getElementById('unconfirm-payment-btn');
            const unconfirmSub = document.getElementById('unconfirm-payment-sub');
            const unconfirmedStrip = document.getElementById('unconfirmed-strip');
            const buyerProofBlock = document.getElementById('buyer-proof-block');
            const matchHint = document.getElementById('match-hint');

            if (isPrepaid) {
                // 前払い: 承認前でも照合して押せる（status ゲート撤廃）
                confirmBtn.disabled = depositConfirmed;
                confirmBtn.textContent = depositConfirmed
                    ? i18next.t('admin.order.depositConfirmedBadge')
                    : i18next.t('admin.order.markPaymentConfirmed');
                confirmSub.style.display = depositConfirmed ? 'none' : '';
                // 未確認ボタン: 入金確認前かつ未確認状態でないときのみ（未確認中は strip に集約）
                const showUnconfirm = !depositConfirmed && !paymentUnconfirmed;
                unconfirmBtn.style.display = showUnconfirm ? '' : 'none';
                unconfirmSub.style.display = showUnconfirm ? '' : 'none';
                // 未確認ストリップ
                unconfirmedStrip.style.display = paymentUnconfirmed ? '' : 'none';
                if (paymentUnconfirmed) {
                    document.getElementById('unconfirmed-reason').textContent = orderData.depositUnconfirmedReason || '-';
                }
                // 買い手の控え＋照合ガイド
                buyerProofBlock.style.display = '';
                matchHint.style.display = '';
                const proofUrl = orderData.buyerPaymentProofUrl;
                const proofBody = document.getElementById('buyer-proof-body');
                if (proofUrl) {
                    buyerProofBlock.classList.remove('none');
                    proofBody.innerHTML = `<a href="${proofUrl}" target="_blank" rel="noopener" class="buyer-proof__img"><img ${asCachedImgAttrs(proofUrl)} alt="proof"></a>`;
                    matchHint.textContent = i18next.t('admin.order.matchHint');
                } else {
                    buyerProofBlock.classList.add('none');
                    proofBody.innerHTML = `<div class="buyer-proof__none">${i18next.t('admin.order.buyerProofNone')}</div>`;
                    matchHint.textContent = i18next.t('admin.order.matchHintNoProof');
                }
            } else {
                // 旧（受取時払い）: 従来どおり受取完了後のみ
                confirmBtn.disabled = !canStartAdmin || isPaymentConfirmed;
                confirmBtn.textContent = i18next.t('admin.order.markPaymentConfirmed');
                confirmSub.style.display = '';
                unconfirmBtn.style.display = 'none';
                unconfirmSub.style.display = 'none';
                unconfirmedStrip.style.display = 'none';
                buyerProofBlock.style.display = 'none';
                matchHint.style.display = 'none';
            }
            // 入金確認ボタンは青（有効時）／グレー（無効・確認済）
            confirmBtn.style.background = confirmBtn.disabled ? '#94a3b8' : 'var(--color-cta, #0b5fb0)';

            // 農家送金: 配送完了後＆入金OK＆未送金で有効（前払いは depositConfirmed を入金OK判定に）
            remitBtn.disabled = !(orderData.status === 'completed') || !depositOk || isRemitted;
            doneBtn.disabled = !isRemitted || isDone;

            // 内部メモ
            document.getElementById('admin-memo').value = orderData.adminMemo || '';

            // 6/5 #129 ④/§8: 問題報告で送金保留中の通知（送金前のみ）
            const hold = orderData.paymentProblemHold === true && !isRemitted;
            const holdNotice = document.getElementById('hold-notice');
            if (holdNotice) holdNotice.style.display = hold ? 'flex' : 'none';

            // 6/5 #129 ⑥: 入金控え（振込元名義・メモ・スクショ）を反映
            const payerInput = document.getElementById('payer-name-input');
            const depositMemo = document.getElementById('deposit-memo');
            if (payerInput && document.activeElement !== payerInput) payerInput.value = orderData.payerName || '';
            if (depositMemo && document.activeElement !== depositMemo) depositMemo.value = orderData.depositMemo || '';
            renderProofThumb('deposit-proof-thumb', orderData.depositProofUrl);
            renderProofThumb('remit-proof-thumb', orderData.remitProofUrl);

            // 5/25 #91/#92 拡張: 次回訪問用に画面 HTML をキャッシュ保存
            try {
                const chip = document.getElementById('top-status-chip');
                saveRenderState(`admin_order:${orderId}`, {
                    orderNo: document.getElementById('order-no-display')?.textContent || '',
                    topDate: document.getElementById('top-date-pill')?.textContent || '',
                    summaryStatus: document.getElementById('summary-status')?.textContent || '',
                    nextStep: document.getElementById('summary-next-step')?.textContent || '',
                    summaryPay: document.getElementById('summary-pay')?.textContent || '',
                    summaryRemit: document.getElementById('summary-remit')?.textContent || '',
                    statusChipText: chip?.textContent || '',
                    statusChipClass: chip?.className || '',
                    basicInfoHtml: document.getElementById('basic-info')?.innerHTML || '',
                    deliveryInfoHtml: document.getElementById('delivery-info')?.innerHTML || '',
                    payBreakdownHtml: document.getElementById('pay-breakdown')?.innerHTML || '',
                    paymentInfoHtml: document.getElementById('payment-info')?.innerHTML || '',
                    remitBreakdownHtml: document.getElementById('remit-breakdown')?.innerHTML || '',
                });
            } catch (e) { /* ignore */ }
        }

        function cap(s) {
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        function formatDate(d) {
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        // ── アクション ─────────────────────────────
        document.getElementById('confirm-payment-btn').addEventListener('click', async () => {
            if (!confirm(i18next.t('admin.order.confirmPaymentConfirmed'))) return;
            // 7/10 #204: 前払い（案B）は depositConfirmed／旧は adminStatus。
            if (orderData?.prepaid === true) {
                await updateDoc(doc(db, 'orders', orderId), { depositConfirmed: true, paymentUnconfirmed: false });
            } else {
                await updateDoc(doc(db, 'orders', orderId), { adminStatus: 'payment_confirmed' });
            }
        });

        // ── 7/10 #204: お支払い未確認にする（前払いのみ・理由メモ必須・中央モーダル） ──
        const unconfirmModal = document.getElementById('unconfirm-modal');
        const unconfirmReasonInput = document.getElementById('unconfirm-reason-input');
        const unconfirmReasonErr = document.getElementById('unconfirm-reason-err');

        function openUnconfirmModal() {
            unconfirmReasonInput.value = '';
            unconfirmReasonErr.style.display = 'none';
            unconfirmReasonInput.classList.remove('uc-err');
            unconfirmModal.style.display = 'flex';
        }
        function closeUnconfirmModal() {
            unconfirmModal.style.display = 'none';
        }

        document.getElementById('unconfirm-payment-btn').addEventListener('click', openUnconfirmModal);
        document.getElementById('unconfirm-cancel-btn').addEventListener('click', closeUnconfirmModal);
        unconfirmModal.addEventListener('click', (e) => { if (e.target === unconfirmModal) closeUnconfirmModal(); });

        document.getElementById('unconfirm-ok-btn').addEventListener('click', async () => {
            const reason = unconfirmReasonInput.value.trim();
            if (!reason) {
                unconfirmReasonErr.style.display = 'block';
                unconfirmReasonInput.classList.add('uc-err');
                unconfirmReasonInput.focus();
                return;
            }
            await updateDoc(doc(db, 'orders', orderId), {
                paymentUnconfirmed: true,
                depositConfirmed: false,
                depositUnconfirmedReason: reason,
                depositUnconfirmedAt: serverTimestamp(),
            });
            closeUnconfirmModal();
        });

        document.getElementById('mark-remit-btn').addEventListener('click', async () => {
            if (!confirm(i18next.t('admin.order.confirmRemitted'))) return;
            await updateDoc(doc(db, 'orders', orderId), { adminStatus: 'remitted' });
        });

        document.getElementById('done-btn').addEventListener('click', async () => {
            if (!confirm(i18next.t('admin.order.confirmDone'))) return;
            await updateDoc(doc(db, 'orders', orderId), { adminStatus: 'done' });
        });

        document.getElementById('save-memo-btn').addEventListener('click', async () => {
            const memo = document.getElementById('admin-memo').value;
            await updateDoc(doc(db, 'orders', orderId), { adminMemo: memo });
            const note = document.getElementById('memo-saved');
            note.classList.add('show');
            setTimeout(() => note.classList.remove('show'), 1500);
        });

        // ── 6/5 #129 ⑥: 入金控え／送金控え・金額コピー・保留解除 ──
        function renderProofThumb(id, url) {
            const el = document.getElementById(id);
            if (!el) return;
            if (url) {
                el.href = url;
                el.innerHTML = `<img ${asCachedImgAttrs(url)} alt="proof">`;
                el.style.display = 'inline-block';
            } else {
                el.style.display = 'none';
                el.innerHTML = '';
            }
        }

        async function uploadProof(field, file, prefix) {
            if (!file) return;
            loading.classList.add('show');
            try {
                const baseName = (file.name || prefix).replace(/\.[^.]+$/, '');
                const storageRef = ref(storage, `settlements/${orderId}/${prefix}_${Date.now()}_${baseName}.jpg`);
                const url = await uploadImageResized(storageRef, file);
                await updateDoc(doc(db, 'orders', orderId), { [field]: url });
            } catch (err) {
                console.error(err);
                alert(err.message || 'upload failed');
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 入金控え：振込元名義＋メモ保存
        document.getElementById('save-deposit-btn').addEventListener('click', async () => {
            const payerName = document.getElementById('payer-name-input').value.trim();
            const depositMemo = document.getElementById('deposit-memo').value.trim();
            await updateDoc(doc(db, 'orders', orderId), {
                payerName: payerName || null,
                depositMemo: depositMemo || null,
            });
            const note = document.getElementById('deposit-saved');
            note.classList.add('show');
            setTimeout(() => note.classList.remove('show'), 1500);
        });

        document.getElementById('deposit-proof-file').addEventListener('change', (e) => {
            uploadProof('depositProofUrl', e.target.files?.[0], 'deposit');
            e.target.value = '';
        });
        document.getElementById('remit-proof-file').addEventListener('change', (e) => {
            uploadProof('remitProofUrl', e.target.files?.[0], 'remit');
            e.target.value = '';
        });

        // 送金額をコピー
        document.getElementById('copy-remit-btn').addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(String(lastRemitAmount));
                const btn = document.getElementById('copy-remit-btn');
                const label = btn.querySelector('span[data-i18n]');
                if (label) { label.textContent = i18next.t('admin.order.copied'); setTimeout(() => { label.textContent = i18next.t('admin.order.copyRemitAmount'); }, 1500); }
            } catch (e) { console.warn('clipboard failed:', e); }
        });

        // 問題報告の保留解除（運営が調査して送金可と判断した場合）
        document.getElementById('release-hold-btn').addEventListener('click', async () => {
            if (!confirm(i18next.t('admin.order.confirmReleaseHold'))) return;
            await updateDoc(doc(db, 'orders', orderId), { paymentProblemHold: false });
        });

        onLanguageChange(() => orderData && render());
    </script>
</body>
</html>
