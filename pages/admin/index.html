<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink Admin</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .admin-shell { max-width: 1280px; margin: 0 auto; padding: 24px; }

        .admin-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .admin-header__right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .admin-brand {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 2px;
        }

        .admin-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
        }

        .admin-subtitle {
            font-size: 13px;
            color: #475569;
            margin-top: 4px;
        }

        .admin-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .admin-nav a {
            text-decoration: none;
            color: #475569;
            padding: 8px 14px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .admin-nav a.active {
            background: #0f172a;
            color: #fff;
            border-color: #0f172a;
        }

        .admin-nav a:hover:not(.active) {
            background: #f1f5f9;
        }

        .period-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .period-btn {
            border: none;
            padding: 8px 14px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .period-btn.active {
            background: #0f172a;
            color: #fff;
        }

        .custom-range {
            display: none;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            background: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .custom-range.show { display: flex; }

        .custom-range label { font-size: 12px; color: #64748b; }

        .custom-range input[type="date"] {
            width: auto;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
        }

        .custom-range button {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 10px;
        }

        /* #212 1-5: KPI 補足（流通総額・手数料は成立取引ベース） */
        .kpi-note {
            color: #64748b;
            font-size: 12px;
            line-height: 1.6;
            margin: 0 2px 20px;
        }

        .summary-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            padding: 14px 16px;
        }

        .summary-card__label {
            font-size: 12px;
            color: #64748b;
        }

        .summary-card__value {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 4px;
        }

        /* #212 1-4: 2軸フィルタ（配送・入金）＝旧の単一タブ行を置換 */
        .filters {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .frow {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .frow + .frow {
            margin-top: 11px;
            padding-top: 11px;
            border-top: 1px dashed #e7ebf0;
        }

        .axis-label {
            font-size: 12px;
            font-weight: 800;
            color: #586274;
            min-width: 104px;
        }

        .axis-label small {
            display: block;
            color: #9aa3b0;
            font-weight: 600;
            font-size: 10.5px;
        }

        .chip {
            border: 1px solid #e1e6ec;
            background: #fff;
            border-radius: 16px;
            padding: 6px 13px;
            font-size: 12px;
            color: #3c4656;
            cursor: pointer;
            white-space: nowrap;
        }

        .chip.on { background: #16233f; color: #fff; border-color: #16233f; font-weight: 700; }
        .chip.warn { color: #c0392b; border-color: #e6c4be; }
        .chip.warn.on { background: #c0392b; color: #fff; border-color: #c0392b; }
        .chip.todo { color: #b26a00; border-color: #f0d28c; }
        .chip.todo.on { background: #e08a00; color: #fff; border-color: #e08a00; }

        .table-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table.tx-table {
            width: 100%;
            min-width: 1040px;
            border-collapse: collapse;
            font-size: 13px;
        }

        .tx-table thead {
            background: #f1f5f9;
            color: #475569;
        }

        .tx-table th,
        .tx-table td {
            text-align: left;
            padding: 12px 14px;
            white-space: nowrap;
        }

        .tx-table tbody tr {
            border-top: 1px solid #e2e8f0;
            transition: background .1s;
        }

        .tx-table tbody tr:hover {
            background: #f8fafc;
        }

        /* #212 1-2: 2軸ステータスバッジ（配送=b-*, 入金=m-*・mockup のパレット準拠） */
        .bdg {
            display: inline-block;
            border-radius: 20px;
            padding: 4px 11px;
            font-size: 11.5px;
            font-weight: 700;
            white-space: nowrap;
        }
        /* 配送軸 */
        .b-wait   { background: #eef1f5; color: #5a6678; }  /* 農家確認中＝ニュートラル */
        .b-prep   { background: #e3f0ff; color: #1b6fc4; }  /* 準備開始＝青 */
        .b-ship   { background: #ddebff; color: #1857b8; }  /* 配送開始＝青 */
        .b-recv   { background: #fff2cc; color: #9a7400; }  /* 受け取り完了＝アンバー/ゴールド */
        .b-done   { background: #16233f; color: #fff; }     /* 取引完了＝ダークネイビー */
        .b-decl   { background: #fbe3e6; color: #c0392b; }  /* 辞退＝赤 */
        .b-cancel { background: #fbe3e6; color: #c0392b; }  /* キャンセル＝赤 */
        /* 入金軸 */
        .m-wait    { background: #fff0d6; color: #b26a00; } /* 入金確認待ち＝アンバー(To-Do) */
        .m-conf    { background: #e4f6e9; color: #1e8e4e; } /* 入金確認済＝緑 */
        .m-paywait { background: #fff0d6; color: #b26a00; } /* 農家送金待ち＝アンバー(To-Do) */
        .m-paid    { background: #d9f2e1; color: #137a41; } /* 農家送金済＝緑 */
        .m-refund  { background: #eef1f5; color: #5a6678; } /* 返金済＝ニュートラル */
        .m-unpaid  { background: #fbe3e6; color: #c0392b; } /* 未払い・お支払い未確認＝赤 */
        .m-hold    { background: #fbefd9; color: #c2620e; } /* 確認中（保留・問題報告あり）＝オレンジ(To-Doとは別) */

        /* 買い手支払い額（返金済は muted＋タグ） */
        .amt { font-weight: 700; font-variant-numeric: tabular-nums; }
        .amt.muted { color: #9aa3b0; font-weight: 600; }
        .refund {
            display: inline-block;
            margin-left: 6px;
            font-size: 10.5px;
            color: #7c8697;
            background: #eef1f5;
            border-radius: 5px;
            padding: 1px 6px;
            font-weight: 700;
            vertical-align: middle;
        }

        .btn-detail {
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #334155;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-detail:hover { background: #f1f5f9; }

        .empty-cell {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            padding: 40px 16px !important;
        }

        #lang-selector {
            width: auto;
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            background: #fff;
            color: #475569;
        }

        /* ── モバイル用カードリスト（tableの代替表示） ── */
        .tx-cards { display: none; padding: 8px; }
        .tx-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
            padding: 14px; margin-bottom: 10px;
        }
        .tx-card__row {
            display: flex; justify-content: space-between; gap: 12px;
            font-size: 13px; padding: 3px 0;
        }
        .tx-card__k { color: #64748b; flex-shrink: 0; }
        .tx-card__v { color: #0f172a; font-weight: 500; text-align: right; word-break: break-word; }
        .tx-card__v.bold { font-weight: 700; }

        /* ── タブレット ── */
        @media (max-width: 1024px) {
            .admin-shell { padding: 20px; }
            .admin-title { font-size: 24px; }
        }

        /* ── モバイル ── */
        @media (max-width: 720px) {
            .admin-shell { padding: 14px; }
            .admin-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .admin-header__right { justify-content: flex-start; }
            .admin-title { font-size: 20px; }
            .admin-subtitle { font-size: 12px; }

            .admin-nav { order: 1; }
            .admin-nav a { padding: 7px 12px; font-size: 12px; }

            .period-row { gap: 6px; }
            .period-btn { padding: 6px 12px; font-size: 12px; }

            .summary-grid { grid-template-columns: 1fr; gap: 10px; }
            .summary-card { padding: 12px 14px; }
            .summary-card__value { font-size: 18px; }

            .filters { padding: 12px; }
            .axis-label { min-width: 100%; margin-bottom: 2px; }
            .chip { padding: 6px 11px; font-size: 12px; }

            /* テーブルを隠してカード表示に */
            .table-scroll { display: none; }
            .tx-cards { display: block; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.tx.title"></div>
                <div class="admin-subtitle" data-i18n="admin.tx.subtitle"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" class="active" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/analytics.html" data-i18n="admin.navAnalytics"></a>
                    <a href="/pages/admin/users.html" data-i18n="admin.navUsers"></a>
                    <a href="/pages/admin/settings.html" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/referral.html" data-i18n="admin.navReferral"></a>
                    <a href="/pages/admin/caa.html" data-i18n="admin.navCaa"></a>
                    <a href="/pages/admin/reports.html" data-i18n="admin.navReports"></a>
                    <a href="/pages/admin/faq.html" data-i18n="admin.navFaq"></a>
                    <a href="/pages/admin/legal.html" data-i18n="admin.navLegal"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option>
                    <option value="en">ENGLISH</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
        </div>

        <!-- 期間切替 -->
        <div class="period-row">
            <button class="period-btn active" data-period="today" data-i18n="admin.tx.periodToday"></button>
            <button class="period-btn" data-period="custom" data-i18n="admin.tx.periodCustom"></button>
            <button class="period-btn" data-period="all" data-i18n="admin.tx.periodAll"></button>
        </div>

        <div class="custom-range" id="custom-range">
            <label><span data-i18n="admin.tx.fromLabel"></span>:</label>
            <input type="date" id="date-from">
            <label><span data-i18n="admin.tx.toLabel"></span>:</label>
            <input type="date" id="date-to">
            <button id="apply-range" data-i18n="admin.tx.apply"></button>
        </div>

        <!-- サマリー -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="admin.tx.summaryCount"></div>
                <div class="summary-card__value" id="sum-count">0</div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="admin.tx.summaryVolume"></div>
                <div class="summary-card__value" id="sum-volume">0 KHR</div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="admin.tx.summaryFee"></div>
                <div class="summary-card__value" id="sum-fee">0 KHR</div>
            </div>
        </div>

        <!-- #212 1-5: KPI 補足（成立取引ベース） -->
        <div class="kpi-note" data-i18n="admin.tx.kpiRevenueNote"></div>

        <!-- #212 1-4: 2軸ステータスフィルタ（配送・入金） -->
        <div class="filters" id="filters"></div>

        <!-- 取引一覧テーブル -->
        <div class="table-card">
            <div class="table-scroll">
                <table class="tx-table">
                    <thead>
                        <tr>
                            <th data-i18n="admin.tx.colOrderNo"></th>
                            <th data-i18n="admin.tx.colDelivery"></th>
                            <th data-i18n="admin.tx.colPayment"></th>
                            <th data-i18n="admin.tx.colDate"></th>
                            <th data-i18n="admin.tx.colRestaurant"></th>
                            <th data-i18n="admin.tx.colFarmer"></th>
                            <th data-i18n="admin.tx.colPay"></th>
                            <th data-i18n="admin.tx.colAction"></th>
                        </tr>
                    </thead>
                    <tbody id="tx-body">
                        <tr><td colspan="8" class="empty-cell" data-i18n="admin.tx.empty"></td></tr>
                    </tbody>
                </table>
            </div>
            <!-- モバイル用カード表示 -->
            <div class="tx-cards" id="tx-cards"></div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initAdminReportBadge } from '/js/admin-report-badge.js';
        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // #212: 2軸ステータス（配送・入金）の導出は共有モジュールに集約（買い手/農家の直線ステータスとは別）
        import {
            deliveryAxisKey, paymentAxisKey,
            isPaymentTodo, isPaymentWarn, isDeliveryException, isSettledTransaction, isOverdue,
            DELIVERY_AXIS_KEYS, PAYMENT_AXIS_KEYS
        } from '/js/status-axes.js';
        import {
            collection, query, orderBy, getDocs, doc, getDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initAdminReportBadge();

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        // admin権限チェック
        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // ── 2軸ステータス（#212 1-1/1-2/1-4）─────────────────────────────
        //   配送軸・入金軸の導出は js/status-axes.js（前払い/旧 受取時払いの両方に対応）。
        //   ここではキー → CSSクラス／i18nラベル／フィルタ一致 だけを持つ。
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // キー → mockup のバッジ配色クラス
        const DELIVERY_BADGE_CLASS = {
            farmerConfirming: 'b-wait',
            preparing: 'b-prep',
            shipping: 'b-ship',
            received: 'b-recv',
            tradeDone: 'b-done',
            declined: 'b-decl',
            cancelled: 'b-cancel',
        };
        const PAYMENT_BADGE_CLASS = {
            waitDeposit: 'm-wait',
            depositOk: 'm-conf',
            remitWait: 'm-paywait',
            remitted: 'm-paid',
            onHold: 'm-hold',          // 確認中（保留）＝オレンジ・To-Do(送金待ち)とは別
            unconfirmed: 'm-unpaid',   // お支払い未確認＝赤
            unpaid: 'm-unpaid',        // 未払い（期限超過）＝赤
            refunded: 'm-refund',
        };
        const deliveryBadgeClass = k => DELIVERY_BADGE_CLASS[k] || 'b-wait';
        const paymentBadgeClass = k => PAYMENT_BADGE_CLASS[k] || 'm-wait';
        const deliveryLabel = k => i18next.t(`admin.axis.delivery.${k}`);
        const paymentLabel = k => i18next.t(`admin.axis.payment.${k}`);

        // フィルタ一致（'all' は無条件通過）
        function matchDelivery(order, f) { return f === 'all' || deliveryAxisKey(order) === f; }
        function matchPayment(order, f) { return f === 'all' || paymentAxisKey(order) === f; }

        // ── 期間フィルタ ─────────────────────────────
        let periodMode = 'today';
        let dateFrom = null;
        let dateTo = null;

        function matchPeriod(order) {
            const ms = order.createdAt?.toMillis?.() || 0;
            if (periodMode === 'all') return true;
            const d = new Date(ms);
            if (periodMode === 'today') {
                const today = new Date();
                return d.getFullYear() === today.getFullYear()
                    && d.getMonth() === today.getMonth()
                    && d.getDate() === today.getDate();
            }
            if (periodMode === 'custom') {
                if (dateFrom && ms < dateFrom) return false;
                if (dateTo && ms > dateTo) return false;
                return true;
            }
            return true;
        }

        // 2026-07-17 #210③: 桁区切りは必ず 'en-US' を明示する。
        //   ロケール引数なしの toLocaleString() は端末の既定ロケールに従うため、
        //   区切りが「.」になる端末（de-DE/id-ID/vi-VN 等）で「41.000 KHR」のように化ける。
        //   アプリの言語設定とは無関係に端末次第で化けるので、金額表示はこのページ内すべて 'en-US' に統一
        //   （買い手カート cart.html・js/reel-ui.js が既に 'en-US' 固定＝そちらが正）。
        const KHR_LOCALE = 'en-US';

        // ── データ取得 ─────────────────────────────
        let allOrders = [];
        let allFishListings = {}; // id → data
        let allUsers = {};        // uid → data
        // #212 1-4: 2軸フィルタ（既定はどちらも「すべて」）
        let deliveryFilter = 'all';
        let paymentFilter = 'all';

        waitForUserData(async () => {
            if (window.currentUserData?.role !== 'admin') {
                alert('Admin access required');
                location.href = '/index.html';
                return;
            }
            if (!cachedRendered) loading.classList.add('show');
            try {
                // 全注文取得（本番ではページング推奨）
                const snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc')));
                allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 関連 users / listings をキャッシュ取得
                const userIds = new Set();
                const listingIds = new Set();
                allOrders.forEach(o => {
                    if (o.restaurantId) userIds.add(o.restaurantId);
                    if (o.farmerId) userIds.add(o.farmerId);
                    if (o.listingId) listingIds.add(o.listingId);
                });
                await Promise.all([...userIds].map(async uid => {
                    const uSnap = await getDoc(doc(db, 'users', uid));
                    if (uSnap.exists()) allUsers[uid] = uSnap.data();
                }));
                await Promise.all([...listingIds].map(async lid => {
                    const lSnap = await getDoc(doc(db, 'fishListings', lid));
                    if (lSnap.exists()) allFishListings[lid] = lSnap.data();
                }));

                buildFilters();
                render();
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        // #212 1-4: 2軸フィルタ（配送・入金）を描画。To-Do=amber(.todo)／例外=red(.warn)。
        function chipHtml(axis, key, current, label, extraCls) {
            const cls = 'chip' + (extraCls ? ' ' + extraCls : '') + (key === current ? ' on' : '');
            return `<span class="${cls}" data-axis="${axis}" data-key="${escapeHtml(key)}">${escapeHtml(label)}</span>`;
        }

        function buildFilters() {
            const wrap = document.getElementById('filters');
            if (!wrap) return;
            const allLabel = i18next.t('admin.tx.tabAll');

            const dChips = [chipHtml('delivery', 'all', deliveryFilter, allLabel, '')]
                .concat(DELIVERY_AXIS_KEYS.map(k =>
                    chipHtml('delivery', k, deliveryFilter, deliveryLabel(k), isDeliveryException(k) ? 'warn' : '')));

            const pChips = [chipHtml('payment', 'all', paymentFilter, allLabel, '')]
                .concat(PAYMENT_AXIS_KEYS.map(k => {
                    const extra = isPaymentTodo(k) ? 'todo' : (isPaymentWarn(k) ? 'warn' : '');
                    return chipHtml('payment', k, paymentFilter, paymentLabel(k), extra);
                }));

            wrap.innerHTML = `
                <div class="frow">
                    <span class="axis-label">${escapeHtml(i18next.t('admin.tx.axisDelivery'))}<small>${escapeHtml(i18next.t('admin.tx.axisDeliveryHint'))}</small></span>
                    ${dChips.join('')}
                </div>
                <div class="frow">
                    <span class="axis-label">${escapeHtml(i18next.t('admin.tx.axisPayment'))}<small>${escapeHtml(i18next.t('admin.tx.axisPaymentHint'))}</small></span>
                    ${pChips.join('')}
                </div>`;

            wrap.querySelectorAll('.chip').forEach(el => {
                el.addEventListener('click', () => {
                    const axis = el.dataset.axis;
                    const key = el.dataset.key;
                    if (axis === 'delivery') deliveryFilter = key;
                    else paymentFilter = key;
                    buildFilters();
                    render();
                });
            });
        }

        // 期間ボタン
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                periodMode = btn.dataset.period;
                document.getElementById('custom-range').classList.toggle('show', periodMode === 'custom');
                render();
            });
        });

        document.getElementById('apply-range').addEventListener('click', () => {
            const f = document.getElementById('date-from').value;
            const t = document.getElementById('date-to').value;
            dateFrom = f ? new Date(f + 'T00:00:00').getTime() : null;
            dateTo = t ? new Date(t + 'T23:59:59.999').getTime() : null;
            render();
        });

        function render() {
            const tbody = document.getElementById('tx-body');
            const cards = document.getElementById('tx-cards');

            // #212 1-3: 期間指定モードで from/to を1つも入れていないときは全件を出さない。
            //   期間の選択を促し、KPI も 0 にする。「本日」「全期間」は従来どおり。
            const customUnset = periodMode === 'custom' && dateFrom === null && dateTo === null;
            if (customUnset) {
                document.getElementById('sum-count').textContent = i18next.t('admin.tx.countUnit', { count: 0 });
                document.getElementById('sum-volume').textContent = `0 KHR`;
                document.getElementById('sum-fee').textContent = `0 KHR`;
                const prompt = escapeHtml(i18next.t('admin.tx.selectPeriod'));
                tbody.innerHTML = `<tr><td colspan="8" class="empty-cell">${prompt}</td></tr>`;
                cards.innerHTML = `<div class="empty-cell">${prompt}</div>`;
                saveState(tbody, cards);
                return;
            }

            const periodFiltered = allOrders.filter(matchPeriod);
            const filtered = periodFiltered.filter(o => matchDelivery(o, deliveryFilter) && matchPayment(o, paymentFilter));

            // KPI（#212 1-5）:
            //   取引数     = 期間内 全件（ステータス除外なし）
            //   流通総額   = 成立した取引の Σ totalAmount（辞退・キャンセルは除外）
            //   手数料     = 成立した取引の運営取り分 Σ(totalAmount − farmerReceiveAmount)（保存済みの100リエル値）。
            //     ⚠ 旧式 Math.round(魚代×5%)+サービス料−割引 は floor100 でなく、農家側キャンペーン戻し
            //       (farmerCampaignDiscount) も引かないため手数料を過大表示していた（#212 レビュー指摘#4）。
            //       farmerReceiveAmount 未保存の legacy 注文のみ旧式へフォールバック。
            const count = periodFiltered.length;
            const settled = periodFiltered.filter(isSettledTransaction);
            const volume = settled.reduce((s, o) => s + (o.totalAmount || 0), 0);
            const fee = settled.reduce((s, o) => {
                if (o.farmerReceiveAmount != null) return s + ((o.totalAmount || 0) - o.farmerReceiveAmount);
                return s + Math.round((o.fishPrice || 0) * 0.05) + ((o.serviceFee || 0) - (o.campaignDiscount || 0));
            }, 0);

            document.getElementById('sum-count').textContent = i18next.t('admin.tx.countUnit', { count });
            document.getElementById('sum-volume').textContent = `${volume.toLocaleString(KHR_LOCALE)} KHR`;
            document.getElementById('sum-fee').textContent = `${fee.toLocaleString(KHR_LOCALE)} KHR`;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty-cell">${escapeHtml(i18next.t('admin.tx.empty'))}</td></tr>`;
                cards.innerHTML = `<div class="empty-cell">${escapeHtml(i18next.t('admin.tx.empty'))}</div>`;
                saveState(tbody, cards);
                return;
            }

            // 2軸バッジ＋金額（返金済/辞退/キャンセルは muted＋返金済タグ・displayName は escapeHtml）
            const refundTag = escapeHtml(i18next.t('admin.tx.refundedTag'));
            function amtCellHtml(o, dk, pk) {
                const muted = isDeliveryException(dk) || pk === 'refunded';
                const amtStr = `${(o.totalAmount || 0).toLocaleString(KHR_LOCALE)} KHR`;
                return muted
                    ? `<span class="amt muted">${amtStr}<span class="refund">${refundTag}</span></span>`
                    : `<span class="amt">${amtStr}</span>`;
            }

            tbody.innerHTML = filtered.map(o => {
                const dk = deliveryAxisKey(o);
                const pk = paymentAxisKey(o);
                const restName = allUsers[o.restaurantId]?.displayName || '-';
                const farmerName = allUsers[o.farmerId]?.displayName || '-';
                const date = o.createdAt?.toDate ? formatDate(o.createdAt.toDate()) : '';
                const orderNo = o.orderNumber || `FL-${String(o.id).slice(0, 8).toUpperCase()}`;
                return `
                    <tr>
                        <td style="font-family:monospace; font-size:12px; color:#475569; white-space:nowrap;">${escapeHtml(orderNo)}</td>
                        <td><span class="bdg ${deliveryBadgeClass(dk)}">${escapeHtml(deliveryLabel(dk))}</span></td>
                        <td><span class="bdg ${paymentBadgeClass(pk)}">${escapeHtml(paymentLabel(pk))}</span></td>
                        <td>${date}</td>
                        <td>${escapeHtml(restName)}</td>
                        <td>${escapeHtml(farmerName)}</td>
                        <td>${amtCellHtml(o, dk, pk)}</td>
                        <td><a class="btn-detail" href="/pages/admin/order.html?id=${encodeURIComponent(o.id)}">${escapeHtml(i18next.t('admin.tx.viewDetail'))}</a></td>
                    </tr>
                `;
            }).join('');

            cards.innerHTML = filtered.map(o => {
                const dk = deliveryAxisKey(o);
                const pk = paymentAxisKey(o);
                const restName = allUsers[o.restaurantId]?.displayName || '-';
                const farmerName = allUsers[o.farmerId]?.displayName || '-';
                const date = o.createdAt?.toDate ? formatDate(o.createdAt.toDate()) : '';
                const orderNo = o.orderNumber || `FL-${String(o.id).slice(0, 8).toUpperCase()}`;
                return `
                    <a class="tx-card" href="/pages/admin/order.html?id=${encodeURIComponent(o.id)}" style="text-decoration:none; color:inherit; display:block;">
                        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;">
                            <span class="bdg ${deliveryBadgeClass(dk)}">${escapeHtml(deliveryLabel(dk))}</span>
                            <span class="bdg ${paymentBadgeClass(pk)}">${escapeHtml(paymentLabel(pk))}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px;">
                            <span style="font-family:monospace; font-size:11px; color:#475569;">${escapeHtml(orderNo)}</span>
                            <span style="font-size:12px; color:#64748b;">${date}</span>
                        </div>
                        <div class="tx-card__row"><span class="tx-card__k">${escapeHtml(i18next.t('admin.tx.colRestaurant'))}</span><span class="tx-card__v">${escapeHtml(restName)}</span></div>
                        <div class="tx-card__row"><span class="tx-card__k">${escapeHtml(i18next.t('admin.tx.colFarmer'))}</span><span class="tx-card__v">${escapeHtml(farmerName)}</span></div>
                        <div class="tx-card__row"><span class="tx-card__k">${escapeHtml(i18next.t('admin.tx.colPay'))}</span><span class="tx-card__v bold">${amtCellHtml(o, dk, pk)}</span></div>
                    </a>
                `;
            }).join('');

            saveState(tbody, cards);
        }

        // 5/25 #91/#92: 次回訪問用に画面HTML＋サマリーをキャッシュ保存
        function saveState(tbody, cards) {
            try {
                saveRenderState('admin_index', {
                    sumCount: document.getElementById('sum-count')?.textContent || '',
                    sumVolume: document.getElementById('sum-volume')?.textContent || '',
                    sumFee: document.getElementById('sum-fee')?.textContent || '',
                    tbodyHtml: tbody.innerHTML,
                    cardsHtml: cards.innerHTML,
                });
            } catch (e) { /* ignore */ }
        }

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元（fresh fetch が後で上書き）
        let cachedRendered = false;
        (function applyCache() {
            try {
                const cached = loadRenderState('admin_index');
                if (!cached) return;
                const sc = document.getElementById('sum-count');
                const sv = document.getElementById('sum-volume');
                const sf = document.getElementById('sum-fee');
                const tb = document.getElementById('tx-body');
                const cd = document.getElementById('tx-cards');
                if (sc && cached.sumCount) sc.textContent = cached.sumCount;
                if (sv && cached.sumVolume) sv.textContent = cached.sumVolume;
                if (sf && cached.sumFee) sf.textContent = cached.sumFee;
                if (tb && cached.tbodyHtml) tb.innerHTML = cached.tbodyHtml;
                if (cd && cached.cardsHtml) cd.innerHTML = cached.cardsHtml;
                if (cached.tbodyHtml || cached.cardsHtml) {
                    loading.classList.remove('show');
                    document.body.classList.add('app-ready');
                    cachedRendered = true;
                }
            } catch (e) { /* ignore */ }
        })();

        function formatDate(d) {
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        onLanguageChange(() => {
            buildFilters();
            render();
        });
    </script>
</body>
</html>
