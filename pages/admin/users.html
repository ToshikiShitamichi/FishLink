<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink Admin - Users</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .admin-shell { max-width: 1280px; margin: 0 auto; padding: 24px; }

        .admin-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .admin-header__right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .admin-brand { font-size: 13px; color: #64748b; margin-bottom: 2px; }
        .admin-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: #0f172a; }
        .admin-subtitle { font-size: 13px; color: #475569; margin-top: 4px; }

        .admin-nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .admin-nav a {
            text-decoration: none; color: #475569; padding: 8px 14px;
            border-radius: 999px; background: #fff; border: 1px solid #e2e8f0;
            font-size: 13px; font-weight: 600; white-space: nowrap;
        }
        .admin-nav a.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .admin-nav a:hover:not(.active) { background: #f1f5f9; }

        .users-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 16px;
        }

        @media (max-width: 880px) {
            .users-layout { grid-template-columns: 1fr; }
        }

        .panel {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
        }

        .filters-row {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
        }

        .filter-chip {
            border: 1px solid #e2e8f0; background: #fff; color: #475569;
            padding: 6px 12px; border-radius: 999px; font-size: 12px;
            font-weight: 600; cursor: pointer;
        }
        .filter-chip.active { background: #0f172a; color: #fff; border-color: #0f172a; }

        .search-input {
            width: 100%; padding: 10px 12px; font-size: 14px;
            border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px;
        }

        .user-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 8px; border-radius: 8px; cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .user-row:hover { background: #f8fafc; }
        .user-row.active { background: #ecfdf5; }
        /* チャット未読あり：背景強調 + 左ボーダー */
        .user-row.has-unread { background: #fef3c7; border-left: 3px solid #f59e0b; }
        .user-row.has-unread:hover { background: #fde68a; }
        .user-row.has-unread.active { background: #fed7aa; }

        .user-row__role {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
            background: #f1f5f9; color: #475569;
        }
        .user-row__role.farmer { background: #ecfdf5; color: #047857; }
        .user-row__role.restaurant { background: #fef3c7; color: #92400e; }
        .user-row__role.admin { background: #ddd6fe; color: #5b21b6; }

        .user-row__main { flex: 1; min-width: 0; }
        .user-row__name { font-size: 14px; font-weight: 600; color: #0f172a; }
        .user-row__sub { font-size: 11px; color: #64748b; margin-top: 2px; }
        .user-row__last-msg {
            font-size: 11px; color: #475569; margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 100%;
        }
        .user-row__last-msg.unread { color: #b45309; font-weight: 600; }

        .user-row__right {
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
            flex-shrink: 0;
        }

        .user-row__badge {
            font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 700;
        }
        .user-row__badge.banned { background: #fee2e2; color: #b91c1c; }
        .user-row__badge.unread {
            background: #dc2626; color: #fff; min-width: 18px; text-align: center;
            box-shadow: 0 1px 3px rgba(220,38,38,0.4);
        }

        .users-list-wrap {
            max-height: 65vh; overflow-y: auto;
        }

        .detail-empty {
            text-align: center; color: #94a3b8; padding: 60px 0;
            font-size: 13px;
        }

        .detail-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
            padding-bottom: 12px; border-bottom: 1px solid #e2e8f0;
        }

        .detail-name { font-size: 18px; font-weight: 700; color: #0f172a; }
        .detail-sub { font-size: 12px; color: #64748b; }

        .detail-rows { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; font-size: 13px; }
        .detail-rows dt { color: #64748b; font-weight: 600; }
        .detail-rows dd { color: #0f172a; word-break: break-all; }

        .ban-section {
            margin-top: 16px; padding: 12px; border-radius: 8px;
            background: #fef2f2; border: 1px solid #fecaca;
        }
        .ban-section.banned { background: #fef2f2; }
        .ban-section.normal { background: #f0fdf4; border-color: #bbf7d0; }

        .ban-status { font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        .ban-status.banned { color: #b91c1c; }
        .ban-status.normal { color: #047857; }

        .reason-input {
            width: 100%; padding: 8px 10px; font-size: 13px;
            border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 8px;
            font-family: inherit;
        }

        .ban-btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .ban-btn.ban { background: #dc2626; color: #fff; }
        .ban-btn.ban:hover { background: #b91c1c; }
        .ban-btn.ban:disabled { background: #fca5a5; cursor: not-allowed; }
        .ban-btn.unban { background: #047857; color: #fff; }
        .ban-btn.unban:hover { background: #065f46; }

        /* チャット */
        .chat-section { margin-top: 20px; }
        .chat-section h3 {
            font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 8px;
        }
        .chat-thread {
            max-height: 280px; overflow-y: auto;
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
            padding: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .chat-msg {
            max-width: 75%; padding: 8px 12px; border-radius: 12px;
            font-size: 13px; line-height: 1.4; word-break: break-word;
        }
        .chat-msg.admin { background: #0f172a; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-msg.user { background: #fff; color: #0f172a; align-self: flex-start; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .chat-msg__time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        /* 5/25 #90: ユーザー側問い合わせカテゴリのバッジ */
        .chat-msg__category {
            display: inline-block;
            font-size: 10px; font-weight: 700;
            padding: 2px 6px;
            border-radius: 6px;
            background: #fef3c7; color: #92400e;
            margin-bottom: 4px;
        }

        .chat-empty { text-align: center; color: #94a3b8; padding: 30px 0; font-size: 12px; }

        .chat-input-row {
            display: flex; gap: 8px; margin-top: 8px;
        }
        .chat-input {
            flex: 1; padding: 10px 12px; font-size: 14px;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-family: inherit; resize: none;
        }
        .send-btn {
            padding: 0 18px; border: none; border-radius: 8px;
            background: var(--color-cta); color: #fff; font-weight: 700;
            font-size: 13px; cursor: pointer; flex-shrink: 0;
        }
        .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        /* 6/14 #145: 運営チャット 未対応/対応済 ＋ 件区切り */
        .chat-section__head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .chat-section__head h3 { margin: 0; }
        .sup-status { font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 10px; }
        .sup-status.todo { background: #fdecea; color: #d14343; }
        .sup-status.done { background: #eef1f4; color: #64748b; }
        .sup-done-btn {
            margin-left: auto; font-size: 12px; font-weight: 800; color: var(--color-cta);
            border: 1.5px solid var(--color-cta); border-radius: 8px; padding: 5px 11px;
            background: #fff; cursor: pointer;
        }
        .sup-done-btn:disabled { color: #94a3b8; border-color: #cbd5e1; cursor: not-allowed; }
        .filter-chip.todo-chip { border-color: #f59e0b; color: #b45309; }
        .filter-chip.todo-chip.active { background: #f59e0b; color: #fff; border-color: #f59e0b; }

        @media (max-width: 480px) {
            .admin-shell { padding: 14px; }
            .admin-title { font-size: 22px; }
            .panel { padding: 12px; }
            .users-list-wrap { max-height: 40vh; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="admin-shell">
        <div class="admin-header">
            <div>
                <div class="admin-brand" data-i18n="admin.brand"></div>
                <div class="admin-title" data-i18n="admin.users.title"></div>
                <div class="admin-subtitle" data-i18n="admin.users.subtitle"></div>
            </div>
            <div class="admin-header__right">
                <nav class="admin-nav">
                    <a href="/pages/admin/index.html" data-i18n="admin.navTransactions"></a>
                    <a href="/pages/admin/analytics.html" data-i18n="admin.navAnalytics"></a>
                    <a href="/pages/admin/users.html" class="active" data-i18n="admin.navUsers"></a>
                    <a href="/pages/admin/settings.html" data-i18n="admin.navSettings"></a>
                    <a href="/pages/admin/referral.html" data-i18n="admin.navReferral"></a>
                    <a href="/pages/admin/caa.html" data-i18n="admin.navCaa"></a>
                    <a href="/pages/admin/reports.html" data-i18n="admin.navReports"></a>
                    <a href="/pages/admin/faq.html" data-i18n="admin.navFaq"></a>
                    <a href="/pages/admin/legal.html" data-i18n="admin.navLegal"></a>
                    <a href="#" id="logout-btn" data-i18n="admin.navLogout"></a>
                </nav>
                <select id="lang-selector">
                    <option value="km">ខ្មែរ</option>
                    <option value="en">ENGLISH</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
        </div>

        <div class="users-layout">
            <!-- 左カラム：一覧 -->
            <div class="panel">
                <input type="text" class="search-input" id="search-input"
                    placeholder="" data-i18n-placeholder="admin.users.searchPlaceholder">
                <div class="filters-row" id="role-filters">
                    <button class="filter-chip active" data-role="" data-i18n="admin.users.roleAll"></button>
                    <button class="filter-chip" data-role="farmer" data-i18n="admin.users.roleFarmer"></button>
                    <button class="filter-chip" data-role="restaurant" data-i18n="admin.users.roleRestaurant"></button>
                    <button class="filter-chip" data-role="admin" data-i18n="admin.users.roleAdmin"></button>
                    <button class="filter-chip" data-role="banned" data-i18n="admin.users.roleBanned"></button>
                    <button class="filter-chip todo-chip" id="todo-filter" data-i18n="admin.users.filterTodo"></button>
                </div>
                <div class="users-list-wrap" id="users-list"></div>
            </div>

            <!-- 右カラム：詳細 -->
            <div class="panel">
                <div id="detail-pane" class="detail-empty" data-i18n="admin.users.selectHint"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initAdminReportBadge } from '/js/admin-report-badge.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js';
        import { formatProvince, formatLocation } from '/js/province-utils.js';
        import {
            collection, query, where, orderBy, onSnapshot, getDocs, doc, getDoc,
            addDoc, serverTimestamp, updateDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/14 #145: 運営チャットの画像をキャッシュ付き属性で表示
        import { asCachedImgAttrs } from '/js/image-cache.js';

        const loading = document.getElementById('loading');
        const functions = getFunctions(undefined, 'asia-southeast1');
        const setUserBanned = httpsCallable(functions, 'setUserBanned');

        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initAdminReportBadge();

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        // 管理者チェック
        function waitAdmin(cb) {
            if (window.currentUserData) {
                if (window.currentUserData.role !== 'admin') {
                    location.href = '/index.html';
                    return;
                }
                cb();
            } else {
                setTimeout(() => waitAdmin(cb), 200);
            }
        }

        let allUsers = [];
        let currentRoleFilter = '';
        let currentSearch = '';
        let todoOnly = false;   // 6/14 #145: 未対応のみフィルタ
        let selectedUid = null;
        let chatUnsub = null;
        // 5/1: 各ユーザーの最終チャット情報（uid → { lastMessage, lastMessageAt, hasUnreadFromUser, lastSenderRole }）
        let chatSummaries = {};
        let chatSummariesUnsub = null;

        function subscribeChatSummaries() {
            if (chatSummariesUnsub) chatSummariesUnsub();
            // adminChats コレクション全体を購読（管理者専用、件数=ユーザー数のため軽量）
            chatSummariesUnsub = onSnapshot(collection(db, 'adminChats'), (snap) => {
                chatSummaries = {};
                snap.forEach(d => { chatSummaries[d.id] = d.data() || {}; });
                renderUserList();
                // 6/14 #145: 選択中ユーザーの未対応/対応済バッジを最新化
                if (selectedUid) setChatStatusUi(isTodo(chatSummaries[selectedUid] || {}));
            }, (err) => {
                console.warn('adminChats subscribe failed:', err);
            });
        }

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元（fresh fetch が後で上書き）
        let cachedRendered = false;
        try {
            const cached = loadRenderState('admin_users');
            if (cached?.usersListHtml) {
                document.getElementById('users-list').innerHTML = cached.usersListHtml;
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { /* ignore */ }

        async function loadUsers() {
            if (!cachedRendered) loading.classList.add('show');
            try {
                const snap = await getDocs(query(
                    collection(db, 'users'),
                    orderBy('createdAt', 'desc')
                ));
                allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
                renderUserList();

                // URLパラメータで指定されたユーザーを開く
                const params = new URLSearchParams(location.search);
                const targetUid = params.get('uid');
                if (targetUid && allUsers.find(u => u.uid === targetUid)) {
                    selectUser(targetUid);
                }
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        function renderUserList() {
            const list = document.getElementById('users-list');
            const term = currentSearch.toLowerCase();
            let filtered = allUsers.filter(u => {
                if (currentRoleFilter === 'banned') {
                    if (u.isBanned !== true) return false;
                } else if (currentRoleFilter && u.role !== currentRoleFilter) {
                    return false;
                }
                if (todoOnly && !isTodo(chatSummaries[u.uid])) return false;
                if (term) {
                    const hay = `${u.loginId || ''} ${u.displayName || ''} ${u.phone || ''} ${u.province || ''}`.toLowerCase();
                    if (!hay.includes(term)) return false;
                }
                return true;
            });

            // ソート：未対応あり → 最終チャット日時（新しい順）→ createdAt（既存）
            filtered.sort((a, b) => {
                const sa = chatSummaries[a.uid] || {};
                const sb = chatSummaries[b.uid] || {};
                const ua = isTodo(sa) ? 1 : 0;
                const ub = isTodo(sb) ? 1 : 0;
                if (ua !== ub) return ub - ua;  // 未対応を上に
                const ta = sa.lastMessageAt?.toMillis?.() || 0;
                const tb = sb.lastMessageAt?.toMillis?.() || 0;
                return tb - ta;  // チャット履歴がある人を上に（新しい順）
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div class="detail-empty">${i18next.t('admin.users.noResult')}</div>`;
                return;
            }

            list.innerHTML = filtered.map(u => {
                const role = u.role || 'unknown';
                const roleIcon = role === 'farmer' ? 'agriculture'
                    : role === 'restaurant' ? 'restaurant'
                    : role === 'admin' ? 'admin_panel_settings' : 'person';
                const placeText = formatLocation(u);
                const banBadge = u.isBanned
                    ? `<span class="user-row__badge banned">${i18next.t('admin.users.banned')}</span>`
                    : '';
                const summary = chatSummaries[u.uid] || {};
                const hasUnread = isTodo(summary);
                const unreadBadge = hasUnread
                    ? `<span class="user-row__badge unread">!</span>`
                    : '';
                // 最終メッセージプレビュー（送信者名でプレフィックス）
                const lastMsg = summary.lastMessage
                    ? `<div class="user-row__last-msg${hasUnread ? ' unread' : ''}">${summary.lastSenderRole === 'admin' ? '↑ ' : '↓ '}${escapeHtml(summary.lastMessage.slice(0, 50))}</div>`
                    : '';
                return `
                    <div class="user-row${selectedUid === u.uid ? ' active' : ''}${hasUnread ? ' has-unread' : ''}" data-uid="${u.uid}">
                        <div class="user-row__role ${role}">
                            <span class="material-symbols-outlined" style="font-size:18px;">${roleIcon}</span>
                        </div>
                        <div class="user-row__main">
                            <div class="user-row__name">${escapeHtml(u.displayName || u.loginId || u.uid)}</div>
                            <div class="user-row__sub">@${escapeHtml(u.loginId || '')} ${placeText ? '· ' + escapeHtml(placeText) : ''}</div>
                            ${lastMsg}
                        </div>
                        <div class="user-row__right">
                            ${unreadBadge}
                            ${banBadge}
                        </div>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('.user-row').forEach(row => {
                row.addEventListener('click', () => selectUser(row.dataset.uid));
            });

            // 5/25 #91/#92 拡張: 次回訪問用に user-list HTML をキャッシュ保存
            try {
                saveRenderState('admin_users', { usersListHtml: list.innerHTML });
            } catch (e) { /* ignore */ }
        }

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function fmtTs(ts) {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleString();
        }

        // 6/14 #145: 運営チャット用ヘルパー
        const WEEKDAY = { ja: ['日', '月', '火', '水', '木', '金', '土'], en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'] };
        function curLang() { return i18next.language || 'km'; }
        function catLabelAdmin(code) {
            if (!code) return '';
            const key = `adminChat.category${code.charAt(0).toUpperCase()}${code.slice(1)}`;
            return i18next.exists(key) ? i18next.t(key) : code;
        }
        function fmtDateSep(d) {
            const wd = (WEEKDAY[curLang()] || WEEKDAY.en)[d.getDay()];
            if (curLang() === 'ja') return `${d.getMonth() + 1}月${d.getDate()}日（${wd}）`;
            if (curLang() === 'km') return `${d.getDate()}/${d.getMonth() + 1}（${wd}）`;
            return `${WEEKDAY.en[d.getDay()]}, ${d.getMonth() + 1}/${d.getDate()}`;
        }
        function fmtHm(d) { return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; }
        // 未対応＝supportStatus==='todo'（旧データは hasUnreadFromUser にフォールバック）
        function isTodo(summary) {
            if (!summary) return false;
            return summary.supportStatus ? summary.supportStatus === 'todo' : !!summary.hasUnreadFromUser;
        }
        // 評価＝★N%（件数）・0件は「新規」（横断ルール）
        function ratingLabel(u) {
            const c = u.reviewCount ?? 0;
            if (c <= 0) return i18next.t('admin.users.ratingNew');
            return `★${Math.round(u.avgRating ?? 0)}% (${c})`;
        }

        async function selectUser(uid) {
            selectedUid = uid;
            // 一覧の active 表示更新
            document.querySelectorAll('.user-row').forEach(r => {
                r.classList.toggle('active', r.dataset.uid === uid);
            });

            const u = allUsers.find(x => x.uid === uid);
            if (!u) return;

            const pane = document.getElementById('detail-pane');
            pane.className = '';

            const roleLabel = u.role === 'farmer' ? i18next.t('admin.users.roleFarmer')
                : u.role === 'restaurant' ? i18next.t('admin.users.roleRestaurant')
                : u.role === 'admin' ? i18next.t('admin.users.roleAdmin')
                : u.role || '';

            const placeText = [formatProvince(u.province), u.district].filter(Boolean).join(', ');
            const isBanned = u.isBanned === true;
            const todoNow = isTodo(chatSummaries[uid] || {});  // 6/14 #145: 未対応/対応済

            pane.innerHTML = `
                <div class="detail-header">
                    <div>
                        <div class="detail-name">${escapeHtml(u.displayName || u.loginId || u.uid)}</div>
                        <div class="detail-sub">@${escapeHtml(u.loginId || '')} · ${escapeHtml(roleLabel)}</div>
                    </div>
                </div>

                <dl class="detail-rows">
                    <dt>${i18next.t('admin.users.detail.uid')}</dt>
                    <dd>${escapeHtml(u.uid)}</dd>
                    <dt>${i18next.t('admin.users.detail.phone')}</dt>
                    <dd>${u.phone ? `<a href="tel:${escapeHtml(u.phone)}">${escapeHtml(u.phone)}</a>` : '—'}</dd>
                    <dt>${i18next.t('admin.users.detail.location')}</dt>
                    <dd>${placeText ? escapeHtml(placeText) : '—'}${u.location ? ` (<a href="https://www.google.com/maps?q=${u.location.lat},${u.location.lng}" target="_blank">${i18next.t('admin.users.detail.viewMap')}</a>)` : ''}</dd>
                    <dt>${i18next.t('admin.users.detail.lang')}</dt>
                    <dd>${escapeHtml(u.lang || '')}</dd>
                    <dt>${i18next.t('admin.users.detail.rating')}</dt>
                    <dd>${escapeHtml(ratingLabel(u))}</dd>
                    <dt>${i18next.t('admin.users.detail.createdAt')}</dt>
                    <dd>${fmtTs(u.createdAt)}</dd>
                </dl>

                <div class="ban-section ${isBanned ? 'banned' : 'normal'}">
                    <div class="ban-status ${isBanned ? 'banned' : 'normal'}">
                        ${isBanned
                            ? i18next.t('admin.users.bannedSince', { time: fmtTs(u.bannedAt) })
                            : i18next.t('admin.users.notBanned')}
                    </div>
                    ${isBanned && u.bannedReason
                        ? `<div style="font-size:12px; color:#7f1d1d; margin-bottom:8px;">${i18next.t('admin.users.bannedReason')}: ${escapeHtml(u.bannedReason)}</div>`
                        : ''}
                    ${u.role === 'admin'
                        ? `<div style="font-size:12px; color:#64748b;">${i18next.t('admin.users.cannotBanAdmin')}</div>`
                        : isBanned
                            ? `<button class="ban-btn unban" id="unban-btn">${i18next.t('admin.users.unbanBtn')}</button>`
                            : `
                                <textarea class="reason-input" id="ban-reason" rows="2"
                                    placeholder="${i18next.t('admin.users.banReasonPlaceholder')}"></textarea>
                                <button class="ban-btn ban" id="ban-btn">${i18next.t('admin.users.banBtn')}</button>
                            `}
                </div>

                ${u.role === 'farmer' ? `
                    <!-- 5/27 #96: GAqP 認証バッジ付与/解除（農家のみ） -->
                    <div style="margin-top:12px; padding:12px; border:1px solid ${u.gaqpCertified ? '#0d6e4c' : '#e2e8f0'}; border-radius:8px; background:${u.gaqpCertified ? '#ecfdf5' : '#fafafa'};">
                        <div style="font-size:13px; font-weight:700; color:#0f172a; margin-bottom:6px; display:flex; align-items:center; gap:6px;">
                            <span class="material-symbols-outlined" style="font-size:16px; color:#0d6e4c;">verified</span>
                            ${i18next.t('admin.users.gaqpTitle')}
                        </div>
                        <div style="font-size:12px; color:#64748b; margin-bottom:8px;">
                            ${u.gaqpCertified
                                ? i18next.t('admin.users.gaqpCertifiedSince', { time: fmtTs(u.gaqpCertifiedAt) })
                                : i18next.t('admin.users.gaqpNotCertified')}
                        </div>
                        <button class="ban-btn ${u.gaqpCertified ? 'ban' : 'unban'}" id="gaqp-btn">
                            ${u.gaqpCertified ? i18next.t('admin.users.gaqpRevokeBtn') : i18next.t('admin.users.gaqpGrantBtn')}
                        </button>
                    </div>
                ` : ''}

                <!-- 5/2: このユーザーへのトラブル報告サマリ -->
                <div id="reports-summary" style="margin-top:16px; padding:12px; border:1px solid #e2e8f0; border-radius:8px; background:#fafafa;">
                    <div style="font-size:13px; font-weight:700; color:#0f172a; margin-bottom:6px; display:flex; align-items:center; gap:6px;">
                        <span class="material-symbols-outlined" style="font-size:16px; color:#dc2626;">flag</span>
                        ${i18next.t('admin.users.reportsAgainst')}
                    </div>
                    <div id="reports-summary-body" style="font-size:13px; color:#64748b;">
                        ${i18next.t('admin.users.chatLoading')}
                    </div>
                </div>

                <div class="chat-section">
                    <div class="chat-section__head">
                        <h3>${i18next.t('admin.users.chatTitle')}</h3>
                        <span class="sup-status ${todoNow ? 'todo' : 'done'}" id="chat-status">${todoNow ? i18next.t('admin.users.statusTodo') : i18next.t('admin.users.statusDone')}</span>
                        <button class="sup-done-btn" id="mark-done-btn"${todoNow ? '' : ' disabled'}>
                            <span class="material-symbols-outlined" style="font-size:15px; vertical-align:-2px;">check</span> ${i18next.t('admin.users.markDone')}
                        </button>
                    </div>
                    <div class="chat-thread" id="chat-thread">
                        <div class="chat-empty">${i18next.t('admin.users.chatLoading')}</div>
                    </div>
                    <div class="chat-input-row">
                        <textarea class="chat-input" id="chat-input" rows="2"
                            placeholder="${i18next.t('admin.users.chatPlaceholder')}"></textarea>
                        <button class="send-btn" id="send-btn">${i18next.t('admin.users.send')}</button>
                    </div>
                </div>
            `;

            // BAN/解除ボタン
            document.getElementById('ban-btn')?.addEventListener('click', () => doBan(uid, true));
            document.getElementById('unban-btn')?.addEventListener('click', () => doBan(uid, false));
            // 6/14 #145: 「対応済にする」（返信せず片付け）
            document.getElementById('mark-done-btn')?.addEventListener('click', () => markResolved(uid));
            // 5/27 #96: GAqP 認証バッジ付与/解除
            document.getElementById('gaqp-btn')?.addEventListener('click', () => toggleGaqp(uid, !u.gaqpCertified));

            // 5/2: 報告サマリ（このユーザーが reportedUid の reports）
            loadReportsSummary(uid);

            // チャット購読
            subscribeChat(uid);

            // 送信
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            sendBtn.addEventListener('click', async () => {
                const text = input.value.trim();
                if (!text) return;
                sendBtn.disabled = true;
                try {
                    await addDoc(collection(db, `adminChats/${uid}/messages`), {
                        senderId: window.currentUser.uid,
                        senderRole: 'admin',
                        text,
                        isRead: false,
                        createdAt: serverTimestamp(),
                    });
                    input.value = '';
                    // 6/14 #145: 運営が返信 → 未対応を外す（functions も冪等に設定するが即時反映のため client でも）
                    await updateDoc(doc(db, 'adminChats', uid), { supportStatus: 'done', hasUnreadFromUser: false });
                    await markUserMessagesRead(uid);
                    setChatStatusUi(false);
                } catch (err) {
                    alert(err.message || 'Failed to send');
                } finally {
                    sendBtn.disabled = false;
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            // 開いた時点で未読を既読化
            markUserMessagesRead(uid);
        }

        // 5/27 #96: GAqP 認証バッジを付与/解除
        // 注意: Firestore Rules で gaqpCertified / gaqpCertifiedAt は admin のみ write 可に設定する必要あり
        async function toggleGaqp(uid, grant) {
            const confirmMsg = grant
                ? i18next.t('admin.users.confirmGaqpGrant')
                : i18next.t('admin.users.confirmGaqpRevoke');
            if (!confirm(confirmMsg)) return;
            loading.classList.add('show');
            try {
                await updateDoc(doc(db, 'users', uid), {
                    gaqpCertified: grant,
                    gaqpCertifiedAt: grant ? serverTimestamp() : null,
                });
                const u = allUsers.find(x => x.uid === uid);
                if (u) {
                    u.gaqpCertified = grant;
                    u.gaqpCertifiedAt = grant ? new Date() : null;
                }
                renderUserList();
                selectUser(uid);
            } catch (err) {
                console.error(err);
                alert(err.message || 'Failed');
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        async function doBan(uid, banned) {
            const reason = banned ? (document.getElementById('ban-reason')?.value.trim() || '') : '';
            const confirmMsg = banned
                ? i18next.t('admin.users.confirmBan')
                : i18next.t('admin.users.confirmUnban');
            if (!confirm(confirmMsg)) return;

            loading.classList.add('show');
            try {
                const result = await setUserBanned({ uid, banned, reason });
                const deactivated = result.data?.deactivated || 0;
                // ローカル更新
                const u = allUsers.find(x => x.uid === uid);
                if (u) {
                    u.isBanned = banned;
                    u.bannedAt = banned ? new Date() : null;
                    u.bannedReason = banned ? reason : null;
                }
                renderUserList();
                selectUser(uid);
                if (banned && deactivated > 0) {
                    alert(i18next.t('admin.users.bannedAlsoDeactivated', { count: deactivated }));
                }
            } catch (err) {
                console.error(err);
                alert(err.message || 'Failed');
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        function subscribeChat(uid) {
            if (chatUnsub) { chatUnsub(); chatUnsub = null; }
            const q = query(
                collection(db, `adminChats/${uid}/messages`),
                orderBy('createdAt', 'asc')
            );
            chatUnsub = onSnapshot(q, (snap) => {
                if (selectedUid !== uid) return;
                const thread = document.getElementById('chat-thread');
                if (!thread) return;
                const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const hasReal = docs.some(m => m.type !== 'separator');
                if (!hasReal) {
                    thread.innerHTML = `<div class="chat-empty">${i18next.t('admin.users.chatEmpty')}</div>`;
                    return;
                }
                // 6/14 #145: 青の往復（運営=自分=青(右)/ユーザー=白(左)）＋ 件の区切り ＋ 日付区切り ＋ 画像
                let html = '<div class="sup-thread">';
                let lastDateKey = null;
                for (const m of docs) {
                    const t = m.createdAt?.toDate ? m.createdAt.toDate() : null;
                    if (t) {
                        const dk = `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
                        if (dk !== lastDateKey) { html += `<div class="sup-datesep">${escapeHtml(fmtDateSep(t))}</div>`; lastDateKey = dk; }
                    }
                    if (m.type === 'separator') {
                        html += `<div class="sup-catsep"><span>— ${escapeHtml(catLabelAdmin(m.category || 'other'))} —</span></div>`;
                        continue;
                    }
                    const isMe = m.senderRole === 'admin';
                    const imgs = m.imageUrls || (m.imageUrl ? [m.imageUrl] : []);
                    const imgHtml = imgs.length ? `<div class="sup-bub__imgs">${imgs.map(u => `<a class="sup-bub__img" href="${escapeHtml(u)}" target="_blank" rel="noopener"><img ${asCachedImgAttrs(u)} alt=""></a>`).join('')}</div>` : '';
                    const text = (m.text || '').trim();
                    html += `<div class="sup-bub ${isMe ? 'me' : 'them'}">${text ? escapeHtml(text).replace(/\n/g, '<br>') : ''}${imgHtml}<div class="sup-bub__time">${t ? escapeHtml(fmtHm(t)) : ''}</div></div>`;
                }
                html += '</div>';
                thread.innerHTML = html;
                thread.scrollTop = thread.scrollHeight;
            });
        }

        // 5/2: 対象ユーザーへの報告（reportedUid==uid）件数を表示
        async function loadReportsSummary(uid) {
            const body = document.getElementById('reports-summary-body');
            if (!body) return;
            try {
                const snap = await getDocs(query(
                    collection(db, 'reports'),
                    where('reportedUid', '==', uid)
                ));
                const total = snap.size;
                const open = snap.docs.filter(d => d.data().status !== 'resolved').length;

                if (total === 0) {
                    body.textContent = i18next.t('admin.users.reportsNone');
                    return;
                }

                // 直近3件をプレビュー（新しい順）
                const sorted = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0))
                    .slice(0, 3);

                const list = sorted.map(r => {
                    const date = r.createdAt?.toDate?.();
                    const dateStr = date ? `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}` : '';
                    const statusLabel = r.status === 'resolved' ? i18next.t('admin.reports.statusResolved') : i18next.t('admin.reports.statusOpen');
                    const statusColor = r.status === 'resolved' ? '#065f46' : '#92400e';
                    const typeLabel = i18next.t(`admin.reports.type${(r.type || 'other').charAt(0).toUpperCase() + (r.type || 'other').slice(1)}`) || (r.type || '');
                    return `<a href="/pages/admin/reports.html#report-${r.id}" style="display:block; padding:6px 0; border-top:1px solid #e2e8f0; text-decoration:none; color:#334155;">
                        <span style="color:${statusColor}; font-weight:700; font-size:11px;">[${statusLabel}]</span>
                        <span style="margin-left:6px;">${escapeHtml(typeLabel)}</span>
                        <span style="float:right; color:#94a3b8; font-size:11px;">${dateStr}</span>
                    </a>`;
                }).join('');

                body.innerHTML = `
                    <div style="margin-bottom:6px;">
                        <strong style="color:#dc2626;">${i18next.t('admin.users.reportsCount', { count: total })}</strong>
                        ${open > 0 ? `<span style="color:#92400e; margin-left:8px;">(${i18next.t('admin.users.reportsOpenCount', { count: open })})</span>` : ''}
                    </div>
                    ${list}
                `;
            } catch (e) {
                console.warn('reports summary failed:', e.message);
                body.textContent = '';
            }
        }

        async function markUserMessagesRead(uid) {
            try {
                const snap = await getDocs(query(
                    collection(db, `adminChats/${uid}/messages`),
                    where('senderRole', '==', 'user'),
                    where('isRead', '==', false)
                ));
                await Promise.all(snap.docs.map(d => updateDoc(d.ref, { isRead: true })));
                // 6/14 #145: 未対応/対応済は supportStatus が正本。開いただけ（閲覧）では未対応を外さない
                //   （旧来は親 hasUnreadFromUser を開封時に下ろしていたが、返信せず閲覧しただけで
                //    未対応が消える挙動になるため撤去。外すのは返信 or「対応済にする」のみ）。
            } catch (e) { /* ignore */ }
        }

        // 6/14 #145: 未対応/対応済 のUI反映 ＋「対応済にする」（返信せず片付け）
        function setChatStatusUi(todo) {
            const s = document.getElementById('chat-status');
            const b = document.getElementById('mark-done-btn');
            if (s) { s.className = `sup-status ${todo ? 'todo' : 'done'}`; s.textContent = todo ? i18next.t('admin.users.statusTodo') : i18next.t('admin.users.statusDone'); }
            if (b) b.disabled = !todo;
        }
        async function markResolved(uid) {
            try {
                await updateDoc(doc(db, 'adminChats', uid), { supportStatus: 'done', hasUnreadFromUser: false });
                await markUserMessagesRead(uid);
                setChatStatusUi(false);
            } catch (e) { console.error('markResolved failed:', e); }
        }

        // フィルタ
        document.getElementById('role-filters').addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-chip');
            if (!btn) return;
            // 6/14 #145: 「未対応」は別軸トグル（ロールフィルタと AND）
            if (btn.id === 'todo-filter') {
                todoOnly = !todoOnly;
                btn.classList.toggle('active', todoOnly);
                renderUserList();
                return;
            }
            currentRoleFilter = btn.dataset.role || '';
            document.querySelectorAll('#role-filters .filter-chip[data-role]').forEach(c => c.classList.toggle('active', c === btn));
            renderUserList();
        });
        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderUserList();
        });

        onLanguageChange(() => {
            // 一覧再描画と詳細パネル再描画
            renderUserList();
            if (selectedUid) selectUser(selectedUid);
        });

        waitAdmin(() => {
            loadUsers();
            subscribeChatSummaries();
        });
    </script>
</body>

</html>
