<!DOCTYPE html>
<html lang="km">
<!-- 5/30 #103: 魚一覧画面 デザインリニューアル（docs/design/fishlink-list-mockup.html + fishlink-list-spec.md が正本）。
     構成/データ/絞り込み・ソート/遷移=spec 遵守、色/装飾=既存DS（css/style.css）に準拠、寸法=モック正本（2列グリッド）。
     既存の取得ロジック（ページング・道路距離・favorites・province-utils・render-cache）は維持。
     UI を「ソートドロップダウン + 絞り込みボトムシート + 2列縦型カード + 検索サジェスト + 売切れ末尾固定 + 戻り時状態保持」に刷新。 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .nav-badge {
            position: absolute; top: 6px; right: 50%;
            transform: translateX(18px);
            background: #ef4444; width: 10px; height: 10px; border-radius: 50%;
        }

        /* ── 検索バー ── */
        .fl-search-wrap { position: relative; margin: 0 0 4px; }
        .fl-search {
            display: flex; align-items: center; gap: 8px;
            background: #f1f5f9; border-radius: 999px; padding: 10px 16px;
        }
        .fl-search input {
            flex: 1; border: none; background: transparent; outline: none;
            font-size: 14px; font-family: inherit; color: var(--color-text);
        }
        .fl-search .material-symbols-outlined { color: var(--color-text-sub); }
        .fl-search__clear {
            border: none; background: transparent; cursor: pointer; padding: 0;
            color: var(--color-text-sub); display: none;
        }
        .fl-search__clear.show { display: inline-flex; }
        .fl-suggest {
            display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px);
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, .12);
            z-index: 40; max-height: 50vh; overflow-y: auto; padding: 4px 0;
        }
        .fl-suggest.show { display: block; }
        .fl-suggest__item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; font-size: 14px; cursor: pointer; color: var(--color-text);
        }
        .fl-suggest__item:hover { background: #f1f5f9; }
        .fl-suggest__item .material-symbols-outlined { font-size: 18px; color: var(--color-text-sub); }
        .fl-suggest__type { margin-left: auto; font-size: 11px; color: var(--color-text-sub); }

        /* ── タイトル・ソート/絞り込みバー ── */
        .fl-title { font-size: 20px; font-weight: 700; padding: 14px 0 8px; }
        .fl-bar { display: flex; gap: 8px; align-items: center; padding-bottom: 8px; position: relative; }
        .fl-sort-btn, .fl-filter-btn {
            flex: 0 0 auto; background: var(--color-surface);
            border: 1px solid var(--color-border); border-radius: 20px;
            padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 4px; color: var(--color-text);
            font-family: inherit;
        }
        .fl-sort-btn:active, .fl-filter-btn:active { background: #f1f5f9; transform: scale(.97); }
        .fl-sort-btn .material-symbols-outlined, .fl-filter-btn .material-symbols-outlined { font-size: 16px; }
        .fl-filter-btn.active { background: var(--color-primary-lt); border-color: var(--color-primary); color: var(--color-primary); }
        .fl-filter-btn__badge {
            background: var(--color-primary); color: #fff; font-size: 10px; font-weight: 700;
            padding: 1px 6px; border-radius: 8px; margin-left: 2px; display: none;
        }
        .fl-filter-btn__badge.show { display: inline-block; }

        .fl-sort-pop {
            display: none; position: absolute; top: calc(100% + 2px); left: 0;
            background: var(--color-surface); border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .15); padding: 8px; min-width: 170px; z-index: 35;
        }
        .fl-sort-pop.show { display: block; }
        .fl-sort-pop__opt { padding: 10px 12px; font-size: 13px; border-radius: 8px; cursor: pointer; color: var(--color-text); }
        .fl-sort-pop__opt:hover { background: #f1f5f9; }
        .fl-sort-pop__opt.active { background: var(--color-primary-lt); color: var(--color-primary); font-weight: 700; }

        .fl-count { font-size: 12px; color: var(--color-text-sub); padding-bottom: 8px; }

        /* ── 2列グリッド（縦型カード・Homeとカード言語統一） ── */
        .fl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .fl-card-wrap { position: relative; min-width: 0; }
        .fl-card {
            display: flex; flex-direction: column; height: 100%;
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: var(--radius); overflow: hidden;
            text-decoration: none; color: inherit; transition: box-shadow .15s;
        }
        .fl-card:hover { box-shadow: 0 4px 12px rgba(0, 0, 0, .1); }
        .fl-card__img {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: var(--color-primary-lt);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .fl-card__img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .fl-card__img .material-symbols-outlined { font-size: 40px; color: #9dbed4; }
        .gaqp-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--color-primary); color: #fff;
            font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px;
            display: inline-flex; align-items: center; gap: 2px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .15); white-space: nowrap; z-index: 2;
        }
        .gaqp-badge .material-symbols-outlined { font-size: 11px; color: #fff; }
        .fl-heart {
            position: absolute; top: 8px; right: 8px; z-index: 3;
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255, 255, 255, .92); color: #94a3b8;
            border: none; cursor: pointer; box-shadow: 0 1px 3px rgba(0, 0, 0, .12);
            display: flex; align-items: center; justify-content: center; font-family: inherit;
        }
        .fl-heart .material-symbols-outlined { font-size: 18px; font-variation-settings: 'FILL' 0; }
        .fl-heart.active { color: #ef4444; }
        .fl-heart.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        .fl-soldout {
            position: absolute; inset: 0; z-index: 2;
            background: rgba(255, 255, 255, .55);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 800; color: var(--color-text-sub);
        }
        .fl-soldout span {
            background: rgba(26, 26, 26, .72); color: #fff;
            padding: 4px 12px; border-radius: 999px;
        }
        .fl-card__body { padding: 10px 12px 8px; flex: 1; min-width: 0; }
        .fl-card__name {
            font-size: 14px; font-weight: 700; color: var(--color-text); line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .fl-card__sz { font-size: 11px; color: var(--color-text-sub); margin-top: 2px; }
        .fl-card__price { margin-top: 6px; display: flex; align-items: baseline; gap: 3px; }
        /* 6/4 #123①: 価格は青（--color-cta）。緑はGAqP/成功/送料無料専用 */
        .fl-card__price b { font-size: 18px; font-weight: 800; color: var(--color-cta); line-height: 1; }
        .fl-card__price span { font-size: 11px; color: var(--color-text-sub); font-weight: 600; }
        .fl-card__meta { font-size: 12px; color: var(--color-text-sub); margin-top: 5px; }
        /* 5/31 #107: 送料無料（緑・太字）/ 評価0件の「新規」表示 */
        .fl-card__free { font-size: 12px; color: var(--color-primary); font-weight: 700; margin-top: 3px; }
        .fl-new { color: var(--color-text-sub); font-weight: 600; }
        .fl-card__farmer {
            display: flex; align-items: center; gap: 6px;
            border-top: 1px solid var(--color-border); padding: 7px 10px; background: #fafcfd;
            cursor: pointer; min-width: 0;
        }
        .fl-card__farmer:hover { background: #f1f5f9; }
        .fl-card__avatar {
            width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; overflow: hidden;
            background: var(--color-primary-lt);
            display: flex; align-items: center; justify-content: center;
        }
        .fl-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .fl-card__avatar .material-symbols-outlined { font-size: 13px; color: #94a3b8; }
        .fl-card__fn {
            font-size: 11px; font-weight: 600; color: var(--color-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1;
        }
        .fl-card__rt {
            font-size: 10px; color: #f59e0b; font-weight: 700; flex-shrink: 0;
            display: flex; align-items: center; gap: 1px; white-space: nowrap;
        }
        .fl-card__rt .material-symbols-outlined { font-size: 11px; color: #f59e0b; font-variation-settings: 'FILL' 1; }
        .fl-card__rt span { color: var(--color-text-sub); font-weight: 600; }
        /* 売切れ：グレーアウト（画像以外） */
        .fl-card-wrap--out .fl-card__body, .fl-card-wrap--out .fl-card__farmer { opacity: .55; }

        .fl-empty { grid-column: 1 / -1; text-align: center; padding: 56px 20px; color: var(--color-text-sub); }
        .fl-empty .material-symbols-outlined { font-size: 48px; }
        .fl-empty__text { font-size: 15px; margin: 12px 0 16px; }
        .fl-empty__reset {
            display: inline-block; border: 1.5px solid var(--color-primary); color: var(--color-primary);
            background: transparent; border-radius: 999px; padding: 9px 20px;
            font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
        }

        /* ── ボトムシート ── */
        .fl-backdrop {
            position: fixed; inset: 0; background: rgba(0, 0, 0, .5);
            opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 200;
        }
        .fl-backdrop.show { opacity: 1; pointer-events: auto; }
        .fl-sheet {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 480px; background: var(--color-surface);
            border-radius: 20px 20px 0 0; transition: transform .3s cubic-bezier(.4, 0, .2, 1);
            z-index: 201; max-height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 -8px 24px rgba(0, 0, 0, .12);
        }
        .fl-sheet.show { transform: translateX(-50%) translateY(0); }
        .fl-sheet__handle { width: 40px; height: 4px; background: var(--color-border); border-radius: 2px; margin: 10px auto 4px; cursor: pointer; }
        .fl-sheet__head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 20px 14px; border-bottom: 1px solid var(--color-border);
        }
        .fl-sheet__title { font-size: 16px; font-weight: 700; }
        .fl-sheet__reset { background: none; border: none; color: var(--color-primary); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .fl-sheet__body { flex: 1 1 auto; overflow-y: auto; padding: 16px 20px 20px; }
        .fl-sheet__sec { margin-bottom: 20px; }
        .fl-sheet__sec h3 { font-size: 13px; font-weight: 700; color: var(--color-text); margin: 0 0 10px; }
        .fl-chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .fl-chip {
            background: var(--color-surface); border: 1.5px solid var(--color-border);
            border-radius: 16px; padding: 7px 14px; font-size: 12px; cursor: pointer;
            color: var(--color-text); user-select: none; font-family: inherit;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .fl-chip:hover { background: #f1f5f9; }
        .fl-chip.selected { background: var(--color-primary-lt); border-color: var(--color-primary); color: var(--color-primary); font-weight: 600; }
        .fl-chip.selected .fl-chip__check { display: inline; }
        .fl-chip__check { display: none; font-size: 14px; }
        .fl-slider-wrap { padding: 4px 2px 0; }
        .fl-slider-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-sub); margin-bottom: 6px; }
        .fl-slider-val { color: var(--color-primary); font-weight: 700; }
        input[type="range"] { width: 100%; accent-color: var(--color-primary); }
        .fl-sheet__foot { flex: 0 0 auto; padding: 12px 20px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--color-border); }
        .fl-apply {
            width: 100%; background: var(--color-primary); color: #fff; border: none;
            border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
        }
        .fl-apply:active { opacity: .9; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer></script>
</head>

<body>

    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page" style="padding: 0; padding-bottom: 120px; max-width:480px; margin:0 auto;">

        <!-- ヘッダー（sticky） -->
        <div class="page-header" style="align-items:center; padding:16px; margin-bottom:0; position:sticky; top:0; z-index:50; background:var(--color-surface); border-bottom:1px solid var(--color-border);">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/restaurant/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div style="padding: 0 16px;">

            <!-- 検索バー -->
            <div class="fl-search-wrap" style="padding-top:12px;">
                <div class="fl-search">
                    <span class="material-symbols-outlined">search</span>
                    <input type="search" id="search-input" autocomplete="off" data-i18n="[placeholder]restaurant.searchPlaceholder">
                    <button type="button" class="fl-search__clear" id="search-clear" aria-label="clear">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="fl-suggest" id="search-suggest"></div>
            </div>

            <!-- 6/1 #109: キャンペーンバナーは Home画面のみ表示。魚一覧は比較作業画面のため削除（割引は明細に再表示される） -->

            <!-- タイトル -->
            <div class="fl-title" data-i18n="restaurant.title"></div>

            <!-- ソート + 絞り込みバー -->
            <div class="fl-bar">
                <button type="button" class="fl-sort-btn" id="sort-btn">
                    <span id="sort-label"></span>
                    <span class="material-symbols-outlined">expand_more</span>
                </button>
                <button type="button" class="fl-filter-btn" id="filter-btn">
                    <span class="material-symbols-outlined">tune</span>
                    <span data-i18n="fishlist.filter"></span>
                    <span class="fl-filter-btn__badge" id="filter-badge">0</span>
                </button>
                <div class="fl-sort-pop" id="sort-pop">
                    <div class="fl-sort-pop__opt" data-value="distance" data-i18n="restaurant.sortDistance"></div>
                    <div class="fl-sort-pop__opt" data-value="rating" data-i18n="restaurant.sortRating"></div>
                    <div class="fl-sort-pop__opt" data-value="price" data-i18n="restaurant.sortPrice"></div>
                    <div class="fl-sort-pop__opt" data-value="newest" data-i18n="restaurant.sortNewest"></div>
                </div>
            </div>

            <!-- 件数 -->
            <div class="fl-count" id="count"></div>

            <!-- グリッド -->
            <div class="fl-grid" id="fish-grid"></div>

            <div id="load-more-wrap" style="display:none; padding:16px 0; text-align:center;">
                <button type="button" id="load-more-btn"
                    style="padding:10px 24px; border:1px solid var(--color-border); background:var(--color-surface); color:var(--color-text); border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;"
                    data-i18n="restaurant.loadMore"></button>
            </div>
        </div>

    </div>

    <!-- 絞り込みボトムシート -->
    <div class="fl-backdrop" id="sheet-backdrop"></div>
    <div class="fl-sheet" id="filter-sheet">
        <div class="fl-sheet__handle" id="sheet-handle"></div>
        <div class="fl-sheet__head">
            <div class="fl-sheet__title" data-i18n="fishlist.filter"></div>
            <button type="button" class="fl-sheet__reset" id="sheet-reset" data-i18n="fishlist.reset"></button>
        </div>
        <div class="fl-sheet__body">
            <div class="fl-sheet__sec">
                <h3 data-i18n="fishlist.filterSpecies"></h3>
                <div class="fl-chip-group" id="sheet-species"></div>
            </div>
            <div class="fl-sheet__sec">
                <h3 data-i18n="fishlist.filterRegion"></h3>
                <div class="fl-chip-group" id="sheet-region"></div>
            </div>
            <div class="fl-sheet__sec">
                <h3 data-i18n="fishlist.filterPrice"></h3>
                <div class="fl-slider-wrap">
                    <div class="fl-slider-labels">
                        <span>0</span>
                        <span class="fl-slider-val" id="price-val"></span>
                    </div>
                    <!-- 5/31 #107: 価格スライダー上限は 0〜25000 固定（動的にしない） -->
                    <input type="range" id="price-range" min="0" max="25000" step="1000" value="25000">
                </div>
            </div>
            <!-- 5/31 #107: 距離スライダーは廃止。配達範囲外はベースルールで完全非表示、
                 「近い方がいい」はソート「距離が近い順」＋カードの距離表示でカバー。 -->
            <div class="fl-sheet__sec">
                <h3 data-i18n="fishlist.filterOther"></h3>
                <div class="fl-chip-group">
                    <div class="fl-chip" id="chip-fav" data-act="toggle-other" data-key="fav">
                        <span class="material-symbols-outlined" style="font-size:14px;">favorite</span>
                        <span data-i18n="fishlist.favorite"></span>
                    </div>
                    <div class="fl-chip" id="chip-history" data-act="toggle-other" data-key="history">
                        <span class="material-symbols-outlined" style="font-size:14px;">history</span>
                        <span data-i18n="fishlist.pastOrders"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="fl-sheet__foot">
            <button type="button" class="fl-apply" id="sheet-apply" data-i18n="fishlist.apply"></button>
        </div>
    </div>

    <!-- 下部ナビ -->
    <nav class="bottom-nav">
        <a href="/pages/restaurant/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">storefront</span></span>
            <span data-i18n="restaurant.navHome"></span>
        </a>
        <a href="/pages/restaurant/fish-list.html" class="bottom-nav__item active">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="restaurant.title"></span>
        </a>
        <a href="/pages/restaurant/cart.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">shopping_cart</span></span>
            <span class="nav-badge" id="cart-badge" style="display:none;"></span>
            <span data-i18n="cart.navCart"></span>
        </a>
        <a href="/pages/restaurant/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">local_shipping</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="delivery.myOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, orderBy, limit, startAfter, getDocs, doc, getDoc, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { subscribeCart } from '/js/cart.js';
        import { subscribeFavorites, toggleFavorite } from '/js/favorites.js';
        import { getCachedDistance, setCachedDistance } from '/js/distance-cache.js';
        import { normalizeProvince, formatProvince } from '/js/province-utils.js';
        import { asCachedImgAttrs } from '/js/image-cache.js';
        import { getCachedUser } from '/js/data-cache.js';
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        import { resolveDelivery } from '/js/order-utils.js';

        const loading = document.getElementById('loading');
        let cartListingIds = new Set();
        let favoriteIds = new Set();

        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        const FISH_FILTER_KEYS = [
            'striped_snakehead', 'walking_catfish', 'red_tilapia', 'nile_tilapia',
            'silver_barb', 'spot_pangasius', 'pangasius', 'giant_snakehead',
            'barramundi', 'climbing_perch', 'frog'
        ];

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function fishName(key) {
            if (!key) return '';
            return i18next.exists(`fish.${key}`) ? i18next.t(`fish.${key}`) : key;
        }
        // 魚種チップ用：現在言語ラベル（"ライギョ / Striped snakehead / ..." の現在言語部分）
        function fishLabelShort(key) {
            const label = i18next.t(`fish.${key}`);
            const lang = i18next.language;
            const parts = String(label).split('/').map(s => s.trim());
            return (lang === 'en' && parts[1]) ? parts[1] : (lang === 'km' && parts[2]) ? parts[2] : parts[0];
        }

        // ── 絞り込み・ソート・検索の状態 ──
        // 5/31 #107: 価格上限は 0〜25000 固定。距離スライダーは廃止（配達範囲外は完全非表示）。
        const PRICE_MAX = 25000;
        const state = {
            sort: 'distance',
            species: new Set(),
            provinces: new Set(),
            priceMax: PRICE_MAX,
            favOnly: false,
            historyOnly: false,
            q: '',
        };

        // 標準10種（CAA）。これ以外は「その他」フィルタ対象。
        const STANDARD_FISH = FISH_FILTER_KEYS;
        function isStandardFish(ft) {
            if (!ft) return false;
            if (STANDARD_FISH.includes(ft)) return true;
            // 旧データ: 日本語/英語ラベルで保存されたもの
            return STANDARD_FISH.some(k => {
                const label = i18next.t(`fish.${k}`);
                if (ft === label) return true;
                const first = String(label).split('/')[0].trim();
                return first && String(ft).includes(first);
            });
        }

        // URL パラメータ（Home からの遷移）で初期条件を上書き
        const _params = new URLSearchParams(location.search);
        const _sortParam = _params.get('sort');
        if (['distance', 'price', 'newest', 'rating'].includes(_sortParam)) state.sort = _sortParam;
        const _fishTypeParam = _params.get('fishType');
        if (_fishTypeParam && (FISH_FILTER_KEYS.includes(_fishTypeParam) || _fishTypeParam === 'other')) state.species.add(_fishTypeParam);
        if (_params.get('filter') === 'history') state.historyOnly = true;
        const _qParam = _params.get('q');
        if (_qParam) state.q = _qParam;

        // 戻り時の状態保持（spec §7）：back/forward でのみ復元。別タブからの再入は初期化。
        const SS_KEY = 'fishlist_state_v1';
        function saveState() {
            try {
                sessionStorage.setItem(SS_KEY, JSON.stringify({
                    sort: state.sort,
                    species: [...state.species],
                    provinces: [...state.provinces],
                    priceMax: state.priceMax,
                    favOnly: state.favOnly,
                    historyOnly: state.historyOnly,
                    q: state.q,
                    scrollY: window.scrollY,
                    loadedPages: loadedPages,
                }));
            } catch (e) { /* ignore */ }
        }
        let restoredScrollY = 0;
        let restoredPages = 1;
        (function maybeRestore() {
            let navType = 'navigate';
            try { navType = performance.getEntriesByType('navigation')[0]?.type || 'navigate'; } catch (e) { }
            if (navType !== 'back_forward') { sessionStorage.removeItem(SS_KEY); return; }
            try {
                const s = JSON.parse(sessionStorage.getItem(SS_KEY) || 'null');
                if (!s) return;
                state.sort = s.sort || state.sort;
                state.species = new Set(s.species || []);
                state.provinces = new Set(s.provinces || []);
                state.priceMax = typeof s.priceMax === 'number' ? s.priceMax : PRICE_MAX;
                state.favOnly = !!s.favOnly;
                state.historyOnly = !!s.historyOnly;
                state.q = s.q || '';
                restoredScrollY = s.scrollY || 0;
                restoredPages = Math.max(1, s.loadedPages || 1);
            } catch (e) { /* ignore */ }
        })();

        function appliedCount() {
            let n = state.species.size + state.provinces.size;
            if (state.priceMax < PRICE_MAX) n++;
            if (state.favOnly) n++;
            if (state.historyOnly) n++;
            return n;
        }

        // ── 過去注文 listingId 集合（履歴フィルタ用・lazy） ──
        let pastOrderedListingIds = null;
        async function ensurePastOrderedIds() {
            if (pastOrderedListingIds !== null) return pastOrderedListingIds;
            const uid = window.currentUser?.uid;
            if (!uid) { pastOrderedListingIds = new Set(); return pastOrderedListingIds; }
            try {
                const hq = query(collection(db, 'orders'), where('restaurantId', '==', uid), orderBy('createdAt', 'desc'), limit(100));
                const snap = await getDocs(hq);
                const ids = new Set();
                snap.forEach(d => {
                    const data = d.data();
                    const items = Array.isArray(data.items) ? data.items : [];
                    for (const it of items) if (it?.listingId) ids.add(it.listingId);
                    if (data.listingId) ids.add(data.listingId);
                });
                pastOrderedListingIds = ids;
            } catch (e) { pastOrderedListingIds = new Set(); }
            return pastOrderedListingIds;
        }

        // ── 距離計算（Distance Matrix・既存と同型） ──
        async function calcRoadDistances(originLat, originLng, destinations) {
            return new Promise((resolve) => {
                if (typeof google === 'undefined' || !google.maps) {
                    resolve(destinations.map(d => ({ km: haversine(originLat, originLng, d.lat, d.lng), ok: false })));
                    return;
                }
                const service = new google.maps.DistanceMatrixService();
                const origin = new google.maps.LatLng(originLat, originLng);
                const dests = destinations.map(d => new google.maps.LatLng(d.lat, d.lng));
                service.getDistanceMatrix({
                    origins: [origin], destinations: dests,
                    travelMode: google.maps.TravelMode.DRIVING, unitSystem: google.maps.UnitSystem.METRIC,
                }, (response, status) => {
                    if (status !== 'OK' || !response.rows[0]) {
                        resolve(destinations.map(d => ({ km: haversine(originLat, originLng, d.lat, d.lng), ok: false })));
                        return;
                    }
                    const results = response.rows[0].elements.map((el, idx) => {
                        if (el.status === 'OK') return { km: el.distance.value / 1000, ok: true };
                        const dest = destinations[idx];
                        return { km: haversine(originLat, originLng, dest.lat, dest.lng), ok: false };
                    });
                    resolve(results);
                });
            });
        }
        function haversine(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ── データ取得（ページング） ──
        let allItems = [];
        let serviceRate = 0.05;
        const PAGE_SIZE = 10;
        let lastListingDoc = null;
        let hasMoreListings = false;
        let isLoadingMore = false;
        let loadedPages = 0;

        async function loadFishListings({ append = false, silent = false } = {}) {
            if (!append && !silent) loading.classList.add('show');
            try {
                const uid = window.currentUser?.uid;
                if (!uid) return;
                const myLoc = window.currentUserData?.location;

                if (!append) {
                    try {
                        const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                        if (campSnap.exists()) {
                            const c = campSnap.data();
                            serviceRate = c.serviceRate ?? 0.05;
                            // 6/1 #109: バナーは Home画面のみ。魚一覧では表示しない（serviceRate は価格計算に使用）
                        }
                    } catch (e) { }
                }

                const baseConds = [collection(db, 'fishListings'), where('isActive', '==', true), orderBy('createdAt', 'desc')];
                if (append && lastListingDoc) baseConds.push(startAfter(lastListingDoc));
                baseConds.push(limit(PAGE_SIZE));
                const snap = await getDocs(query(...baseConds));
                lastListingDoc = snap.docs.length > 0 ? snap.docs[snap.docs.length - 1] : lastListingDoc;
                hasMoreListings = snap.docs.length === PAGE_SIZE;
                if (snap.docs.length > 0) loadedPages++;

                window._farmerCache = window._farmerCache || {};
                const farmerCache = window._farmerCache;
                const farmerIds = [...new Set(snap.docs.map(d => d.data().farmerId).filter(fid => !farmerCache[fid]))];
                await Promise.all(farmerIds.map(async (fid) => { farmerCache[fid] = (await getCachedUser(fid)) || {}; }));
                const farmerMap = farmerCache;

                const itemsRaw = snap.docs.map(d => {
                    const data = d.data();
                    return { id: d.id, data, farmer: farmerMap[data.farmerId] || {} };
                });

                const locsWithIndex = [];
                itemsRaw.forEach((it, i) => { if (it.farmer.location) locsWithIndex.push({ index: i, loc: it.farmer.location, farmerId: it.data.farmerId }); });

                const distanceMap = {};
                if (myLoc && locsWithIndex.length > 0) {
                    const uncached = [];
                    locsWithIndex.forEach(l => {
                        const cached = getCachedDistance(uid, l.farmerId, { rLat: myLoc.lat, rLng: myLoc.lng, fLat: l.loc.lat, fLng: l.loc.lng });
                        if (cached !== null) distanceMap[l.index] = cached;
                        else uncached.push(l);
                    });
                    if (uncached.length > 0) {
                        try {
                            const results = await calcRoadDistances(myLoc.lat, myLoc.lng, uncached.map(l => l.loc));
                            uncached.forEach((l, j) => {
                                const r = results[j];
                                distanceMap[l.index] = r.km;
                                if (r.ok) setCachedDistance(uid, l.farmerId, r.km, { rLat: myLoc.lat, rLng: myLoc.lng, fLat: l.loc.lat, fLng: l.loc.lng });
                            });
                        } catch (e) {
                            uncached.forEach(l => { distanceMap[l.index] = haversine(myLoc.lat, myLoc.lng, l.loc.lat, l.loc.lng); });
                        }
                    }
                }

                const newItems = itemsRaw.map((it, i) => {
                    const data = it.data, farmer = it.farmer;
                    const rawUnit = (data.price || 0) + (data.gutPrice || 0);
                    // 5/31 #105/#107: 配送設定は farmer 単位（farmerDelivery）を正・旧 listing fallback
                    const dlv = resolveDelivery(farmer, data);
                    return {
                        id: it.id, ...data,
                        farmerName: farmer.displayName || '',
                        farmerProvince: farmer.province || '',
                        farmerAvatarUrl: farmer.avatarUrl || (Array.isArray(farmer.pondPhotos) ? farmer.pondPhotos[0] : null) || farmer.pondPhotoUrl || null,
                        farmerAvgRating: Number(farmer.avgRating || 0),
                        farmerReviewCount: Number(farmer.reviewCount || 0),
                        farmerGaqpCertified: farmer.gaqpCertified === true,
                        distanceKm: distanceMap[i] ?? null,
                        deliverableRadiusKm: dlv.radiusKm,
                        freeDeliveryKm: dlv.freeKm,
                        deliveryFeePer10km: Math.round(dlv.ratePerKm * 10),
                        displayPrice: Math.round(rawUnit * (1 + serviceRate)),
                        createdAtMs: data.createdAt?.toMillis?.() || 0,
                    };
                });

                if (append) {
                    const seen = new Set(allItems.map(it => it.id));
                    newItems.forEach(it => { if (!seen.has(it.id)) allItems.push(it); });
                } else {
                    allItems = newItems;
                    try { saveRenderState('fish-list_items', { items: newItems, serviceRate }); } catch (e) { }
                }
                renderList();
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
                isLoadingMore = false;
            }
        }

        // ── フィルタ適用＋ソート ──
        function filteredItems() {
            let items = [...allItems];
            // 配達範囲外はベースルールとして完全非表示（5/31 #107・距離不明は残す）
            items = items.filter(it => {
                if (it.distanceKm === null || it.distanceKm === undefined) return true;
                if (it.deliverableRadiusKm && it.distanceKm > it.deliverableRadiusKm) return false;
                return true;
            });
            // 魚種（OR）。「その他」＝標準10種以外の出品
            if (state.species.size > 0) {
                items = items.filter(it => {
                    for (const key of state.species) {
                        if (key === 'other') { if (!isStandardFish(it.fishType)) return true; continue; }
                        if (it.fishType === key) return true;
                        // 旧データ（日本語テキスト保存）との緩い一致
                        const label = i18next.t(`fish.${key}`);
                        if (it.fishType === label || (label && it.fishType?.includes(String(label).split('/')[0].trim()))) return true;
                    }
                    return false;
                });
            }
            // 地域（OR）
            if (state.provinces.size > 0) {
                items = items.filter(it => {
                    const key = normalizeProvince(it.farmerProvince) || it.farmerProvince;
                    return state.provinces.has(key);
                });
            }
            // 価格帯
            if (state.priceMax < PRICE_MAX) items = items.filter(it => it.displayPrice <= state.priceMax);
            // お気に入り
            if (state.favOnly) items = items.filter(it => favoriteIds.has(it.id));
            // 過去注文
            if (state.historyOnly) {
                const ids = pastOrderedListingIds || new Set();
                items = items.filter(it => ids.has(it.id));
            }
            // 検索（魚種名・農家名）
            const q = state.q.trim().toLowerCase();
            if (q) {
                items = items.filter(it => {
                    const fn = fishName(it.fishType).toLowerCase();
                    const farmer = (it.farmerName || '').toLowerCase();
                    return fn.includes(q) || farmer.includes(q) || (it.fishType || '').toLowerCase().includes(q);
                });
            }
            // ソート（売切れは常に末尾）
            const cmp = (() => {
                switch (state.sort) {
                    case 'price': return (a, b) => a.displayPrice - b.displayPrice;
                    case 'newest': return (a, b) => b.createdAtMs - a.createdAtMs;
                    case 'rating': return (a, b) => (b.farmerAvgRating - a.farmerAvgRating) || (b.farmerReviewCount - a.farmerReviewCount);
                    default: return (a, b) => (a.distanceKm ?? 9999) - (b.distanceKm ?? 9999);
                }
            })();
            items.sort((a, b) => {
                const aOut = Number(a.stock || 0) <= 0, bOut = Number(b.stock || 0) <= 0;
                if (aOut !== bOut) return aOut ? 1 : -1; // 売切れを後ろへ
                return cmp(a, b);
            });
            return items;
        }

        function cardHtml(item) {
            const name = fishName(item.fishType);
            const out = Number(item.stock || 0) <= 0;
            const distText = (item.distanceKm !== null && item.distanceKm !== undefined) ? `${Math.floor(item.distanceKm * 10) / 10} km` : '';
            const metaText = out
                ? i18next.t('fishlist.soldOut')
                : [i18next.t('restaurant.stock', { kg: item.stock }), distText].filter(Boolean).join(' · ');
            // 5/31 #107: distanceKm ≤ freeDeliveryKm のときだけ「送料無料」（有料時は金額を出さない）
            const freeDelivery = !out && item.distanceKm != null && item.freeDeliveryKm > 0 && item.distanceKm <= item.freeDeliveryKm;
            const isFav = favoriteIds.has(item.id);
            const imgHtml = item.photoUrl
                ? `<img ${asCachedImgAttrs(item.photoUrl)} alt="${escapeHtml(name)}" loading="lazy">`
                : `<span class="material-symbols-outlined">set_meal</span>`;
            return `
                <div class="fl-card-wrap ${out ? 'fl-card-wrap--out' : ''}">
                    <button class="fl-heart ${isFav ? 'active' : ''}" type="button" data-act="toggle-fav" data-id="${item.id}"
                        aria-pressed="${isFav}" title="${i18next.t(isFav ? 'restaurant.unfavorite' : 'restaurant.favorite')}">
                        <span class="material-symbols-outlined">favorite</span>
                    </button>
                    <a class="fl-card" href="/pages/restaurant/order.html?id=${item.id}">
                        <div class="fl-card__img">
                            ${imgHtml}
                            ${item.farmerGaqpCertified ? `<span class="gaqp-badge"><span class="material-symbols-outlined">verified</span>${i18next.t('gaqp.badge')}</span>` : ''}
                            ${out ? `<div class="fl-soldout"><span>${i18next.t('fishlist.soldOut')}</span></div>` : ''}
                        </div>
                        <div class="fl-card__body">
                            <div class="fl-card__name">${escapeHtml(name)}</div>
                            <div class="fl-card__sz">${escapeHtml(item.size || '')} head/kg</div>
                            <div class="fl-card__price"><b>${item.displayPrice.toLocaleString()}</b><span>KHR/kg</span></div>
                            <div class="fl-card__meta">${escapeHtml(metaText)}</div>
                            ${freeDelivery ? `<div class="fl-card__free">${i18next.t('fishlist.freeDelivery')}</div>` : ''}
                        </div>
                        ${item.farmerName ? `
                            <div class="fl-card__farmer" data-act="view-farmer" data-farmer-id="${item.farmerId}" role="button" tabindex="0" title="${i18next.t('restaurant.viewFarmer')}">
                                <div class="fl-card__avatar">
                                    ${item.farmerAvatarUrl ? `<img ${asCachedImgAttrs(item.farmerAvatarUrl)} alt="" loading="lazy">` : `<span class="material-symbols-outlined">person</span>`}
                                </div>
                                <div class="fl-card__fn">${escapeHtml(item.farmerName)}</div>
                                <div class="fl-card__rt">${item.farmerReviewCount > 0
                                    ? `<span class="material-symbols-outlined">star</span>${Math.round(item.farmerAvgRating)}% <span>(${item.farmerReviewCount})</span>`
                                    : `<span class="fl-new">${i18next.t('fishlist.newFarmer')}</span>`}</div>
                            </div>` : ''}
                    </a>
                </div>`;
        }

        function renderList() {
            const grid = document.getElementById('fish-grid');
            const items = filteredItems();
            // 件数・ソートラベル・絞り込みバッジ更新
            document.getElementById('count').textContent = i18next.t('fishlist.count', { count: items.length });
            document.getElementById('sort-label').textContent = i18next.t('restaurant.sort' + state.sort.charAt(0).toUpperCase() + state.sort.slice(1));
            const n = appliedCount();
            const badge = document.getElementById('filter-badge');
            const fbtn = document.getElementById('filter-btn');
            if (n > 0) { badge.textContent = n; badge.classList.add('show'); fbtn.classList.add('active'); }
            else { badge.classList.remove('show'); fbtn.classList.remove('active'); }

            document.getElementById('load-more-wrap').style.display = hasMoreListings ? 'block' : 'none';

            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="fl-empty">
                        <span class="material-symbols-outlined">set_meal</span>
                        <div class="fl-empty__text">${i18next.t('fishlist.emptyTitle')}</div>
                        <button type="button" class="fl-empty__reset" id="empty-reset">${i18next.t('fishlist.emptyReset')}</button>
                    </div>`;
                document.getElementById('empty-reset')?.addEventListener('click', () => { resetFilters(); applyAndClose(); });
                return;
            }
            grid.innerHTML = items.map(cardHtml).join('');
        }

        // ── ボトムシート UI ──
        function buildSheetSpecies() {
            const row = document.getElementById('sheet-species');
            // 5/31 #107: 標準10種＋末尾に「その他」（10種以外の出品＝CAA参考価格なし）
            const chips = FISH_FILTER_KEYS.map(key => `
                <div class="fl-chip ${state.species.has(key) ? 'selected' : ''}" data-act="toggle-species" data-key="${key}">
                    <span class="fl-chip__check material-symbols-outlined">check</span>${escapeHtml(fishLabelShort(key))}
                </div>`);
            chips.push(`
                <div class="fl-chip ${state.species.has('other') ? 'selected' : ''}" data-act="toggle-species" data-key="other">
                    <span class="fl-chip__check material-symbols-outlined">check</span>${escapeHtml(i18next.t('fish.otherShort'))}
                </div>`);
            row.innerHTML = chips.join('');
        }
        function buildSheetRegion() {
            const row = document.getElementById('sheet-region');
            const keys = [...new Set(allItems.map(it => normalizeProvince(it.farmerProvince) || it.farmerProvince).filter(Boolean))]
                .sort((a, b) => formatProvince(a).localeCompare(formatProvince(b)));
            row.innerHTML = keys.map(key => `
                <div class="fl-chip ${state.provinces.has(key) ? 'selected' : ''}" data-act="toggle-region" data-key="${key}">
                    <span class="fl-chip__check material-symbols-outlined">check</span>${escapeHtml(formatProvince(key))}
                </div>`).join('');
        }
        function syncSheetControls() {
            buildSheetSpecies();
            buildSheetRegion();
            document.getElementById('price-range').value = state.priceMax;
            updatePriceLabel();
            document.getElementById('chip-fav').classList.toggle('selected', state.favOnly);
            document.getElementById('chip-history').classList.toggle('selected', state.historyOnly);
        }
        function updatePriceLabel() {
            const v = Number(document.getElementById('price-range').value);
            document.getElementById('price-val').textContent = v >= PRICE_MAX ? i18next.t('fishlist.noLimit') : i18next.t('fishlist.priceUnder', { price: v.toLocaleString() });
        }
        function openSheet() {
            syncSheetControls();
            document.getElementById('sheet-backdrop').classList.add('show');
            document.getElementById('filter-sheet').classList.add('show');
            document.getElementById('sort-pop').classList.remove('show');
        }
        function closeSheet() {
            document.getElementById('sheet-backdrop').classList.remove('show');
            document.getElementById('filter-sheet').classList.remove('show');
        }
        // シート内の一時選択をそのまま state に反映するため、シート操作で直接 state を更新する
        async function applyAndClose() {
            if (state.historyOnly) await ensurePastOrderedIds();
            closeSheet();
            renderList();
            saveState();
        }
        function resetFilters() {
            state.species.clear();
            state.provinces.clear();
            state.priceMax = PRICE_MAX;
            state.favOnly = false;
            state.historyOnly = false;
            syncSheetControls();
        }

        // シート内チップ操作
        document.getElementById('filter-sheet').addEventListener('click', (e) => {
            const chip = e.target.closest('.fl-chip');
            if (!chip) return;
            const act = chip.dataset.act, key = chip.dataset.key;
            if (act === 'toggle-species') { state.species.has(key) ? state.species.delete(key) : state.species.add(key); chip.classList.toggle('selected'); }
            else if (act === 'toggle-region') { state.provinces.has(key) ? state.provinces.delete(key) : state.provinces.add(key); chip.classList.toggle('selected'); }
            else if (act === 'toggle-other') {
                if (key === 'fav') { state.favOnly = !state.favOnly; chip.classList.toggle('selected', state.favOnly); }
                else if (key === 'history') { state.historyOnly = !state.historyOnly; chip.classList.toggle('selected', state.historyOnly); }
            }
        });
        document.getElementById('price-range').addEventListener('input', (e) => { state.priceMax = Number(e.target.value); updatePriceLabel(); });
        document.getElementById('sheet-reset').addEventListener('click', resetFilters);
        document.getElementById('sheet-apply').addEventListener('click', applyAndClose);
        document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
        document.getElementById('sheet-handle').addEventListener('click', closeSheet);
        document.getElementById('filter-btn').addEventListener('click', openSheet);

        // ソートドロップダウン
        const sortBtn = document.getElementById('sort-btn');
        const sortPop = document.getElementById('sort-pop');
        sortBtn.addEventListener('click', (e) => { e.stopPropagation(); sortPop.classList.toggle('show'); });
        sortPop.addEventListener('click', (e) => {
            const opt = e.target.closest('.fl-sort-pop__opt');
            if (!opt) return;
            state.sort = opt.dataset.value;
            sortPop.querySelectorAll('.fl-sort-pop__opt').forEach(o => o.classList.toggle('active', o === opt));
            sortPop.classList.remove('show');
            renderList(); saveState();
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#sort-btn') && !e.target.closest('#sort-pop')) sortPop.classList.remove('show');
        });

        // ── 検索バー（サジェスト + in-place） ──
        const searchInput = document.getElementById('search-input');
        const searchSuggest = document.getElementById('search-suggest');
        const searchClear = document.getElementById('search-clear');
        function renderSuggest(q) {
            q = q.trim().toLowerCase();
            if (!q) { searchSuggest.classList.remove('show'); return; }
            const fishMatches = FISH_FILTER_KEYS
                .map(k => ({ k, label: fishName(k) }))
                .filter(x => x.label.toLowerCase().includes(q))
                .slice(0, 6);
            const farmerNames = [...new Set(allItems.map(it => it.farmerName).filter(Boolean))]
                .filter(n => n.toLowerCase().includes(q)).slice(0, 6);
            const rows = [
                ...fishMatches.map(x => `<div class="fl-suggest__item" data-q="${escapeHtml(x.label)}"><span class="material-symbols-outlined">set_meal</span>${escapeHtml(x.label)}<span class="fl-suggest__type">${i18next.t('fishlist.filterSpecies')}</span></div>`),
                ...farmerNames.map(n => `<div class="fl-suggest__item" data-q="${escapeHtml(n)}"><span class="material-symbols-outlined">storefront</span>${escapeHtml(n)}<span class="fl-suggest__type">${i18next.t('restaurant.viewFarmer')}</span></div>`),
            ];
            if (rows.length === 0) { searchSuggest.classList.remove('show'); return; }
            searchSuggest.innerHTML = rows.join('');
            searchSuggest.classList.add('show');
        }
        searchInput.addEventListener('input', () => {
            state.q = searchInput.value;
            searchClear.classList.toggle('show', !!searchInput.value);
            renderSuggest(searchInput.value);
            renderList(); saveState();
        });
        searchInput.addEventListener('focus', () => renderSuggest(searchInput.value));
        searchSuggest.addEventListener('click', (e) => {
            const row = e.target.closest('.fl-suggest__item');
            if (!row) return;
            searchInput.value = row.dataset.q;
            state.q = row.dataset.q;
            searchClear.classList.add('show');
            searchSuggest.classList.remove('show');
            renderList(); saveState();
        });
        searchClear.addEventListener('click', () => {
            searchInput.value = ''; state.q = '';
            searchClear.classList.remove('show');
            searchSuggest.classList.remove('show');
            renderList(); saveState();
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.fl-search-wrap')) searchSuggest.classList.remove('show');
        });

        // 「もっと見る」
        document.getElementById('load-more-btn').addEventListener('click', async () => {
            if (isLoadingMore || !hasMoreListings) return;
            isLoadingMore = true;
            const btn = document.getElementById('load-more-btn');
            btn.disabled = true; btn.textContent = '...';
            try { await loadFishListings({ append: true }); saveState(); }
            finally { btn.disabled = false; btn.textContent = i18next.t('restaurant.loadMore'); }
        });

        // カード操作（お気に入りトグル / 農家ページ遷移）
        document.getElementById('fish-grid').addEventListener('click', async (e) => {
            const farmerBlock = e.target.closest('[data-act="view-farmer"]');
            if (farmerBlock) {
                e.preventDefault(); e.stopPropagation();
                const fid = farmerBlock.dataset.farmerId;
                if (fid) { saveState(); window.location.href = `/pages/restaurant/farmer.html?id=${fid}`; }
                return;
            }
            const favBtn = e.target.closest('[data-act="toggle-fav"]');
            if (favBtn) {
                e.preventDefault(); e.stopPropagation();
                const uid = window.currentUser?.uid;
                if (!uid) return;
                favBtn.disabled = true;
                try { await toggleFavorite(uid, favBtn.dataset.id); }
                catch (err) { console.error('toggleFavorite failed:', err); }
                finally { favBtn.disabled = false; }
                return;
            }
        });
        // 商品カード本体 → 商品詳細遷移時に状態保存
        document.getElementById('fish-grid').addEventListener('click', (e) => {
            if (e.target.closest('.fl-card') && !e.target.closest('[data-act]')) saveState();
        }, true);

        // ── バッジ・購読 ──
        function watchOrderBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const lastSeen = parseInt(localStorage.getItem('fishlink_rest_orders_seen') || '0');
            onSnapshot(query(collection(db, 'orders'), where('restaurantId', '==', uid)), (snap) => {
                const hasNew = snap.docs.some(d => (d.data().createdAt?.toMillis?.() || 0) > lastSeen);
                const badge = document.getElementById('order-badge');
                if (badge) badge.style.display = hasNew ? 'block' : 'none';
            });
        }
        function watchCartBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            subscribeCart(uid, (items) => {
                cartListingIds = new Set(items.map(it => it.listingId));
                const badge = document.getElementById('cart-badge');
                if (badge) badge.style.display = items.length > 0 ? 'block' : 'none';
            });
        }
        function watchFavorites() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            subscribeFavorites(uid, (ids) => {
                favoriteIds = new Set(ids);
                document.querySelectorAll('[data-act="toggle-fav"]').forEach(btn => {
                    const isFav = favoriteIds.has(btn.dataset.id);
                    btn.classList.toggle('active', isFav);
                    btn.setAttribute('aria-pressed', isFav);
                });
                if (state.favOnly) renderList();
            });
        }

        // 言語切替
        onLanguageChange(() => {
            const moreBtn = document.getElementById('load-more-btn');
            if (moreBtn) moreBtn.textContent = i18next.t('restaurant.loadMore');
            renderList();
            if (document.getElementById('filter-sheet').classList.contains('show')) syncSheetControls();
        });

        function waitForGoogleMaps(cb) {
            if (typeof google !== 'undefined' && google.maps) cb();
            else setTimeout(() => waitForGoogleMaps(cb), 200);
        }
        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 初期ソートラベル
        document.getElementById('sort-pop').querySelectorAll('.fl-sort-pop__opt').forEach(o => o.classList.toggle('active', o.dataset.value === state.sort));
        // 検索欄に復元値
        if (state.q) { searchInput.value = state.q; searchClear.classList.add('show'); }

        // ── 描画キャッシュ確認 → HIT すれば即時表示 ──
        let cachedRendered = false;
        try {
            const cached = loadRenderState('fish-list_items');
            if (cached && Array.isArray(cached.items)) {
                allItems = cached.items;
                if (typeof cached.serviceRate === 'number') serviceRate = cached.serviceRate;
                renderList();
                loading.classList.remove('show'); document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { console.warn('cached fish-list render failed:', e); }

        waitForUserData(() => {
            watchOrderBadge(); watchCartBadge(); watchFavorites();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
            }
            const afterLoad = async () => {
                if (state.historyOnly) await ensurePastOrderedIds();
                // 復元ページ数ぶん追加読込（戻り時の表示件数を再現）
                while (loadedPages < restoredPages && hasMoreListings) {
                    await loadFishListings({ append: true, silent: true });
                }
                renderList();
                if (restoredScrollY > 0) requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, restoredScrollY)));
            };
            waitForGoogleMaps(async () => {
                await loadFishListings({ silent: cachedRendered });
                await afterLoad();
            });
        });
    </script>

</body>
