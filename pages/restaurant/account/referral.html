<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        /* 6/22 #164 / 6/27 #177: 紹介専用ページ（マイページ 1行メニューの遷移先）。
           コード/コピー/シェア＋使えるクーポン（買い手）。特典は稼働中（順次提供注記は廃止）。 */
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
        .ref-card {
            background: var(--color-cta-lt);
            border: 1px solid #cfe0ee;
            border-radius: 14px;
            padding: 16px;
        }
        .ref-card__desc { font-size: 12.5px; color: #3e6a98; line-height: 1.6; margin-bottom: 12px; }
        .ref-card__label { font-size: 14px; font-weight: 700; color: var(--color-cta); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .ref-card__label .material-symbols-outlined { font-size: 18px; }
        .ref-card__code {
            background: #fff;
            border: 1px solid #d5e6f8;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #0b1b33;
            margin-bottom: 12px;
            user-select: all;
        }
        .ref-card__actions { display: flex; gap: 8px; }
        .ref-card__btn {
            flex: 1;
            background: #fff;
            border: 1px solid var(--color-cta);
            color: var(--color-cta);
            border-radius: 999px;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .ref-card__btn .material-symbols-outlined { font-size: 17px; }
        .ref-card__btn--primary { background: var(--color-cta); color: #fff; border-color: var(--color-cta); }

        /* 報酬カード（白） */
        .reward-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 14px;
            margin-top: 14px;
        }
        .reward-card__title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 11px; }
        .reward-card__title .material-symbols-outlined { font-size: 19px; color: #b36a00; }

        /* クーポン（amber） */
        .coupon-box { background: #fff7e6; border: 1px solid #f3d998; border-radius: 12px; padding: 13px; }
        .coupon-box + .coupon-box { margin-top: 9px; }
        .coupon-box__amt { font-size: 18px; font-weight: 700; color: #b36a00; }
        .coupon-box__meta { font-size: 11px; color: #9a7430; margin-top: 4px; }
        .coupon-box__use { font-size: 11px; color: #b36a00; font-weight: 700; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
        .coupon-box__use .material-symbols-outlined { font-size: 15px; }
        .reward-hint { font-size: 11.5px; color: var(--color-text-sub); line-height: 1.6; margin-top: 8px; }

        /* 報酬の空状態（共有を促す） */
        .reward-empty { text-align: center; padding: 14px 10px 6px; }
        .reward-empty .re-i { font-size: 30px; color: #c9a14a; }
        .reward-empty .re-t { font-size: 13px; color: var(--color-text-sub); margin-top: 7px; }
        .reward-empty .re-p { font-size: 13px; font-weight: 700; color: var(--color-cta); margin-top: 9px; line-height: 1.55; }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FISHLINK" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="account.referralBuyer"></div>

        <div class="sub-page">
            <div class="ref-card">
                <div class="ref-card__label"><span class="material-symbols-outlined">redeem</span><span data-i18n="referral.cardTitle"></span></div>
                <div class="ref-card__desc" data-i18n="referral.timingTwoStage"></div>
                <div class="ref-card__code" id="referral-code">--------</div>
                <div class="ref-card__actions">
                    <button type="button" id="referral-copy" class="ref-card__btn">
                        <span class="material-symbols-outlined">content_copy</span>
                        <span data-i18n="referral.copy"></span>
                    </button>
                    <button type="button" id="referral-share" class="ref-card__btn ref-card__btn--primary">
                        <span class="material-symbols-outlined">share</span>
                        <span data-i18n="referral.share"></span>
                    </button>
                </div>
            </div>

            <!-- 使えるクーポン（買い手・amber・一覧を見るだけ／使うのはカート） -->
            <div class="reward-card">
                <div class="reward-card__title"><span class="material-symbols-outlined">confirmation_number</span><span id="coupon-title"></span></div>
                <div id="coupon-body"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { ensureUserReferralCode, fetchUsableCoupons, getReferralSettings } from '/js/referral.js';
        import { getCachedUser } from '/js/data-cache.js';
        import { showToast } from '/js/toast.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }
        function fmtDate(ms) {
            if (ms == null) return '';
            const d = new Date(ms);
            return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
        }

        let referralCode = '--------';

        async function showReferralCode() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            try {
                referralCode = await ensureUserReferralCode(uid, window.currentUserData);
            } catch (e) {
                console.warn('ensureUserReferralCode failed:', e);
                return;
            }
            document.getElementById('referral-code').textContent = referralCode;
        }

        // #177 A5/A6/B8: 使えるクーポン（ウォレット）。一覧表示のみ（使うのはカート）。
        //   各：金額／紹介元名（sourceUid→displayName）／有効期限（30日・運営設定 couponValidDays）。
        //   複数あれば枚数表示＋一覧。0枚なら共有を促す空状態。
        let couponState = null; // { coupons: [{amountKhr, sourceName, expiresAtMs}], settingAmount }
        async function loadCoupons() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            let coupons = [], settingAmount = 0;
            try {
                const raw = await fetchUsableCoupons(uid);
                // 紹介元名を解決（重複 uid はキャッシュ経由で1回）
                coupons = await Promise.all(raw.map(async (c) => {
                    let sourceName = '';
                    if (c.sourceUid) {
                        try {
                            const u = await getCachedUser(c.sourceUid);
                            sourceName = u?.displayName || '';
                        } catch (_) { /* ignore */ }
                    }
                    return { amountKhr: c.amountKhr, sourceName, expiresAtMs: c.expiresAtMs };
                }));
                const s = await getReferralSettings();
                settingAmount = Number(s?.restaurantCouponKhr || 0);
            } catch (e) { console.warn('loadCoupons failed:', e); }
            couponState = { coupons, settingAmount };
            renderCoupons();
        }
        function renderCoupons() {
            const titleEl = document.getElementById('coupon-title');
            const body = document.getElementById('coupon-body');
            if (!titleEl || !body || !couponState) return;
            const { coupons, settingAmount } = couponState;
            if (coupons.length > 1) {
                titleEl.textContent = i18next.t('referral.couponListTitleN', { count: coupons.length });
            } else {
                titleEl.textContent = i18next.t('referral.couponListTitle');
            }
            if (coupons.length === 0) {
                // 2026-07-17 #210③: 桁区切りは 'en-US' 明示（引数なしは端末の既定ロケール依存＝「2.500」に化ける）。
                const amountStr = settingAmount ? settingAmount.toLocaleString('en-US') : '';
                body.innerHTML = `
                    <div class="reward-empty">
                        <div class="re-i"><span class="material-symbols-outlined" style="font-size:30px;">confirmation_number</span></div>
                        <div class="re-t">${i18next.t('referral.emptyCoupon')}</div>
                        <div class="re-p">${i18next.t('referral.shareToEarnCoupon', { amount: amountStr })}</div>
                    </div>`;
                return;
            }
            const rows = coupons.map(c => {
                const amt = i18next.t('referral.couponAmount', { amount: c.amountKhr.toLocaleString('en-US') });
                // i18n は escapeValue:false（グローバル設定）のため name を自前で escapeHtml（XSS対策）
                const meta = c.sourceName
                    ? i18next.t('referral.couponFromExpires', { name: escapeHtml(c.sourceName), date: fmtDate(c.expiresAtMs) })
                    : i18next.t('referral.couponExpires', { date: fmtDate(c.expiresAtMs) });
                return `
                    <div class="coupon-box">
                        <div class="coupon-box__amt">${amt}</div>
                        <div class="coupon-box__meta">${meta}</div>
                        <div class="coupon-box__use"><span class="material-symbols-outlined">shopping_cart</span>${i18next.t('referral.couponUseInCart')}</div>
                    </div>`;
            }).join('');
            const hint = coupons.length > 1 ? i18next.t('referral.couponMultiHint') : i18next.t('referral.amountDynamicHint');
            body.innerHTML = rows + `<div class="reward-hint">${hint}</div>`;
        }

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch (_) { /* ignore */ }
                ta.remove();
            }
        }

        document.getElementById('referral-copy').addEventListener('click', async () => {
            await copyText(referralCode);
            showToast(i18next.t('referral.copied'));
        });

        document.getElementById('referral-share').addEventListener('click', async () => {
            const shareText = i18next.t('referral.shareText', { code: referralCode });
            if (navigator.share) {
                try { await navigator.share({ text: shareText }); } catch (e) { /* cancel */ }
            } else {
                await copyText(shareText);
                showToast(i18next.t('referral.copied'));
            }
        });

        waitForUserData(() => {
            showReferralCode();
            loadCoupons();
            loading.classList.remove('show');
            document.body.classList.add('app-ready');
        });

        onLanguageChange(() => { renderCoupons(); });
    </script>
</body>

</html>
