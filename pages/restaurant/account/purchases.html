<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }

        /* #143 購入・取引：期間ドロップダウン＋辞退・キャンセルチップ */
        .pt-ctrl { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; position: relative; }
        .pt-period { font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 18px; border: 1px solid var(--color-border); background: #fff; color: var(--color-cta); display: flex; align-items: center; gap: 7px; cursor: pointer; font-family: inherit; }
        .pt-period .ar { color: #9aa3b0; font-size: 16px; }
        .pt-pop { display: none; position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, .15); padding: 6px; min-width: 160px; z-index: 30; }
        .pt-pop.show { display: block; }
        .pt-pop__opt { padding: 9px 12px; font-size: 13px; border-radius: 8px; cursor: pointer; color: var(--color-text); }
        .pt-pop__opt.active { background: var(--color-cta-lt); color: var(--color-cta); font-weight: 700; }
        .pt-chip { font-size: 12.5px; font-weight: 700; padding: 8px 14px; border-radius: 18px; border: 1px solid #e8c98a; background: #fff; color: #b36a00; cursor: pointer; font-family: inherit; }
        .pt-chip.on { background: #fbefd9; color: #b36a00; border-color: #e8c98a; }

        .custom-range { display: none; gap: 8px; flex-wrap: wrap; background: #f8fafc; border-radius: 14px; padding: 10px; margin-bottom: 12px; align-items: flex-end; }
        .custom-range.show { display: flex; }
        .custom-range > div { flex: 1; min-width: 120px; }
        .custom-range label { font-size: 11px; color: var(--color-text-sub); }
        .custom-range input { width: 100%; border: 1px solid var(--color-border); border-radius: 10px; padding: 6px 8px; font-size: 16px; font-family: inherit; margin-top: 2px; }
        .custom-range button { border: none; background: var(--color-cta); color: #fff; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

        /* サマリ（購入額＝青） */
        .sm { background: #f8fafc; border: 1px solid var(--color-border); border-radius: 12px; padding: 13px; margin-bottom: 13px; }
        .sm__row { display: flex; gap: 8px; }
        .sm__c { flex: 1; text-align: center; }
        .sm__v { font-size: 16px; font-weight: 800; }
        .sm__v.amt { color: var(--color-cta); }
        .sm__v .u { font-size: 10px; color: var(--color-text-sub); font-weight: 600; }
        .sm__l { font-size: 10px; color: var(--color-text-sub); margin-top: 3px; }

        /* 成立しなかった注文サマリ */
        .dechead { background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 14px; margin-bottom: 13px; text-align: center; }
        .dechead__v { font-size: 18px; font-weight: 800; color: #b36a00; }
        .dechead__l { font-size: 11px; color: var(--color-text-sub); margin-top: 3px; }

        /* 軽いカード */
        .lcard { background: #fff; border: 1px solid var(--color-border); border-radius: 14px; padding: 12px; margin-bottom: 10px; display: flex; gap: 11px; align-items: center; text-decoration: none; color: inherit; }
        .lcard.tap { cursor: pointer; }
        .lcard__th { width: 52px; height: 52px; border-radius: 9px; background: #eef3f7; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #9dbed4; overflow: hidden; }
        .lcard__th img { width: 100%; height: 100%; object-fit: cover; }
        .lcard__th .material-symbols-outlined { font-size: 24px; }
        .lcard__ci { flex: 1; min-width: 0; }
        .lcard__badge { float: right; font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 10px; margin-left: 6px; }
        .lcard__badge--done { background: #eaeff3; color: #42566b; }
        .lcard__badge--dec { background: #fdecea; color: #d14343; }
        .lcard__badge--cancel { background: #eef1f4; color: #7a8593; }
        .lcard__date { font-size: 11.5px; color: var(--color-text-sub); }
        .lcard__name { font-size: 14px; font-weight: 800; margin-top: 2px; }
        .lcard__shop { font-size: 11.5px; margin-top: 2px; color: var(--color-text-sub); }
        .lcard__shop a { color: var(--color-cta); font-weight: 700; text-decoration: none; }
        .lcard__amt { font-size: 11.5px; color: var(--color-text-sub); margin-top: 4px; }
        .lcard__amt b { color: var(--color-text); font-size: 13px; }
        .lcard__chev { color: #c2ccd6; font-size: 20px; font-weight: 700; flex-shrink: 0; }
        .dreason { background: #f8fafc; border: 1px solid var(--color-border); border-radius: 9px; padding: 8px 11px; font-size: 12px; color: var(--color-text-sub); margin-top: 8px; }
        .dreason b { color: #33414e; }

        .view-more { display: block; margin: 6px auto 0; background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--color-cta); }
        .empty-small { text-align: center; padding: 28px 20px; color: var(--color-text-sub); font-size: 13px; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="account.purchaseTradeTitle"></div>

        <div class="sub-page">

            <div class="pt-ctrl">
                <button type="button" class="pt-period" id="period-btn">
                    <span id="period-label"></span><span class="ar material-symbols-outlined">expand_more</span>
                </button>
                <button type="button" class="pt-chip" id="nd-chip" data-i18n="account.declineCancelChip"></button>
                <div class="pt-pop" id="period-pop">
                    <div class="pt-pop__opt" data-period="today" data-i18n="account.periodToday"></div>
                    <div class="pt-pop__opt" data-period="week" data-i18n="account.periodWeek"></div>
                    <div class="pt-pop__opt active" data-period="month" data-i18n="account.periodMonth"></div>
                    <div class="pt-pop__opt" data-period="custom" data-i18n="account.periodCustom"></div>
                    <div class="pt-pop__opt" data-period="all" data-i18n="account.periodAll"></div>
                </div>
            </div>

            <div class="custom-range" id="custom-range">
                <div><label data-i18n="account.customFrom"></label><input type="date" id="range-from"></div>
                <div><label data-i18n="account.customTo"></label><input type="date" id="range-to"></div>
                <button type="button" id="range-apply" data-i18n="account.customApply"></button>
            </div>

            <!-- 通常サマリ -->
            <div class="sm" id="summary-money">
                <div class="sm__row">
                    <div class="sm__c"><div class="sm__v amt" id="sum-amount">0<span class="u"> KHR</span></div><div class="sm__l" data-i18n="account.amountPurchase"></div></div>
                    <div class="sm__c"><div class="sm__v" id="sum-count">0</div><div class="sm__l" data-i18n="account.count"></div></div>
                    <div class="sm__c"><div class="sm__v" id="sum-avg">0<span class="u"> KHR</span></div><div class="sm__l" data-i18n="account.avgPurchase"></div></div>
                </div>
            </div>

            <!-- 成立しなかった注文サマリ -->
            <div class="dechead" id="summary-nd" style="display:none;">
                <div class="dechead__v" id="nd-count"></div>
                <div class="dechead__l" data-i18n="account.notCompletedNoteBuyer"></div>
            </div>

            <div id="trade-list"></div>
            <button class="view-more" id="view-more" style="display:none;" data-i18n="account.viewMore"></button>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { doc, getDoc, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { saveRenderState, loadRenderState, serializeTimestamps, reviveTimestamps } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        let completedTrades = [];   // 成立した取引（delivered/completed）
        let ndTrades = [];          // 成立しなかった（declined/cancelled）
        let currentPeriod = 'month';
        let ndMode = false;
        let customFromMs = 0, customToMs = 0;
        let displayCount = 5;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        const fmtKhr = n => `${Number(n || 0).toLocaleString()} KHR`;
        const WEEKDAY_SHORT = {
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'],
        };
        function fmtDeliveryDate(iso) {
            const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return iso || '';
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];
            return `${Number(m[2])}/${Number(m[3])}（${wd}）`;
        }
        function fishLabel(key) {
            return key ? (i18next.exists(`fish.${key}`) ? i18next.t(`fish.${key}`) : key).trim() : '';
        }
        function fishNameWithQty(t) {
            const items = Array.isArray(t.items) ? t.items : null;
            if (items && items.length > 1) {
                const first = items[0] || {};
                return `${fishLabel(first.snapFishType)}${first.snapSize ? `（${first.snapSize}）` : ''} ${first.quantity || 0}kg`
                    + ` <span style="color:var(--color-text-sub); font-weight:600;">${i18next.t('orders.otherItemsAddon', { n: items.length - 1 })}</span>`;
            }
            const size = t.snapSize ? `（${escapeHtml(t.snapSize)}）` : '';
            return `${escapeHtml(fishLabel(t.snapFishType))}${size} ${t.quantity || 0}kg`;
        }
        function thumbHtml(t) {
            const url = t.snapPhotoUrl || '';
            return url ? `<img src="${escapeHtml(url)}" alt="" loading="lazy">` : `<span class="material-symbols-outlined">set_meal</span>`;
        }
        function periodLabel() {
            return i18next.t(`account.period${currentPeriod.charAt(0).toUpperCase()}${currentPeriod.slice(1)}`);
        }

        function filterByPeriod(trades) {
            if (currentPeriod === 'all') return trades;
            const inRange = (msStart, msEnd) => trades.filter(t => {
                const ms = t.createdAt?.toMillis?.() || 0;
                return ms >= msStart && ms <= msEnd;
            });
            if (currentPeriod === 'today') {
                const s = new Date(); s.setHours(0, 0, 0, 0);
                const e = new Date(); e.setHours(23, 59, 59, 999);
                return inRange(s.getTime(), e.getTime());
            }
            if (currentPeriod === 'week') {
                const e = new Date(); e.setHours(23, 59, 59, 999);
                const s = new Date(); s.setHours(0, 0, 0, 0); s.setDate(s.getDate() - 6);
                return inRange(s.getTime(), e.getTime());
            }
            if (currentPeriod === 'month') {
                const e = new Date(); e.setHours(23, 59, 59, 999);
                const s = new Date(); s.setHours(0, 0, 0, 0); s.setDate(s.getDate() - 29);
                return inRange(s.getTime(), e.getTime());
            }
            if (currentPeriod === 'custom') {
                if (!customFromMs && !customToMs) return trades;
                return trades.filter(t => {
                    const ms = t.createdAt?.toMillis?.() || 0;
                    if (customFromMs && ms < customFromMs) return false;
                    if (customToMs && ms > customToMs) return false;
                    return true;
                });
            }
            return trades;
        }

        function render() {
            document.getElementById('period-label').textContent = periodLabel();
            document.querySelectorAll('#period-pop .pt-pop__opt').forEach(o => o.classList.toggle('active', o.dataset.period === currentPeriod));
            document.getElementById('nd-chip').classList.toggle('on', ndMode);
            document.getElementById('summary-money').style.display = ndMode ? 'none' : 'block';
            document.getElementById('summary-nd').style.display = ndMode ? 'block' : 'none';

            const listEl = document.getElementById('trade-list');

            if (ndMode) {
                const filtered = filterByPeriod(ndTrades);
                document.getElementById('nd-count').textContent = i18next.t('account.notCompletedCount', { count: filtered.length });
                if (filtered.length === 0) {
                    listEl.innerHTML = `<div class="empty-small">${i18next.t('account.emptyHistory')}</div>`;
                    document.getElementById('view-more').style.display = 'none';
                    return;
                }
                const shown = filtered.slice(0, displayCount);
                listEl.innerHTML = shown.map(t => {
                    const isCancel = t.status === 'cancelled';
                    const badge = isCancel
                        ? `<span class="lcard__badge lcard__badge--cancel">${i18next.t('account.cancelledBadge')}</span>`
                        : `<span class="lcard__badge lcard__badge--dec">${i18next.t('delivery.declined')}</span>`;
                    const reason = isCancel
                        ? i18next.t('account.cancelByMe')
                        : i18next.t('account.declineReasonLine', { reason: escapeHtml(t.declineReason || i18next.t('orders.declineReason1')) });
                    return `
                        <div class="lcard" style="flex-wrap:wrap;">
                            <div class="lcard__th">${thumbHtml(t)}</div>
                            <div class="lcard__ci">
                                ${badge}
                                <div class="lcard__date">${fmtDeliveryDate(t.deliveryDateIso)} ${escapeHtml(t.deliveryTime || '')}</div>
                                <div class="lcard__name">${fishNameWithQty(t)}</div>
                                <div class="lcard__shop">${shopLink(t)}</div>
                            </div>
                            <div class="dreason" style="flex-basis:100%;">${reason}</div>
                        </div>`;
                }).join('');
                document.getElementById('view-more').style.display = filtered.length > displayCount ? 'block' : 'none';
                return;
            }

            // 通常（成立した購入）
            const filtered = filterByPeriod(completedTrades);
            const total = filtered.reduce((s, t) => s + (t.totalAmount || 0), 0);
            const count = filtered.length;
            const avg = count > 0 ? Math.round(total / count) : 0;
            document.getElementById('sum-amount').innerHTML = `${Number(total).toLocaleString()}<span class="u"> KHR</span>`;
            document.getElementById('sum-count').textContent = `${count}`;
            document.getElementById('sum-avg').innerHTML = `${Number(avg).toLocaleString()}<span class="u"> KHR</span>`;

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="empty-small">${i18next.t('account.emptyHistory')}</div>`;
                document.getElementById('view-more').style.display = 'none';
                return;
            }
            const shown = filtered.slice(0, displayCount);
            listEl.innerHTML = shown.map(t => `
                <div class="lcard tap" data-id="${t.id}">
                    <div class="lcard__th">${thumbHtml(t)}</div>
                    <div class="lcard__ci">
                        <span class="lcard__badge lcard__badge--done">${i18next.t('account.statusCompleted')}</span>
                        <div class="lcard__date">${fmtDeliveryDate(t.deliveryDateIso)} ${escapeHtml(t.deliveryTime || '')}</div>
                        <div class="lcard__name">${fishNameWithQty(t)}</div>
                        <div class="lcard__shop">${shopLink(t)}</div>
                        <div class="lcard__amt">${i18next.t('account.paidAmount')} <b>${fmtKhr(t.totalAmount)}</b></div>
                    </div>
                    <span class="lcard__chev">›</span>
                </div>`).join('');
            document.getElementById('view-more').style.display = filtered.length > displayCount ? 'block' : 'none';
        }

        function shopLink(t) {
            const name = escapeHtml(t.farmerName || '');
            if (!name) return '';
            return t.farmerId
                ? `<a href="/pages/restaurant/farmer.html?id=${t.farmerId}">${name}</a>`
                : name;
        }

        async function load() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const q = query(collection(db, 'orders'), where('restaurantId', '==', uid), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            completedTrades = [];
            ndTrades = [];
            const fids = new Set();
            snap.forEach(d => {
                const o = d.data();
                const t = { id: d.id, ...o };
                if (['delivered', 'completed'].includes(o.status)) completedTrades.push(t);
                else if (['declined', 'cancelled'].includes(o.status)) ndTrades.push(t);
                else return;
                if (o.farmerId) fids.add(o.farmerId);
            });
            const farmerMap = {};
            await Promise.all([...fids].map(async fid => {
                const s = await getDoc(doc(db, 'users', fid));
                farmerMap[fid] = s.exists() ? s.data() : {};
            }));
            [...completedTrades, ...ndTrades].forEach(t => { t.farmerName = farmerMap[t.farmerId]?.displayName || ''; });
            render();
            try {
                saveRenderState('restaurant_purchases', {
                    completed: serializeTimestamps(completedTrades),
                    nd: serializeTimestamps(ndTrades),
                });
            } catch (e) { /* ignore */ }
        }

        // 取引カードのタップ → 支払い状況画面（レビュー送信/問題報告はそこ）
        document.getElementById('trade-list').addEventListener('click', (e) => {
            if (e.target.closest('a')) return; // 農家名リンクは自前で遷移
            const card = e.target.closest('.lcard.tap');
            if (card && card.dataset.id) location.href = `/pages/restaurant/payment.html?id=${card.dataset.id}`;
        });

        document.getElementById('view-more').addEventListener('click', () => { displayCount += 10; render(); });

        // 期間ドロップダウン
        const periodPop = document.getElementById('period-pop');
        document.getElementById('period-btn').addEventListener('click', (e) => { e.stopPropagation(); periodPop.classList.toggle('show'); });
        document.addEventListener('click', () => periodPop.classList.remove('show'));
        periodPop.addEventListener('click', (e) => {
            const opt = e.target.closest('.pt-pop__opt');
            if (!opt) return;
            currentPeriod = opt.dataset.period;
            periodPop.classList.remove('show');
            document.getElementById('custom-range').classList.toggle('show', currentPeriod === 'custom');
            displayCount = 5;
            render();
        });
        document.getElementById('nd-chip').addEventListener('click', () => { ndMode = !ndMode; displayCount = 5; render(); });
        document.getElementById('range-apply').addEventListener('click', () => {
            const from = document.getElementById('range-from').value;
            const to = document.getElementById('range-to').value;
            customFromMs = from ? new Date(from + 'T00:00:00').getTime() : 0;
            customToMs = to ? new Date(to + 'T23:59:59').getTime() : 0;
            displayCount = 5;
            render();
        });
        onLanguageChange(() => render());

        // 描画キャッシュ
        let cachedRendered = false;
        try {
            const cached = loadRenderState('restaurant_purchases');
            if (cached && (cached.completed || cached.nd)) {
                completedTrades = reviveTimestamps(cached.completed || []);
                ndTrades = reviveTimestamps(cached.nd || []);
                render();
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { console.warn('cached restaurant_purchases render failed:', e); }

        waitForUserData(async () => {
            if (!cachedRendered) loading.classList.add('show');
            try { await load(); } catch (e) { console.error(e); }
            finally { loading.classList.remove('show'); document.body.classList.add('app-ready'); }
        });
    </script>
</body>
</html>
