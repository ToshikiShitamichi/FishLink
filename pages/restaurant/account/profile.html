<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
        .img-actions { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .img-actions button { background: #fff; border: 1px solid var(--color-border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--color-text); font-family: inherit; }
        .img-actions button.danger { color: #b91c1c; border-color: #fecaca; }
        .save-row { display: flex; gap: 8px; margin-top: 14px; }
        .save-row button { flex: 1; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
        /* 6/17 #148 ⑦: 保存は青（CTA）＝既に青 */
        .save-row .save { background: var(--color-cta); color: #fff; }
        .edit-toggle { display: flex; justify-content: flex-end; margin-bottom: 8px; }
        /* 6/17 #148 ⑥: 編集ボタン indigo→青 */
        .edit-btn { background: var(--color-cta-lt); color: var(--color-cta); border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
        /* 6/17 #148 ⑥: キャンセルはグレー維持（編集と同じ .edit-btn を流用しているので上書き） */
        #btn-cancel { background: #eceef0; color: var(--color-text-sub); }
        .label { font-size: 12px; color: var(--color-text-sub); margin-bottom: 8px; }
        /* 6/11 #137 §6: 店のアイコン（円形アバター）。農家プロフィール編集と同じ要領。 */
        .avatar-box { display: flex; justify-content: center; }
        .avatar-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: #fff; border: 1px dashed var(--color-border);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        /* 6/11 #137 §2: お店の紹介文（restaurantMessage） */
        .intro-view { font-size: 14px; color: var(--color-text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .intro-input { width: 100%; border: 1px solid var(--color-border); border-radius: 10px; padding: 8px 10px; font-size: 16px; font-family: inherit; min-height: 80px; resize: vertical; box-sizing: border-box; }
        /* 5/12 #72: 複数写真ギャラリー */
        .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .photos-grid__cell { position: relative; aspect-ratio: 1 / 1; background: #fff; border: 1px dashed var(--color-border); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
        .photos-grid__cell img { width: 100%; height: 100%; object-fit: cover; }
        .photos-grid__remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(15,23,42,.7); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: inherit; }
        .photos-grid__remove .material-symbols-outlined { font-size: 16px; }
        .photos-grid__add { cursor: pointer; }
        .photos-grid__add:hover { background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="profile.restaurantInfoTitle"></div>

        <div class="sub-page">

        <!-- 6/11 #137 §10: 農家から見える公開ページのプレビュー導線（編集はこの画面・公開ページに編集ボタンは置かない） -->
        <a id="preview-public-link" href="#" style="display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:14px; padding:10px; background:var(--color-cta-lt); color:var(--color-cta); border-radius:12px; font-size:13px; font-weight:700; text-decoration:none;">
            <span class="material-symbols-outlined" style="font-size:18px;">visibility</span>
            <span data-i18n="profile.previewPublicPage"></span>
        </a>

        <div class="edit-toggle">
            <button class="edit-btn" id="btn-edit">
                <span class="material-symbols-outlined" style="font-size:14px;">edit</span>
                <span data-i18n="account.edit"></span>
            </button>
        </div>

        <div id="view-mode">
            <!-- 6/11 #137 §6: 店のアイコン（円形アバター・公開ページの丸アイコン） -->
            <div class="label" data-i18n="profile.shopIcon"></div>
            <div class="avatar-box">
                <div class="avatar-circle" id="v-avatar">
                    <span class="material-symbols-outlined" style="font-size:56px;">storefront</span>
                </div>
            </div>
            <!-- お店の紹介（restaurantMessage・公開ページの「お店の紹介」セクション・未記入は公開側で非表示） -->
            <div class="label" data-i18n="profile.shopIntro" style="margin-top:16px;"></div>
            <div class="intro-view" id="v-message">-</div>
            <!-- お店の様子（restaurantPhotos[]・公開ページの「お店の様子」セクション） -->
            <div class="label" data-i18n="profile.shopScene" style="margin-top:16px;"></div>
            <div id="v-photos-grid" class="photos-grid"></div>
        </div>

        <div id="edit-mode" style="display:none;">
            <!-- 6/11 #137 §6: 店のアイコン（円形アバター） -->
            <div class="label" data-i18n="profile.shopIcon"></div>
            <div class="avatar-box">
                <div class="avatar-circle" id="e-avatar">
                    <span class="material-symbols-outlined" style="font-size:56px;">storefront</span>
                </div>
            </div>
            <div class="img-actions">
                <button type="button" id="btn-avatar-upload" data-i18n="profile.uploadPhoto"></button>
                <button type="button" id="btn-avatar-remove" class="danger" data-i18n="profile.removePhoto"></button>
                <input type="file" id="avatar-file" accept="image/*" style="display:none;">
            </div>
            <!-- お店の紹介（restaurantMessage） -->
            <div class="label" data-i18n="profile.shopIntro" style="margin-top:16px;"></div>
            <textarea id="in-message" class="intro-input" rows="3" data-i18n="[placeholder]profile.shopIntroPlaceholder"></textarea>
            <!-- お店の様子（restaurantPhotos[]・最大5枚） -->
            <div class="label" data-i18n="profile.shopScene" style="margin-top:16px;"></div>
            <div id="e-photos-grid" class="photos-grid"></div>
            <input type="file" id="photo-file" accept="image/*" multiple style="display:none;">
            <div class="save-row">
                <button class="edit-btn" id="btn-cancel" style="flex:1;" data-i18n="account.cancel"></button>
                <button class="save" id="btn-save" data-i18n="account.save"></button>
            </div>
        </div>

        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { ref } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { uploadImageResized } from '/js/image-resize.js';
        import { invalidate as invalidateDataCache } from '/js/data-cache.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/25 #91/#92 拡張: 表示パートを render-cache 化
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const MAX_PHOTOS = 5;
        let userData = null;
        // 5/12 #72: restaurantPhotos[] を一級扱い。restaurantPhotoUrl は配列の [0] として書き戻して互換維持。
        // 6/11 #137 §6: 店のアイコン（avatarUrl）も編集対象に追加（農家プロフィール編集と同じ状態管理）。
        let editState = { photos: [], avatarUrl: null, avatarFile: null, avatarRemoved: false };

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 6/11 #137 §6: アイコン円形プレビュー（未設定は storefront デフォルト）
        function showAvatar(id, url) {
            const box = document.getElementById(id);
            if (url) {
                box.innerHTML = `<img ${asCachedImgAttrs(url)} alt="avatar">`;
            } else {
                box.innerHTML = `<span class="material-symbols-outlined" style="font-size:56px;">storefront</span>`;
            }
        }

        function readRestaurantPhotos(u) {
            if (Array.isArray(u?.restaurantPhotos) && u.restaurantPhotos.length > 0) {
                return u.restaurantPhotos.filter(Boolean);
            }
            return u?.restaurantPhotoUrl ? [u.restaurantPhotoUrl] : [];
        }

        function renderViewGrid(urls) {
            const grid = document.getElementById('v-photos-grid');
            if (urls.length === 0) {
                grid.innerHTML = `<div class="photos-grid__cell"><span class="material-symbols-outlined" style="font-size:36px;">storefront</span></div>`;
                return;
            }
            grid.innerHTML = urls.map(u => `<div class="photos-grid__cell"><img ${asCachedImgAttrs(u)} alt="restaurant" loading="lazy"></div>`).join('');
        }

        function renderEditGrid() {
            const grid = document.getElementById('e-photos-grid');
            const cells = editState.photos.map((p, i) => {
                const src = p.url || p.previewDataUrl || '';
                return `<div class="photos-grid__cell" data-idx="${i}">
                    ${src ? `<img ${asCachedImgAttrs(src)} alt="">` : ''}
                    <button type="button" class="photos-grid__remove" data-act="remove" data-idx="${i}" aria-label="remove">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>`;
            }).join('');
            const addCell = editState.photos.length < MAX_PHOTOS
                ? `<div class="photos-grid__cell photos-grid__add" id="photo-add-cell">
                        <span class="material-symbols-outlined" style="font-size:36px;">add_a_photo</span>
                   </div>` : '';
            grid.innerHTML = cells + addCell;
            grid.querySelectorAll('[data-act="remove"]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const i = Number(btn.dataset.idx);
                    editState.photos.splice(i, 1);
                    renderEditGrid();
                });
            });
            const addCellEl = document.getElementById('photo-add-cell');
            if (addCellEl) {
                addCellEl.addEventListener('click', () => document.getElementById('photo-file').click());
            }
        }

        function renderView() {
            renderViewGrid(readRestaurantPhotos(userData));
            showAvatar('v-avatar', userData.avatarUrl || null);
            // 6/11 #137 §2: お店の紹介（restaurantMessage）。未記入は「-」。公開側は空ならセクション非表示。
            document.getElementById('v-message').textContent = userData.restaurantMessage || '-';
            // 5/25 #91/#92 拡張: 次回訪問用にキャッシュ保存
            try {
                saveRenderState('restaurant_account_profile', {
                    gridHtml: document.getElementById('v-photos-grid')?.innerHTML || '',
                    avatarHtml: document.getElementById('v-avatar')?.innerHTML || '',
                    messageText: document.getElementById('v-message')?.textContent || '',
                });
            } catch (e) { /* ignore */ }
        }

        // 5/25 #91/#92 拡張: ページ初期化前にキャッシュから即時復元
        (function applyCache() {
            try {
                const cached = loadRenderState('restaurant_account_profile');
                if (!cached) return;
                const g = document.getElementById('v-photos-grid');
                if (g && cached.gridHtml) g.innerHTML = cached.gridHtml;
                const a = document.getElementById('v-avatar');
                if (a && cached.avatarHtml) a.innerHTML = cached.avatarHtml;
                const m = document.getElementById('v-message');
                if (m && cached.messageText) m.textContent = cached.messageText;
            } catch (e) { /* ignore */ }
        })();

        document.getElementById('btn-edit').addEventListener('click', () => {
            editState = {
                photos: readRestaurantPhotos(userData).map(url => ({ url })),
                avatarUrl: userData.avatarUrl || null, avatarFile: null, avatarRemoved: false,
            };
            renderEditGrid();
            showAvatar('e-avatar', editState.avatarUrl);
            document.getElementById('in-message').value = userData.restaurantMessage || '';
            document.getElementById('view-mode').style.display = 'none';
            document.getElementById('edit-mode').style.display = 'block';
            document.getElementById('btn-edit').style.display = 'none';
        });
        document.getElementById('btn-cancel').addEventListener('click', () => {
            document.getElementById('view-mode').style.display = 'block';
            document.getElementById('edit-mode').style.display = 'none';
            document.getElementById('btn-edit').style.display = 'inline-flex';
        });
        document.getElementById('photo-file').addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            for (const file of files) {
                if (editState.photos.length >= MAX_PHOTOS) break;
                const entry = { file };
                editState.photos.push(entry);
                const reader = new FileReader();
                reader.onload = (ev) => { entry.previewDataUrl = ev.target.result; renderEditGrid(); };
                reader.readAsDataURL(file);
            }
            renderEditGrid();
            e.target.value = '';
        });
        // 6/11 #137 §6: 店のアイコン（avatarUrl）のアップロード/削除（農家プロフィール編集と同じ要領）
        document.getElementById('btn-avatar-upload').addEventListener('click', () => document.getElementById('avatar-file').click());
        document.getElementById('avatar-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            editState.avatarFile = file;
            editState.avatarRemoved = false;
            const reader = new FileReader();
            reader.onload = (ev) => showAvatar('e-avatar', ev.target.result);
            reader.readAsDataURL(file);
        });
        document.getElementById('btn-avatar-remove').addEventListener('click', () => {
            editState.avatarFile = null;
            editState.avatarRemoved = true;
            editState.avatarUrl = null;
            document.getElementById('avatar-file').value = '';
            showAvatar('e-avatar', null);
        });
        document.getElementById('btn-save').addEventListener('click', async () => {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            loading.classList.add('show');
            try {
                // 6/11 #137 §2: お店の紹介文（restaurantMessage）
                const restaurantMessage = document.getElementById('in-message').value.trim();
                const restaurantPhotos = [];
                for (const p of editState.photos) {
                    if (p.url) { restaurantPhotos.push(p.url); continue; }
                    if (p.file) {
                        const baseName = (p.file.name || 'rest').replace(/\.[^.]+$/, '');
                        const storageRef = ref(storage, `profile/${uid}/rest_${Date.now()}_${baseName}.jpg`);
                        const url = await uploadImageResized(storageRef, p.file);
                        restaurantPhotos.push(url);
                    }
                }
                const restaurantPhotoUrl = restaurantPhotos[0] || null;

                // 6/11 #137 §6: 店のアイコン（avatarUrl）。新規ファイルはリサイズしてアップロード（最大512px）。
                let avatarUrl = editState.avatarUrl;
                if (editState.avatarFile) {
                    const baseName = (editState.avatarFile.name || 'avatar').replace(/\.[^.]+$/, '');
                    const storageRef = ref(storage, `profile/${uid}/avatar_${Date.now()}_${baseName}.jpg`);
                    avatarUrl = await uploadImageResized(storageRef, editState.avatarFile, {
                        resize: { maxWidth: 512, maxHeight: 512 },
                    });
                } else if (editState.avatarRemoved) {
                    avatarUrl = null;
                }

                await updateDoc(doc(db, 'users', uid), {
                    restaurantPhotos,
                    restaurantPhotoUrl,
                    avatarUrl: avatarUrl || null,
                    restaurantMessage: restaurantMessage || null,
                });
                // 5/12 #69 追補：他画面のキャッシュにも反映させるため自分のドキュメントキャッシュを破棄
                invalidateDataCache('users', uid);
                userData.restaurantPhotos = restaurantPhotos;
                userData.restaurantPhotoUrl = restaurantPhotoUrl;
                userData.avatarUrl = avatarUrl || null;
                userData.restaurantMessage = restaurantMessage || null;
                renderView();
                document.getElementById('btn-cancel').click();
            } catch (err) {
                console.error(err);
                alert(i18next.t('account.saveFailed'));
            } finally {
                btn.disabled = false;
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        waitForUserData(() => {
            userData = { ...window.currentUserData };
            renderView();
            // 6/11 #137 §10: 「農家から見える公開ページ」プレビューへのリンク（自分の uid を渡す）
            const uid = window.currentUser?.uid;
            const pl = document.getElementById('preview-public-link');
            if (uid && pl) pl.href = `/pages/farmer/restaurant.html?id=${uid}`;
            loading.classList.remove('show'); document.body.classList.add('app-ready');
        });
    </script>
</body>
</html>
