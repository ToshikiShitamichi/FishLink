<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .review-page { max-width: 480px; margin: 0 auto; padding: 16px 16px 120px; }
        .review-head { text-align: center; margin-bottom: 14px; }
        .review-head__title { font-size: 22px; font-weight: 700; color: var(--color-text); }
        .review-head__sub { font-size: 13px; color: var(--color-text-sub); margin-top: 4px; }

        .target-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 18px;
            padding: 14px 16px;
            margin-bottom: 14px;
        }
        .target-card__label { font-size: 12px; color: var(--color-text-sub); }
        .target-card__name { font-size: 18px; font-weight: 700; color: var(--color-text); margin-top: 4px; }
        .target-card__fish { font-size: 13px; color: var(--color-text-sub); margin-top: 2px; }
        .target-card__date { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }

        .rating-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .rating-section__label { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--color-text); }
        .verdict-row {
            display: flex; gap: 10px;
        }
        .verdict-btn {
            flex: 1;
            border: 2px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            border-radius: 14px;
            padding: 14px 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px;
            transition: background .12s, color .12s, border-color .12s;
        }
        .verdict-btn .material-symbols-outlined { font-size: 28px; }
        .verdict-btn.selected.good {
            background: #ecfdf5; color: #047857; border-color: #16a34a;
        }
        .verdict-btn.selected.bad {
            background: #fef2f2; color: #b91c1c; border-color: #dc2626;
        }

        .comment-section textarea {
            width: 100%;
            min-height: 90px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 16px;
            font-family: inherit;
            background: #f9fafb;
            resize: vertical;
        }
        .comment-section textarea:focus { outline: none; border-color: var(--color-primary); background: #fff; }

        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-submit-review {
            background: #f97316;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-report {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 14px;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-report .material-symbols-outlined { font-size: 18px; }

        .error-msg { font-size: 13px; color: #b91c1c; padding: 6px 12px; }

        .submitted-state {
            text-align: center;
            padding: 40px 20px;
        }
        .submitted-state__icon { font-size: 60px; color: #16a34a; }
        .submitted-state__text { font-size: 16px; font-weight: 700; margin-top: 8px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="/pages/restaurant/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="review.title"></div>
    </div>

    <div class="review-page">

        <div id="main-view">
            <div class="review-head">
                <div class="review-head__title" data-i18n="review.title"></div>
                <div class="review-head__sub" data-i18n="review.subtitle"></div>
            </div>

            <div class="target-card">
                <div class="target-card__label" data-i18n="review.target"></div>
                <div class="target-card__name" id="target-name">-</div>
                <div class="target-card__fish" id="target-fish">-</div>
                <div class="target-card__date" id="target-date"></div>
            </div>

            <div class="rating-section">
                <div class="rating-section__label" data-i18n="review.restSide_overall"></div>
                <div class="verdict-row" data-group="overall"></div>
            </div>

            <div class="rating-section">
                <div class="rating-section__label" data-i18n="review.restSide_quality"></div>
                <div class="verdict-row" data-group="quality"></div>
            </div>

            <div class="rating-section">
                <div class="rating-section__label" data-i18n="review.restSide_time"></div>
                <div class="verdict-row" data-group="time"></div>
            </div>

            <div class="rating-section comment-section">
                <div class="rating-section__label" data-i18n="review.comment"></div>
                <textarea id="comment-input" data-i18n="[placeholder]review.commentPlaceholderRest"></textarea>
            </div>

            <div class="error-msg" id="error-msg" style="display:none;"></div>
        </div>

        <div id="submitted-view" style="display:none;">
            <div class="submitted-state">
                <span class="material-symbols-outlined submitted-state__icon">check_circle</span>
                <div class="submitted-state__text" data-i18n="review.thanks"></div>
                <a href="/pages/restaurant/orders.html" style="display:inline-block; margin-top:18px; background:#0f172a; color:#fff; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:700; font-size:14px;" data-i18n="review.backToOrders"></a>
            </div>
        </div>
    </div>

    <div class="footer-actions" id="footer-actions">
        <button class="btn-submit-review" id="submit-btn" data-i18n="review.submit"></button>
        <a class="btn-report" id="report-link" href="#">
            <span class="material-symbols-outlined">flag</span>
            <span data-i18n="review.reportIssue"></span>
        </a>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            doc, getDoc, setDoc, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const orderId = new URLSearchParams(location.search).get('id');
        if (!orderId) { location.href = '/pages/restaurant/orders.html'; }

        document.getElementById('report-link').href = `/pages/restaurant/report.html?id=${orderId}`;

        // 2段階評価（よい / 残念だった）ボタン生成
        function initVerdict(group) {
            const row = document.querySelector(`.verdict-row[data-group="${group}"]`);
            // 動的挿入のため i18next.t() で直接展開（data-i18n は applyTranslations 済みの後では解釈されない）
            row.innerHTML = `
                <button type="button" class="verdict-btn good" data-value="good">
                    <span class="material-symbols-outlined">thumb_up</span>
                    <span>${i18next.t('review.verdictGood')}</span>
                </button>
                <button type="button" class="verdict-btn bad" data-value="bad">
                    <span class="material-symbols-outlined">thumb_down</span>
                    <span>${i18next.t('review.verdictBad')}</span>
                </button>`;
            row.querySelectorAll('.verdict-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    row.querySelectorAll('.verdict-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    row.dataset.value = btn.dataset.value;
                });
            });
        }
        ['overall', 'quality', 'time'].forEach(initVerdict);

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        let orderData = null;
        let alreadySubmitted = false;

        waitForUserData(async () => {
            loading.classList.add('show');
            try {
                const orderSnap = await getDoc(doc(db, 'orders', orderId));
                if (!orderSnap.exists()) { location.href = '/pages/restaurant/orders.html'; return; }
                orderData = orderSnap.data();

                if (orderData.restaurantId !== window.currentUser.uid) {
                    alert('Not allowed');
                    location.href = '/pages/restaurant/orders.html';
                    return;
                }

                // 既レビュー確認
                const existSnap = await getDoc(doc(db, 'orders', orderId, 'reviews', 'restaurant'));
                if (existSnap.exists()) {
                    alreadySubmitted = true;
                    document.getElementById('main-view').style.display = 'none';
                    document.getElementById('footer-actions').style.display = 'none';
                    document.getElementById('submitted-view').style.display = 'block';
                    document.querySelector('.submitted-state__text').textContent = i18next.t('review.alreadySubmitted');
                    return;
                }

                // 対象農家情報
                const farmerSnap = await getDoc(doc(db, 'users', orderData.farmerId));
                const farmer = farmerSnap.data() || {};
                document.getElementById('target-name').textContent = farmer.displayName || '-';
                const fishTypeKey = orderData.snapFishType || '';
                const fishName = i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey;
                const shortName = fishName ? fishName.trim() : '';
                document.getElementById('target-fish').textContent = `${shortName} ${orderData.quantity || 0}kg`;
                document.getElementById('target-date').textContent = i18next.t('review.orderOn', { date: orderData.deliveryDate || '' });
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show');
            }
        });

        // 送信
        document.getElementById('submit-btn').addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            const overall = document.querySelector('.verdict-row[data-group="overall"]').dataset.value;
            const quality = document.querySelector('.verdict-row[data-group="quality"]').dataset.value;
            const time = document.querySelector('.verdict-row[data-group="time"]').dataset.value;

            if (!overall || !quality || !time) {
                errorMsg.textContent = i18next.t('review.errorRating');
                errorMsg.style.display = 'block';
                return;
            }

            const comment = document.getElementById('comment-input').value.trim();

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            loading.classList.add('show');
            try {
                await setDoc(doc(db, 'orders', orderId, 'reviews', 'restaurant'), {
                    fromUid: window.currentUser.uid,
                    fromRole: 'restaurant',
                    toUid: orderData.farmerId,
                    orderId,
                    verdict: overall,                  // 'good' | 'bad'
                    subVerdicts: { quality, time },    // 各サブ評価
                    comment: comment || null,
                    createdAt: serverTimestamp(),
                });
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('footer-actions').style.display = 'none';
                document.getElementById('submitted-view').style.display = 'block';
            } catch (err) {
                console.error(err);
                errorMsg.textContent = i18next.t('review.errorSubmit');
                errorMsg.style.display = 'block';
                btn.disabled = false;
            } finally {
                loading.classList.remove('show');
            }
        });
    </script>
</body>

</html>
