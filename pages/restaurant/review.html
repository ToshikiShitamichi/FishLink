<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .review-page { max-width: 480px; margin: 0 auto; padding: 16px 16px 120px; }
        .review-head { text-align: center; margin-bottom: 14px; }
        .review-head__title { font-size: 22px; font-weight: 700; color: var(--color-text); }
        .review-head__sub { font-size: 13px; color: var(--color-text-sub); margin-top: 4px; }

        .target-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 18px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .target-card__label { font-size: 12px; color: var(--color-text-sub); }
        .target-card__name { font-size: 18px; font-weight: 700; color: var(--color-text); margin-top: 4px; }
        .target-card__fish { font-size: 13px; color: var(--color-text-sub); margin-top: 2px; }
        .target-card__date { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        /* 6/5 #128: 評価対象に FL番号 を表示（実名＋FL番号） */
        .target-card__fl { font-size: 11px; color: #9aa3b0; font-family: ui-monospace, Menlo, monospace; margin-top: 6px; }

        /* 6/5 #128: 上部ガイド「3つすべて選んでください（コメントは任意）」 */
        .review-guide {
            display: flex; gap: 7px; align-items: center;
            background: var(--color-cta-lt);
            border: 1px solid #d5e6f8;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 13px; font-weight: 700; color: var(--color-cta);
        }
        .review-guide .material-symbols-outlined { font-size: 18px; }

        /* 6/5 #128: 3軸を1カードに区切り線でまとめて圧縮（大ボタンは維持） */
        .rating-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 18px;
            padding: 4px 16px;
            margin-bottom: 12px;
        }
        .axis { padding: 14px 0; }
        .axis__label { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--color-text); }
        .axis-div { border-top: 1px solid var(--color-border); }
        .axis__err {
            display: none;
            color: var(--color-danger);
            font-size: 12.5px; font-weight: 700; margin-top: 8px;
            align-items: center; gap: 4px;
        }
        .axis.err .axis__err { display: flex; }
        .axis.err .verdict-btn { border-color: var(--color-danger); }

        .verdict-row { display: flex; gap: 10px; }
        .verdict-btn {
            flex: 1;
            border: 2px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-sub);
            border-radius: 14px;
            padding: 14px 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px;
            transition: background .12s, color .12s, border-color .12s;
        }
        .verdict-btn .material-symbols-outlined { font-size: 30px; }
        .verdict-btn.selected.good {
            background: #ecfdf5; color: #047857; border-color: #16a34a;
        }
        .verdict-btn.selected.bad {
            background: #fef2f2; color: #b91c1c; border-color: #dc2626;
        }

        .comment-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .comment-card.prompted { border-color: #f3d998; }
        /* 6/5 #128:「残念だった」選択時にコメントを軽く促す（任意・強制しない） */
        .comment-prompt {
            display: flex; gap: 7px; align-items: flex-start;
            background: #fff7e6; border: 1px solid #f3d998; border-radius: 10px;
            padding: 9px 11px; margin-bottom: 10px;
            font-size: 12.5px; color: #b36a00; font-weight: 700; line-height: 1.5;
        }
        .comment-prompt .material-symbols-outlined { font-size: 18px; flex-shrink: 0; }
        .comment-card__label { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--color-text); }
        .comment-card textarea {
            width: 100%;
            min-height: 90px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 16px;
            font-family: inherit;
            background: #f9fafb;
            resize: vertical;
        }
        .comment-card textarea:focus { outline: none; border-color: var(--color-cta); background: #fff; }

        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* 6/5 #128: 送信ボタン オレンジ → 青（CTA） */
        .btn-submit-review {
            background: var(--color-cta);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        /* 6/5 #128: 下部は総括のみ（どの軸かはインラインで指摘済み） */
        .error-msg { font-size: 13px; color: var(--color-danger); font-weight: 700; padding: 4px 12px 6px; text-align: center; }

        .submitted-state {
            text-align: center;
            padding: 40px 20px;
        }
        .submitted-state__icon { font-size: 60px; color: #16a34a; }
        .submitted-state__text { font-size: 16px; font-weight: 700; margin-top: 8px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="/pages/restaurant/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>
    </div>

    <div class="review-page">

        <div id="main-view">
            <!-- 6/5 #128: 見出しは1つ（「レビュー／取引を評価してください」）。重複の sub-page__title は撤去 -->
            <div class="review-head">
                <div class="review-head__title" data-i18n="review.title"></div>
                <div class="review-head__sub" data-i18n="review.subtitle"></div>
            </div>

            <div class="target-card">
                <div class="target-card__label" data-i18n="review.target"></div>
                <div class="target-card__name" id="target-name">-</div>
                <div class="target-card__fish" id="target-fish">-</div>
                <div class="target-card__date" id="target-date"></div>
                <div class="target-card__fl" id="target-fl"></div>
            </div>

            <div class="review-guide">
                <span class="material-symbols-outlined">check_circle</span>
                <span data-i18n="review.guide"></span>
            </div>

            <!-- 6/5 #128: 3軸を1カードに区切り線でまとめる -->
            <div class="rating-card">
                <div class="axis" data-axis="overall">
                    <div class="axis__label" data-i18n="review.restSide_overall"></div>
                    <div class="verdict-row" data-group="overall"></div>
                    <div class="axis__err"><span class="material-symbols-outlined" style="font-size:16px;">error</span><span data-i18n="review.errorAxis"></span></div>
                </div>
                <div class="axis-div"></div>
                <div class="axis" data-axis="quality">
                    <div class="axis__label" data-i18n="review.restSide_quality"></div>
                    <div class="verdict-row" data-group="quality"></div>
                    <div class="axis__err"><span class="material-symbols-outlined" style="font-size:16px;">error</span><span data-i18n="review.errorAxis"></span></div>
                </div>
                <div class="axis-div"></div>
                <div class="axis" data-axis="time">
                    <div class="axis__label" data-i18n="review.restSide_time"></div>
                    <div class="verdict-row" data-group="time"></div>
                    <div class="axis__err"><span class="material-symbols-outlined" style="font-size:16px;">error</span><span data-i18n="review.errorAxis"></span></div>
                </div>
            </div>

            <div class="comment-card" id="comment-card">
                <!-- 6/5 #128:「残念だった」選択時に表示するコメント促し（任意） -->
                <div class="comment-prompt" id="comment-prompt" style="display:none;">
                    <span class="material-symbols-outlined">forum</span>
                    <span data-i18n="review.commentPromptBad"></span>
                </div>
                <div class="comment-card__label" data-i18n="review.comment"></div>
                <textarea id="comment-input" data-i18n="[placeholder]review.commentPlaceholderRest"></textarea>
            </div>

            <div class="error-msg" id="error-msg" style="display:none;"></div>
        </div>

        <div id="submitted-view" style="display:none;">
            <div class="submitted-state">
                <span class="material-symbols-outlined submitted-state__icon">check_circle</span>
                <div class="submitted-state__text" data-i18n="review.thanks"></div>
                <a href="/pages/restaurant/orders.html" style="display:inline-block; margin-top:18px; background:var(--color-cta); color:#fff; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:700; font-size:14px;" data-i18n="review.backToOrderStatus"></a>
            </div>
        </div>
    </div>

    <!-- 6/5 #128: 問題を報告はこの画面に置かない（完了済みカード＋支払い画面に集約）。送信ボタンのみ -->
    <div class="footer-actions" id="footer-actions">
        <button class="btn-submit-review" id="submit-btn" data-i18n="review.submit"></button>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            doc, getDoc, setDoc, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 対象注文情報を render-cache 化
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/5 #128: コメントの連絡先マスク（#120 流用・中抜き対策）
        import { maskContacts } from '/js/contact-mask.js';
        // 6/5 #128: FL番号表示
        import { getOrderNumber } from '/js/order-utils.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const orderId = new URLSearchParams(location.search).get('id');
        if (!orderId) { location.href = '/pages/restaurant/orders.html'; }

        const AXES = ['overall', 'quality', 'time'];

        // 5/25 #91/#92 拡張: 対象注文の表示部を render-cache から即時復元
        (function applyCache() {
            try {
                const cached = loadRenderState(`restaurant_review:${orderId}`);
                if (!cached) return;
                const nameEl = document.getElementById('target-name');
                const fishEl = document.getElementById('target-fish');
                const dateEl = document.getElementById('target-date');
                const flEl = document.getElementById('target-fl');
                if (nameEl && cached.targetName) nameEl.textContent = cached.targetName;
                if (fishEl && cached.targetFish) fishEl.textContent = cached.targetFish;
                if (dateEl && cached.targetDate) dateEl.textContent = cached.targetDate;
                if (flEl && cached.targetFl) flEl.textContent = cached.targetFl;
            } catch (e) { /* ignore */ }
        })();

        // 6/5 #128:「残念だった」がひとつでもあればコメントを軽く促す（強制しない）
        function updateBadPrompt() {
            const anyBad = AXES.some(g => document.querySelector(`.verdict-row[data-group="${g}"]`).dataset.value === 'bad');
            document.getElementById('comment-prompt').style.display = anyBad ? 'flex' : 'none';
            document.getElementById('comment-card').classList.toggle('prompted', anyBad);
        }

        // 2段階評価（良かった / 残念だった）ボタン生成
        // 6/5 #128: アイコンは絵文字でなく線画スマイリー（良かった=笑顔/残念=困り顔）
        function initVerdict(group) {
            const row = document.querySelector(`.verdict-row[data-group="${group}"]`);
            // 動的挿入のため i18next.t() で直接展開（data-i18n は applyTranslations 済みの後では解釈されない）
            row.innerHTML = `
                <button type="button" class="verdict-btn good" data-value="good">
                    <span class="material-symbols-outlined">sentiment_satisfied</span>
                    <span>${i18next.t('review.verdictGood')}</span>
                </button>
                <button type="button" class="verdict-btn bad" data-value="bad">
                    <span class="material-symbols-outlined">sentiment_dissatisfied</span>
                    <span>${i18next.t('review.verdictBad')}</span>
                </button>`;
            row.querySelectorAll('.verdict-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    row.querySelectorAll('.verdict-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    row.dataset.value = btn.dataset.value;
                    // 6/5 #128: 選択でその軸のインラインエラーを解消
                    document.querySelector(`.axis[data-axis="${group}"]`).classList.remove('err');
                    updateBadPrompt();
                });
            });
        }
        AXES.forEach(initVerdict);

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        let orderData = null;
        let alreadySubmitted = false;

        waitForUserData(async () => {
            loading.classList.add('show');
            try {
                const orderSnap = await getDoc(doc(db, 'orders', orderId));
                if (!orderSnap.exists()) { location.href = '/pages/restaurant/orders.html'; return; }
                orderData = orderSnap.data();

                if (orderData.restaurantId !== window.currentUser.uid) {
                    alert('Not allowed');
                    location.href = '/pages/restaurant/orders.html';
                    return;
                }

                // 既レビュー確認
                const existSnap = await getDoc(doc(db, 'orders', orderId, 'reviews', 'restaurant'));
                if (existSnap.exists()) {
                    alreadySubmitted = true;
                    document.getElementById('main-view').style.display = 'none';
                    document.getElementById('footer-actions').style.display = 'none';
                    document.getElementById('submitted-view').style.display = 'block';
                    document.querySelector('.submitted-state__text').textContent = i18next.t('review.alreadySubmitted');
                    return;
                }

                // 対象農家情報
                const farmerSnap = await getDoc(doc(db, 'users', orderData.farmerId));
                const farmer = farmerSnap.data() || {};
                document.getElementById('target-name').textContent = farmer.displayName || '-';
                const fishTypeKey = orderData.snapFishType || '';
                const fishName = i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey;
                const shortName = fishName ? fishName.trim() : '';
                document.getElementById('target-fish').textContent = `${shortName} ${orderData.quantity || 0}kg`;
                document.getElementById('target-date').textContent = i18next.t('review.orderOn', { date: orderData.deliveryDate || '' });
                // 6/5 #128: FL番号（実名＋FL番号）
                document.getElementById('target-fl').textContent = getOrderNumber({ id: orderId, ...orderData });
                // 5/25 #91/#92 拡張: 次回訪問用に表示部をキャッシュ
                try {
                    saveRenderState(`restaurant_review:${orderId}`, {
                        targetName: document.getElementById('target-name')?.textContent || '',
                        targetFish: document.getElementById('target-fish')?.textContent || '',
                        targetDate: document.getElementById('target-date')?.textContent || '',
                        targetFl: document.getElementById('target-fl')?.textContent || '',
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        // 6/5 #128: バリデーションはインライン方式（未選択軸＝赤枠＋その場「選択してください」
        //           ＋最初の未選択軸へ自動スクロール／下部は総括のみ／ボタンは無効化しない）
        function validateInline() {
            let firstErr = null;
            AXES.forEach(g => {
                const axis = document.querySelector(`.axis[data-axis="${g}"]`);
                const val = document.querySelector(`.verdict-row[data-group="${g}"]`).dataset.value;
                if (!val) {
                    axis.classList.add('err');
                    if (!firstErr) firstErr = axis;
                } else {
                    axis.classList.remove('err');
                }
            });
            if (firstErr) {
                errorMsg.textContent = i18next.t('review.errorSummary');
                errorMsg.style.display = 'block';
                firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return false;
            }
            errorMsg.style.display = 'none';
            return true;
        }

        // 送信
        document.getElementById('submit-btn').addEventListener('click', async () => {
            if (!validateInline()) return;

            const overall = document.querySelector('.verdict-row[data-group="overall"]').dataset.value;
            const quality = document.querySelector('.verdict-row[data-group="quality"]').dataset.value;
            const time = document.querySelector('.verdict-row[data-group="time"]').dataset.value;

            // 6/5 #128: コメントの連絡先マスク（公開テキスト＝両方向に適用）。原文は運営閲覧用に rawComment へ
            const rawComment = document.getElementById('comment-input').value.trim();
            const { masked, hit } = maskContacts(rawComment);

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            loading.classList.add('show');
            try {
                await setDoc(doc(db, 'orders', orderId, 'reviews', 'restaurant'), {
                    fromUid: window.currentUser.uid,
                    fromRole: 'restaurant',
                    toUid: orderData.farmerId,
                    orderId,
                    verdict: overall,                  // 'good' | 'bad'
                    subVerdicts: { quality, time },    // 各サブ評価
                    comment: rawComment ? masked : null,   // 公開はマスク後
                    rawComment: rawComment || null,        // 原文（運営閲覧用）
                    masked: !!hit,                         // マスク発動有無
                    hidden: false,                         // モデレーションで非表示にされたか
                    createdAt: serverTimestamp(),
                });
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('footer-actions').style.display = 'none';
                document.getElementById('submitted-view').style.display = 'block';
            } catch (err) {
                console.error(err);
                errorMsg.textContent = i18next.t('review.errorSubmit');
                errorMsg.style.display = 'block';
                btn.disabled = false;
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });
    </script>
</body>

</html>
