<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-item {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 14px;
            margin-bottom: 12px;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .order-item__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .order-item__fish { font-size: 16px; font-weight: 700; }
        .order-item__status {
            font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px;
        }
        .st-pending { background: #fef3c7; color: #92400e; }
        .st-approved { background: #dbeafe; color: #1e40af; }
        .st-preparing { background: #fef9c3; color: #854d0e; }
        .st-delivering { background: #d1fae5; color: #065f46; }
        .st-delivered { background: #ede9fe; color: #5b21b6; }
        .st-completed { background: #f0fdf4; color: #166534; }
        .st-declined { background: #fef2f2; color: #991b1b; }
        .order-item__meta { font-size: 13px; color: var(--color-text-sub); line-height: 1.6; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-sub); }
        .empty-state__icon { font-size: 48px; margin-bottom: 12px; }
        .section-label {
            padding: 10px 16px; font-size: 14px; font-weight: 700; color: var(--color-text);
            background: #f0fdf4; border-left: 4px solid #16a34a;
            margin: 12px 0 8px; border-radius: 0 8px 8px 0;
        }
        .section-label.pending-label { background: #fef3c7; border-left-color: #f59e0b; }
        .section-label.delivered-label { background: #ede9fe; border-left-color: #8b5cf6; }
        .section-label.payment-label { background: #ffedd5; border-left-color: #ea580c; }
        .accordion-header {
            padding: 12px 16px; margin: 12px 0 0; background: #f5f5f5; border-radius: 12px;
            cursor: pointer; font-size: 14px; font-weight: 600; color: var(--color-text-sub);
            border: 1px solid var(--color-border);
        }
        .accordion-body { display: none; }
        .accordion-body.open { display: block; }

        /* お支払い待ちカード（強調版） */
        .order-item.pay-now {
            border: 2px solid #f97316;
            background: linear-gradient(180deg, #fff7ed, #fff);
            box-shadow: 0 2px 10px rgba(249, 115, 22, 0.15);
        }
        .order-item.pay-now.overdue {
            border-color: #dc2626;
            background: linear-gradient(180deg, #fef2f2, #fff);
            box-shadow: 0 2px 10px rgba(220, 38, 38, 0.18);
        }
        .pay-now__amount {
            font-size: 22px; font-weight: 800; color: #c2410c;
            margin-top: 6px; line-height: 1.1;
        }
        .order-item.pay-now.overdue .pay-now__amount { color: #b91c1c; }
        .pay-now__deadline {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 700;
            background: #fff7ed; color: #9a3412;
            padding: 4px 10px; border-radius: 999px;
            margin-top: 6px;
        }
        .order-item.pay-now.overdue .pay-now__deadline {
            background: #fee2e2; color: #991b1b;
        }
        .pay-now__deadline .material-symbols-outlined { font-size: 14px; }
        .pay-now__cta {
            display: block; margin-top: 10px;
            background: #f97316; color: #fff;
            text-align: center; padding: 10px;
            border-radius: 12px; font-weight: 700; font-size: 14px;
            text-decoration: none;
        }
        .order-item.pay-now.overdue .pay-now__cta { background: #dc2626; }

        /* カード + アクション群を1ブロックとして視覚的にまとめる */
        .order-block {
            margin-bottom: 12px;
        }
        .order-block.has-actions .order-item {
            margin-bottom: 0;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: none;
        }
        .order-block.has-actions .order-actions {
            display: flex;
            gap: 6px;
            padding: 8px 12px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-top: 1px dashed var(--color-border);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .order-action {
            flex: 1;
            text-align: center;
            padding: 9px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .order-action--review { background: #f97316; color: #fff; }
        .order-action--report {
            background: #fef2f2; color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .order-action .material-symbols-outlined { font-size: 14px; }

        /* カード内のメイン CTA（配送状況／支払いへ） */
        .order-cta {
            display: flex; align-items: center; justify-content: center;
            gap: 4px;
            margin-top: 10px;
            padding: 10px;
            background: #0d6e4c; color: #fff;
            border-radius: 10px;
            font-size: 13px; font-weight: 700;
            text-decoration: none;
        }
        .order-cta .material-symbols-outlined { font-size: 16px; }
        .order-cta--paid { background: #475569; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page" style="padding-bottom:80px; max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector" style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/restaurant/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center; font-size:20px; font-weight:700; margin-bottom:16px;" data-i18n="delivery.myOrders"></div>

        <div id="orders-list" style="padding:0 16px;"></div>

        <div id="load-more-wrap" style="display:none; padding:12px 16px 24px; text-align:center;">
            <button type="button" id="load-more-btn"
                style="padding:10px 24px; border:1px solid var(--color-border); background:var(--color-surface); color:var(--color-text); border-radius:999px; font-size:13px; font-weight:600; cursor:pointer;"
                data-i18n="restaurant.loadMore"></button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/pages/restaurant/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">set_meal</span></span>
            <span data-i18n="restaurant.title"></span>
        </a>
        <a href="/pages/restaurant/cart.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">shopping_cart</span></span>
            <span class="nav-badge" id="cart-badge" style="display:none;"></span>
            <span data-i18n="cart.navCart"></span>
        </a>
        <a href="/pages/restaurant/orders.html" class="bottom-nav__item active">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">local_shipping</span></span>
            <span data-i18n="delivery.myOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import { subscribeCart } from '/js/cart.js';
        import { getOrderNumber } from '/js/order-utils.js';
        import {
            collection, query, where, orderBy, limit, startAfter, getDocs, doc, getDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        // ログアウトはアカウントページ内に移動

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // お支払い待ちカード（強調版）：金額・支払期限を目立たせる
        function renderPayNowItem(d, order, fishName) {
            const orderNo = getOrderNumber({ id: d.id, ...order });
            const total = (order.totalAmount || 0).toLocaleString();
            const deadlineMs = order.paymentDeadline?.toMillis?.() || null;
            const isOverdue = deadlineMs && Date.now() > deadlineMs;
            let deadlineLine = '';
            if (deadlineMs) {
                const dd = new Date(deadlineMs);
                const hh = String(dd.getHours()).padStart(2, '0');
                const mm = String(dd.getMinutes()).padStart(2, '0');
                const label = isOverdue
                    ? i18next.t('orders.deadlinePassedShort')
                    : i18next.t('orders.payByTime', { time: `${hh}:${mm}` });
                deadlineLine = `
                    <div class="pay-now__deadline">
                        <span class="material-symbols-outlined">schedule</span>
                        ${label}
                    </div>`;
            }

            const itemCount = Array.isArray(order.items) ? order.items.length : 1;
            const multiBadge = itemCount > 1
                ? ` <span style="display:inline-block; margin-left:4px; padding:1px 8px; background:#fef3c7; color:#92400e; border-radius:10px; font-size:10px; font-weight:700;">+${itemCount - 1} ${i18next.t('orders.otherItems')}</span>`
                : '';

            return `
                <a class="order-item pay-now ${isOverdue ? 'overdue' : ''}" id="order-${d.id}" href="/pages/restaurant/payment.html?id=${d.id}">
                    <div class="order-item__top">
                        <div class="order-item__fish">${fishName}${multiBadge}</div>
                        <div class="order-item__status st-completed">${i18next.t('orders.payNow')}</div>
                    </div>
                    <div style="font-size:11px; color:#94a3b8; font-family:monospace; margin-top:2px;">${orderNo}</div>
                    <div class="order-item__meta" style="margin-top:6px;">
                        ${order.quantity}kg · ${order.deliveryDate || ''} ${order.deliveryTime || ''}
                    </div>
                    <div class="pay-now__amount">${total} KHR</div>
                    ${deadlineLine}
                    <div class="pay-now__cta">${i18next.t('payment.goToPayment')}</div>
                </a>
            `;
        }

        function renderOrderItem(d, order, fishName) {
            // 4/28: delivered ステータス廃止。旧データ保護のため delivered は completed として表示
            const effectiveStatus = order.status === 'delivered' ? 'completed' : order.status;
            const statusKey = `delivery.${effectiveStatus}`;
            const statusText = i18next.exists(statusKey) ? i18next.t(statusKey) : effectiveStatus;
            const stClass = `st-${effectiveStatus}`;
            const canTrack = ['approved', 'preparing', 'delivering'].includes(effectiveStatus);
            const isCompleted = effectiveStatus === 'completed';
            const isPending = order.status === 'pending';
            let href = '#';
            let actionLabel = '';
            if (canTrack || isPending) {
                href = `/pages/restaurant/delivery.html?id=${d.id}`;
                actionLabel = isPending ? i18next.t('delivery.pendingBanner') : i18next.t('delivery.goTracking');
            } else if (isCompleted) {
                href = `/pages/restaurant/payment.html?id=${d.id}`;
                actionLabel = order.paymentStatus === 'paid'
                    ? i18next.t('payment.viewPayment')
                    : i18next.t('payment.goToPayment');
            }

            // 4/28: 承認以降は常にレビュー・問題報告へ導線を出す（旧: 支払済み完了のみ）
            const showReviewLink = ['approved', 'preparing', 'delivering', 'completed', 'delivered'].includes(order.status);

            const itemCount = Array.isArray(order.items) ? order.items.length : 1;
            const multiBadge = itemCount > 1
                ? ` <span style="display:inline-block; margin-left:4px; padding:1px 8px; background:#fef3c7; color:#92400e; border-radius:10px; font-size:10px; font-weight:700;">+${itemCount - 1} ${i18next.t('orders.otherItems')}</span>`
                : '';

            const reviewActionsHtml = showReviewLink ? `
                <div class="order-actions">
                    <a class="order-action order-action--review" href="/pages/restaurant/review.html?id=${d.id}">
                        <span class="material-symbols-outlined" style="font-size:14px;">star</span>
                        ${i18next.t('review.submit')}
                    </a>
                    <a class="order-action order-action--report" href="/pages/restaurant/report.html?id=${d.id}">
                        <span class="material-symbols-outlined" style="font-size:14px;">flag</span>
                        ${i18next.t('review.reportIssue')}
                    </a>
                </div>
            ` : '';

            // カード内のメイン CTA（配送状況へ／支払いへ）
            let ctaHtml = '';
            if (canTrack || isPending) {
                const ctaIcon = isPending ? 'hourglass_top' : 'local_shipping';
                ctaHtml = `
                    <a class="order-cta" href="/pages/restaurant/delivery.html?id=${d.id}">
                        <span class="material-symbols-outlined">${ctaIcon}</span>
                        ${actionLabel}
                    </a>`;
            } else if (isCompleted) {
                const isPaid = order.paymentStatus === 'paid';
                ctaHtml = `
                    <a class="order-cta ${isPaid ? 'order-cta--paid' : ''}" href="/pages/restaurant/payment.html?id=${d.id}">
                        <span class="material-symbols-outlined">${isPaid ? 'receipt_long' : 'payments'}</span>
                        ${actionLabel}
                    </a>`;
            }

            return `
                <div class="order-block${showReviewLink ? ' has-actions' : ''}">
                    <div class="order-item" id="order-${d.id}">
                        <div class="order-item__top">
                            <div class="order-item__fish">${fishName}${multiBadge}</div>
                            <div class="order-item__status ${stClass}">${statusText}</div>
                        </div>
                        <div style="font-size:11px; color:#94a3b8; font-family:monospace; margin-top:2px;">${getOrderNumber({ id: d.id, ...order })}</div>
                        <div class="order-item__meta">
                            ${order.quantity}kg · ${order.deliveryDate || ''} ${order.deliveryTime || ''}
                        </div>
                        ${ctaHtml}
                    </div>
                    ${reviewActionsHtml}
                </div>
            `;
        }

        const ORDERS_PAGE_SIZE = 200;
        let ordersLastDoc = null;
        let ordersHasMore = false;
        let ordersLoadingMore = false;
        let allOrdersCache = [];

        async function loadOrders({ append = false } = {}) {
            if (!append) {
                loading.classList.add('show');
                ordersLastDoc = null;
                allOrdersCache = [];
            }
            try {
                const uid = window.currentUser?.uid;
                if (!uid) return;

                const baseConds = [
                    collection(db, 'orders'),
                    where('restaurantId', '==', uid),
                    orderBy('createdAt', 'desc'),
                ];
                if (append && ordersLastDoc) baseConds.push(startAfter(ordersLastDoc));
                baseConds.push(limit(ORDERS_PAGE_SIZE));
                const q = query(...baseConds);
                const snap = await getDocs(q);
                ordersLastDoc = snap.docs.length > 0 ? snap.docs[snap.docs.length - 1] : ordersLastDoc;
                ordersHasMore = snap.docs.length === ORDERS_PAGE_SIZE;

                const listEl = document.getElementById('orders-list');

                if (!append && snap.empty) {
                    listEl.innerHTML = `<div class="empty-state"><div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:48px;">local_shipping</span></div><div>${i18next.t('orders.empty')}</div></div>`;
                    document.getElementById('load-more-wrap').style.display = 'none';
                    return;
                }

                // ── 注文データ取得（並列で高速化） ──
                // snapFishType がない legacy 注文のみ fishListings を取得
                const legacyListingIds = [...new Set(
                    snap.docs.map(d => d.data())
                        .filter(o => !o.snapFishType && o.listingId)
                        .map(o => o.listingId)
                )];
                const listingCache = {};
                await Promise.all(legacyListingIds.map(async lid => {
                    try {
                        const lSnap = await getDoc(doc(db, 'fishListings', lid));
                        listingCache[lid] = lSnap.exists() ? lSnap.data() : {};
                    } catch (e) { listingCache[lid] = {}; }
                }));

                const newOrders = snap.docs.map(d => {
                    const order = d.data();
                    let fishTypeKey = order.snapFishType
                        || listingCache[order.listingId]?.fishType
                        || '';
                    let fishName = fishTypeKey
                        ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey)
                        : '';
                    return { d, order, fishName };
                });

                // 既存と結合（重複除去）
                const seen = new Set(allOrdersCache.map(o => o.d.id));
                newOrders.forEach(o => { if (!seen.has(o.d.id)) allOrdersCache.push(o); });
                const allOrders = allOrdersCache;

                // グループ分け（4/28: 大グループ「お支払い待ち」 / 中グループ「対応中」 / トグル）
                const isCompletedStatus = (s) => s === 'completed' || s === 'delivered';
                const isInProgress = (s) => ['pending', 'approved', 'preparing', 'delivering'].includes(s);

                // ソート関数
                const sortByPaymentDeadline = (a, b) => {
                    const da = a.order.paymentDeadline?.toMillis?.() || 0;
                    const dbb = b.order.paymentDeadline?.toMillis?.() || 0;
                    return da - dbb;
                };
                const sortByDelivery = (a, b) => {
                    const da = a.order.deliveryDateIso || '';
                    const dbb = b.order.deliveryDateIso || '';
                    if (da !== dbb) return da.localeCompare(dbb);
                    return (a.order.deliveryTime || '').localeCompare(b.order.deliveryTime || '');
                };

                const awaitingPayment = allOrders
                    .filter(o => isCompletedStatus(o.order.status) && o.order.paymentStatus !== 'paid')
                    .sort(sortByPaymentDeadline);
                const inProgress = allOrders
                    .filter(o => isInProgress(o.order.status))
                    .sort(sortByDelivery);
                const completed = allOrders.filter(o => isCompletedStatus(o.order.status) && o.order.paymentStatus === 'paid');
                const declined = allOrders.filter(o => o.order.status === 'declined');

                listEl.innerHTML = '';

                // 大グループ：お支払い待ち（強調表示・期限昇順）
                if (awaitingPayment.length > 0) {
                    listEl.innerHTML += `<div class="section-label payment-label">${i18next.t('orders.awaitingPaymentSection', { count: awaitingPayment.length })}</div>`;
                    awaitingPayment.forEach(o => {
                        listEl.innerHTML += renderPayNowItem(o.d, o.order, o.fishName);
                    });
                }

                // 中グループ：対応中（pending + approved + preparing + delivering、納品日昇順）
                if (inProgress.length > 0) {
                    listEl.innerHTML += `<div class="section-label">${i18next.t('orders.activeSection', { count: inProgress.length })}</div>`;
                    inProgress.forEach(o => { listEl.innerHTML += renderOrderItem(o.d, o.order, o.fishName); });
                }

                // トグル：完了済み
                if (completed.length > 0) {
                    listEl.innerHTML += `
                        <div class="accordion-header" id="acc-completed">${i18next.t('orders.approvedSectionClosed', { count: completed.length })}</div>
                        <div class="accordion-body" id="acc-completed-body">
                            ${completed.map(o => renderOrderItem(o.d, o.order, o.fishName)).join('')}
                        </div>`;
                }

                // トグル：辞退済み
                if (declined.length > 0) {
                    listEl.innerHTML += `
                        <div class="accordion-header" id="acc-declined">${i18next.t('orders.declinedSectionClosed', { count: declined.length })}</div>
                        <div class="accordion-body" id="acc-declined-body">
                            ${declined.map(o => renderOrderItem(o.d, o.order, o.fishName)).join('')}
                        </div>`;
                }

                // アコーディオンイベント
                document.getElementById('acc-completed')?.addEventListener('click', function() {
                    const body = document.getElementById('acc-completed-body');
                    body.classList.toggle('open');
                    this.textContent = body.classList.contains('open')
                        ? i18next.t('orders.approvedSectionOpen', { count: completed.length })
                        : i18next.t('orders.approvedSectionClosed', { count: completed.length });
                });
                document.getElementById('acc-declined')?.addEventListener('click', function() {
                    const body = document.getElementById('acc-declined-body');
                    body.classList.toggle('open');
                    this.textContent = body.classList.contains('open')
                        ? i18next.t('orders.declinedSectionOpen', { count: declined.length })
                        : i18next.t('orders.declinedSectionClosed', { count: declined.length });
                });

                // 通知からの遷移時に該当注文までスクロール
                if (location.hash) {
                    let target;
                    try { target = document.querySelector(location.hash); } catch (e) { target = null; }
                    if (target) {
                        const accBody = target.closest('.accordion-body');
                        if (accBody && !accBody.classList.contains('open')) {
                            const hdrId = accBody.id.replace('-body', '');
                            document.getElementById(hdrId)?.click();
                        }
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                target.style.transition = 'box-shadow 0.4s';
                                target.style.boxShadow = '0 0 0 3px #fbbf24';
                                setTimeout(() => { target.style.boxShadow = ''; }, 2500);
                            });
                        });
                    }
                }

                document.getElementById('load-more-wrap').style.display = ordersHasMore ? 'block' : 'none';

            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show');
                ordersLoadingMore = false;
            }
        }

        document.getElementById('load-more-btn').addEventListener('click', async () => {
            if (ordersLoadingMore || !ordersHasMore) return;
            ordersLoadingMore = true;
            const btn = document.getElementById('load-more-btn');
            btn.disabled = true;
            btn.textContent = '...';
            try {
                await loadOrders({ append: true });
            } finally {
                btn.disabled = false;
                btn.textContent = i18next.t('restaurant.loadMore');
            }
        });

        onLanguageChange(() => loadOrders());
        waitForUserData(() => {
            localStorage.setItem('fishlink_rest_orders_seen', String(Date.now()));
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
                subscribeCart(window.currentUser.uid, (items) => {
                    const badge = document.getElementById('cart-badge');
                    if (badge) badge.style.display = items.length > 0 ? 'block' : 'none';
                });
            }
            loadOrders();
        });
    </script>
</body>
</html>
