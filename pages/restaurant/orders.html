<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-item {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 14px;
            margin-bottom: 12px;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .order-item__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .order-item__fish { font-size: 16px; font-weight: 700; }
        .order-item__status {
            font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px;
        }
        .st-pending { background: #fef3c7; color: #92400e; }
        .st-approved { background: #dbeafe; color: #1e40af; }
        .st-preparing { background: #fef9c3; color: #854d0e; }
        .st-delivering { background: #d1fae5; color: #065f46; }
        .st-delivered { background: #ede9fe; color: #5b21b6; }
        .st-completed { background: #f0fdf4; color: #166534; }
        .st-declined { background: #fef2f2; color: #991b1b; }
        .order-item__meta { font-size: 13px; color: var(--color-text-sub); line-height: 1.6; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--color-text-sub); }
        .empty-state__icon { font-size: 48px; margin-bottom: 12px; }
        .section-label {
            padding: 10px 16px; font-size: 14px; font-weight: 700; color: var(--color-text);
            background: #f0fdf4; border-left: 4px solid #16a34a;
            margin: 12px 0 8px; border-radius: 0 8px 8px 0;
        }
        .section-label.pending-label { background: #fef3c7; border-left-color: #f59e0b; }
        .section-label.delivered-label { background: #ede9fe; border-left-color: #8b5cf6; }
        .section-label.payment-label { background: #ffedd5; border-left-color: #ea580c; }
        .accordion-header {
            padding: 12px 16px; margin: 12px 0 0; background: #f5f5f5; border-radius: 12px;
            cursor: pointer; font-size: 14px; font-weight: 600; color: var(--color-text-sub);
            border: 1px solid var(--color-border);
        }
        .accordion-body { display: none; }
        .accordion-body.open { display: block; }

        /* お支払い待ちカード（強調版） */
        .order-item.pay-now {
            border: 2px solid #f97316;
            background: linear-gradient(180deg, #fff7ed, #fff);
            box-shadow: 0 2px 10px rgba(249, 115, 22, 0.15);
        }
        .order-item.pay-now.overdue {
            border-color: #dc2626;
            background: linear-gradient(180deg, #fef2f2, #fff);
            box-shadow: 0 2px 10px rgba(220, 38, 38, 0.18);
        }
        .pay-now__amount {
            font-size: 22px; font-weight: 800; color: #c2410c;
            margin-top: 6px; line-height: 1.1;
        }
        .order-item.pay-now.overdue .pay-now__amount { color: #b91c1c; }
        .pay-now__deadline {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 700;
            background: #fff7ed; color: #9a3412;
            padding: 4px 10px; border-radius: 999px;
            margin-top: 6px;
        }
        .order-item.pay-now.overdue .pay-now__deadline {
            background: #fee2e2; color: #991b1b;
        }
        .pay-now__deadline .material-symbols-outlined { font-size: 14px; }
        .pay-now__cta {
            display: block; margin-top: 10px;
            background: #f97316; color: #fff;
            text-align: center; padding: 10px;
            border-radius: 12px; font-weight: 700; font-size: 14px;
            text-decoration: none;
        }
        .order-item.pay-now.overdue .pay-now__cta { background: #dc2626; }

        /* カード + アクション群を1ブロックとして視覚的にまとめる */
        .order-block {
            margin-bottom: 12px;
        }
        .order-block.has-actions .order-item {
            margin-bottom: 0;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: none;
        }
        .order-block.has-actions .order-actions {
            display: flex;
            gap: 6px;
            padding: 8px 12px 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-top: 1px dashed var(--color-border);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .order-action {
            flex: 1;
            text-align: center;
            padding: 9px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .order-action--review { background: #f97316; color: #fff; }
        .order-action--report {
            background: #fef2f2; color: #b91c1c;
            border: 1px solid #fecaca;
        }
        /* 5/1: レビュー済み状態（無効化表示） */
        .order-action--reviewed {
            background: #f1f5f9; color: #64748b;
            border: 1px solid #e2e8f0;
            cursor: default; pointer-events: none;
        }
        .order-action .material-symbols-outlined { font-size: 14px; }

        /* カード内のメイン CTA（配送状況／支払いへ） */
        .order-cta {
            display: flex; align-items: center; justify-content: center;
            gap: 4px;
            margin-top: 10px;
            padding: 10px;
            background: var(--color-cta); color: #fff;
            border-radius: 10px;
            font-size: 13px; font-weight: 700;
            text-decoration: none;
        }
        .order-cta .material-symbols-outlined { font-size: 16px; }
        .order-cta--paid { background: #475569; }

        /* #143 注文状況 A案フィード（対応が必要→進行中→購入履歴1行） */
        .os-sec { display:flex; align-items:center; gap:7px; font-size:14px; font-weight:800; margin:16px 4px 9px; }
        .os-sec__n { background:#eef1f4; color:#5a6470; font-size:11px; font-weight:800; padding:1px 9px; border-radius:10px; }
        .os-sec--act { color:#d14343; }
        .os-sec--act .os-sec__n { background:#fdecea; color:#d14343; }
        .os-sec--hist { color:#5a6470; font-size:13px; }
        .os-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:14px; padding:13px; margin-bottom:11px; display:block; text-decoration:none; color:inherit; }
        .os-card--urgent { border-color:#f3c0bd; box-shadow:0 0 0 2px #fbe3e1 inset; }
        .os-card__top { display:flex; gap:11px; }
        .os-card__th { width:54px; height:54px; border-radius:9px; flex:0 0 auto; background:#eef3f7; display:flex; align-items:center; justify-content:center; color:#9dbed4; overflow:hidden; }
        .os-card__th img { width:100%; height:100%; object-fit:cover; }
        .os-card__th .material-symbols-outlined { font-size:26px; }
        .os-card__ci { flex:1; min-width:0; }
        .os-card__nm { font-size:15px; font-weight:800; }
        .os-card__fl { font-size:10.5px; color:var(--color-cta); margin-top:2px; font-family:monospace; }
        .os-card__meta { font-size:11.5px; color:var(--color-text-sub); margin-top:3px; }
        .os-card__meta .material-symbols-outlined { font-size:13px; vertical-align:-2px; }
        .os-badge { font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:10px; float:right; margin-left:6px; }
        .os-badge--pay { background:#fff3dc; color:#b36a00; }
        .os-badge--dec { background:#fdecea; color:#d14343; }
        .os-badge--confirm { background:#eef1f4; color:#5a6470; }
        .os-badge--deliv { background:var(--color-cta-lt); color:var(--color-cta); }
        .os-amt { font-size:21px; font-weight:800; color:var(--color-cta); margin-top:8px; }
        .os-warn { display:flex; align-items:center; gap:6px; background:#fdecea; color:#d14343; font-size:12.5px; font-weight:800; padding:8px 11px; border-radius:9px; margin-top:9px; }
        .os-warn .material-symbols-outlined { font-size:16px; }
        .os-note { background:var(--color-bg); border:1px solid var(--color-border); border-radius:9px; padding:9px 11px; font-size:12px; color:var(--color-text-sub); margin-top:9px; line-height:1.5; }
        .os-statusline { display:flex; align-items:center; gap:6px; background:#f0f4f8; color:#42566b; font-size:12px; font-weight:700; padding:8px 11px; border-radius:9px; margin-top:9px; }
        .os-statusline .material-symbols-outlined { font-size:16px; }
        .os-btn { display:block; width:100%; box-sizing:border-box; text-align:center; font-size:13px; font-weight:800; padding:11px; border-radius:10px; margin-top:10px; border:none; cursor:pointer; font-family:inherit; text-decoration:none; }
        .os-btn--pri { background:var(--color-cta); color:#fff; }
        .os-btn--sec { background:var(--color-surface); color:var(--color-cta); border:1.5px solid var(--color-cta); }
        .os-cancel { display:block; width:100%; text-align:center; font-size:12.5px; font-weight:700; color:var(--color-text-sub); background:none; border:none; padding:9px; margin-top:4px; cursor:pointer; font-family:inherit; }
        .os-close { display:block; width:100%; text-align:center; font-size:12.5px; font-weight:700; color:#9aa3b0; padding:8px; margin-top:2px; cursor:pointer; background:none; border:none; font-family:inherit; }
        .os-histrow { display:flex; align-items:center; gap:12px; background:var(--color-surface); border:1px solid var(--color-border); border-radius:12px; padding:13px 14px; text-decoration:none; color:inherit; margin-bottom:11px; }
        .os-histrow > .material-symbols-outlined { font-size:22px; color:var(--color-text-sub); }
        .os-histrow__t { flex:1; }
        .os-histrow__t1 { font-size:13.5px; font-weight:800; color:var(--color-text); }
        .os-histrow__t2 { font-size:11.5px; color:var(--color-text-sub); margin-top:3px; }
        .os-histrow__g { color:#c2ccd6; font-weight:800; font-size:18px; }
        .os-allclear { display:flex; align-items:center; justify-content:center; gap:6px; color:#5a6470; font-size:13px; font-weight:700; padding:22px 12px; }
        .os-allclear .material-symbols-outlined { color:var(--color-primary); font-size:20px; }
        /* 6/17 #150 §4/§5: お支払い待ちカード下の「問題を報告」入口（赤枠アウトライン維持）＋締切注記／報告済み */
        .os-report-block { margin:-3px 2px 12px; }
        .os-report-btn { display:inline-flex; align-items:center; gap:5px; background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; border-radius:10px; padding:8px 14px; font-size:12.5px; font-weight:700; text-decoration:none; }
        .os-report-btn .material-symbols-outlined { font-size:15px; }
        .os-report-done { display:inline-flex; align-items:center; gap:5px; background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; border-radius:10px; padding:8px 14px; font-size:12.5px; font-weight:700; }
        .os-report-done .material-symbols-outlined { font-size:15px; }
        .os-report-note { font-size:11.5px; color:var(--color-text-sub); margin-top:6px; line-height:1.5; }
        /* キャンセル確認モーダル（自前・標準ダイアログ置換）＝ボトムシート（#155 A⑮） */
        .os-modal-ov { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1200; display:none; align-items:flex-end; justify-content:center; }
        .os-modal-ov.show { display:flex; }
        .os-modal { width:100%; max-width:480px; background:#fff; border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); box-shadow:0 -8px 40px rgba(0,0,0,.25); }
        .os-modal__t { font-size:16px; font-weight:800; margin-bottom:8px; }
        .os-modal__b { font-size:13px; color:var(--color-text-sub); line-height:1.6; margin-bottom:14px; }
        .os-modal__act { display:flex; gap:10px; }
        .os-modal__btn { flex:1; border-radius:10px; padding:12px; font-size:14px; font-weight:800; border:none; cursor:pointer; font-family:inherit; }
        .os-modal__btn--keep { background:#eceef0; color:#5a6470; }
        .os-modal__btn--ok { background:var(--color-cta); color:#fff; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page" style="padding-bottom:80px; max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector" style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/restaurant/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center; font-size:20px; font-weight:700; margin-bottom:16px;" data-i18n="delivery.myOrders"></div>

        <div id="orders-list" style="padding:0 16px;"></div>
    </div>

    <!-- 5/12 #74: 4タブ構成（ホーム / 魚一覧 / カート / 配送中）に変更 -->
    <nav class="bottom-nav">
        <a href="/pages/restaurant/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">storefront</span></span>
            <span data-i18n="restaurant.navHome"></span>
        </a>
        <a href="/pages/restaurant/fish-list.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="restaurant.title"></span>
        </a>
        <a href="/pages/restaurant/cart.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">shopping_cart</span></span>
            <span class="nav-badge" id="cart-badge" style="display:none;"></span>
            <span data-i18n="cart.navCart"></span>
        </a>
        <a href="/pages/restaurant/orders.html" class="bottom-nav__item active">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">local_shipping</span></span>
            <span data-i18n="delivery.myOrders"></span>
        </a>
    </nav>

    <!-- #143 注文キャンセル確認モーダル（農家の承認前のみ） -->
    <div class="os-modal-ov" id="cancel-modal">
        <div class="os-modal">
            <div class="os-modal__t" data-i18n="orders.cancelModalTitle"></div>
            <div class="os-modal__b" data-i18n="orders.cancelModalBody"></div>
            <div class="os-modal__act">
                <button type="button" class="os-modal__btn os-modal__btn--keep" id="cancel-modal-keep" data-i18n="orders.cancelModalKeep"></button>
                <button type="button" class="os-modal__btn os-modal__btn--ok" id="cancel-modal-ok" data-i18n="orders.cancelModalOk"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import { subscribeCart } from '/js/cart.js';
        import { getOrderNumber } from '/js/order-utils.js';
        // 6/17 #150: 問題報告の入口出し分け（報告期限＝配送完了＋N時間／1注文1オープン）
        import { getReportWindowHours, computeReportEntry, reportDeadlineText } from '/js/report-window.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState, serializeTimestamps, reviveTimestamps } from '/js/render-cache.js';
        import {
            collection, query, where, orderBy, limit, startAfter, getDocs, doc, getDoc,
            runTransaction, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        // ログアウトはアカウントページ内に移動

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // 5/1: カンボジア時間（UTC+7）の YYYY-MM-DD を返す
        function todayIsoKHM() {
            const now = new Date();
            const khm = new Date(now.getTime() + 7 * 60 * 60 * 1000);
            const yy = khm.getUTCFullYear();
            const mm = String(khm.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(khm.getUTCDate()).padStart(2, '0');
            return `${yy}-${mm}-${dd}`;
        }

        // ── #143 A案フィード 共通ヘルパー ──
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        const WEEKDAY_SHORT = {
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'],
        };
        function fmtDeliveryDate(iso) {
            const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return iso || '';
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];
            return `${Number(m[2])}/${Number(m[3])}（${wd}）`;
        }
        function thumbHtml(order) {
            const url = order.snapPhotoUrl || '';
            return url ? `<img src="${escapeHtml(url)}" alt="" loading="lazy">` : `<span class="material-symbols-outlined">set_meal</span>`;
        }
        function multiBadgeHtml(order) {
            const itemCount = Array.isArray(order.items) ? order.items.length : 1;
            return itemCount > 1
                ? ` <span style="display:inline-block; margin-left:4px; padding:1px 8px; background:#eef1f4; color:#5a6470; border-radius:10px; font-size:10px; font-weight:700;">+${itemCount - 1} ${i18next.t('orders.otherItems')}</span>`
                : '';
        }
        function metaLineHtml(order, farmerName) {
            const parts = [];
            if (farmerName) parts.push(`<span class="material-symbols-outlined">storefront</span> ${escapeHtml(farmerName)}`);
            const dt = [fmtDeliveryDate(order.deliveryDateIso), order.deliveryTime || ''].filter(Boolean).join(' ');
            if (dt) parts.push(dt);
            return parts.join(' ・ ');
        }

        // 辞退カードの「対応が必要」からの片付け（localStorage・購入履歴には残る）
        const DECLINED_DISMISS_KEY = 'fishlink_orders_declined_dismissed';
        function getDismissedDeclined() {
            try { return new Set(JSON.parse(localStorage.getItem(DECLINED_DISMISS_KEY) || '[]')); } catch (e) { return new Set(); }
        }
        function addDismissedDeclined(id) {
            const s = getDismissedDeclined(); s.add(id);
            try { localStorage.setItem(DECLINED_DISMISS_KEY, JSON.stringify([...s])); } catch (e) { /* ignore */ }
        }

        // お支払い待ち（urgent・最重要・支払金額＝青）
        function renderPayNowCard(o) {
            const { d, order, fishName, farmerName } = o;
            const orderNo = getOrderNumber({ id: d.id, ...order });
            const total = (order.totalAmount || 0).toLocaleString();
            const deadlineMs = order.paymentDeadline?.toMillis?.() || null;
            const isOverdue = deadlineMs && Date.now() > deadlineMs;
            const warn = isOverdue
                ? `<div class="os-warn"><span class="material-symbols-outlined">schedule</span>${i18next.t('orders.deadlinePassedShort')}</div>`
                : '';
            return `
                <a class="os-card os-card--urgent" href="/pages/restaurant/payment.html?id=${d.id}">
                    <div class="os-card__top">
                        <div class="os-card__th">${thumbHtml(order)}</div>
                        <div class="os-card__ci">
                            <span class="os-badge os-badge--pay">${i18next.t('orders.payWaitBadge')}</span>
                            <div class="os-card__nm">${fishName}${multiBadgeHtml(order)}</div>
                            <div class="os-card__fl">${orderNo}</div>
                            <div class="os-card__meta">${metaLineHtml(order, farmerName)}</div>
                            <div class="os-amt">${total} KHR</div>
                        </div>
                    </div>
                    ${warn}
                    <div class="os-btn os-btn--pri">${i18next.t('payment.goToPayment')}</div>
                </a>
                ${renderReportEntry(order, d.id)}`;
        }

        // 6/17 #150 §4/§5: お支払い待ちカード下の問題報告入口（配送完了＋N時間の期限内のみ表示・報告中は「報告済み・対応中」）。
        function renderReportEntry(order, orderId) {
            const re = computeReportEntry(order, 'restaurant', reportHours);
            if (re.phase === 'reported') {
                return `<div class="os-report-block"><span class="os-report-done"><span class="material-symbols-outlined">flag</span>${i18next.t('report.reportedInProgress')}</span></div>`;
            }
            if (!re.show) return '';
            const note = (re.phase === 'window')
                ? `<div class="os-report-note">${reportDeadlineText(re.deadlineMs, 'restaurant')}</div>`
                : '';
            return `<div class="os-report-block">
                <a class="os-report-btn" href="/pages/restaurant/report.html?id=${orderId}"><span class="material-symbols-outlined">flag</span>${i18next.t('review.reportIssue')}</a>
                ${note}
            </div>`;
        }

        // 辞退された注文（同じ魚を再注文／× 閉じる）
        function renderDeclinedCard(o) {
            const { d, order, fishName, farmerName } = o;
            const orderNo = getOrderNumber({ id: d.id, ...order });
            const fishType = order.snapFishType || '';
            const reorderHref = fishType
                ? `/pages/restaurant/fish-list.html?fishType=${encodeURIComponent(fishType)}`
                : '/pages/restaurant/fish-list.html';
            return `
                <div class="os-card" id="order-${d.id}">
                    <div class="os-card__top">
                        <div class="os-card__th">${thumbHtml(order)}</div>
                        <div class="os-card__ci">
                            <span class="os-badge os-badge--dec">${i18next.t('delivery.declined')}</span>
                            <div class="os-card__nm">${fishName}${multiBadgeHtml(order)}</div>
                            <div class="os-card__fl">${orderNo}</div>
                            <div class="os-card__meta">${metaLineHtml(order, farmerName)}</div>
                        </div>
                    </div>
                    <div class="os-note">${i18next.t('orders.declinedNotice')}</div>
                    <a class="os-btn os-btn--pri" data-reorder-id="${d.id}" href="${reorderHref}">${i18next.t('orders.reorderSameFish')}</a>
                    <button type="button" class="os-close" data-act="dismiss-declined" data-id="${d.id}"><span class="material-symbols-outlined" style="font-size:15px; vertical-align:-3px; margin-right:2px;">close</span>${i18next.t('orders.closeLabel')}</button>
                </div>`;
        }

        // 進行中（農家確認中／出荷準備・配達中）
        function renderInProgressCard(o) {
            const { d, order, fishName, farmerName } = o;
            const orderNo = getOrderNumber({ id: d.id, ...order });
            const isPending = order.status === 'pending';
            const badge = isPending
                ? `<span class="os-badge os-badge--confirm">${i18next.t('orders.confirmingBadge')}</span>`
                : `<span class="os-badge ${order.status === 'delivering' ? 'os-badge--deliv' : 'os-badge--confirm'}">${i18next.t('delivery.' + order.status)}</span>`;
            const head = `
                <div class="os-card__top">
                    <div class="os-card__th">${thumbHtml(order)}</div>
                    <div class="os-card__ci">
                        ${badge}
                        <div class="os-card__nm">${fishName}${multiBadgeHtml(order)}</div>
                        <div class="os-card__fl">${orderNo}</div>
                        <div class="os-card__meta">${metaLineHtml(order, farmerName)}</div>
                    </div>
                </div>`;
            if (isPending) {
                return `
                    <div class="os-card" id="order-${d.id}">
                        ${head}
                        <div class="os-statusline"><span class="material-symbols-outlined">hourglass_top</span>${i18next.t('orders.farmerConfirming')}</div>
                        <button type="button" class="os-cancel" data-act="cancel-order" data-id="${d.id}">${i18next.t('orders.cancelOrder')}</button>
                    </div>`;
            }
            return `
                <a class="os-card" href="/pages/restaurant/delivery.html?id=${d.id}">
                    ${head}
                    <div class="os-btn os-btn--sec">${i18next.t('delivery.goTracking')}</div>
                </a>`;
        }

        const ORDERS_PAGE_SIZE = 30;
        let ordersLastDoc = null;
        let ordersHasMore = false;
        let ordersLoadingMore = false;
        let allOrdersCache = [];
        // 6/17 #150: 報告受付時間（時間）。お支払い待ちカードの報告入口の締切判定に使う。
        let reportHours = 4;
        const farmerNameCache = new Map();   // #143: farmerId -> 農家表示名（カード「🏬 農家名」用）

        // 5/25 #91/#92 拡張: 描画ロジックを fetch から分離。cached / fresh 両方から呼ぶ。
        //   allOrdersCache の各要素は { d:{id}, order, fishName, hasReview } 形式（d は Firestore doc snap 互換）
        function renderAllOrders() {
            const listEl = document.getElementById('orders-list');
            if (!listEl) return;
            const allOrders = allOrdersCache;

            if (allOrders.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:48px;">local_shipping</span></div>
                        <div>${i18next.t('orders.noOrdersYet')}</div>
                        <a href="/pages/restaurant/fish-list.html" class="os-btn os-btn--pri" style="display:inline-block; width:auto; padding:11px 22px; margin-top:14px;">${i18next.t('orders.findFish')}</a>
                    </div>`;
                return;
            }

            const isCompletedStatus = (s) => s === 'completed' || s === 'delivered';
            const sortByPaymentDeadline = (a, b) =>
                (a.order.paymentDeadline?.toMillis?.() || 0) - (b.order.paymentDeadline?.toMillis?.() || 0);
            const sortByDelivery = (a, b) => {
                const da = a.order.deliveryDateIso || '';
                const dbb = b.order.deliveryDateIso || '';
                if (da !== dbb) return da.localeCompare(dbb);
                return (a.order.deliveryTime || '').localeCompare(b.order.deliveryTime || '');
            };
            const sortByCreatedDesc = (a, b) =>
                (b.order.createdAt?.toMillis?.() || 0) - (a.order.createdAt?.toMillis?.() || 0);

            const dismissed = getDismissedDeclined();
            const payNow = allOrders
                .filter(o => isCompletedStatus(o.order.status) && o.order.paymentStatus !== 'paid')
                .sort(sortByPaymentDeadline);
            const declinedAll = allOrders.filter(o => o.order.status === 'declined');
            const declinedVisible = declinedAll.filter(o => !dismissed.has(o.d.id)).sort(sortByCreatedDesc);
            const confirming = allOrders.filter(o => o.order.status === 'pending').sort(sortByDelivery);
            const shipping = allOrders.filter(o => ['approved', 'preparing', 'delivering'].includes(o.order.status)).sort(sortByDelivery);
            const inProgress = [...confirming, ...shipping];
            const completedPaid = allOrders.filter(o => isCompletedStatus(o.order.status) && o.order.paymentStatus === 'paid');
            const cancelled = allOrders.filter(o => o.order.status === 'cancelled');

            const actionCount = payNow.length + declinedVisible.length;
            const ndCount = declinedAll.length + cancelled.length;
            const doneCount = completedPaid.length;
            const hasHistory = doneCount + ndCount > 0;

            let html = '';
            if (actionCount > 0) {
                html += `<div class="os-sec os-sec--act">${i18next.t('orders.actionNeeded')} <span class="os-sec__n">${actionCount}</span></div>`;
                html += payNow.map(renderPayNowCard).join('');
                html += declinedVisible.map(renderDeclinedCard).join('');
            }
            if (inProgress.length > 0) {
                html += `<div class="os-sec">${i18next.t('orders.inProgressNow')} <span class="os-sec__n">${inProgress.length}</span></div>`;
                html += inProgress.map(renderInProgressCard).join('');
            }
            if (actionCount === 0 && inProgress.length === 0) {
                html += `<div class="os-allclear"><span class="material-symbols-outlined">check_circle</span>${i18next.t('orders.allClear')}</div>`;
            }
            if (hasHistory) {
                html += `<div class="os-sec os-sec--hist">${i18next.t('orders.historyLabel')}</div>`;
                html += `
                    <a class="os-histrow" href="/pages/restaurant/account/purchases.html">
                        <span class="material-symbols-outlined">receipt_long</span>
                        <div class="os-histrow__t">
                            <div class="os-histrow__t1">${i18next.t('orders.purchaseHistoryLink')}</div>
                            <div class="os-histrow__t2">${i18next.t('orders.purchaseHistoryCounts', { done: doneCount, nd: ndCount })}</div>
                        </div>
                        <span class="os-histrow__g">›</span>
                    </a>`;
            }
            listEl.innerHTML = html;

            listEl.querySelectorAll('[data-act="cancel-order"]').forEach(btn =>
                btn.addEventListener('click', () => openCancelModal(btn.dataset.id)));
            listEl.querySelectorAll('[data-act="dismiss-declined"]').forEach(btn =>
                btn.addEventListener('click', () => { addDismissedDeclined(btn.dataset.id); renderAllOrders(); }));
            listEl.querySelectorAll('a.os-btn[data-reorder-id]').forEach(a =>
                a.addEventListener('click', () => addDismissedDeclined(a.dataset.reorderId)));
        }

        // 注文キャンセル（承認前のみ・競合ロック＝トランザクションで status==pending を確認・先に押した方が成立）
        async function cancelOrder(orderId) {
            const ref = doc(db, 'orders', orderId);
            await runTransaction(db, async (tx) => {
                const snap = await tx.get(ref);
                if (!snap.exists()) throw new Error('notfound');
                if (snap.data().status !== 'pending') throw new Error('not_pending');
                tx.update(ref, { status: 'cancelled', cancelledAt: serverTimestamp(), cancelledBy: 'restaurant' });
            });
        }
        function openCancelModal(orderId) {
            const ov = document.getElementById('cancel-modal');
            const okBtn = document.getElementById('cancel-modal-ok');
            const keepBtn = document.getElementById('cancel-modal-keep');
            ov.classList.add('show');
            keepBtn.onclick = () => ov.classList.remove('show');
            // 背景タップで閉じる（シート本体のタップは閉じない）
            ov.onclick = (e) => { if (e.target === ov) ov.classList.remove('show'); };
            okBtn.onclick = async () => {
                okBtn.disabled = true;
                try {
                    await cancelOrder(orderId);
                    ov.classList.remove('show');
                    await loadOrders();
                } catch (e) {
                    ov.classList.remove('show');
                    alert(e.message === 'not_pending' ? i18next.t('orders.cancelFailedApproved') : i18next.t('payment.errorSubmit'));
                    await loadOrders();
                } finally {
                    okBtn.disabled = false;
                }
            };
        }

        // 5/25 #91/#92 拡張: silent=true で spinner を出さない（cached 描画後の裏側 fresh fetch 用）
        async function loadOrders({ append = false, silent = false } = {}) {
            if (!append) {
                if (!silent) loading.classList.add('show');
                ordersLastDoc = null;
                allOrdersCache = [];
            }
            try {
                const uid = window.currentUser?.uid;
                if (!uid) return;
                // 6/17 #150: 報告受付時間を先読み（helper 内でキャッシュ・renderAllOrders 前に確定）
                if (!append) reportHours = await getReportWindowHours();

                const baseConds = [
                    collection(db, 'orders'),
                    where('restaurantId', '==', uid),
                    orderBy('createdAt', 'desc'),
                ];
                if (append && ordersLastDoc) baseConds.push(startAfter(ordersLastDoc));
                baseConds.push(limit(ORDERS_PAGE_SIZE));
                const q = query(...baseConds);
                const snap = await getDocs(q);
                ordersLastDoc = snap.docs.length > 0 ? snap.docs[snap.docs.length - 1] : ordersLastDoc;
                ordersHasMore = snap.docs.length === ORDERS_PAGE_SIZE;

                const listEl = document.getElementById('orders-list');

                if (!append && snap.empty) {
                    allOrdersCache = [];
                    renderAllOrders();   // #143: 完全新規＝「まだ注文がありません」＋魚を探す導線
                    return;
                }

                // ── 注文データ取得（並列で高速化） ──
                // snapFishType がない legacy 注文のみ fishListings を取得
                const legacyListingIds = [...new Set(
                    snap.docs.map(d => d.data())
                        .filter(o => !o.snapFishType && o.listingId)
                        .map(o => o.listingId)
                )];
                const listingCache = {};
                await Promise.all(legacyListingIds.map(async lid => {
                    try {
                        const lSnap = await getDoc(doc(db, 'fishListings', lid));
                        listingCache[lid] = lSnap.exists() ? lSnap.data() : {};
                    } catch (e) { listingCache[lid] = {}; }
                }));

                const newOrders = snap.docs.map(d => {
                    const order = d.data();
                    let fishTypeKey = order.snapFishType
                        || listingCache[order.listingId]?.fishType
                        || '';
                    let fishName = fishTypeKey
                        ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey)
                        : '';
                    return { d, order, fishName, farmerName: '', hasReview: false };
                });

                // #143: 農家表示名を一括取得（カード「🏬 農家名」用・farmerNameCache でページ跨ぎ再利用）
                const farmerIdsToFetch = [...new Set(
                    newOrders.map(o => o.order.farmerId).filter(fid => fid && !farmerNameCache.has(fid))
                )];
                await Promise.all(farmerIdsToFetch.map(async fid => {
                    try {
                        const us = await getDoc(doc(db, 'users', fid));
                        farmerNameCache.set(fid, us.exists() ? (us.data().displayName || '') : '');
                    } catch (e) { farmerNameCache.set(fid, ''); }
                }));
                newOrders.forEach(o => { o.farmerName = farmerNameCache.get(o.order.farmerId) || ''; });

                // 5/1: レビュー有無を一括取得（approved以降の注文のみ・並列）
                const reviewableNew = newOrders.filter(o =>
                    ['approved', 'preparing', 'delivering', 'completed', 'delivered'].includes(o.order.status)
                );
                await Promise.all(reviewableNew.map(async o => {
                    try {
                        const rs = await getDoc(doc(db, 'orders', o.d.id, 'reviews', 'restaurant'));
                        o.hasReview = rs.exists();
                    } catch (e) { /* ignore */ }
                }));

                // 既存と結合（重複除去）
                const seen = new Set(allOrdersCache.map(o => o.d.id));
                newOrders.forEach(o => { if (!seen.has(o.d.id)) allOrdersCache.push(o); });

                renderAllOrders();

                // 5/25 #91/#92 拡張: 初回ページのみ render-cache に保存（次回訪問用）
                if (!append) {
                    try {
                        const cacheItems = allOrdersCache.map(o => ({
                            id: o.d.id,
                            order: serializeTimestamps(o.order),
                            fishName: o.fishName,
                            farmerName: o.farmerName || '',
                            hasReview: !!o.hasReview,
                        }));
                        saveRenderState('restaurant_orders', { items: cacheItems, hasMore: ordersHasMore });
                    } catch (e) { /* ignore */ }
                }

            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
                ordersLoadingMore = false;
            }
        }

        onLanguageChange(() => loadOrders());

        // 5/25 #91/#92 拡張: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        let cachedRendered = false;
        try {
            const cached = loadRenderState('restaurant_orders');
            if (cached?.items?.length) {
                allOrdersCache = cached.items.map(it => ({
                    d: { id: it.id },
                    order: reviveTimestamps(it.order),
                    fishName: it.fishName,
                    farmerName: it.farmerName || '',
                    hasReview: !!it.hasReview,
                }));
                ordersHasMore = !!cached.hasMore;
                renderAllOrders();
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached restaurant_orders render failed:', e);
        }

        waitForUserData(() => {
            localStorage.setItem('fishlink_rest_orders_seen', String(Date.now()));
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
                subscribeCart(window.currentUser.uid, (items) => {
                    const badge = document.getElementById('cart-badge');
                    if (badge) badge.style.display = items.length > 0 ? 'block' : 'none';
                });
            }
            loadOrders({ silent: cachedRendered });
        });
    </script>
</body>
</html>
