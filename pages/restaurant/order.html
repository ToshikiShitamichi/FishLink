<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-page {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 160px;
        }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            font-size: 14px;
            color: var(--color-text-sub);
            position: sticky;
            top: 0;
            background: var(--color-bg);
            z-index: 10;
        }

        .order-header__back {
            text-decoration: none;
            color: var(--color-text-sub);
            font-size: 18px;
        }

        .order-header__title {
            font-weight: 500;
        }

        /* 魚情報カード */
        .fish-detail {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            margin: 0 16px 16px;
        }

        .fish-detail__carousel {
            position: relative;
            overflow: hidden;
        }

        .fish-detail__slides {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .fish-detail__slides::-webkit-scrollbar { display: none; }

        .fish-detail__slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            height: 250px;
            background: linear-gradient(135deg, #d6d3d1, #f5f5f4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fish-detail__slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fish-detail__dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px 0;
        }

        .fish-detail__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
        }

        .fish-detail__dot.active {
            background: #1a1a1a;
        }

        .fish-detail__img-placeholder {
            font-size: 64px;
        }

        .fish-detail__body {
            padding: 16px;
        }

        .fish-detail__name {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text);
        }

        .fish-detail__price {
            font-size: 22px;
            font-weight: 800;
            /* 6/3 #117: 価格は青で全アプリ統一（緑は GAqP/成功専用） */
            color: var(--color-cta);
            margin-top: 4px;
        }

        .fish-detail__farmer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-sub);
            margin-top: 8px;
        }

        .fish-detail__location {
            font-size: 14px;
            color: var(--color-text-sub);
            margin-top: 4px;
        }

        .fish-detail__comment-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            border: 1px solid var(--color-border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--color-text-sub);
            text-decoration: none;
            background: var(--color-surface);
        }

        /* 5/23 #80: 注文画面 質問プレビュー枠（食べチョク参考） */
        .qa-preview {
            margin-top: 14px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: #f8fafc;
            padding: 12px;
        }
        .qa-preview__title {
            font-size: 12px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .qa-preview__title .material-symbols-outlined { font-size: 16px; color: #0d6e4c; }
        .qa-preview__item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 10px;
        }
        .qa-preview__head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .qa-preview__avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: #e2e8f0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .qa-preview__avatar > img { width: 100%; height: 100%; object-fit: cover; }
        .qa-preview__avatar > .material-symbols-outlined { font-size: 16px; color: #94a3b8; }
        .qa-preview__name { font-size: 12px; font-weight: 700; color: var(--color-text); flex: 1; min-width: 0; }
        .qa-preview__badge {
            font-size: 10px; font-weight: 700;
            padding: 1px 6px; border-radius: 999px;
            background: #eff6ff; color: #1e40af;
            white-space: nowrap;
        }
        .qa-preview__badge--reply { background: #ecfdf5; color: #065f46; }
        .qa-preview__badge--noreply { background: #fef3c7; color: #92400e; }
        .qa-preview__text {
            font-size: 12px;
            line-height: 1.5;
            color: var(--color-text);
            padding-left: 30px;
            white-space: pre-wrap;
            word-break: break-word;
            /* 2行で省略 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .qa-preview__reply { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--color-border); }
        .qa-preview__noreply-row { padding-left: 30px; margin-top: 6px; }
        .qa-preview__empty {
            text-align: center; padding: 10px;
            color: var(--color-text-sub); font-size: 12px;
        }
        .qa-preview__more {
            display: block;
            margin-top: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--color-cta);
            text-decoration: none;
            padding: 6px;
        }

        .fish-detail__badges {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge-delivery {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .badge-stock {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .badge-stock-out {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* 注文セクション */
        .order-section {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 16px;
        }

        .order-section__title {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 14px;
        }

        /* 数量コントロール */
        .qty-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .qty-label {
            font-size: 13px;
            color: var(--color-text-sub);
        }

        .qty-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 5/9 #61: 直接入力に対応するため input 化 */
        .qty-display {
            width: 64px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 6px;
            background: #f5f5f5;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-family: inherit;
            color: var(--color-text);
        }
        .qty-display:focus {
            outline: none;
            border-color: var(--color-cta);
            background: #fff;
        }
        /* number input の上下スピナー非表示（モバイルで触感を統一） */
        .qty-display::-webkit-outer-spin-button,
        .qty-display::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .qty-display { -moz-appearance: textfield; }

        /* 内臓処理ボタン */
        .gut-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .gut-btn {
            border-radius: 16px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-sub);
        }

        .gut-btn.active {
            /* #140: 選択状態＝青（緑=GAqP/成功/送料無料 専用） */
            border: 2px solid var(--color-cta);
            background: var(--color-cta-lt);
            color: var(--color-cta);
            font-weight: 600;
        }

        /* 納品日・時間帯 */
        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .date-box {
            border-radius: 16px;
            background: #f9fafb;
            padding: 12px;
            border: 1px solid var(--color-border);
        }

        .date-box__label {
            font-size: 11px;
            color: var(--color-text-sub);
        }

        .date-box select,
        .date-box input[type="date"] {
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            border: none;
            background: transparent;
            margin-top: 4px;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .date-box input[type="date"]:focus {
            outline: none;
        }

        /* 料金内訳 */
        .price-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 6px 0;
        }

        .price-line__label {
            color: var(--color-text-sub);
        }

        .price-line__value {
            font-weight: 500;
            color: var(--color-text);
        }

        .price-line__value.discount {
            /* #140: 割引＝amber（緑=GAqP/成功/送料無料 専用・カート明細と統一） */
            color: #b36a00;
        }

        .price-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px dashed var(--color-border);
            padding-top: 12px;
            margin-top: 8px;
        }

        .price-total__label {
            font-size: 17px;
            font-weight: 700;
        }

        .price-total__value {
            font-size: 22px;
            font-weight: 800;
        }

        /* 固定フッター */
        /* 5/27: DevTools モバイル表示で left:0/right:0/margin:auto の組み合わせが
           position:fixed の中央寄せとして機能しないケースがあるため、translateX 方式に変更。 */
        .order-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, .95);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px 16px;
            box-sizing: border-box;
            z-index: 10;
        }

        .order-footer__info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .order-footer__amount-label {
            font-size: 11px;
            color: var(--color-text-sub);
        }

        .order-footer__amount {
            font-size: 20px;
            font-weight: 800;
        }

        .order-footer__note {
            font-size: 11px;
            color: var(--color-text-sub);
            text-align: right;
            max-width: 160px;
        }

        .order-footer__btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: #f43f5e;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
        }

        .order-footer__btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 5/11 #66: フッターを「今すぐ注文」+「カートに入れる」の2ボタン構成に変更
           5/5 #47 の「カート一本化」方針から再変更（食べチョク式の導線） */
        .order-footer__actions {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        /* 6/1 #110: CTA は青(=DSプライマリ)一本化。主＝カートに入れる(青塗り)／副＝今すぐ注文(青枠)。
           赤(danger)は購入に使わない。 */
        /* 「今すぐ注文」：サブCTA（青枠） */
        .order-footer__btn--buy-now {
            flex: 1;
            background: #fff;
            color: var(--color-cta);
            border: 2px solid var(--color-cta);
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        .order-footer__btn--buy-now:hover { background: var(--color-cta-lt); }
        .order-footer__btn--buy-now:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-footer__btn--buy-now .material-symbols-outlined { font-size: 20px; }
        /* 「カートに入れる」：メインCTA（青塗り） */
        .order-footer__btn--cart {
            flex: 1;
            background: var(--color-cta);
            color: #fff;
            border: 2px solid var(--color-cta);
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        .order-footer__btn--cart:hover { background: var(--color-cta-dk); border-color: var(--color-cta-dk); }
        .order-footer__btn--cart:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-footer__btn--cart.added {
            background: var(--color-cta-lt);
            color: var(--color-cta-dk);
            border-color: var(--color-cta);
        }
        .order-footer__btn--cart .material-symbols-outlined { font-size: 20px; }

        /* 6/1 #110: 取引条件ブロック（産地+距離 / 配達の性質 / 最低注文量 / 在庫） */
        .terms-box {
            margin: 14px 0 0;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 2px 14px;
        }
        .term {
            display: flex; gap: 10px; align-items: flex-start;
            padding: 12px 0; border-bottom: 1px solid #f2f4f7;
            font-size: 13px;
        }
        .term:last-child { border-bottom: none; }
        .term__icon { flex-shrink: 0; color: var(--color-text-sub); }
        .term__icon .material-symbols-outlined { font-size: 20px; }
        .term__main { font-weight: 700; color: var(--color-text); }
        .term__sub { color: var(--color-text-sub); font-weight: 500; font-size: 12px; margin-top: 2px; line-height: 1.5; }

        /* 6/1 #110: セクション見出し */
        .sec-head {
            display: flex; align-items: center; gap: 8px;
            margin: 22px 0 10px;
            font-size: 15px; font-weight: 800; color: var(--color-text);
        }
        .sec-head::before { content: ""; width: 4px; height: 16px; background: var(--color-cta); border-radius: 2px; }

        /* 6/1 #110: Q&A 空状態の質問導線 */
        .qa-empty-box {
            background: var(--color-surface); border: 1px dashed var(--color-border); border-radius: 12px;
            padding: 16px 14px; text-align: center;
        }
        .qa-empty-box__txt { font-size: 13px; color: var(--color-text-sub); }
        .qa-empty-box__btn {
            display: inline-block; margin-top: 8px;
            font-size: 13px; font-weight: 700; color: var(--color-cta); cursor: pointer; text-decoration: none;
        }
        /* 6/1 #110: GAqP 認証ボックス（緑） */
        .gaqp-detail-box {
            margin-top: 12px; padding: 12px 14px;
            background: var(--color-primary-lt); border: 1px solid #c5e3c8; border-radius: 12px;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .gaqp-detail-box__icon { color: var(--color-primary); flex-shrink: 0; }
        .gaqp-detail-box__icon .material-symbols-outlined { font-size: 20px; }
        .gaqp-detail-box__title { font-size: 13px; font-weight: 800; color: var(--color-primary); }
        .gaqp-detail-box__txt { font-size: 12px; color: var(--color-primary-dk); margin-top: 3px; line-height: 1.5; }
        /* 6/1 #110: 価格の内臓処理込み注記 */
        .fish-detail__price-incl { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .fish-detail__farmer-link { display:flex; align-items:center; gap:8px; text-decoration:none; color:inherit; }
        /* 6/21 #162①: 農家アバター（farmer.avatarUrl）を円形表示・未設定はデフォルト人型 */
        .fish-detail__farmer-avatar { width:32px; height:32px; border-radius:50%; background:#e2e8f0; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; overflow:hidden; }
        .fish-detail__farmer-avatar img { width:100%; height:100%; object-fit:cover; }
        .fish-detail__farmer-avatar .material-symbols-outlined { font-size:18px; color:#94a3b8; }
        .fish-detail__rate-new { font-size: 13px; color: var(--color-text-sub); font-weight: 600; }

        /* カート追加後モーダル */
        .cart-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
        }
        .cart-modal.show { display: flex; }
        .cart-modal__sheet {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .cart-modal__title {
            display: flex; align-items: center; gap: 8px;
            font-size: 17px; font-weight: 700;
            margin-bottom: 6px;
        }
        .cart-modal__title .material-symbols-outlined {
            color: #16a34a; font-size: 22px;
            font-variation-settings: 'FILL' 1;
        }
        .cart-modal__sub {
            font-size: 13px; color: var(--color-text-sub);
            margin-bottom: 18px;
        }
        .cart-modal__actions {
            display: flex; gap: 8px;
        }
        .cart-modal__btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .cart-modal__btn--primary {
            background: var(--color-cta);
            color: #fff;
            border: 2px solid var(--color-cta);
        }
        .cart-modal__btn--primary:hover { background: var(--color-cta-dk); border-color: var(--color-cta-dk); }
        .cart-modal__btn--secondary {
            background: #fff;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }
        .cart-modal__btn--secondary:hover { background: #f8fafc; }
        .cart-modal__btn .material-symbols-outlined { font-size: 18px; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer></script>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="order-page">

        <!-- ヘッダー -->
        <div class="order-header">
            <a href="/pages/restaurant/dashboard.html" class="order-header__back"><span class="material-symbols-outlined">arrow_back</span></a>
            <span class="order-header__title" id="order-header-title"></span>
            <span>&nbsp;</span>
        </div>

        <!-- 魚情報 -->
        <div class="fish-detail" id="fish-detail"></div>

        <!-- 5/12 #68: 注文内容入力（数量・内臓処理・納品日時）はカート画面に集約。
             商品紹介ページは商品情報の確認に特化。
             5/12 #68: 価格表示は単価のみ（合計は数量入力のあるカート画面で表示）。 -->

        <!-- ⑨この農家の他の出品（現出品は除外・サイズ表示・横スクロール） -->
        <div id="more-from-farmer" style="display:none; margin:0 16px 16px;">
            <div class="sec-head"><span data-i18n="order.moreFromFarmerTitle"></span></div>
            <div id="more-from-farmer-list" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;"></div>
        </div>

    </div>

    <!-- 固定フッター -->
    <!-- 5/12 #68: 「今すぐ注文」+「カートに入れる」の2ボタン構成。
         両方ともカート画面で注文内容（数量・内臓処理・納品日時）を入力する。
         今すぐ注文: 最低注文量で追加 → カート画面へ直行
         カートに入れる: 最低注文量で追加 → モーダル表示（カートへ進む or 買い物を続ける） -->
    <div class="order-footer">
        <div class="order-footer__actions">
            <button class="order-footer__btn--cart" id="add-cart-btn" type="button" aria-label="add to cart">
                <span class="material-symbols-outlined" id="add-cart-btn-icon">add_shopping_cart</span>
                <span id="add-cart-btn-label" data-i18n="cart.addToCart"></span>
            </button>
            <button class="order-footer__btn--buy-now" id="buy-now-btn" type="button" aria-label="buy now">
                <span class="material-symbols-outlined">flash_on</span>
                <span data-i18n="order.buyNow"></span>
            </button>
        </div>
    </div>

    <!-- 5/11 #66: カート追加後モーダル -->
    <div class="cart-modal" id="cart-added-modal" role="dialog" aria-modal="true">
        <div class="cart-modal__sheet">
            <div class="cart-modal__title">
                <span class="material-symbols-outlined">check_circle</span>
                <span data-i18n="cart.addedModalTitle"></span>
            </div>
            <div class="cart-modal__sub" data-i18n="cart.addedModalSub"></div>
            <div class="cart-modal__actions">
                <button class="cart-modal__btn cart-modal__btn--secondary" type="button" id="modal-continue-btn">
                    <span class="material-symbols-outlined">storefront</span>
                    <span data-i18n="cart.addedModalContinue"></span>
                </button>
                <a class="cart-modal__btn cart-modal__btn--primary" id="modal-go-cart-btn" href="/pages/restaurant/cart.html">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span data-i18n="cart.addedModalGoCart"></span>
                </a>
            </div>
        </div>
    </div>

    <!-- エラーメッセージ -->
    <div class="error-msg" id="error-msg" style="position:fixed; top:60px; left:16px; right:16px; max-width:448px; margin:0 auto; z-index:20;"></div>

    <script type="module">
        import { initI18n, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { addToCart, subscribeCart } from '/js/cart.js';
        import {
            doc, getDoc, collection, query, where, orderBy, limit, getDocs
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { getCachedDistance, setCachedDistance } from '/js/distance-cache.js';
        import { formatProvince, formatDistrict } from '/js/province-utils.js';
        // 5/23 #80: 質問プレビューのアバター画像
        import { getReviewerAvatarUrl } from '/js/profile-utils.js';
        // 5/23 #69 改善: メモリ画像キャッシュ（フラッシュ解消）
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users/fishListings の重複取得を抑止
        import { getCachedUser, getCachedListing } from '/js/data-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');

        watchAuthState({ requireAuth: true });
        await initI18n();

        // URLからlistingId取得
        const params = new URLSearchParams(location.search);
        const listingId = params.get('id');
        if (!listingId) { location.href = '/pages/restaurant/fish-list.html'; }

        // ── 道路距離計算（Google Maps Distance Matrix） ──
        // {km, ok} を返す。ok=true のとき道路距離成功（キャッシュ対象）
        async function calcRoadDistance(lat1, lng1, lat2, lng2) {
            return new Promise((resolve) => {
                if (typeof google === 'undefined' || !google.maps) {
                    resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    return;
                }
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [new google.maps.LatLng(lat1, lng1)],
                    destinations: [new google.maps.LatLng(lat2, lng2)],
                    travelMode: google.maps.TravelMode.DRIVING,
                }, (response, status) => {
                    if (status === 'OK' && response.rows[0]?.elements[0]?.status === 'OK') {
                        resolve({ km: response.rows[0].elements[0].distance.value / 1000, ok: true });
                    } else {
                        resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    }
                });
            });
        }

        function haversine(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2
                + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
                * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ── データ取得 & 表示 ──
        let listingData = null;
        let farmerData = null;
        let distanceKm = 0;
        // 5/12 #68: 数量・内臓処理・納品日時は カート画面側で入力するため、
        //   ここでは「カート追加時のデフォルト値」のみ持つ。
        let serviceRate = 0.05;          // デフォルト5%、settings/campaignから取得（単価表示用）

        function waitForUserData(callback) {
            if (window.currentUserData) { callback(); }
            else { setTimeout(() => waitForUserData(callback), 300); }
        }

        // 5/23 #69 Phase J: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        //   listingId 単位でキャッシュ。次回同じ商品ページを開いたとき即時表示される。
        //   loadQuestionPreview / loadMoreFromFarmer は auth 完了後（waitForUserData 内）で実行。
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`order:${listingId}`);
            if (cached?.listingData && cached?.farmerData) {
                listingData = cached.listingData;
                farmerData = cached.farmerData;
                distanceKm = cached.distanceKm ?? 0;
                serviceRate = cached.serviceRate ?? 0.05;
                renderFishDetail();
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached order render failed:', e);
        }

        // 5/5: カート状態の購読 — フッターのボタン状態と「他の魚」セクションの追加済み表示を維持
        let cartItemsCount = 0;
        let cartListingIds = new Set();
        let isThisInCart = false;
        function startCartWatch() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            subscribeCart(uid, (items) => {
                cartItemsCount = items.length;
                cartListingIds = new Set(items.map(it => it.listingId));
                isThisInCart = cartListingIds.has(listingId);
                refreshCartUI();
            });
        }

        function refreshCartUI() {
            // フッター：「カートに追加 / カートに追加済み」のトグル
            const btn = document.getElementById('add-cart-btn');
            const icon = document.getElementById('add-cart-btn-icon');
            const label = document.getElementById('add-cart-btn-label');
            if (btn && icon && label) {
                if (isThisInCart) {
                    btn.classList.add('added');
                    icon.textContent = 'check';
                    label.textContent = i18next.t('cart.inCart');
                } else {
                    btn.classList.remove('added');
                    icon.textContent = 'add_shopping_cart';
                    label.textContent = i18next.t('cart.addToCart');
                }
            }
        }

        waitForUserData(async () => {
            // 5/23 #69 Phase J: cached 描画済なら spinner を出さず裏で更新
            if (!cachedRendered) loading.classList.add('show');
            try {
                // 5/23 #69 Phase B: data-cache 経由（同一タブ内の重複取得を抑止）
                listingData = await getCachedListing(listingId);
                if (!listingData) { location.href = '/pages/restaurant/fish-list.html'; return; }

                farmerData = (await getCachedUser(listingData.farmerId)) || {};

                // 距離計算（キャッシュ優先、なければ Distance Matrix 呼出）
                const myLoc = window.currentUserData?.location;
                const farmerLoc = farmerData.location;
                if (myLoc && farmerLoc) {
                    const uid = window.currentUser?.uid;
                    const locs = { rLat: myLoc.lat, rLng: myLoc.lng, fLat: farmerLoc.lat, fLng: farmerLoc.lng };
                    const cached = getCachedDistance(uid, listingData.farmerId, locs);
                    if (cached !== null) {
                        distanceKm = cached;
                    } else {
                        const r = await calcRoadDistance(myLoc.lat, myLoc.lng, farmerLoc.lat, farmerLoc.lng);
                        distanceKm = r.km;
                        if (r.ok) setCachedDistance(uid, listingData.farmerId, r.km, locs);
                    }
                }

                // キャンペーン・料率取得（単価表示にサービス料を反映するため）
                try {
                    const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                    if (campSnap.exists()) {
                        const campData = campSnap.data();
                        serviceRate = campData.serviceRate ?? 0.05;
                    }
                } catch (e) { /* settings未作成時は無視 */ }

                renderFishDetail();
                // 5/23 #80: 質問プレビュー（最新の質問+返信ペア1件）を非同期描画
                loadQuestionPreview();
                // 同一農家の他商品（配送料節約のヒント）
                loadMoreFromFarmer();
                // 5/5 #3: カート状態の購読
                startCartWatch();
                // 5/23 #69 Phase J: 次回訪問用に cache 保存
                try {
                    saveRenderState(`order:${listingId}`, {
                        listingData, farmerData, distanceKm, serviceRate,
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        // 言語切替時にカートUIテキスト + 商品詳細（ヘッダー魚名・取引条件等）を再描画
        onLanguageChange(() => {
            refreshCartUI();
            if (listingData) {
                renderFishDetail();
                loadQuestionPreview();
                loadMoreFromFarmer();
            }
        });

        // ── 同一農家の他商品 ──
        // 5/12 #68: カード自体をリンク化し、その魚の商品紹介ページに遷移するよう変更。
        //   カート追加ボタンは廃止（カートへの追加はこのページからのみ）。
        async function loadMoreFromFarmer() {
            try {
                const q = query(
                    collection(db, 'fishListings'),
                    where('farmerId', '==', listingData.farmerId),
                    where('isActive', '==', true)
                );
                const snap = await getDocs(q);
                const others = snap.docs.filter(d => d.id !== listingId).slice(0, 5);
                if (others.length === 0) return;

                const wrap = document.getElementById('more-from-farmer');
                const list = document.getElementById('more-from-farmer-list');
                list.innerHTML = others.map(d => {
                    const x = d.data();
                    const fName = i18next.exists(`fish.${x.fishType}`) ? i18next.t(`fish.${x.fishType}`) : x.fishType;
                    const shortName = String(fName).trim();
                    const unit = Math.round(((x.price || 0) + (x.gutPrice || 0)) * (1 + serviceRate));
                    const sz = x.size || '';
                    const img = x.photoUrl
                        ? `<img ${asCachedImgAttrs(x.photoUrl)} alt="" loading="lazy" style="width:100%; height:96px; object-fit:cover; border-radius:10px 10px 0 0;">`
                        : `<div style="width:100%; height:96px; background:#f1f5f9; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center;"><span class="material-symbols-outlined" style="font-size:32px; color:#94a3b8;">set_meal</span></div>`;
                    return `
                        <a href="/pages/restaurant/order.html?id=${d.id}" style="flex-shrink:0; width:150px; text-decoration:none; color:inherit; display:block; background:var(--color-surface); border:1px solid var(--color-border); border-radius:12px; overflow:hidden;">
                            ${img}
                            <div style="padding:8px 10px 10px;">
                                <div style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--color-text);">${escapeHtml(shortName)}</div>
                                ${sz ? `<div style="font-size:11px; color:var(--color-text-sub); margin-top:2px;">${escapeHtml(sz)} head/kg</div>` : ''}
                                <div style="font-size:16px; font-weight:800; color:var(--color-cta); margin-top:6px;">${unit.toLocaleString()}<span style="font-size:10px; color:var(--color-text-sub); font-weight:600;"> KHR/kg</span></div>
                            </div>
                        </a>
                    `;
                }).join('');
                wrap.style.display = 'block';
            } catch (e) {
                console.warn('loadMoreFromFarmer failed:', e.message);
            }
        }

        // ── 5/23 #80 → 6/1 #110: 質問・返信 teaser（最新1スレッド + 件数リンク or 0件導線） ──
        async function loadQuestionPreview() {
            const section = document.getElementById('qa-section');
            if (!section) return;
            try {
                // 件数把握のため直近20件取得 → 削除済みを除外（多くの出品でQ&Aは少数）
                const q = query(
                    collection(db, 'fishListings', listingId, 'comments'),
                    orderBy('createdAt', 'desc'),
                    limit(20)
                );
                const snap = await getDocs(q);
                const all = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.isDeleted !== true);
                // 6/3 #117: teaser はスレッドの「元の質問（root）」を主に表示する。
                //   root＝parentReplyId を持たない最上位の質問。all は createdAt desc なので roots[0] が最新スレッドの起点。
                //   途中のフォローアップ発言（parentReplyId 付き）を主表示にしない（文脈が欠けるため）。
                // 6/18 #153-①: teaser 件数＝取り消し済みを除いた「スレッド（root）数」（1スレッド=1件）。
                //   旧 all.length は質問＋全返信を数えており質問ページの実スレッド数と食い違っていた。
                const roots = all.filter(d => !d.parentReplyId);
                const count = roots.length;
                if (count === 0) {
                    // 0件＝空状態の質問導線（既に描画済み・#8）
                    return;
                }
                const c = roots[0];
                // 質問者の名前（5/23 #69 Phase B: data-cache 経由）
                const sender = (await getCachedUser(c.senderId)) || {};
                const senderName = sender.displayName || '';

                // 6/3 #117: そのスレッドの「最新返信」を添える（あれば）。
                //   返信＝この root への child doc（parentReplyId === c.id）または root に埋め込まれた legacy replyText。
                const childReplies = all.filter(d => d.parentReplyId === c.id);
                let latestReply = null; // { text, byUid, atMs }
                if (c.replyText) {
                    latestReply = { text: c.replyText, byUid: c.replyByUid, atMs: c.replyAt?.toMillis?.() || 0 };
                }
                for (const ch of childReplies) {
                    const atMs = ch.createdAt?.toMillis?.() || 0;
                    if (!latestReply || atMs >= latestReply.atMs) {
                        latestReply = { text: ch.text, byUid: ch.senderId, atMs };
                    }
                }
                let replyHtml = '';
                if (latestReply && latestReply.text) {
                    let replyUser = farmerData;
                    if (latestReply.byUid && latestReply.byUid !== listingData.farmerId) {
                        try { const r = await getCachedUser(latestReply.byUid); if (r) replyUser = r; } catch (e) { /* fall through */ }
                    }
                    const replyName = replyUser.displayName || '';
                    replyHtml = `
                        <div style="display:flex; gap:8px; margin-top:12px; padding-left:14px; border-left:2px solid var(--color-border);">
                            <span style="font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px; flex-shrink:0; height:fit-content; background:var(--color-primary-lt); color:var(--color-primary);">${escapeHtml(i18next.t('comments.replyLabel'))}</span>
                            <div>
                                <div style="font-size:13px; line-height:1.55; color:var(--color-text);">${escapeHtml(latestReply.text)}</div>
                                <div style="font-size:11px; color:var(--color-text-sub); margin-top:3px;">${escapeHtml(replyName)}</div>
                            </div>
                        </div>`;
                }

                section.innerHTML = `
                    <div style="background:var(--color-surface); border:1px solid var(--color-border); border-radius:12px; padding:12px 14px;">
                        <div style="display:flex; gap:8px;">
                            <span style="font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px; flex-shrink:0; height:fit-content; background:#eaf2fb; color:#1e40af;">${escapeHtml(i18next.t('comments.questionLabel'))}</span>
                            <div>
                                <div style="font-size:13px; line-height:1.55; color:var(--color-text);">${escapeHtml(c.text || '')}</div>
                                <div style="font-size:11px; color:var(--color-text-sub); margin-top:3px;">${escapeHtml(senderName)}</div>
                            </div>
                        </div>
                        ${replyHtml}
                    </div>
                    <a href="/pages/restaurant/comments.html?id=${listingId}" style="display:block; text-align:center; margin-top:10px; font-size:13px; font-weight:700; color:var(--color-cta); text-decoration:none; padding:6px;">${escapeHtml(i18next.t('order.viewAllQuestions', { count }))} →</a>
                `;
            } catch (e) {
                console.warn('loadQuestionPreview failed:', e.message);
                // フォールバック：0件導線のまま
            }
        }

        // ── 魚情報カード描画 ──
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderFishDetail() {
            const fishName = i18next.exists(`fish.${listingData.fishType}`)
                ? i18next.t(`fish.${listingData.fishType}`)
                : listingData.fishType;

            // 写真カルーセル（photos配列 or photoUrl単体）
            const photos = listingData.photos?.length > 0
                ? listingData.photos
                : (listingData.photoUrl ? [listingData.photoUrl] : []);

            // 6/1 #110: ヘッダーのタイトルを魚名に
            const headerTitle = document.getElementById('order-header-title');
            if (headerTitle) headerTitle.textContent = fishName;

            const dist = Math.floor(distanceKm * 10) / 10;
            // 6/1 #110: 評価は ★好評価率%(件数)。avgRating は「よい率」(0-100)。0件は「新規」(#1)
            const positivePct = Math.round(farmerData.avgRating || 0);
            const reviewCount = farmerData.reviewCount || 0;
            const ratingHtml = reviewCount > 0
                ? `<span style="color:var(--color-text-sub);"><span class="material-symbols-outlined" style="font-size:16px; color:#f59e0b; vertical-align:-3px;">star</span> ${positivePct}% (${reviewCount})</span>`
                : `<span class="fish-detail__rate-new">${i18next.t('fishlist.newFarmer')}</span>`;
            // 5/11 #65 + 拡張: province は i18n ラベル、district は UI 言語に応じて km/en 切替
            const province = formatProvince(farmerData.province || '');
            const district = formatDistrict(farmerData);
            const placeText = province + (district ? ', ' + district : '');
            const stock = listingData.stock || 0;
            const size = listingData.size || '';
            const minOrder = Number(listingData.minOrder) || 0;

            let carouselHtml;
            if (photos.length === 0) {
                carouselHtml = `<div class="fish-detail__slide"><span class="fish-detail__img-placeholder"><span class="material-symbols-outlined" style="font-size:64px;">set_meal</span></span></div>`;
            } else if (photos.length === 1) {
                // 5/23 Phase I: ヒーロー画像は LCP の主候補 → fetchpriority="high"
                carouselHtml = `<div class="fish-detail__slide"><img ${asCachedImgAttrs(photos[0], { priority: 'high' })} alt="${fishName}"></div>`;
            } else {
                // 5/23 Phase I: カルーセル先頭を LCP 候補として優先、2 枚目以降は通常
                const slides = photos.map((url, idx) => `<div class="fish-detail__slide"><img ${asCachedImgAttrs(url, idx === 0 ? { priority: 'high' } : {})} alt="${fishName}"></div>`).join('');
                const dots = photos.map((_, i) => `<div class="fish-detail__dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');
                carouselHtml = `
                    <div class="fish-detail__slides" id="photo-slides">${slides}</div>
                    <div class="fish-detail__dots" id="photo-dots">${dots}</div>
                `;
            }

            // 6/1 #110: 価格は内臓処理込みの単一値（手数料込み）＋グレー注記（常時）。単一の正(§7)。
            const displayPrice = Math.round(((listingData.price || 0) + (listingData.gutPrice || 0)) * (1 + serviceRate));

            document.getElementById('fish-detail').innerHTML = `
                <div class="fish-detail__carousel">${carouselHtml}</div>
                <div class="fish-detail__body">
                    <!-- ②魚名(サイズ) -->
                    <div class="fish-detail__name">${escapeHtml(fishName)}${size ? `（${escapeHtml(size)} head/kg）` : ''}</div>
                    <!-- ③価格（内臓処理込み単一値＋グレー注記） -->
                    <div class="fish-detail__price">${displayPrice.toLocaleString()} KHR/kg</div>
                    <div class="fish-detail__price-incl">${listingData.gutPrice == null ? i18next.t('order.priceWholeFishOnly') : i18next.t('order.priceGutIncluded')}</div>
                    <!-- ④農家行（タップで生産者ページ・★好評価率%） -->
                    <div class="fish-detail__farmer">
                        <a href="/pages/restaurant/farmer.html?id=${listingData.farmerId}" class="fish-detail__farmer-link">
                            <span class="fish-detail__farmer-avatar">${farmerData.avatarUrl ? `<img ${asCachedImgAttrs(farmerData.avatarUrl)} alt="">` : `<span class="material-symbols-outlined">person</span>`}</span>
                            <span style="font-weight:700; color:var(--color-text);">${escapeHtml(farmerData.displayName || '')}</span>
                        </a>
                        ${ratingHtml}
                    </div>
                    <!-- ⑤GAqP認証ボックス（認証農家のみ・見出し「GAqP 認証農家」） -->
                    ${farmerData.gaqpCertified === true ? `
                        <div class="gaqp-detail-box">
                            <span class="gaqp-detail-box__icon"><span class="material-symbols-outlined">verified</span></span>
                            <div>
                                <div class="gaqp-detail-box__title">${i18next.t('gaqp.boxTitle')}</div>
                                <div class="gaqp-detail-box__txt">${i18next.t('gaqp.description')}</div>
                            </div>
                        </div>
                    ` : ''}
                    <!-- ⑥取引条件ブロック -->
                    <div class="terms-box">
                        ${placeText ? `
                        <div class="term">
                            <span class="term__icon"><span class="material-symbols-outlined">location_on</span></span>
                            <div>
                                <div class="term__main">${escapeHtml(placeText)}</div>
                                <div class="term__sub">${i18next.t('order.distanceFromYou', { km: dist })}</div>
                            </div>
                        </div>` : ''}
                        <div class="term">
                            <span class="term__icon"><span class="material-symbols-outlined">local_shipping</span></span>
                            <div>
                                <div class="term__main">${i18next.t('order.deliveryAvailable')}</div>
                                <div class="term__sub">${i18next.t('order.deliveryNatureSub')}</div>
                            </div>
                        </div>
                        ${minOrder > 0 ? `
                        <div class="term">
                            <span class="term__icon"><span class="material-symbols-outlined">shopping_basket</span></span>
                            <div><div class="term__main">${i18next.t('order.minOrderTerm', { kg: minOrder })}</div></div>
                        </div>` : ''}
                        <div class="term">
                            <span class="term__icon"><span class="material-symbols-outlined">inventory_2</span></span>
                            <div><div class="term__main">${i18next.t('restaurant.stock', { kg: stock })}</div></div>
                        </div>
                    </div>
                    <!-- ⑦商品の説明（未記入ならセクションごと非表示・Q&Aより上） -->
                    ${listingData.description ? `
                        <div class="sec-head">${i18next.t('order.descriptionLabel')}</div>
                        <div style="font-size:13px; color:var(--color-text); line-height:1.7; white-space:pre-wrap; word-break:break-word;">${escapeHtml(listingData.description)}</div>
                    ` : ''}
                    <!-- ⑧Q&A（最新1スレッド＋「質問をすべて見る(◯件)」／0件は「この魚について質問する」） -->
                    <div class="sec-head">${escapeHtml(i18next.t('comments.previewTitle'))}</div>
                    <div id="qa-section">
                        <div class="qa-empty-box">
                            <div class="qa-empty-box__txt">${escapeHtml(i18next.t('comments.previewEmpty'))}</div>
                            <a href="/pages/restaurant/comments.html?id=${listingId}" class="qa-empty-box__btn">${escapeHtml(i18next.t('order.askQuestion'))} →</a>
                        </div>
                    </div>
                </div>
            `;

            // カルーセルドット連動
            const slidesEl = document.getElementById('photo-slides');
            const dotsEl = document.getElementById('photo-dots');
            if (slidesEl && dotsEl) {
                slidesEl.addEventListener('scroll', () => {
                    const scrollLeft = slidesEl.scrollLeft;
                    const slideWidth = slidesEl.offsetWidth;
                    const activeIndex = Math.round(scrollLeft / slideWidth);
                    dotsEl.querySelectorAll('.fish-detail__dot').forEach((dot, i) => {
                        dot.classList.toggle('active', i === activeIndex);
                    });
                });
                // ドットタップでスライド
                dotsEl.querySelectorAll('.fish-detail__dot').forEach(dot => {
                    dot.addEventListener('click', () => {
                        const index = parseInt(dot.dataset.index);
                        slidesEl.scrollTo({ left: index * slidesEl.offsetWidth, behavior: 'smooth' });
                    });
                });
            }
        }

        // ── 5/12 #68: カート追加共通処理 ──
        // 数量・内臓処理・納品日時はカート画面で入力する。
        // ここでは「最低注文量・内臓処理あり」をデフォルトで追加する。
        async function addThisToCart() {
            const uid = window.currentUser?.uid;
            if (!uid || !listingData) return;
            // 既にカートにある場合は二重追加せず、そのまま遷移先に任せる
            if (cartListingIds.has(listingId)) return;
            const defaultQty = Number(listingData.minOrder) || 1;
            await addToCart(uid, {
                listingId,
                farmerId: listingData.farmerId,
                quantity: defaultQty,
                gutProcessing: listingData.gutPrice == null ? false : true,
            });
        }

        // 「カートに入れる」→ 追加 + モーダル表示
        document.getElementById('add-cart-btn').addEventListener('click', async () => {
            errorMsg.classList.remove('show');
            const cartBtn = document.getElementById('add-cart-btn');
            cartBtn.disabled = true;
            try {
                await addThisToCart();
                document.getElementById('cart-added-modal').classList.add('show');
            } catch (err) {
                console.error('addToCart failed:', err);
                errorMsg.textContent = err.message || i18next.t('cart.errorSubmit');
                errorMsg.classList.add('show');
            } finally {
                cartBtn.disabled = false;
            }
        });

        // モーダル：「買い物を続ける」で閉じる
        document.getElementById('modal-continue-btn').addEventListener('click', () => {
            document.getElementById('cart-added-modal').classList.remove('show');
        });
        // モーダル背景タップで閉じる
        document.getElementById('cart-added-modal').addEventListener('click', (e) => {
            if (e.target.id === 'cart-added-modal') {
                document.getElementById('cart-added-modal').classList.remove('show');
            }
        });

        // 「今すぐ注文」→ 追加 + カート画面へ直行（カート画面で数量・納品日時を入力）
        document.getElementById('buy-now-btn').addEventListener('click', async () => {
            errorMsg.classList.remove('show');
            const btn = document.getElementById('buy-now-btn');
            btn.disabled = true;
            try {
                await addThisToCart();
                window.location.href = '/pages/restaurant/cart.html';
            } catch (err) {
                console.error('buyNow failed:', err);
                errorMsg.textContent = err.message || i18next.t('cart.errorSubmit');
                errorMsg.classList.add('show');
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
