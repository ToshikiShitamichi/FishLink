<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-page {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 160px;
        }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            font-size: 14px;
            color: var(--color-text-sub);
            position: sticky;
            top: 0;
            background: var(--color-bg);
            z-index: 10;
        }

        .order-header__back {
            text-decoration: none;
            color: var(--color-text-sub);
            font-size: 18px;
        }

        .order-header__title {
            font-weight: 500;
        }

        /* 魚情報カード */
        .fish-detail {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            margin: 0 16px 16px;
        }

        .fish-detail__carousel {
            position: relative;
            overflow: hidden;
        }

        .fish-detail__slides {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .fish-detail__slides::-webkit-scrollbar { display: none; }

        .fish-detail__slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            height: 250px;
            background: linear-gradient(135deg, #d6d3d1, #f5f5f4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fish-detail__slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fish-detail__dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px 0;
        }

        .fish-detail__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
        }

        .fish-detail__dot.active {
            background: #1a1a1a;
        }

        .fish-detail__img-placeholder {
            font-size: 64px;
        }

        .fish-detail__body {
            padding: 16px;
        }

        .fish-detail__name {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text);
        }

        .fish-detail__price {
            font-size: 22px;
            font-weight: 800;
            color: var(--color-text);
            margin-top: 4px;
        }

        .fish-detail__farmer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-sub);
            margin-top: 8px;
        }

        .fish-detail__location {
            font-size: 14px;
            color: var(--color-text-sub);
            margin-top: 4px;
        }

        .fish-detail__comment-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            border: 1px solid var(--color-border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--color-text-sub);
            text-decoration: none;
            background: var(--color-surface);
        }

        .fish-detail__badges {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge-delivery {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .badge-stock {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .badge-stock-out {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* 注文セクション */
        .order-section {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 16px;
        }

        .order-section__title {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 14px;
        }

        /* 数量コントロール */
        .qty-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .qty-label {
            font-size: 13px;
            color: var(--color-text-sub);
        }

        .qty-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 5/9 #61: 直接入力に対応するため input 化 */
        .qty-display {
            width: 64px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 6px;
            background: #f5f5f5;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-family: inherit;
            color: var(--color-text);
        }
        .qty-display:focus {
            outline: none;
            border-color: var(--color-primary);
            background: #fff;
        }
        /* number input の上下スピナー非表示（モバイルで触感を統一） */
        .qty-display::-webkit-outer-spin-button,
        .qty-display::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .qty-display { -moz-appearance: textfield; }

        /* 内臓処理ボタン */
        .gut-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .gut-btn {
            border-radius: 16px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-sub);
        }

        .gut-btn.active {
            border: 2px solid #16a34a;
            background: #f0fdf4;
            color: #166534;
            font-weight: 600;
        }

        /* 納品日・時間帯 */
        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .date-box {
            border-radius: 16px;
            background: #f9fafb;
            padding: 12px;
            border: 1px solid var(--color-border);
        }

        .date-box__label {
            font-size: 11px;
            color: var(--color-text-sub);
        }

        .date-box select,
        .date-box input[type="date"] {
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            border: none;
            background: transparent;
            margin-top: 4px;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .date-box input[type="date"]:focus {
            outline: none;
        }

        /* 料金内訳 */
        .price-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 6px 0;
        }

        .price-line__label {
            color: var(--color-text-sub);
        }

        .price-line__value {
            font-weight: 500;
            color: var(--color-text);
        }

        .price-line__value.discount {
            color: #16a34a;
        }

        .price-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px dashed var(--color-border);
            padding-top: 12px;
            margin-top: 8px;
        }

        .price-total__label {
            font-size: 17px;
            font-weight: 700;
        }

        .price-total__value {
            font-size: 22px;
            font-weight: 800;
        }

        /* 固定フッター */
        .order-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255, 255, 255, .95);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px 16px;
            z-index: 10;
        }

        .order-footer__info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .order-footer__amount-label {
            font-size: 11px;
            color: var(--color-text-sub);
        }

        .order-footer__amount {
            font-size: 20px;
            font-weight: 800;
        }

        .order-footer__note {
            font-size: 11px;
            color: var(--color-text-sub);
            text-align: right;
            max-width: 160px;
        }

        .order-footer__btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: #f43f5e;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
        }

        .order-footer__btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 5/11 #66: フッターを「今すぐ注文」+「カートに入れる」の2ボタン構成に変更
           5/5 #47 の「カート一本化」方針から再変更（食べチョク式の導線） */
        .order-footer__actions {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        /* 「今すぐ注文」：メインCTA */
        .order-footer__btn--buy-now {
            flex: 1;
            background: #f43f5e;
            color: #fff;
            border: 2px solid #f43f5e;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        .order-footer__btn--buy-now:hover { background: #e11d48; border-color: #e11d48; }
        .order-footer__btn--buy-now:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-footer__btn--buy-now .material-symbols-outlined { font-size: 20px; }
        /* 「カートに入れる」：サブCTA */
        .order-footer__btn--cart {
            flex: 1;
            background: #fff;
            color: #047857;
            border: 2px solid #10b981;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        .order-footer__btn--cart:hover { background: #ecfdf5; }
        .order-footer__btn--cart:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-footer__btn--cart.added {
            background: #ecfdf5;
            color: #047857;
            border-color: #10b981;
        }
        .order-footer__btn--cart .material-symbols-outlined { font-size: 20px; }

        /* カート追加後モーダル */
        .cart-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
        }
        .cart-modal.show { display: flex; }
        .cart-modal__sheet {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .cart-modal__title {
            display: flex; align-items: center; gap: 8px;
            font-size: 17px; font-weight: 700;
            margin-bottom: 6px;
        }
        .cart-modal__title .material-symbols-outlined {
            color: #16a34a; font-size: 22px;
            font-variation-settings: 'FILL' 1;
        }
        .cart-modal__sub {
            font-size: 13px; color: var(--color-text-sub);
            margin-bottom: 18px;
        }
        .cart-modal__actions {
            display: flex; gap: 8px;
        }
        .cart-modal__btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .cart-modal__btn--primary {
            background: #10b981;
            color: #fff;
            border: 2px solid #10b981;
        }
        .cart-modal__btn--primary:hover { background: #059669; border-color: #059669; }
        .cart-modal__btn--secondary {
            background: #fff;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }
        .cart-modal__btn--secondary:hover { background: #f8fafc; }
        .cart-modal__btn .material-symbols-outlined { font-size: 18px; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer></script>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="order-page">

        <!-- ヘッダー -->
        <div class="order-header">
            <a href="/pages/restaurant/dashboard.html" class="order-header__back"><span class="material-symbols-outlined">arrow_back</span></a>
            <span class="order-header__title" data-i18n="order.title"></span>
            <span>&nbsp;</span>
        </div>

        <!-- 魚情報 -->
        <div class="fish-detail" id="fish-detail"></div>

        <!-- 注文内容 -->
        <div class="order-section">
            <div class="order-section__title" data-i18n="order.section"></div>

            <!-- 数量 -->
            <div class="qty-row">
                <div>
                    <div class="qty-label" data-i18n="order.quantity"></div>
                    <div class="qty-value" id="qty-label">5 kg</div>
                    <div class="qty-label" id="min-order-hint" style="color:#ea580c; margin-top:2px; display:none;"></div>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" id="qty-minus">−</button>
                    <input type="number" class="qty-display" id="qty-display" value="5" min="0" step="0.1" inputmode="decimal">
                    <button class="qty-btn" id="qty-plus">＋</button>
                </div>
            </div>

            <!-- 内臓処理 -->
            <div>
                <div class="qty-label" style="margin-bottom:8px;" data-i18n="order.gutProcessing"></div>
                <div class="gut-options">
                    <button class="gut-btn active" id="gut-yes" data-i18n="order.gutYes"></button>
                    <button class="gut-btn" id="gut-no"></button>
                </div>
            </div>

            <!-- 納品日・時間帯 -->
            <div class="date-grid">
                <div class="date-box">
                    <div class="date-box__label" data-i18n="order.deliveryDate"></div>
                    <input type="date" id="delivery-date">
                </div>
                <div class="date-box">
                    <div class="date-box__label" data-i18n="order.deliveryTime"></div>
                    <select id="delivery-time">
                        <option value="6:00–7:00">6:00–7:00</option>
                        <option value="7:00–8:00">7:00–8:00</option>
                        <option value="8:00–9:00">8:00–9:00</option>
                        <option value="9:00–10:00">9:00–10:00</option>
                        <option value="10:00–11:00">10:00–11:00</option>
                        <option value="11:00–12:00">11:00–12:00</option>
                        <option value="12:00–13:00">12:00–13:00</option>
                        <option value="13:00–14:00">13:00–14:00</option>
                        <option value="14:00–15:00">14:00–15:00</option>
                        <option value="15:00–16:00">15:00–16:00</option>
                        <option value="16:00–17:00">16:00–17:00</option>
                        <option value="17:00–18:00">17:00–18:00</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 料金内訳 -->
        <div class="order-section" id="price-breakdown"></div>

        <!-- 同一農家の他の魚 -->
        <div id="more-from-farmer" style="display:none; margin:0 16px 16px; padding:12px 14px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:12px;">
            <div style="font-size:13px; font-weight:700; color:#065f46; margin-bottom:6px; display:flex; align-items:center; gap:6px;">
                <span class="material-symbols-outlined" style="font-size:16px;">set_meal</span>
                <span data-i18n="order.moreFromFarmerTitle"></span>
            </div>
            <div style="font-size:12px; color:#065f46; line-height:1.5; margin-bottom:10px;" data-i18n="order.moreFromFarmerDesc"></div>
            <div id="more-from-farmer-list" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none;"></div>
            <!-- 5/5: 「カートを見る」CTA はフッターに統合済み（重複導線を撤去） -->
        </div>

    </div>

    <!-- 固定フッター -->
    <!-- 5/11 #66: 「今すぐ注文」+「カートに入れる」の2ボタン構成（5/5 #47から方針変更） -->
    <div class="order-footer">
        <div class="order-footer__info">
            <div>
                <div class="order-footer__amount-label" data-i18n="order.paymentAmount"></div>
                <div class="order-footer__amount" id="footer-total">0 KHR</div>
            </div>
            <div class="order-footer__note" data-i18n="order.autoCalcNote"></div>
        </div>
        <div class="order-footer__actions">
            <button class="order-footer__btn--cart" id="add-cart-btn" type="button" aria-label="add to cart">
                <span class="material-symbols-outlined" id="add-cart-btn-icon">add_shopping_cart</span>
                <span id="add-cart-btn-label" data-i18n="cart.addToCart"></span>
            </button>
            <button class="order-footer__btn--buy-now" id="buy-now-btn" type="button" aria-label="buy now">
                <span class="material-symbols-outlined">flash_on</span>
                <span data-i18n="order.buyNow"></span>
            </button>
        </div>
    </div>

    <!-- 5/11 #66: カート追加後モーダル -->
    <div class="cart-modal" id="cart-added-modal" role="dialog" aria-modal="true">
        <div class="cart-modal__sheet">
            <div class="cart-modal__title">
                <span class="material-symbols-outlined">check_circle</span>
                <span data-i18n="cart.addedModalTitle"></span>
            </div>
            <div class="cart-modal__sub" data-i18n="cart.addedModalSub"></div>
            <div class="cart-modal__actions">
                <button class="cart-modal__btn cart-modal__btn--secondary" type="button" id="modal-continue-btn">
                    <span class="material-symbols-outlined">storefront</span>
                    <span data-i18n="cart.addedModalContinue"></span>
                </button>
                <a class="cart-modal__btn cart-modal__btn--primary" id="modal-go-cart-btn" href="/pages/restaurant/cart.html">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span data-i18n="cart.addedModalGoCart"></span>
                </a>
            </div>
        </div>
    </div>

    <!-- エラーメッセージ -->
    <div class="error-msg" id="error-msg" style="position:fixed; top:60px; left:16px; right:16px; max-width:448px; margin:0 auto; z-index:20;"></div>

    <script type="module">
        import { initI18n, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { addToCart, subscribeCart } from '/js/cart.js';
        import {
            doc, getDoc, addDoc, collection, query, where, getDocs, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { getCachedDistance, setCachedDistance } from '/js/distance-cache.js';
        import { formatProvince, formatDistrict } from '/js/province-utils.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');

        watchAuthState({ requireAuth: true });
        await initI18n();

        // URLからlistingId取得
        const params = new URLSearchParams(location.search);
        const listingId = params.get('id');
        if (!listingId) { location.href = '/pages/restaurant/dashboard.html'; }

        // ── 道路距離計算（Google Maps Distance Matrix） ──
        // {km, ok} を返す。ok=true のとき道路距離成功（キャッシュ対象）
        async function calcRoadDistance(lat1, lng1, lat2, lng2) {
            return new Promise((resolve) => {
                if (typeof google === 'undefined' || !google.maps) {
                    resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    return;
                }
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [new google.maps.LatLng(lat1, lng1)],
                    destinations: [new google.maps.LatLng(lat2, lng2)],
                    travelMode: google.maps.TravelMode.DRIVING,
                }, (response, status) => {
                    if (status === 'OK' && response.rows[0]?.elements[0]?.status === 'OK') {
                        resolve({ km: response.rows[0].elements[0].distance.value / 1000, ok: true });
                    } else {
                        resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    }
                });
            });
        }

        function haversine(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2
                + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
                * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ── 納品日（当日以降を自由選択） ──
        function initDeliveryDate() {
            const input = document.getElementById('delivery-date');
            const today = new Date();
            const iso = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            input.min = iso(today);
            input.value = iso(today);
        }
        initDeliveryDate();

        // ── データ取得 & 表示 ──
        let listingData = null;
        let farmerData = null;
        let distanceKm = 0;
        let quantity = 5;
        let gutProcessing = true;
        // レストラン側
        let campaignActive = false;
        let serviceRate = 0.05;          // デフォルト5%、settings/campaignから取得
        let campaignDiscountRate = 0;    // キャンペーン割引率（0〜1）
        // 農家側
        let farmerRate = 0.05;           // 農家手数料率
        let farmerCampaignActive = false;
        let farmerCampaignDiscountRate = 0;

        function waitForUserData(callback) {
            if (window.currentUserData) { callback(); }
            else { setTimeout(() => waitForUserData(callback), 300); }
        }

        // 5/5: カート状態の購読 — フッターのボタン状態と「他の魚」セクションの追加済み表示を維持
        let cartItemsCount = 0;
        let cartListingIds = new Set();
        let isThisInCart = false;
        function startCartWatch() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            subscribeCart(uid, (items) => {
                cartItemsCount = items.length;
                cartListingIds = new Set(items.map(it => it.listingId));
                isThisInCart = cartListingIds.has(listingId);
                refreshCartUI();
            });
        }

        function refreshCartUI() {
            // フッター：「カートに追加 / カートに追加済み」のトグル
            const btn = document.getElementById('add-cart-btn');
            const icon = document.getElementById('add-cart-btn-icon');
            const label = document.getElementById('add-cart-btn-label');
            if (btn && icon && label) {
                if (isThisInCart) {
                    btn.classList.add('added');
                    icon.textContent = 'check';
                    label.textContent = i18next.t('cart.inCart');
                } else {
                    btn.classList.remove('added');
                    icon.textContent = 'add_shopping_cart';
                    label.textContent = i18next.t('cart.addToCart');
                }
            }

            // 「他の魚」セクション：カートに入っているものは「追加済み」状態を持続表示
            document.querySelectorAll('.more-from-farmer__add').forEach(b => {
                const inCart = cartListingIds.has(b.dataset.id);
                b.classList.toggle('added', inCart);
                b.innerHTML = inCart
                    ? `<span class="material-symbols-outlined" style="font-size:14px;">check</span>${i18next.t('cart.inCart')}`
                    : `<span class="material-symbols-outlined" style="font-size:14px;">add_shopping_cart</span>${i18next.t('cart.addToCart')}`;
            });
        }

        waitForUserData(async () => {
            loading.classList.add('show');
            try {
                // 魚データ取得
                const listingSnap = await getDoc(doc(db, 'fishListings', listingId));
                if (!listingSnap.exists()) { location.href = '/pages/restaurant/dashboard.html'; return; }
                listingData = listingSnap.data();

                // 農家データ取得
                const farmerSnap = await getDoc(doc(db, 'users', listingData.farmerId));
                farmerData = farmerSnap.exists() ? farmerSnap.data() : {};

                // 距離計算（キャッシュ優先、なければ Distance Matrix 呼出）
                const myLoc = window.currentUserData?.location;
                const farmerLoc = farmerData.location;
                if (myLoc && farmerLoc) {
                    const uid = window.currentUser?.uid;
                    const locs = { rLat: myLoc.lat, rLng: myLoc.lng, fLat: farmerLoc.lat, fLng: farmerLoc.lng };
                    const cached = getCachedDistance(uid, listingData.farmerId, locs);
                    if (cached !== null) {
                        distanceKm = cached;
                    } else {
                        const r = await calcRoadDistance(myLoc.lat, myLoc.lng, farmerLoc.lat, farmerLoc.lng);
                        distanceKm = r.km;
                        if (r.ok) setCachedDistance(uid, listingData.farmerId, r.km, locs);
                    }
                }

                // キャンペーン・料率取得（レストラン側 + 農家側）
                try {
                    const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                    if (campSnap.exists()) {
                        const campData = campSnap.data();
                        serviceRate = campData.serviceRate ?? 0.05;
                        campaignActive = campData.campaignActive === true;
                        campaignDiscountRate = campData.campaignDiscount ?? 0;
                        farmerRate = campData.farmerRate ?? 0.05;
                        farmerCampaignActive = campData.farmerCampaignActive === true;
                        farmerCampaignDiscountRate = campData.farmerCampaignDiscount ?? 0;
                    }
                } catch (e) { /* settings未作成時は無視 */ }

                // 最低注文量をデフォルトに
                if (listingData.minOrder && listingData.minOrder > quantity) {
                    quantity = listingData.minOrder;
                }

                // 最低注文量ヒント表示
                if (listingData.minOrder && listingData.minOrder > 0) {
                    const hint = document.getElementById('min-order-hint');
                    hint.textContent = i18next.t('order.minOrderHint', { min: listingData.minOrder });
                    hint.style.display = 'block';
                }

                renderFishDetail();
                renderGutButtons();
                updateQuantityDisplay();
                recalculate();
                // 同一農家の他商品（配送料節約のヒント）
                loadMoreFromFarmer();
                // 5/5 #3: カート状態の購読
                startCartWatch();
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show');
            }
        });

        // 言語切替時にカートUIテキストを再描画
        onLanguageChange(() => refreshCartUI());

        // ── 同一農家の他商品 ──
        // 5/2: 単体注文ページへの遷移ではなく、カート追加アクションに変更
        // （配送料節約のため、まとめて発注を促す）
        async function loadMoreFromFarmer() {
            try {
                const q = query(
                    collection(db, 'fishListings'),
                    where('farmerId', '==', listingData.farmerId),
                    where('isActive', '==', true)
                );
                const snap = await getDocs(q);
                const others = snap.docs.filter(d => d.id !== listingId).slice(0, 5);
                if (others.length === 0) return;

                const wrap = document.getElementById('more-from-farmer');
                const list = document.getElementById('more-from-farmer-list');
                list.innerHTML = others.map(d => {
                    const x = d.data();
                    const fName = i18next.exists(`fish.${x.fishType}`) ? i18next.t(`fish.${x.fishType}`) : x.fishType;
                    const shortName = String(fName).trim();
                    const unit = Math.round(((x.price || 0) + (x.gutPrice || 0)) * (1 + serviceRate));
                    const minOrder = Number(x.minOrder) || 1;
                    const img = x.photoUrl
                        ? `<img src="${x.photoUrl}" alt="" loading="lazy" style="width:100%; height:80px; object-fit:cover; border-radius:8px;">`
                        : `<div style="width:100%; height:80px; background:#f1f5f9; border-radius:8px; display:flex; align-items:center; justify-content:center;"><span class="material-symbols-outlined" style="font-size:32px; color:#94a3b8;">set_meal</span></div>`;
                    return `
                        <div style="flex-shrink:0; width:120px;">
                            ${img}
                            <div style="font-size:12px; font-weight:700; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(shortName)}</div>
                            <div style="font-size:11px; color:#065f46; font-weight:600; margin-bottom:6px;">${unit.toLocaleString()} KHR/kg</div>
                            <button type="button" class="more-from-farmer__add" data-id="${d.id}" data-min="${minOrder}"
                                style="width:100%; padding:6px 8px; border:1px solid #0d6e4c; background:#fff; color:#0d6e4c; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:4px; font-family:inherit;">
                                <span class="material-symbols-outlined" style="font-size:14px;">add_shopping_cart</span>
                                ${i18next.t('cart.addToCart')}
                            </button>
                        </div>
                    `;
                }).join('');
                wrap.style.display = 'block';

                // 5/5: カート追加 → subscribeCart の onChange で「追加済み」状態が持続表示される
                //   （setTimeout で消えていた問題の対処）
                list.querySelectorAll('.more-from-farmer__add').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const targetListingId = btn.dataset.id;
                        const minOrder = Number(btn.dataset.min) || 1;
                        const uid = window.currentUser?.uid;
                        if (!uid) return;
                        // 既にカート内なら何もしない
                        if (cartListingIds.has(targetListingId)) return;
                        btn.disabled = true;
                        try {
                            await addToCart(uid, {
                                listingId: targetListingId,
                                farmerId: listingData.farmerId,
                                quantity: minOrder,
                                gutProcessing: true,
                            });
                            // ボタンの「追加済み」表示は refreshCartUI が subscribeCart の更新で自動反映
                        } catch (err) {
                            console.error('addToCart failed:', err);
                            alert(err.message || 'Failed');
                        } finally {
                            btn.disabled = false;
                        }
                    });
                });
                // 初回描画時の状態反映（既にカートに入っているものは「追加済み」で出す）
                refreshCartUI();
            } catch (e) {
                console.warn('loadMoreFromFarmer failed:', e.message);
            }
        }

        // ── 魚情報カード描画 ──
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderFishDetail() {
            const fishName = i18next.exists(`fish.${listingData.fishType}`)
                ? i18next.t(`fish.${listingData.fishType}`)
                : listingData.fishType;

            // 写真カルーセル（photos配列 or photoUrl単体）
            const photos = listingData.photos?.length > 0
                ? listingData.photos
                : (listingData.photoUrl ? [listingData.photoUrl] : []);

            const dist = Math.floor(distanceKm * 10) / 10;
            const rating = farmerData.avgRating || 0;
            const reviewCount = farmerData.reviewCount || 0;
            // 5/11 #65 + 拡張: province は i18n ラベル、district は UI 言語に応じて km/en 切替
            const province = formatProvince(farmerData.province || '');
            const district = formatDistrict(farmerData);
            const placeText = province + (district ? ', ' + district : '');
            const stock = listingData.stock || 0;
            const size = listingData.size || '';

            // 在庫表示
            const stockText = stock > 0
                ? i18next.t('restaurant.stock', { kg: stock })
                : i18next.t('order.stockUnavailable');
            const stockClass = stock > 0 ? 'badge-stock' : 'badge-stock-out';

            let carouselHtml;
            if (photos.length === 0) {
                carouselHtml = `<div class="fish-detail__slide"><span class="fish-detail__img-placeholder"><span class="material-symbols-outlined" style="font-size:64px;">set_meal</span></span></div>`;
            } else if (photos.length === 1) {
                carouselHtml = `<div class="fish-detail__slide"><img src="${photos[0]}" alt="${fishName}"></div>`;
            } else {
                const slides = photos.map(url => `<div class="fish-detail__slide"><img src="${url}" alt="${fishName}"></div>`).join('');
                const dots = photos.map((_, i) => `<div class="fish-detail__dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');
                carouselHtml = `
                    <div class="fish-detail__slides" id="photo-slides">${slides}</div>
                    <div class="fish-detail__dots" id="photo-dots">${dots}</div>
                `;
            }

            document.getElementById('fish-detail').innerHTML = `
                <div class="fish-detail__carousel">${carouselHtml}</div>
                <div class="fish-detail__body">
                    <div class="fish-detail__name">${fishName}（${size} head/kg）</div>
                    <div class="fish-detail__price">
                        ${Math.round(((listingData.price || 0) + (listingData.gutPrice || 0)) * (1 + serviceRate)).toLocaleString()} KHR/kg
                        ${listingData.gutPrice ? `<span style="font-size:13px; font-weight:500; color:var(--color-text-sub);">（${i18next.t('order.priceGutIncluded')}）</span>` : ''}
                    </div>
                    <div class="fish-detail__farmer">
                        <a href="/pages/restaurant/farmer.html?id=${listingData.farmerId}" style="text-decoration:none; color:inherit;"><span class="material-symbols-outlined" style="font-size:16px;">person</span> ${farmerData.displayName || ''}</a>
                        <span><span class="material-symbols-outlined" style="font-size:16px; color:#f59e0b;">star</span> ${rating.toFixed(1)}</span>
                        <span style="color:var(--color-text-sub);">(${reviewCount}${i18next.t('order.reviews')})</span>
                    </div>
                    ${placeText ? `<div class="fish-detail__location"><span class="material-symbols-outlined" style="font-size:16px;">location_on</span> ${placeText} · ${dist} km</div>` : ''}
                    <a href="/pages/restaurant/comments.html?id=${listingId}" class="fish-detail__comment-btn">${i18next.t('order.comment')}</a>
                    <div class="fish-detail__badges">
                        <span class="${stockClass}">${stockText}</span>
                    </div>
                    ${listingData.description ? `
                        <div style="margin-top:14px; padding:12px 14px; background:#f8fafc; border-radius:12px; border:1px solid var(--color-border);">
                            <div style="font-size:11px; font-weight:700; color:#475569; margin-bottom:6px;">${i18next.t('order.descriptionLabel')}</div>
                            <div style="font-size:13px; color:var(--color-text); line-height:1.6; white-space:pre-wrap; word-break:break-word;">${escapeHtml(listingData.description)}</div>
                        </div>
                    ` : ''}
                </div>
            `;

            // カルーセルドット連動
            const slidesEl = document.getElementById('photo-slides');
            const dotsEl = document.getElementById('photo-dots');
            if (slidesEl && dotsEl) {
                slidesEl.addEventListener('scroll', () => {
                    const scrollLeft = slidesEl.scrollLeft;
                    const slideWidth = slidesEl.offsetWidth;
                    const activeIndex = Math.round(scrollLeft / slideWidth);
                    dotsEl.querySelectorAll('.fish-detail__dot').forEach((dot, i) => {
                        dot.classList.toggle('active', i === activeIndex);
                    });
                });
                // ドットタップでスライド
                dotsEl.querySelectorAll('.fish-detail__dot').forEach(dot => {
                    dot.addEventListener('click', () => {
                        const index = parseInt(dot.dataset.index);
                        slidesEl.scrollTo({ left: index * slidesEl.offsetWidth, behavior: 'smooth' });
                    });
                });
            }
        }

        // ── 内臓処理ボタン ──
        function renderGutButtons() {
            // サービス料込み単価で表示（一覧・詳細表示と整合）
            const gutPrice = Math.round((listingData.gutPrice || 0) * (1 + serviceRate));
            document.getElementById('gut-no').textContent =
                i18next.t('order.gutNo', { price: gutPrice.toLocaleString() });
        }

        document.getElementById('gut-yes').addEventListener('click', () => {
            gutProcessing = true;
            document.getElementById('gut-yes').classList.add('active');
            document.getElementById('gut-no').classList.remove('active');
            recalculate();
        });

        document.getElementById('gut-no').addEventListener('click', () => {
            gutProcessing = false;
            document.getElementById('gut-no').classList.add('active');
            document.getElementById('gut-yes').classList.remove('active');
            recalculate();
        });

        // ── 数量コントロール ──
        // 5/9 #61: 直接入力対応。input value と quantity を同期する
        function updateQuantityDisplay() {
            const input = document.getElementById('qty-display');
            // フォーカス中はユーザー入力を上書きしない
            if (document.activeElement !== input) {
                input.value = quantity;
            }
            document.getElementById('qty-label').textContent = `${quantity} kg`;
        }

        document.getElementById('qty-minus').addEventListener('click', () => {
            const minQty = listingData?.minOrder || 1;
            if (quantity > minQty) { quantity--; updateQuantityDisplay(); recalculate(); }
        });

        document.getElementById('qty-plus').addEventListener('click', () => {
            quantity++; updateQuantityDisplay(); recalculate();
        });

        // 直接入力：入力途中はリアルタイム反映（最低注文量チェックは blur で行う）
        const qtyInput = document.getElementById('qty-display');
        qtyInput.addEventListener('input', () => {
            const v = parseFloat(qtyInput.value);
            if (Number.isFinite(v) && v >= 0) {
                quantity = v;
                document.getElementById('qty-label').textContent = `${quantity} kg`;
                recalculate();
            }
        });
        qtyInput.addEventListener('blur', () => {
            const minQty = listingData?.minOrder || 1;
            const stock = listingData?.stock;
            let v = parseFloat(qtyInput.value);
            if (!Number.isFinite(v) || v < minQty) v = minQty;
            if (stock && v > stock) v = stock;
            quantity = v;
            updateQuantityDisplay();
            recalculate();
        });

        // ── 料金計算 ──
        function recalculate() {
            if (!listingData) return;

            const price = listingData.price;
            const gutPrice = listingData.gutPrice || 0;
            const deliveryRate = listingData.deliveryRate || 500;
            const freeDelivDist = listingData.freeDeliveryDistance || 0;

            // 魚代（内臓処理込み or なし）
            const unitPrice = gutProcessing ? price + gutPrice : price;
            const fishTotal = unitPrice * quantity;

            // 送料（距離は小数第一位切り捨て）
            // freeDeliveryDistance以内は0、超過時は全距離分課金
            const roundedDist = Math.floor(distanceKm * 10) / 10;
            const deliveryFee = (freeDelivDist > 0 && roundedDist <= freeDelivDist)
                ? 0
                : Math.round(deliveryRate * roundedDist);

            // サービス料（内臓処理込みの魚代ベース）
            const serviceFee = Math.round(fishTotal * serviceRate);

            // キャンペーン割引（魚代 × 割引率・ここが今回の変更点）
            const campaignDiscount = campaignActive ? Math.round(fishTotal * campaignDiscountRate) : 0;

            // 合計（レストラン支払額）
            const total = fishTotal + deliveryFee + serviceFee - campaignDiscount;

            // 農家手数料（魚代ベース）+ 農家側キャンペーン割引（魚代 × 割引率）
            const farmerCommission = Math.round(fishTotal * farmerRate);
            const farmerCampaignDiscount = farmerCampaignActive
                ? Math.round(fishTotal * farmerCampaignDiscountRate) : 0;
            const farmerCommissionNet = farmerCommission - farmerCampaignDiscount;
            // 農家受取額 = 魚代 - 農家手数料(割引後) + 配送料
            const farmerReceiveAmount = fishTotal - farmerCommissionNet + deliveryFee;

            // 料金内訳描画
            const fishLabel = gutProcessing
                ? i18next.t('order.fishPrice')
                : i18next.t('order.fishPriceNoGut');

            // レストラン表示：サービス料は魚代に合算（内部計算はそのまま）
            const displayFishTotal = fishTotal + serviceFee;
            let html = `
                <div class="price-line">
                    <span class="price-line__label">${fishLabel}</span>
                    <span class="price-line__value">${displayFishTotal.toLocaleString()} KHR</span>
                </div>
                <div class="price-line">
                    <span class="price-line__label" data-i18n="order.deliveryFee">${i18next.t('order.deliveryFee')}</span>
                    <span class="price-line__value">${deliveryFee.toLocaleString()} KHR</span>
                </div>
            `;

            if (campaignActive) {
                html += `
                    <div class="price-line">
                        <span class="price-line__label">${i18next.t('order.campaignDiscount')}</span>
                        <span class="price-line__value discount">-${campaignDiscount.toLocaleString()} KHR</span>
                    </div>
                `;
            }

            html += `
                <div class="price-total">
                    <span class="price-total__label">${i18next.t('order.total')}</span>
                    <span class="price-total__value">${total.toLocaleString()} KHR</span>
                </div>
            `;

            document.getElementById('price-breakdown').innerHTML = html;
            document.getElementById('footer-total').textContent = `${total.toLocaleString()} KHR`;

            // 注文データをwindowに保持
            window._orderCalc = {
                fishTotal, deliveryFee, serviceFee, campaignDiscount, total,
                farmerCommission, farmerCampaignDiscount, farmerCommissionNet,
                farmerReceiveAmount,
                serviceRateUsed: serviceRate,
                farmerRateUsed: farmerRate,
            };
        }

        // ── 入力バリデーション（カート追加・今すぐ注文 共通） ──
        function validateOrderInputs() {
            if (quantity <= 0) return i18next.t('order.errorQuantity');
            if (listingData.minOrder && quantity < listingData.minOrder) {
                return i18next.t('order.errorMinOrder', { min: listingData.minOrder });
            }
            return null;
        }

        // ── 5/11 #66: カートに追加 → モーダル表示 ──
        document.getElementById('add-cart-btn').addEventListener('click', async () => {
            errorMsg.classList.remove('show');
            const err = validateOrderInputs();
            if (err) {
                errorMsg.textContent = err;
                errorMsg.classList.add('show');
                return;
            }
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const cartBtn = document.getElementById('add-cart-btn');
            cartBtn.disabled = true;
            try {
                await addToCart(uid, {
                    listingId,
                    farmerId: listingData.farmerId,
                    quantity,
                    gutProcessing,
                });
                // モーダルを開く（5/11 #66）
                document.getElementById('cart-added-modal').classList.add('show');
            } catch (err) {
                console.error('addToCart failed:', err);
                errorMsg.textContent = err.message || i18next.t('cart.errorSubmit');
                errorMsg.classList.add('show');
            } finally {
                cartBtn.disabled = false;
            }
        });

        // モーダル：「買い物を続ける」で閉じる
        document.getElementById('modal-continue-btn').addEventListener('click', () => {
            document.getElementById('cart-added-modal').classList.remove('show');
        });
        // モーダル背景タップで閉じる
        document.getElementById('cart-added-modal').addEventListener('click', (e) => {
            if (e.target.id === 'cart-added-modal') {
                document.getElementById('cart-added-modal').classList.remove('show');
            }
        });

        // ── 5/11 #66: 今すぐ注文 → カート画面をスキップして注文確認画面へ直接遷移 ──
        // 内部実装：URLパラメータで単品注文モードを cart.html に渡す
        document.getElementById('buy-now-btn').addEventListener('click', () => {
            errorMsg.classList.remove('show');
            const err = validateOrderInputs();
            if (err) {
                errorMsg.textContent = err;
                errorMsg.classList.add('show');
                return;
            }
            const params = new URLSearchParams({
                buyNow: '1',
                id: listingId,
                qty: String(quantity),
                gut: gutProcessing ? '1' : '0',
            });
            window.location.href = `/pages/restaurant/cart.html?${params.toString()}`;
        });
    </script>
