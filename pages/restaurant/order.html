<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-page {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 160px;
        }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            font-size: 14px;
            color: var(--color-text-sub);
            position: sticky;
            top: 0;
            background: var(--color-bg);
            z-index: 10;
        }

        .order-header__back {
            text-decoration: none;
            color: var(--color-text-sub);
            font-size: 18px;
        }

        .order-header__title {
            font-weight: 500;
        }

        /* 魚情報カード */
        .fish-detail {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            margin: 0 16px 16px;
        }

        .fish-detail__carousel {
            position: relative;
            overflow: hidden;
        }

        .fish-detail__slides {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .fish-detail__slides::-webkit-scrollbar { display: none; }

        .fish-detail__slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            height: 250px;
            background: linear-gradient(135deg, #d6d3d1, #f5f5f4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fish-detail__slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fish-detail__dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px 0;
        }

        .fish-detail__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
        }

        .fish-detail__dot.active {
            background: #1a1a1a;
        }

        .fish-detail__img-placeholder {
            font-size: 64px;
        }

        .fish-detail__body {
            padding: 16px;
        }

        .fish-detail__name {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text);
        }

        .fish-detail__price {
            font-size: 22px;
            font-weight: 800;
            color: var(--color-text);
            margin-top: 4px;
        }

        .fish-detail__farmer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-sub);
            margin-top: 8px;
        }

        .fish-detail__location {
            font-size: 14px;
            color: var(--color-text-sub);
            margin-top: 4px;
        }

        .fish-detail__comment-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            border: 1px solid var(--color-border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--color-text-sub);
            text-decoration: none;
            background: var(--color-surface);
        }

        /* 5/23 #80: 注文画面 質問プレビュー枠（食べチョク参考） */
        .qa-preview {
            margin-top: 14px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: #f8fafc;
            padding: 12px;
        }
        .qa-preview__title {
            font-size: 12px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .qa-preview__title .material-symbols-outlined { font-size: 16px; color: #0d6e4c; }
        .qa-preview__item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 10px;
        }
        .qa-preview__head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .qa-preview__avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: #e2e8f0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .qa-preview__avatar > img { width: 100%; height: 100%; object-fit: cover; }
        .qa-preview__avatar > .material-symbols-outlined { font-size: 16px; color: #94a3b8; }
        .qa-preview__name { font-size: 12px; font-weight: 700; color: var(--color-text); flex: 1; min-width: 0; }
        .qa-preview__badge {
            font-size: 10px; font-weight: 700;
            padding: 1px 6px; border-radius: 999px;
            background: #eff6ff; color: #1e40af;
            white-space: nowrap;
        }
        .qa-preview__badge--reply { background: #ecfdf5; color: #065f46; }
        .qa-preview__badge--noreply { background: #fef3c7; color: #92400e; }
        .qa-preview__text {
            font-size: 12px;
            line-height: 1.5;
            color: var(--color-text);
            padding-left: 30px;
            white-space: pre-wrap;
            word-break: break-word;
            /* 2行で省略 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .qa-preview__reply { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--color-border); }
        .qa-preview__noreply-row { padding-left: 30px; margin-top: 6px; }
        .qa-preview__empty {
            text-align: center; padding: 10px;
            color: var(--color-text-sub); font-size: 12px;
        }
        .qa-preview__more {
            display: block;
            margin-top: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #0d6e4c;
            text-decoration: none;
            padding: 6px;
        }

        .fish-detail__badges {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge-delivery {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .badge-stock {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .badge-stock-out {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* 注文セクション */
        .order-section {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 16px;
        }

        .order-section__title {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 14px;
        }

        /* 数量コントロール */
        .qty-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .qty-label {
            font-size: 13px;
            color: var(--color-text-sub);
        }

        .qty-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 5/9 #61: 直接入力に対応するため input 化 */
        .qty-display {
            width: 64px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 6px;
            background: #f5f5f5;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-family: inherit;
            color: var(--color-text);
        }
        .qty-display:focus {
            outline: none;
            border-color: var(--color-primary);
            background: #fff;
        }
        /* number input の上下スピナー非表示（モバイルで触感を統一） */
        .qty-display::-webkit-outer-spin-button,
        .qty-display::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .qty-display { -moz-appearance: textfield; }

        /* 内臓処理ボタン */
        .gut-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .gut-btn {
            border-radius: 16px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-sub);
        }

        .gut-btn.active {
            border: 2px solid #16a34a;
            background: #f0fdf4;
            color: #166534;
            font-weight: 600;
        }

        /* 納品日・時間帯 */
        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .date-box {
            border-radius: 16px;
            background: #f9fafb;
            padding: 12px;
            border: 1px solid var(--color-border);
        }

        .date-box__label {
            font-size: 11px;
            color: var(--color-text-sub);
        }

        .date-box select,
        .date-box input[type="date"] {
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            border: none;
            background: transparent;
            margin-top: 4px;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .date-box input[type="date"]:focus {
            outline: none;
        }

        /* 料金内訳 */
        .price-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 6px 0;
        }

        .price-line__label {
            color: var(--color-text-sub);
        }

        .price-line__value {
            font-weight: 500;
            color: var(--color-text);
        }

        .price-line__value.discount {
            color: #16a34a;
        }

        .price-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px dashed var(--color-border);
            padding-top: 12px;
            margin-top: 8px;
        }

        .price-total__label {
            font-size: 17px;
            font-weight: 700;
        }

        .price-total__value {
            font-size: 22px;
            font-weight: 800;
        }

        /* 固定フッター */
        .order-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255, 255, 255, .95);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px 16px;
            z-index: 10;
        }

        .order-footer__info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .order-footer__amount-label {
            font-size: 11px;
            color: var(--color-text-sub);
        }

        .order-footer__amount {
            font-size: 20px;
            font-weight: 800;
        }

        .order-footer__note {
            font-size: 11px;
            color: var(--color-text-sub);
            text-align: right;
            max-width: 160px;
        }

        .order-footer__btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: #f43f5e;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
        }

        .order-footer__btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 5/11 #66: フッターを「今すぐ注文」+「カートに入れる」の2ボタン構成に変更
           5/5 #47 の「カート一本化」方針から再変更（食べチョク式の導線） */
        .order-footer__actions {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        /* 「今すぐ注文」：メインCTA */
        .order-footer__btn--buy-now {
            flex: 1;
            background: #f43f5e;
            color: #fff;
            border: 2px solid #f43f5e;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        .order-footer__btn--buy-now:hover { background: #e11d48; border-color: #e11d48; }
        .order-footer__btn--buy-now:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-footer__btn--buy-now .material-symbols-outlined { font-size: 20px; }
        /* 「カートに入れる」：サブCTA */
        .order-footer__btn--cart {
            flex: 1;
            background: #fff;
            color: #047857;
            border: 2px solid #10b981;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
        }
        .order-footer__btn--cart:hover { background: #ecfdf5; }
        .order-footer__btn--cart:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-footer__btn--cart.added {
            background: #ecfdf5;
            color: #047857;
            border-color: #10b981;
        }
        .order-footer__btn--cart .material-symbols-outlined { font-size: 20px; }

        /* カート追加後モーダル */
        .cart-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
        }
        .cart-modal.show { display: flex; }
        .cart-modal__sheet {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .cart-modal__title {
            display: flex; align-items: center; gap: 8px;
            font-size: 17px; font-weight: 700;
            margin-bottom: 6px;
        }
        .cart-modal__title .material-symbols-outlined {
            color: #16a34a; font-size: 22px;
            font-variation-settings: 'FILL' 1;
        }
        .cart-modal__sub {
            font-size: 13px; color: var(--color-text-sub);
            margin-bottom: 18px;
        }
        .cart-modal__actions {
            display: flex; gap: 8px;
        }
        .cart-modal__btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .cart-modal__btn--primary {
            background: #10b981;
            color: #fff;
            border: 2px solid #10b981;
        }
        .cart-modal__btn--primary:hover { background: #059669; border-color: #059669; }
        .cart-modal__btn--secondary {
            background: #fff;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }
        .cart-modal__btn--secondary:hover { background: #f8fafc; }
        .cart-modal__btn .material-symbols-outlined { font-size: 18px; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer></script>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="order-page">

        <!-- ヘッダー -->
        <div class="order-header">
            <a href="/pages/restaurant/dashboard.html" class="order-header__back"><span class="material-symbols-outlined">arrow_back</span></a>
            <span class="order-header__title" data-i18n="order.title"></span>
            <span>&nbsp;</span>
        </div>

        <!-- 魚情報 -->
        <div class="fish-detail" id="fish-detail"></div>

        <!-- 5/12 #68: 注文内容入力（数量・内臓処理・納品日時）はカート画面に集約。
             商品紹介ページは商品情報の確認に特化。
             5/12 #68: 価格表示は単価のみ（合計は数量入力のあるカート画面で表示）。 -->

        <!-- 同一農家の他の魚 -->
        <div id="more-from-farmer" style="display:none; margin:0 16px 16px; padding:12px 14px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:12px;">
            <div style="font-size:13px; font-weight:700; color:#065f46; margin-bottom:6px; display:flex; align-items:center; gap:6px;">
                <span class="material-symbols-outlined" style="font-size:16px;">set_meal</span>
                <span data-i18n="order.moreFromFarmerTitle"></span>
            </div>
            <div style="font-size:12px; color:#065f46; line-height:1.5; margin-bottom:10px;" data-i18n="order.moreFromFarmerDesc"></div>
            <div id="more-from-farmer-list" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none;"></div>
            <!-- 5/5: 「カートを見る」CTA はフッターに統合済み（重複導線を撤去） -->
        </div>

    </div>

    <!-- 固定フッター -->
    <!-- 5/12 #68: 「今すぐ注文」+「カートに入れる」の2ボタン構成。
         両方ともカート画面で注文内容（数量・内臓処理・納品日時）を入力する。
         今すぐ注文: 最低注文量で追加 → カート画面へ直行
         カートに入れる: 最低注文量で追加 → モーダル表示（カートへ進む or 買い物を続ける） -->
    <div class="order-footer">
        <div class="order-footer__actions">
            <button class="order-footer__btn--cart" id="add-cart-btn" type="button" aria-label="add to cart">
                <span class="material-symbols-outlined" id="add-cart-btn-icon">add_shopping_cart</span>
                <span id="add-cart-btn-label" data-i18n="cart.addToCart"></span>
            </button>
            <button class="order-footer__btn--buy-now" id="buy-now-btn" type="button" aria-label="buy now">
                <span class="material-symbols-outlined">flash_on</span>
                <span data-i18n="order.buyNow"></span>
            </button>
        </div>
    </div>

    <!-- 5/11 #66: カート追加後モーダル -->
    <div class="cart-modal" id="cart-added-modal" role="dialog" aria-modal="true">
        <div class="cart-modal__sheet">
            <div class="cart-modal__title">
                <span class="material-symbols-outlined">check_circle</span>
                <span data-i18n="cart.addedModalTitle"></span>
            </div>
            <div class="cart-modal__sub" data-i18n="cart.addedModalSub"></div>
            <div class="cart-modal__actions">
                <button class="cart-modal__btn cart-modal__btn--secondary" type="button" id="modal-continue-btn">
                    <span class="material-symbols-outlined">storefront</span>
                    <span data-i18n="cart.addedModalContinue"></span>
                </button>
                <a class="cart-modal__btn cart-modal__btn--primary" id="modal-go-cart-btn" href="/pages/restaurant/cart.html">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span data-i18n="cart.addedModalGoCart"></span>
                </a>
            </div>
        </div>
    </div>

    <!-- エラーメッセージ -->
    <div class="error-msg" id="error-msg" style="position:fixed; top:60px; left:16px; right:16px; max-width:448px; margin:0 auto; z-index:20;"></div>

    <script type="module">
        import { initI18n, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { addToCart, subscribeCart } from '/js/cart.js';
        import {
            doc, getDoc, collection, query, where, orderBy, limit, getDocs
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { getCachedDistance, setCachedDistance } from '/js/distance-cache.js';
        import { formatProvince, formatDistrict } from '/js/province-utils.js';
        // 5/23 #80: 質問プレビューのアバター画像
        import { getReviewerAvatarUrl } from '/js/profile-utils.js';
        // 5/23 #69 改善: メモリ画像キャッシュ（フラッシュ解消）
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users/fishListings の重複取得を抑止
        import { getCachedUser, getCachedListing } from '/js/data-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');

        watchAuthState({ requireAuth: true });
        await initI18n();

        // URLからlistingId取得
        const params = new URLSearchParams(location.search);
        const listingId = params.get('id');
        if (!listingId) { location.href = '/pages/restaurant/fish-list.html'; }

        // ── 道路距離計算（Google Maps Distance Matrix） ──
        // {km, ok} を返す。ok=true のとき道路距離成功（キャッシュ対象）
        async function calcRoadDistance(lat1, lng1, lat2, lng2) {
            return new Promise((resolve) => {
                if (typeof google === 'undefined' || !google.maps) {
                    resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    return;
                }
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [new google.maps.LatLng(lat1, lng1)],
                    destinations: [new google.maps.LatLng(lat2, lng2)],
                    travelMode: google.maps.TravelMode.DRIVING,
                }, (response, status) => {
                    if (status === 'OK' && response.rows[0]?.elements[0]?.status === 'OK') {
                        resolve({ km: response.rows[0].elements[0].distance.value / 1000, ok: true });
                    } else {
                        resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    }
                });
            });
        }

        function haversine(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2
                + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
                * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // ── データ取得 & 表示 ──
        let listingData = null;
        let farmerData = null;
        let distanceKm = 0;
        // 5/12 #68: 数量・内臓処理・納品日時は カート画面側で入力するため、
        //   ここでは「カート追加時のデフォルト値」のみ持つ。
        let serviceRate = 0.05;          // デフォルト5%、settings/campaignから取得（単価表示用）

        function waitForUserData(callback) {
            if (window.currentUserData) { callback(); }
            else { setTimeout(() => waitForUserData(callback), 300); }
        }

        // 5/23 #69 Phase J: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        //   listingId 単位でキャッシュ。次回同じ商品ページを開いたとき即時表示される。
        //   loadQuestionPreview / loadMoreFromFarmer は auth 完了後（waitForUserData 内）で実行。
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`order:${listingId}`);
            if (cached?.listingData && cached?.farmerData) {
                listingData = cached.listingData;
                farmerData = cached.farmerData;
                distanceKm = cached.distanceKm ?? 0;
                serviceRate = cached.serviceRate ?? 0.05;
                renderFishDetail();
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached order render failed:', e);
        }

        // 5/5: カート状態の購読 — フッターのボタン状態と「他の魚」セクションの追加済み表示を維持
        let cartItemsCount = 0;
        let cartListingIds = new Set();
        let isThisInCart = false;
        function startCartWatch() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            subscribeCart(uid, (items) => {
                cartItemsCount = items.length;
                cartListingIds = new Set(items.map(it => it.listingId));
                isThisInCart = cartListingIds.has(listingId);
                refreshCartUI();
            });
        }

        function refreshCartUI() {
            // フッター：「カートに追加 / カートに追加済み」のトグル
            const btn = document.getElementById('add-cart-btn');
            const icon = document.getElementById('add-cart-btn-icon');
            const label = document.getElementById('add-cart-btn-label');
            if (btn && icon && label) {
                if (isThisInCart) {
                    btn.classList.add('added');
                    icon.textContent = 'check';
                    label.textContent = i18next.t('cart.inCart');
                } else {
                    btn.classList.remove('added');
                    icon.textContent = 'add_shopping_cart';
                    label.textContent = i18next.t('cart.addToCart');
                }
            }
        }

        waitForUserData(async () => {
            // 5/23 #69 Phase J: cached 描画済なら spinner を出さず裏で更新
            if (!cachedRendered) loading.classList.add('show');
            try {
                // 5/23 #69 Phase B: data-cache 経由（同一タブ内の重複取得を抑止）
                listingData = await getCachedListing(listingId);
                if (!listingData) { location.href = '/pages/restaurant/fish-list.html'; return; }

                farmerData = (await getCachedUser(listingData.farmerId)) || {};

                // 距離計算（キャッシュ優先、なければ Distance Matrix 呼出）
                const myLoc = window.currentUserData?.location;
                const farmerLoc = farmerData.location;
                if (myLoc && farmerLoc) {
                    const uid = window.currentUser?.uid;
                    const locs = { rLat: myLoc.lat, rLng: myLoc.lng, fLat: farmerLoc.lat, fLng: farmerLoc.lng };
                    const cached = getCachedDistance(uid, listingData.farmerId, locs);
                    if (cached !== null) {
                        distanceKm = cached;
                    } else {
                        const r = await calcRoadDistance(myLoc.lat, myLoc.lng, farmerLoc.lat, farmerLoc.lng);
                        distanceKm = r.km;
                        if (r.ok) setCachedDistance(uid, listingData.farmerId, r.km, locs);
                    }
                }

                // キャンペーン・料率取得（単価表示にサービス料を反映するため）
                try {
                    const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                    if (campSnap.exists()) {
                        const campData = campSnap.data();
                        serviceRate = campData.serviceRate ?? 0.05;
                    }
                } catch (e) { /* settings未作成時は無視 */ }

                renderFishDetail();
                // 5/23 #80: 質問プレビュー（最新の質問+返信ペア1件）を非同期描画
                loadQuestionPreview();
                // 同一農家の他商品（配送料節約のヒント）
                loadMoreFromFarmer();
                // 5/5 #3: カート状態の購読
                startCartWatch();
                // 5/23 #69 Phase J: 次回訪問用に cache 保存
                try {
                    saveRenderState(`order:${listingId}`, {
                        listingData, farmerData, distanceKm, serviceRate,
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        // 言語切替時にカートUIテキストを再描画
        onLanguageChange(() => refreshCartUI());

        // ── 同一農家の他商品 ──
        // 5/12 #68: カード自体をリンク化し、その魚の商品紹介ページに遷移するよう変更。
        //   カート追加ボタンは廃止（カートへの追加はこのページからのみ）。
        async function loadMoreFromFarmer() {
            try {
                const q = query(
                    collection(db, 'fishListings'),
                    where('farmerId', '==', listingData.farmerId),
                    where('isActive', '==', true)
                );
                const snap = await getDocs(q);
                const others = snap.docs.filter(d => d.id !== listingId).slice(0, 5);
                if (others.length === 0) return;

                const wrap = document.getElementById('more-from-farmer');
                const list = document.getElementById('more-from-farmer-list');
                list.innerHTML = others.map(d => {
                    const x = d.data();
                    const fName = i18next.exists(`fish.${x.fishType}`) ? i18next.t(`fish.${x.fishType}`) : x.fishType;
                    const shortName = String(fName).trim();
                    const unit = Math.round(((x.price || 0) + (x.gutPrice || 0)) * (1 + serviceRate));
                    const img = x.photoUrl
                        ? `<img ${asCachedImgAttrs(x.photoUrl)} alt="" loading="lazy" style="width:100%; height:80px; object-fit:cover; border-radius:8px;">`
                        : `<div style="width:100%; height:80px; background:#f1f5f9; border-radius:8px; display:flex; align-items:center; justify-content:center;"><span class="material-symbols-outlined" style="font-size:32px; color:#94a3b8;">set_meal</span></div>`;
                    return `
                        <a href="/pages/restaurant/order.html?id=${d.id}" style="flex-shrink:0; width:120px; text-decoration:none; color:inherit; display:block;">
                            ${img}
                            <div style="font-size:12px; font-weight:700; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(shortName)}</div>
                            <div style="font-size:11px; color:#065f46; font-weight:600;">${unit.toLocaleString()} KHR/kg</div>
                        </a>
                    `;
                }).join('');
                wrap.style.display = 'block';
            } catch (e) {
                console.warn('loadMoreFromFarmer failed:', e.message);
            }
        }

        // ── 5/23 #80: 質問・返信プレビュー（最新の非削除質問1件 + その返信） ──
        async function loadQuestionPreview() {
            const body = document.getElementById('qa-preview-body');
            if (!body) return;
            try {
                // 最新の数件を取得して、削除済みをクライアント側で除外
                const q = query(
                    collection(db, 'fishListings', listingId, 'comments'),
                    orderBy('createdAt', 'desc'),
                    limit(5)
                );
                const snap = await getDocs(q);
                const docs = snap.docs.filter(d => d.data().isDeleted !== true);
                if (docs.length === 0) {
                    // 既に「まだ質問はありません」が表示されているのでそのまま
                    return;
                }
                const c = docs[0].data();
                // 質問者のアバター・名前を取得（5/23 #69 Phase B: data-cache 経由）
                const sender = (await getCachedUser(c.senderId)) || {};
                const senderAvatarUrl = getReviewerAvatarUrl(sender);
                const senderName = sender.displayName || '';
                const senderAvatar = senderAvatarUrl
                    ? `<img ${asCachedImgAttrs(senderAvatarUrl)} alt="" loading="lazy">`
                    : `<span class="material-symbols-outlined">person</span>`;

                // 返信部分（あれば）
                let replyHtml = '';
                if (c.replyText) {
                    // replyByUid のユーザー。なければ listing の farmer をフォールバック
                    let replyUser = farmerData;
                    if (c.replyByUid && c.replyByUid !== listingData.farmerId) {
                        try {
                            const r = await getCachedUser(c.replyByUid);
                            if (r) replyUser = r;
                        } catch (e) { /* fall through */ }
                    }
                    const replyAvatarUrl = getReviewerAvatarUrl(replyUser);
                    const replyName = replyUser.displayName || '';
                    const replyAvatar = replyAvatarUrl
                        ? `<img ${asCachedImgAttrs(replyAvatarUrl)} alt="" loading="lazy">`
                        : `<span class="material-symbols-outlined">person</span>`;
                    replyHtml = `
                        <div class="qa-preview__reply">
                            <div class="qa-preview__head">
                                <div class="qa-preview__avatar">${replyAvatar}</div>
                                <div class="qa-preview__name">${escapeHtml(replyName)}</div>
                                <span class="qa-preview__badge qa-preview__badge--reply">${escapeHtml(i18next.t('comments.replyLabel'))}</span>
                            </div>
                            <div class="qa-preview__text">${escapeHtml(c.replyText)}</div>
                        </div>
                    `;
                } else {
                    replyHtml = `<div class="qa-preview__noreply-row"><span class="qa-preview__badge qa-preview__badge--noreply">${escapeHtml(i18next.t('comments.noReply'))}</span></div>`;
                }

                body.innerHTML = `
                    <div class="qa-preview__item">
                        <div class="qa-preview__head">
                            <div class="qa-preview__avatar">${senderAvatar}</div>
                            <div class="qa-preview__name">${escapeHtml(senderName)}</div>
                            <span class="qa-preview__badge">${escapeHtml(i18next.t('comments.questionLabel'))}</span>
                        </div>
                        <div class="qa-preview__text">${escapeHtml(c.text || '')}</div>
                        ${replyHtml}
                    </div>
                `;
            } catch (e) {
                console.warn('loadQuestionPreview failed:', e.message);
                // フォールバック：empty メッセージはそのまま
            }
        }

        // ── 魚情報カード描画 ──
        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderFishDetail() {
            const fishName = i18next.exists(`fish.${listingData.fishType}`)
                ? i18next.t(`fish.${listingData.fishType}`)
                : listingData.fishType;

            // 写真カルーセル（photos配列 or photoUrl単体）
            const photos = listingData.photos?.length > 0
                ? listingData.photos
                : (listingData.photoUrl ? [listingData.photoUrl] : []);

            const dist = Math.floor(distanceKm * 10) / 10;
            const rating = farmerData.avgRating || 0;
            const reviewCount = farmerData.reviewCount || 0;
            // 5/11 #65 + 拡張: province は i18n ラベル、district は UI 言語に応じて km/en 切替
            const province = formatProvince(farmerData.province || '');
            const district = formatDistrict(farmerData);
            const placeText = province + (district ? ', ' + district : '');
            const stock = listingData.stock || 0;
            const size = listingData.size || '';

            // 在庫表示
            const stockText = stock > 0
                ? i18next.t('restaurant.stock', { kg: stock })
                : i18next.t('order.stockUnavailable');
            const stockClass = stock > 0 ? 'badge-stock' : 'badge-stock-out';

            let carouselHtml;
            if (photos.length === 0) {
                carouselHtml = `<div class="fish-detail__slide"><span class="fish-detail__img-placeholder"><span class="material-symbols-outlined" style="font-size:64px;">set_meal</span></span></div>`;
            } else if (photos.length === 1) {
                // 5/23 Phase I: ヒーロー画像は LCP の主候補 → fetchpriority="high"
                carouselHtml = `<div class="fish-detail__slide"><img ${asCachedImgAttrs(photos[0], { priority: 'high' })} alt="${fishName}"></div>`;
            } else {
                // 5/23 Phase I: カルーセル先頭を LCP 候補として優先、2 枚目以降は通常
                const slides = photos.map((url, idx) => `<div class="fish-detail__slide"><img ${asCachedImgAttrs(url, idx === 0 ? { priority: 'high' } : {})} alt="${fishName}"></div>`).join('');
                const dots = photos.map((_, i) => `<div class="fish-detail__dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');
                carouselHtml = `
                    <div class="fish-detail__slides" id="photo-slides">${slides}</div>
                    <div class="fish-detail__dots" id="photo-dots">${dots}</div>
                `;
            }

            document.getElementById('fish-detail').innerHTML = `
                <div class="fish-detail__carousel">${carouselHtml}</div>
                <div class="fish-detail__body">
                    <div class="fish-detail__name">${fishName}（${size} head/kg）</div>
                    <div class="fish-detail__price">
                        ${Math.round(((listingData.price || 0) + (listingData.gutPrice || 0)) * (1 + serviceRate)).toLocaleString()} KHR/kg
                        ${listingData.gutPrice ? `<span style="font-size:13px; font-weight:500; color:var(--color-text-sub);">（${i18next.t('order.priceGutIncluded')}）</span>` : ''}
                    </div>
                    <div class="fish-detail__farmer">
                        <a href="/pages/restaurant/farmer.html?id=${listingData.farmerId}" style="text-decoration:none; color:inherit;"><span class="material-symbols-outlined" style="font-size:16px;">person</span> ${farmerData.displayName || ''}</a>
                        <span><span class="material-symbols-outlined" style="font-size:16px; color:#f59e0b;">star</span> ${rating.toFixed(1)}</span>
                        <span style="color:var(--color-text-sub);">(${reviewCount}${i18next.t('order.reviews')})</span>
                    </div>
                    ${placeText ? `<div class="fish-detail__location"><span class="material-symbols-outlined" style="font-size:16px;">location_on</span> ${placeText} · ${dist} km</div>` : ''}
                    <div class="fish-detail__badges">
                        <span class="${stockClass}">${stockText}</span>
                    </div>
                    <!-- 5/23 #80: 質問・返信プレビュー枠（食べチョク参考）。中身は loadQuestionPreview で非同期描画。 -->
                    <div class="qa-preview" id="qa-preview">
                        <div class="qa-preview__title">
                            <span class="material-symbols-outlined">help</span>
                            <span>${escapeHtml(i18next.t('comments.previewTitle'))}</span>
                        </div>
                        <div id="qa-preview-body">
                            <div class="qa-preview__empty">${escapeHtml(i18next.t('comments.previewEmpty'))}</div>
                        </div>
                        <a href="/pages/restaurant/comments.html?id=${listingId}" class="qa-preview__more">${escapeHtml(i18next.t('order.comment'))} →</a>
                    </div>
                    ${listingData.description ? `
                        <div style="margin-top:14px; padding:12px 14px; background:#f8fafc; border-radius:12px; border:1px solid var(--color-border);">
                            <div style="font-size:11px; font-weight:700; color:#475569; margin-bottom:6px;">${i18next.t('order.descriptionLabel')}</div>
                            <div style="font-size:13px; color:var(--color-text); line-height:1.6; white-space:pre-wrap; word-break:break-word;">${escapeHtml(listingData.description)}</div>
                        </div>
                    ` : ''}
                </div>
            `;

            // カルーセルドット連動
            const slidesEl = document.getElementById('photo-slides');
            const dotsEl = document.getElementById('photo-dots');
            if (slidesEl && dotsEl) {
                slidesEl.addEventListener('scroll', () => {
                    const scrollLeft = slidesEl.scrollLeft;
                    const slideWidth = slidesEl.offsetWidth;
                    const activeIndex = Math.round(scrollLeft / slideWidth);
                    dotsEl.querySelectorAll('.fish-detail__dot').forEach((dot, i) => {
                        dot.classList.toggle('active', i === activeIndex);
                    });
                });
                // ドットタップでスライド
                dotsEl.querySelectorAll('.fish-detail__dot').forEach(dot => {
                    dot.addEventListener('click', () => {
                        const index = parseInt(dot.dataset.index);
                        slidesEl.scrollTo({ left: index * slidesEl.offsetWidth, behavior: 'smooth' });
                    });
                });
            }
        }

        // ── 5/12 #68: カート追加共通処理 ──
        // 数量・内臓処理・納品日時はカート画面で入力する。
        // ここでは「最低注文量・内臓処理あり」をデフォルトで追加する。
        async function addThisToCart() {
            const uid = window.currentUser?.uid;
            if (!uid || !listingData) return;
            // 既にカートにある場合は二重追加せず、そのまま遷移先に任せる
            if (cartListingIds.has(listingId)) return;
            const defaultQty = Number(listingData.minOrder) || 1;
            await addToCart(uid, {
                listingId,
                farmerId: listingData.farmerId,
                quantity: defaultQty,
                gutProcessing: true,
            });
        }

        // 「カートに入れる」→ 追加 + モーダル表示
        document.getElementById('add-cart-btn').addEventListener('click', async () => {
            errorMsg.classList.remove('show');
            const cartBtn = document.getElementById('add-cart-btn');
            cartBtn.disabled = true;
            try {
                await addThisToCart();
                document.getElementById('cart-added-modal').classList.add('show');
            } catch (err) {
                console.error('addToCart failed:', err);
                errorMsg.textContent = err.message || i18next.t('cart.errorSubmit');
                errorMsg.classList.add('show');
            } finally {
                cartBtn.disabled = false;
            }
        });

        // モーダル：「買い物を続ける」で閉じる
        document.getElementById('modal-continue-btn').addEventListener('click', () => {
            document.getElementById('cart-added-modal').classList.remove('show');
        });
        // モーダル背景タップで閉じる
        document.getElementById('cart-added-modal').addEventListener('click', (e) => {
            if (e.target.id === 'cart-added-modal') {
                document.getElementById('cart-added-modal').classList.remove('show');
            }
        });

        // 「今すぐ注文」→ 追加 + カート画面へ直行（カート画面で数量・納品日時を入力）
        document.getElementById('buy-now-btn').addEventListener('click', async () => {
            errorMsg.classList.remove('show');
            const btn = document.getElementById('buy-now-btn');
            btn.disabled = true;
            try {
                await addThisToCart();
                window.location.href = '/pages/restaurant/cart.html';
            } catch (err) {
                console.error('buyNow failed:', err);
                errorMsg.textContent = err.message || i18next.t('cart.errorSubmit');
                errorMsg.classList.add('show');
                btn.disabled = false;
            }
        });
    </script>

</body>
