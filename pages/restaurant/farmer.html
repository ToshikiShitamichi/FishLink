<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .profile-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }

        /* 6/11 #137 §9（農家側も同様）: 自己プレビューの案内バナー（read-only・編集はプロフィール画面側） */
        .self-note {
            display: none; align-items: center; gap: 8px;
            background: #eaf2fb; border: 1px solid #c5dbf2; color: #0b5fb0;
            font-size: 12px; font-weight: 700; padding: 9px 12px;
            border-radius: 10px; margin-bottom: 12px; line-height: 1.5;
        }
        .self-note .material-symbols-outlined { font-size: 18px; flex-shrink: 0; }

        .farmer-hero { text-align: center; padding: 24px 0 8px; }
        .farmer-hero__avatar {
            width: 96px; height: 96px;
            border-radius: 50%;
            background: #e2e8f0;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .farmer-hero__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .farmer-hero__name { font-size: 22px; font-weight: 700; }
        .farmer-hero__rating {
            display: inline-flex; align-items: center; gap: 4px;
            background: #fef3c7; color: #92400e;
            padding: 4px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 600; line-height: 1;
            margin-top: 8px;
        }
        .farmer-hero__rating .material-symbols-outlined {
            font-size: 16px; color: #f59e0b;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'opsz' 24;
            line-height: 1;
        }
        .farmer-hero__location {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 13px; color: var(--color-text-sub);
            margin-top: 6px; line-height: 1.2;
        }
        .farmer-hero__location .material-symbols-outlined {
            font-size: 16px; line-height: 1;
        }
        /* 6/10 #138: 信頼ブロックの「取引N件」（取引完了の累計・レストランページと対称） */
        .farmer-hero__trades { font-size: 12.5px; color: var(--color-text-sub); margin-top: 6px; }

        /* 6/17 #149 ②: 生産者の一言ボックスは中立グレー（緑=GAqP/成功 専用のため意味色を外す） */
        .message-box {
            background: #f8fafc;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
        }
        .message-box__label { font-size: 12px; font-weight: 700; color: var(--color-text-sub); margin-bottom: 4px; }
        .message-box__text { font-size: 13px; color: var(--color-text); line-height: 1.6; white-space: pre-wrap; }

        /* 6/17 #149 ⑤: 認証情報（GAqP）は薄緑ボックスで1認証カードに囲む（緑=GAqP はOK・商品詳細の gaqp-detail-box と統一感） */
        .gaqp-cert-box {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .gaqp-cert-box__desc { font-size: 13px; color: #065f46; line-height: 1.5; margin-top: 6px; }

        /* 6/17 #149 ④: 養殖環境＝横スワイプカルーセル＋ドット（商品詳細のカルーセルと統一） */
        .env-carousel { position: relative; overflow: hidden; border-radius: 14px; background: #e2e8f0; }
        .env-slides { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .env-slides::-webkit-scrollbar { display: none; }
        .env-slide { flex: 0 0 100%; scroll-snap-align: start; height: 200px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; }
        .env-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .env-dots { display: flex; justify-content: center; gap: 6px; padding: 8px 0 2px; }
        .env-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; cursor: pointer; }
        .env-dot.active { background: #1a1a1a; }

        .section { margin-bottom: 20px; }
        .section__title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }

        .pond-photo {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: #e2e8f0;
            max-height: 220px;
            margin-bottom: 10px;
        }
        .pond-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .pond-placeholder {
            width: 100%; height: 160px;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
        }

        .subrating-wrap {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .subrating-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .subrating-head__title { font-size: 14px; font-weight: 700; }
        .subrating-head__link { font-size: 12px; color: #0369a1; font-weight: 600; text-decoration: none; }
        .subrating-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .subrating-card { background: #f8fafc; border-radius: 12px; padding: 10px; text-align: center; }
        .subrating-card__label { font-size: 11px; color: var(--color-text-sub); }
        .subrating-card__sub { font-size: 10px; color: var(--color-text-sub); margin-top: 2px; }
        .subrating-card__value { font-size: 20px; font-weight: 700; margin-top: 4px; color: var(--color-text); }

        .review-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 8px;
        }
        .review-card__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .review-card__name { font-size: 14px; font-weight: 700; }
        .review-card__date { font-size: 11px; color: var(--color-text-sub); }
        .review-card__stars { color: #f59e0b; font-size: 14px; font-variation-settings: 'FILL' 1; margin-bottom: 4px; }
        .review-card__stars .material-symbols-outlined { font-size: 16px; }
        .review-card__comment { font-size: 13px; color: var(--color-text); line-height: 1.5; }
        /* 5/11 #64: レビュー者の名前+アバター */
        .review-card__reviewer {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px;
        }
        .review-card__avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: #e2e8f0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .review-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .review-card__avatar .material-symbols-outlined { font-size: 18px; color: #94a3b8; }
        .review-card__reviewer-name {
            font-size: 13px; font-weight: 600; color: var(--color-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }

        .listings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .listing-mini {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            position: relative;
        }
        .listing-mini__img { height: 110px; background: #e2e8f0; position: relative; }
        .listing-mini__img img { width: 100%; height: 100%; object-fit: cover; }
        /* 6/3 #118: 標準商品カードに統一（価格は画像下・農家フッター省略・価格オーバーレイ廃止） */
        .listing-mini__stock {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(26,34,51,.78); color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 20px;
        }
        /* 6/3 #118: 売切れ（在庫0）＝グレーアウト末尾固定＋売切れバッジ（魚一覧と同じ） */
        .listing-mini.sold { filter: grayscale(1); opacity: 0.6; }
        .listing-mini__soldbadge {
            position: absolute; top: 8px; left: 8px;
            background: #64748b; color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 20px;
        }
        .listing-mini__body { padding: 8px 10px 11px; }
        .listing-mini__name { font-size: 13px; font-weight: 700; }
        .listing-mini__meta { font-size: 11px; color: var(--color-text-sub); margin-top: 2px; }
        /* 6/3 #118: 価格は画像下・青（買い手向け単一の正＝手数料込み・内臓処理込み） */
        .listing-mini__price { font-size: 17px; font-weight: 800; color: var(--color-cta); margin-top: 6px; }
        .listing-mini__price .u { font-size: 10px; color: var(--color-text-sub); font-weight: 600; }
        /* 6/17 #149 ①: 在庫は価格下のメタ行へ（画像オーバーレイ廃止）。売切れバッジは画像上に維持。 */
        .listing-mini__stockline { font-size: 11px; color: var(--color-text-sub); margin-top: 4px; }
        /* 6/3 #118: レビューコメント「もっと見る」 */
        .reviews-more { display: block; text-align: center; font-size: 13px; font-weight: 700; color: var(--color-cta); cursor: pointer; padding: 8px; background: none; border: none; width: 100%; font-family: inherit; }

        .empty-small { text-align: center; padding: 20px; color: var(--color-text-sub); font-size: 13px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="javascript:history.back()" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="profile.farmerTitle"></div>
    </div>

    <div class="profile-page">

        <!-- 6/11 #137 §9（農家側も同様）: 自己プレビューは read-only。編集導線は出さず案内バナーのみ（編集はプロフィール画面側）。 -->
        <div class="self-note" id="self-note">
            <span class="material-symbols-outlined">visibility</span>
            <span data-i18n="profile.selfPreviewNoteProducer"></span>
        </div>

        <div class="farmer-hero">
            <div class="farmer-hero__avatar" id="avatar">
                <span class="material-symbols-outlined" style="font-size:50px; color:#94a3b8;">person</span>
            </div>
            <div class="farmer-hero__name" id="name">-</div>
            <div class="farmer-hero__rating">
                <span class="material-symbols-outlined">star</span>
                <span id="rating-value">0.0</span>
                <span id="rating-count" style="color:#92400e;">（0件）</span>
            </div>
            <div class="farmer-hero__location">
                <span class="material-symbols-outlined" style="font-size:14px;">location_on</span>
                <span id="location">-</span>
            </div>
            <!-- 6/10 #138: 信頼ブロックに「取引N件」追加（取引完了の累計・レストランページと対称） -->
            <div class="farmer-hero__trades" id="trade-line"></div>
            <!-- 6/3 #118: GAqP はヘッダー下のcompactバッジを廃止し「認証情報」ボックスに一本化（#6） -->
        </div>

        <!-- 6/3 #118: 生産者の一言（未記入ならセクションごと非表示）。spec §2 順＝一言→認証情報 -->
        <div class="message-box" id="message-box" style="display:none;">
            <div class="message-box__label" data-i18n="profile.farmerMessage"></div>
            <div class="message-box__text" id="message-text"></div>
        </div>

        <!-- 5/27 #96: GAqP 認証情報セクション（認証済み時のみ表示） -->
        <!-- 6/17 #149 ⑤: 薄緑ボックスで囲んで1認証カードに（緑=GAqP はOK） -->
        <div class="section" id="gaqp-section" style="display:none;">
            <div class="section__title" data-i18n="gaqp.certificationInfo"></div>
            <div class="gaqp-cert-box">
                <div style="display:flex; align-items:center; gap:10px;" id="gaqp-section-badge"></div>
                <div class="gaqp-cert-box__desc" data-i18n="gaqp.description"></div>
            </div>
        </div>

        <!-- 6/3 #118: 養殖環境（写真未登録ならセクションごと非表示・#4） -->
        <div class="section" id="pond-section" style="display:none;">
            <div class="section__title" data-i18n="profile.pondPhoto"></div>
            <!-- 5/12 #72: 複数枚対応（pondPhotos[]）。1枚以下は従来通り。 -->
            <div id="pond-photos"></div>
        </div>

        <div class="subrating-wrap">
            <div class="subrating-head">
                <!-- 5/25 #84: タイトルに件数を含める形に変更（renderFarmerPage で動的セット） -->
                <div class="subrating-head__title" id="subrating-title" data-i18n="review.title"></div>
                <a class="subrating-head__link" id="reviews-link" href="#reviews-section" data-i18n="profile.viewReviews"></a>
            </div>
            <div class="subrating-grid">
                <div class="subrating-card">
                    <div class="subrating-card__label" data-i18n="profile.ratingSatisfaction"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-overall">0.0</div>
                </div>
                <div class="subrating-card">
                    <div class="subrating-card__label" data-i18n="profile.ratingQuality"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-quality">0.0</div>
                </div>
                <div class="subrating-card">
                    <div class="subrating-card__label" data-i18n="profile.ratingTime"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-time">0.0</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section__title" data-i18n="profile.activeListings"></div>
            <div id="listings-container"></div>
        </div>

        <div class="section" id="reviews-section">
            <!-- 5/25 #84: タイトルに件数を含める形に変更（renderFarmerPage で動的セット） -->
            <div class="section__title" id="reviews-section-title" data-i18n="profile.reviewComments"></div>
            <div id="reviews-list"></div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            doc, getDoc, collection, collectionGroup, query, where, orderBy, getDocs
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { formatProvince, formatLocation } from '/js/province-utils.js';
        import { getPondPhotos, gaqpBadgeHtml } from '/js/profile-utils.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users の重複取得を抑止
        import { getCachedUser } from '/js/data-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/10 #138: レビューコメントの共通描画（線画スマイリー・#137と共通化）
        import { renderReviewComments } from '/js/review-card.js';

        const loading = document.getElementById('loading');
        // 6/3 #118: 出品中の魚の買い手向け価格（手数料込み）算出用。settings/campaign から取得（既定5%）。
        let serviceRate = 0.05;
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const targetUid = new URLSearchParams(location.search).get('id');
        if (!targetUid) { history.back(); }

        // 6/11 #137 §9（農家側も同様）: 自分自身のページを見ている場合は自己プレビューバナーを表示（編集ボタンは出さない）
        function showSelfNoteIfNeeded() {
            if (window.currentUser?.uid && window.currentUser.uid === targetUid) {
                const note = document.getElementById('self-note');
                if (note) note.style.display = 'flex';
            }
        }
        // currentUser は watchAuthState 後にセットされるため、ポーリングで待つ
        (function waitForCurrent() {
            if (window.currentUser) { showSelfNoteIfNeeded(); return; }
            setTimeout(waitForCurrent, 200);
        })();

        // 6/10 #138: レビューカードの描画（線画スマイリー・もっと見る）は js/review-card.js に共通化。
        //   旧 fmtDate / verdictBadge(thumb_up/down) / legacyToVerdict はそちらへ移設（#137 と統一）。

        function fmtKhr(n) { return `${Number(n || 0).toLocaleString()} KHR`; }

        // 5/7 #56: コメントを innerHTML に流し込むので XSS 防止のためエスケープ
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // 6/17 #149 ③: 登録時期の「YYYY年M月」表示（i18n で言語別フォーマット・レストランページ #148 と同フォーマット）。
        //   Timestamp / millis 数値 / {seconds}（cache 復元）に対応。
        function fmtYearMonth(ts) {
            if (!ts) return '';
            let d;
            if (ts.toDate) d = ts.toDate();
            else if (typeof ts === 'number') d = new Date(ts);
            else if (ts.seconds != null) d = new Date(ts.seconds * 1000);
            else d = new Date(ts);
            if (isNaN(d.getTime())) return '';
            return i18next.t('profile.yearMonth', { year: d.getFullYear(), month: d.getMonth() + 1 });
        }

        // 6/17 #149 ④: 養殖環境の横スワイプカルーセル（商品詳細と統一）。1枚なら単純表示。
        function buildEnvCarousel(photos) {
            if (photos.length === 1) {
                return `<div class="env-carousel"><div class="env-slides"><div class="env-slide"><img ${asCachedImgAttrs(photos[0])} alt="pond" loading="lazy"></div></div></div>`;
            }
            const slides = photos.map(u => `<div class="env-slide"><img ${asCachedImgAttrs(u)} alt="pond" loading="lazy"></div>`).join('');
            const dots = photos.map((_, i) => `<div class="env-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');
            return `<div class="env-carousel"><div class="env-slides" id="env-slides">${slides}</div></div><div class="env-dots" id="env-dots">${dots}</div>`;
        }
        function bindEnvCarousel() {
            const slidesEl = document.getElementById('env-slides');
            const dotsEl = document.getElementById('env-dots');
            if (!slidesEl || !dotsEl) return;
            slidesEl.addEventListener('scroll', () => {
                const idx = Math.round(slidesEl.scrollLeft / slidesEl.offsetWidth);
                dotsEl.querySelectorAll('.env-dot').forEach((dot, i) => dot.classList.toggle('active', i === idx));
            });
            dotsEl.querySelectorAll('.env-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    const i = parseInt(dot.dataset.index, 10);
                    slidesEl.scrollTo({ left: i * slidesEl.offsetWidth, behavior: 'smooth' });
                });
            });
        }

        // 5/7 #56: 「レビューを見る」をタップしたらレビューコメント欄までスムーズスクロール
        document.addEventListener('click', (e) => {
            const link = e.target.closest('#reviews-link');
            if (!link) return;
            e.preventDefault();
            document.getElementById('reviews-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        // 5/23 #69 Phase J: 描画ロジックを fetch から分離。cached / fresh 両方から呼ぶ。
        function renderFarmerPage(user, listings, reviewsWithComment, reviewerMap) {
            document.getElementById('name').textContent = user.displayName || '-';
            const loc = formatLocation(user) || '-';
            document.getElementById('location').textContent = loc;

            // 6/10 #138 / 6/17 #149 ③: 信頼ブロック＝「取引N件 ・ YYYY年M月〜」（登録時期を追加・レストランページと対称）。
            const tradeEl = document.getElementById('trade-line');
            if (tradeEl) {
                const ym = fmtYearMonth(user.createdAt);
                tradeEl.textContent = [
                    i18next.t('profile.tradeCount', { count: Number(user.tradeCount || 0) }),
                    ym ? `${ym}〜` : null,
                ].filter(Boolean).join(' ・ ');
            }

            if (user.avatarUrl) {
                document.getElementById('avatar').innerHTML = `<img ${asCachedImgAttrs(user.avatarUrl)} alt="avatar">`;
            }

            // 6/3 #118: GAqP はヘッダー下のcompactバッジを廃止し「認証情報」ボックスに一本化（#6）
            const gaqpSection = document.getElementById('gaqp-section');
            const gaqpSectionBadge = document.getElementById('gaqp-section-badge');
            if (gaqpSection && gaqpSectionBadge) {
                if (user.gaqpCertified === true) {
                    gaqpSection.style.display = 'block';
                    gaqpSectionBadge.innerHTML = gaqpBadgeHtml(user, 'md');
                } else {
                    gaqpSection.style.display = 'none';
                }
            }

            // 6/3 #118: ヘッダー★%＝取引の満足度の良かった率（全画面カードと同じ avgRating 軸で統一）。
            //   0件は「新規」表示（★0%（0件）を出さない・#1）。
            const goodRate = Number(user.avgRating || 0);
            const count = Number(user.reviewCount || 0);
            const ratingEl = document.querySelector('.farmer-hero__rating');
            if (count === 0) {
                if (ratingEl) ratingEl.innerHTML = `<span style="font-weight:700;">${escapeHtml(i18next.t('fishlist.newFarmer'))}</span>`;
            } else {
                if (ratingEl) ratingEl.innerHTML = `<span class="material-symbols-outlined">star</span><span id="rating-value">${Math.round(goodRate)}%</span><span id="rating-count" style="color:#92400e;">（${count}${i18next.t('order.reviews')}）</span>`;
            }
            // 5/25 #84 + 5/27 #98: レビュー欄は全件数、コメント欄はコメント付きレビュー件数を別々に表示
            const commentCount = Array.isArray(reviewsWithComment) ? reviewsWithComment.length : 0;
            const subTitleEl = document.getElementById('subrating-title');
            if (subTitleEl) subTitleEl.textContent = i18next.t('profile.reviewsTitleWithCount', { count });
            const reviewsTitleEl = document.getElementById('reviews-section-title');
            if (reviewsTitleEl) reviewsTitleEl.textContent = i18next.t('profile.reviewCommentsTitleWithCount', { count: commentCount });

            const sub = user.subRatings || {};
            const fmtSubRate = (s) => {
                if (s && typeof s === 'object' && 'good' in s && 'total' in s && s.total > 0) {
                    return `${Math.round((s.good / s.total) * 100)}%`;
                }
                return '—';
            };
            document.getElementById('sub-overall').textContent = fmtSubRate(sub.overall);
            document.getElementById('sub-quality').textContent = fmtSubRate(sub.quality);
            document.getElementById('sub-time').textContent = fmtSubRate(sub.time);

            // 農家の一言（未記入ならセクション非表示・cached→fresh 再描画でクリア済みが残らないよう else を持たせる）
            if (user.farmerMessage) {
                document.getElementById('message-box').style.display = 'block';
                document.getElementById('message-text').textContent = user.farmerMessage;
            } else {
                document.getElementById('message-box').style.display = 'none';
            }

            // 6/3 #118 / 6/17 #149 ④: 養殖環境の写真（未登録ならセクションごと非表示）。
            //   複数枚は横スワイプカルーセル＋ドット（商品詳細と統一）・1枚は単純表示。
            const pondPhotos = getPondPhotos(user);
            const pondSection = document.getElementById('pond-section');
            if (pondPhotos.length > 0) {
                if (pondSection) pondSection.style.display = 'block';
                document.getElementById('pond-photos').innerHTML = buildEnvCarousel(pondPhotos);
                bindEnvCarousel();
            } else {
                if (pondSection) pondSection.style.display = 'none';
            }

            // 6/3 #118: 出品中の魚＝標準商品カード（価格は画像下・青・買い手向け単一の正＝手数料込み・内臓処理込み）。
            //   売切れ（在庫0）はグレーアウトして末尾固定（#2/#3/#7）。農家フッターは省略（全部同じ農家）。
            const container = document.getElementById('listings-container');
            if (!listings || listings.length === 0) {
                container.innerHTML = `<div class="empty-small">${i18next.t('account.emptyListings')}</div>`;
            } else {
                // 在庫あり → 在庫0（売切れ）の順に並べる（売切れは末尾固定）
                const sorted = listings.slice().sort((a, b) => {
                    const aSold = (a.stock || 0) <= 0 ? 1 : 0;
                    const bSold = (b.stock || 0) <= 0 ? 1 : 0;
                    return aSold - bSold;
                });
                container.innerHTML = `<div class="listings-grid">${sorted.map(data => {
                    const name = i18next.exists(`fish.${data.fishType}`) ? i18next.t(`fish.${data.fishType}`) : (data.fishType || '');
                    const shortName = name.trim();
                    const img = data.photoUrl
                        ? `<img ${asCachedImgAttrs(data.photoUrl)} alt="${shortName}">`
                        : `<div style="display:flex; align-items:center; justify-content:center; height:100%;"><span class="material-symbols-outlined" style="font-size:36px; color:#94a3b8;">set_meal</span></div>`;
                    // 買い手向け単一の正：(price + gutPrice) × (1 + serviceRate)
                    const unit = Math.round(((data.price || 0) + (data.gutPrice || 0)) * (1 + serviceRate));
                    const isSold = (data.stock || 0) <= 0;
                    return `
                        <a class="listing-mini${isSold ? ' sold' : ''}" href="/pages/restaurant/order.html?id=${data.id}">
                            <div class="listing-mini__img">
                                ${img}
                                ${isSold
                                    ? `<div class="listing-mini__soldbadge">${i18next.t('fishlist.soldOut')}</div>`
                                    : ''}
                            </div>
                            <div class="listing-mini__body">
                                <div class="listing-mini__name">${shortName}</div>
                                <div class="listing-mini__meta">${data.size || ''} head/kg</div>
                                <div class="listing-mini__price">${unit.toLocaleString()}<span class="u"> KHR/kg</span></div>
                                ${isSold ? '' : `<div class="listing-mini__stockline">${i18next.t('restaurant.stock', { kg: data.stock })}</div>`}
                            </div>
                        </a>
                    `;
                }).join('')}</div>`;
            }

            // 6/10 #138: レビューコメント（最新3件＋もっと見る・線画スマイリー）＝#137 と共通描画
            renderReviewComments(document.getElementById('reviews-list'), reviewsWithComment, reviewerMap, 3);
        }

        async function load({ silent = false } = {}) {
            if (!silent) loading.classList.add('show');
            try {
                // 5/23 #69 Phase B: data-cache 経由
                const user = await getCachedUser(targetUid);
                if (!user) { history.back(); return; }

                // 6/3 #118: 手数料率（買い手向け価格算出用）。失敗時は既定5%のまま。
                try {
                    const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                    if (campSnap.exists()) serviceRate = campSnap.data().serviceRate ?? 0.05;
                } catch (e) { /* keep default */ }

                // 出品中の魚
                const listingsQ = query(
                    collection(db, 'fishListings'),
                    where('farmerId', '==', targetUid),
                    where('isActive', '==', true)
                );
                const listSnap = await getDocs(listingsQ);
                const listings = listSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // レビュー
                let reviewsWithComment = [];
                let reviewerMap = {};
                try {
                    const rq = query(
                        collectionGroup(db, 'reviews'),
                        where('toUid', '==', targetUid),
                        orderBy('createdAt', 'desc')
                    );
                    const reviewSnap = await getDocs(rq);
                    const reviews = [];
                    reviewSnap.forEach(d => { reviews.push({ id: d.id, ...d.data() }); });
                    // 6/5 #128: モデレーションで非表示(hidden)にされたレビューは公開から除外
                    reviewsWithComment = reviews.filter(r => !r.hidden && r.comment && String(r.comment).trim() !== '');
                    const reviewerIds = [...new Set(reviewsWithComment.map(r => r.fromUid).filter(Boolean))];
                    await Promise.all(reviewerIds.map(async (uid) => {
                        try { reviewerMap[uid] = (await getCachedUser(uid)) || {}; }
                        catch (e) { reviewerMap[uid] = {}; }
                    }));
                } catch (err) {
                    console.warn('reviews query failed:', err);
                }

                renderFarmerPage(user, listings, reviewsWithComment, reviewerMap);

                // 5/23 #69 Phase J: 次回訪問用に cache 保存
                try {
                    // Timestamp 等の非シリアライズ可能オブジェクトは取り除く
                    const reviewsForCache = reviewsWithComment.map(r => ({
                        ...r,
                        createdAt: r.createdAt?.toMillis?.() || r.createdAt || null,
                    }));
                    saveRenderState(`farmer:${targetUid}`, {
                        // 6/17 #149 ③: createdAt（登録時期）は Timestamp を millis 化して保存（JSON 化対応）
                        user: { ...user, createdAt: user.createdAt?.toMillis?.() ?? user.createdAt ?? null },
                        listings,
                        reviewsWithComment: reviewsForCache,
                        reviewerMap,
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 5/23 #69 Phase J: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`farmer:${targetUid}`);
            if (cached?.user) {
                renderFarmerPage(
                    cached.user,
                    cached.listings || [],
                    cached.reviewsWithComment || [],
                    cached.reviewerMap || {}
                );
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached farmer render failed:', e);
        }

        load({ silent: cachedRendered });
    </script>
</body>

</html>
