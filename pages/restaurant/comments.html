<!DOCTYPE html>
<html lang="km">
<!--
  5/23 #80: 1問1答 Q&A 型に改造。
    - 既存コレクション fishListings/{id}/comments を維持（新規フィールド: senderRole / replyText / replyAt / replyByUid）
    - レイアウト：質問カード（質問 + 返信ペア）。Tabechoku 参考。
    - 返信は listing.farmerId のみ可（Firestore Rules の既存 update ルールで担保）
    - FCM 通知は Cloud Functions の onCommentCreated / onCommentUpdated で送信
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .comments-page { max-width: 480px; margin: 0 auto; padding: 0 16px 140px; }

        /* 6/18 #153-②: 商品コンテキスト箱をタップ→該当商品の商品詳細へ遷移（cursor:pointer・右端に chevron） */
        .fish-head {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        .fish-head__name { font-size: 15px; font-weight: 700; }
        .fish-head__meta { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .fish-head__chevron { color: var(--color-text-sub); flex-shrink: 0; margin-left: 8px; }

        .info-banner {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 12px;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .qa-list { display: flex; flex-direction: column; gap: 12px; }

        .qa-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
        }

        .qa-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .qa-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #e2e8f0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .qa-avatar > img { width: 100%; height: 100%; object-fit: cover; }
        .qa-avatar > .material-symbols-outlined { font-size: 20px; color: #94a3b8; }
        .qa-meta { flex: 1; min-width: 0; }
        .qa-name { font-size: 13px; font-weight: 700; color: var(--color-text); line-height: 1.3; }
        .qa-time { font-size: 11px; color: var(--color-text-sub); }
        .qa-badge {
            font-size: 10px; font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            background: #eff6ff;
            color: #1e40af;
            white-space: nowrap;
        }
        .qa-badge--reply { background: #ecfdf5; color: #065f46; }
        .qa-badge--noreply { background: #fef3c7; color: #92400e; }
        .qa-text {
            font-size: 13px;
            line-height: 1.55;
            word-break: break-word;
            white-space: pre-wrap;
            color: var(--color-text);
            padding-left: 40px;
        }
        .qa-delete-row { text-align: right; margin-top: 4px; padding-left: 40px; }
        .qa-delete-btn {
            font-size: 11px; color: #b91c1c;
            background: transparent; border: none;
            cursor: pointer; padding: 2px 6px;
            font-family: inherit;
        }
        .qa-reply-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--color-border);
        }
        .qa-reply-form {
            padding-left: 40px;
            margin-top: 8px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .qa-reply-form textarea {
            width: 100%;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            min-height: 56px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            background: #f8fafc;
        }
        .qa-reply-form textarea:focus { outline: none; background: #fff; border-color: var(--color-primary); }
        .qa-reply-send {
            align-self: flex-end;
            /* 6/3 #119: 返信する＝青（CTA・購入系の色。赤は danger=取り消し専用） */
            background: var(--color-cta);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .qa-reply-send:disabled { opacity: .6; }

        .qa-deleted-placeholder {
            font-size: 12px;
            color: #94a3b8;
            font-style: italic;
            padding: 6px 10px;
            background: #f1f5f9;
            border-radius: 8px;
            display: inline-block;
            margin-left: 40px;
        }

        .footer-input {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        }
        .footer-input__row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .footer-input textarea {
            flex: 1;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            border: 1px solid var(--color-border);
            border-radius: 22px;
            padding: 10px 14px;
            font-size: 16px;
            font-family: inherit;
            background: #f8fafc;
        }
        .footer-input textarea:focus { outline: none; background: #fff; border-color: var(--color-primary); }
        /* 6/3 #119: 質問する＝青（CTA。赤は danger=取り消し専用） */
        .send-btn {
            background: var(--color-cta);
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            align-self: stretch;
            display: flex;
            align-items: center;
        }
        .send-btn:disabled { opacity: .6; }
        .footer-input__note { font-size: 11px; color: var(--color-text-sub); margin-top: 4px; }
        /* 6/3 #120: 連絡先マスク警告（アンバー） */
        .mask-warn {
            display: flex; gap: 6px; align-items: flex-start;
            background: #fff7e6; border: 1px solid #f3d998; color: #b36a00;
            font-size: 12px; font-weight: 600; line-height: 1.5;
            border-radius: 10px; padding: 8px 10px; margin-bottom: 8px;
        }
        .mask-warn .material-symbols-outlined { flex-shrink: 0; }

        /* 6/3 #119: 返信権限ゲート（閲覧のみ）注記 */
        .gate-note { font-size: 11px; color: #94a3b8; text-align: right; margin-top: 8px; padding-left: 40px; }
        /* 6/3 #119: 空状態の併記サブ */
        .empty-sub { font-size: 12px; color: #9aa3b0; margin-top: 6px; }

        .empty-small { text-align: center; padding: 40px 20px; color: var(--color-text-sub); font-size: 13px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }

        /* 6/18 #153-③: 取り消し確認 ボトムシート（farmer/orders.html .approve-modal を参照） */
        .remove-sheet {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none; align-items: flex-end; justify-content: center;
            z-index: 300; /* footer-input(固定) より上 */
        }
        .remove-sheet.show { display: flex; }
        .remove-sheet__sheet {
            width: 100%; max-width: 480px;
            background: #fff; border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            animation: removeSheetUp .22s ease;
        }
        @keyframes removeSheetUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .remove-sheet__body {
            font-size: 14px; color: var(--color-text); line-height: 1.65; margin-bottom: 18px;
            word-break: break-word;
        }
        .remove-sheet__actions { display: flex; gap: 8px; }
        .remove-sheet__btn {
            flex: 1; padding: 13px; font-size: 15px; font-weight: 700;
            border-radius: 14px; cursor: pointer; font-family: inherit; border: none;
        }
        .remove-sheet__btn--cancel { background: #eceef0; color: var(--color-text-sub); }
        .remove-sheet__btn--ok { background: var(--color-danger, #b91c1c); color: #fff; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="javascript:history.back()" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="comments.title"></div>
    </div>

    <div class="comments-page">

        <div class="fish-head" id="fish-head">
            <div>
                <div class="fish-head__name" id="fish-name">-</div>
                <div class="fish-head__meta" id="fish-meta">-</div>
            </div>
            <span class="material-symbols-outlined fish-head__chevron">chevron_right</span>
        </div>

        <div class="info-banner" id="info-banner" data-i18n="comments.publicNote"></div>

        <div class="qa-list" id="qa-list">
            <div class="empty-small" data-i18n="comments.empty"></div>
        </div>
    </div>

    <div class="footer-input">
        <!-- 6/3 #120: 連絡先マスク発動時の警告（アンバー） -->
        <div class="mask-warn" id="mask-warn" style="display:none;">
            <span class="material-symbols-outlined" style="font-size:16px;">warning</span>
            <span data-i18n="comments.maskWarning"></span>
        </div>
        <div class="footer-input__row">
            <textarea id="comment-input" data-i18n="[placeholder]comments.inputPlaceholder"></textarea>
            <button class="send-btn" id="send-btn" data-i18n="comments.send"></button>
        </div>
        <div class="footer-input__note" data-i18n="comments.publicFooter"></div>
    </div>

    <!-- 6/18 #153-③: 取り消し確認＝自前ボトムシート（ブラウザ confirm 廃止・横断ルール）。
         キャンセル=グレー／取り消す=赤(danger)。z-index は固定フッター入力(footer-input)より上。 -->
    <div class="remove-sheet" id="remove-sheet">
        <div class="remove-sheet__sheet">
            <div class="remove-sheet__body" id="remove-sheet-body"></div>
            <div class="remove-sheet__actions">
                <button type="button" class="remove-sheet__btn remove-sheet__btn--cancel" id="remove-sheet-cancel" data-i18n="comments.cancel"></button>
                <button type="button" class="remove-sheet__btn remove-sheet__btn--ok" id="remove-sheet-ok" data-i18n="comments.delete"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { getReviewerAvatarUrl } from '/js/profile-utils.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users/fishListings の重複取得を抑止
        import { getCachedUser, getCachedListing } from '/js/data-cache.js';
        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/3 #120: 連絡先（電話番号・SNS・URL）の自動マスク
        import { maskContacts } from '/js/contact-mask.js';
        import {
            doc, getDoc, updateDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const listingId = new URLSearchParams(location.search).get('id');
        if (!listingId) { history.back(); }

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // 6/18 #153-⑤: 相対表記（22日前/たった今）→ 絶対表記 YYYY/MM/DD（ゼロ埋め）。
        //   js/review-card.js fmtDate と同型。Timestamp.toMillis()/数値/{seconds} を許容。
        function relative(ts) {
            let d;
            if (ts?.toMillis) d = new Date(ts.toMillis());
            else if (typeof ts === 'number') d = new Date(ts);
            else if (ts && ts.seconds != null) d = new Date(ts.seconds * 1000);
            else d = new Date(ts || 0);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const da = String(d.getDate()).padStart(2, '0');
            return `${y}/${m}/${da}`;
        }

        function renderAvatar(user) {
            const url = getReviewerAvatarUrl(user);
            if (url) {
                return `<img ${asCachedImgAttrs(url)} alt="" loading="lazy">`;
            }
            return `<span class="material-symbols-outlined">person</span>`;
        }

        // 6/18 #153-③: 取り消し確認＝自前ボトムシート（ブラウザ confirm 廃止）。
        //   true=取り消す（赤）/ false=キャンセル（グレー）を resolve する Promise を返す。
        const removeSheetEl = document.getElementById('remove-sheet');
        const removeSheetBodyEl = document.getElementById('remove-sheet-body');
        const removeSheetOkEl = document.getElementById('remove-sheet-ok');
        const removeSheetCancelEl = document.getElementById('remove-sheet-cancel');
        let removeSheetResolve = null;
        function closeRemoveSheet(result) {
            removeSheetEl.classList.remove('show');
            if (removeSheetResolve) { removeSheetResolve(result); removeSheetResolve = null; }
        }
        removeSheetOkEl.addEventListener('click', () => closeRemoveSheet(true));
        removeSheetCancelEl.addEventListener('click', () => closeRemoveSheet(false));
        removeSheetEl.addEventListener('click', (e) => { if (e.target === removeSheetEl) closeRemoveSheet(false); });
        function showRemoveSheet(bodyText) {
            removeSheetBodyEl.textContent = bodyText;
            removeSheetEl.classList.add('show');
            return new Promise((resolve) => { removeSheetResolve = resolve; });
        }

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元（onSnapshot 初回到達で qa-list は上書きされる）
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`restaurant_comments:${listingId}`);
            if (cached) {
                if (cached.fishName) document.getElementById('fish-name').textContent = cached.fishName;
                if (cached.fishMeta) document.getElementById('fish-meta').textContent = cached.fishMeta;
                if (cached.qaListHtml) document.getElementById('qa-list').innerHTML = cached.qaListHtml;
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { /* ignore */ }

        waitForUserData(async () => {
            if (!cachedRendered) loading.classList.add('show');
            try {
                // 5/23 #69 Phase B: data-cache 経由
                const listing = await getCachedListing(listingId);
                if (!listing) { history.back(); return; }

                // 6/18 #153-②: 商品コンテキスト箱タップ→該当商品の商品詳細へ遷移。
                //   listingId は URLSearchParams から既読（~L276）。live init（listing 取得後）でバインド。
                const fishHeadEl = document.getElementById('fish-head');
                if (fishHeadEl) {
                    fishHeadEl.addEventListener('click', () => {
                        location.href = `/pages/restaurant/order.html?id=${encodeURIComponent(listingId)}`;
                    });
                }

                const fishKey = listing.fishType || '';
                const fishName = i18next.exists(`fish.${fishKey}`) ? i18next.t(`fish.${fishKey}`) : fishKey;
                const shortName = fishName ? fishName.trim() : '';
                document.getElementById('fish-name').textContent = `${shortName}${listing.size ? `（${listing.size} head/kg）` : ''}`;

                const farmerData = (await getCachedUser(listing.farmerId)) || {};
                const farmerName = farmerData.displayName || '';
                // 6/3 #119: ヘッダー価格は買い手向け単一の正（手数料込み・内臓処理込み）。settings/campaign の serviceRate を反映。
                let serviceRate = 0.05;
                try {
                    const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                    if (campSnap.exists()) serviceRate = campSnap.data().serviceRate ?? 0.05;
                } catch (e) { /* keep default */ }
                const price = Math.round(((listing.price || 0) + (listing.gutPrice || 0)) * (1 + serviceRate));
                document.getElementById('fish-meta').textContent = `${farmerName} · ${price.toLocaleString()} KHR/kg`;

                // ユーザー情報キャッシュ（5/23 #69 Phase B: data-cache 経由）
                async function getUser(uid) {
                    if (!uid) return {};
                    return (await getCachedUser(uid)) || {};
                }

                const uid = window.currentUser?.uid;
                const isOwner = uid === listing.farmerId;  // この listing の farmer

                // 農家視点のときはバナー文言を差し替え
                if (window.currentUserData?.role === 'farmer') {
                    const banner = document.getElementById('info-banner');
                    banner.setAttribute('data-i18n', 'comments.publicNoteFarmer');
                    banner.textContent = i18next.t('comments.publicNoteFarmer');
                }

                // 5/27 #99: 多段スレッド化
                //   - 既存: comments doc に text + replyText（1Q1A）
                //   - 新: 返信は別 doc + parentReplyId フィールドで親子関係を表現
                //   - 互換: 既存 replyText は仮想 child として扱う
                const expandedThreads = new Set();  // 「もっと見る」展開状態（カードID）
                // 5/27 #99 修正: snapshot で構築したツリー状態を保持し、展開クリックで再描画
                let lastParents = [];
                let lastChildrenByParent = new Map();
                let lastUserMap = {};

                // 質問一覧購読
                const commentsRef = collection(db, 'fishListings', listingId, 'comments');
                const q = query(commentsRef, orderBy('createdAt', 'asc'));
                onSnapshot(q, async (snap) => {
                    if (snap.empty) {
                        document.getElementById('qa-list').innerHTML = `<div class="empty-small"><div>${escapeHtml(i18next.t('comments.empty'))}</div><div class="empty-sub">${escapeHtml(i18next.t('comments.emptySub'))}</div></div>`;
                        return;
                    }

                    // 1) 全 doc を取得 + ユーザー情報をプリフェッチ
                    const allDocs = [];
                    const userUids = new Set();
                    for (const d of snap.docs) {
                        const c = d.data();
                        allDocs.push({ id: d.id, c });
                        if (c.senderId) userUids.add(c.senderId);
                        if (c.replyByUid) userUids.add(c.replyByUid);
                    }
                    const userMap = {};
                    await Promise.all([...userUids].map(async (u) => { userMap[u] = await getUser(u); }));

                    // 2) ツリー構築：parent (parentReplyId なし) と children (parentReplyId あり) を分離
                    //    + 既存 replyText を仮想 child として展開
                    const childrenByParent = new Map();
                    const parents = [];
                    for (const item of allDocs) {
                        const { id, c } = item;
                        if (c.parentReplyId) {
                            if (!childrenByParent.has(c.parentReplyId)) childrenByParent.set(c.parentReplyId, []);
                            childrenByParent.get(c.parentReplyId).push({
                                id, c,
                                isVirtual: false,
                                senderId: c.senderId,
                                text: c.text,
                                createdAt: c.createdAt,
                                isDeleted: c.isDeleted === true,
                            });
                        } else {
                            parents.push(item);
                            // 既存 replyText 互換: 仮想 child を作る（id は親 ID にサフィックス付加）
                            if (c.replyText) {
                                if (!childrenByParent.has(id)) childrenByParent.set(id, []);
                                childrenByParent.get(id).push({
                                    id: `${id}__legacy`,
                                    parentId: id,
                                    isVirtual: true,
                                    senderId: c.replyByUid,
                                    text: c.replyText,
                                    createdAt: c.replyAt,
                                    isDeleted: false,
                                    legacyReply: true,
                                });
                            }
                        }
                    }
                    // 各 parent の children を時系列ソート
                    for (const arr of childrenByParent.values()) {
                        arr.sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
                    }
                    // 親も時系列ソート（新しい順で上に表示）
                    parents.sort((a, b) => (b.c.createdAt?.toMillis?.() || 0) - (a.c.createdAt?.toMillis?.() || 0));

                    // 5/27 #99 修正: 状態を保存して renderQA() から参照
                    lastParents = parents;
                    lastChildrenByParent = childrenByParent;
                    lastUserMap = userMap;
                    renderQA();
                });

                // 5/27 #99 修正: 展開クリック等で再呼び出し可能なように関数化
                function renderQA() {
                    const listEl = document.getElementById('qa-list');
                    const parents = lastParents;
                    const childrenByParent = lastChildrenByParent;
                    const userMap = lastUserMap;
                    if (!parents || parents.length === 0) {
                        listEl.innerHTML = `<div class="empty-small"><div>${escapeHtml(i18next.t('comments.empty'))}</div><div class="empty-sub">${escapeHtml(i18next.t('comments.emptySub'))}</div></div>`;
                        return;
                    }

                    function renderReplyBubble(child, parentId, depth = 0) {
                        if (child.isDeleted) {
                            // 6/18 #153-④: 返信の跡地は「この返信は取り消されました」（質問の跡地 comments.deleted とは別文言）。
                            return `<div class="qa-reply-section"><div class="qa-deleted-placeholder">${escapeHtml(i18next.t('comments.replyDeleted'))}</div></div>`;
                        }
                        const user = userMap[child.senderId] || (child.legacyReply ? farmerData : {});
                        const avatar = renderAvatar(user);
                        const name = user.displayName || '';
                        const time = relative(child.createdAt);
                        const isFarmer = child.senderId === listing.farmerId || child.legacyReply;
                        const badgeClass = isFarmer ? 'qa-badge--reply' : '';
                        const badgeLabel = isFarmer ? i18next.t('comments.replyLabel') : i18next.t('comments.replyFromUser');
                        // 削除ボタン: 仮想 legacy reply のみ owner（出品農家）限定 / 新 reply は本人のみ
                        const canDelete = child.legacyReply ? isOwner : (child.senderId === uid);
                        const deleteBtn = canDelete
                            ? (child.legacyReply
                                ? `<div class="qa-delete-row"><button class="qa-delete-btn" data-action="del-r" data-id="${parentId}" type="button">${escapeHtml(i18next.t('comments.delete'))}</button></div>`
                                : `<div class="qa-delete-row"><button class="qa-delete-btn" data-action="del-child" data-id="${child.id}" type="button">${escapeHtml(i18next.t('comments.delete'))}</button></div>`)
                            : '';
                        return `
                            <div class="qa-reply-section" style="margin-left:${depth * 16}px;">
                                <div class="qa-header">
                                    <div class="qa-avatar">${avatar}</div>
                                    <div class="qa-meta">
                                        <div class="qa-name">${escapeHtml(name)}</div>
                                        <div class="qa-time">${escapeHtml(time)}</div>
                                    </div>
                                    <span class="qa-badge ${badgeClass}">${escapeHtml(badgeLabel)}</span>
                                </div>
                                <div class="qa-text">${escapeHtml(child.text || '')}</div>
                                ${deleteBtn}
                            </div>
                        `;
                    }

                    listEl.innerHTML = parents.map(({ id, c }) => {
                        const isDeleted = c.isDeleted === true;
                        const sender = userMap[c.senderId] || {};
                        const senderName = sender.displayName || '';
                        const senderAvatar = renderAvatar(sender);
                        const time = relative(c.createdAt);

                        // 取り消し済みの質問：プレースホルダー表示
                        if (isDeleted) {
                            return `
                                <div class="qa-card">
                                    <div class="qa-header">
                                        <div class="qa-avatar"><span class="material-symbols-outlined">person</span></div>
                                        <div class="qa-meta">
                                            <div class="qa-time">${escapeHtml(time)}</div>
                                        </div>
                                    </div>
                                    <div class="qa-deleted-placeholder">${escapeHtml(i18next.t('comments.deleted'))}</div>
                                </div>
                            `;
                        }

                        // 5/27 #99 修正: 質問削除ボタンは listing の farmer または質問者本人（レストラン）に表示
                        const canDelQ = isOwner || c.senderId === uid;
                        const deleteBtnHtml = canDelQ
                            ? `<div class="qa-delete-row"><button class="qa-delete-btn" data-action="del-q" data-id="${id}" type="button">${escapeHtml(i18next.t('comments.delete'))}</button></div>`
                            : '';

                        // 6/3 #119: 返信権限ゲート — 農家（出品者）or 質問者本人のみ「返信する」。他レストランは閲覧のみ（§4）。
                        const canReply = isOwner || c.senderId === uid;

                        // 子返信の取得
                        const children = childrenByParent.get(id) || [];
                        let repliesHtml = '';
                        if (children.length > 0) {
                            const expanded = expandedThreads.has(id);
                            const visibleChildren = expanded ? children : children.slice(0, 1);
                            repliesHtml = visibleChildren.map(ch => renderReplyBubble(ch, id, 1)).join('');
                            if (!expanded && children.length > 1) {
                                repliesHtml += `
                                    <div style="text-align:center; margin-top:6px;">
                                        <button class="qa-delete-btn" data-action="expand-thread" data-id="${id}" type="button" style="color:var(--color-cta); font-weight:600;">${escapeHtml(i18next.t('comments.viewMoreReplies', { count: children.length - 1 }))}</button>
                                    </div>
                                `;
                            }
                        } else if (isOwner) {
                            // 未返信 → owner（farmer）にはインライン返信フォーム
                            repliesHtml = `
                                <div class="qa-reply-section">
                                    <form class="qa-reply-form" data-action="reply" data-id="${id}">
                                        <textarea data-role="reply-input" placeholder="${escapeHtml(i18next.t('comments.replyPlaceholder'))}" required></textarea>
                                        <button type="submit" class="qa-reply-send">${escapeHtml(i18next.t('comments.replySend'))}</button>
                                    </form>
                                </div>
                            `;
                        } else {
                            // 未返信 → owner 以外には「未返信」バッジ
                            repliesHtml = `
                                <div class="qa-reply-section" style="padding-left:40px;">
                                    <span class="qa-badge qa-badge--noreply">${escapeHtml(i18next.t('comments.noReply'))}</span>
                                </div>
                            `;
                        }

                        // 6/3 #119: 返信アフォーダンス（権限ゲート）。
                        //   farmer 未返信時は上のインラインフォームで対応済。それ以外で canReply なら「返信する」、
                        //   他レストランは閲覧のみ注記（「返信する」は出さない）。
                        let replyAffordance = '';
                        if (canReply) {
                            if (!(children.length === 0 && isOwner)) {
                                replyAffordance = `<div style="text-align:right; margin-top:6px;"><button class="qa-delete-btn" data-action="reply-to" data-parent="${id}" data-thread="${id}" type="button" style="color:var(--color-cta); font-weight:700;">${escapeHtml(i18next.t('comments.replyAgain'))}</button></div>`;
                            }
                        } else {
                            replyAffordance = `<div class="gate-note">${escapeHtml(i18next.t('comments.viewOnlyNote'))}</div>`;
                        }

                        return `
                            <div class="qa-card" data-id="${id}">
                                <div class="qa-header">
                                    <div class="qa-avatar">${senderAvatar}</div>
                                    <div class="qa-meta">
                                        <div class="qa-name">${escapeHtml(senderName)}</div>
                                        <div class="qa-time">${escapeHtml(time)}</div>
                                    </div>
                                    <span class="qa-badge">${escapeHtml(i18next.t('comments.questionLabel'))}</span>
                                </div>
                                <div class="qa-text">${escapeHtml(c.text || '')}</div>
                                ${deleteBtnHtml}
                                ${repliesHtml}
                                ${replyAffordance}
                            </div>
                        `;
                    }).join('');
                    // 5/25 #91/#92 拡張: 次回訪問用に画面 HTML をキャッシュ保存
                    try {
                        saveRenderState(`restaurant_comments:${listingId}`, {
                            fishName: document.getElementById('fish-name')?.textContent || '',
                            fishMeta: document.getElementById('fish-meta')?.textContent || '',
                            qaListHtml: listEl.innerHTML,
                        });
                    } catch (e) { /* ignore */ }

                    // 6/3 #119: 質問（スレッド起点）の取り消し＝スレッドごと削除（農家の返信も含む・§4-7）。
                    //   client は root のみ isDeleted（自分の投稿＝許可）。子返信や legacy 返信の連鎖削除は
                    //   サーバ（onCommentUpdated）が admin 権限で実行（Firestore Rules 制約の回避）。
                    listEl.querySelectorAll('[data-action="del-q"]').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            // 6/18 #153-③: ブラウザ confirm → 自前ボトムシート
                            if (!(await showRemoveSheet(i18next.t('comments.confirmDeleteThread')))) return;
                            try {
                                await updateDoc(doc(db, 'fishListings', listingId, 'comments', btn.dataset.id), {
                                    isDeleted: true,
                                    deletedAt: serverTimestamp(),
                                    threadDeleted: true,   // サーバに「スレッドごと削除」を伝える
                                });
                            } catch (err) {
                                console.error('delete thread failed:', err);
                                alert(i18next.t('comments.errorSubmit'));
                            }
                        });
                    });

                    // 返信取り消し（reply フィールドを null に戻す）
                    listEl.querySelectorAll('[data-action="del-r"]').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            // 6/18 #153-③: ブラウザ confirm → 自前ボトムシート
                            if (!(await showRemoveSheet(i18next.t('comments.replyConfirmDelete')))) return;
                            try {
                                await updateDoc(doc(db, 'fishListings', listingId, 'comments', btn.dataset.id), {
                                    replyText: null,
                                    replyAt: null,
                                    replyByUid: null,
                                });
                            } catch (err) {
                                console.error('delete reply failed:', err);
                                alert(i18next.t('comments.errorSubmit'));
                            }
                        });
                    });

                    // 返信送信（既存：farmer の初回返信は親 doc の replyText に書く＝互換性維持）
                    listEl.querySelectorAll('form[data-action="reply"]').forEach(form => {
                        form.addEventListener('submit', async (e) => {
                            e.preventDefault();
                            const input = form.querySelector('[data-role="reply-input"]');
                            const text = (input.value || '').trim();
                            if (!text) return;
                            const sendBtn = form.querySelector('.qa-reply-send');
                            sendBtn.disabled = true;
                            try {
                                // 6/3 #120: 返信本文も連絡先マスクを適用
                                const { masked, hit } = maskContacts(text, i18next.t('comments.maskedContact'));
                                document.getElementById('mask-warn').style.display = hit ? 'flex' : 'none';
                                await updateDoc(doc(db, 'fishListings', listingId, 'comments', form.dataset.id), {
                                    replyText: masked,
                                    replyAt: serverTimestamp(),
                                    replyByUid: uid,
                                    ...(hit ? { replyContactMasked: true } : {}),
                                });
                                input.value = '';
                            } catch (err) {
                                console.error('reply failed:', err);
                                alert(i18next.t('comments.errorSubmit'));
                                sendBtn.disabled = false;
                            }
                        });
                    });

                    // 5/27 #99 修正: 「もっと見る」展開 → expandedThreads に追加して即時再描画
                    listEl.querySelectorAll('[data-action="expand-thread"]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            expandedThreads.add(btn.dataset.id);
                            renderQA();
                        });
                    });

                    // 5/27 #99: 多段返信送信（child doc を新規 addDoc・parentReplyId 付与）
                    listEl.querySelectorAll('[data-action="reply-to"]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const parentReplyId = btn.dataset.parent;
                            // 入力欄をフッターにフォーカス（既存の comment-input を流用 + 仮想 attribute で送信先を切替）
                            const input = document.getElementById('comment-input');
                            const sendBtn = document.getElementById('send-btn');
                            input.dataset.replyTo = parentReplyId;
                            input.placeholder = i18next.t('comments.replyToPlaceholder');
                            input.focus();
                            sendBtn.textContent = i18next.t('comments.replySend');
                        });
                    });

                    // 5/27 #99: child reply の削除
                    listEl.querySelectorAll('[data-action="del-child"]').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            // 6/18 #153-③: ブラウザ confirm → 自前ボトムシート
                            if (!(await showRemoveSheet(i18next.t('comments.replyConfirmDelete')))) return;
                            try {
                                await updateDoc(doc(db, 'fishListings', listingId, 'comments', btn.dataset.id), {
                                    isDeleted: true,
                                    deletedAt: serverTimestamp(),
                                });
                            } catch (err) {
                                console.error('delete child reply failed:', err);
                                alert(i18next.t('comments.errorSubmit'));
                            }
                        });
                    });
                }
            } catch (err) {
                console.error('comments init failed:', err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        // 新規質問送信 + 5/27 #99: 多段返信送信（input.dataset.replyTo がセットされていれば child doc）
        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text) return;
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            try {
                // 6/3 #120: 連絡先（電話番号・SNS・URL）を検知→伏字に置換。発動時は警告を表示。
                const { masked, hit } = maskContacts(text, i18next.t('comments.maskedContact'));
                document.getElementById('mask-warn').style.display = hit ? 'flex' : 'none';
                const payload = {
                    senderId: uid,
                    senderRole: window.currentUserData?.role || null,
                    text: masked,
                    createdAt: serverTimestamp(),
                };
                if (hit) payload.contactMasked = true;
                const replyTo = input.dataset.replyTo;
                if (replyTo) {
                    // 仮想 (__legacy) は親 doc id に正規化
                    payload.parentReplyId = replyTo.endsWith('__legacy') ? replyTo.replace('__legacy', '') : replyTo;
                }
                await addDoc(collection(db, 'fishListings', listingId, 'comments'), payload);
                input.value = '';
                delete input.dataset.replyTo;
                input.placeholder = i18next.t('comments.inputPlaceholder');
                btn.textContent = i18next.t('comments.send');
            } catch (err) {
                console.error('comment submit failed:', err);
                alert(i18next.t('comments.errorSubmit'));
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
