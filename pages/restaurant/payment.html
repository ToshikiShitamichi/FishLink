<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .payment-page { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

        .pay-head {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin: 4px 0 12px;
        }

        .pay-card {
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .pay-total-label {
            font-size: 13px;
            color: var(--color-text-sub);
            margin-bottom: 4px;
        }

        /* 6/5 #129: 金額（合計）＝青 */
        .pay-total {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-cta);
            line-height: 1.1;
        }

        /* 6/5 #129: 割引の注記は amber に統一 */
        .pay-total-note {
            font-size: 12px;
            color: #b36a00;
            margin-top: 4px;
        }

        /* 6/5 #129: 金額をコピー（口座QRは金額手入力のため誤入力防止） */
        .copy-amount-btn {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-cta);
            border: 1px solid var(--color-cta-lt);
            background: var(--color-cta-lt);
            border-radius: 10px;
            padding: 7px 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .copy-amount-btn .material-symbols-outlined { font-size: 18px; }

        .pay-breakdown {
            border-top: 1px solid var(--color-border);
            margin-top: 14px;
            padding-top: 12px;
        }

        .pay-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            color: var(--color-text);
        }

        .pay-line__label { color: var(--color-text-sub); }
        /* 6/5 #129: キャンペーン割引＝amber */
        .pay-line__value.discount { color: #b36a00; }
        .pay-line.promo .pay-line__label { color: #b36a00; }
        /* 案B #183: ウォレット利用＝青（金額系） */
        .pay-line.wallet .pay-line__label, .pay-line.wallet .pay-line__value { color: var(--color-cta); }
        /* お支払い額（合計の区切り） */
        .pay-line.total-line { border-top: 1px solid var(--color-border); margin-top: 6px; padding-top: 8px; }
        .pay-line.total-line .pay-line__label, .pay-line.total-line .pay-line__value { font-weight: 800; }

        /* 案B #183: セクションラベル / 状態ボックス / 支払い済みチップ / 完了アクション */
        .sec-lbl { font-size: 12px; font-weight: 800; color: var(--color-text-sub); margin: 14px 20px 6px; }
        .status-box { border-radius: 14px; padding: 13px 15px; margin: 0 16px 14px; }
        .status-box.arrived { background: #e7f4ec; border: 1px solid #bfe3cc; }
        .status-box.arrived .sb-s { color: #2e7d32; }
        .status-box.arrived .sb-d { color: #3e7a4e; }
        .status-box.fin { background: #eaeff3; border: 1px solid #d6dee6; }
        .status-box.fin .sb-s { color: #42566b; }
        .status-box.fin .sb-d { color: var(--color-text-sub); }
        .status-box.wait { background: #f0f4f8; border: 1px solid #dde5ee; }
        .status-box.wait .sb-s { color: #42566b; }
        .status-box.wait .sb-d { color: var(--color-text-sub); }
        .status-box.hold { background: #fff7e6; border: 1px solid #f3d998; }
        .status-box.hold .sb-s { color: #b36a00; }
        .status-box.hold .sb-d { color: #8a6d3b; }
        .status-box .sb-s { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .status-box .sb-s .material-symbols-outlined { font-size: 18px; }
        .status-box .sb-d { font-size: 11.5px; margin-top: 4px; line-height: 1.5; }
        .paid-chip { display: inline-flex; align-items: center; gap: 5px; background: #e7f4ec; color: #2e7d32; font-size: 12px; font-weight: 800; border-radius: 8px; padding: 6px 10px; margin-top: 10px; }
        .paid-chip .material-symbols-outlined { font-size: 16px; }
        .detail-pri-btn { display: flex; align-items: center; justify-content: center; padding: 13px; background: var(--color-cta); color: #fff; border-radius: 12px; font-weight: 800; font-size: 14px; text-decoration: none; }

        /* 案B #183: read-only 化により最下部に余白（旧 fixed フッターは廃止） */
        .review-hint-note {
            font-size: 11px;
            color: var(--color-text-sub);
            text-align: center;
            margin: 0 16px 24px;
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="payment-page">
        <div class="page-header" style="align-items:center; padding:16px;">
            <a href="/pages/restaurant/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub);"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/orders.html" class="page-header__title" style="text-decoration:none; color:inherit; flex:1;" data-i18n="payment.purchaseDetailTitle"></a>
            <select id="lang-selector" style="width:auto; flex:0 0 auto; font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
        </div>

        <!-- 案B #183: 現在の状態（お届け済み／完了 等・read-only） -->
        <div class="sec-lbl" data-i18n="payment.currentStatus"></div>
        <div id="status-box"></div>

        <!-- 注文概要 -->
        <div class="sec-lbl" data-i18n="orders.orderContent"></div>
        <div class="pay-card" id="order-info"></div>

        <!-- 案B #183: お支払い（read-only・前払い済み） -->
        <div class="sec-lbl" data-i18n="payment.title"></div>
        <div class="pay-card">
            <div class="pay-total-label" data-i18n="payment.total"></div>
            <div class="pay-total" id="total-amount">0 KHR</div>
            <div class="pay-total-note" id="discount-note" style="display:none;" data-i18n="payment.discountApplied"></div>
            <div class="pay-breakdown" id="breakdown"></div>
            <div class="paid-chip" id="paid-chip" style="display:none;">
                <span class="material-symbols-outlined">check_circle</span>
                <span data-i18n="payment.paidPrepaid"></span>
            </div>
        </div>

        <!-- 6/17 #150 §4/§5: 問題を報告（配送完了＋N時間の期限内のみ表示・報告中は「報告済み・対応中」） -->
        <div id="report-section" style="display:none; margin:0 16px 16px;"></div>

        <!-- 案B #183: 完了時のアクション（同じ魚を再注文＝青・主／レビューを送信＝副） -->
        <div id="detail-actions" style="display:none; margin:0 16px 16px;">
            <a id="reorder-btn" class="detail-pri-btn" href="#" data-i18n="payment.reorderSameFish"></a>
            <a id="review-btn" href="#" style="display:none; margin-top:8px; padding:12px; background:#fff; color:var(--color-cta); border:1.5px solid var(--color-cta); border-radius:12px; font-weight:700; text-decoration:none; font-size:14px; align-items:center; justify-content:center; gap:6px; line-height:1;">
                <span class="material-symbols-outlined" style="font-size:18px; line-height:1;">star</span>
                <span data-i18n="review.submit" style="line-height:1;"></span>
            </a>
            <div id="reviewed-label" style="display:none; margin-top:8px; padding:12px; background:#f3f4f6; color:#6b7280; border-radius:12px; font-weight:700; font-size:14px; text-align:center; line-height:1;" data-i18n="review.reviewed"></div>
        </div>
        <div id="review-hint-note" class="review-hint-note" data-i18n="payment.reviewAfterTrade"></div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { formatProvince, formatDistrict } from '/js/province-utils.js';
        // 6/5 #129: FL番号表示
        import { getOrderNumber } from '/js/order-utils.js';
        import {
            doc, getDoc, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/17 #150: 問題報告の入口出し分け（配送完了＋N時間／1注文1オープン）
        import { getReportWindowHours, computeReportEntry, reportDeadlineText } from '/js/report-window.js';

        let reportHours = 4;
        // #155 ②: 納品日に曜日（注文状況 orders.html と同じヘルパーを踏襲）
        const WEEKDAY_SHORT = {
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'],
        };
        function fmtDeliveryDate(iso) {
            const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return iso || '';
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];
            return `${Number(m[2])}/${Number(m[3])}（${wd}）`;
        }
        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const params = new URLSearchParams(location.search);
        const orderId = params.get('id');
        if (!orderId) location.href = '/pages/restaurant/orders.html';

        let orderData = null;
        let myUid = null;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // 5/4: 言語切替で再描画できるよう状態を保持
        let pageState = { fishTypeKey: '', size: '', farmerName: '', place: '' };

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`restaurant_payment:${orderId}`);
            if (cached) {
                if (cached.statusHtml) document.getElementById('status-box').innerHTML = cached.statusHtml;
                if (cached.orderInfoHtml) document.getElementById('order-info').innerHTML = cached.orderInfoHtml;
                if (cached.breakdownHtml) document.getElementById('breakdown').innerHTML = cached.breakdownHtml;
                if (cached.totalAmount) document.getElementById('total-amount').textContent = cached.totalAmount;
                if (cached.showPaidChip) document.getElementById('paid-chip').style.display = 'inline-flex';
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { console.warn('cached restaurant_payment render failed:', e); }

        function saveCurrentPaymentRender() {
            try {
                saveRenderState(`restaurant_payment:${orderId}`, {
                    statusHtml: document.getElementById('status-box')?.innerHTML || '',
                    orderInfoHtml: document.getElementById('order-info')?.innerHTML || '',
                    breakdownHtml: document.getElementById('breakdown')?.innerHTML || '',
                    totalAmount: document.getElementById('total-amount')?.textContent || '',
                    showPaidChip: document.getElementById('paid-chip')?.style.display !== 'none',
                });
            } catch (e) { /* ignore */ }
        }

        waitForUserData(async () => {
            if (!cachedRendered) loading.classList.add('show');
            myUid = window.currentUser.uid;

            const orderSnap = await getDoc(doc(db, 'orders', orderId));
            if (!orderSnap.exists()) { location.href = '/pages/restaurant/orders.html'; return; }
            orderData = orderSnap.data();

            // 注文者でない場合は戻す
            if (orderData.restaurantId !== myUid) { location.href = '/pages/restaurant/orders.html'; return; }

            // listing情報（注文時点のスナップショット優先）
            let fishTypeKey = orderData.snapFishType;
            let size = orderData.snapSize || '';
            if ((!fishTypeKey || !size) && orderData.listingId) {
                const lSnap = await getDoc(doc(db, 'fishListings', orderData.listingId));
                const lt = lSnap.data() || {};
                if (!fishTypeKey) fishTypeKey = lt.fishType;
                if (!size) size = lt.size || '';
            }

            // 農家情報
            const farmerSnap = await getDoc(doc(db, 'users', orderData.farmerId));
            const farmer = farmerSnap.data() || {};
            pageState = {
                fishTypeKey: fishTypeKey || '',
                size,
                farmerName: farmer.displayName || '',
                place: (() => {
                    const p = formatProvince(farmer.province || '');
                    const d = formatDistrict(farmer);
                    return p + (d ? ', ' + d : '');
                })(),
            };

            // 6/17 #150: 報告受付時間を先読みしてから報告窓口を描画
            reportHours = await getReportWindowHours();
            renderStatusBox();
            renderOrderInfo();
            renderBreakdown();
            renderReportSection();
            renderDetailActions();
            saveCurrentPaymentRender();   // 5/25 #91/#92 拡張: fresh 描画後に最新状態をキャッシュ

            // 5/7 #55: レビュー済みかリアルタイム監視（送信されたら即時切り替え）
            onSnapshot(doc(db, 'orders', orderId, 'reviews', 'restaurant'), (snap) => {
                applyReviewedState(snap.exists());
            });

            loading.classList.remove('show'); document.body.classList.add('app-ready');
        });

        // 案B #183: レビュー解禁＝取引完了後（前払いは tradeCompleted フラグ・or 送金済）。
        //   legacy 注文は従来どおり paymentStatus==='paid' 以降。
        function isPaidOrBeyond() {
            if (!orderData) return false;
            if (orderData.prepaid === true) {
                return orderData.tradeCompleted === true
                    || ['remitted', 'done'].includes(orderData.adminStatus);
            }
            return orderData.paymentStatus === 'paid'
                || ['payment_confirmed', 'remitted', 'done'].includes(orderData.adminStatus);
        }

        // 5/7 #55: レビュー済みなら詳細画面のレビューボタンを「レビュー済み」表示に
        let alreadyReviewed = false;
        function applyReviewedState(reviewed) {
            alreadyReviewed = reviewed;
            refreshReviewArea();
        }

        // 6/5 #129: レビュー導線の表示制御を一元化
        //   支払い前 → レビュー導線は出さず注記のみ／支払い後・未レビュー → レビューを送信／レビュー済み → ラベル
        function refreshReviewArea() {
            const reviewBtn = document.getElementById('review-btn');
            const reviewedLabel = document.getElementById('reviewed-label');
            const hint = document.getElementById('review-hint-note');
            reviewBtn.href = `/pages/restaurant/review.html?id=${orderId}`;
            const unlocked = isPaidOrBeyond();
            if (!unlocked) {
                reviewBtn.style.display = 'none';
                reviewedLabel.style.display = 'none';
                hint.style.display = 'block';
                return;
            }
            hint.style.display = 'none';
            if (alreadyReviewed) {
                reviewBtn.style.display = 'none';
                reviewedLabel.style.display = 'block';
            } else {
                reviewedLabel.style.display = 'none';
                reviewBtn.style.display = 'flex';
            }
        }

        function renderOrderInfo() {
            if (!orderData) return;
            const { fishTypeKey, size, farmerName, place } = pageState;
            const fishName = fishTypeKey
                ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey)
                : '';

            // 5/5 #4: 注文状況画面と同じ粒度で情報表示。複数アイテムは各行を明細表示。
            const items = Array.isArray(orderData.items) ? orderData.items : null;
            const isMulti = items && items.length > 1;
            let itemsHtml;
            if (isMulti) {
                itemsHtml = items.map(it => {
                    const itType = it.snapFishType || '';
                    const itName = itType
                        ? (i18next.exists(`fish.${itType}`) ? i18next.t(`fish.${itType}`) : itType).trim()
                        : '';
                    const sizePart = it.snapSize ? `（${it.snapSize} head/kg）` : '';
                    const gutLabel = it.gutProcessing
                        ? `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutYes')}`
                        : `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutNo')}`;
                    return `<div style="font-size:14px; color:var(--color-text); padding:2px 0;">・${itName}${sizePart} ${it.quantity}kg・${gutLabel}</div>`;
                }).join('');
            } else {
                const gutLabel = orderData.gutProcessing
                    ? `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutYes')}`
                    : `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutNo')}`;
                itemsHtml = `
                    <div style="font-size:16px; font-weight:700; color:var(--color-text);">${fishName}${size ? `（${size} head/kg）` : ''}</div>
                    <div style="font-size:14px; color:var(--color-text); margin-top:4px;">${orderData.quantity} kg・${gutLabel}</div>
                `;
            }

            document.getElementById('order-info').innerHTML = `
                <div style="font-size:14px; color:var(--color-text-sub); margin-bottom:6px;">${i18next.t('orders.deliveryDate')} ${fmtDeliveryDate(orderData.deliveryDateIso || orderData.deliveryDate)} ${orderData.deliveryTime || ''}</div>
                <div style="font-size:13px; color:var(--color-text-sub); margin-bottom:8px;">
                    <span class="material-symbols-outlined" style="font-size:14px;">storefront</span>
                    ${i18next.t('payment.partnerLabel')}: ${farmerName}${place ? ` · ${place}` : ''}
                </div>
                ${itemsHtml}
                <div style="font-size:11px; color:#9aa3b0; font-family:ui-monospace,Menlo,monospace; margin-top:6px;">${getOrderNumber({ id: orderId, ...orderData })}</div>
            `;
        }

        // 案B #183: 現在の状態（read-only）。設計 §C のラベルマッピングに準拠。
        //   お届け済み（窓内）＝arrived / 完了＝fin / 送金待ち=fin扱い / 確認中（保留）＝hold / それ以前＝wait。
        function renderStatusBox() {
            const el = document.getElementById('status-box');
            if (!el || !orderData) return;
            const isCompleted = ['completed', 'delivered'].includes(orderData.status);
            const isRemitted = ['remitted', 'done'].includes(orderData.adminStatus);
            const tradeDone = orderData.prepaid === true
                ? (orderData.tradeCompleted === true || isRemitted)
                : (orderData.paymentStatus === 'paid');
            let cls, icon, title, desc;
            if (isCompleted && orderData.paymentProblemHold === true && !isRemitted) {
                cls = 'hold'; icon = 'pending';
                title = i18next.t('payment.statusHold'); desc = i18next.t('payment.statusHoldDesc');
            } else if (isCompleted && tradeDone) {
                cls = 'fin'; icon = 'check_circle';
                title = i18next.t('payment.statusTradeDone'); desc = i18next.t('payment.statusTradeDoneDesc');
            } else if (isCompleted) {
                cls = 'arrived'; icon = 'check_circle';
                title = i18next.t('payment.statusDelivered'); desc = i18next.t('payment.statusDeliveredDesc');
            } else {
                cls = 'wait'; icon = 'hourglass_top';
                title = i18next.t('payment.statusInProgress'); desc = i18next.t('payment.statusInProgressDesc');
            }
            el.className = `status-box ${cls}`;
            el.innerHTML = `
                <div class="sb-s"><span class="material-symbols-outlined">${icon}</span>${title}</div>
                <div class="sb-d">${desc}</div>`;
        }

        function renderBreakdown() {
            if (!orderData) return;
            const fishTotal = orderData.fishPrice || 0;
            const deliveryFee = orderData.deliveryFee || 0;
            const serviceFee = orderData.serviceFee || 0;
            const campaignDiscount = orderData.campaignDiscount || 0;
            const referralDiscount = orderData.referralDiscountAmount || 0;
            // 合計（カート計算値・全額）＝totalAmount。
            const total = orderData.totalAmount || (fishTotal + deliveryFee + serviceFee - campaignDiscount - referralDiscount);
            // 案B: ウォレット充当・KHQR支払い額（前払い注文のみ）。
            const walletApplied = orderData.prepaid === true ? Number(orderData.walletApplied || 0) : 0;
            const payAmount = orderData.prepaid === true
                ? Number(orderData.khqrAmount ?? (total - walletApplied))
                : total;

            // 2026-07-17 #210③: 桁区切りは必ず 'en-US' を明示する。
            //   ロケール引数なしの toLocaleString() は端末の既定ロケールに従うため、
            //   区切りが「.」になる端末（de-DE/id-ID 等）で「41.000 KHR」のように化ける。
            //   アプリの言語設定とは無関係に化けるので、金額表示は全画面 'en-US' で統一する。
            document.getElementById('total-amount').textContent = `${total.toLocaleString('en-US')} KHR`;

            const displayFishTotal = fishTotal + serviceFee;
            let html = `
                <div class="pay-line"><span class="pay-line__label">${i18next.t('payment.subtotal')}</span><span class="pay-line__value">${displayFishTotal.toLocaleString('en-US')} KHR</span></div>
                <div class="pay-line"><span class="pay-line__label">${i18next.t('order.deliveryFee')}</span><span class="pay-line__value">${deliveryFee.toLocaleString('en-US')} KHR</span></div>
            `;
            // クーポンを使った注文＝🎟クーポン割引／そうでなければ🏷キャンペーン割引（併用不可・どちらか一方）。
            if (referralDiscount > 0) {
                html += `<div class="pay-line promo"><span class="pay-line__label">${i18next.t('order.referralCouponDiscount')}</span><span class="pay-line__value discount">-${referralDiscount.toLocaleString('en-US')} KHR</span></div>`;
                document.getElementById('discount-note').style.display = 'block';
            } else if (campaignDiscount > 0) {
                html += `<div class="pay-line promo"><span class="pay-line__label">${i18next.t('order.campaignDiscount')}</span><span class="pay-line__value discount">-${campaignDiscount.toLocaleString('en-US')} KHR</span></div>`;
                document.getElementById('discount-note').style.display = 'block';
            }
            // 案B: 💰ウォレット利用（前払いで充当があった場合のみ・青）。
            if (walletApplied > 0) {
                html += `<div class="pay-line wallet"><span class="pay-line__label">${i18next.t('payment.walletUse')}</span><span class="pay-line__value">-${walletApplied.toLocaleString('en-US')} KHR</span></div>`;
            }
            // 案B: お支払い額（KHQR）＝合計−ウォレット。前払いのみ表示。
            if (orderData.prepaid === true) {
                html += `<div class="pay-line total-line"><span class="pay-line__label">${i18next.t('payment.payAmount')}</span><span class="pay-line__value">${payAmount.toLocaleString('en-US')} KHR</span></div>`;
            }
            document.getElementById('breakdown').innerHTML = html;

            // ✓ お支払い済み（前払い）チップ＝前払い注文に表示。
            const chip = document.getElementById('paid-chip');
            if (chip) chip.style.display = (orderData.prepaid === true) ? 'inline-flex' : 'none';
        }

        // 言語切替時：data-i18n は applyTranslations 自動更新、innerHTML 部分は手動再描画
        // 6/17 #150 §4/§5: 支払い画面の問題報告窓口。配送完了＋N時間の期限内のみ表示／報告中は「報告済み・対応中」。
        function renderReportSection() {
            const el = document.getElementById('report-section');
            if (!el || !orderData) return;
            const re = computeReportEntry(orderData, 'restaurant', reportHours);
            if (re.phase === 'reported') {
                el.style.display = 'block';
                el.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; gap:6px; box-sizing:border-box; background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; border-radius:14px; padding:12px; font-size:14px; font-weight:700;"><span class="material-symbols-outlined" style="font-size:18px;">flag</span>${i18next.t('report.reportedInProgress')}</div>`;
                return;
            }
            if (!re.show) { el.style.display = 'none'; el.innerHTML = ''; return; }
            const note = (re.phase === 'window')
                ? `<div style="font-size:12px; color:var(--color-text-sub); margin-top:7px; line-height:1.5; text-align:center;">${reportDeadlineText(re.deadlineMs, 'restaurant')}</div>`
                : '';
            el.style.display = 'block';
            el.innerHTML = `
                <a href="/pages/restaurant/report.html?id=${orderId}" style="display:flex; align-items:center; justify-content:center; gap:6px; box-sizing:border-box; background:#fff; color:#b91c1c; border:1px solid #fecaca; border-radius:14px; padding:12px; font-size:14px; font-weight:700; text-decoration:none;"><span class="material-symbols-outlined" style="font-size:18px;">flag</span>${i18next.t('review.reportIssue')}</a>
                ${note}`;
        }

        onLanguageChange(() => {
            renderStatusBox();
            renderOrderInfo();
            renderBreakdown();
            renderReportSection();
            renderDetailActions();
        });

        // 案B #183: 完了時のアクション（同じ魚を再注文＝青・主／レビューを送信＝副）を出し分け。
        //   〔同じ魚を再注文〕→ その魚種の出品一覧（魚から探す相当・snapFishType・常に押せる）。
        function renderDetailActions() {
            const wrap = document.getElementById('detail-actions');
            const reorderBtn = document.getElementById('reorder-btn');
            if (!wrap || !orderData) return;
            const isCompleted = ['completed', 'delivered'].includes(orderData.status);
            const isRemitted = ['remitted', 'done'].includes(orderData.adminStatus);
            const tradeDone = orderData.prepaid === true
                ? (orderData.tradeCompleted === true || isRemitted)
                : (orderData.paymentStatus === 'paid');
            // 完了＝再注文＋レビュー導線を出す。それ以前（お届け済み窓内など）＝報告導線のみ（report-section）。
            if (isCompleted && tradeDone) {
                wrap.style.display = 'block';
                const ft = orderData.snapFishType || '';
                reorderBtn.href = ft
                    ? `/pages/restaurant/fish-list.html?fishType=${encodeURIComponent(ft)}`
                    : '/pages/restaurant/fish-list.html';
            } else {
                wrap.style.display = 'none';
            }
            refreshReviewArea();
        }
    </script>
</body>
</html>
