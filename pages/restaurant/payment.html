<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .payment-page { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

        .pay-head {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin: 4px 0 12px;
        }

        .pay-card {
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .pay-total-label {
            font-size: 13px;
            color: var(--color-text-sub);
            margin-bottom: 4px;
        }

        /* 6/5 #129: 金額（合計）＝青 */
        .pay-total {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-cta);
            line-height: 1.1;
        }

        /* 6/5 #129: 割引の注記は amber に統一 */
        .pay-total-note {
            font-size: 12px;
            color: #b36a00;
            margin-top: 4px;
        }

        /* 6/5 #129: 金額をコピー（口座QRは金額手入力のため誤入力防止） */
        .copy-amount-btn {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-cta);
            border: 1px solid var(--color-cta-lt);
            background: var(--color-cta-lt);
            border-radius: 10px;
            padding: 7px 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .copy-amount-btn .material-symbols-outlined { font-size: 18px; }

        .pay-breakdown {
            border-top: 1px solid var(--color-border);
            margin-top: 14px;
            padding-top: 12px;
        }

        .pay-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            color: var(--color-text);
        }

        .pay-line__label { color: var(--color-text-sub); }
        /* 6/5 #129: キャンペーン割引＝amber */
        .pay-line__value.discount { color: #b36a00; }

        .qr-section {
            text-align: center;
            padding: 18px 16px;
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            margin: 0 16px 14px;
        }

        .qr-section__title {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 10px;
        }

        .qr-wrap {
            display: inline-block;
            padding: 10px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #e5e7eb;
            cursor: pointer;
        }

        .qr-wrap img {
            width: 240px;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .qr-hint {
            font-size: 12px;
            color: var(--color-text-sub);
            margin-top: 10px;
            line-height: 1.5;
        }

        .qr-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .qr-action-btn {
            flex: 1;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            border-radius: 14px;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text);
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .qr-action-btn .material-symbols-outlined { font-size: 18px; }
        .qr-action-btn:hover { background: #f5f5f5; }

        .pay-link {
            display: block;
            word-break: break-all;
            font-size: 12px;
            color: #0284c7;
            text-decoration: none;
            margin-top: 8px;
        }

        .payment-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 480px;
            margin: 0 auto;
            padding: 12px 16px;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
        }

        /* 6/5 #129: 確認ボタン 紫 → 青（CTA） */
        .payment-footer button {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: var(--color-cta);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
        }

        .payment-footer button.paid {
            background: #16a34a;
        }

        .payment-footer button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 6/5 #129: レビューは支払い前は出さない旨の注記 */
        .review-hint-note {
            font-size: 11px;
            color: var(--color-text-sub);
            text-align: center;
            margin-top: 8px;
        }

        /* 6/5 #129: 自前モーダル（ブラウザ標準ダイアログを置換）／6/18 #155 ⑯: ボトムシート化 */
        .pay-modal-overlay {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(0,0,0,0.42);
            display: none; align-items: flex-end; justify-content: center;
            padding: 0;
        }
        .pay-modal-overlay.show { display: flex; }
        .pay-modal {
            width: 100%; max-width: 480px;
            background: var(--color-surface);
            border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }
        .pay-modal__title { font-size: 17px; font-weight: 800; color: var(--color-text); }
        .pay-modal__body { font-size: 13px; color: var(--color-text-sub); margin: 10px 0 16px; line-height: 1.6; }
        .pay-modal__actions { display: flex; gap: 10px; }
        .pay-modal__btn { flex: 1; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 800; border: none; cursor: pointer; font-family: inherit; }
        .pay-modal__btn.cancel { background: #eceef0; color: var(--color-text-sub); }
        .pay-modal__btn.ok { background: var(--color-cta); color: #fff; }

        .paid-banner {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            border-radius: 14px;
            padding: 10px 12px;
            margin: 0 16px 14px;
            font-size: 13px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="payment-page">
        <div class="page-header" style="align-items:center; padding:16px;">
            <a href="/pages/restaurant/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub);"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/orders.html" class="page-header__title" style="text-decoration:none; color:inherit; flex:1;" data-i18n="payment.title"></a>
            <select id="lang-selector" style="width:auto; flex:0 0 auto; font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
        </div>

        <div id="paid-banner" class="paid-banner" style="display:none;" data-i18n="payment.paidBanner"></div>

        <!-- 支払期限バナー（status=completed 未払いのときのみ） -->
        <div id="payment-deadline-banner" style="display:none; margin:0 16px 12px; padding:12px 14px; border-radius:14px; background:#fff7ed; border:1px solid #fdba74; color:#9a3412;">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-symbols-outlined" style="font-size:20px; flex-shrink:0;">schedule</span>
                <div>
                    <div id="deadline-line" style="font-size:14px; font-weight:700;"></div>
                    <div style="font-size:12px; margin-top:2px;" data-i18n="payment.payAfterReceipt"></div>
                </div>
            </div>
        </div>

        <!-- 注文概要 -->
        <div class="pay-card" id="order-info"></div>

        <!-- 金額内訳 -->
        <div class="pay-card">
            <div class="pay-total-label" data-i18n="payment.total"></div>
            <div class="pay-total" id="total-amount">0 KHR</div>
            <div class="pay-total-note" id="discount-note" style="display:none;" data-i18n="payment.discountApplied"></div>
            <button type="button" class="copy-amount-btn" id="copy-amount-btn">
                <span class="material-symbols-outlined">content_copy</span>
                <span data-i18n="payment.copyAmount"></span>
            </button>
            <div class="pay-breakdown" id="breakdown"></div>
        </div>

        <!-- QRコード -->
        <div class="qr-section">
            <div class="qr-section__title" data-i18n="payment.qrTitle"></div>
            <a id="qr-link" href="https://link.payway.com.kh/ABAPAYsh433547o" target="_blank" rel="noopener" class="qr-wrap">
                <img id="qr-img" src="/images/fishlink-qr.png" alt="FishLink QR">
            </a>
            <div class="qr-hint" data-i18n="payment.qrHint"></div>
            <div class="qr-actions">
                <a class="qr-action-btn" href="https://link.payway.com.kh/ABAPAYsh433547o" target="_blank" rel="noopener">
                    <span class="material-symbols-outlined">open_in_new</span>
                    <span data-i18n="payment.openLink"></span>
                </a>
                <a class="qr-action-btn" id="download-btn" href="/images/fishlink-qr.png" download="fishlink-qr.png">
                    <span class="material-symbols-outlined">download</span>
                    <span data-i18n="payment.saveQr"></span>
                </a>
            </div>
        </div>

        <!-- 6/17 #150 §4/§5: 問題を報告（配送完了＋N時間の期限内のみ表示・報告中は「報告済み・対応中」） -->
        <div id="report-section" style="display:none; margin:0 16px 16px;"></div>
    </div>

    <div class="payment-footer">
        <button id="paid-btn" data-i18n="payment.confirmPaid"></button>
        <!-- 6/5 #129: レビューは支払い前は出さない。「支払い完了」押下後（=paid 以降）のみ表示。色は青(CTA) -->
        <a id="review-btn" href="#" style="display:none; margin-top:8px; padding:12px; background:#fff; color:var(--color-cta); border:1.5px solid var(--color-cta); border-radius:12px; font-weight:700; text-decoration:none; font-size:14px; align-items:center; justify-content:center; gap:6px; line-height:1;">
            <span class="material-symbols-outlined" style="font-size:18px; line-height:1;">star</span>
            <span data-i18n="review.submit" style="line-height:1;"></span>
        </a>
        <div id="reviewed-label" style="display:none; margin-top:8px; padding:12px; background:#f3f4f6; color:#6b7280; border-radius:12px; font-weight:700; font-size:14px; text-align:center; line-height:1;" data-i18n="review.reviewed"></div>
        <div id="review-hint-note" class="review-hint-note" data-i18n="payment.reviewAfterPay"></div>
    </div>

    <!-- 6/5 #129: 自前モーダル（支払い完了の確認） -->
    <div class="pay-modal-overlay" id="pay-modal-overlay">
        <div class="pay-modal">
            <div class="pay-modal__title" data-i18n="payment.confirmModalTitle"></div>
            <div class="pay-modal__body" data-i18n="payment.confirmModalBody"></div>
            <div class="pay-modal__actions">
                <button class="pay-modal__btn cancel" id="modal-cancel" data-i18n="payment.modalCancel"></button>
                <button class="pay-modal__btn ok" id="modal-ok" data-i18n="payment.confirmModalOk"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { formatProvince, formatDistrict } from '/js/province-utils.js';
        // 6/5 #129: FL番号表示
        import { getOrderNumber } from '/js/order-utils.js';
        import {
            doc, getDoc, updateDoc, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/17 #150: 問題報告の入口出し分け（配送完了＋N時間／1注文1オープン）
        import { getReportWindowHours, computeReportEntry, reportDeadlineText } from '/js/report-window.js';

        let reportHours = 4;
        // #155 ②: 納品日に曜日（注文状況 orders.html と同じヘルパーを踏襲）
        const WEEKDAY_SHORT = {
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'],
        };
        function fmtDeliveryDate(iso) {
            const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return iso || '';
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];
            return `${Number(m[2])}/${Number(m[3])}（${wd}）`;
        }
        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const params = new URLSearchParams(location.search);
        const orderId = params.get('id');
        if (!orderId) location.href = '/pages/restaurant/orders.html';

        let orderData = null;
        let myUid = null;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // 5/4: 言語切替で再描画できるよう状態を保持
        let pageState = { fishTypeKey: '', size: '', farmerName: '', place: '' };

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`restaurant_payment:${orderId}`);
            if (cached) {
                if (cached.orderInfoHtml) document.getElementById('order-info').innerHTML = cached.orderInfoHtml;
                if (cached.breakdownHtml) document.getElementById('breakdown').innerHTML = cached.breakdownHtml;
                if (cached.totalAmount) document.getElementById('total-amount').textContent = cached.totalAmount;
                if (cached.deadlineHtml) {
                    const b = document.getElementById('payment-deadline-banner');
                    if (b) { b.style.display = ''; document.getElementById('deadline-line').textContent = cached.deadlineHtml; }
                }
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { console.warn('cached restaurant_payment render failed:', e); }

        function saveCurrentPaymentRender() {
            try {
                saveRenderState(`restaurant_payment:${orderId}`, {
                    orderInfoHtml: document.getElementById('order-info')?.innerHTML || '',
                    breakdownHtml: document.getElementById('breakdown')?.innerHTML || '',
                    totalAmount: document.getElementById('total-amount')?.textContent || '',
                    deadlineHtml: document.getElementById('deadline-line')?.textContent || '',
                });
            } catch (e) { /* ignore */ }
        }

        waitForUserData(async () => {
            if (!cachedRendered) loading.classList.add('show');
            myUid = window.currentUser.uid;

            const orderSnap = await getDoc(doc(db, 'orders', orderId));
            if (!orderSnap.exists()) { location.href = '/pages/restaurant/orders.html'; return; }
            orderData = orderSnap.data();

            // 注文者でない場合は戻す
            if (orderData.restaurantId !== myUid) { location.href = '/pages/restaurant/orders.html'; return; }

            // listing情報（注文時点のスナップショット優先）
            let fishTypeKey = orderData.snapFishType;
            let size = orderData.snapSize || '';
            if ((!fishTypeKey || !size) && orderData.listingId) {
                const lSnap = await getDoc(doc(db, 'fishListings', orderData.listingId));
                const lt = lSnap.data() || {};
                if (!fishTypeKey) fishTypeKey = lt.fishType;
                if (!size) size = lt.size || '';
            }

            // 農家情報
            const farmerSnap = await getDoc(doc(db, 'users', orderData.farmerId));
            const farmer = farmerSnap.data() || {};
            pageState = {
                fishTypeKey: fishTypeKey || '',
                size,
                farmerName: farmer.displayName || '',
                place: (() => {
                    const p = formatProvince(farmer.province || '');
                    const d = formatDistrict(farmer);
                    return p + (d ? ', ' + d : '');
                })(),
            };

            // 6/17 #150: 報告受付時間を先読みしてから報告窓口を描画
            reportHours = await getReportWindowHours();
            renderDeadlineBanner();
            renderOrderInfo();
            renderBreakdown();
            renderReportSection();
            saveCurrentPaymentRender();   // 5/25 #91/#92 拡張: fresh 描画後に最新状態をキャッシュ

            // 支払い済みの場合
            updatePaidState(orderData.paymentStatus);

            // 5/7 #55: レビュー済みかリアルタイム監視（送信されたら即時切り替え）
            onSnapshot(doc(db, 'orders', orderId, 'reviews', 'restaurant'), (snap) => {
                applyReviewedState(snap.exists());
            });

            loading.classList.remove('show'); document.body.classList.add('app-ready');
        });

        // 6/5 #129: レビュー解禁は「支払いの合図の後」のみ（支払い完了押下=paid 以降）
        function isPaidOrBeyond() {
            if (!orderData) return false;
            return orderData.paymentStatus === 'paid'
                || ['payment_confirmed', 'remitted', 'done'].includes(orderData.adminStatus);
        }

        // 5/7 #55: レビュー済みなら詳細画面のレビューボタンを「レビュー済み」表示に
        let alreadyReviewed = false;
        function applyReviewedState(reviewed) {
            alreadyReviewed = reviewed;
            refreshReviewArea();
        }

        // 6/5 #129: レビュー導線の表示制御を一元化
        //   支払い前 → レビュー導線は出さず注記のみ／支払い後・未レビュー → レビューを送信／レビュー済み → ラベル
        function refreshReviewArea() {
            const reviewBtn = document.getElementById('review-btn');
            const reviewedLabel = document.getElementById('reviewed-label');
            const hint = document.getElementById('review-hint-note');
            reviewBtn.href = `/pages/restaurant/review.html?id=${orderId}`;
            const unlocked = isPaidOrBeyond();
            if (!unlocked) {
                reviewBtn.style.display = 'none';
                reviewedLabel.style.display = 'none';
                hint.style.display = 'block';
                return;
            }
            hint.style.display = 'none';
            if (alreadyReviewed) {
                reviewBtn.style.display = 'none';
                reviewedLabel.style.display = 'block';
            } else {
                reviewedLabel.style.display = 'none';
                reviewBtn.style.display = 'flex';
            }
        }

        // 5/4: innerHTML 部分を関数化し、言語切替時に再描画できるように
        function renderDeadlineBanner() {
            if (!orderData) return;
            const isCompletedUnpaid = (orderData.status === 'completed' || orderData.status === 'delivered')
                && orderData.paymentStatus !== 'paid';
            const deadlineMs = orderData.paymentDeadline?.toMillis?.() || null;
            if (isCompletedUnpaid && deadlineMs) {
                const banner = document.getElementById('payment-deadline-banner');
                const line = document.getElementById('deadline-line');
                const d = new Date(deadlineMs);
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                const isOverdue = Date.now() > deadlineMs;
                if (isOverdue) {
                    banner.style.background = '#fef2f2';
                    banner.style.borderColor = '#f87171';
                    banner.style.color = '#991b1b';
                    line.textContent = i18next.t('payment.deadlinePassed');
                } else {
                    line.textContent = i18next.t('payment.deadlineBy', { time: `${hh}:${mm}` });
                }
                banner.style.display = 'block';
            }
        }

        function renderOrderInfo() {
            if (!orderData) return;
            const { fishTypeKey, size, farmerName, place } = pageState;
            const fishName = fishTypeKey
                ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey)
                : '';

            // 5/5 #4: 注文状況画面と同じ粒度で情報表示。複数アイテムは各行を明細表示。
            const items = Array.isArray(orderData.items) ? orderData.items : null;
            const isMulti = items && items.length > 1;
            let itemsHtml;
            if (isMulti) {
                itemsHtml = items.map(it => {
                    const itType = it.snapFishType || '';
                    const itName = itType
                        ? (i18next.exists(`fish.${itType}`) ? i18next.t(`fish.${itType}`) : itType).trim()
                        : '';
                    const sizePart = it.snapSize ? `（${it.snapSize} head/kg）` : '';
                    const gutLabel = it.gutProcessing
                        ? `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutYes')}`
                        : `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutNo')}`;
                    return `<div style="font-size:14px; color:var(--color-text); padding:2px 0;">・${itName}${sizePart} ${it.quantity}kg・${gutLabel}</div>`;
                }).join('');
            } else {
                const gutLabel = orderData.gutProcessing
                    ? `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutYes')}`
                    : `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutNo')}`;
                itemsHtml = `
                    <div style="font-size:16px; font-weight:700; color:var(--color-text);">${fishName}${size ? `（${size} head/kg）` : ''}</div>
                    <div style="font-size:14px; color:var(--color-text); margin-top:4px;">${orderData.quantity} kg・${gutLabel}</div>
                `;
            }

            // 5/5 #4: 支払いステータス（payment + admin の状態を統合表示）
            const payStatusInfo = computePaymentStatusInfo();

            document.getElementById('order-info').innerHTML = `
                <div style="font-size:14px; color:var(--color-text-sub); margin-bottom:6px;">${i18next.t('orders.deliveryDate')} ${fmtDeliveryDate(orderData.deliveryDateIso || orderData.deliveryDate)} ${orderData.deliveryTime || ''}</div>
                <div style="font-size:13px; color:var(--color-text-sub); margin-bottom:8px;">
                    <span class="material-symbols-outlined" style="font-size:14px;">storefront</span>
                    ${i18next.t('payment.partnerLabel')}: ${farmerName}${place ? ` · ${place}` : ''}
                </div>
                ${itemsHtml}
                <div style="font-size:11px; color:#9aa3b0; font-family:ui-monospace,Menlo,monospace; margin-top:6px;">${getOrderNumber({ id: orderId, ...orderData })}</div>
                <div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--color-border); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:13px; color:var(--color-text-sub);">${i18next.t('payment.statusLabel')}</span>
                    <span style="font-size:13px; font-weight:700; padding:3px 10px; border-radius:10px; background:${payStatusInfo.bg}; color:${payStatusInfo.color};">${payStatusInfo.text}</span>
                </div>
            `;
        }

        // 5/5 #4: payment + admin の状態を統合した支払いステータスラベル
        function computePaymentStatusInfo() {
            const adminStatus = orderData.adminStatus;
            const paymentStatus = orderData.paymentStatus;
            if (adminStatus === 'done') {
                return { text: i18next.t('payment.statusDone'), bg: '#0f172a', color: '#fff' };
            }
            if (adminStatus === 'remitted') {
                return { text: i18next.t('payment.statusRemitted'), bg: '#ccfbf1', color: '#115e59' };
            }
            if (adminStatus === 'payment_confirmed') {
                return { text: i18next.t('payment.statusConfirmed'), bg: '#dcfce7', color: '#166534' };
            }
            if (paymentStatus === 'paid') {
                return { text: i18next.t('payment.statusPaidByRestaurant'), bg: '#ecfdf5', color: '#047857' };
            }
            return { text: i18next.t('payment.statusWaitingPayment'), bg: '#fef3c7', color: '#92400e' };
        }

        function renderBreakdown() {
            if (!orderData) return;
            const fishTotal = orderData.fishPrice || 0;
            const deliveryFee = orderData.deliveryFee || 0;
            const serviceFee = orderData.serviceFee || 0;
            const campaignDiscount = orderData.campaignDiscount || 0;
            const referralDiscount = orderData.referralDiscountAmount || 0;
            const total = orderData.totalAmount || (fishTotal + deliveryFee + serviceFee - campaignDiscount - referralDiscount);

            document.getElementById('total-amount').textContent = `${total.toLocaleString()} KHR`;

            const displayFishTotal = fishTotal + serviceFee;
            let html = `
                <div class="pay-line"><span class="pay-line__label">${i18next.t('payment.subtotal')}</span><span class="pay-line__value">${displayFishTotal.toLocaleString()} KHR</span></div>
                <div class="pay-line"><span class="pay-line__label">${i18next.t('order.deliveryFee')}</span><span class="pay-line__value">${deliveryFee.toLocaleString()} KHR</span></div>
            `;
            if (campaignDiscount > 0) {
                html += `<div class="pay-line"><span class="pay-line__label">${i18next.t('order.campaignDiscount')}</span><span class="pay-line__value discount">-${campaignDiscount.toLocaleString()} KHR</span></div>`;
                document.getElementById('discount-note').style.display = 'block';
            }
            // 5/27 #101 ③: 紹介クーポン割引行を追加（cart で適用済みのみ表示）
            if (referralDiscount > 0) {
                html += `<div class="pay-line"><span class="pay-line__label">${i18next.t('order.referralCouponDiscount')}</span><span class="pay-line__value discount">-${referralDiscount.toLocaleString()} KHR</span></div>`;
            }
            document.getElementById('breakdown').innerHTML = html;
        }

        // 言語切替時：data-i18n は applyTranslations 自動更新、innerHTML 部分は手動再描画
        // 6/17 #150 §4/§5: 支払い画面の問題報告窓口。配送完了＋N時間の期限内のみ表示／報告中は「報告済み・対応中」。
        function renderReportSection() {
            const el = document.getElementById('report-section');
            if (!el || !orderData) return;
            const re = computeReportEntry(orderData, 'restaurant', reportHours);
            if (re.phase === 'reported') {
                el.style.display = 'block';
                el.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; gap:6px; box-sizing:border-box; background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; border-radius:14px; padding:12px; font-size:14px; font-weight:700;"><span class="material-symbols-outlined" style="font-size:18px;">flag</span>${i18next.t('report.reportedInProgress')}</div>`;
                return;
            }
            if (!re.show) { el.style.display = 'none'; el.innerHTML = ''; return; }
            const note = (re.phase === 'window')
                ? `<div style="font-size:12px; color:var(--color-text-sub); margin-top:7px; line-height:1.5; text-align:center;">${reportDeadlineText(re.deadlineMs, 'restaurant')}</div>`
                : '';
            el.style.display = 'block';
            el.innerHTML = `
                <a href="/pages/restaurant/report.html?id=${orderId}" style="display:flex; align-items:center; justify-content:center; gap:6px; box-sizing:border-box; background:#fff; color:#b91c1c; border:1px solid #fecaca; border-radius:14px; padding:12px; font-size:14px; font-weight:700; text-decoration:none;"><span class="material-symbols-outlined" style="font-size:18px;">flag</span>${i18next.t('review.reportIssue')}</a>
                ${note}`;
        }

        onLanguageChange(() => {
            renderDeadlineBanner();
            renderOrderInfo();
            renderBreakdown();
            renderReportSection();
            if (orderData) updatePaidState(orderData.paymentStatus);
        });

        function updatePaidState(paymentStatus) {
            const btn = document.getElementById('paid-btn');
            const banner = document.getElementById('paid-banner');
            if (paymentStatus === 'paid') {
                banner.style.display = 'block';
                btn.classList.add('paid');
                btn.textContent = i18next.t('payment.alreadyPaid');
                btn.disabled = true;
            }
            // 6/5 #129: レビュー導線は支払い後のみ（refreshReviewArea で制御）
            refreshReviewArea();
        }

        // 6/5 #129: 金額をコピー（口座QRは金額手入力＝誤入力防止）。数字のみコピー
        document.getElementById('copy-amount-btn').addEventListener('click', async () => {
            const total = orderData?.totalAmount
                || ((orderData?.fishPrice || 0) + (orderData?.deliveryFee || 0) + (orderData?.serviceFee || 0)
                    - (orderData?.campaignDiscount || 0) - (orderData?.referralDiscountAmount || 0));
            const btn = document.getElementById('copy-amount-btn');
            const label = btn.querySelector('span[data-i18n]');
            try {
                await navigator.clipboard.writeText(String(total));
                if (label) { label.textContent = i18next.t('payment.copied'); setTimeout(() => { label.textContent = i18next.t('payment.copyAmount'); }, 1500); }
            } catch (e) { console.warn('clipboard failed:', e); }
        });

        // 6/5 #129: 支払い完了は自前モーダルで確認（ブラウザ標準ダイアログを置換）
        const modalOverlay = document.getElementById('pay-modal-overlay');
        function openPayModal() { modalOverlay.classList.add('show'); }
        function closePayModal() { modalOverlay.classList.remove('show'); }
        document.getElementById('modal-cancel').addEventListener('click', closePayModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closePayModal(); });

        document.getElementById('paid-btn').addEventListener('click', () => {
            const btn = document.getElementById('paid-btn');
            if (btn.disabled) return;
            openPayModal();
        });

        document.getElementById('modal-ok').addEventListener('click', async () => {
            const btn = document.getElementById('paid-btn');
            closePayModal();
            btn.disabled = true;
            loading.classList.add('show');
            try {
                await updateDoc(doc(db, 'orders', orderId), { paymentStatus: 'paid' });
                if (orderData) orderData.paymentStatus = 'paid';
                updatePaidState('paid');
            } catch (err) {
                console.error(err);
                alert(i18next.t('payment.errorSubmit'));
                btn.disabled = false;
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });
    </script>
</body>
</html>
