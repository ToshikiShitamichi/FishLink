<body>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, orderBy, limit, getDocs, doc, getDoc, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { subscribeCart } from '/js/cart.js';
        // 5/12 #69 追補：同一タブ内で users/{uid} を再利用してリクエスト数を削減
        import { getCachedUser, getCachedDoc } from '/js/data-cache.js';
        // 5/23 #79: 農家ブロックのアバター解決
        import { getReviewerAvatarUrl } from '/js/profile-utils.js';
        // 5/23 #69 改善: メモリ画像キャッシュ（フラッシュ解消）
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の sessionStorage キャッシュ（stale-while-revalidate）
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 5/25 #85: 道路距離キャッシュ（fish-list.html / order.html / cart.html と共有 → 全画面で距離値統一）
        import { getCachedDistance, setCachedDistance } from '/js/distance-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        // 5/12 #74: 魚種カテゴリは CAA 参考価格の 10 種を流用（CLAUDE.md 参照）
        const FISH_CATEGORIES = [
            'striped_snakehead', 'walking_catfish', 'red_tilapia', 'nile_tilapia',
            'silver_barb', 'spot_pangasius', 'pangasius', 'giant_snakehead',
            'climbing_perch', 'frog',
        ];

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 5/25 #85: 距離計算（道路距離を fish-list / order / cart と統一）
        // - 表示用: getCachedDistance（90日キャッシュ）→ なければ calcRoadDistances（Distance Matrix 一括）
        // - haversine はキャッシュ未ヒット+API失敗時のフォールバックのみ
        function haversine(a, b) {
            if (!a || !b) return Infinity;
            const R = 6371;
            const dLat = (b.lat - a.lat) * Math.PI / 180;
            const dLng = (b.lng - a.lng) * Math.PI / 180;
            const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
        }

        // 起点1つ＋終点複数で Distance Matrix を一括叩く（fish-list.html と同型）
        // 戻り値: [{ km, ok }] の配列。ok=true なら道路距離成功（キャッシュ対象）。
        async function calcRoadDistances(originLat, originLng, destinations) {
            return new Promise((resolve) => {
                if (typeof google === 'undefined' || !google.maps) {
                    resolve(destinations.map(d => ({ km: haversine({lat:originLat,lng:originLng}, {lat:d.lat,lng:d.lng}), ok: false })));
                    return;
                }
                const service = new google.maps.DistanceMatrixService();
                const origin = new google.maps.LatLng(originLat, originLng);
                const dests = destinations.map(d => new google.maps.LatLng(d.lat, d.lng));
                service.getDistanceMatrix({
                    origins: [origin],
                    destinations: dests,
                    travelMode: google.maps.TravelMode.DRIVING,
                    unitSystem: google.maps.UnitSystem.METRIC,
                }, (response, status) => {
                    if (status !== 'OK' || !response.rows[0]) {
                        resolve(destinations.map(d => ({ km: haversine({lat:originLat,lng:originLng}, {lat:d.lat,lng:d.lng}), ok: false })));
                        return;
                    }
                    const results = response.rows[0].elements.map((el, idx) => {
                        if (el.status === 'OK') return { km: el.distance.value / 1000, ok: true };
                        const dest = destinations[idx];
                        return { km: haversine({lat:originLat,lng:originLng}, {lat:dest.lat,lng:dest.lng}), ok: false };
                    });
                    resolve(results);
                });
            });
        }

        // Google Maps API のロード待ち（dashboard では Distance Matrix 初回呼び出し前に呼ぶ）
        function waitForGoogleMaps(cb) {
            if (typeof google !== 'undefined' && google.maps) { cb(); }
            else { setTimeout(() => waitForGoogleMaps(cb), 200); }
        }

        // farmerId → 道路距離(km) の Map を構築。
        // - localStorage キャッシュにあれば即時返す
        // - なければ Distance Matrix で一括取得（25件ずつチャンク）し、成功分のみキャッシュ
        async function buildFarmerDistanceMap(uid, myLoc, farmerMap) {
            const distMap = new Map();
            if (!myLoc) return distMap;
            const farmerLocs = [];
            for (const [fid, f] of farmerMap) {
                if (!f?.location) continue;
                const loc = f.location;
                const locs = { rLat: myLoc.lat, rLng: myLoc.lng, fLat: loc.lat, fLng: loc.lng };
                const cached = getCachedDistance(uid, fid, locs);
                if (cached !== null) {
                    distMap.set(fid, cached);
                } else {
                    farmerLocs.push({ fid, loc, locs });
                }
            }
            if (farmerLocs.length === 0) return distMap;

            // Google Maps API 待ち（async defer 読み込みなので Distance Matrix 利用時のみ待つ）
            await new Promise((resolve) => waitForGoogleMaps(resolve));

            // Distance Matrix は1リクエストあたり最大25 destinations。25件ずつチャンクして並列実行。
            const CHUNK = 25;
            const chunks = [];
            for (let i = 0; i < farmerLocs.length; i += CHUNK) {
                chunks.push(farmerLocs.slice(i, i + CHUNK));
            }
            await Promise.all(chunks.map(async (chunk) => {
                try {
                    const dests = chunk.map(c => c.loc);
                    const results = await calcRoadDistances(myLoc.lat, myLoc.lng, dests);
                    chunk.forEach((c, j) => {
                        const r = results[j];
                        distMap.set(c.fid, r.km);
                        if (r.ok) setCachedDistance(uid, c.fid, r.km, c.locs);
                    });
                } catch (e) {
                    // チャンク失敗時は haversine フォールバック
                    chunk.forEach(c => {
                        distMap.set(c.fid, haversine(myLoc, c.loc));
                    });
                }
            }));
            return distMap;
        }

        // 魚種カテゴリ描画
        // 5/23 #76: クライアント提供の魚種画像（images/{fishType}.png）に差し替え。
        // 画像自体が円形背景を持つため、CSS 側の背景円は撤去済み。
        function renderCategories() {
            const row = document.getElementById('category-row');
            row.innerHTML = FISH_CATEGORIES.map(key => {
                const label = i18next.exists(`fish.${key}`) ? i18next.t(`fish.${key}`) : key;
                return `
                    <a class="category-item" href="/pages/restaurant/fish-list.html?fishType=${encodeURIComponent(key)}">
                        <div class="category-item__icon">
                            <img src="/images/${encodeURIComponent(key)}.png" alt="" loading="lazy">
                        </div>
                        <div class="category-item__label">${escapeHtml(label)}</div>
                    </a>
                `;
            }).join('');
        }

        // 共通カード描画
        // 5/23 #79: 農家表示部分を fish-list.html と同型のブロック（アバター丸 + 名前 + ⭐%（件）） に変更。
        // カード全体は横スクロール棚向けの 168px 縦長レイアウトを維持。
        // 5/23 Phase I: isPriority=true なら fetchpriority="high" + loading="eager" で LCP 候補をブースト
        // 5/25 #85: distanceKm は道路距離（buildFarmerDistanceMap 経由・キャッシュ優先）
        function renderCard(listing, farmer, distanceKm, serviceRate, isPriority = false) {
            const fishType = listing.fishType || '';
            const fishName = i18next.exists(`fish.${fishType}`) ? i18next.t(`fish.${fishType}`) : fishType;
            const unitPrice = Math.round(((listing.price || 0) + (listing.gutPrice || 0)) * (1 + serviceRate));
            const photo = listing.photoUrl || (listing.photos?.[0]);
            const stock = Number(listing.stock || 0);
            const farmerName = farmer?.displayName || '';
            const rating = Number(farmer?.avgRating || 0);
            const reviewCount = Number(farmer?.reviewCount || 0);
            const farmerAvatarUrl = farmer ? getReviewerAvatarUrl(farmer) : null;
            // 5/27 #96: GAqP 認証バッジ
            const farmerGaqp = farmer?.gaqpCertified === true;
            const distText = Number.isFinite(distanceKm) ? `${distanceKm.toFixed(1)} km` : '';
            const imgAttrs = asCachedImgAttrs(photo, isPriority ? { priority: 'high' } : {});
            const loadAttr = isPriority ? '' : 'loading="lazy"';

            return `
                <a class="home-card" href="/pages/restaurant/order.html?id=${listing.id}">
                    <div class="home-card__top">
                        <div class="home-card__img">
                            ${photo
                                ? `<img ${imgAttrs} alt="${escapeHtml(fishName)}" ${loadAttr}>`
                                : `<span class="material-symbols-outlined" style="font-size:36px; color:#94a3b8;">set_meal</span>`
                            }
                        </div>
                        <div class="home-card__body">
                            <div class="home-card__name">${escapeHtml(fishName)}</div>
                            <div class="home-card__size">${listing.size || ''} head/kg</div>
                            <div class="home-card__price">${unitPrice.toLocaleString()}<span class="home-card__price-unit">KHR/kg</span></div>
                            <div class="home-card__stock ${stock <= 0 ? 'home-card__stock--out' : ''}">
                                ${stock > 0 ? i18next.t('restaurant.stock', { kg: stock }) : i18next.t('order.stockUnavailable')}
                            </div>
                            ${distText ? `
                                <div class="home-card__place">
                                    <span class="material-symbols-outlined">location_on</span>
                                    <span>${escapeHtml(distText)}</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    ${farmerName ? `
                        <div class="home-card__farmer-block" data-act="view-farmer" data-farmer-id="${listing.farmerId}" role="button" tabindex="0">
                            <div class="home-card__farmer-avatar">
                                ${farmerAvatarUrl
                                    ? `<img ${asCachedImgAttrs(farmerAvatarUrl)} alt="" loading="lazy">`
                                    : `<span class="material-symbols-outlined">person</span>`}
                            </div>
                            <div class="home-card__farmer-info">
                                <div class="home-card__farmer-name">${escapeHtml(farmerName)}${farmerGaqp ? ` <span style="display:inline-flex; align-items:center; gap:2px; padding:1px 6px; background:#0d6e4c; color:#fff; border-radius:8px; font-size:9px; font-weight:700; vertical-align:middle;"><span class="material-symbols-outlined" style="font-size:11px;">verified</span>${i18next.t('gaqp.badge')}</span>` : ''}</div>
                                <div class="home-card__farmer-rating">
                                    <span class="material-symbols-outlined">star</span>
                                    ${Math.round(rating)}%（${reviewCount}）
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </a>
            `;
        }

        // 5/25 #85: distanceMap（farmerId → 道路距離km）を渡す形に変更。
        // 旧来の haversine 直接呼びは廃止。distanceMap 未指定/未ヒット時は Infinity 表示。
        function renderShelf(elId, listings, farmerMap, distanceMap, serviceRate, emptyMsg) {
            const row = document.getElementById(elId);
            if (!listings || listings.length === 0) {
                row.innerHTML = `<div class="shelf__empty" style="margin:0; flex:1;">${emptyMsg}</div>`;
                return;
            }
            // 5/23 Phase I: 最上段棚（shelf-newest）の最初の 1 枚のみ LCP 候補として優先ロード
            const isPriorityShelf = (elId === 'shelf-newest');
            row.innerHTML = listings.map((l, idx) => {
                const farmer = farmerMap.get(l.farmerId) || null;
                const dist = distanceMap?.get(l.farmerId);
                const isPriority = isPriorityShelf && idx === 0;
                return renderCard(l, farmer, Number.isFinite(dist) ? dist : Infinity, serviceRate, isPriority);
            }).join('');
        }

        function setSkeletons(elIds) {
            for (const id of elIds) {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<div class="shelf__skeleton"></div><div class="shelf__skeleton"></div><div class="shelf__skeleton"></div>';
            }
        }

        // データ取得
        // 5/23 #69 Phase J: skipSkeleton=true で skeleton 描画をスキップ。
        //   render-cache から既に内容が描画されている場合に呼ぶことで、フラッシュを防ぐ。
        async function loadShelves({ skipSkeleton = false } = {}) {
            const shelfIds = ['shelf-nearest', 'shelf-rated', 'shelf-newest', 'shelf-cheapest', 'shelf-history'];
            if (!skipSkeleton) setSkeletons(shelfIds);

            const uid = window.currentUser?.uid;
            const myLoc = window.currentUserData?.location || null;

            // サービス料率
            let serviceRate = 0.05;
            try {
                const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                if (campSnap.exists()) serviceRate = campSnap.data().serviceRate ?? 0.05;
            } catch (e) { /* ignore */ }

            // 一度に最新の出品を多めに取得（クライアント側で各棚に振り分け）
            const baseQ = query(
                collection(db, 'fishListings'),
                where('isActive', '==', true),
                orderBy('createdAt', 'desc'),
                limit(60)
            );
            const snap = await getDocs(baseQ);
            const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // 農家データ一括取得（5/12 #69：data-cache 経由でセッション内重複を抑止）
            const farmerIds = [...new Set(listings.map(l => l.farmerId).filter(Boolean))];
            const farmerMap = new Map();
            await Promise.all(farmerIds.map(async (fid) => {
                try {
                    const data = await getCachedUser(fid);
                    if (data) farmerMap.set(fid, data);
                } catch (e) { /* ignore */ }
            }));

            // 5/25 #85: 道路距離マップを構築（キャッシュ優先、なければ Distance Matrix 一括）
            //   全画面で同じ距離値を表示するため。
            const distanceMap = await buildFarmerDistanceMap(uid, myLoc, farmerMap);

            // 5/25 #86: 配送範囲外（farmer.maxDistance < restaurant までの道路距離）は除外。
            //   fish-list.html と同じフィルタを掛けることで「新着の魚」が両画面で一致する。
            //   距離不明（distanceMap 未ヒット）はフォールバックで表示。
            const inRange = (l) => {
                const max = l.maxDistance;
                if (!max) return true;
                const d = distanceMap.get(l.farmerId);
                if (!Number.isFinite(d)) return true;
                return d <= max;
            };
            const eligibleListings = listings.filter(inRange);

            // 棚①：近くの農家（道路距離で昇順）
            const nearest = [...eligibleListings]
                .filter(l => Number.isFinite(distanceMap.get(l.farmerId)))
                .sort((a, b) => distanceMap.get(a.farmerId) - distanceMap.get(b.farmerId))
                .slice(0, 10);

            // 棚②：評価が高い農家
            const topRated = [...eligibleListings]
                .sort((a, b) => (farmerMap.get(b.farmerId)?.avgRating || 0) - (farmerMap.get(a.farmerId)?.avgRating || 0))
                .slice(0, 10);

            // 棚③：新着（既に createdAt desc で取れているので先頭から）
            const newest = eligibleListings.slice(0, 10);

            // 棚④：安い魚（サービス料込み単価で昇順）
            const cheapest = [...eligibleListings]
                .sort((a, b) => ((a.price || 0) + (a.gutPrice || 0)) - ((b.price || 0) + (b.gutPrice || 0)))
                .slice(0, 10);

            // 棚⑤：過去注文した商品
            let history = [];
            try {
                const hq = query(
                    collection(db, 'orders'),
                    where('restaurantId', '==', uid),
                    orderBy('createdAt', 'desc'),
                    limit(30)
                );
                const hSnap = await getDocs(hq);
                const seenIds = new Set();
                const historyIds = [];
                hSnap.forEach(d => {
                    const data = d.data();
                    const items = Array.isArray(data.items) ? data.items : [];
                    for (const it of items) {
                        if (it?.listingId && !seenIds.has(it.listingId)) {
                            seenIds.add(it.listingId);
                            historyIds.push(it.listingId);
                        }
                    }
                    // legacy 単品 order
                    if (data.listingId && !seenIds.has(data.listingId)) {
                        seenIds.add(data.listingId);
                        historyIds.push(data.listingId);
                    }
                });
                // 履歴 ID から既に取得済みの listings を引く + 不足分は追加取得（data-cache 経由）
                const inListings = new Map(listings.map(l => [l.id, l]));
                const stillNeeded = historyIds.filter(id => !inListings.has(id)).slice(0, 10);
                if (stillNeeded.length > 0) {
                    await Promise.all(stillNeeded.map(async (id) => {
                        try {
                            const data = await getCachedDoc('fishListings', id);
                            if (data) inListings.set(id, { id, ...data });
                        } catch (e) { /* ignore */ }
                    }));
                }
                history = historyIds.map(id => inListings.get(id)).filter(Boolean).slice(0, 10);
                // 履歴に必要な農家データも補完（data-cache 経由）
                const extraFarmerIds = history.map(l => l.farmerId).filter(fid => fid && !farmerMap.has(fid));
                await Promise.all(extraFarmerIds.map(async (fid) => {
                    try {
                        const data = await getCachedUser(fid);
                        if (data) farmerMap.set(fid, data);
                    } catch (e) { /* ignore */ }
                }));
            } catch (e) { console.warn('history shelf failed:', e); }

            // 描画
            const emptyMsg = i18next.t('restaurant.noResults');
            renderShelf('shelf-nearest', nearest, farmerMap, distanceMap, serviceRate, emptyMsg);
            renderShelf('shelf-rated', topRated, farmerMap, distanceMap, serviceRate, emptyMsg);
            renderShelf('shelf-newest', newest, farmerMap, distanceMap, serviceRate, emptyMsg);
            renderShelf('shelf-cheapest', cheapest, farmerMap, distanceMap, serviceRate, emptyMsg);
            renderShelf('shelf-history', history, farmerMap, distanceMap, serviceRate, i18next.t('restaurant.shelfHistoryEmpty'));

            // 5/23 #69 Phase J: render-cache に保存。次回訪問時に即時表示できるように。
            //   - listings は Firestore docs から `{ id, ...data() }` の形に変換済（JSON 化可能）
            //   - farmerMap は Map なので Object.fromEntries で plain object に変換
            //   - serviceRate も保存（価格表示に使う）
            //   - 5/23 改2：myLoc も保存することで、次回 cached render が currentUserData 待ち不要に
            //   - 5/25 #85: distanceMap も保存（farmerId → km）。次回訪問時に同じ距離値で即時表示。
            try {
                saveRenderState('dashboard_shelves', {
                    nearest, topRated, newest, cheapest, history,
                    farmers: Object.fromEntries(farmerMap),
                    distances: Object.fromEntries(distanceMap),
                    serviceRate,
                    myLoc,
                });
            } catch (e) { /* 保存失敗は無視 */ }
        }

        // 検索 → fish-list.html に q を渡す
        document.getElementById('search-form').addEventListener('submit', (e) => {
            // デフォルト動作（GET 遷移）を使う。q が空のときは無視。
            const q = document.getElementById('search-input').value.trim();
            if (!q) { e.preventDefault(); }
        });

        // 5/23 #79: 農家ブロック（data-act="view-farmer"）タップで生産者ページへ。
        // 外側の <a class="home-card"> による order.html 遷移を防ぐため preventDefault + stopPropagation。
        document.addEventListener('click', (e) => {
            const farmerEl = e.target.closest('[data-act="view-farmer"]');
            if (!farmerEl) return;
            e.preventDefault();
            e.stopPropagation();
            const farmerId = farmerEl.dataset.farmerId;
            if (farmerId) location.href = `/pages/restaurant/farmer.html?id=${farmerId}`;
        });

        // 通知バッジ・カートバッジ・注文バッジ（既存 dashboard 同様）
        function watchBadges() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            // 注文バッジ
            const lastSeen = parseInt(localStorage.getItem('fishlink_orders_seen') || '0');
            const oq = query(collection(db, 'orders'), where('restaurantId', '==', uid));
            onSnapshot(oq, (snap) => {
                const hasNew = snap.docs.some(d => (d.data().createdAt?.toMillis?.() || 0) > lastSeen);
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
            // カートバッジ
            subscribeCart(uid, (items) => {
                document.getElementById('cart-badge').style.display = items.length > 0 ? 'block' : 'none';
            });
        }

        // 5/23 #69 Phase J 改2: 描画キャッシュ確認 → HIT すれば waitForUserData を待たずに即時表示
        //   - initI18n は既に完了済み（モジュール冒頭で await 済）
        //   - myLoc も cache に保存されているため currentUserData を待たなくて良い
        //   - これにより spinner 表示時間が ~1500ms → ~200-300ms（initI18n のみ）に短縮
        let cachedRendered = false;
        try {
            const cachedShelves = loadRenderState('dashboard_shelves');
            if (cachedShelves) {
                renderCategories();
                const fmap = new Map(Object.entries(cachedShelves.farmers || {}));
                // 5/25 #85: distances（farmerId → km）も復元。古いキャッシュには無いため空マップでフォールバック。
                const dmap = new Map(Object.entries(cachedShelves.distances || {}));
                const sRate = cachedShelves.serviceRate ?? 0.05;
                const emptyMsg = i18next.t('restaurant.noResults');
                renderShelf('shelf-nearest', cachedShelves.nearest || [], fmap, dmap, sRate, emptyMsg);
                renderShelf('shelf-rated', cachedShelves.topRated || [], fmap, dmap, sRate, emptyMsg);
                renderShelf('shelf-newest', cachedShelves.newest || [], fmap, dmap, sRate, emptyMsg);
                renderShelf('shelf-cheapest', cachedShelves.cheapest || [], fmap, dmap, sRate, emptyMsg);
                renderShelf('shelf-history', cachedShelves.history || [], fmap, dmap, sRate, i18next.t('restaurant.shelfHistoryEmpty'));
                // スピナー解除（fresh fetch は裏で続行）
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached shelves render failed:', e);
        }

        waitForUserData(async () => {
            if (!cachedRendered) renderCategories();

            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
            }
            watchBadges();
            try {
                // cached があれば skeleton スキップ（フラッシュ防止）
                await loadShelves({ skipSkeleton: cachedRendered });
            } catch (e) {
                console.error('loadShelves failed:', e);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });
    </script>
</body>
</html>
