<!DOCTYPE html>
<html lang="km">
<!-- 5/30 #102: Home 画面 デザインリニューアル（docs/design/fishlink-home-mockup.html + fishlink-home-spec.md が正本）。
     既存 #74/#75/#76/#79/#97 を包含・置換。構成/データ/状態/遷移=spec 遵守、色/装飾=既存DS（css/style.css）に準拠、寸法=モック正本。
     セクション順：①進行中の注文（ゼロなら非表示）②魚から探す（10種固定）③近くの農家の魚 ④新着の魚 ⑤おすすめ農家（評価順）。 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <!-- #85: 道路距離（Distance Matrix）を fish-list / order / cart と統一 -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer></script>
    <style>
        .nav-badge {
            position: absolute; top: 6px; right: 50%;
            transform: translateX(18px);
            background: #ef4444; width: 10px; height: 10px; border-radius: 50%;
        }

        /* ── 検索バー ── */
        .home-search {
            display: flex; align-items: center; gap: 8px;
            background: #f1f5f9; border-radius: 999px;
            padding: 10px 16px; margin: 0 16px 4px;
        }
        .home-search input {
            flex: 1; border: none; background: transparent;
            font-size: 14px; outline: none; font-family: inherit;
            color: var(--color-text);
        }
        .home-search .material-symbols-outlined { color: var(--color-text-sub); }

        /* ── セクション共通 ── */
        .section { margin-top: 18px; }
        .section__head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px 10px;
        }
        .section__title {
            display: flex; align-items: center; gap: 7px;
            font-size: 16px; font-weight: 700; color: var(--color-text);
        }
        .section__title .material-symbols-outlined { font-size: 18px; color: var(--color-cta); }
        .section__more {
            /* #139: もっと見る/注文状況 等のリンクは青（緑=GAqP/成功/送料無料 専用） */
            font-size: 12px; font-weight: 600; color: var(--color-cta);
            text-decoration: none; display: inline-flex; align-items: center; gap: 2px;
            white-space: nowrap;
        }
        .section__more .material-symbols-outlined { font-size: 16px; }
        .hscroll {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 2px 16px 4px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .hscroll::-webkit-scrollbar { display: none; }

        /* ── ① 進行中の注文カード（300px・モック正本） ── */
        .order-card {
            scroll-snap-align: start; flex: 0 0 300px;
            background: var(--color-surface);
            border: 1px solid var(--color-border); border-radius: var(--radius);
            padding: 14px; text-decoration: none; color: inherit; display: block;
        }
        .order-card__top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .order-card__thumb {
            width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
            background: var(--color-primary-lt); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .order-card__thumb img { width: 100%; height: 100%; object-fit: cover; }
        .order-card__thumb .material-symbols-outlined { font-size: 22px; color: var(--color-primary); }
        .order-card__hd { min-width: 0; flex: 1; }
        .order-card__name { font-weight: 700; font-size: 14px; line-height: 1.3; }
        .order-card__name .sz { font-weight: 500; font-size: 12px; color: var(--color-text-sub); }
        .order-card__sub {
            font-size: 12px; color: var(--color-text-sub); margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .order-card__amt { margin-left: auto; text-align: right; flex-shrink: 0; }
        /* 6/4 #122①: 進行中の注文の合計は青（金額＝青）。緑は使わない */
        .order-card__amt b { color: var(--color-cta); font-size: 15px; font-weight: 800; }
        .order-card__amt .u { font-size: 11px; color: var(--color-text-sub); }

        .stepper { display: flex; align-items: flex-start; margin: 4px 2px 10px; }
        .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .step__dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: #d7dee4; border: 2px solid #d7dee4; z-index: 2; position: relative;
        }
        .step.done .step__dot { background: var(--color-primary); border-color: var(--color-primary); }
        .step.current .step__dot {
            background: #fff; border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(13, 110, 76, .18);
        }
        .step.declined .step__dot { background: var(--color-danger); border-color: var(--color-danger); }
        .step.declined .step__dot::after {
            content: "✕"; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 9px; font-weight: 900; line-height: 1;
        }
        .step__lb { font-size: 10px; color: var(--color-text-sub); margin-top: 5px; white-space: nowrap; }
        .step.done .step__lb, .step.current .step__lb { color: var(--color-text); font-weight: 700; }
        .step.declined .step__lb { color: var(--color-danger); font-weight: 700; }
        .step__bar { position: absolute; top: 6px; left: -50%; width: 100%; height: 2px; background: #d7dee4; z-index: 1; }
        .step.done .step__bar, .step.current .step__bar { background: var(--color-primary); }
        .step:first-child .step__bar { display: none; }

        .order-eta {
            font-size: 12px; color: var(--color-text);
            background: var(--color-primary-lt); border-radius: 8px;
            padding: 7px 10px; display: flex; align-items: center; gap: 6px;
        }
        .order-eta .material-symbols-outlined { font-size: 15px; color: var(--color-primary-dk); }
        .order-eta b { color: var(--color-primary-dk); }

        .order-card { position: relative; }
        .order-card.declined { border-color: #f3c9c9; }
        /* 6/4 #122④: 辞退カードの手動「×（閉じる）」。閉じても注文状況の「辞退済み」に履歴は残る */
        .order-card__close {
            position: absolute; top: 8px; right: 8px;
            width: 26px; height: 26px; border-radius: 50%;
            border: none; background: #fceced; color: var(--color-danger);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 0; z-index: 3;
        }
        .order-card__close .material-symbols-outlined { font-size: 16px; }
        .order-alert {
            font-size: 12px; color: var(--color-danger); background: #fceced;
            border-radius: 8px; padding: 7px 10px; display: flex; align-items: center; gap: 6px;
            margin-bottom: 8px; line-height: 1.35;
        }
        .order-alert .material-symbols-outlined { font-size: 15px; flex-shrink: 0; }
        /* 6/4 #122①: 辞退時「他の農家を探す」は主CTA＝青（緑にしない） */
        .order-find {
            display: flex; align-items: center; justify-content: center; gap: 4px;
            width: 100%; background: var(--color-cta); color: #fff;
            border: none; border-radius: 10px; padding: 11px;
            font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
            text-decoration: none;
        }
        .order-find .material-symbols-outlined { font-size: 16px; }

        /* ── ② 魚タイル（10種固定・モック .tile） ── */
        .tiles {
            display: flex; gap: 14px; overflow-x: auto; padding: 2px 16px 4px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .tiles::-webkit-scrollbar { display: none; }
        .tile {
            flex: 0 0 auto; width: 66px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            text-decoration: none; color: inherit;
        }
        .tile__circle {
            width: 66px; height: 66px; border-radius: 50%; overflow: hidden;
            background: var(--color-primary-lt);
            display: flex; align-items: center; justify-content: center;
        }
        .tile__circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .tile__nm { font-size: 11px; color: var(--color-text); text-align: center; line-height: 1.25; font-weight: 600; word-break: break-word; }
        /* 5/31 #106: 11種目「その他」タイル（画像なし・アイコン） */
        .tile__circle--other { display: flex; align-items: center; justify-content: center; background: var(--color-primary-lt); }
        .tile__circle--other .material-symbols-outlined { font-size: 30px; color: var(--color-primary); }

        /* 5/31 #106 / #139: キャンペーンバナー（検索バー直下・キャンペーン中のみ表示）
           色＝オレンジグラデ（割引＝amber/オレンジ系。緑はGAqP/成功/送料無料 専用なので割引に使わない） */
        .home-campaign {
            margin: 4px 16px 6px; background: linear-gradient(135deg, #F5A623, #EA6A0A); border: none;
            border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 2px 8px rgba(234, 106, 10, .25);
        }
        .home-campaign__main { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 0; }
        .home-campaign__main > .material-symbols-outlined { color: #fff; flex-shrink: 0; }
        .home-campaign__title { font-size: 14px; font-weight: 800; color: #fff; }
        .home-campaign__sub { font-size: 12px; color: rgba(255, 255, 255, .92); margin-top: 2px; }
        .home-campaign__close { background: none; border: none; color: rgba(255, 255, 255, .9); cursor: pointer; padding: 4px; flex-shrink: 0; display: flex; }
        /* 5/31 #106: 評価0件の「新規」表示 */
        .fl-new { color: var(--color-text-sub); font-weight: 600; }

        /* ── ③④ 商品カード（220px・モック .pcard） ── */
        .pcard {
            scroll-snap-align: start; flex: 0 0 220px;
            background: var(--color-surface);
            border: 1px solid var(--color-border); border-radius: var(--radius);
            overflow: hidden; text-decoration: none; color: inherit; display: block;
        }
        .pcard__img {
            position: relative; width: 100%; height: 130px;
            background: var(--color-primary-lt);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .pcard__img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        /* #139E: 直下の子に限定＝プレースホルダー用。バッジ内(.gaqp-badge)のアイコンには効かせない（GAqPバッジをコンパクト維持） */
        .pcard__img > .material-symbols-outlined { font-size: 34px; color: #9dbed4; }
        .gaqp-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--color-primary); color: #fff;
            font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 8px;
            display: inline-flex; align-items: center; gap: 2px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .15); white-space: nowrap;
        }
        .gaqp-badge .material-symbols-outlined { font-size: 12px; color: #fff; }
        .pcard__body { padding: 10px 11px 0; }
        .pcard__nm {
            font-size: 14px; font-weight: 700; line-height: 1.3; color: var(--color-text);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .pcard__sz { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .pcard__price { margin-top: 7px; display: flex; align-items: baseline; gap: 4px; }
        /* 6/4 #122①: 商品カードの価格は青（緑はGAqP/成功/送料無料専用） */
        .pcard__price b { font-size: 22px; font-weight: 800; color: var(--color-cta); line-height: 1; }
        .pcard__price span { font-size: 12px; color: var(--color-text-sub); font-weight: 600; }
        .pcard__meta {
            display: flex; align-items: center; gap: 10px;
            font-size: 12px; color: var(--color-text-sub); margin-top: 7px;
        }
        .pcard__meta .d { display: flex; align-items: center; gap: 3px; }
        .pcard__meta .material-symbols-outlined { font-size: 13px; }
        .pcard__farmer {
            display: flex; align-items: center; gap: 8px; margin-top: 10px;
            border-top: 1px solid var(--color-border); padding: 9px 11px; background: #fafcfd;
            cursor: pointer;
        }
        .pcard__farmer:hover { background: #f1f5f9; }
        .pcard__avatar {
            width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; overflow: hidden;
            background: var(--color-primary-lt);
            display: flex; align-items: center; justify-content: center;
        }
        .pcard__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .pcard__avatar .material-symbols-outlined { font-size: 14px; color: #94a3b8; }
        .pcard__fn {
            font-size: 12px; font-weight: 700; line-height: 1.2; color: var(--color-text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1;
        }
        .pcard__rt {
            margin-left: auto; font-size: 11px; color: #f59e0b; font-weight: 700;
            display: flex; align-items: center; gap: 2px; white-space: nowrap; flex-shrink: 0;
        }
        .pcard__rt .material-symbols-outlined { font-size: 12px; color: #f59e0b; font-variation-settings: 'FILL' 1; }
        .pcard__rt span { color: var(--color-text-sub); font-weight: 600; }

        /* 🎬 #201: 商品カードの動画バッジ（reel-ui の .rui-vbadge は左上）。GAqPバッジ(左上)と共存する場合のみ下にずらす＝重なり回避 */
        .pcard__img.has-gaqp .rui-vbadge { top: 32px; }

        /* ── ⑤ 農家カード（240px・モック .fcard） ── */
        .fcard {
            scroll-snap-align: start; flex: 0 0 240px;
            background: var(--color-surface);
            border: 1px solid var(--color-border); border-radius: var(--radius);
            overflow: hidden; text-decoration: none; color: inherit; display: block;
        }
        .fcard__cover {
            position: relative; height: 96px;
            background: linear-gradient(135deg, #cfe0ec, var(--color-primary-lt));
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .fcard__cover img { width: 100%; height: 100%; object-fit: cover; }
        /* #139E: 直下の子に限定＝プレースホルダー用。バッジ内(.gaqp-badge)のアイコン(30px化＝大きな丸シール)を防ぐ＝商品カードと同じコンパクトピルに統一 */
        .fcard__cover > .material-symbols-outlined { font-size: 30px; color: #7fa6c2; }
        .fcard__body { padding: 34px 13px 13px; position: relative; }
        .fcard__avatar {
            position: absolute; top: -24px; left: 13px;
            width: 48px; height: 48px; border-radius: 50%;
            background: #fff; border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0, 0, 0, .12);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .fcard__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .fcard__avatar .material-symbols-outlined { font-size: 22px; color: #94a3b8; }
        .fcard__name { font-size: 15px; font-weight: 800; color: var(--color-text); }
        .fcard__loc { font-size: 12px; color: var(--color-text-sub); margin-top: 3px; }
        .fcard__rate { font-size: 12px; margin-top: 2px; color: var(--color-text-sub); display: flex; align-items: center; gap: 3px; }
        .fcard__rate .material-symbols-outlined { font-size: 13px; color: #f59e0b; font-variation-settings: 'FILL' 1; }
        .fcard__rate b { color: #f59e0b; font-weight: 700; }
        .fcard__tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .fcard__tag { font-size: 11px; background: var(--color-primary-lt); color: var(--color-primary-dk); padding: 3px 8px; border-radius: 6px; font-weight: 600; }
        .fcard__btn {
            /* #139: 「農家を見る」CTAは青（緑=GAqP/成功/送料無料 専用） */
            margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 4px;
            border: 1.5px solid var(--color-cta); color: var(--color-cta);
            border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer;
        }
        .fcard__btn .material-symbols-outlined { font-size: 16px; }

        /* ── 空・スケルトン ── */
        .section__empty {
            padding: 14px; margin: 0 16px;
            background: #f8fafc; border-radius: 12px;
            color: var(--color-text-sub); font-size: 13px; text-align: center;
        }
        .skel {
            flex: 0 0 220px; height: 230px; scroll-snap-align: start;
            background: linear-gradient(90deg, #f1f5f9, #e2e8f0, #f1f5f9);
            background-size: 200% 100%; border-radius: var(--radius);
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page" style="padding: 0; padding-bottom: 120px; max-width:480px; margin:0 auto;">

        <!-- ヘッダー（sticky） -->
        <div class="page-header" style="align-items:center; padding:16px; margin-bottom:0; position:sticky; top:0; z-index:30; background:var(--color-surface); border-bottom:1px solid var(--color-border);">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/restaurant/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 検索バー -->
        <div style="padding: 12px 0 0;">
            <form class="home-search" id="search-form" action="/pages/restaurant/fish-list.html" method="get">
                <span class="material-symbols-outlined">search</span>
                <input type="search" name="q" id="search-input" data-i18n="[placeholder]restaurant.searchPlaceholder">
            </form>
        </div>

        <!-- 5/31 #106: キャンペーンバナー（検索バー直下・キャンペーン中のみ表示・Home画面のみ） -->
        <div id="campaign-banner" class="home-campaign" style="display:none;">
            <div class="home-campaign__main">
                <span class="material-symbols-outlined">local_offer</span>
                <div>
                    <div class="home-campaign__title" id="campaign-title"></div>
                    <div class="home-campaign__sub" id="campaign-sub"></div>
                </div>
            </div>
            <button type="button" class="home-campaign__close" id="campaign-close" aria-label="close">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- 🎬 #201: Home 新着リール（検索バーの直下・Home最上部・「魚から探す」の上。0本ならセクションごと非表示・reels-spec §3）
             カルーセルは写真サムネ＋▶のみ（自動再生しない）＝タップで全画面フィード（§4）で読み込み/再生。 -->
        <div class="section" id="sec-reels" style="display:none;">
            <div class="section__head">
                <span class="section__title">
                    <span class="material-symbols-outlined">movie</span>
                    <span data-i18n="reel.sectionTitle"></span>
                </span>
                <a class="section__more" href="#" id="reels-more" role="button">
                    <span data-i18n="reel.more"></span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
            <div class="hscroll" id="reels-row"></div>
        </div>

        <!-- ① 進行中の注文（進行中ゼロならセクションごと非表示） -->

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

        // 6/3 #116: 納品日は曜日付き表記「6/4（木）」で統一（カート/注文確認/Home）。
        const WEEKDAY_SHORT = {
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'],

        function fmtDeliveryDate(iso) {
            const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return iso || '';
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];
            return `${Number(m[2])}/${Number(m[3])}（${wd}）`;

        // 評価表記（spec §9-1）= ★ N% (件数)。5/31 #106: 0件は「新規」表示（低評価誤認防止）
        function ratingHtml(pct, count, cls) {
            if (!count || count <= 0) return `<span class="${cls}"><span class="fl-new">${i18next.t('fishlist.newFarmer')}</span></span>`;
            return `<span class="${cls}"><span class="material-symbols-outlined">star</span>${Math.round(pct || 0)}% <span>(${count})</span></span>`;

        // 5/31 #106 → 6/1 #108: キャンペーンバナー描画。
        //   割引% = 通常率(serviceRate) − キャンペーン中の実効率(serviceRate − campaignDiscount) = campaignDiscount。
        //   ＝明細の割引行(campaignDiscount)と一致。率はデータ化（ハードコードしない）。
        //   #108: 終了日 campaignEndDate（運営値）を導入。表示条件 = bannerActive かつ discount>0
        //         かつ（終了日未設定 or 今日 ≤ campaignEndDate）。終了日超過で自動非表示。
        //         サブ文言は「魚代から{割引%}%割引 〜{終了日}」（手打ち禁止・運営値を参照）。
        function renderCampaignBanner(c) {
            const el = document.getElementById('campaign-banner');
            if (!el) return;
            const normal = Number(c.serviceRate ?? 0.05);
            const discount = Number(c.campaignDiscount || 0);   // fishPrice 比の割引率
            // #139 表示条件＝バナー表示ON ＆ キャンペーン有効(campaignActive) ＆ 割引>0 ＆ 今日≤終了日
            if (c.bannerActive !== true || c.campaignActive !== true || discount <= 0) { el.style.display = 'none'; return; }
            // 終了日（YYYY-MM-DD）。設定済みで今日を超過していれば非表示。
            const endDate = c.campaignEndDate || '';
            if (endDate) {
                const now = new Date();
                const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                if (today > endDate) { el.style.display = 'none'; return; }
            }
            const until = endDate;
            const sig = `${normal}_${discount}_${until}`;
            if (localStorage.getItem('fishlink_campaign_dismissed') === sig) { el.style.display = 'none'; return; }

            // #139 割引%は運営値（campaignDiscount）をそのまま表示。小数1桁を保持（2.5%→「2.5」・整数化で3%にしない）
            const discountPct = Math.round(discount * 1000) / 10;
            const residual = normal - discount;                 // キャンペーン中の実効手数料率
            let title;
            if (residual <= 0.0001) title = i18next.t('home.campaignFree');
            else if (Math.abs(residual - normal / 2) < 0.0001) title = i18next.t('home.campaignHalf');
            else title = i18next.t('home.campaignOff', { pct: discountPct });
            document.getElementById('campaign-title').textContent = title;
            document.getElementById('campaign-sub').textContent = until
                ? i18next.t('home.campaignSubUntil', { pct: discountPct, until })
                : i18next.t('home.campaignSub', { pct: discountPct });
            el.style.display = 'flex';
            document.getElementById('campaign-close').onclick = (e) => {
                e.stopPropagation();
                try { localStorage.setItem('fishlink_campaign_dismissed', sig); } catch (_) { }
                el.style.display = 'none';
            };
        }

        // GAqP バッジ（spec §9-2）= 画像左上の緑 ✓ GAqP
        function gaqpBadge(on) {

        // 🎬 #201: 新着リール（カルーセル＋全画面フィード＋商品カードの🎬バッジ）
        //   母集団＝getRecentReels（新着順）を「配達圏内×在庫×販売中」eligible listing に絞り listingId ごと featured 1本へ dedupe。
        //   raw vm は言語非依存＋JSON安全（postedAt=millis／province/fishType は raw・描画時に翻訳）＝render-cache round-trip 可。
        let featuredReelIds = new Set();   // featured 動画を持つ listingId（商品カードの🎬バッジ判定）
        let reelVmsState = [];             // 新着リールの raw vm（言語切替・全画面フィードで再利用）

        // raw（言語非依存）→ reel-ui が要求する display vm（fishName/province/isNew を現在言語・現在時刻で生成）
        function toReelDisplayVm(r) {
            return {

        function buildReelRaw(reel, listing, farmer, distanceKm, serviceRate) {

            };
        }
        function renderReels(rawVms) {
            reelVmsState = Array.isArray(rawVms) ? rawVms : [];
            featuredReelIds = new Set(reelVmsState.map(v => v.listingId));   // ⚠ 商品カードの🎬バッジより前に確定させる

        // ── 距離計算（#85: 道路距離を fish-list / order / cart と統一） ──
        function haversine(a, b) {
            if (!a || !b) return Infinity;
            const R = 6371;
            const dLat = (b.lat - a.lat) * Math.PI / 180;
            const dLng = (b.lng - a.lng) * Math.PI / 180;
            const x = Math.sin(dLat / 2) ** 2 + Math.cos(a.lat * Math.PI / 180) * Math.cos(b.lat * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
        }
        async function calcRoadDistances(originLat, originLng, destinations) {
            return new Promise((resolve) => {
                if (typeof google === 'undefined' || !google.maps) {
                    resolve(destinations.map(d => ({ km: haversine({ lat: originLat, lng: originLng }, { lat: d.lat, lng: d.lng }), ok: false })));
                    return;
                }
                const service = new google.maps.DistanceMatrixService();
                const origin = new google.maps.LatLng(originLat, originLng);
                const dests = destinations.map(d => new google.maps.LatLng(d.lat, d.lng));
                service.getDistanceMatrix({
                    origins: [origin], destinations: dests,
                    travelMode: google.maps.TravelMode.DRIVING,
                    unitSystem: google.maps.UnitSystem.METRIC,
                }, (response, status) => {
                    if (status !== 'OK' || !response.rows[0]) {
                        resolve(destinations.map(d => ({ km: haversine({ lat: originLat, lng: originLng }, { lat: d.lat, lng: d.lng }), ok: false })));
                        return;
                    }
                    const results = response.rows[0].elements.map((el, idx) => {
                        if (el.status === 'OK') return { km: el.distance.value / 1000, ok: true };
                        const dest = destinations[idx];
                        return { km: haversine({ lat: originLat, lng: originLng }, { lat: dest.lat, lng: dest.lng }), ok: false };
                    });
                    resolve(results);
                });
            });
        }
        function waitForGoogleMaps(cb) {
            if (typeof google !== 'undefined' && google.maps) { cb(); }
            else { setTimeout(() => waitForGoogleMaps(cb), 200); }
        }
        async function buildFarmerDistanceMap(uid, myLoc, farmerMap) {
            const distMap = new Map();
            if (!myLoc) return distMap;
            const farmerLocs = [];
            for (const [fid, f] of farmerMap) {
                if (!f?.location) continue;
                const loc = f.location;
                const locs = { rLat: myLoc.lat, rLng: myLoc.lng, fLat: loc.lat, fLng: loc.lng };
                const cached = getCachedDistance(uid, fid, locs);
                if (cached !== null) distMap.set(fid, cached);
                else farmerLocs.push({ fid, loc, locs });
            }
            if (farmerLocs.length === 0) return distMap;
            await new Promise((resolve) => waitForGoogleMaps(resolve));
            const CHUNK = 25;
            const chunks = [];
            for (let i = 0; i < farmerLocs.length; i += CHUNK) chunks.push(farmerLocs.slice(i, i + CHUNK));
            await Promise.all(chunks.map(async (chunk) => {
                try {
                    const dests = chunk.map(c => c.loc);
                    const results = await calcRoadDistances(myLoc.lat, myLoc.lng, dests);
                    chunk.forEach((c, j) => {
                        const r = results[j];
                        distMap.set(c.fid, r.km);
                        if (r.ok) setCachedDistance(uid, c.fid, r.km, c.locs);
                    });
                } catch (e) {
                    chunk.forEach(c => distMap.set(c.fid, haversine(myLoc, c.loc)));
                }
            }));
            return distMap;
        }

        // ── ② 魚タイル（5/31 #106: 10種＋「その他」＝11タイル固定） ──

        // ── ③④ 商品カード（220px） ──
        function productCard(listing, farmer, distanceKm, serviceRate, isPriority = false) {

            const hasReel = featuredReelIds.has(listing.id);   // #201: featured 動画あり＝🎬 動画バッジ

            const imgAttrs = asCachedImgAttrs(photo, isPriority ? { priority: 'high' } : {});

            return `
                <a class="pcard" href="/pages/restaurant/order.html?id=${listing.id}">
                    <div class="pcard__img${gaqp && hasReel ? ' has-gaqp' : ''}">
                        ${photo
                            ? `<img ${imgAttrs} alt="${escapeHtml(name)}" ${loadAttr}>`
                            : `<span class="material-symbols-outlined">set_meal</span>`}
                        ${gaqpBadge(gaqp)}
                        ${hasReel ? reelVideoBadge(i18next.t) : ''}
                    </div>
                    <div class="pcard__body">
                        <div class="pcard__nm">${escapeHtml(name)}</div>
                        <div class="pcard__sz">${escapeHtml(listing.size || '')} head/kg</div>
                        <div class="pcard__price"><b>${unitPrice.toLocaleString()}</b><span>KHR/kg</span></div>
                        <div class="pcard__meta">
                            <div class="d">${stock > 0 ? i18next.t('restaurant.stock', { kg: stock }) : i18next.t('order.stockUnavailable')}</div>
                            ${distText ? `<div class="d"><span class="material-symbols-outlined">location_on</span>${escapeHtml(distText)}</div>` : ''}
                        </div>
                    </div>
                    ${farmerName ? `
                        <div class="pcard__farmer" data-act="view-farmer" data-farmer-id="${listing.farmerId}" role="button" tabindex="0">
                            <div class="pcard__avatar">
                                ${farmerAvatar ? `<img ${asCachedImgAttrs(farmerAvatar)} alt="" loading="lazy">` : `<span class="material-symbols-outlined">person</span>`}
                            </div>
                            <div class="pcard__fn">${escapeHtml(farmerName)}</div>
                            ${ratingHtml(pct, reviewCount, 'pcard__rt')}
                        </div>` : ''}
                </a>`;
        }

        function renderProductRow(elId, listings, farmerMap, distanceMap, serviceRate, priorityFirst = false) {
            const row = document.getElementById(elId);

        // ── ⑤ 農家カード（240px） ──
        function farmerCard(farmer, distanceKm, fishTags) {
            const name = farmer.displayName || '';
            const pct = Number(farmer.avgRating || 0);
            const count = Number(farmer.reviewCount || 0);
            const gaqp = farmer.gaqpCertified === true;
            const avatar = getReviewerAvatarUrl(farmer);
            const cover = (Array.isArray(farmer.pondPhotos) && farmer.pondPhotos[0]) || farmer.pondPhotoUrl || null;
            const provText = farmer.province ? formatProvince(farmer.province) : '';
            const distText = Number.isFinite(distanceKm) ? `${distanceKm.toFixed(1)} km` : '';
            const locParts = [provText, distText].filter(Boolean).join(' ・ ');
            const tagsHtml = (fishTags || []).slice(0, 3).map(t => `<span class="fcard__tag">${escapeHtml(t)}</span>`).join('');
            return `
                <a class="fcard" href="/pages/restaurant/farmer.html?id=${farmer.id}">
                    <div class="fcard__cover">
                        ${cover ? `<img ${asCachedImgAttrs(cover)} alt="" loading="lazy">` : `<span class="material-symbols-outlined">landscape</span>`}
                        ${gaqpBadge(gaqp)}
                    </div>
                    <div class="fcard__body">
                        <div class="fcard__avatar">
                            ${avatar ? `<img ${asCachedImgAttrs(avatar)} alt="" loading="lazy">` : `<span class="material-symbols-outlined">person</span>`}
                        </div>
                        <div class="fcard__name">${escapeHtml(name)}</div>
                        ${locParts ? `<div class="fcard__loc">${escapeHtml(locParts)}</div>` : ''}
                        <div class="fcard__rate">${count > 0
                            ? `<span class="material-symbols-outlined">star</span><b>${Math.round(pct)}%</b> (${count})`
                            : `<span class="fl-new">${i18next.t('fishlist.newFarmer')}</span>`}</div>
                        ${tagsHtml ? `<div class="fcard__tags">${tagsHtml}</div>` : ''}
                        <div class="fcard__btn"><span data-i18n-skip>${i18next.t('home.viewFarmer')}</span><span class="material-symbols-outlined">arrow_forward</span></div>
                    </div>
                </a>`;
        }

        function renderFarmerRow(farmers, distanceMap, fishTagsMap) {
            const row = document.getElementById('row-farmers');
            if (!farmers || farmers.length === 0) {
                row.innerHTML = `<div class="section__empty" style="margin:0; flex:1;">${i18next.t('restaurant.noResults')}</div>`;
                return;
            }
            row.innerHTML = farmers.map(f => farmerCard(f, distanceMap?.get(f.id), fishTagsMap?.[f.id])).join('');
        }

        // ── ① 進行中の注文カード（300px） ──
        // 実ステータス → spec 5段ステッパー（注文済→農家確認中→出荷→配達中→完了）+ 辞退 にマップ
        const STEP_LABELS = ['home.stepOrdered', 'home.stepConfirming', 'home.stepShipped', 'home.stepDelivering', 'home.stepDone'];
        function stepStates(status) {
            // 返り値: 各段の class（''|'done'|'current'|'declined'）
            if (status === 'declined') return ['done', 'declined', '', '', ''];
            if (status === 'pending') return ['done', 'current', '', '', ''];
            if (status === 'approved' || status === 'preparing') return ['done', 'done', 'current', '', ''];
            if (status === 'delivering') return ['done', 'done', 'done', 'current', ''];
            if (status === 'completed' || status === 'delivered') return ['done', 'done', 'done', 'done', 'done'];
            return ['done', 'current', '', '', '']; // 不明は確認中扱い
        }
        function orderQty(order) {
            const items = Array.isArray(order.items) ? order.items : null;
            if (items && items.length) return items.reduce((s, it) => s + (Number(it.quantity) || 0), 0);
            return Number(order.quantity) || 0;
        }
        function orderPrimaryItem(order) {
            const items = Array.isArray(order.items) ? order.items : null;
            if (items && items.length) return items[0];
            return { snapFishType: order.snapFishType, snapSize: order.snapSize, snapPhotoUrl: order.snapPhotoUrl };
        }
        function orderCard(o) {
            const order = o.order;
            const status = order.status === 'delivered' ? 'completed' : order.status;
            const it = orderPrimaryItem(order);
            const name = fishName(it.snapFishType || '');
            const size = it.snapSize || '';
            const itemCount = Array.isArray(order.items) ? order.items.length : 1;
            const moreItems = itemCount > 1 ? ` +${itemCount - 1}` : '';
            const photo = it.snapPhotoUrl || null;
            const qty = orderQty(order);
            const total = (order.totalAmount || 0).toLocaleString();
            const states = stepStates(status);
            const isDeclined = status === 'declined';

            const stepperHtml = states.map((cls, i) => `
                <div class="step ${cls}"><span class="step__bar"></span><span class="step__dot"></span><span class="step__lb">${i18next.t(STEP_LABELS[i])}</span></div>
            `).join('');

            let footerHtml;
            if (isDeclined) {
                footerHtml = `
                    <div class="order-alert"><span class="material-symbols-outlined">warning</span>${escapeHtml(i18next.t('home.declinedAlert', { farmer: o.farmerName || '' }))}</div>
                    <a class="order-find" href="/pages/restaurant/fish-list.html?fishType=${encodeURIComponent(it.snapFishType || '')}">
                        ${i18next.t('home.findOtherFarmer')}<span class="material-symbols-outlined">arrow_forward</span>
                    </a>`;
            } else if (status === 'pending') {
                footerHtml = `<div class="order-eta"><span class="material-symbols-outlined">hourglass_top</span>${i18next.t('home.confirmingEta')}</div>`;
            } else {
                const when = [(order.deliveryDateIso || order.deliveryDate) ? fmtDeliveryDate(order.deliveryDateIso || order.deliveryDate) : '', order.deliveryTime || ''].filter(Boolean).join(' ');
                footerHtml = `<div class="order-eta"><span class="material-symbols-outlined">local_shipping</span>${when ? i18next.t('home.etaArrive', { when }) : i18next.t('delivery.' + status)}</div>`;
            }

            return `
                <div class="order-card ${isDeclined ? 'declined' : ''}" data-href="/pages/restaurant/orders.html#order-${o.id}" role="button" tabindex="0">
                    ${isDeclined ? `<button type="button" class="order-card__close" data-act="dismiss-decline" data-order-id="${o.id}" aria-label="${escapeHtml(i18next.t('home.dismissDecline'))}" title="${escapeHtml(i18next.t('home.dismissDecline'))}"><span class="material-symbols-outlined">close</span></button>` : ''}
                    <div class="order-card__top">
                        <div class="order-card__thumb">
                            ${photo ? `<img ${asCachedImgAttrs(photo)} alt="" loading="lazy">` : `<span class="material-symbols-outlined">set_meal</span>`}
                        </div>
                        <div class="order-card__hd">
                            <div class="order-card__name">${escapeHtml(name)}${moreItems}${size ? ` <span class="sz">${escapeHtml(size)} head/kg</span>` : ''}</div>
                            <div class="order-card__sub">${escapeHtml(o.farmerName || '')}${qty ? ` ・ ${qty}kg` : ''}</div>
                        </div>
                        <div class="order-card__amt"><b>${total}</b><div class="u">KHR</div></div>
                    </div>
                    <div class="stepper">${stepperHtml}</div>
                    ${footerHtml}
                </div>`;
        }

        // 6/4 #122④: 辞退カードの消去ルール（fresh/cache 両経路で適用＝表示時にフィルタ）
        //   ①「他の農家を探す」から代替注文を入れたら自動クリア（同魚種の進行中注文があれば解決済み）
        //   ② 手動「×」で閉じたものは表示しない（辞退済み履歴は Firestore に残る）
        function filterDeclinedForHome(orders) {
            const dismissed = getDismissedDeclines();
            const activeFishTypes = new Set(
                orders.filter(r => r.order.status !== 'declined')
                      .map(r => orderPrimaryItem(r.order).snapFishType)
                      .filter(Boolean)
            );
            return orders.filter(r => {
                if (r.order.status !== 'declined') return true;
                if (dismissed.has(r.id)) return false;
                const ft = orderPrimaryItem(r.order).snapFishType;
                if (ft && activeFishTypes.has(ft)) return false; // 代替注文済み＝自動クリア
                return true;
            });
        }

        function renderOrders(orders) {
            const sec = document.getElementById('sec-orders');
            const row = document.getElementById('orders-row');
            const shown = filterDeclinedForHome(orders || []);
            if (shown.length === 0) {
                sec.style.display = 'none';
                row.innerHTML = '';
                return;
            }
            sec.style.display = 'block';
            row.innerHTML = shown.map(orderCard).join('');
        }

        // 6/4 #122④: 辞退カードの「手動×で閉じた」記録（端末ローカル。辞退済み履歴は Firestore に残る）
        const DISMISSED_DECLINE_KEY = 'fishlink_home_declined_dismissed';
        function getDismissedDeclines() {
            try { return new Set(JSON.parse(localStorage.getItem(DISMISSED_DECLINE_KEY) || '[]')); }
            catch (_) { return new Set(); }
        }
        function addDismissedDecline(oid) {
            const s = getDismissedDeclines(); s.add(oid);
            try { localStorage.setItem(DISMISSED_DECLINE_KEY, JSON.stringify([...s])); } catch (_) { }
        }

        // ── 進行中の注文を取得（declined は先頭固定） ──
        const IN_PROGRESS = ['pending', 'approved', 'preparing', 'delivering'];
        async function loadOrders(uid) {
            try {
                const q = query(
                    collection(db, 'orders'),
                    where('restaurantId', '==', uid),
                    orderBy('createdAt', 'desc'),
                    limit(20)
                );
                const snap = await getDocs(q);
                const raw = snap.docs.map(d => ({ id: d.id, order: d.data() }));
                // done(completed/delivered) は進行中から即消す。pending/approved/preparing/delivering + declined のみ。
                const active = raw.filter(r => {
                    const s = r.order.status;
                    return IN_PROGRESS.includes(s) || s === 'declined';
                });
                // 農家名を補完
                const farmerIds = [...new Set(active.map(r => r.order.farmerId).filter(Boolean))];
                const fmap = new Map();
                await Promise.all(farmerIds.map(async fid => {
                    try { const f = await getCachedUser(fid); if (f) fmap.set(fid, f); } catch (e) { /* ignore */ }
                }));
                active.forEach(r => { r.farmerName = fmap.get(r.order.farmerId)?.displayName || ''; });
                // declined を先頭固定 → 残りは createdAt desc（取得順）
                active.sort((a, b) => {
                    const da = a.order.status === 'declined' ? 0 : 1;
                    const dbb = b.order.status === 'declined' ? 0 : 1;
                    return da - dbb;
                });
                renderOrders(active);
                try {
                    saveRenderState('home_orders', {
                        orders: active.map(r => ({ id: r.id, order: r.order, farmerName: r.farmerName })),
                    });
                } catch (e) { /* ignore */ }
            } catch (e) {
                console.warn('loadOrders failed:', e);
            }
        }

        // ── 商品・農家セクションのデータ取得 ──
        async function loadCatalog({ skipSkeleton = false } = {}) {
            const rowIds = ['row-nearby', 'row-newest', 'row-farmers'];
            if (!skipSkeleton) rowIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
            });

            const uid = window.currentUser?.uid;
            const myLoc = window.currentUserData?.location || null;

            let serviceRate = 0.05;
            try {
                const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                if (campSnap.exists()) {
                    const c = campSnap.data();
                    serviceRate = c.serviceRate ?? 0.05;
                    renderCampaignBanner(c);   // 5/31 #106: キャンペーンバナー
                }
            } catch (e) { /* ignore */ }

            // 🎬 #201: 新着リールの母集団を先読み（距離計算と並行＝待ち時間を隠す・失敗しても既存Homeは壊さない）
            const reelsPromise = getRecentReels(60).catch(() => []);

            const baseQ = query(
                collection(db, 'fishListings'),
                where('isActive', '==', true),
                orderBy('createdAt', 'desc'),
                limit(60)
            );
            const snap = await getDocs(baseQ);
            const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            const farmerIds = [...new Set(listings.map(l => l.farmerId).filter(Boolean))];
            const farmerMap = new Map();
            await Promise.all(farmerIds.map(async (fid) => {
                try { const data = await getCachedUser(fid); if (data) farmerMap.set(fid, data); } catch (e) { /* ignore */ }
            }));

            const distanceMap = await buildFarmerDistanceMap(uid, myLoc, farmerMap);

            // 配送圏外は除外（#86: 両画面一致 / 5/31 #105: 配送設定は farmer 単位＝farmerDelivery を優先）
            const inRange = (l) => {
                const max = resolveDelivery(farmerMap.get(l.farmerId), l).radiusKm;
                if (!max) return true;
                const d = distanceMap.get(l.farmerId);
                if (!Number.isFinite(d)) return true;
                return d <= max;
            };
            const eligible = listings.filter(inRange);
            // 在庫>0 の商品のみ Home の棚に出す（売切れは魚一覧で末尾表示）
            const inStock = eligible.filter(l => Number(l.stock || 0) > 0);

            // 🎬 #201: 新着リール vm を組む（配達圏内×在庫×販売中の出品に紐づく featured 動画・新着順）。
            //   listing/farmer/距離 は既存ロード済みデータを流用＝行ごとの追加クエリはしない。
            const reelRawVms = [];
            try {
                const recentReels = await reelsPromise;                        // getRecentReels(60)（postedAt desc）
                const featuredReels = dedupeFeaturedByListing(recentReels);    // listingId ごと最新1本
                const inStockById = new Map(inStock.map(l => [l.id, l]));
                for (const r of featuredReels) {
                    const l = inStockById.get(r.listingId);
                    if (!l) continue;   // 配達圏外/売切れ/非アクティブ/上位60外＝Home には出さない
                    reelRawVms.push(buildReelRaw(r, l, farmerMap.get(l.farmerId) || null, distanceMap.get(l.farmerId), serviceRate));
                }
            } catch (e) { /* リール取得失敗は無視＝既存Homeは壊さない */ }

            // ③ 近くの農家の魚（道路距離 昇順）
            const nearby = [...inStock]
                .filter(l => Number.isFinite(distanceMap.get(l.farmerId)))
                .sort((a, b) => distanceMap.get(a.farmerId) - distanceMap.get(b.farmerId))
                .slice(0, 10);
            // ④ 新着（createdAt desc で取得済み）
            const newest = inStock.slice(0, 10);

            // ⑤ おすすめ農家（評価順・同率は件数多い順）。出品のある農家から。
            const fishTagsMap = {};
            for (const l of eligible) {
                if (!l.farmerId || !l.fishType) continue;
                (fishTagsMap[l.farmerId] = fishTagsMap[l.farmerId] || new Set()).add(fishName(l.fishType));
            }
            const farmerTagArr = {};
            Object.keys(fishTagsMap).forEach(fid => { farmerTagArr[fid] = [...fishTagsMap[fid]]; });
            const farmers = [...new Set(eligible.map(l => l.farmerId).filter(Boolean))]
                .map(fid => { const f = farmerMap.get(fid); return f ? { ...f, id: fid } : null; })
                .filter(Boolean)
                .sort((a, b) => {
                    const r = (Number(b.avgRating || 0)) - (Number(a.avgRating || 0));
                    if (r !== 0) return r;
                    return (Number(b.reviewCount || 0)) - (Number(a.reviewCount || 0));
                })
                .slice(0, 10);

            renderReels(reelRawVms);   // #201: ⚠ 商品カードより先に描画＝featuredReelIds を確定させてから🎬バッジ付き商品カードを出す
            renderProductRow('row-nearby', nearby, farmerMap, distanceMap, serviceRate, true);
            renderProductRow('row-newest', newest, farmerMap, distanceMap, serviceRate, false);
            renderFarmerRow(farmers, distanceMap, farmerTagArr);

            try {
                saveRenderState('home_catalog', {
                    nearby, newest,
                    farmers,
                    farmerTagArr,
                    farmerMap: Object.fromEntries(farmerMap),
                    distances: Object.fromEntries(distanceMap),
                    serviceRate,
                    reelVms: reelRawVms,   // #201: raw vm（JSON安全＝postedAt millis / fishType・province は raw）
                });
            } catch (e) { /* ignore */ }
        }

        // ── 検索 → fish-list.html に q を渡す ──
        document.getElementById('search-form').addEventListener('submit', (e) => {
            const q = document.getElementById('search-input').value.trim();
            if (!q) e.preventDefault();
        });

        // 🎬 #201: 新着リール カード / 「もっと見る」→ 全画面フィード（container 委譲＝innerHTML 差し替えでも生存）
        document.getElementById('reels-row').addEventListener('click', (e) => {
            const card = e.target.closest('[data-reel-idx]');
            if (card) openReelsFeedAt(+card.dataset.reelIdx);
        });
        document.getElementById('reels-more').addEventListener('click', (e) => {
            e.preventDefault();
            openReelsFeedAt(0);
        });

        // ── 農家ブロックタップ（商品カード内）→ 生産者ページ ──
        document.addEventListener('click', (e) => {
            // 6/4 #122④: 辞退カードの手動「×」→ Home の進行中から消す（辞退済み履歴は残す）
            const dismissEl = e.target.closest('[data-act="dismiss-decline"]');
            if (dismissEl) {
                e.preventDefault();
                e.stopPropagation();
                const oid = dismissEl.dataset.orderId;
                if (oid) {
                    addDismissedDecline(oid);
                    const card = dismissEl.closest('.order-card');
                    if (card) card.remove();
                    // セクションが空になったら見出しごと隠す
                    const row = document.getElementById('orders-row');
                    if (row && row.children.length === 0) document.getElementById('sec-orders').style.display = 'none';
                }
                return;
            }
            const farmerEl = e.target.closest('[data-act="view-farmer"]');
            if (farmerEl) {
                e.preventDefault();
                e.stopPropagation();
                const farmerId = farmerEl.dataset.farmerId;
                if (farmerId) location.href = `/pages/restaurant/farmer.html?id=${farmerId}`;
                return;
            }
            // 注文カード（div）→ 注文状況一覧。内側のリンク（他の農家を探す等）が優先。
            const orderEl = e.target.closest('.order-card[data-href]');
            if (orderEl && !e.target.closest('a')) {
                location.href = orderEl.dataset.href;
            }
        });

        // ── バッジ監視 ──
        function watchBadges() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const lastSeen = parseInt(localStorage.getItem('fishlink_orders_seen') || '0');
            const oq = query(collection(db, 'orders'), where('restaurantId', '==', uid));
            onSnapshot(oq, (snap) => {
                const hasNew = snap.docs.some(d => (d.data().createdAt?.toMillis?.() || 0) > lastSeen);
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
            subscribeCart(uid, (items) => {
                document.getElementById('cart-badge').style.display = items.length > 0 ? 'block' : 'none';
            });
        }

        // 言語切替: 動的描画部を作り直す（applyTranslations は data-i18n 要素のみ対象のため）
        onLanguageChange(() => {
            renderFishTiles();
            const cat = loadRenderState('home_catalog');
            if (cat) {
                const fmap = new Map(Object.entries(cat.farmerMap || {}));
                const dmap = new Map(Object.entries(cat.distances || {}));
                const sRate = cat.serviceRate ?? 0.05;
                renderReels(cat.reelVms || []);   // #201: 商品カードより先（featuredReelIds を確定・fishName/province を現在言語で再生成）
                renderProductRow('row-nearby', cat.nearby || [], fmap, dmap, sRate, true);
                renderProductRow('row-newest', cat.newest || [], fmap, dmap, sRate, false);
                renderFarmerRow(cat.farmers || [], dmap, cat.farmerTagArr || {});
            }
            const ord = loadRenderState('home_orders');
            if (ord?.orders) renderOrders(ord.orders);
        });

        // ── 描画キャッシュ確認 → HIT すれば即時表示（#69 stale-while-revalidate） ──
        let cachedRendered = false;
        try {
            renderFishTiles();
            const cat = loadRenderState('home_catalog');
            const ord = loadRenderState('home_orders');
            if (cat) {
                const fmap = new Map(Object.entries(cat.farmerMap || {}));
                const dmap = new Map(Object.entries(cat.distances || {}));
                const sRate = cat.serviceRate ?? 0.05;
                renderReels(cat.reelVms || []);   // #201: 商品カードより先＝featuredReelIds を確定させてから🎬バッジ付きカードを描画
                renderProductRow('row-nearby', cat.nearby || [], fmap, dmap, sRate, true);
                renderProductRow('row-newest', cat.newest || [], fmap, dmap, sRate, false);
                renderFarmerRow(cat.farmers || [], dmap, cat.farmerTagArr || {});
                if (ord?.orders) renderOrders(ord.orders);
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached home render failed:', e);
        }

        waitForUserData(async () => {
            if (!cachedRendered) renderFishTiles();
            const uid = window.currentUser?.uid;
            if (uid) {
                subscribeTodos(uid, 'restaurant');
                subscribeNotifications(uid);
            }
            watchBadges();
            try {
                await Promise.all([
                    loadOrders(uid),
                    loadCatalog({ skipSkeleton: cachedRendered }),
                ]);
            } catch (e) {
                console.error('home load failed:', e);
            } finally {
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
            }
        });
    </script>
</body>
</html>
