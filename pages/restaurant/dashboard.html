<!DOCTYPE html>
<html lang="km">
<!-- 5/12 #74: 新ダッシュボード（UberEats型）。
     旧ダッシュボード（魚一覧）は /pages/restaurant/fish-list.html に退避済み。
     「もっと見る」遷移は URL パラメータ（?sort=..., ?filter=..., ?fishType=...）で旧ダッシュへ。 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .nav-badge {
            position: absolute; top: 6px; right: 50%;
            transform: translateX(18px);
            background: #ef4444; width: 10px; height: 10px; border-radius: 50%;
        }

        .home-search {
            display: flex; align-items: center; gap: 8px;
            background: #f1f5f9; border-radius: 999px;
            padding: 10px 16px; margin: 0 16px 16px;
        }
        .home-search input {
            flex: 1; border: none; background: transparent;
            font-size: 14px; outline: none; font-family: inherit;
            color: var(--color-text);
        }
        .home-search .material-symbols-outlined { color: var(--color-text-sub); }

        /* 魚種カテゴリ：横スクロール */
        .category-row {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 0 16px 4px; margin-bottom: 18px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .category-row::-webkit-scrollbar { display: none; }
        .category-item {
            flex-shrink: 0; width: 72px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            text-decoration: none; color: inherit;
        }
        .category-item__icon {
            width: 64px; height: 64px;
            border-radius: 50%; background: #ecfdf5;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #d1fae5;
            overflow: hidden;
        }
        .category-item__icon > img { width: 40px; height: 40px; object-fit: contain; }
        .category-item__label {
            font-size: 11px; font-weight: 600;
            color: var(--color-text); text-align: center;
            line-height: 1.2; word-break: break-word;
        }

        /* テーマ別棚 */
        .shelf { margin-bottom: 24px; }
        .shelf__head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; margin-bottom: 10px;
        }
        .shelf__title {
            font-size: 16px; font-weight: 700; color: var(--color-text);
            display: flex; align-items: center; gap: 6px;
        }
        .shelf__title .material-symbols-outlined { font-size: 18px; color: #0d6e4c; }
        .shelf__more {
            font-size: 12px; font-weight: 600; color: #0d6e4c;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 2px;
        }
        .shelf__more .material-symbols-outlined { font-size: 16px; }
        .shelf__row {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 0 16px 4px; scrollbar-width: none; -ms-overflow-style: none;
        }
        .shelf__row::-webkit-scrollbar { display: none; }

        /* カード */
        .home-card {
            flex-shrink: 0; width: 168px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px; overflow: hidden;
            text-decoration: none; color: inherit;
            display: flex; flex-direction: column;
        }
        .home-card__img {
            width: 100%; aspect-ratio: 1 / 1;
            background: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .home-card__img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .home-card__body { padding: 8px 10px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .home-card__name { font-size: 13px; font-weight: 700; color: var(--color-text); line-height: 1.3; }
        .home-card__size { font-size: 11px; color: var(--color-text-sub); }
        .home-card__price { font-size: 14px; font-weight: 700; color: var(--color-text); margin-top: 2px; }
        .home-card__price-unit { font-size: 11px; font-weight: 500; color: var(--color-text-sub); margin-left: 2px; }
        .home-card__stock { font-size: 11px; color: #047857; }
        .home-card__stock--out { color: #b91c1c; }
        .home-card__farmer {
            font-size: 11px; color: var(--color-text-sub);
            display: flex; align-items: center; gap: 3px; margin-top: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .home-card__farmer .material-symbols-outlined { font-size: 12px; color: #f59e0b; font-variation-settings: 'FILL' 1; }

        .shelf__empty {
            padding: 14px; margin: 0 16px;
            background: #f8fafc; border-radius: 12px;
            color: var(--color-text-sub); font-size: 13px;
            text-align: center;
        }
        .shelf__skeleton {
            flex-shrink: 0; width: 168px; height: 220px;
            background: linear-gradient(90deg, #f1f5f9, #e2e8f0, #f1f5f9);
            background-size: 200% 100%;
            border-radius: 14px;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page" style="padding-bottom: 120px; max-width:480px; margin:0 auto;">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/restaurant/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 検索バー -->
        <div style="padding: 12px 0;">
            <form class="home-search" id="search-form" action="/pages/restaurant/fish-list.html" method="get">
                <span class="material-symbols-outlined">search</span>
                <input type="search" name="q" id="search-input" data-i18n="[placeholder]restaurant.searchPlaceholder">
            </form>
        </div>

        <!-- 魚種カテゴリ -->
        <div class="category-row" id="category-row"></div>

        <!-- テーマ別棚 -->
        <div class="shelf">
            <div class="shelf__head">
                <span class="shelf__title">
                    <span class="material-symbols-outlined">near_me</span>
                    <span data-i18n="restaurant.shelfNearest"></span>
                </span>
                <a class="shelf__more" href="/pages/restaurant/fish-list.html?sort=distance">
                    <span data-i18n="restaurant.loadMore"></span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
            <div class="shelf__row" id="shelf-nearest"></div>
        </div>

        <div class="shelf">
            <div class="shelf__head">
                <span class="shelf__title">
                    <span class="material-symbols-outlined">star</span>
                    <span data-i18n="restaurant.shelfTopRated"></span>
                </span>
                <a class="shelf__more" href="/pages/restaurant/fish-list.html?sort=rating">
                    <span data-i18n="restaurant.loadMore"></span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
            <div class="shelf__row" id="shelf-rated"></div>
        </div>

        <div class="shelf">
            <div class="shelf__head">
                <span class="shelf__title">
                    <span class="material-symbols-outlined">new_releases</span>
                    <span data-i18n="restaurant.shelfNewest"></span>
                </span>
                <a class="shelf__more" href="/pages/restaurant/fish-list.html?sort=newest">
                    <span data-i18n="restaurant.loadMore"></span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
            <div class="shelf__row" id="shelf-newest"></div>
        </div>

        <div class="shelf">
            <div class="shelf__head">
                <span class="shelf__title">
                    <span class="material-symbols-outlined">payments</span>
                    <span data-i18n="restaurant.shelfCheapest"></span>
                </span>
                <a class="shelf__more" href="/pages/restaurant/fish-list.html?sort=price">
                    <span data-i18n="restaurant.loadMore"></span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
            <div class="shelf__row" id="shelf-cheapest"></div>
        </div>

        <div class="shelf">
            <div class="shelf__head">
                <span class="shelf__title">
                    <span class="material-symbols-outlined">history</span>
                    <span data-i18n="restaurant.shelfHistory"></span>
                </span>
                <a class="shelf__more" href="/pages/restaurant/fish-list.html?filter=history">
                    <span data-i18n="restaurant.loadMore"></span>
                    <span class="material-symbols-outlined">chevron_right</span>
                </a>
            </div>
            <div class="shelf__row" id="shelf-history"></div>
        </div>

    </div>

    <!-- 下部ナビ -->
    <nav class="bottom-nav">
        <a href="/pages/restaurant/dashboard.html" class="bottom-nav__item active">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">storefront</span></span>
            <span data-i18n="restaurant.navHome"></span>
        </a>
        <a href="/pages/restaurant/fish-list.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="restaurant.title"></span>
        </a>
        <a href="/pages/restaurant/cart.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">shopping_cart</span></span>
            <span class="nav-badge" id="cart-badge" style="display:none;"></span>
            <span data-i18n="cart.navCart"></span>
        </a>
        <a href="/pages/restaurant/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">local_shipping</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="delivery.myOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, orderBy, limit, getDocs, doc, getDoc, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { subscribeCart } from '/js/cart.js';
        // 5/12 #69 追補：同一タブ内で users/{uid} を再利用してリクエスト数を削減
        import { getCachedUser, getCachedDoc } from '/js/data-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        // 5/12 #74: 魚種カテゴリは CAA 参考価格の 10 種を流用（CLAUDE.md 参照）
        const FISH_CATEGORIES = [
            'striped_snakehead', 'walking_catfish', 'red_tilapia', 'nile_tilapia',
            'silver_barb', 'spot_pangasius', 'pangasius', 'giant_snakehead',
            'climbing_perch', 'frog',
        ];

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 距離計算（簡易：Haversine。Distance Matrix は重いのでホーム画面ではスキップ）
        function haversine(a, b) {
            if (!a || !b) return Infinity;
            const R = 6371;
            const dLat = (b.lat - a.lat) * Math.PI / 180;
            const dLng = (b.lng - a.lng) * Math.PI / 180;
            const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
        }

        // 魚種カテゴリ描画
        function renderCategories() {
            const row = document.getElementById('category-row');
            row.innerHTML = FISH_CATEGORIES.map(key => {
                const label = i18next.exists(`fish.${key}`) ? i18next.t(`fish.${key}`) : key;
                return `
                    <a class="category-item" href="/pages/restaurant/fish-list.html?fishType=${encodeURIComponent(key)}">
                        <div class="category-item__icon">
                            <img src="/images/role-fish.svg" alt="">
                        </div>
                        <div class="category-item__label">${escapeHtml(label)}</div>
                    </a>
                `;
            }).join('');
        }

        // 共通カード描画
        function renderCard(listing, farmer, distanceKm, serviceRate) {
            const fishType = listing.fishType || '';
            const fishName = i18next.exists(`fish.${fishType}`) ? i18next.t(`fish.${fishType}`) : fishType;
            const unitPrice = Math.round(((listing.price || 0) + (listing.gutPrice || 0)) * (1 + serviceRate));
            const photo = listing.photoUrl || (listing.photos?.[0]);
            const stock = Number(listing.stock || 0);
            const farmerName = farmer?.displayName || '';
            const rating = Number(farmer?.avgRating || 0);
            const distText = Number.isFinite(distanceKm) ? `${distanceKm.toFixed(1)} km` : '';

            return `
                <a class="home-card" href="/pages/restaurant/order.html?id=${listing.id}">
                    <div class="home-card__img">
                        ${photo
                            ? `<img src="${photo}" alt="${escapeHtml(fishName)}" loading="lazy">`
                            : `<span class="material-symbols-outlined" style="font-size:36px; color:#94a3b8;">set_meal</span>`
                        }
                    </div>
                    <div class="home-card__body">
                        <div class="home-card__name">${escapeHtml(fishName)}</div>
                        <div class="home-card__size">${listing.size || ''} head/kg</div>
                        <div class="home-card__price">${unitPrice.toLocaleString()}<span class="home-card__price-unit">KHR/kg</span></div>
                        <div class="home-card__stock ${stock <= 0 ? 'home-card__stock--out' : ''}">
                            ${stock > 0 ? i18next.t('restaurant.stock', { kg: stock }) : i18next.t('order.stockUnavailable')}
                        </div>
                        <div class="home-card__farmer">
                            ${escapeHtml(farmerName)}
                            ${rating > 0 ? `<span class="material-symbols-outlined">star</span>${rating.toFixed(1)}` : ''}
                            ${distText ? ` · ${distText}` : ''}
                        </div>
                    </div>
                </a>
            `;
        }

        function renderShelf(elId, listings, farmerMap, myLoc, serviceRate, emptyMsg) {
            const row = document.getElementById(elId);
            if (!listings || listings.length === 0) {
                row.innerHTML = `<div class="shelf__empty" style="margin:0; flex:1;">${emptyMsg}</div>`;
                return;
            }
            row.innerHTML = listings.map(l => {
                const farmer = farmerMap.get(l.farmerId) || null;
                const dist = farmer?.location ? haversine(myLoc, farmer.location) : Infinity;
                return renderCard(l, farmer, dist, serviceRate);
            }).join('');
        }

        function setSkeletons(elIds) {
            for (const id of elIds) {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<div class="shelf__skeleton"></div><div class="shelf__skeleton"></div><div class="shelf__skeleton"></div>';
            }
        }

        // データ取得
        async function loadShelves() {
            const shelfIds = ['shelf-nearest', 'shelf-rated', 'shelf-newest', 'shelf-cheapest', 'shelf-history'];
            setSkeletons(shelfIds);

            const uid = window.currentUser?.uid;
            const myLoc = window.currentUserData?.location || null;

            // サービス料率
            let serviceRate = 0.05;
            try {
                const campSnap = await getDoc(doc(db, 'settings', 'campaign'));
                if (campSnap.exists()) serviceRate = campSnap.data().serviceRate ?? 0.05;
            } catch (e) { /* ignore */ }

            // 一度に最新の出品を多めに取得（クライアント側で各棚に振り分け）
            const baseQ = query(
                collection(db, 'fishListings'),
                where('isActive', '==', true),
                orderBy('createdAt', 'desc'),
                limit(60)
            );
            const snap = await getDocs(baseQ);
            const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // 農家データ一括取得（5/12 #69：data-cache 経由でセッション内重複を抑止）
            const farmerIds = [...new Set(listings.map(l => l.farmerId).filter(Boolean))];
            const farmerMap = new Map();
            await Promise.all(farmerIds.map(async (fid) => {
                try {
                    const data = await getCachedUser(fid);
                    if (data) farmerMap.set(fid, data);
                } catch (e) { /* ignore */ }
            }));

            // 棚①：近くの農家（haversine 距離で昇順）
            const nearest = [...listings]
                .filter(l => farmerMap.get(l.farmerId)?.location && myLoc)
                .sort((a, b) => {
                    const da = haversine(myLoc, farmerMap.get(a.farmerId).location);
                    const db_ = haversine(myLoc, farmerMap.get(b.farmerId).location);
                    return da - db_;
                })
                .slice(0, 10);

            // 棚②：評価が高い農家
            const topRated = [...listings]
                .sort((a, b) => (farmerMap.get(b.farmerId)?.avgRating || 0) - (farmerMap.get(a.farmerId)?.avgRating || 0))
                .slice(0, 10);

            // 棚③：新着（既に createdAt desc で取れているので先頭から）
            const newest = listings.slice(0, 10);

            // 棚④：安い魚（サービス料込み単価で昇順）
            const cheapest = [...listings]
                .sort((a, b) => ((a.price || 0) + (a.gutPrice || 0)) - ((b.price || 0) + (b.gutPrice || 0)))
                .slice(0, 10);

            // 棚⑤：過去注文した商品
            let history = [];
            try {
                const hq = query(
                    collection(db, 'orders'),
                    where('restaurantId', '==', uid),
                    orderBy('createdAt', 'desc'),
                    limit(30)
                );
                const hSnap = await getDocs(hq);
                const seenIds = new Set();
                const historyIds = [];
                hSnap.forEach(d => {
                    const data = d.data();
                    const items = Array.isArray(data.items) ? data.items : [];
                    for (const it of items) {
                        if (it?.listingId && !seenIds.has(it.listingId)) {
                            seenIds.add(it.listingId);
                            historyIds.push(it.listingId);
                        }
                    }
                    // legacy 単品 order
                    if (data.listingId && !seenIds.has(data.listingId)) {
                        seenIds.add(data.listingId);
                        historyIds.push(data.listingId);
                    }
                });
                // 履歴 ID から既に取得済みの listings を引く + 不足分は追加取得（data-cache 経由）
                const inListings = new Map(listings.map(l => [l.id, l]));
                const stillNeeded = historyIds.filter(id => !inListings.has(id)).slice(0, 10);
                if (stillNeeded.length > 0) {
                    await Promise.all(stillNeeded.map(async (id) => {
                        try {
                            const data = await getCachedDoc('fishListings', id);
                            if (data) inListings.set(id, { id, ...data });
                        } catch (e) { /* ignore */ }
                    }));
                }
                history = historyIds.map(id => inListings.get(id)).filter(Boolean).slice(0, 10);
                // 履歴に必要な農家データも補完（data-cache 経由）
                const extraFarmerIds = history.map(l => l.farmerId).filter(fid => fid && !farmerMap.has(fid));
                await Promise.all(extraFarmerIds.map(async (fid) => {
                    try {
                        const data = await getCachedUser(fid);
                        if (data) farmerMap.set(fid, data);
                    } catch (e) { /* ignore */ }
                }));
            } catch (e) { console.warn('history shelf failed:', e); }

            // 描画
            const emptyMsg = i18next.t('restaurant.noResults');
            renderShelf('shelf-nearest', nearest, farmerMap, myLoc, serviceRate, emptyMsg);
            renderShelf('shelf-rated', topRated, farmerMap, myLoc, serviceRate, emptyMsg);
            renderShelf('shelf-newest', newest, farmerMap, myLoc, serviceRate, emptyMsg);
            renderShelf('shelf-cheapest', cheapest, farmerMap, myLoc, serviceRate, emptyMsg);
            renderShelf('shelf-history', history, farmerMap, myLoc, serviceRate, i18next.t('restaurant.shelfHistoryEmpty'));
        }

        // 検索 → fish-list.html に q を渡す
        document.getElementById('search-form').addEventListener('submit', (e) => {
            // デフォルト動作（GET 遷移）を使う。q が空のときは無視。
            const q = document.getElementById('search-input').value.trim();
            if (!q) { e.preventDefault(); }
        });

        // 通知バッジ・カートバッジ・注文バッジ（既存 dashboard 同様）
        function watchBadges() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            // 注文バッジ
            const lastSeen = parseInt(localStorage.getItem('fishlink_orders_seen') || '0');
            const oq = query(collection(db, 'orders'), where('restaurantId', '==', uid));
            onSnapshot(oq, (snap) => {
                const hasNew = snap.docs.some(d => (d.data().createdAt?.toMillis?.() || 0) > lastSeen);
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
            // カートバッジ
            subscribeCart(uid, (items) => {
                document.getElementById('cart-badge').style.display = items.length > 0 ? 'block' : 'none';
            });
        }

        waitForUserData(async () => {
            renderCategories();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
            }
            watchBadges();
            try {
                await loadShelves();
            } catch (e) {
                console.error('loadShelves failed:', e);
            } finally {
                loading.classList.remove('show');
            }
        });
    </script>
</body>
</html>
