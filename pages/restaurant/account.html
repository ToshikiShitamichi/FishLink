<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .acc-menu-page { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }
        .acc-menu-head { padding: 16px 0; }
        .acc-menu-head__sub { font-size: 12px; color: var(--color-text-sub); }
        .acc-menu-head__name { font-size: 22px; font-weight: 700; margin-top: 4px; }
        .acc-menu-head__id { font-size: 13px; color: var(--color-text-sub); margin-top: 2px; }
        .acc-menu-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
        .acc-menu-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none; color: inherit;
        }
        .acc-menu-item:hover { background: #f8fafc; }
        .acc-menu-item__icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: #eef2ff; color: #3730a3;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .acc-menu-item__body { flex: 1; min-width: 0; }
        .acc-menu-item__title { font-size: 15px; font-weight: 700; }
        .acc-menu-item__meta { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .acc-menu-item__chev { color: #cbd5e1; flex-shrink: 0; }
        .logout-btn-full {
            width: 100%;
            background: #fef2f2; color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 14px;
            padding: 12px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-top: 20px;
        }
        .nav-badge { position: absolute; top: 6px; right: 50%; transform: translateX(18px); background: #ef4444; width: 10px; height: 10px; border-radius: 50%; }

        /* 5/23 #82 Phase 1: 紹介コードカード */
        .referral-card {
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            border: 1px solid #a7f3d0;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .referral-card__head {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 700; color: #065f46;
            margin-bottom: 4px;
        }
        .referral-card__head .material-symbols-outlined { font-size: 18px; }
        .referral-card__desc {
            font-size: 11px; color: #047857;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .referral-card__code {
            background: #fff;
            border: 1px solid #a7f3d0;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-family: monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #065f46;
            margin-bottom: 10px;
            user-select: all;
        }
        .referral-card__actions { display: flex; gap: 8px; }
        .referral-card__btn {
            flex: 1;
            background: #fff;
            border: 1px solid #a7f3d0;
            color: #065f46;
            border-radius: 999px;
            padding: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .referral-card__btn .material-symbols-outlined { font-size: 16px; }
        .referral-card__btn--primary {
            background: #0d6e4c;
            color: #fff;
            border-color: #0d6e4c;
        }
        .referral-card__phase-note {
            font-size: 10px; color: #047857;
            text-align: center;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="acc-menu-page">

            <div class="acc-menu-head">
                <div class="acc-menu-head__sub" data-i18n="role.restaurant"></div>
                <div class="acc-menu-head__name" id="display-name">-</div>
                <div class="acc-menu-head__id" id="login-id">-</div>
            </div>

            <!-- 5/23 #82 Phase 1: 紹介コードカード -->
            <div class="referral-card">
                <div class="referral-card__head">
                    <span class="material-symbols-outlined">card_giftcard</span>
                    <span data-i18n="referral.cardTitle"></span>
                </div>
                <div class="referral-card__desc" data-i18n="referral.cardDescRestaurant"></div>
                <div class="referral-card__code" id="referral-code">--------</div>
                <div class="referral-card__actions">
                    <button type="button" id="referral-copy" class="referral-card__btn">
                        <span class="material-symbols-outlined">content_copy</span>
                        <span data-i18n="referral.copy"></span>
                    </button>
                    <button type="button" id="referral-share" class="referral-card__btn referral-card__btn--primary">
                        <span class="material-symbols-outlined">share</span>
                        <span data-i18n="referral.share"></span>
                    </button>
                </div>
                <div class="referral-card__phase-note" data-i18n="referral.phase1Note"></div>
            </div>

            <div class="acc-menu-list">
                <a class="acc-menu-item" href="/pages/restaurant/account/basic.html">
                    <div class="acc-menu-item__icon"><span class="material-symbols-outlined">person</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.basic"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintBasic"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/restaurant/account/payment.html">
                    <div class="acc-menu-item__icon" style="background:#fef3c7; color:#92400e;"><span class="material-symbols-outlined">account_balance_wallet</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.payment"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintPayment"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/restaurant/account/purchases.html">
                    <div class="acc-menu-item__icon" style="background:#dcfce7; color:#166534;"><span class="material-symbols-outlined">shopping_cart</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.purchaseTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintPurchase"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 5/12 #72: 「レストラン情報」のメニュー項目自体を公開ページへの導線に。
                     編集は公開ページ内の「プロフィールを編集」ボタンから入る。 -->
                <a class="acc-menu-item" id="public-page-link" href="#">
                    <div class="acc-menu-item__icon" style="background:#ede9fe; color:#5b21b6;"><span class="material-symbols-outlined">storefront</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="profile.restaurantInfoTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintProfileRestaurant"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/admin-chat.html" style="position:relative;">
                    <div class="acc-menu-item__icon" style="background:#ddd6fe; color:#5b21b6;"><span class="material-symbols-outlined">support_agent</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.adminChat"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.adminChatHint"></div>
                    </div>
                    <span class="nav-badge" id="admin-chat-badge" style="display:none; top:14px; right:50px; transform:none;"></span>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>
            </div>

            <button class="logout-btn-full" id="logout-btn">
                <span class="material-symbols-outlined">logout</span>
                <span data-i18n="account.logout"></span>
            </button>
        </div>
    </div>

    <!-- 5/12 #74: 4タブ構成（ホーム / 魚一覧 / カート / 配送中）に変更 -->
    <nav class="bottom-nav">
        <a href="/pages/restaurant/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">storefront</span></span>
            <span data-i18n="restaurant.navHome"></span>
        </a>
        <a href="/pages/restaurant/fish-list.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="restaurant.title"></span>
        </a>
        <a href="/pages/restaurant/cart.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">shopping_cart</span></span>
            <span class="nav-badge" id="cart-badge" style="display:none;"></span>
            <span data-i18n="cart.navCart"></span>
        </a>
        <a href="/pages/restaurant/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">local_shipping</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="delivery.myOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import { subscribeCart } from '/js/cart.js';
        import {
            collection, query, where, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/23 #82 Phase 1: 紹介コード
        import { ensureUserReferralCode } from '/js/referral.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function renderHead() {
            const d = window.currentUserData || {};
            document.getElementById('display-name').textContent = d.displayName || '-';
            document.getElementById('login-id').textContent = d.loginId ? `@${d.loginId}` : '';
        }

        function watchOrderBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const lastSeen = parseInt(localStorage.getItem('fishlink_rest_orders_seen') || '0');
            const q = query(collection(db, 'orders'), where('restaurantId', '==', uid));
            onSnapshot(q, (snap) => {
                const hasNew = snap.docs.some(d => {
                    const t = d.data().createdAt?.toMillis?.() || 0;
                    return t > lastSeen;
                });
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
        }

        function watchAdminChatBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const q = query(
                collection(db, `adminChats/${uid}/messages`),
                where('senderRole', '==', 'admin'),
                where('isRead', '==', false)
            );
            onSnapshot(q, (snap) => {
                const badge = document.getElementById('admin-chat-badge');
                if (badge) badge.style.display = snap.empty ? 'none' : 'block';
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        // 5/23 #82 Phase 1: 紹介コードの表示・コピー・シェア
        async function showReferralCode() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            let code = '--------';
            try {
                code = await ensureUserReferralCode(uid, window.currentUserData);
            } catch (e) {
                console.warn('ensureUserReferralCode failed:', e);
                return;
            }
            document.getElementById('referral-code').textContent = code;

            document.getElementById('referral-copy').addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(code);
                    alert(i18next.t('referral.copied'));
                } catch (e) {
                    // 古いブラウザ向けフォールバック
                    const ta = document.createElement('textarea');
                    ta.value = code;
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand('copy'); } catch (_) { /* ignore */ }
                    ta.remove();
                    alert(i18next.t('referral.copied'));
                }
            });

            document.getElementById('referral-share').addEventListener('click', async () => {
                const shareText = i18next.t('referral.shareText', { code });
                if (navigator.share) {
                    try {
                        await navigator.share({ text: shareText });
                    } catch (e) { /* ユーザーキャンセル */ }
                } else {
                    try {
                        await navigator.clipboard.writeText(shareText);
                        alert(i18next.t('referral.copied'));
                    } catch (e) { /* ignore */ }
                }
            });
        }

        waitForUserData(() => {
            renderHead();
            watchOrderBadge();
            watchAdminChatBadge();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
                subscribeCart(window.currentUser.uid, (items) => {
                    const badge = document.getElementById('cart-badge');
                    if (badge) badge.style.display = items.length > 0 ? 'block' : 'none';
                });
                // 5/12 #72: 公開ページは自分の uid を渡して開く
                const link = document.getElementById('public-page-link');
                if (link) link.href = `/pages/farmer/restaurant.html?id=${window.currentUser.uid}`;
                // 5/23 #82 Phase 1: 紹介コード表示
                showReferralCode();
            }
            // 5/23 #69 Phase C: 初期スピナー解除
            document.body.classList.add('app-ready');
        });

        onLanguageChange(() => renderHead());
    </script>
</body>

</html>
