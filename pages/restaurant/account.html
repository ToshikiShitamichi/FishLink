<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .acc-menu-page { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }
        .acc-menu-head { padding: 16px 0; }
        .acc-menu-head__sub { font-size: 12px; color: var(--color-text-sub); }
        .acc-menu-head__name { font-size: 22px; font-weight: 700; margin-top: 4px; }
        /* 6/22 #164: マイページ top にアバター表示（公開ページで設定した avatarUrl・表示のみ・未設定はデフォルト） */
        .acc-profile { display: flex; align-items: center; gap: 14px; padding: 16px 0; }
        .acc-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: #e3ecf6; border: 1px solid #d7e1ed;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; color: var(--color-text-sub);
        }
        .acc-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .acc-avatar .material-symbols-outlined { font-size: 32px; }
        /* 6/22 #164: 紹介行の動的サブ文言＝青アクセント／返金先「未登録」＝中立グレー */
        .acc-menu-item__meta--accent { color: var(--color-cta); font-weight: 600; }
        .acc-menu-item__meta--muted { color: var(--color-text-sub); }
        .acc-menu-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
        .acc-menu-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none; color: inherit;
        }
        .acc-menu-item:hover { background: #f8fafc; }
        .acc-menu-item__icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: #eef2ff; color: #3730a3;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .acc-menu-item__body { flex: 1; min-width: 0; }
        .acc-menu-item__title { font-size: 15px; font-weight: 700; }
        .acc-menu-item__meta { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .acc-menu-item__chev { color: #cbd5e1; flex-shrink: 0; }
        /* 6/22 #164: ログアウトは破壊的でない＝中立グレー（赤は削除など danger 専用） */
        .logout-btn-full {
            width: 100%;
            background: var(--color-surface); color: var(--color-text-sub);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-top: 20px;
        }
        .nav-badge { position: absolute; top: 6px; right: 50%; transform: translateX(18px); background: #ef4444; width: 10px; height: 10px; border-radius: 50%; }

        /* 6/22 #164: 紹介コードカード／使えるクーポン一覧カードは 1行メニュー化で廃止（CSS も削除）。
           コード/コピー/シェアは紹介専用ページ（account/referral.html）へ移動。 */
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FISHLINK" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="acc-menu-page">

            <!-- 6/22 #164: プロフィールヘッダー（アバター＋役割＋表示名・@ハンドルは出さない） -->
            <div class="acc-profile">
                <div class="acc-avatar" id="avatar"><span class="material-symbols-outlined">person</span></div>
                <div>
                    <div class="acc-menu-head__sub" data-i18n="role.restaurant"></div>
                    <div class="acc-menu-head__name" id="display-name">-</div>
                </div>
            </div>

            <!-- 6/22 #164: 並び順＝基本情報→レストラン情報→返金先→購入・取引→紹介→運営メッセージ -->
            <div class="acc-menu-list">
                <a class="acc-menu-item" href="/pages/restaurant/account/basic.html">
                    <div class="acc-menu-item__icon"><span class="material-symbols-outlined">person</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.basic"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintBasic"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/11 #137 §10: 「レストラン情報」はプロフィール編集画面へ。公開プレビューは
                     編集画面内の「公開ページをプレビュー」リンクから（公開ページに編集導線は置かない）。
                     6/22 #164: 基本情報のすぐ下＝公開ページ。サブは「農家に公開される〜」。 -->
                <a class="acc-menu-item" href="/pages/restaurant/account/profile.html">
                    <div class="acc-menu-item__icon" style="background:#ede9fe; color:#5b21b6;"><span class="material-symbols-outlined">storefront</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="profile.restaurantInfoTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintProfileRestaurant"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/27 #176: ウォレット（買い手専用・案B 前払いの返金が貯まる）。返金先の上。
                     サブ＝残高（wallets/{uid}.balance を JS で出す）。 -->
                <a class="acc-menu-item" href="/pages/restaurant/wallet.html">
                    <div class="acc-menu-item__icon" style="background:#eaf2fb; color:#0b5fb0;"><span class="material-symbols-outlined">account_balance_wallet</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.wallet"></div>
                        <div class="acc-menu-item__meta acc-menu-item__meta--accent" id="wallet-sub"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/22 #164/#167: 「支払い情報」→「返金先」（買い手は KHQR 払いなので口座は返金用）。
                     サブは未登録＝中立グレー「未登録」／登録済＝説明文（JS で出し分け）。 -->
                <a class="acc-menu-item" href="/pages/restaurant/account/payment.html">
                    <div class="acc-menu-item__icon" style="background:#eef2f6; color:#475569;"><span class="material-symbols-outlined">account_balance_wallet</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.refund"></div>
                        <div class="acc-menu-item__meta" id="refund-sub" data-i18n="account.menuHintRefund"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/restaurant/account/purchases.html">
                    <div class="acc-menu-item__icon" style="background:#dcfce7; color:#166534;"><span class="material-symbols-outlined">shopping_cart</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.purchaseTradeTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintPurchase"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/22 #164: 紹介＝1行メニュー化（巨大カード廃止）。サブ文言は状態で動的（金額は運営設定）。
                     コード/コピー/シェアは紹介専用ページ（account/referral.html）。 -->
                <a class="acc-menu-item" href="/pages/restaurant/account/referral.html">
                    <div class="acc-menu-item__icon" style="background:#fbf0dc; color:#b45309;"><span class="material-symbols-outlined">redeem</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.referralBuyer"></div>
                        <div class="acc-menu-item__meta acc-menu-item__meta--accent" id="referral-sub"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/admin-chat.html" style="position:relative;">
                    <div class="acc-menu-item__icon" style="background:#ddd6fe; color:#5b21b6;"><span class="material-symbols-outlined">support_agent</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.adminChat"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.adminChatHint"></div>
                    </div>
                    <span class="nav-badge" id="admin-chat-badge" style="display:none; top:14px; right:50px; transform:none;"></span>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 7/4 #189/§4: 規約・プラポリを別々に2行（情報・サポート）。登録後も常時アクセス（ストア要件）。 -->
                <a class="acc-menu-item" href="/terms.html">
                    <div class="acc-menu-item__icon" style="background:#eef2f6; color:#475569;"><span class="material-symbols-outlined">description</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="terms.title"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>
                <a class="acc-menu-item" href="/privacy.html">
                    <div class="acc-menu-item__icon" style="background:#eef2f6; color:#475569;"><span class="material-symbols-outlined">lock</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="privacy.title"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>
            </div>

            <button class="logout-btn-full" id="logout-btn">
                <span class="material-symbols-outlined">logout</span>
                <span data-i18n="account.logout"></span>
            </button>
        </div>
    </div>

    <!-- 5/12 #74: 4タブ構成（ホーム / 魚一覧 / カート / 配送中）に変更 -->
    <nav class="bottom-nav">
        <a href="/pages/restaurant/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">storefront</span></span>
            <span data-i18n="restaurant.navHome"></span>
        </a>
        <a href="/pages/restaurant/fish-list.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="restaurant.title"></span>
        </a>
        <a href="/pages/restaurant/cart.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">shopping_cart</span></span>
            <span class="nav-badge" id="cart-badge" style="display:none;"></span>
            <span data-i18n="cart.navCart"></span>
        </a>
        <a href="/pages/restaurant/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">local_shipping</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="delivery.myOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import { subscribeCart } from '/js/cart.js';
        import {
            collection, query, where, onSnapshot, getDocs, getDoc, doc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/22 #164: アバター画像（公開ページで設定した avatarUrl・表示のみ・未設定はデフォルト）
        import { asCachedImgAttrs } from '/js/image-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function renderHead() {
            const d = window.currentUserData || {};
            document.getElementById('display-name').textContent = d.displayName || '-';
            // 6/22 #164: アバター（avatarUrl・未設定はデフォルトの人型アイコン）
            const av = document.getElementById('avatar');
            if (av) {
                av.innerHTML = d.avatarUrl
                    ? `<img ${asCachedImgAttrs(d.avatarUrl)} alt="">`
                    : `<span class="material-symbols-outlined">person</span>`;
            }
            renderRefundStatus();
        }

        // 6/22 #164/#167: 返金先の登録状態をマイページ行に出す（未登録＝中立グレー「未登録」／登録済＝説明文）。
        function renderRefundStatus() {
            const el = document.getElementById('refund-sub');
            if (!el) return;
            const r = window.currentUserData?.refundAccount;
            const registered = !!(r && r.name && (r.qrLink || r.qrImage));
            if (registered) {
                el.textContent = i18next.t('account.menuHintRefund');
                el.classList.remove('acc-menu-item__meta--muted');
            } else {
                el.textContent = i18next.t('account.notRegistered');
                el.classList.add('acc-menu-item__meta--muted');
            }
        }

        // 6/27 #176: ウォレット残高（TDZ回避のため、これを参照する applyAccountCache IIFE より前に宣言）
        let walletBalance = 0;
        // 6/22 #164 / 6/27 #176: 紹介行・ウォレット行のサブ文言を即時復元（非同期算出分）
        (function applyAccountCache() {
            try {
                const cached = loadRenderState('restaurant_account');
                if (cached && cached.referralSub != null) {
                    const el = document.getElementById('referral-sub');
                    if (el) el.textContent = cached.referralSub;
                }
                if (cached && cached.walletBalance != null) {
                    walletBalance = Number(cached.walletBalance);
                    renderWalletSub();
                }
            } catch (e) { /* ignore */ }
        })();
        function saveAccountRender() {
            try {
                saveRenderState('restaurant_account', {
                    referralSub: document.getElementById('referral-sub')?.textContent || '',
                    walletBalance,
                });
            } catch (e) { /* ignore */ }
        }

        // 6/27 #176: ウォレット残高（wallets/{uid}.balance）をマイページ行のサブに出す。
        async function computeWalletSub() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            try {
                const wsnap = await getDoc(doc(db, 'wallets', uid));
                walletBalance = wsnap.exists() ? Number(wsnap.data().balance || 0) : 0;
            } catch (e) {
                console.warn('computeWalletSub failed:', e);
                walletBalance = 0;
            }
            renderWalletSub();
        }
        function renderWalletSub() {
            const el = document.getElementById('wallet-sub');
            if (!el) return;
            // 2026-07-17 #210③: 桁区切りは 'en-US' 明示。引数なしの toLocaleString() は端末の既定ロケールに
            //   従うため、区切りが「.」になる端末で「41.000 KHR」に化ける（アプリの言語設定とは無関係）。
            el.textContent = i18next.t('account.walletBalance', { amount: Number(walletBalance || 0).toLocaleString('en-US') });
        }

        function watchOrderBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const lastSeen = parseInt(localStorage.getItem('fishlink_rest_orders_seen') || '0');
            const q = query(collection(db, 'orders'), where('restaurantId', '==', uid));
            onSnapshot(q, (snap) => {
                const hasNew = snap.docs.some(d => {
                    const t = d.data().createdAt?.toMillis?.() || 0;
                    return t > lastSeen;
                });
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
        }

        function watchAdminChatBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const q = query(
                collection(db, `adminChats/${uid}/messages`),
                where('senderRole', '==', 'admin'),
                where('isRead', '==', false)
            );
            onSnapshot(q, (snap) => {
                const badge = document.getElementById('admin-chat-badge');
                if (badge) badge.style.display = snap.empty ? 'none' : 'block';
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        // 6/22 #164: 紹介行の動的サブ文言（使えるクーポン枚数＋運営設定のクーポン額）。
        //   コード/コピー/シェアは紹介専用ページ（account/referral.html）に移動。
        //   クエリは ownerUid==uid のみ（複合 index 不要）でクライアント絞り込み。
        let referralState = null; // { enabled, amount, count }
        async function computeReferralSub() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            let count = 0, amount = 0, enabled = false;
            try {
                const snap = await getDocs(query(collection(db, 'coupons'), where('ownerUid', '==', uid)));
                const now = Date.now();
                count = snap.docs.map(d => d.data())
                    .filter(c => !c.usedAt && !c.usedOrderId)
                    .filter(c => { const exp = c.expiresAt?.toMillis?.(); return !exp || exp > now; })
                    .length;
                const settingsSnap = await getDoc(doc(db, 'settings', 'referral'));
                const settings = settingsSnap.exists() ? settingsSnap.data() : null;
                amount = Number(settings?.restaurantCouponKhr || 0);
                enabled = !!settings && settings.enabled === true && amount > 0;
            } catch (e) {
                console.warn('computeReferralSub failed:', e);
            }
            referralState = { enabled, amount, count };
            renderReferralSub();
        }
        function renderReferralSub() {
            const el = document.getElementById('referral-sub');
            if (!el) return;
            const s = referralState || { enabled: false, amount: 0, count: 0 };
            const amountStr = s.amount ? s.amount.toLocaleString('en-US') : '';
            if (s.count > 0) {
                el.textContent = i18next.t('account.referralSubBuyerActive', { count: s.count });
            } else if (s.enabled) {
                el.textContent = i18next.t('account.referralSubBuyerEmpty', { amount: amountStr });
            } else {
                el.textContent = i18next.t('account.referralSubDefault');
            }
        }

        waitForUserData(() => {
            renderHead();
            watchOrderBadge();
            watchAdminChatBadge();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'restaurant');
                subscribeNotifications(window.currentUser.uid);
                subscribeCart(window.currentUser.uid, (items) => {
                    const badge = document.getElementById('cart-badge');
                    if (badge) badge.style.display = items.length > 0 ? 'block' : 'none';
                });
                // 6/22 #164 / 6/27 #176: 紹介行・ウォレット行の動的サブ文言を算出（完了後にキャッシュ更新）
                Promise.all([computeReferralSub(), computeWalletSub()]).then(saveAccountRender);
            }
            // 5/23 #69 Phase C: 初期スピナー解除
            document.body.classList.add('app-ready');
        });

        onLanguageChange(() => { renderHead(); renderReferralSub(); renderWalletSub(); });
    </script>
</body>

</html>
