<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <!-- 5/27 #94: 注文カレンダー多言語対応のため flatpickr 導入（km/ja/en ロケール） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/km.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ja.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&libraries=geometry&loading=async" async defer></script>
    <style>
        .cart-page { max-width: 480px; margin: 0 auto; padding: 0 16px 180px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }

        .cart-empty {
            background: #fff;
            border: 1px dashed var(--color-border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: var(--color-text-sub);
            font-size: 14px;
        }
        .cart-empty__icon { font-size: 48px; color: #cbd5e1; margin-bottom: 10px; }
        .cart-empty__cta {
            display: inline-block; margin-top: 14px;
            background: var(--color-cta); color: #fff;
            padding: 10px 20px; border-radius: 22px;
            font-size: 13px; font-weight: 700; text-decoration: none;
        }

        .farmer-group {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .farmer-group__head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .farmer-group__name {
            font-size: 15px; font-weight: 700; color: var(--color-text);
            display: flex; align-items: center; gap: 6px;
        }
        .farmer-group__meta { font-size: 11px; color: var(--color-text-sub); }

        .cart-item {
            display: flex; gap: 10px;
            padding: 10px 0;
            border-top: 1px solid #f1f5f9;
        }
        .cart-item__img {
            width: 64px; height: 64px; border-radius: 10px;
            background: #e2e8f0;
            flex-shrink: 0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-item__img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item__body { flex: 1; min-width: 0; }
        .cart-item__name { font-size: 14px; font-weight: 700; }
        .cart-item__size { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .cart-item__price { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .cart-item__ctrl {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-top: 8px; gap: 10px; flex-wrap: wrap;
        }
        /* 6/21 #163②: 内臓処理トグル＋「外すと −525」ヒントを縦にグループ化（トグルの直下に置く） */
        .gut-group { display: flex; flex-direction: column; align-items: flex-end; }
        .qty-box {
            display: inline-flex; align-items: center; gap: 6px;
            background: #f8fafc; border-radius: 20px; padding: 3px 6px;
            flex: 0 0 auto;
            width: max-content;
        }
        .qty-box button {
            width: 24px; height: 24px; border-radius: 50%;
            border: 1px solid var(--color-border); background: #fff;
            font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex: 0 0 24px;
            padding: 0;
        }
        .qty-box button:disabled { opacity: 0.4; cursor: not-allowed; }
        /* 5/9 #61: 直接入力に対応するため input 化 */
        /* 6/3 #116: B2B は 100kg 超が普通。3〜4桁（最低「9999」）が収まる幅に拡張 */
        .qty-box__value {
            box-sizing: border-box;
            width: 60px;
            flex: 0 0 60px;
            font-size: 13px; font-weight: 700;
            text-align: center;
            border: 1px solid var(--color-border);
            background: #fff;
            border-radius: 10px;
            padding: 3px 2px;
            font-family: inherit;
            color: var(--color-text);
            min-width: 0;
            -moz-appearance: textfield;
        }
        .qty-box__value:focus {
            outline: none;
            border-color: var(--color-cta);
        }
        .qty-box__value::-webkit-outer-spin-button,
        .qty-box__value::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        /* 5/25 #87: 内臓処理 あり/なし の判別を明確化。チェックアイコン + 状態別文言で
           色だけでない視認性を確保。 */
        /* 5/27: 「+xxx KHR/kg」を改行して横幅を縮め、削除ボタンと横並びを維持 */
        /* 6/1 #111: 内臓処理トグルは中立グレー（緑=GAqP/成功 専用と混線させない）。
           あり/なしは check アイコン+文言で判別。 */
        .gut-chip {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; padding: 5px 10px; border-radius: 14px;
            background: #f1f5f9; color: var(--color-text-sub);
            border: 1px solid #e2e8f0; cursor: pointer;
            font-family: inherit; font-weight: 600;
            line-height: 1.2;
        }
        .gut-chip.active {
            background: #e2e8f0; color: var(--color-text);
            border-color: #cbd5e1;
        }
        .gut-chip .material-symbols-outlined { font-size: 14px; }
        /* 6/1 #111: 内臓処理ヒントはトグル直下にグループ化（中立グレー） */
        .gut-hint { font-size: 11px; color: var(--color-text-sub); margin-top: 4px; }
        /* 6/1 #111: 最低注文量の明示 */
        .min-order-note { font-size: 11px; color: var(--color-text-sub); margin-top: 4px; }
        /* 6/1 #111: 配送料の注記・送料無料 */
        .delivery-note { font-size: 11px; color: var(--color-text-sub); margin-top: 2px; line-height: 1.4; }
        .free-delivery { color: var(--color-primary); font-weight: 700; }

        /* 6/1 #111 → 6/3 #116: キャンペーン割引は amber 系（danger 赤は使わない）。
           カート／注文確認で同じ「軽い強調」に統一（🏷＋オレンジ文字・うっすらamber・重い全幅ボックスは廃止）。 */
        .group-breakdown__row.discount,
        .confirm-group__row.discount {
            color: #b36a00; font-weight: 700;
            background: #fff7e6;
            padding: 4px 8px;
            margin: 2px 0;
            border-radius: 8px;
        }
        .group-breakdown__row.discount .material-symbols-outlined,
        .confirm-group__row.discount .material-symbols-outlined {
            font-size: 14px; vertical-align: middle; margin-right: 3px;
        }

        .remove-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 12px;
            font-family: inherit;
        }
        .remove-btn:hover { background: #fee2e2; }
        .remove-btn .material-symbols-outlined { font-size: 14px; }

        .cart-item__subtotal {
            text-align: right; font-size: 13px; font-weight: 700; color: var(--color-text);
            margin-top: 6px;
        }

        .delivery-pick {
            display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
        }
        .delivery-pick > div { flex: 1; min-width: 130px; }
        .delivery-pick label { display: block; font-size: 11px; color: var(--color-text-sub); margin-bottom: 4px; font-weight: 600; }
        .delivery-pick input, .delivery-pick select {
            width: 100%; padding: 8px 10px;
            border: 1px solid var(--color-border); border-radius: 10px;
            font-size: 16px; font-family: inherit; background: #fff;
        }

        .group-breakdown {
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid #f1f5f9;
            font-size: 12px; color: var(--color-text-sub);
        }
        .group-breakdown__row {
            display: flex; justify-content: space-between; padding: 3px 0;
        }
        .group-breakdown__row.total {
            font-weight: 700; color: var(--color-text); font-size: 14px;
            margin-top: 6px; padding-top: 8px; border-top: 1px solid #e2e8f0;
        }
        .group-breakdown .discount { color: #dc2626; }

        /* 6/7 #134 C: クーポンウォレット（コード入力撤廃・1タップ適用・amber） */
        .cwallet-item {
            display: flex; align-items: center; gap: 10px;
            background: #fff7e6; border: 1px solid #f3d998;
            border-radius: 11px; padding: 11px 12px; margin-bottom: 8px;
            cursor: pointer;
        }
        .cwallet-item:last-child { margin-bottom: 0; }
        .cwallet-item.selected { border-color: #b36a00; box-shadow: inset 0 0 0 1px #b36a00; }
        .cwallet-item__main { flex: 1; min-width: 0; }
        .cwallet-item__amt { font-size: 13px; font-weight: 800; color: #b36a00; }
        .cwallet-item__meta { font-size: 11px; color: #9a7430; margin-top: 2px; }
        .cwallet-item__side { text-align: right; flex-shrink: 0; }
        .cwallet-item__on { font-size: 12px; font-weight: 800; color: #b36a00; }
        .cwallet-item__off { font-size: 12px; font-weight: 700; color: var(--color-cta); }
        .cwallet-item__rm { font-size: 11px; color: var(--color-cta); font-weight: 700; margin-top: 3px; }

        .grand-total-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 480px; margin: 0 auto;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            z-index: 10;
        }
        .grand-total-row {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 8px;
        }
        .grand-total-row__label { font-size: 13px; color: var(--color-text-sub); }
        /* 6/3 #116: 合計の金額は青（買い手が払う価格は全画面で青統一） */
        .grand-total-row__value { font-size: 22px; font-weight: 700; color: var(--color-cta); }
        .checkout-btn {
            width: 100%; padding: 14px;
            background: var(--color-cta); color: #fff;
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: inherit;
        }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .err-msg {
            font-size: 12px; color: #b91c1c;
            margin-top: 6px; text-align: center;
            display: none;
        }
        .err-msg.show { display: block; }

        /* Stage オーバーレイ（提案／確認） */
        .stage-page {
            display: none;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 180px;
        }
        .stage-page.show { display: block; }

        .stage-intro {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            color: #065f46;
            margin-bottom: 14px;
            line-height: 1.5;
        }
        .stage-intro__title {
            font-size: 14px; font-weight: 700; margin-bottom: 4px;
            display: flex; align-items: center; gap: 6px;
        }

        .suggest-card {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }
        .suggest-card__label { font-size: 11px; font-weight: 700; color: #b45309; margin-bottom: 4px; }
        .suggest-card__row {
            display: flex; gap: 8px; align-items: center; padding: 8px 0;
            border-top: 1px solid #f1f5f9;
        }
        .suggest-card__row:first-of-type { border-top: none; }
        .suggest-card__thumb {
            width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0;
            background: #e2e8f0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .suggest-card__thumb img { width: 100%; height: 100%; object-fit: cover; }
        .suggest-card__info { flex: 1; min-width: 0; }
        .suggest-card__title { font-size: 13px; font-weight: 700; color: var(--color-text); }
        .suggest-card__sub { font-size: 12px; color: var(--color-text-sub); margin-top: 1px; }
        .suggest-card__side {
            font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
            white-space: nowrap; flex-shrink: 0;
        }
        .suggest-card__side.current { background: #f1f5f9; color: #334155; }
        .suggest-card__side.proposed { background: #d1fae5; color: #065f46; }
        .suggest-card__savings {
            margin-top: 8px; padding: 6px 10px;
            background: #fef3c7; border-radius: 10px;
            font-size: 12px; font-weight: 700; color: #92400e;
            text-align: center;
        }
        .suggest-card__actions {
            display: flex; gap: 8px; margin-top: 10px;
        }
        .suggest-card__actions button {
            flex: 1; border: none; border-radius: 10px;
            padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: inherit;
        }
        .suggest-card__actions .accept { background: var(--color-cta); color: #fff; }
        .suggest-card__actions .keep { background: #fff; color: #334155; border: 1px solid var(--color-border); }

        .confirm-group {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 10px;
        }
        /* #219: 明細先頭のダメ押しチップ（手数料%は見せない＝引かれる割引%だけ） */
        .cart-camp-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: #FBF6EE; color: #C0651A; border: 1px solid #EAD9C0;
            border-radius: 16px; padding: 5px 11px; font-size: 11.5px; font-weight: 800;
            margin-bottom: 10px;
        }
        .cart-camp-chip .material-symbols-outlined { font-size: 14px; }
        .confirm-group__head {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-weight: 700; margin-bottom: 8px;
        }
        .confirm-group__row {
            display: flex; gap: 8px; padding: 4px 0;
            font-size: 13px;
        }
        .confirm-group__row span.v { margin-left: auto; }
        .confirm-group__total {
            border-top: 1px solid #e2e8f0; margin-top: 8px; padding-top: 6px;
            font-weight: 700;
        }
        /* 6/1 #111: 注文確認の納品日時は強調表示（小さなグレー注記にしない） */
        .confirm-group__deliv {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--color-text); margin-top: 10px;
            background: var(--color-cta-lt); border-radius: 10px;
            padding: 8px 10px; font-weight: 700;
        }
        .confirm-group__deliv .material-symbols-outlined { font-size: 18px; color: var(--color-cta); }

        /* 出品詳細モーダル */
        .listing-modal {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
        }
        .listing-modal.show { display: flex; }
        .listing-modal__sheet {
            width: 100%; max-width: 480px;
            background: var(--color-surface);
            border-radius: 20px 20px 0 0;
            max-height: 90vh;
            overflow-y: auto;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .listing-modal__head {
            position: sticky; top: 0;
            background: var(--color-surface);
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--color-border);
            z-index: 1;
        }
        .listing-modal__title { font-size: 16px; font-weight: 700; }
        .listing-modal__close {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: #f1f5f9;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
        }
        .listing-modal__body { padding: 16px; }

        .lm-gallery {
            display: flex; overflow-x: auto; gap: 6px;
            scroll-snap-type: x mandatory;
            margin: -16px -16px 14px;
            padding: 0 16px;
        }
        .lm-gallery::-webkit-scrollbar { display: none; }
        .lm-gallery img {
            width: 280px; height: 210px; object-fit: cover;
            border-radius: 14px; flex-shrink: 0; scroll-snap-align: start;
        }
        .lm-gallery__placeholder {
            width: 100%; height: 210px;
            background: #e2e8f0;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
        }

        .lm-farmer-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid #f1f5f9; margin-bottom: 10px;
        }
        .lm-farmer-row__avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: #e2e8f0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .lm-farmer-row__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .lm-farmer-row__name { font-size: 14px; font-weight: 700; }
        .lm-farmer-row__meta { font-size: 11px; color: var(--color-text-sub); }
        .lm-farmer-row__rating {
            font-size: 12px; color: var(--color-text-sub);
            display: inline-flex; align-items: center; gap: 3px;
        }
        .lm-farmer-row__rating .material-symbols-outlined {
            font-size: 13px; color: #f59e0b;
            font-variation-settings: 'FILL' 1;
        }

        .lm-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .lm-meta { font-size: 12px; color: var(--color-text-sub); margin-bottom: 12px; }
        .lm-price-row {
            display: flex; align-items: baseline; gap: 6px;
            margin-bottom: 12px;
        }
        .lm-price { font-size: 22px; font-weight: 700; color: var(--color-text); }
        .lm-price-unit { font-size: 12px; color: var(--color-text-sub); }

        .lm-info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px 16px; margin-bottom: 12px;
        }
        .lm-info-grid .k { font-size: 11px; color: var(--color-text-sub); }
        .lm-info-grid .v { font-size: 14px; font-weight: 600; color: var(--color-text); }

        .lm-section {
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid #f1f5f9;
        }
        .lm-section__title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .lm-section__body { font-size: 13px; color: var(--color-text); line-height: 1.6; }

        .detail-link {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 11px; color: #0369a1; cursor: pointer;
            background: none; border: none; padding: 2px 0;
            font-family: inherit; margin-top: 2px;
        }
        .detail-link:hover { text-decoration: underline; }
        .detail-link .material-symbols-outlined { font-size: 14px; }

        /* 6/21 #163④: 削除確認＝中央モーダル（ブラウザ confirm 置換・確認系は中央モーダルで統一 #160）。 */
        .del-modal-ov {
            position: fixed; inset: 0; background: rgba(15,23,42,.55);
            z-index: 1200; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .del-modal-ov.show { display: flex; }
        .del-modal {
            width: 100%; max-width: 400px; background: #fff;
            border-radius: 18px; padding: 22px 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,.25);
        }
        .del-modal__title { font-size: 16px; font-weight: 800; color: var(--color-text); line-height: 1.6; margin-bottom: 18px; }
        .del-modal__actions { display: flex; gap: 10px; }
        .del-modal__btn { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
        .del-modal__btn--cancel { background: #eceef0; color: var(--color-text-sub); }
        .del-modal__btn--ok { background: #E5453F; color: #fff; }

        /* #172: お支払い（前払い）セクション */
        .pay-section__card {
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: 14px; padding: 14px;
        }
        .pay-section__title { font-size: 13.5px; font-weight: 800; margin-bottom: 6px; }
        .pay-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; font-size: 13px; padding: 7px 0;
        }
        .pay-row__label { color: var(--color-text); display: flex; align-items: center; gap: 6px; }
        .pay-row__value { font-weight: 700; white-space: nowrap; }
        .pay-row.wallet .pay-row__label, .pay-row.wallet .pay-row__value { color: var(--color-cta); }
        .pay-row__bal { font-size: 10.5px; color: var(--color-text-sub); font-weight: 600; }
        .pay-row__act {
            font-size: 11.5px; font-weight: 800; color: var(--color-cta);
            border: 1px solid #bbd3ec; border-radius: 8px; padding: 3px 9px;
            background: none; cursor: pointer; font-family: inherit; margin-left: 6px;
        }
        .pay-row.total {
            border-top: 1px solid #eceff3; margin-top: 4px; padding-top: 11px;
        }
        .pay-row.total .pay-row__label { font-size: 14px; font-weight: 800; color: var(--color-text); }
        .pay-row.total .pay-row__value { font-size: 20px; font-weight: 800; color: var(--color-cta); }
        .pay-paid-full { font-size: 12px; color: #2e7d32; font-weight: 800; text-align: right; margin-top: 2px; }
        .wallet-edit {
            background: var(--color-cta-lt); border: 1px solid #d2e0f2;
            border-radius: 11px; padding: 11px 12px; margin: 6px 0 2px;
        }
        .wallet-edit__l { font-size: 11.5px; color: var(--color-text-sub); margin-bottom: 7px; }
        .wallet-edit__l b { color: var(--color-cta); }
        .wallet-edit__input { display: flex; align-items: center; gap: 7px; }
        .wallet-edit__field {
            flex: 1; background: #fff; border: 1.5px solid var(--color-cta);
            border-radius: 9px; padding: 9px 12px; font-size: 16px; font-weight: 800;
            text-align: right; color: #0b1b33; font-family: inherit; min-width: 0;
            -moz-appearance: textfield;
        }
        .wallet-edit__field::-webkit-outer-spin-button,
        .wallet-edit__field::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .wallet-edit__unit { font-size: 12px; color: var(--color-text-sub); font-weight: 700; }
        .wallet-edit__quick { display: flex; gap: 8px; margin-top: 9px; }
        .wallet-edit__quick button {
            flex: 1; text-align: center; font-size: 12px; font-weight: 800;
            border: 1px solid #bbd3ec; border-radius: 8px; padding: 8px 0;
            color: var(--color-cta); background: #fff; cursor: pointer; font-family: inherit;
        }
        .escrow-note {
            display: flex; gap: 8px; background: #eef3fb; border: 1px solid #d8e4f5;
            border-radius: 12px; padding: 11px 12px; margin-top: 12px;
        }
        .escrow-note .material-symbols-outlined { font-size: 18px; color: #3e6a98; flex-shrink: 0; }
        .escrow-note span:last-child { font-size: 11.5px; color: #3e6a98; line-height: 1.55; }

        /* #172: KHQR ステージ */
        .khqr-amt { text-align: center; margin: 6px 0 12px; }
        .khqr-amt__label { font-size: 12px; color: var(--color-text-sub); }
        .khqr-amt__row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 2px; }
        .khqr-amt__value { font-size: 26px; font-weight: 800; color: var(--color-cta); }
        /* 7/10 #203 A-2: 静的QR＝金額なし＝手入力必須になったため〔金額をコピー〕を目立つ塗りボタン風に強調 */
        .copy-chip {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 800; color: var(--color-cta);
            border: 1px solid #bbd3ec; border-radius: 9px; padding: 7px 13px;
            cursor: pointer; font-family: inherit; background: #eaf2fb;
        }
        .copy-chip .material-symbols-outlined { font-size: 15px; }
        .khqr-sub { text-align: center; font-size: 11px; color: var(--color-text-sub); margin: -4px 0 14px; }
        .khqr-sub b { color: var(--color-text); font-weight: 700; }
        .qr-card {
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: 16px; padding: 18px; text-align: center;
        }
        .qr-card__brand { font-size: 13px; font-weight: 800; color: var(--color-cta); margin-bottom: 8px; }
        /* 7/10 #203 A-1: Joint口座（受取名＋口座番号・口座番号は表示のみ／コピーボタン無し） */
        .qr-card__payee { font-size: 13px; font-weight: 800; color: var(--color-text); margin-top: 2px; }
        .qr-card__acct { font-size: 11.5px; color: var(--color-text-sub); margin-top: 3px; }
        .qr-card__img { width: 200px; height: 200px; object-fit: contain; margin: 4px auto; display: block; }
        .qr-card__tag { font-size: 11px; color: var(--color-text-sub); margin-top: 4px; }
        /* 7/10 #203 A-2: 静的QR＝金額が入らない警告（amber） */
        .qr-card__tag.warn { color: #b36a00; font-weight: 700; margin-top: 8px; line-height: 1.5; }
        .qr-actions { margin-top: 12px; }
        .qr-open {
            display: block; width: 100%; text-align: center; text-decoration: none;
            border-radius: 11px; padding: 12px; font-size: 13.5px; font-weight: 800;
            background: var(--color-cta); color: #fff;
        }
        .qr-open__sub { display: block; font-size: 10.5px; font-weight: 600; opacity: .85; margin-top: 1px; }
        .qr-sbtn {
            display: block; width: 100%; text-align: center; text-decoration: none;
            margin-top: 8px; border: 1px solid #bbd3ec; border-radius: 10px;
            padding: 10px 0; font-size: 12.5px; font-weight: 800;
            color: var(--color-cta); background: #fff;
        }
        /* 2026-07-17 #211②で未使用化（長い説明段落を削除・重複解消）。将来の説明枠用に残置 */
        .qr-help { font-size: 12px; color: var(--color-text-sub); line-height: 1.6; margin: 14px 2px 0; }
        .qr-help b { color: var(--color-cta); font-weight: 700; }
        /* 7/10 #203 A-4: 受取名の先回り告知（中立グレー note） */
        .qr-note { font-size: 11px; color: var(--color-text-sub); line-height: 1.55; background: #f7f9fb; border: 1px solid var(--color-border); border-radius: 10px; padding: 9px 11px; margin: 12px 2px 0; }
        .qr-note b { color: var(--color-text); font-weight: 700; }
        /* 7/10 #203 A-3: 〔QR画像を保存〕のサブ文言 */
        .qr-sbtn__sub { display: block; font-size: 10.5px; font-weight: 600; color: var(--color-text-sub); margin-top: 1px; }
        /* 7/10 #203 A-5: お支払いの控えを添付（任意・点線枠） */
        .attach-row {
            display: flex; align-items: center; gap: 10px;
            margin: 14px 2px 0; padding: 11px 12px;
            border: 1px dashed #bbd3ec; border-radius: 11px;
            background: #f7fafe; cursor: pointer;
        }
        .attach-row .material-symbols-outlined { font-size: 18px; color: var(--color-cta); flex-shrink: 0; }
        .attach-row__t { font-size: 12.5px; font-weight: 800; color: var(--color-cta); }
        .attach-row__s { font-size: 11px; color: var(--color-text-sub); font-weight: 600; margin-top: 1px; }
        .attach-row.done { border-style: solid; border-color: #a7d8b4; background: #f0faf3; }
        .attach-row.done .material-symbols-outlined { color: #2e7d32; }
        .attach-row.done .attach-row__t { color: #2e7d32; }
        .attach-row__thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        /* 2026-07-17 #211③: 控えのサムネ右上の✕（添付を取り消して付け直せる・モック ⑤ の .at-x）。
           表示は .done クラス（＝添付済み）に連動させる＝リセット漏れが起きない。 */
        .attach-row__thumbwrap { position: relative; flex-shrink: 0; display: none; }
        .attach-row.done .attach-row__thumbwrap { display: block; }
        .attach-row__x {
            position: absolute; top: -7px; right: -7px;
            width: 21px; height: 21px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--color-border); border-radius: 50%;
            background: var(--color-surface); cursor: pointer;
        }
        /* ⚠ .attach-row.done .material-symbols-outlined（緑・18px）に負けないよう詳細度を上げる */
        .attach-row.done .attach-row__x .material-symbols-outlined { font-size: 14px; color: var(--color-text-sub); }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="javascript:history.back()" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FISHLINK" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" id="page-title" data-i18n="cart.title"></div>
    </div>

    <div class="cart-page" id="cart-page">
        <div class="cart-empty" id="cart-empty" style="display:none;">
            <div class="cart-empty__icon"><span class="material-symbols-outlined" style="font-size:48px;">shopping_cart</span></div>
            <div data-i18n="cart.empty"></div>
            <a class="cart-empty__cta" href="/pages/restaurant/fish-list.html" data-i18n="cart.browse"></a>
        </div>

        <div id="cart-container"></div>
    </div>

    <!-- 提案ステージ -->
    <div class="stage-page" id="suggest-page">
        <div class="stage-intro">
            <div class="stage-intro__title">
                <span class="material-symbols-outlined" style="font-size:18px;">lightbulb</span>
                <span data-i18n="cart.suggestTitle"></span>
            </div>
            <div data-i18n="cart.suggestDesc"></div>
        </div>
        <div id="suggest-container"></div>
    </div>

    <!-- 確認ステージ -->
    <div class="stage-page" id="confirm-page">
        <!-- #211①: 見出し（cart.confirmTitle）はヘッダー #page-title がステージ別に出すので、ここでは繰り返さない。
             説明段落（cart.confirmDesc）も撤去：文言が「下の『注文を確定する』ボタンを押してください」＝案B以前のもので、
             通常フローの実ボタンは〔KHQRで支払う ◯ KHR〕（ウォレットで全額まかなえる時だけ〔注文を確定する〕）＝
             存在しないボタン名を案内していた。モック payment-prepay ①〜④ もこの段落は持たず、
             注文カード＋お支払いブロック＋エスクロー文＋金額入りの実ボタンで意図は足りる。
             ⚠ cart.confirmDesc は他に参照が無くデッドキーになるが、慣例どおり locales には残置。 -->
        <div id="confirm-container"></div>

        <!-- #178: クーポンは「期限が近い順に自動適用」（手動で1枚選ぶUIは作らない）。
             1枚だけ自動適用し「✓ 適用中／〔外す〕」を表示。外すと今回は使わない（次回に取っておく）。 -->
        <div class="coupon-applied" id="coupon-applied" style="margin:14px 16px; padding:12px 14px; background:#fff7e6; border:1px solid #f3d998; border-radius:14px; display:none; align-items:center; gap:10px;">
            <span class="material-symbols-outlined" style="font-size:18px; color:#b36a00;">confirmation_number</span>
            <div style="flex:1; min-width:0;">
                <div id="coupon-applied-amt" style="font-size:13px; font-weight:800; color:#b36a00;"></div>
                <div id="coupon-applied-meta" style="font-size:11px; color:#9a7430; margin-top:2px;"></div>
            </div>
            <div style="text-align:right; flex-shrink:0;">
                <div style="font-size:12px; font-weight:800; color:#b36a00;" data-i18n="coupon.walletApplied"></div>
                <button type="button" id="coupon-remove-btn" style="background:none; border:none; padding:2px 0; cursor:pointer; font-family:inherit; font-size:11px; color:var(--color-cta); font-weight:700;" data-i18n="coupon.removeForNow"></button>
            </div>
        </div>

        <!-- #172: お支払い（前払い）＝合計（カートより）→ 💰ウォレット利用 → お支払い額（青）。
             ウォレットは既定で全額自動充当・〔変更〕で金額指定（0=使わない）。 -->
        <div class="pay-section" id="pay-section" style="margin:14px 16px;">
            <div class="pay-section__card">
                <div class="pay-section__title" data-i18n="payment.payTitle"></div>
                <div id="pay-rows"></div>
            </div>
            <div class="escrow-note">
                <span class="material-symbols-outlined">lock</span>
                <span id="escrow-text" data-i18n="payment.escrowNote"></span>
            </div>
        </div>
    </div>

    <!-- #172 / 7/10 #203 A: KHQR ステージ（FISHLINK受取＝Joint口座・静的QR＝金額なし・買い手が手入力） -->
    <div class="stage-page" id="khqr-page">
        <div class="khqr-amt">
            <div class="khqr-amt__label" data-i18n="payment.payAmount"></div>
            <div class="khqr-amt__row">
                <div class="khqr-amt__value" id="khqr-amt-value">0 KHR</div>
                <button type="button" class="copy-chip" id="khqr-copy-btn">
                    <span class="material-symbols-outlined">content_copy</span>
                    <span data-i18n="payment.copyAmount"></span>
                </button>
            </div>
        </div>
        <div class="khqr-sub" id="khqr-sub"></div>
        <!-- 7/10 #203 A-1: Joint口座を明示（受取名＋口座番号・口座番号は表示のみ・コピーボタン無し） -->
        <div class="qr-card">
            <div class="qr-card__brand" data-i18n="payment.khqrBrand"></div>
            <div class="qr-card__payee" data-i18n="payment.khqrPayeeName"></div>
            <div class="qr-card__acct"><span data-i18n="payment.khqrAccountLabel"></span> 018 532 495</div>
            <img class="qr-card__img" src="/images/fishlink-qr.png" alt="FISHLINK QR">
            <!-- 7/10 #203 A-2: 静的QR＝金額なし警告（amber） -->
            <div class="qr-card__tag warn" id="khqr-tag" data-i18n="payment.khqrNoAmountWarn"></div>
        </div>
        <!-- 7/10 #203 A-4: 受取名の先回り告知 -->
        <div class="qr-note" data-i18n="payment.khqrPayeeNotice"></div>
        <!-- 7/10 #203 A-3: 支払いボタン2役（ABAアプリ／QR画像を保存） -->
        <div class="qr-actions">
            <a class="qr-open" href="https://pay.ababank.com/oRF8/ghmf3dn7" target="_blank" rel="noopener">
                <span class="material-symbols-outlined" style="font-size:18px; vertical-align:-4px;">account_balance</span>
                <span data-i18n="payment.openBankAba"></span>
                <span class="qr-open__sub" data-i18n="payment.openBankAbaSub"></span>
            </a>
            <a class="qr-sbtn" href="/images/fishlink-qr.png" download="fishlink-qr.png">
                <span class="material-symbols-outlined" style="font-size:16px; vertical-align:-3px;">image</span>
                <span data-i18n="payment.saveQr"></span>
                <span class="qr-sbtn__sub" data-i18n="payment.saveQrSub"></span>
            </a>
        </div>
        <!-- 2026-07-17 #211②: 長い説明段落（payment.khqrHelp）は削除。
             同じ情報が画面内で3重複していたため（金額入力＝⚠ボックス／誰が・どうやって＝ボタンのサブ文言／
             安心・返金＝※ノート）。各パーツに寄せて重複解消（モック ⑤ どおり）。
             ※ i18n の payment.khqrHelp はデッドキーとして残置（無害）。 -->
        <!-- 7/10 #203 A-5: お支払いの控えを添付（任意・確認が早くなる） -->
        <label class="attach-row" id="khqr-attach-row">
            <span class="material-symbols-outlined" id="khqr-attach-icon">attach_file</span>
            <div style="flex:1; min-width:0;">
                <div class="attach-row__t" id="khqr-attach-title" data-i18n="payment.attachProof"></div>
                <div class="attach-row__s" data-i18n="payment.attachProofSub"></div>
            </div>
            <!-- 2026-07-17 #211③: 添付済みのときだけサムネ＋✕を出す（✕で取り消し・付け直し可）。
                 表示制御は .attach-row.done（CSS）＝JS側のリセット処理と自動で同期する。 -->
            <span class="attach-row__thumbwrap">
                <img class="attach-row__thumb" id="khqr-attach-thumb" alt="" style="display:none;">
                <button type="button" class="attach-row__x" id="khqr-attach-clear">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </span>
            <!-- ⚠ 2026-07-19: label の暗黙のフォワードに任せず JS で明示的に開く（下の click ハンドラ）。
                 iOS Safari 等で display:none（hidden）の file input は label クリックで開かないことがあるため、
                 アプリ内で実績のある方式（post.html / profile.html 等＝input.click() を明示）に揃える。 -->
            <input type="file" accept="image/*" id="khqr-proof-input" style="display:none;">
        </label>
    </div>

    <!-- 出品詳細モーダル -->
    <div class="listing-modal" id="listing-modal">
        <div class="listing-modal__sheet">
            <div class="listing-modal__head">
                <div class="listing-modal__title" data-i18n="cart.listingDetail"></div>
                <button class="listing-modal__close" type="button" id="modal-close" aria-label="close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="listing-modal__body" id="modal-body"></div>
        </div>
    </div>

    <div class="grand-total-bar" id="grand-total-bar" style="display:none;">
        <!-- 5/24 #82 Phase 2 Chunk 3: クーポン適用時のみ表示。confirm ステージで renderConfirm から制御。 -->
        <div id="coupon-discount-row" style="display:none; font-size:13px; color:#b36a00; font-weight:700; margin-bottom:6px; justify-content:space-between; align-items:center;">
            <span><span class="material-symbols-outlined" style="font-size:14px; vertical-align:-2px; margin-right:2px;">confirmation_number</span><span data-i18n="coupon.totalLineLabel"></span> <span id="coupon-discount-code" style="font-family:monospace; font-size:11px; color:var(--color-text-sub); font-weight:400; margin-left:4px;"></span></span>
            <span id="coupon-discount-value">0 KHR</span>

        <div id="coupon-disable-campaign-note" style="display:none; font-size:11px; color:#92400e; background:#fef3c7; border:1px solid #fde68a; border-radius:8px; padding:6px 10px; margin-bottom:8px;" data-i18n="coupon.disableCampaign"></div>
        <div class="grand-total-row">
            <span class="grand-total-row__label" data-i18n="cart.grandTotal"></span>
            <span class="grand-total-row__value" id="grand-total">0 KHR</span>
        </div>
        <button class="checkout-btn" id="checkout-btn" data-i18n="cart.checkout"></button>
        <div class="err-msg" id="err-msg"></div>
    </div>

    <!-- #172: 〔支払いました〕の確認モーダル（中央）。確認系は中央モーダルで統一（#160）。 -->
    <div class="del-modal-ov" id="paid-modal">
        <div class="del-modal">
            <div class="del-modal__title" data-i18n="payment.confirmPaidTitle"></div>
            <div style="font-size:13px; color:var(--color-text-sub); line-height:1.65; margin-bottom:18px;" data-i18n="payment.confirmPaidBody"></div>
            <div class="del-modal__actions">
                <button type="button" class="del-modal__btn del-modal__btn--cancel" id="paid-modal-no" data-i18n="payment.confirmPaidNo"></button>
                <button type="button" class="del-modal__btn" style="background:var(--color-cta); color:#fff;" id="paid-modal-yes" data-i18n="payment.confirmPaidYes"></button>
            </div>
        </div>
    </div>

    <!-- 6/21 #163④: 削除確認＝中央モーダル（ブラウザ confirm 置換）。確定「削除する」赤・キャンセル グレー。 -->
    <div class="del-modal-ov" id="del-modal">
        <div class="del-modal">
            <div class="del-modal__title" data-i18n="cart.confirmRemove"></div>
            <div class="del-modal__actions">
                <button type="button" class="del-modal__btn del-modal__btn--cancel" id="del-modal-cancel" data-i18n="cart.cancel"></button>
                <button type="button" class="del-modal__btn del-modal__btn--ok" id="del-modal-ok" data-i18n="cart.deleteConfirm"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import {
            doc, getDoc, updateDoc, collection, writeBatch, serverTimestamp,
            query, where, getDocs
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 7/10 #203 A-5: 支払い控え画像を Storage(paymentProofs/{uid}/) へアップロード（admin/order.html と同方式）
        import { ref } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { uploadImageResized } from '/js/image-resize.js';
        import { showToast } from '/js/toast.js';
        import {
            subscribeCart, updateCartItem, removeCartItem, clearCart, groupByFarmer
        } from '/js/cart.js';
        import {

        // ── Google Maps ready 待ち ──
        function waitForGoogleMaps() {
            return new Promise((resolve) => {
                if (typeof google !== 'undefined' && google.maps) return resolve();
                const iv = setInterval(() => {
                    if (typeof google !== 'undefined' && google.maps) {
                        clearInterval(iv); resolve();
                    }
                }, 200);
                setTimeout(() => { clearInterval(iv); resolve(); }, 5000);
            });
        }

        function haversine(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // {km, ok} を返す（ok=true のときキャッシュ対象）
        async function calcRoadDistance(lat1, lng1, lat2, lng2) {
            await waitForGoogleMaps();
            if (typeof google === 'undefined' || !google.maps) {
                return { km: haversine(lat1, lng1, lat2, lng2), ok: false };
            }
            return new Promise((resolve) => {
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: [new google.maps.LatLng(lat1, lng1)],
                    destinations: [new google.maps.LatLng(lat2, lng2)],
                    travelMode: google.maps.TravelMode.DRIVING,
                }, (response, status) => {
                    if (status === 'OK' && response.rows[0]?.elements[0]?.status === 'OK') {
                        resolve({ km: response.rows[0].elements[0].distance.value / 1000, ok: true });
                    } else {
                        resolve({ km: haversine(lat1, lng1, lat2, lng2), ok: false });
                    }
                });
            });
        }

        const DELIVERY_TIME_SLOTS = [

            '14:00–15:00','15:00–16:00','16:00–17:00','17:00–18:00',
        ];

        function todayIso() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function isoFromDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // #196: スロット開始(KHM壁時計)が [earliest, latest] の窓に入るものだけ選択可。
        //   earliest = max(now+最短8h, 承認期限+準備4h) / latest = now+最長14日（approval-deadline.js）。
        //   旧「当日/未来/過去」分岐はこの窓判定に吸収された。
        function slotStartHour(slot) { return parseInt(String(slot).split(':')[0], 10) || 0; }
        function isSlotSelectable(dateIso, slot) {
            const now = Date.now();
            const s = slotStartUtcMs(dateIso, slotStartHour(slot));
            return s >= earliestDeliveryMs(now, delivParams) && s <= latestDeliveryMs(now, delivParams);
        }
        // 今日から最長14日先まで走査し、最初に選べるスロットを既定値に。無ければ当日の先頭スロット。
        function defaultDeliveryPick() {
            const start = new Date();
            for (let i = 0; i <= DELIV_PARAMS.maxLeadDays; i++) {
                const d = new Date(start); d.setDate(start.getDate() + i);
                const iso = isoFromDate(d);
                const slot = DELIVERY_TIME_SLOTS.find(s => isSlotSelectable(iso, s));
                if (slot) return { dateIso: iso, time: slot };
            }
            return { dateIso: todayIso(), time: DELIVERY_TIME_SLOTS[0] };
        }

        // 5/23 #69 Phase B: data-cache 経由（同一タブ内の重複取得を抑止）
        async function ensureListing(listingId) {

            listingCache.set(listingId, data);

        async function ensureDistance(farmerId, farmer) {
            if (distanceCache.has(farmerId)) return distanceCache.get(farmerId);
            const myLoc = window.currentUserData?.location;
            const farmerLoc = farmer?.location;
            if (!myLoc || !farmerLoc) {

                return cached;

            const r = await calcRoadDistance(myLoc.lat, myLoc.lng, farmerLoc.lat, farmerLoc.lng);

        //   today=ローカル YYYY-MM-DD。バナー表示条件（dashboard/fish-list）と同じ述語。金額計算式（order-utils）は不変。
        function withinCampaignDates(start, end) {

        const KHR_LOCALE = 'en-US';
        function fmtNum(n) { return Math.round(Number(n) || 0).toLocaleString(KHR_LOCALE); }

        const WEEKDAY_SHORT = {
            ja: ['日','月','火','水','木','金','土'],

            km: ['អា','ច','អ','ពុ','ព្រ','សុ','ស'],

            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];

        async function render() {

                // items

                    const photoUrl = c.listing.photoUrl || (c.listing.photos?.[0]);

                    //   第3引数には「買い手が今トグルで選んでいる状態」を渡す＝表示単価がその選択を反映する。
                    const unitPrice = buyerUnitPrice(c.listing.price || 0, c.listing.gutPrice || 0, c.raw.gutProcessing, serviceRate);
                    // 6/1 #111 / 7/15 #208 / 2026-07-19 #210①-2: 内臓処理を外した/戻したときの増減額。

                    const gutRemoveKhr = buyerDisplayUnitPrice(c.listing.gutPrice || 0, serviceRate);
                    // 小計も手数料込み（c.prices.fishPrice + c.prices.serviceFee）。

                    const lineTotal = (c.prices.fishPrice || 0) + (c.prices.serviceFee || 0);

                    const wholeFishOnly = c.listing.gutPrice == null;

                    // ヒント（トグル直下）：あり→外すと−／なし→戻すと+
                    const gutHint = gutRemoveKhr > 0

                        : '';

                    html += `<div class="cart-item">
