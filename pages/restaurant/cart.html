                            <div class="cart-item__ctrl">
                                <div class="qty-box">
                                    <button type="button" data-act="qty-minus" data-idx="${origIndex}" ${c.raw.quantity <= minOrder ? 'disabled' : ''}>−</button>
                                    <input type="number" class="qty-box__value" data-act="qty-input" data-idx="${origIndex}" data-min="${minOrder}" value="${c.raw.quantity}" min="${minOrder}" step="1" inputmode="numeric">
                                    <button type="button" data-act="qty-plus" data-idx="${origIndex}">＋</button>
                                </div>
                                <div class="gut-group">
                                    ${wholeFishOnly
                                        ? `<div class="gut-hint">${i18next.t('cart.gutWholeFishOnly')}</div>`
                                        : `<button class="gut-chip ${c.raw.gutProcessing ? 'active' : ''}" type="button" data-act="toggle-gut" data-idx="${origIndex}">
                                        <span class="material-symbols-outlined">${c.raw.gutProcessing ? 'check_circle' : 'radio_button_unchecked'}</span>
                                        <span>${c.raw.gutProcessing ? i18next.t('cart.gutChipOn') : i18next.t('cart.gutChipOff')}</span>
                                    </button>
                                    ${gutHint ? `<div class="gut-hint">${gutHint}</div>` : ''}`}
                                </div>
                            </div>
                            ${minOrder > 1 ? `<div class="min-order-note">${i18next.t('cart.minOrderLabel', { kg: minOrder })}</div>` : ''}
                            <div class="cart-item__subtotal">${fmtKhr(lineTotal)}</div>
                        </div>
                    </div>`;
                });

                // 配送日時選択
                const dateOptions = `<input type="date" data-act="date" data-farmer="${farmerId}" value="${pick.dateIso}" min="${todayIso()}" max="${maxDeliveryDateIso(Date.now())}">`;
                const timeOptions = DELIVERY_TIME_SLOTS.map(t => {
                    const ok = isSlotSelectable(pick.dateIso, t);
                    return `<option value="${t}" ${t === pick.time ? 'selected' : ''} ${ok ? '' : 'disabled'}>${t}</option>`;
                }).join('');
                html += `<div class="delivery-pick">
                    <div><label>${i18next.t('cart.deliveryDate')}</label>${dateOptions}</div>
                    <div><label>${i18next.t('cart.deliveryTime')}</label>
                        <select data-act="time" data-farmer="${farmerId}">${timeOptions}</select>
                    </div>
                </div>`;

                // 6/1 #111: 送料無料圏（distanceKm ≤ freeKm）の判定。配送料は固定額（注記）。
                const roundedDist = Math.floor((dist || 0) * 10) / 10;
                const isFreeDelivery = _dlv.freeKm > 0 && roundedDist <= _dlv.freeKm;

                // 内訳
                html += `<div class="group-breakdown">
                    <div class="group-breakdown__row"><span>${i18next.t('cart.fishTotal')}</span><span>${fmtKhr(itemsSum.fishPrice + itemsSum.serviceFee)}</span></div>
                    ${campaignActive && itemsSum.campaignDiscount > 0 ? `<div class="group-breakdown__row discount"><span><span class="material-symbols-outlined">local_offer</span>${i18next.t('cart.campaignDiscount')}</span><span>−${fmtKhr(itemsSum.campaignDiscount)}</span></div>` : ''}
                    <div class="group-breakdown__row"><span>${i18next.t('cart.deliveryFee')}</span><span>${isFreeDelivery ? `<span class="free-delivery">${i18next.t('cart.freeDelivery')}</span>` : fmtKhr(deliveryFee)}</span></div>
                    ${isFreeDelivery ? '' : `<div class="delivery-note">${i18next.t('cart.deliveryFeeNote')}</div>`}
                    <div class="group-breakdown__row total"><span>${i18next.t('cart.groupTotal')}</span><span>${fmtKhr(groupTotal)}</span></div>
                </div>`;

                html += `</div>`;
            }

            container.innerHTML = html;
            document.getElementById('grand-total').textContent = fmtKhr(grandTotal);
            bindActions();
            initDatepickers();
            // 5/25 #91/#92 拡張: render-cache 保存（次回訪問用）
            try {
                saveRenderState('restaurant_cart', {
                    containerHtml: container.innerHTML,
                    grandTotal: document.getElementById('grand-total').textContent,
                    barVisible: bar.style.display === 'block',
                });
            } catch (e) { /* ignore */ }
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // 6/21 #163④: 削除確認＝中央モーダル（ブラウザ confirm 置換）。true=削除する / false=キャンセル を resolve。
        const delModalEl = document.getElementById('del-modal');
        let delModalResolve = null;
        function closeDelModal(result) {
            delModalEl.classList.remove('show');
            if (delModalResolve) { delModalResolve(result); delModalResolve = null; }
        }
        document.getElementById('del-modal-ok').addEventListener('click', () => closeDelModal(true));
        document.getElementById('del-modal-cancel').addEventListener('click', () => closeDelModal(false));
        delModalEl.addEventListener('click', (e) => { if (e.target === delModalEl) closeDelModal(false); });
        function showDeleteModal() {
            delModalEl.classList.add('show');
            return new Promise((resolve) => { delModalResolve = resolve; });
        }

        // 5/27 #94: 言語切替時にカレンダーを再初期化
        // 5/27: 動的描画されたカート本体（chip 文言・農家名以外のラベル等）も再描画しないと
        //   旧言語のままなので render() を呼び直す。initDatepickers は render() 内で呼ばれる。
        onLanguageChange(() => {
            // 7/10 #203 B-1: 再支払いモードはカート描画を回さず khqr の再描画のみ（カートは空・無関係）。
            if (repayOrderId) { renderKhqr(khqrPayAmount); updateFooter(); return; }
            render().catch(() => {});
            // 6/7 #134 C → #178: 確認画面のクーポン・お支払い明細も言語に追従（紹介元名の語順含め再構築）
            if (stage === 'confirm') {
                loadCouponWallet().then(() => { renderCouponWallet(); renderConfirm().catch(() => {}); });
            } else if (stage === 'khqr') {
                renderKhqr(khqrPayAmount);
            }
            updateFooter();
        });

        // 5/27 #94: 配送日カレンダーを i18next 言語に合わせてローカライズ（flatpickr）
        // ネイティブ <input type="date"> は Chrome/Safari で OS ロケール固定のため、
        // flatpickr で UI 言語を明示制御する。
        function initDatepickers() {
            if (typeof flatpickr === 'undefined') return;
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const locale = lang === 'ja' ? 'ja' : (lang === 'km' ? 'km' : 'default');
            document.querySelectorAll('input[type="date"][data-act="date"]').forEach(inp => {
                if (inp._flatpickr) inp._flatpickr.destroy();
                flatpickr(inp, {
                    locale: locale,
                    dateFormat: 'Y-m-d',
                    // 6/3 #116: 表示は曜日付き「6/4（木）」（実値は Y-m-d のまま change ハンドラへ）
                    altInput: true,
                    altFormat: 'n/j（D）',
                    minDate: inp.min || undefined,
                    maxDate: inp.max || undefined,
                    defaultDate: inp.value || undefined,
                    disableMobile: true,
                });
            });
        }

        function bindActions() {
            const uid = window.currentUser.uid;
            document.querySelectorAll('[data-act="qty-minus"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const idx = Number(btn.dataset.idx);
                    const item = cartItems[idx];
                    const listing = listingCache.get(item.listingId);
                    const minOrder = listing?.minOrder || 1;
                    if (item.quantity > minOrder) {
                        await updateCartItem(uid, idx, { quantity: item.quantity - 1 });
                    }
                });
            });
            document.querySelectorAll('[data-act="qty-plus"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const idx = Number(btn.dataset.idx);
                    const item = cartItems[idx];
                    const listing = listingCache.get(item.listingId);
                    // 6/1 #111: 在庫上限（ソフトガード）。在庫0/未設定時は据え置き
                    const stock = listing?.stock || 0;
                    const next = item.quantity + 1;
                    if (stock > 0 && next > stock) return;
                    await updateCartItem(uid, idx, { quantity: next });
                });
            });
            // 5/9 #61 → 6/1 #111: 数量直接入力（blur で確定）。整数kgのみ・最低注文量下限・在庫上限を適用。
            document.querySelectorAll('[data-act="qty-input"]').forEach(inp => {
                inp.addEventListener('blur', async () => {
                    const idx = Number(inp.dataset.idx);
                    const minOrder = Number(inp.dataset.min) || 1;
                    const listing = listingCache.get(cartItems[idx].listingId);
                    const stock = listing?.stock || 0;
                    let v = Math.round(parseFloat(inp.value));   // 整数kgに丸め
                    if (!Number.isFinite(v) || v < minOrder) v = minOrder;
                    if (stock > 0 && v > stock) v = stock;        // 在庫上限
                    if (v !== cartItems[idx].quantity) {
                        await updateCartItem(uid, idx, { quantity: v });
                    } else {
                        inp.value = v;
                    }
                });
                // Enter で blur（モバイルキーボードで確定しやすく）
                inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
                });
            });
            document.querySelectorAll('[data-act="toggle-gut"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const idx = Number(btn.dataset.idx);
                    // #195: 丸魚のみ（gutPrice == null）はトグル自体を描画しないが、防御的にガード
                    const listing = listingCache.get(cartItems[idx]?.listingId);
                    if (listing && listing.gutPrice == null) return;
                    await updateCartItem(uid, idx, { gutProcessing: !cartItems[idx].gutProcessing });
                });
            });
            document.querySelectorAll('[data-act="remove"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    // 6/21 #163④: ブラウザ confirm → 自前中央モーダル
                    if (!(await showDeleteModal())) return;
                    const idx = Number(btn.dataset.idx);
                    await removeCartItem(uid, idx);
                });
            });
            document.querySelectorAll('[data-act="date"]').forEach(inp => {
                inp.addEventListener('change', () => {
                    const farmerId = inp.dataset.farmer;
                    const pick = deliveryPick.get(farmerId) || {};
                    deliveryPick.set(farmerId, { ...pick, dateIso: inp.value });
                    // 6/1 #111: 日付変更でスロットの選択可否（リードタイム）が変わるため再描画
                    render().catch(() => {});
                });
            });
            document.querySelectorAll('[data-act="time"]').forEach(sel => {
                sel.addEventListener('change', () => {
                    const farmerId = sel.dataset.farmer;
                    const pick = deliveryPick.get(farmerId) || {};
                    deliveryPick.set(farmerId, { ...pick, time: sel.value });
                });
            });
        }

        // ── ステージ管理（cart / suggest / confirm / khqr）──
        let stage = 'cart';

        // 2026-07-17 #211①: ヘッダータイトルをステージごとに切り替える。
        //   支払う段階で「カート」のままだと「まだ確定していない？」と不安になり、←の戻り先も不明瞭になるため
        //   （モック fishlink-payment-prepay-mockup.html の各 title どおり）。
        //   ⚠ 言語切替は applyTranslations() が data-i18n を読み直して上書きするので、textContent だけでなく
        //     data-i18n 属性も付け替える（再支払いモード initRepay と同じ手法＝そちらの「お支払い」も壊さない）。
        const STAGE_TITLE_KEY = {
            cart: 'cart.title',
            suggest: 'cart.title',
            confirm: 'cart.confirmTitle',  // 「注文内容の確認」（既存キーを流用）
            khqr: 'payment.title',         // 「お支払い」（既存キーを流用）
        };
        function applyStageTitle() {
            const el = document.getElementById('page-title');
            if (!el) return;
            const key = STAGE_TITLE_KEY[stage] || 'cart.title';
            el.setAttribute('data-i18n', key);
            el.textContent = i18next.t(key);
        }

        function setStage(next) {
            stage = next;
            applyStageTitle();
            const cartPage = document.getElementById('cart-page');
            const suggestPage = document.getElementById('suggest-page');
            const confirmPage = document.getElementById('confirm-page');
            const khqrPage = document.getElementById('khqr-page');
            cartPage.style.display = stage === 'cart' ? 'block' : 'none';
            suggestPage.classList.toggle('show', stage === 'suggest');
            confirmPage.classList.toggle('show', stage === 'confirm');
            khqrPage.classList.toggle('show', stage === 'khqr');
            updateFooter();
        }

        // #172: フッター（合計バー＋ボタン）の表示・文言をステージとお支払い額で切替。
        //   confirm: 合計バー表示。お支払い額>0 →〔KHQRで支払う ◯〕／==0 →〔注文を確定する〕。
        //   khqr:    合計バーは隠し、ボタンは〔支払いました〕。
        function updateFooter() {
            const bar = document.getElementById('grand-total-bar');
            const totalRow = bar.querySelector('.grand-total-row');
            const couponRow = document.getElementById('coupon-discount-row');
            const couponNote = document.getElementById('coupon-disable-campaign-note');
            const btn = document.getElementById('checkout-btn');
            const sub = document.getElementById('checkout-btn-sub');
            if (sub) sub.textContent = '';
            if (stage === 'cart') {
                // cart 未ロード時は cache 復元のバー表示を尊重（チラつき回避）。
                if (cartLoaded) bar.style.display = cartItems.length === 0 ? 'none' : 'block';
                totalRow.style.display = 'flex';
                btn.textContent = i18next.t('cart.toConfirm');
            } else if (stage === 'suggest') {
                bar.style.display = 'block';
                totalRow.style.display = 'flex';
                btn.textContent = i18next.t('cart.next');
            } else if (stage === 'confirm') {
                bar.style.display = 'block';
                totalRow.style.display = 'flex';
                const payAmount = Math.max(0, confirmGrandTotal - walletApplied);
                if (payAmount > 0) {
                    setBtnLabel(btn, i18next.t('payment.payByKhqr'), fmtKhr(payAmount));
                } else {
                    setBtnLabel(btn, i18next.t('payment.confirmOrder'), i18next.t('payment.payFromWallet'));
                }
            } else if (stage === 'khqr') {
                bar.style.display = 'block';
                totalRow.style.display = 'none';
                if (couponRow) couponRow.style.display = 'none';
                if (couponNote) couponNote.style.display = 'none';
                setBtnLabel(btn, i18next.t('payment.paidBtn'), '');
            }
        }

        // ボタンにメイン文言＋サブ文言（小さく）をセット
        function setBtnLabel(btn, main, sub) {
            btn.innerHTML = `${escapeHtml(main)}${sub ? `<span id="checkout-btn-sub" style="display:block; font-size:11px; font-weight:600; opacity:.85; margin-top:2px;">${escapeHtml(sub)}</span>` : ''}`;
        }

        // ── 提案ロジック：カート内各itemに対して、別農家にも同じfishTypeの出品があれば提案 ──
        // 戻り値: [{ idx, currentListing, currentFarmerName, altListing, altFarmerName, altFarmerId, savingsDeliveryFee }]
        async function computeSuggestions() {
            const farmerIds = [...new Set(cartItems.map(it => it.farmerId))];
            if (farmerIds.length < 2) return []; // 1農家だけなら提案不要

            // カートに入っている各農家のアクティブな全出品を取得
            // （大規模化したら server-side に移動推奨）
            const listingsByFarmer = new Map();
            await Promise.all(farmerIds.map(async (fid) => {
                const q = query(
                    collection(db, 'fishListings'),
                    where('farmerId', '==', fid),
                    where('isActive', '==', true)
                );
                const snap = await getDocs(q);
                const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                listingsByFarmer.set(fid, arr);
                // 将来 swap 受理時に listingCache から参照できるようにここで温めておく
                arr.forEach(l => { if (!listingCache.has(l.id)) listingCache.set(l.id, l); });
            }));

            const suggestions = [];
            const alreadyProposed = new Set(); // 同じ swap を重複提案しないため

            for (let i = 0; i < cartItems.length; i++) {
                const it = cartItems[i];
                const curListing = listingCache.get(it.listingId);
                if (!curListing) continue;
                const curFishType = curListing.fishType;
                if (!curFishType) continue;

                // 他農家がこの魚種を扱っているか探す
                for (const otherFarmerId of farmerIds) {
                    if (otherFarmerId === it.farmerId) continue;
                    const otherListings = listingsByFarmer.get(otherFarmerId) || [];
                    const match = otherListings.find(l =>
                        l.fishType === curFishType
                        && (l.stock || 0) >= it.quantity
                    );
                    if (!match) continue;
                    // 他農家は既にカートに入っている場合のみ提案（＝今の配送料が節約できる）
                    // 実際は別農家→同農家に寄せる方向のみ
                    const altFarmer = farmerCache.get(otherFarmerId);
                    const dedupKey = `${i}-${otherFarmerId}`;
                    if (alreadyProposed.has(dedupKey)) continue;
                    alreadyProposed.add(dedupKey);

                    // 節約額：この item を other 農家に移したら、現在の農家グループから抜ける
                    // → 現農家グループの item数が 1 なら配送料が丸々消える、そうでなければ 0
                    const currentGroupItems = cartItems.filter(c => c.farmerId === it.farmerId);
                    let savings = 0;
                    if (currentGroupItems.length === 1) {
                        const curDist = distanceCache.get(it.farmerId) || 0;
                        const _curDlv = resolveDelivery(farmerCache.get(it.farmerId), curListing);
                        savings = calcDeliveryFee(_curDlv.ratePerKm, _curDlv.freeKm, curDist);
                    }

                    suggestions.push({
                        idx: i,
                        currentListing: curListing,
                        currentListingId: it.listingId,
                        currentFarmerId: it.farmerId,
                        currentFarmerName: farmerCache.get(it.farmerId)?.displayName || '',
                        altListing: match,
                        altListingId: match.id,
                        altFarmerId: otherFarmerId,
                        altFarmerName: altFarmer?.displayName || '',
                        savingsDeliveryFee: savings,
                    });
                }
            }

            return suggestions;
        }

        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggest-container');
            if (suggestions.length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = suggestions.map((s, sIdx) => {
                const curFishType = s.currentListing.fishType;
                const curName = i18next.exists(`fish.${curFishType}`) ? i18next.t(`fish.${curFishType}`) : curFishType;
                const curShort = curName.trim();
                const altName = curShort; // 同じ fishType なので同じ名前
                // サービス料込み単価で比較表示
                //   2026-07-19 #210①-2: 魚の単価と内臓処理は行ごとに切り捨ててから足す（buyerUnitPrice）。
                //   ここは「内臓処理込みの参考単価」なので gutIncluded=true 固定（比較用・トグルはまだ無い）。
                const curPrice = buyerUnitPrice(s.currentListing.price || 0, s.currentListing.gutPrice || 0, true, serviceRate);
                const altPrice = buyerUnitPrice(s.altListing.price || 0, s.altListing.gutPrice || 0, true, serviceRate);
                const priceDiff = altPrice - curPrice;

                const curPhoto = s.currentListing.photoUrl || (s.currentListing.photos?.[0]);
                const altPhoto = s.altListing.photoUrl || (s.altListing.photos?.[0]);

                const savingsText = s.savingsDeliveryFee > 0
                    ? i18next.t('cart.saveDelivery', { amount: s.savingsDeliveryFee.toLocaleString(KHR_LOCALE) })
                    : i18next.t('cart.sameDelivery');

                const priceDiffText = priceDiff === 0 ? ''
                    : priceDiff > 0 ? ` (+${priceDiff.toLocaleString(KHR_LOCALE)} KHR/kg)`
                    : ` (${priceDiff.toLocaleString(KHR_LOCALE)} KHR/kg)`;

                return `
                    <div class="suggest-card" data-suggest-idx="${sIdx}">
                        <div class="suggest-card__label">${i18next.t('cart.suggestLabel', { fish: curShort })}</div>
                        <div class="suggest-card__row">
                            <div class="suggest-card__thumb">${curPhoto ? `<img ${asCachedImgAttrs(curPhoto)} alt="" loading="lazy">` : ''}</div>
                            <div class="suggest-card__info">
                                <div class="suggest-card__title">${escapeHtml(s.currentFarmerName)}</div>
                                <div class="suggest-card__sub">${curShort} · ${curPrice.toLocaleString(KHR_LOCALE)} KHR/kg</div>
                                <button class="detail-link" type="button" data-act="show-detail" data-listing-id="${s.currentListingId}" data-farmer-id="${s.currentFarmerId}">
                                    <span class="material-symbols-outlined">info</span>
                                    <span>${i18next.t('cart.viewDetail')}</span>
                                </button>
                            </div>
                            <span class="suggest-card__side current">${i18next.t('cart.currentSide')}</span>
                        </div>
                        <div class="suggest-card__row">
                            <div class="suggest-card__thumb">${altPhoto ? `<img ${asCachedImgAttrs(altPhoto)} alt="" loading="lazy">` : ''}</div>
                            <div class="suggest-card__info">
                                <div class="suggest-card__title">${escapeHtml(s.altFarmerName)}</div>
                                <div class="suggest-card__sub">${altName} · ${altPrice.toLocaleString(KHR_LOCALE)} KHR/kg${priceDiffText}</div>
                                <button class="detail-link" type="button" data-act="show-detail" data-listing-id="${s.altListingId}" data-farmer-id="${s.altFarmerId}">
                                    <span class="material-symbols-outlined">info</span>
                                    <span>${i18next.t('cart.viewDetail')}</span>
                                </button>
                            </div>
                            <span class="suggest-card__side proposed">${i18next.t('cart.proposedSide')}</span>
                        </div>
                        <div class="suggest-card__savings">${savingsText}</div>
                        <div class="suggest-card__actions">
                            <button class="keep" type="button" data-act="keep">${i18next.t('cart.keepOriginal')}</button>
                            <button class="accept" type="button" data-act="accept">${i18next.t('cart.acceptSwap')}</button>
                        </div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.suggest-card').forEach(card => {
                const sIdx = Number(card.dataset.suggestIdx);
                const s = suggestions[sIdx];
                card.querySelector('[data-act="keep"]').addEventListener('click', () => {
                    card.style.opacity = '0.5';
                    card.querySelectorAll('button').forEach(b => b.disabled = true);
                });
                card.querySelector('[data-act="accept"]').addEventListener('click', async () => {
                    card.querySelectorAll('button').forEach(b => b.disabled = true);
                    try {
                        await updateCartItem(window.currentUser.uid, s.idx, {
                            listingId: s.altListingId,
                            farmerId: s.altFarmerId,
                        });
                        card.style.opacity = '0.5';
                        card.querySelector('.suggest-card__savings').textContent = i18next.t('cart.applied');
                    } catch (e) {
                        card.querySelectorAll('button').forEach(b => b.disabled = false);
                        console.error(e);
                    }
                });
            });

            // 詳細を見るボタン
            container.querySelectorAll('[data-act="show-detail"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const listingId = btn.dataset.listingId;
                    const farmerId = btn.dataset.farmerId;
                    await openListingDetail(listingId, farmerId);
                });
            });
        }

        // ── 出品詳細モーダル ──
        async function openListingDetail(listingId, farmerId) {
            // 5/23 #69 Phase B: ensureListing 経由（data-cache でセッション内重複取得を抑止）
            const listing = listingCache.get(listingId) || await ensureListing(listingId);
            if (!listing) return;
            const farmer = farmerCache.get(farmerId) || {};
            const dist = distanceCache.get(farmerId) || 0;
            // 5/31 #105: 配送設定は farmer 単位（farmer doc 優先・旧 listing fallback）
            const _dlv = resolveDelivery(farmer, listing);

            const fishType = listing.fishType || '';
            const fishName = i18next.exists(`fish.${fishType}`) ? i18next.t(`fish.${fishType}`) : fishType;
            const photos = Array.isArray(listing.photos) && listing.photos.length > 0
                ? listing.photos
                : (listing.photoUrl ? [listing.photoUrl] : []);

            const galleryHtml = photos.length > 0
                ? `<div class="lm-gallery">${photos.map(u => `<img ${asCachedImgAttrs(u)} alt="" loading="lazy">`).join('')}</div>`
                : `<div class="lm-gallery__placeholder"><span class="material-symbols-outlined" style="font-size:64px;">set_meal</span></div>`;

            // サービス料込み単価（#208 → 2026-07-19 #210①-2: 魚の単価と内臓処理は行ごとに切り捨ててから足す）
            //   出品詳細モーダルは「内臓処理込みの参考単価」なので gutIncluded=true 固定。
            const unitPrice = buyerUnitPrice(listing.price || 0, listing.gutPrice || 0, true, serviceRate);
            // 5/11 #65 + 拡張: province は i18n ラベル、district は UI 言語に応じて km/en 切替
            const province = formatProvince(farmer.province || '');
            const district = formatDistrict(farmer);
            const place = [province, district].filter(Boolean).join(', ');
            const rating = Number(farmer.avgRating || 0).toFixed(1);
            const reviews = farmer.reviewCount || 0;
            const avatarUrl = farmer.avatarUrl;
            const avatarHtml = avatarUrl
                ? `<img ${asCachedImgAttrs(avatarUrl)} alt="">`
                : `<span class="material-symbols-outlined" style="font-size:24px; color:#94a3b8;">person</span>`;

            document.getElementById('modal-body').innerHTML = `
                ${galleryHtml}
                <div class="lm-farmer-row">
                    <div class="lm-farmer-row__avatar">${avatarHtml}</div>
                    <div style="flex:1; min-width:0;">
                        <div class="lm-farmer-row__name">${escapeHtml(farmer.displayName || '')}</div>
                        <div class="lm-farmer-row__meta">
                            <span class="lm-farmer-row__rating">
                                <span class="material-symbols-outlined">star</span> ${rating} (${reviews})
                            </span>
                            ${place ? ` · ${escapeHtml(place)}` : ''}
                            ${dist > 0 ? ` · ${i18next.t('cart.distance', { km: dist.toFixed(1) })}` : ''}
                        </div>
                    </div>
                </div>
                <div class="lm-name">${escapeHtml(fishName)}</div>
                <div class="lm-meta">${listing.size || ''} head/kg</div>
                <div class="lm-price-row">
                    <span class="lm-price">${unitPrice.toLocaleString(KHR_LOCALE)}</span>
                    <span class="lm-price-unit">KHR/kg</span>
                </div>
                <div class="lm-info-grid">
                    <div><div class="k">${i18next.t('order.stock').replace(/[:：]\s*$/, '')}</div><div class="v">${listing.stock || 0} kg</div></div>
                    <div><div class="k">${i18next.t('order.minOrder')}</div><div class="v">${listing.minOrder || 0} kg</div></div>
                    <div><div class="k">${i18next.t('post.deliveryRate')}</div><div class="v">${Math.round(_dlv.ratePerKm * 10).toLocaleString(KHR_LOCALE)} KHR/10km</div></div>
                    <div><div class="k">${i18next.t('post.freeDeliveryDistance')}</div><div class="v">${_dlv.freeKm || 0} km</div></div>
                </div>
                ${listing.description ? `
                    <div class="lm-section">
                        <div class="lm-section__title">${i18next.t('order.descriptionLabel')}</div>
                        <div class="lm-section__body" style="white-space:pre-wrap;">${escapeHtml(listing.description)}</div>
                    </div>
                ` : ''}
                ${farmer.farmerMessage ? `
                    <div class="lm-section">
                        <div class="lm-section__title">${i18next.t('profile.farmerMessage')}</div>
                        <div class="lm-section__body">${escapeHtml(farmer.farmerMessage)}</div>
                    </div>
                ` : ''}
            `;
            document.getElementById('listing-modal').classList.add('show');
        }

        function closeListingDetail() {
            document.getElementById('listing-modal').classList.remove('show');
        }

        document.getElementById('modal-close').addEventListener('click', closeListingDetail);
        document.getElementById('listing-modal').addEventListener('click', (e) => {
            // 背景（シート外）クリックで閉じる
            if (e.target.id === 'listing-modal') closeListingDetail();
        });

        // #172: 農家ごとの小計（クーポン適用前の subtotal=この農家への小計）。複数農家のお支払い明細・placeOrders で使う。
        const groupSubtotals = new Map();

        async function renderConfirm() {
            const container = document.getElementById('confirm-container');
            // 5/24 #82 Phase 2 Chunk 3: クーポン適用時はレストラン側キャンペーン割引を無効化
            // （農家側のキャンペーンは継続・農家受取額に影響）
            const effectiveCampaignActive = appliedCoupon ? false : campaignActive;
            // render と同じロジックで最終内訳を算出
            const groups = groupByFarmer(cartItems);
            groupSubtotals.clear();
            let html = '';
            // #219: 明細先頭のダメ押しチップ（クーポン適用中は effectiveCampaignActive=false で出さない）
            if (effectiveCampaignActive && campaignDiscountRate > 0) {
                const pct = Math.round(campaignDiscountRate * 1000) / 10;
                html += `<div class="cart-camp-chip"><span class="material-symbols-outlined">local_offer</span>${i18next.t('cart.campaignChip', { pct })}</div>`;
            }
            let grandTotal = 0;
            for (const [farmerId, items] of groups.entries()) {
                const farmer = farmerCache.get(farmerId) || {};
                const dist = distanceCache.get(farmerId) || 0;
                const calcItems = items.map(item => {
                    const listing = listingCache.get(item.listingId);
                    if (!listing) return null;
                    const prices = calcItemPrices({
                        listing, quantity: item.quantity, gutProcessing: item.gutProcessing,
                        serviceRate, campaignActive: effectiveCampaignActive, campaignDiscountRate,
                        farmerRate, farmerCampaignActive, farmerCampaignDiscountRate,
                    });
                    return { listing, item, prices };
                }).filter(Boolean);
                const firstListing = calcItems[0]?.listing;
                const _dlv = resolveDelivery(farmer, firstListing);
                const deliveryFee = firstListing
                    ? calcDeliveryFee(_dlv.ratePerKm, _dlv.freeKm, dist)
                    : 0;
                const itemsSum = sumItems(calcItems.map(c => c.prices));
                const groupTotal = calcOrderTotal(itemsSum, deliveryFee);
                grandTotal += groupTotal;
                groupSubtotals.set(farmerId, groupTotal); // subtotal=この農家への小計（クーポン適用前）

                const pick = deliveryPick.get(farmerId) || { dateIso: '', time: '' };

                const rows = calcItems.map(c => {
                    const fishType = c.listing.fishType || '';
                    const fishName = i18next.exists(`fish.${fishType}`) ? i18next.t(`fish.${fishType}`) : fishType;
                    const shortName = fishName.trim();
                    // 6/1 #111: サイズ(head/kg)併記 + 内臓処理あり/なしを全項目に明示
                    const size = c.listing.size ? ` ${escapeHtml(c.listing.size)} head/kg` : '';
                    // #195: 丸魚のみ（gutPrice == null）は専用ラベル
                    const gutAnno = (c.listing.gutPrice == null)
                        ? i18next.t('cart.gutAnnoWhole')
                        : (c.item.gutProcessing ? i18next.t('cart.gutAnnoOn') : i18next.t('cart.gutAnnoOff'));
                    return `<div class="confirm-group__row"><span>${escapeHtml(shortName)}${size} · ${c.item.quantity}kg ${gutAnno}</span><span class="v">${fmtKhr(c.prices.fishPrice + c.prices.serviceFee)}</span></div>`;
                }).join('');

                // 6/1 #111 → 6/21 #163⑤: 納品日時を強調表示。「納品」ラベル＋日付・時間を分離（🕐付き）。
                const delivPickHtml = `<div class="confirm-group__deliv"><span class="material-symbols-outlined">event</span><span>${escapeHtml(i18next.t('orders.deliveryLabel'))}</span> <b>${escapeHtml(fmtDeliveryDate(pick.dateIso))}</b> ・ <span class="material-symbols-outlined">schedule</span> <b>${escapeHtml(pick.time || '-')}</b></div>`;

                html += `
                    <div class="confirm-group">
                        <div class="confirm-group__head">
                            <span><span class="material-symbols-outlined" style="font-size:16px; color:#047857; vertical-align:-3px;">storefront</span> ${escapeHtml(farmer.displayName || '')}</span>
                            <span style="font-size:11px; color:var(--color-text-sub);">${i18next.t('cart.distance', { km: dist.toFixed(1) })}</span>
                        </div>
                        ${rows}
                        ${effectiveCampaignActive && itemsSum.campaignDiscount > 0 ? `<div class="confirm-group__row discount"><span><span class="material-symbols-outlined">local_offer</span>${i18next.t('cart.campaignDiscount')}</span><span class="v">−${fmtKhr(itemsSum.campaignDiscount)}</span></div>` : ''}
                        <div class="confirm-group__row"><span>${i18next.t('cart.deliveryFee')}</span><span class="v">${deliveryFee <= 0 ? `<span class="free-delivery">${i18next.t('cart.freeDelivery')}</span>` : fmtKhr(deliveryFee)}</span></div>
                        <div class="confirm-group__row confirm-group__total"><span>${i18next.t('cart.groupTotal')}</span><span class="v">${fmtKhr(groupTotal)}</span></div>
                        ${delivPickHtml}
                    </div>
                `;
            }

            container.innerHTML = html;

            // 5/24 #82 Phase 2 Chunk 3: クーポン適用時の表示更新
            // - grand total から couponDiscount を差し引き（grandTotal 以下に capping）
            // - クーポン割引行・「キャンペーン無効」注意書きを表示
            const couponDiscountRow = document.getElementById('coupon-discount-row');
            const couponDisableNote = document.getElementById('coupon-disable-campaign-note');
            let effectiveDiscount = 0;
            if (appliedCoupon) {
                effectiveDiscount = Math.min(appliedCoupon.amountKhr, grandTotal);
                document.getElementById('coupon-discount-code').textContent = `(${appliedCoupon.code})`;
                document.getElementById('coupon-discount-value').textContent = `-${fmtKhr(effectiveDiscount)}`;
                couponDiscountRow.style.display = 'flex';
                // 元々キャンペーンが有効だった場合のみ「無効化されました」注意を表示
                couponDisableNote.style.display = (campaignActive && campaignDiscountRate > 0) ? 'block' : 'none';
            } else {
                couponDiscountRow.style.display = 'none';
                couponDisableNote.style.display = 'none';
            }
            // #178: クーポン適用後の合計（=充当前お支払い額）
            confirmGrandTotal = Math.max(0, grandTotal - effectiveDiscount);
            document.getElementById('grand-total').textContent = fmtKhr(confirmGrandTotal);
            // #172: ウォレット既定充当（ユーザー未指定なら全額自動・上限=合計）を再計算し、お支払い明細を描画
            recomputeWalletDefault();
            renderPaySection();
            updateFooter();
        }

        // 2026-07-17 #210②: ウォレット充当の上限。
        //   KHQR額 ＝ 合計 − ウォレット利用 なので、両方が100リエル単位でないと銀行で払えない。
        //   ・残高で全額まかなえる → 上限＝合計（KHQR額0＝端数が生まれないので合計そのままでよい）
        //   ・一部充当（残高 < 合計）→ 上限＝残高を100リエル未満切り捨て
        //     （例 残高50,750／合計91,800 → 上限50,700・KHQR41,100。端数50はウォレットに残る＝買い手有利）
        //   これで walletApplied は「合計ちょうど」か「100の倍数」のどちらかになり、KHQR額は必ず100単位で閉じる。
        function walletCap() {
            return walletBalance >= confirmGrandTotal ? confirmGrandTotal : floor100(walletBalance);
        }

        // #172: ウォレット既定値の再計算。ユーザーが〔変更〕で指定済みなら上限だけ clamp、
        //   未指定なら「合計を上限に全額自動充当」。
        function recomputeWalletDefault() {
            const cap = walletCap();
            if (!walletUserSet) {
                walletApplied = cap;
            } else {
                walletApplied = Math.max(0, Math.min(walletApplied, cap));
            }
        }

        // #172: お支払い明細（合計（カートより）→ 💰ウォレット利用 →〔変更〕→ お支払い額）を描画。
        function renderPaySection() {
            const rows = document.getElementById('pay-rows');
            if (!rows) return;
            const groups = groupByFarmer(cartItems);
            const multiFarmer = groups.size > 1;
            const payAmount = Math.max(0, confirmGrandTotal - walletApplied);
            const cap = walletCap(); // #210②: 一部充当時は100リエル単位に切り捨てた上限

            let html = '';
            if (multiFarmer) {
                // 複数農家：農家ごとの小計を並べる
                for (const [farmerId] of groups.entries()) {
                    const farmer = farmerCache.get(farmerId) || {};
                    const sub = groupSubtotals.get(farmerId) || 0;
                    html += `<div class="pay-row"><span class="pay-row__label">${escapeHtml(farmer.displayName || '-')}</span><span class="pay-row__value">${fmtKhr(sub)}</span></div>`;
                }
            } else {
                html += `<div class="pay-row"><span class="pay-row__label">${escapeHtml(i18next.t('payment.fromCart'))}</span><span class="pay-row__value">${fmtKhr(confirmGrandTotal)}</span></div>`;
            }

            // ウォレット行（残高>0 のときだけ）
            if (walletBalance > 0) {
                const actLabel = walletEditOpen ? i18next.t('payment.walletClose') : i18next.t('payment.walletChange');
                html += `<div class="pay-row wallet">
                    <span class="pay-row__label">
                        <span class="material-symbols-outlined" style="font-size:16px;">account_balance_wallet</span>
                        <span>${escapeHtml(i18next.t('payment.walletUse'))}</span>
                        <span class="pay-row__bal">${escapeHtml(i18next.t('payment.walletBalance', { amount: walletBalance.toLocaleString(KHR_LOCALE) }))}</span>
                    </span>
                    <span class="pay-row__value">−${fmtKhr(walletApplied)}<button type="button" class="pay-row__act" id="wallet-toggle">${escapeHtml(actLabel)}</button></span>
                </div>`;
                if (walletEditOpen) {
                    html += `<div class="wallet-edit">
                        <div class="wallet-edit__l">${i18next.t('payment.walletMax', { amount: `<b>${cap.toLocaleString(KHR_LOCALE)} KHR</b>` })}</div>
                        <div class="wallet-edit__input">
                            <input class="wallet-edit__field" id="wallet-input" inputmode="numeric" value="${walletApplied.toLocaleString(KHR_LOCALE)}">
                            <span class="wallet-edit__unit">KHR</span>
                        </div>
                        <div class="wallet-edit__quick">
                            <button type="button" id="wallet-all">${escapeHtml(i18next.t('payment.walletAll', { amount: cap.toLocaleString(KHR_LOCALE) }))}</button>
                            <button type="button" id="wallet-none">${escapeHtml(i18next.t('payment.walletNone'))}</button>
                        </div>
                    </div>`;
                }
            }

            html += `<div class="pay-row total"><span class="pay-row__label">${escapeHtml(i18next.t('payment.payAmount'))}</span><span class="pay-row__value">${fmtKhr(payAmount)}</span></div>`;
            if (walletBalance > 0 && payAmount <= 0) {
                html += `<div class="pay-paid-full">${escapeHtml(i18next.t('payment.paidFull'))}</div>`;
            }
            rows.innerHTML = html;

            // 複数農家用エスクロー文言
            const escrowText = document.getElementById('escrow-text');
            if (escrowText) escrowText.textContent = i18next.t(multiFarmer ? 'payment.escrowNoteMulti' : 'payment.escrowNote');

            bindPayActions(cap);
        }

        function bindPayActions(cap) {
            const toggle = document.getElementById('wallet-toggle');
            if (toggle) toggle.addEventListener('click', () => {
                walletEditOpen = !walletEditOpen;
                renderPaySection();
            });
            const input = document.getElementById('wallet-input');
            if (input) {
                const commit = () => {
                    // 2026-07-04 #191 / 2026-07-17 #210②: ウォレット充当額も100リエル単位に floor
                    //   （KHQR残額 khqrAmount を100単位に保つ）。
                    // ⚠ 旧実装は replace(/[^\d.]/g,'') でピリオドを残したまま parseFloat していたため、
                    //   桁区切りが「.」になる端末（#210③ の「41.000」と同じ原因＝入力欄の初期値も "50.750" になる）や、
                    //   ユーザーが "50.750" と手入力した場合に parseFloat("50.750")=50.75 → floor100 → 0 となり、
                    //   ウォレット充当が無言で0に落ちる穴があった。
                    //   KHRに小数は存在しないので「数字以外を全部落とす」のが正しい
                    //   ＝区切りが「,」でも「.」でも 50750 に解釈される。
                    let v = floor100(parseInt(String(input.value).replace(/\D/g, ''), 10) || 0);
                    if (!Number.isFinite(v) || v < 0) v = 0;
                    if (v > cap) v = cap;
                    walletApplied = v;
                    walletUserSet = true;
                    renderPaySection();
                    updateFooter();
                };
                input.addEventListener('blur', commit);
                input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
            }
            const allBtn = document.getElementById('wallet-all');
            if (allBtn) allBtn.addEventListener('click', () => {
                walletApplied = cap; walletUserSet = true; renderPaySection(); updateFooter();
            });
            const noneBtn = document.getElementById('wallet-none');
            if (noneBtn) noneBtn.addEventListener('click', () => {
                walletApplied = 0; walletUserSet = true; renderPaySection(); updateFooter();
            });
        }

        // 注文確定処理（旧インライン実装を関数化）
        async function placeOrders() {
            const uid = window.currentUser.uid;

            // 5/24 #82 Phase 2 Chunk 3: クーポン適用時はレストラン側キャンペーン割引を無効化
            const effectiveCampaignActive = appliedCoupon ? false : campaignActive;

            // 6/1 #111: 軽量ガード。無効化は「削除済み」「売切れ(在庫0)」の2つだけ。
            //   細かい在庫不足は農家承認（辞退）に委ねる（spec §5）。
            for (const it of cartItems) {
                const snap = await getDoc(doc(db, 'fishListings', it.listingId));
                const data = snap.data();
                const stock = data?.stock || 0;
                const unavailable = !snap.exists() || data?.isActive === false || data?.isDeleted === true || stock <= 0;
                if (unavailable) {
                    const fishType = data?.fishType || listingCache.get(it.listingId)?.fishType || '';
                    const name = i18next.exists(`fish.${fishType}`) ? i18next.t(`fish.${fishType}`) : (fishType || it.listingId);
                    throw new Error(i18next.t('cart.errorStock', { name, stock }) || `Unavailable: ${name}`);
                }
            }

            // 5/24 #82 Phase 2 Chunk 3: クーポン適用時は再検証
            // confirm 滞在中に別タブで使用された等を防ぐ。
            if (appliedCoupon) {
                const result = await validateCouponCode(appliedCoupon.code, uid);
                if (!result.ok) {
                    throw new Error(i18next.t(result.error) || 'Coupon invalid');
                }
                // 念のため最新金額に追従
                appliedCoupon.amountKhr = result.amountKhr;
            }

            const batch = writeBatch(db);
            const groups = groupByFarmer(cartItems);

            // 5/24 #82 Phase 2 Chunk 3: 全 order の totalAmount を先に算出し、
            // クーポン適用先の order（最大 totalAmount を持つもの）を 1 つ選ぶ。
            //   - usedOrderId は coupon doc に 1 つしか記録できないため
            //   - 「最大」を選ぶことで discount が cap されにくくする
            const orderDrafts = [];
            for (const [farmerId, items] of groups.entries()) {
                const pick = deliveryPick.get(farmerId);
                if (!pick?.dateIso || !pick?.time) {
                    throw new Error(i18next.t('cart.errorDelivery'));
                }

                const dist = distanceCache.get(farmerId) || 0;
                const firstListing = listingCache.get(items[0].listingId);
                const _dlv = resolveDelivery(farmerCache.get(farmerId), firstListing);
                const deliveryFee = calcDeliveryFee(_dlv.ratePerKm, _dlv.freeKm, dist);

                // 各item の料金計算＋snap
                const itemDocs = [];
                for (const it of items) {
                    const listing = listingCache.get(it.listingId);
                    if (!listing) continue;
                    const prices = calcItemPrices({
                        listing, quantity: it.quantity, gutProcessing: it.gutProcessing,
                        serviceRate, campaignActive: effectiveCampaignActive, campaignDiscountRate,
                        farmerRate, farmerCampaignActive, farmerCampaignDiscountRate,
                    });
                    itemDocs.push({
                        listingId: it.listingId,
                        quantity: it.quantity,
                        gutProcessing: !!it.gutProcessing,
                        ...prices,
                        snapFishType: listing.fishType || null,
                        snapSize: listing.size || null,
                        snapPhotoUrl: listing.photoUrl || null,
                        snapPrice: listing.price ?? null,
                        snapGutPrice: listing.gutPrice ?? null,
                    });
                }

                const itemsSum = sumItems(itemDocs);
                const total = calcOrderTotal(itemsSum, deliveryFee);
                orderDrafts.push({ farmerId, pick, deliveryFee, itemDocs, itemsSum, total });
            }

            // クーポン適用先（最大 totalAmount の draft）を選択
            let couponTargetIdx = -1;
            if (appliedCoupon) {
                let maxTotal = -1;
                orderDrafts.forEach((d, i) => {
                    if (d.total > maxTotal) { maxTotal = d.total; couponTargetIdx = i; }
                });
            }

            // #172/#178: 各 draft の totalAmount（クーポン適用後）を先に確定。
            orderDrafts.forEach((draft, idx) => {
                draft.subtotal = draft.total; // subtotal = この農家への小計（クーポン適用前）
                draft.appliedCouponCode = null;
                draft.referralDiscountAmount = 0;
                draft.totalAmount = draft.total;
                if (appliedCoupon && idx === couponTargetIdx) {
                    draft.referralDiscountAmount = Math.min(appliedCoupon.amountKhr, draft.total);
                    draft.totalAmount = draft.total - draft.referralDiscountAmount;
                    draft.appliedCouponCode = appliedCoupon.code;
                }
            });

            // #172: 前払い（案B）。checkout 全体を1つの paymentGroup として束ね、
            //   ウォレット充当を各 order に greedy で割り当てる（順番に min(totalAmount, 残ウォレット)）。
            const groupTotalSum = orderDrafts.reduce((a, d) => a + d.totalAmount, 0);
            // 念のため上限を再 clamp（confirm 後にカートが変わった等の保険）
            let walletPool = Math.max(0, Math.min(walletApplied, walletBalance, groupTotalSum));
            orderDrafts.forEach(draft => {
                const w = Math.min(draft.totalAmount, walletPool);
                draft.walletApplied = w;
                draft.khqrAmount = draft.totalAmount - w;
                walletPool -= w;
            });

            // #172: paymentGroupId = uid + '_' + 生成idの一部（CF の Date.now ではなくクライアント生成・グループ識別用）
            const paymentGroupId = `${uid}_${doc(collection(db, 'orders')).id}`;

            const orderRefs = []; // coupon doc update 時に usedOrderId を埋めるため
            orderDrafts.forEach((draft, idx) => {
                const { farmerId, pick, deliveryFee, itemDocs, itemsSum } = draft;
                const first = itemDocs[0];

                // M/D 形式
                const [y, m, d] = pick.dateIso.split('-').map(Number);
                const deliveryDate = `${m}/${d}`;

                const orderRef = doc(collection(db, 'orders'));
                orderRefs[idx] = orderRef;
                batch.set(orderRef, {
                    restaurantId: uid,
                    farmerId,
                    // order-level
                    deliveryDate,
                    deliveryDateIso: pick.dateIso,
                    deliveryTime: pick.time,
                    deliveryFee,
                    // items[] 新方式
                    items: itemDocs,
                    // legacy: 合計値（fishPrice/serviceFee/... は items合計）
                    fishPrice: itemsSum.fishPrice,
                    serviceFee: itemsSum.serviceFee,
                    campaignDiscount: itemsSum.campaignDiscount,
                    totalAmount: draft.totalAmount,
                    serviceRateUsed: serviceRate,
                    farmerCommission: itemsSum.farmerCommission,
                    farmerCommissionGross: itemsSum.farmerCommissionGross,
                    farmerCampaignDiscount: itemsSum.farmerCampaignDiscount,
                    farmerRateUsed: farmerRate,
                    farmerReceiveAmount: itemsSum.farmerReceiveAmount + deliveryFee,
                    // 5/24 #82 Phase 2 Chunk 3: クーポン適用結果（適用先の order にのみ記録）
                    appliedCouponCode: draft.appliedCouponCode,
                    referralDiscountAmount: draft.referralDiscountAmount,
                    // #172 案B: 前払い＋ウォレット
                    prepaid: true,
                    paymentGroupId,
                    paymentGroupTotal: groupTotalSum,
                    subtotal: draft.subtotal,
                    walletApplied: draft.walletApplied,
                    khqrAmount: draft.khqrAmount,
                    // 7/10 #203 B-2: KHQR支払いが不要（ウォレットで全額まかなった）注文は、確認すべき
                    //   銀行入金が存在しない＝作成時点で「入金確認済」扱い。これで(1)買い手は「お支払い確認中」
                    //   ではなく「農家確認中」に進み(2)承認前キャンセルでウォレット充当分（onOrderCreated で
                    //   実引き落とし済み）が即返金される。KHQR分がある注文だけ false（運営照合が要る）。
                    depositConfirmed: draft.khqrAmount === 0,
                    paymentUnconfirmed: false,
                    tradeCompleted: false,
                    refundedToWallet: false,
                    // 7/10 #203 A-5: 買い手が添付した支払い控えURL（paymentGroup 内 全 order 同一・任意なので null 可）
                    buyerPaymentProofUrl: buyerProofUrl || null,
                    // legacy: 先頭item由来（既存表示・通知向け）
                    listingId: first.listingId,
                    quantity: first.quantity,
                    gutProcessing: first.gutProcessing,
                    snapFishType: first.snapFishType,
                    snapSize: first.snapSize,
                    snapPhotoUrl: first.snapPhotoUrl,
                    snapPrice: first.snapPrice,
                    snapGutPrice: first.snapGutPrice,
                    // ステータス
                    status: 'pending',
                    declineReason: null,
                    // #172 案B: 前払い済みは作成時に paid（受取時払いの 'pending' から変更）
                    paymentStatus: 'paid',
                    createdAt: serverTimestamp(),
                });
            });

            // 5/24 #82 Phase 2 Chunk 3: クーポン使用済みマーク（同一 batch 内）
            // Rules: 所有者のみ + usedOrderId が null のときのみ + usedAt/usedOrderId のみ書き換え
            // → 二重使用ガード（同時に別タブで使われたら Rules で reject）
            if (appliedCoupon && couponTargetIdx >= 0) {
                const couponRef = doc(db, 'coupons', appliedCoupon.code);
                batch.update(couponRef, {
                    usedAt: serverTimestamp(),
                    usedOrderId: orderRefs[couponTargetIdx].id,
                });
            }

            await batch.commit();
            await clearCart(uid);
            // 6/29 #186: 初回注文後に通知ソフト確認を出すため pending フラグを立てる（遷移先 orders.html で回収）。
            //   遷移直前なので localStorage を同期セット（動的 import の非同期完了を待たない）。
            try { localStorage.setItem('fishlink_push_optin_pending', 'restaurant'); } catch (e) { /* ignore */ }
            // 5/23 #78: 注文確定後は location.replace で履歴を置換。戻るボタンで
            //   空のカート画面に戻れないようにし、ユーザーの混乱を防ぐ。
            location.replace('/pages/restaurant/orders.html');
        }

        // ── #172: ウォレット残高（前払い充当の原資）──
        // wallets/{uid}.balance を read（CF が書く・クライアントは read-only）。
        async function loadWalletBalance() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            try {
                const snap = await getDoc(doc(db, 'wallets', uid));
                walletBalance = snap.exists() ? Number(snap.data()?.balance || 0) : 0;
            } catch (e) {
                console.warn('loadWalletBalance failed:', e);
                walletBalance = 0;
            }
        }

        // ── 6/7 #134 C → #178: クーポンウォレット（自動適用）──
        // 所有者・未使用・期限内のクーポンを取得。#178: 期限が近い（古い）順に自動で1枚適用。
        // 〔外す〕で「今回は使わない」（couponManuallyRemoved=true で再自動適用しない）。
        let availableCoupons = [];   // [{ code, amountKhr, expStr, expMs, sourceText }] expMs 昇順（期限近い順）

        async function loadCouponWallet() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            try {
                const snap = await getDocs(query(
                    collection(db, 'coupons'),
                    where('ownerUid', '==', uid)
                ));
                const now = Date.now();
                const usable = snap.docs.map(d => ({ code: d.id, ...d.data() }))
                    .filter(c => !c.usedAt && !c.usedOrderId)
                    .filter(c => { const e = c.expiresAt?.toMillis?.(); return !e || e > now; })
                    // #178: 期限が近い（古い）順。期限なしは末尾。
                    .sort((a, b) => {
                        const ea = a.expiresAt?.toMillis?.() ?? Infinity;
                        const eb = b.expiresAt?.toMillis?.() ?? Infinity;
                        return ea - eb;
                    });
                // 紹介元名を一括取得（N+1 抑止・data-cache 経由）
                const sourceUids = [...new Set(usable.map(c => c.sourceUid).filter(Boolean))];
                const sourceNames = {};
                await Promise.all(sourceUids.map(async (suid) => {
                    try { const u = await getCachedUser(suid); sourceNames[suid] = u?.displayName || ''; }
                    catch (e) { /* ignore */ }
                }));
                availableCoupons = usable.map(c => {
                    const expMs = c.expiresAt?.toMillis?.();
                    const expStr = expMs
                        ? new Date(expMs).toLocaleDateString(i18next.language || 'en', { year: 'numeric', month: 'short', day: 'numeric' })
                        : '';
                    const sName = c.sourceUid ? (sourceNames[c.sourceUid] || '') : '';
                    let sourceText;
                    if (!sName) sourceText = i18next.t('myCoupons.sourceUnknown');
                    else if (c.issuedReason === 'referrer') sourceText = i18next.t('myCoupons.sourceReferrer', { name: sName });
                    else sourceText = i18next.t('myCoupons.sourceReferred', { name: sName });
                    return { code: c.code, amountKhr: Number(c.amountKhr || 0), expMs: expMs ?? Infinity, expStr, sourceText };
                });
            } catch (e) {
                console.warn('loadCouponWallet failed:', e);
                availableCoupons = [];
            }
        }

        // #178: クーポンの自動適用＋「✓ 適用中／〔外す〕」表示。
        function renderCouponWallet() {
            const block = document.getElementById('coupon-applied');
            if (!block) return;
            // 適用中クーポンがウォレットから消えていたら解除（期限切れ・別タブ使用など）
            if (appliedCoupon && !availableCoupons.some(c => c.code === appliedCoupon.code)) {
                appliedCoupon = null;
            }
            // 未適用かつ手動で外していなければ、期限が近い（古い）順の先頭を自動適用
            if (!appliedCoupon && !couponManuallyRemoved && availableCoupons.length > 0) {
                const c = availableCoupons[0];
                appliedCoupon = { code: c.code, amountKhr: c.amountKhr };
            }
            if (!appliedCoupon) {
                block.style.display = 'none';
                return;
            }
            const c = availableCoupons.find(x => x.code === appliedCoupon.code);
            block.style.display = 'flex';
            const amtEl = document.getElementById('coupon-applied-amt');
            const metaEl = document.getElementById('coupon-applied-meta');
            if (amtEl) amtEl.textContent = i18next.t('myCoupons.amountUnit', { amount: appliedCoupon.amountKhr.toLocaleString(KHR_LOCALE) });
            if (metaEl) {
                const meta = c
                    ? [c.sourceText, c.expStr ? i18next.t('myCoupons.expiresAt', { date: c.expStr }) : ''].filter(Boolean).join(' · ')
                    : '';
                metaEl.textContent = meta;
            }
        }

        // 〔外す〕＝今回は使わない（次回に取っておく）。再自動適用しない。
        document.getElementById('coupon-remove-btn').addEventListener('click', () => {
            appliedCoupon = null;
            couponManuallyRemoved = true;
            renderCouponWallet();
            if (stage === 'confirm') renderConfirm();
        });

        // ── チェックアウトボタン：ステージ遷移を制御 ──
        document.getElementById('checkout-btn').addEventListener('click', async () => {
            errEl.classList.remove('show');
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            loading.classList.add('show');
            try {
                if (stage === 'cart') {
                    if (cartItems.length === 0) return;
                    // 納品日時が全て設定されているか確認
                    const farmerIdsInCart = [...new Set(cartItems.map(it => it.farmerId))];
                    for (const fid of farmerIdsInCart) {
                        const pick = deliveryPick.get(fid);
                        if (!pick?.dateIso || !pick?.time) {
                            throw new Error(i18next.t('cart.errorDelivery'));
                        }
                    }

                    // 6/1 #111: 最低注文量の最終検証（C案・直接入力等の経路漏れを止める保険）
                    for (const it of cartItems) {
                        const listing = listingCache.get(it.listingId);
                        const minOrder = listing?.minOrder || 1;
                        if ((it.quantity || 0) < minOrder) {
                            const fishType = listing?.fishType || '';
                            const name = i18next.exists(`fish.${fishType}`) ? i18next.t(`fish.${fishType}`) : fishType;
                            throw new Error(i18next.t('cart.errorMinOrderQty', { name, kg: minOrder }));
                        }
                    }

                    // 6/1 #111 (diff10): 「配送料節約の提案」は当面非表示。常に確認画面へ直行。
                    // 6/7 #134 C → #178: 確認画面に入る前にクーポンを自動適用。
                    // #172: ウォレットは確認画面で自動全額充当（ユーザー指定はリセット）。
                    walletUserSet = false;
                    walletEditOpen = false;
                    renderCouponWallet();
                    await renderConfirm();
                    setStage('confirm');
                } else if (stage === 'confirm') {
                    // #172: お支払い額>0 → KHQR画面へ。==0（ウォレット全額）→ 直接注文確定。
                    const payAmount = Math.max(0, confirmGrandTotal - walletApplied);
                    if (payAmount > 0) {
                        // 7/10 #203 A-5: khqr へ「新規に進入」する時だけ控え添付をリセット
                        //   （renderKhqr は言語切替でも呼ばれる＝そこでリセットすると添付が消える）。
                        resetProofAttach();
                        renderKhqr(payAmount);
                        setStage('khqr');
                    } else {
                        await placeOrders();
                    }
                } else if (stage === 'khqr') {
                    // #172: 〔支払いました〕→ 中央確認モーダル → placeOrders
                    openPaidModal();
                }
            } catch (err) {
                console.error(err);
                errEl.textContent = err.message || i18next.t('cart.errorSubmit');
                errEl.classList.add('show');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        // ── #172: KHQR画面の描画（お支払い額・差引リキャップ・タグ）──
        function renderKhqr(payAmount) {
            document.getElementById('khqr-amt-value').textContent = fmtKhr(payAmount);
            // 7/10 #203 A-2: 「金額が入っていない」警告は #khqr-tag の data-i18n（payment.khqrNoAmountWarn）が
            //   init/言語切替で適用するため JS 側での上書きは不要（静的QR＝金額補間なし）。
            // 7/10 #203 A-5: 控え添付のリセットは「新規に khqr へ進入する時だけ」行う（confirm→khqr 遷移側で呼ぶ）。
            //   renderKhqr は言語切替でも呼ばれるため、ここでリセットすると添付済みの控えが消えてしまう。
            // 2026-07-17 #211③: ✕の aria-label は言語に追従させる。
            //   applyTranslations の属性記法 `[attr]key` は \w のみ対応＝ハイフンを含む aria-label は
            //   マッチせず textContent 扱いになってしまうため、data-i18n ではなくここで直接セットする。
            const clearBtn = document.getElementById('khqr-attach-clear');
            if (clearBtn) clearBtn.setAttribute('aria-label', i18next.t('payment.attachProofRemove'));
            const sub = document.getElementById('khqr-sub');
            if (walletApplied > 0) {
                sub.innerHTML = i18next.t('payment.khqrDeducted', {
                    total: confirmGrandTotal.toLocaleString(KHR_LOCALE),
                    wallet: `<b>${walletApplied.toLocaleString(KHR_LOCALE)}</b>`,
                });
                sub.style.display = 'block';
            } else {
                sub.style.display = 'none';
            }
            // 金額を保持（コピー用）
            khqrPayAmount = payAmount;
        }
        let khqrPayAmount = 0;

        // 7/10 #203 B-1: 再支払いモードの初期化。既存の未確認注文を読み、khqr ステージを直接表示。
        async function initRepay() {
            try {
                const snap = await getDoc(doc(db, 'orders', repayOrderId));
                if (!snap.exists()) { location.replace('/pages/restaurant/orders.html'); return; }
                const order = snap.data();
                // 本人・前払い・承認前（pending）・未確認扱い（depositConfirmed でない）だけ再支払い可
                if (order.restaurantId !== window.currentUser.uid
                    || order.prepaid !== true
                    || order.status !== 'pending'
                    || order.depositConfirmed === true) {
                    location.replace('/pages/restaurant/orders.html'); return;
                }
                repayOrder = order;
                // ヘッダータイトル「お支払い」は末尾の setStage('khqr') が applyStageTitle() で付ける
                //   （2026-07-17 #211①でステージ別タイトルに一本化＝ここでの個別セットは不要になった）。
                resetProofAttach();
                renderKhqr(Math.max(0, Number(order.khqrAmount || 0)));
                // 再支払いでは「合計−ウォレット」の差引サブ行は出さない（元注文で充当済み）。
                const sub = document.getElementById('khqr-sub');
                if (sub) sub.style.display = 'none';
                setStage('khqr');
            } catch (e) {
                console.error('repay init failed', e);
                location.replace('/pages/restaurant/orders.html');
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 7/10 #203 B-1: 再支払いの〔支払いました〕＝新規注文は作らず、その注文を「お支払い確認中」に戻す
        //   （paymentUnconfirmed を下ろす）。控えを付け直していれば buyerPaymentProofUrl も更新。
        async function submitRepay() {
            const upd = { paymentUnconfirmed: false };
            if (buyerProofUrl) upd.buyerPaymentProofUrl = buyerProofUrl;
            await updateDoc(doc(db, 'orders', repayOrderId), upd);
            location.replace('/pages/restaurant/orders.html');
        }

        // #172: 金額をコピー（KHQRは金額手入力＝誤入力防止）。数字のみコピー。
        document.getElementById('khqr-copy-btn').addEventListener('click', async () => {
            const btn = document.getElementById('khqr-copy-btn');
            const label = btn.querySelector('span[data-i18n]');
            try {
                await navigator.clipboard.writeText(String(khqrPayAmount));
                if (label) { label.textContent = i18next.t('payment.copied'); setTimeout(() => { label.textContent = i18next.t('payment.copyAmount'); }, 1500); }
            } catch (e) { console.warn('clipboard failed:', e); }
        });

        // 7/10 #203 A-5: お支払いの控えを添付（任意）。控え行を初期状態へ戻す。
        function resetProofAttach() {
            buyerProofUrl = null;
            const row = document.getElementById('khqr-attach-row');
            const icon = document.getElementById('khqr-attach-icon');
            const title = document.getElementById('khqr-attach-title');
            const thumb = document.getElementById('khqr-attach-thumb');
            const input = document.getElementById('khqr-proof-input');
            if (row) row.classList.remove('done');
            if (icon) icon.textContent = 'attach_file';
            // #211③: data-i18n も戻す＝言語切替（applyTranslations）で正しいキーが再適用される
            if (title) { title.setAttribute('data-i18n', 'payment.attachProof'); title.textContent = i18next.t('payment.attachProof'); }
            if (thumb) { thumb.style.display = 'none'; thumb.removeAttribute('src'); }
            if (input) input.value = '';
        }

        // 7/10 #203 A-5: 選択 → paymentProofs/{uid}/ へ即アップロード → buyerProofUrl に保持 → 「控えを添付しました」表示。
        document.getElementById('khqr-proof-input').addEventListener('change', async (e) => {
            const input = e.target;
            const file = input.files && input.files[0];
            if (!file) return;
            const uid = window.currentUser?.uid;
            if (!uid) return;
            loading.classList.add('show');
            try {
                const storageRef = ref(storage, `paymentProofs/${uid}/${Date.now()}.jpg`);
                const url = await uploadImageResized(storageRef, file);
                buyerProofUrl = url;
                // 添付済み表示（チェックアイコン＋文言＋サムネ）
                const icon = document.getElementById('khqr-attach-icon');
                const title = document.getElementById('khqr-attach-title');
                const thumb = document.getElementById('khqr-attach-thumb');
                const row = document.getElementById('khqr-attach-row');
                if (icon) icon.textContent = 'check_circle';
                // ⚠ #211③: textContent だけだと、言語を切り替えた瞬間に applyTranslations が
                //   静的な data-i18n="payment.attachProof"（未添付の文言）で上書きしてしまい、
                //   添付済みなのに「控えを添付」に戻って見える。data-i18n ごと付け替える。
                if (title) { title.setAttribute('data-i18n', 'payment.attachProofDone'); title.textContent = i18next.t('payment.attachProofDone'); }
                if (row) row.classList.add('done');
                if (thumb) { thumb.src = url; thumb.style.display = 'block'; }
            } catch (err) {
                console.warn('proof upload failed:', err);
                // 失敗しても支払い自体は進められる（控えは任意）。行は初期状態に戻す。
                // ⚠ 2026-07-19: 以前は無言でリセットしていたため、実機で「押しても何も起きない」ように見えた
                //   （Storage ルール未公開＝permission-denied のときも同じ見え方になる）。必ず理由を出す。
                resetProofAttach();
                showToast(i18next.t('payment.attachProofFailed'), { icon: false, duration: 4000 });
            } finally {
                loading.classList.remove('show');
            }
        });

        // 2026-07-17 #211③: 控えの✕＝添付を取り消して付け直せる（間違えて添付しても直せる＝標準UX）。
        //   ⚠ ✕は <label class="attach-row"> の内側にあるため、click をそのまま通すと label が
        //     ファイル選択ダイアログを開いてしまう（✕を押すたびにピッカーが出る）。
        //     preventDefault() と stopPropagation() の両方が必須。
        //   ※ 既に paymentProofs/ にアップロード済みの画像は削除しない（未参照になるだけ＝MVP許容）。
        //     注文には buyerProofUrl=null が入るので、運営の入金照合（#204）には出ない。
        document.getElementById('khqr-attach-clear').addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            resetProofAttach();
        });

        // ⚠ 2026-07-19: 控え行のタップで確実にファイル選択を開く。
        //   <label> が hidden な file input を暗黙に activate する挙動は端末差があり
        //   （iOS Safari 等では display:none の input が開かないことがある）、実機で「押しても何も起きない」
        //   と報告された。→ label の既定動作は preventDefault で止め、input.click() を明示的に呼ぶ
        //   （post.html / account/profile.html 等、アプリ内で実績のある方式に統一）。
        document.getElementById('khqr-attach-row').addEventListener('click', (e) => {
            const inputEl = document.getElementById('khqr-proof-input');
            if (!inputEl) return;
            if (e.target === inputEl) return;                       // input 自身の click は素通し（再帰防止）
            if (e.target.closest && e.target.closest('#khqr-attach-clear')) return;  // ✕ は自前ハンドラに任せる
            e.preventDefault();                                     // label の暗黙フォワードを止める＝二重に開かない
            inputEl.click();
        });

        // #172: 〔支払いました〕中央確認モーダル → placeOrders
        const paidModalEl = document.getElementById('paid-modal');
        function openPaidModal() { paidModalEl.classList.add('show'); }
        function closePaidModal() { paidModalEl.classList.remove('show'); }
        document.getElementById('paid-modal-no').addEventListener('click', closePaidModal);
        paidModalEl.addEventListener('click', (e) => { if (e.target === paidModalEl) closePaidModal(); });
        document.getElementById('paid-modal-yes').addEventListener('click', async () => {
            closePaidModal();
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            loading.classList.add('show');
            errEl.classList.remove('show');
            try {
                // 7/10 #203 B-1: 再支払いモードは新規注文でなく既存注文の未確認解除。
                if (repayOrderId) { await submitRepay(); }
                else { await placeOrders(); }
            } catch (err) {
                console.error(err);
                errEl.textContent = err.message || i18next.t('cart.errorSubmit');
                errEl.classList.add('show');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        });

        // 戻る矢印：ステージを1つ戻す、最前面なら history.back()
        const backLink = document.querySelector('.page-header__back');
        if (backLink) {
            backLink.addEventListener('click', (e) => {
                // 7/10 #203 B-1: 再支払いモードは confirm ステージが存在しない＝既定の history.back()（注文状況へ）。
                if (repayOrderId) return;
                // 6/1 #111 (diff10): 提案ステージは廃止。確認画面からはカートへ直接戻す。
                // #172: KHQR画面からは確認画面へ（クーポン行・お支払い明細を再描画）。
                if (stage === 'khqr') {
                    e.preventDefault();
                    renderConfirm().catch(() => {});
                    setStage('confirm');
                } else if (stage === 'confirm' || stage === 'suggest') {
                    e.preventDefault();
                    setStage('cart');
                }
            });
        }

        // 初期化：ボタンラベルをセット（再支払いモードは initRepay が khqr ステージを直接セット）
        if (!repayOrderId) setStage('cart');
    </script>
</body>

</html>
