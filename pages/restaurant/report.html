<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .report-page { max-width: 480px; margin: 0 auto; padding: 16px 16px 120px; }
        .report-head { text-align: center; margin-bottom: 14px; }
        .report-head__title { font-size: 22px; font-weight: 700; }
        .report-head__sub { font-size: 13px; color: var(--color-text-sub); margin-top: 4px; }

        .target-card { background: #f8fafc; border: 1px solid var(--color-border); border-radius: 16px; padding: 12px 14px; margin-bottom: 14px; }
        .target-card__name { font-size: 16px; font-weight: 700; }
        .target-card__fish { font-size: 13px; color: var(--color-text-sub); margin-top: 2px; }
        .target-card__date { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }

        .sec { margin-bottom: 16px; }
        .sec__label { font-size: 13px; font-weight: 700; margin-bottom: 8px; }

        .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .type-option {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-text);
        }
        .type-option::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e5e7eb;
            flex-shrink: 0;
        }
        /* 6/17 #150 ⑤: 選択中の色 オレンジ→青 */
        .type-option.active {
            background: var(--color-cta-lt);
            border-color: var(--color-cta);
            color: var(--color-cta);
        }
        .type-option.active::before { background: var(--color-cta); }

        .photo-upload {
            border: 1px dashed var(--color-border);
            background: #f9fafb;
            border-radius: 14px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
        }
        .photo-upload__icon { font-size: 28px; color: #94a3b8; }
        .photo-upload__text { font-size: 14px; font-weight: 600; margin-top: 4px; }
        .photo-upload__hint { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }

        .photo-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .photo-preview img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; }

        textarea.detail-input {
            width: 100%; min-height: 90px;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 16px;
            font-family: inherit;
            background: #f9fafb;
            resize: vertical;
        }
        textarea.detail-input:focus { outline: none; background: #fff; border-color: var(--color-primary); }

        /* 6/17 #150 ⑧: 運営確認ノート amber→中立グレー */
        .note-box {
            background: #f8fafc;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--color-text-sub);
            margin-bottom: 10px;
        }
        /* 6/17 #150 §6: 配送チャットで相談（注文進行中＝配送管理チャットが開いている時だけ表示） */
        .chat-consult {
            display: none; align-items: center; justify-content: center; gap: 6px;
            width: 100%; box-sizing: border-box;
            background: var(--color-cta-lt); color: var(--color-cta);
            border: 1px solid var(--color-cta); border-radius: 14px;
            padding: 11px; font-size: 14px; font-weight: 700;
            text-decoration: none; margin-bottom: 12px; font-family: inherit;
        }
        .chat-consult.show { display: flex; }
        .chat-consult .material-symbols-outlined { font-size: 18px; }

        .footer-actions {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 480px; margin: 0 auto;
            background: var(--color-surface); border-top: 1px solid var(--color-border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        }
        /* 6/17 #150 ⑦: 送信ボタン 赤→青塗り（入口の赤枠アウトラインは維持） */
        .btn-submit-report {
            width: 100%;
            background: var(--color-cta);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-submit-report:disabled { opacity: .6; }

        .error-msg { font-size: 13px; color: #b91c1c; padding: 6px 0; }

        .submitted-state { text-align: center; padding: 40px 20px; }
        .submitted-state__icon { font-size: 60px; color: #16a34a; }
        .submitted-state__text { font-size: 16px; font-weight: 700; margin-top: 8px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="javascript:history.back()" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/restaurant/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="report.title"></div>
    </div>

    <div class="report-page">

        <div id="main-view">
            <!-- 6/17 #150 ①②: タイトルは「問題を報告」に統一・大H1は削除（上部 sub-page__title が見出し） -->
            <div class="report-head">
                <div class="report-head__sub" data-i18n="report.subtitle"></div>
            </div>

            <div class="target-card">
                <div class="target-card__name" id="target-name">-</div>
                <div class="target-card__fish" id="target-fish">-</div>
                <div class="target-card__date" id="target-date"></div>
            </div>

            <div class="sec">
                <div class="sec__label" data-i18n="report.typeLabel"></div>
                <!-- 6/17 #150 ③: レストランのカテゴリ 4→6（届かない・数量不足・注文と違う・品質問題・配送遅延・その他） -->
                <div class="type-grid" id="type-grid">
                    <button type="button" class="type-option" data-value="not_arrived" data-i18n="report.type_not_arrived"></button>
                    <button type="button" class="type-option" data-value="shortage" data-i18n="report.type_shortage"></button>
                    <button type="button" class="type-option" data-value="wrong" data-i18n="report.type_wrong"></button>
                    <button type="button" class="type-option" data-value="quality" data-i18n="report.type_quality"></button>
                    <button type="button" class="type-option" data-value="delay" data-i18n="report.type_delay"></button>
                    <button type="button" class="type-option" data-value="other" data-i18n="report.type_other"></button>
                </div>
            </div>

            <!-- 6/17 #150 ⑨: 写真は複数添付可・「写真を追加（任意）」で統一 -->
            <div class="sec">
                <div class="sec__label" data-i18n="report.photoOptional"></div>
                <div class="photo-upload" id="photo-area">
                    <span class="material-symbols-outlined photo-upload__icon">add_photo_alternate</span>
                    <div class="photo-upload__text" data-i18n="report.photoUpload"></div>
                </div>
                <input type="file" id="photo-input" accept="image/*" multiple style="display:none;">
                <div class="photo-preview" id="photo-preview"></div>
            </div>

            <div class="sec">
                <div class="sec__label" data-i18n="report.detailLabel"></div>
                <textarea class="detail-input" id="detail-input" data-i18n="[placeholder]report.restPlaceholder"></textarea>
            </div>

            <div class="note-box" data-i18n="report.processNote"></div>

            <div class="error-msg" id="error-msg" style="display:none;"></div>
        </div>

        <div id="submitted-view" style="display:none;">
            <div class="submitted-state">
                <span class="material-symbols-outlined submitted-state__icon">check_circle</span>
                <div class="submitted-state__text" data-i18n="report.submitted"></div>
                <!-- 6/17 #150 ⑪: 送信後文言の一行 -->
                <div style="font-size:13px; color:var(--color-text-sub); margin-top:8px; line-height:1.6;" data-i18n="report.processNote"></div>
                <!-- 6/17 #150 ⑩: 戻るボタン 紺→青・レストランは「注文状況へ戻る」 -->
                <a href="/pages/restaurant/orders.html" style="display:inline-block; margin-top:18px; background:var(--color-cta); color:#fff; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:700; font-size:14px;" data-i18n="report.backToOrderStatus"></a>
            </div>
        </div>
    </div>

    <div class="footer-actions" id="footer-actions">
        <!-- 6/17 #150 §6: 配送チャットで相談（注文進行中＝配送管理チャットが開いている時だけ .show で表示） -->
        <a class="chat-consult" id="chat-consult" href="#">
            <span class="material-symbols-outlined">forum</span>
            <span data-i18n="report.consultViaChat"></span>
        </a>
        <button class="btn-submit-report" id="submit-btn" data-i18n="report.submit"></button>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import {
            doc, getDoc, addDoc, updateDoc, collection, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import {
            ref, uploadBytes, getDownloadURL
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { uploadImageResized } from '/js/image-resize.js';
        // 5/25 #91/#92 拡張: 対象注文情報を render-cache 化
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const orderId = new URLSearchParams(location.search).get('id');
        if (!orderId) { location.href = '/pages/restaurant/orders.html'; }

        // 5/25 #91/#92 拡張: 対象注文の表示部を render-cache から即時復元
        (function applyCache() {
            try {
                const cached = loadRenderState(`restaurant_report:${orderId}`);
                if (!cached) return;
                const n = document.getElementById('target-name');
                const f = document.getElementById('target-fish');
                const d = document.getElementById('target-date');
                if (n && cached.targetName) n.textContent = cached.targetName;
                if (f && cached.targetFish) f.textContent = cached.targetFish;
                if (d && cached.targetDate) d.textContent = cached.targetDate;
            } catch (e) { /* ignore */ }
        })();

        // 種類選択
        let selectedType = null;
        document.getElementById('type-grid').addEventListener('click', (e) => {
            const btn = e.target.closest('button.type-option');
            if (!btn) return;
            selectedType = btn.dataset.value;
            document.querySelectorAll('#type-grid .type-option').forEach(b => b.classList.toggle('active', b === btn));
        });

        // 写真アップロード
        let selectedFiles = [];
        document.getElementById('photo-area').addEventListener('click', () => {
            document.getElementById('photo-input').click();
        });
        document.getElementById('photo-input').addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            const preview = document.getElementById('photo-preview');
            preview.innerHTML = '';
            selectedFiles.forEach(f => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(f);
                preview.appendChild(img);
            });
        });

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        let orderData = null;
        waitForUserData(async () => {
            loading.classList.add('show');
            try {
                const orderSnap = await getDoc(doc(db, 'orders', orderId));
                if (!orderSnap.exists()) { location.href = '/pages/restaurant/orders.html'; return; }
                orderData = orderSnap.data();

                if (orderData.restaurantId !== window.currentUser.uid) {
                    alert('Not allowed');
                    location.href = '/pages/restaurant/orders.html';
                    return;
                }

                const farmerSnap = await getDoc(doc(db, 'users', orderData.farmerId));
                const farmer = farmerSnap.data() || {};
                document.getElementById('target-name').textContent = farmer.displayName || '-';
                const fishTypeKey = orderData.snapFishType || '';
                const fishName = i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey;
                const shortName = fishName ? fishName.trim() : '';
                document.getElementById('target-fish').textContent = `${shortName} ${orderData.quantity || 0}kg`;
                document.getElementById('target-date').textContent =
                    `${i18next.t('orders.deliveryDate')} ${orderData.deliveryDate || ''} ${orderData.deliveryTime || ''}`;
                // 6/17 #150 §6: 配送チャットで相談（注文進行中＝配送管理チャットが開いている時だけ表示・完了後は非表示）
                const chatConsult = document.getElementById('chat-consult');
                if (chatConsult && ['approved', 'preparing', 'delivering'].includes(orderData.status)) {
                    chatConsult.href = `/pages/restaurant/delivery.html?id=${orderId}`;
                    chatConsult.classList.add('show');
                }
                // 5/25 #91/#92 拡張: 次回訪問用に表示部をキャッシュ
                try {
                    saveRenderState(`restaurant_report:${orderId}`, {
                        targetName: document.getElementById('target-name')?.textContent || '',
                        targetFish: document.getElementById('target-fish')?.textContent || '',
                        targetDate: document.getElementById('target-date')?.textContent || '',
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        document.getElementById('submit-btn').addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            if (!selectedType) {
                errorMsg.textContent = i18next.t('report.errorType');
                errorMsg.style.display = 'block';
                return;
            }
            const detail = document.getElementById('detail-input').value.trim();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            loading.classList.add('show');
            try {
                const uid = window.currentUser.uid;
                // 写真アップロード
                // 5/11 #67: リサイズ+圧縮+リトライ
                const photoUrls = [];
                for (const file of selectedFiles) {
                    const baseName = (file.name || 'report').replace(/\.[^.]+$/, '');
                    const storageRef = ref(storage, `reports/${uid}/${Date.now()}_${baseName}.jpg`);
                    const url = await uploadImageResized(storageRef, file);
                    photoUrls.push(url);
                }

                await addDoc(collection(db, 'reports'), {
                    orderId,
                    fromUid: uid,
                    fromRole: 'restaurant',
                    reportedUid: orderData.farmerId,
                    type: selectedType,
                    photos: photoUrls,
                    detail: detail || null,
                    status: 'open',
                    createdAt: serverTimestamp(),
                });

                // 6/17 #150 §5: 報告済みマーカー（入口を「報告済み・対応中」に＝1注文1オープン・再送信不可）。
                // 6/5 #129 ④/§8: レストランの問題報告→該当注文の農家送金を保留（運営が調査して送金/返金/一部返金）。
                //   既に送金済(remitted)・完了(done)の場合は保留しない。
                const orderUpdate = { restaurantReportOpen: true };
                if (!['remitted', 'done'].includes(orderData.adminStatus)) {
                    orderUpdate.paymentProblemHold = true;
                }
                try {
                    await updateDoc(doc(db, 'orders', orderId), orderUpdate);
                } catch (e) { console.warn('set order report markers failed:', e); }

                document.getElementById('main-view').style.display = 'none';
                document.getElementById('footer-actions').style.display = 'none';
                document.getElementById('submitted-view').style.display = 'block';
            } catch (err) {
                console.error(err);
                errorMsg.textContent = i18next.t('report.errorSubmit');
                errorMsg.style.display = 'block';
                btn.disabled = false;
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });
    </script>
</body>

</html>
