<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        /* hidden 属性を最優先で効かせる。.chat-input-bar/.sc-attach/.sc-existing は display:flex を
           明示しており、UA 既定の [hidden]{display:none} が負けて非チャット画面でも表示されてしまうため。 */
        [hidden] { display: none !important; }

        .chat-page { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; background: #f8fafc; }
        .chat-page__head {
            display: flex; align-items: center; gap: 8px; padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0; background: #fff; position: sticky; top: 0; z-index: 5;
        }
        .chat-page__back {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 999px; color: #475569;
            background: none; border: none; cursor: pointer;
        }
        .chat-page__back:hover { background: #f1f5f9; }
        .chat-page__title { font-size: 16px; font-weight: 700; color: #0f172a; }
        .chat-body { flex: 1; overflow-y: auto; padding: 16px; }

        /* ① カテゴリ選択 */
        .sc-q { font-size: 15px; font-weight: 800; margin: 2px 0 14px; color: #0f172a; }
        .sc-existing {
            display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
            background: var(--color-cta-lt); border: 1px solid #cfe0f3; border-radius: 12px;
            padding: 13px 14px; margin-bottom: 16px; cursor: pointer;
        }
        .sc-existing__ic { width: 38px; height: 38px; border-radius: 50%; background: var(--color-cta); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .sc-existing__b { flex: 1; min-width: 0; }
        .sc-existing__t { font-size: 14px; font-weight: 700; color: var(--color-cta-dk); }
        .sc-existing__h { font-size: 11.5px; color: #5b7794; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sc-existing__dot { width: 9px; height: 9px; border-radius: 50%; background: #dc2626; flex-shrink: 0; }
        .sc-cat {
            display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 14px; margin-bottom: 10px; cursor: pointer;
        }
        .sc-cat:hover { background: #f8fafc; }
        .sc-cat__ic { color: var(--color-cta); display: flex; flex-shrink: 0; }
        .sc-cat__nm { flex: 1; font-size: 14px; font-weight: 700; color: #0f172a; }
        .sc-cat__ar { color: #cbd5e1; display: flex; }

        /* ② 振り分け */
        .sc-sec { font-size: 13px; font-weight: 800; color: #475569; margin: 18px 0 9px; }
        .sc-sec:first-child { margin-top: 2px; }
        .sc-hint { font-size: 11.5px; color: #94a3b8; margin: -2px 0 9px; line-height: 1.5; }
        .sc-desk { display: flex; flex-direction: column; gap: 9px; }
        .sc-deskbtn {
            display: flex; align-items: center; justify-content: center; gap: 7px;
            font-size: 13.5px; font-weight: 800; padding: 12px; border-radius: 10px;
            border: 1.5px solid var(--color-cta); color: var(--color-cta); background: #fff;
            text-decoration: none; cursor: pointer;
        }
        .sc-deskbtn.danger { border-color: var(--color-danger); color: var(--color-danger); }
        .sc-deskbtn .material-symbols-outlined { font-size: 18px; }
        .sc-escnote { font-size: 11.5px; color: #94a3b8; text-align: center; margin: 20px 0 8px; }
        /* 6/22 #169 A5: 「運営にメッセージを送る」＝副次の見た目（グレー枠・中立色＝最後の手段）。
           自己解決の窓口（青枠）より控えめに（deflection＝運営チャットの量を抑える意図）。
           ※チャット内の送信ボタン(.send-btn)は青のまま。 */
        .sc-escbtn {
            display: block; width: 100%; text-align: center; font-size: 13px; font-weight: 700;
            padding: 12px; border-radius: 12px; background: #fff; color: #5a6470;
            border: 1px solid #c9d0d8; cursor: pointer; font-family: inherit;
        }

        /* ③ チャット */
        .sc-note {
            background: #fff7e6; border: 1px solid #f3d998; border-radius: 10px;
            padding: 10px 12px; font-size: 11.5px; color: #8a6a2a; line-height: 1.6; margin-bottom: 14px;
        }
        .sc-note b { color: #7a5a1a; display: block; margin-bottom: 3px; }
        .sc-note ul { margin: 0; padding-left: 18px; }
        .chat-empty { text-align: center; color: #94a3b8; padding: 50px 16px; font-size: 13px; }

        /* 連絡先マスク警告（アンバー） */
        .mask-warn {
            display: flex; gap: 6px; align-items: flex-start;
            background: #fff7e6; border: 1px solid #f3d998; color: #b36a00;
            font-size: 12px; font-weight: 600; line-height: 1.5;
            border-radius: 10px; padding: 8px 10px; margin: 8px 12px 0;
        }
        .mask-warn .material-symbols-outlined { flex-shrink: 0; }

        /* 添付プレビュー＋入力バー */
        .sc-attach { display: flex; gap: 8px; padding: 8px 12px 0; flex-wrap: wrap; }
        .sc-attach__th { position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; }
        .sc-attach__th img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .sc-attach__del { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sc-attach__del .material-symbols-outlined { font-size: 13px; }
        .chat-input-bar { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #e2e8f0; background: #fff; align-items: center; }
        .sc-cam { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; color: var(--color-cta); cursor: pointer; flex-shrink: 0; }
        .sc-cam:hover { background: var(--color-cta-lt); }
        .chat-input { flex: 1; padding: 10px 14px; font-size: 16px; border: 1px solid #e2e8f0; border-radius: 999px; font-family: inherit; outline: none; }
        .chat-input:focus { border-color: var(--color-cta); }
        .send-btn { width: 44px; height: 44px; border: none; border-radius: 50%; background: var(--color-cta); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .send-btn .material-symbols-outlined { font-size: 20px; }
        .sc-otherbtn { display: block; width: 100%; text-align: center; font-size: 12.5px; font-weight: 700; color: var(--color-cta); background: none; border: none; padding: 12px; cursor: pointer; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="chat-page">
        <div class="chat-page__head">
            <button class="chat-page__back" id="back-btn" aria-label="back">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="chat-page__title" id="head-title"></div>
        </div>

        <!-- ① カテゴリ選択 -->
        <div class="chat-body" id="view-cat" hidden>
            <div class="sc-q" data-i18n="adminChat.catSelectTitle"></div>
            <button class="sc-existing" id="existing-card" hidden>
                <span class="sc-existing__ic"><span class="material-symbols-outlined">forum</span></span>
                <span class="sc-existing__b">
                    <span class="sc-existing__t" data-i18n="adminChat.existingTitle"></span>
                    <span class="sc-existing__h" data-i18n="adminChat.existingHint"></span>
                </span>
                <span class="sc-existing__dot" id="existing-dot" hidden></span>
                <span class="material-symbols-outlined" style="color:#cbd5e1;">chevron_right</span>
            </button>
            <div id="cat-tiles"></div>
        </div>

        <!-- ② 振り分け -->
        <div class="chat-body" id="view-deflect" hidden></div>

        <!-- ③ 運営チャット -->
        <div class="chat-body" id="view-chat" hidden>
            <div class="sc-note">
                <b data-i18n="adminChat.guidanceTitle"></b>
                <ul>
                    <li data-i18n="adminChat.guidance1"></li>
                    <li data-i18n="adminChat.guidance2"></li>
                    <li data-i18n="adminChat.guidance3"></li>
                </ul>
            </div>
            <div class="sup-thread" id="chat-thread">
                <div class="chat-empty" data-i18n="adminChat.empty"></div>
            </div>
            <button class="sc-otherbtn" id="other-inquiry" data-i18n="adminChat.otherInquiry"></button>
        </div>

        <!-- 連絡先マスク警告 -->
        <div class="mask-warn" id="mask-warn" style="display:none;">
            <span class="material-symbols-outlined" style="font-size:16px;">warning</span>
            <span data-i18n="comments.maskWarning"></span>
        </div>

        <!-- 添付プレビュー＋入力バー（チャット表示中のみ） -->
        <div class="sc-attach" id="attach-strip" hidden></div>
        <div class="chat-input-bar" id="input-bar" hidden>
            <label class="sc-cam" id="img-label" data-i18n="[title]adminChat.sendImage">
                <span class="material-symbols-outlined">add_photo_alternate</span>
                <input type="file" id="img-input" accept="image/*" multiple hidden>
            </label>
            <input type="text" class="chat-input" id="chat-input" placeholder="" data-i18n="[placeholder]adminChat.placeholder">
            <button class="send-btn" id="send-btn" aria-label="send">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import {
            collection, query, orderBy, onSnapshot, addDoc, serverTimestamp,
            getDocs, where, updateDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { ref } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        import { maskContacts } from '/js/contact-mask.js';
        import { uploadImageResized } from '/js/image-resize.js';
        import { asCachedImgAttrs } from '/js/image-cache.js';
        import { loadFaqs, renderFaqAccordionHtml, bindFaqAccordion } from '/js/faq-display.js';

        const loading = document.getElementById('loading');

        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        loading.classList.remove('show');
        document.body.classList.add('app-ready');

        // §3 カテゴリ（コード固定・ロール別出し分け）。アイコンは Material Symbols（絵文字不可）。
        const CATEGORIES = [
            { code: 'order', icon: 'inventory_2', roles: ['farmer', 'restaurant'] },
            { code: 'payment', icon: 'payments', roles: ['farmer', 'restaurant'] },
            { code: 'delivery', icon: 'local_shipping', roles: ['farmer', 'restaurant'] },
            { code: 'referral', icon: 'redeem', roles: ['farmer', 'restaurant'] },
            { code: 'account', icon: 'person', roles: ['farmer', 'restaurant'] },
            { code: 'posting', icon: 'sell', roles: ['farmer'] },
            { code: 'other', icon: 'chat', roles: ['farmer', 'restaurant'] },
        ];
        // §4 振り分け窓口（ロール別の該当画面＝特定注文でなくリスト/ハブへ）
        const DESK = {
            farmer: {
                // 6/22 #169 A8: 注文/配送カテゴリは窓口1ボタンに統合（状況確認も問題報告も各注文画面で行う）。
                //   独立した赤「問題を報告」ボタンは置かない（着地が注文リストのトップで報告対象とズレるため）。
                order: [{ k: 'deskOrders', href: '/pages/farmer/orders.html' }],
                delivery: [{ k: 'deskOrders', href: '/pages/farmer/orders.html' }],
                payment: [{ k: 'deskSales', href: '/pages/farmer/account/sales.html' }, { k: 'deskRemitStatus', href: '/pages/farmer/payment.html' }],
                referral: [{ k: 'deskReferral', href: '/pages/farmer/account.html' }],
                account: [{ k: 'deskBasic', href: '/pages/farmer/account/basic.html' }, { k: 'deskRecover', href: '/recover.html' }],
                posting: [{ k: 'deskPostingList', href: '/pages/farmer/dashboard.html' }, { k: 'deskPost', href: '/pages/farmer/post.html' }],
                other: [],
            },
            restaurant: {
                // 6/22 #169 A8: 注文/配送カテゴリは窓口1ボタンに統合（独立した赤「問題を報告」は置かない）。
                order: [{ k: 'deskOrderStatus', href: '/pages/restaurant/orders.html' }],
                delivery: [{ k: 'deskOrderStatus', href: '/pages/restaurant/orders.html' }],
                payment: [{ k: 'deskOrderStatus', href: '/pages/restaurant/orders.html' }, { k: 'deskPayment', href: '/pages/restaurant/payment.html' }],
                referral: [{ k: 'deskReferral', href: '/pages/restaurant/account.html' }],
                account: [{ k: 'deskBasic', href: '/pages/restaurant/account/basic.html' }, { k: 'deskRecover', href: '/recover.html' }],
                other: [],
            },
        };
        const HINT_KEY = { order: 'deskHintOrder', delivery: 'deskHintOrder', payment: 'deskHintPayment', referral: 'deskHintReferral', account: 'deskHintAccount', posting: 'deskHintPosting' };

        const WEEKDAY = { ja: ['日', '月', '火', '水', '木', '金', '土'], en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'] };
        function lang() { return (i18next.language || 'km'); }
        function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
        function catLabel(code) { const key = `adminChat.category${cap(code)}`; return i18next.exists(key) ? i18next.t(key) : code; }
        function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
        function fmtDateSep(d) {
            const wd = (WEEKDAY[lang()] || WEEKDAY.en)[d.getDay()];
            if (lang() === 'ja') return `${d.getMonth() + 1}月${d.getDate()}日（${wd}）`;
            if (lang() === 'km') return `${d.getDate()}/${d.getMonth() + 1}（${wd}）`;
            return `${WEEKDAY.en[d.getDay()]}, ${d.getMonth() + 1}/${d.getDate()}`;
        }
        function fmtTime(d) { return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; }

        let uid = null;
        let messagesCache = [];     // {id, ...data} ordered asc
        let pendingCategory = null; // 振り分けから持ち込むカテゴリ（送信時に件区切りを判定）
        let selectedFiles = [];     // {file, preview}
        let currentView = 'cat';

        function waitForUserData(cb) { if (window.currentUserData) cb(); else setTimeout(() => waitForUserData(cb), 200); }

        // ── ビュー切替 ──────────────────────────────────────────────
        function showView(name, opts = {}) {
            currentView = name;
            document.getElementById('view-cat').hidden = name !== 'cat';
            document.getElementById('view-deflect').hidden = name !== 'deflect';
            document.getElementById('view-chat').hidden = name !== 'chat';
            const chatUi = name === 'chat';
            document.getElementById('input-bar').hidden = !chatUi;
            document.getElementById('attach-strip').hidden = !chatUi || selectedFiles.length === 0;
            document.getElementById('mask-warn').style.display = 'none';
            const title = name === 'cat' ? i18next.t('adminChat.inquiryTitle')
                : name === 'deflect' ? catLabel(opts.category || pendingCategory || 'other')
                : i18next.t('adminChat.title');
            document.getElementById('head-title').textContent = title;
            if (chatUi) { markAdminMessagesRead(); renderThread(); scrollThread(); }
        }

        document.getElementById('back-btn').addEventListener('click', () => {
            if (currentView === 'deflect') { showView('cat'); return; }
            if (currentView === 'chat') { showView('cat'); return; }
            // cat → 戻る＝マイページ
            const role = window.currentUserData?.role;
            const fallback = role === 'farmer' ? '/pages/farmer/account.html' : '/pages/restaurant/account.html';
            if (history.length > 1) history.back(); else location.href = fallback;
        });

        // ── ① カテゴリタイル ────────────────────────────────────────
        function renderCatTiles() {
            const role = window.currentUserData?.role || 'restaurant';
            const host = document.getElementById('cat-tiles');
            host.innerHTML = CATEGORIES.filter(c => c.roles.includes(role)).map(c => `
                <button class="sc-cat" data-cat="${c.code}">
                    <span class="sc-cat__ic"><span class="material-symbols-outlined">${c.icon}</span></span>
                    <span class="sc-cat__nm">${escapeHtml(catLabel(c.code))}</span>
                    <span class="sc-cat__ar"><span class="material-symbols-outlined">chevron_right</span></span>
                </button>`).join('');
            host.querySelectorAll('.sc-cat').forEach(b => b.addEventListener('click', () => openDeflect(b.dataset.cat)));
        }

        // ── ② 振り分け ──────────────────────────────────────────────
        async function openDeflect(category) {
            pendingCategory = category;
            const role = window.currentUserData?.role || 'restaurant';
            const host = document.getElementById('view-deflect');
            showView('deflect', { category });
            host.innerHTML = `<div class="chat-empty">${escapeHtml(i18next.t('adminChat.loading'))}</div>`;

            const faqs = await loadFaqs(category);
            const faqHtml = renderFaqAccordionHtml(faqs, lang());
            const desk = (DESK[role] && DESK[role][category]) || [];
            const hintKey = HINT_KEY[category];

            let html = '';
            if (faqHtml) html += `<div class="sc-sec">${escapeHtml(i18next.t('adminChat.faqSectionTitle'))}</div>${faqHtml}`;
            if (desk.length) {
                html += `<div class="sc-sec">${escapeHtml(i18next.t('adminChat.deskSectionTitle'))}</div>`;
                if (hintKey) html += `<div class="sc-hint">${escapeHtml(i18next.t('adminChat.' + hintKey))}</div>`;
                html += `<div class="sc-desk">` + desk.map(d =>
                    `<a class="sc-deskbtn ${d.danger ? 'danger' : ''}" href="${d.href}">
                        <span class="material-symbols-outlined">${d.danger ? 'flag' : 'open_in_new'}</span>${escapeHtml(i18next.t('adminChat.' + d.k))}
                    </a>`).join('') + `</div>`;
            }
            html += `<div class="sc-escnote">${escapeHtml(i18next.t('adminChat.escalateNote'))}</div>`;
            html += `<button class="sc-escbtn" id="escalate-btn">${escapeHtml(i18next.t('adminChat.escalateBtn'))}</button>`;
            host.innerHTML = html;

            bindFaqAccordion(host);
            document.getElementById('escalate-btn').addEventListener('click', () => { showView('chat'); scrollThread(); document.getElementById('chat-input').focus(); });
        }

        // ── ③ チャットスレッド描画（青の往復・件区切り・日付区切り） ──
        function getLastSeparatorCategory() {
            for (let i = messagesCache.length - 1; i >= 0; i--) {
                if (messagesCache[i].type === 'separator') return messagesCache[i].category || null;
            }
            return null;
        }
        function renderThread() {
            const thread = document.getElementById('chat-thread');
            if (!thread) return;
            if (messagesCache.length === 0) {
                thread.innerHTML = `<div class="chat-empty">${escapeHtml(i18next.t('adminChat.empty'))}</div>`;
                return;
            }
            let html = '';
            let lastDateKey = null;
            for (const m of messagesCache) {
                const t = m.createdAt?.toDate ? m.createdAt.toDate() : null;
                if (t) {
                    const dk = `${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
                    if (dk !== lastDateKey) { html += `<div class="sup-datesep">${escapeHtml(fmtDateSep(t))}</div>`; lastDateKey = dk; }
                }
                if (m.type === 'separator') {
                    html += `<div class="sup-catsep"><span>— ${escapeHtml(catLabel(m.category || 'other'))} —</span></div>`;
                    continue;
                }
                const isMe = m.senderRole === 'user';
                const imgs = m.imageUrls || (m.imageUrl ? [m.imageUrl] : []);
                const imgHtml = imgs.length ? `<div class="sup-bub__imgs">${imgs.map(u => `<a class="sup-bub__img" href="${escapeHtml(u)}" target="_blank" rel="noopener"><img ${asCachedImgAttrs(u)} alt=""></a>`).join('')}</div>` : '';
                const text = (m.text || '').trim();
                html += `<div class="sup-bub ${isMe ? 'me' : 'them'}">${text ? escapeHtml(text).replace(/\n/g, '<br>') : ''}${imgHtml}<div class="sup-bub__time">${t ? escapeHtml(fmtTime(t)) : ''}</div></div>`;
            }
            thread.innerHTML = html;
        }
        function scrollThread() {
            // スクロール領域は #view-chat（.chat-body overflow-y:auto）。最新メッセージを下端に。
            const v = document.getElementById('view-chat');
            if (v) requestAnimationFrame(() => { v.scrollTop = v.scrollHeight; });
        }

        async function markAdminMessagesRead() {
            if (!uid) return;
            try {
                const snap = await getDocs(query(collection(db, `adminChats/${uid}/messages`), where('senderRole', '==', 'admin'), where('isRead', '==', false)));
                await Promise.all(snap.docs.map(d => updateDoc(d.ref, { isRead: true })));
            } catch (e) { /* ignore */ }
        }

        // ── 既存会話カード（①） ─────────────────────────────────────
        function updateExistingCard() {
            const card = document.getElementById('existing-card');
            const dot = document.getElementById('existing-dot');
            const hasMsg = messagesCache.some(m => m.type !== 'separator');
            card.hidden = !hasMsg;
            const hasUnread = messagesCache.some(m => m.senderRole === 'admin' && m.isRead === false);
            dot.hidden = !hasUnread;
        }

        // ── 添付プレビュー ──────────────────────────────────────────
        function renderAttachStrip() {
            const strip = document.getElementById('attach-strip');
            strip.hidden = currentView !== 'chat' || selectedFiles.length === 0;
            strip.innerHTML = selectedFiles.map((f, i) =>
                `<div class="sc-attach__th"><img src="${f.preview}" alt=""><button class="sc-attach__del" data-i="${i}" type="button"><span class="material-symbols-outlined">close</span></button></div>`
            ).join('');
            strip.querySelectorAll('.sc-attach__del').forEach(b => b.addEventListener('click', () => {
                const i = Number(b.dataset.i);
                URL.revokeObjectURL(selectedFiles[i]?.preview);
                selectedFiles.splice(i, 1); renderAttachStrip();
            }));
        }
        function clearSelectedFiles() { selectedFiles.forEach(f => URL.revokeObjectURL(f.preview)); selectedFiles = []; renderAttachStrip(); }

        // ── 送信 ────────────────────────────────────────────────────
        async function send() {
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const text = input.value.trim();
            const files = selectedFiles.slice();
            if (!text && files.length === 0) return;
            sendBtn.disabled = true;
            try {
                const msgCol = collection(db, `adminChats/${uid}/messages`);
                const lastSepCat = getLastSeparatorCategory();
                const cat = pendingCategory || lastSepCat || 'other';
                // 件の区切り（— カテゴリ —）：新しい件のときだけ1回挿入
                if (pendingCategory && pendingCategory !== lastSepCat) {
                    await addDoc(msgCol, { senderRole: 'system', type: 'separator', category: pendingCategory, createdAt: serverTimestamp() });
                }
                // 画像アップロード（複数可）
                const imageUrls = [];
                for (let i = 0; i < files.length; i++) {
                    const sref = ref(storage, `adminChats/${uid}/${Date.now()}_${i}.jpg`);
                    imageUrls.push(await uploadImageResized(sref, files[i].file));
                }
                // 連絡先マスク
                const maskRes = maskContacts(text, i18next.t('comments.maskedContact'));
                document.getElementById('mask-warn').style.display = maskRes.hit ? 'flex' : 'none';
                await addDoc(msgCol, {
                    senderId: uid, senderRole: 'user',
                    text: maskRes.masked,
                    category: cat,
                    ...(imageUrls.length ? { imageUrls } : {}),
                    isRead: false,
                    ...(maskRes.hit ? { contactMasked: true } : {}),
                    createdAt: serverTimestamp(),
                });
                input.value = '';
                clearSelectedFiles();
                pendingCategory = null; // この件は確定
            } catch (err) {
                alert(err.message || 'Failed');
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ── 起動 ────────────────────────────────────────────────────
        waitForUserData(() => {
            uid = window.currentUser.uid;
            renderCatTiles();

            // 描画キャッシュ（チャットスレッドの即時復元・任意）
            try {
                const cached = loadRenderState(`admin_chat:${uid}`);
                if (cached?.threadHtml) document.getElementById('chat-thread').innerHTML = cached.threadHtml;
            } catch (e) { /* ignore */ }

            // 初期ビュー：?view=chat（通知タップ／既存会話）ならチャット、それ以外はカテゴリ選択
            const params = new URLSearchParams(location.search);
            showView(params.get('view') === 'chat' ? 'chat' : 'cat');

            // メッセージ購読（スレッド＋既存会話カード＋未読）
            const q = query(collection(db, `adminChats/${uid}/messages`), orderBy('createdAt', 'asc'));
            onSnapshot(q, (snap) => {
                messagesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateExistingCard();
                if (currentView === 'chat') { renderThread(); markAdminMessagesRead(); scrollThread(); }
                try { saveRenderState(`admin_chat:${uid}`, { threadHtml: document.getElementById('chat-thread').innerHTML }); } catch (e) { /* ignore */ }
            });

            // 既存会話カード → チャット
            document.getElementById('existing-card').addEventListener('click', () => { pendingCategory = null; showView('chat'); });
            // 別の件で問い合わせる → カテゴリ選び直し
            document.getElementById('other-inquiry').addEventListener('click', () => showView('cat'));

            // 画像選択
            document.getElementById('img-input').addEventListener('change', (ev) => {
                Array.from(ev.target.files || []).forEach(file => {
                    if (file.type.startsWith('image/')) selectedFiles.push({ file, preview: URL.createObjectURL(file) });
                });
                ev.target.value = '';
                renderAttachStrip();
            });
            // 送信
            document.getElementById('send-btn').addEventListener('click', send);
            document.getElementById('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); send(); } });
        });

        onLanguageChange(() => {
            renderCatTiles();
            if (currentView === 'deflect' && pendingCategory) { openDeflect(pendingCategory); return; }
            if (currentView === 'chat') renderThread();
            showView(currentView, { category: pendingCategory });
        });
    </script>
</body>
