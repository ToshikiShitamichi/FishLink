<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        body { background: #f8fafc; }

        .chat-page {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f8fafc;
        }

        .chat-page__head {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: #fff;
            position: sticky; top: 0; z-index: 5;
        }

        .chat-page__back {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            border-radius: 999px;
            color: #475569;
            text-decoration: none;
        }
        .chat-page__back:hover { background: #f1f5f9; }

        .chat-page__title {
            font-size: 16px; font-weight: 700; color: #0f172a;
        }
        .chat-page__sub {
            font-size: 11px; color: #64748b;
        }

        .chat-thread {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(15,23,42,0.04);
        }
        .chat-msg.user {
            background: #0d6e4c; color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.admin {
            background: #fff; color: #0f172a;
            align-self: flex-start;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .chat-msg__time {
            font-size: 10px; opacity: 0.7; margin-top: 4px;
        }

        .chat-empty {
            text-align: center; color: #94a3b8;
            padding: 60px 16px; font-size: 13px;
        }

        .chat-input-bar {
            display: flex; gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid #e2e8f0;
            background: #fff;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            font-size: 16px; /* iOS auto zoom 防止 */
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            font-family: inherit;
            outline: none;
        }
        .chat-input:focus { border-color: #0d6e4c; }

        .send-btn {
            width: 44px; height: 44px;
            border: none; border-radius: 50%;
            background: #0d6e4c; color: #fff;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
        }
        .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .send-btn .material-symbols-outlined { font-size: 20px; }

        /* 5/25 #90: 問い合わせカテゴリ選択 UI（Phase 1） */
        .chat-category-bar {
            background: #fff;
            border-top: 1px solid #e2e8f0;
            padding: 10px 12px;
            font-size: 12px;
        }
        .chat-category-bar__label {
            display: block; font-weight: 700; color: #475569;
            margin-bottom: 6px;
        }
        .chat-category-bar__select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit; font-size: 14px;
            background: #fff;
        }
        .chat-category-bar__select:focus { outline: none; border-color: #0d6e4c; }
        .chat-category-bar.unset .chat-category-bar__select {
            border-color: #f59e0b; background: #fffbeb;
        }
        .chat-msg__category {
            display: inline-block;
            font-size: 10px; font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.85);
            color: #0d6e4c;
            margin-bottom: 4px;
        }
        .chat-msg.user .chat-msg__category { color: #0d6e4c; }
        .chat-msg.admin .chat-msg__category { color: #475569; border: 1px solid #e2e8f0; }
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="chat-page">
        <div class="chat-page__head">
            <a href="#" class="chat-page__back" id="back-btn">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div>
                <div class="chat-page__title" data-i18n="adminChat.title"></div>
                <div class="chat-page__sub" data-i18n="adminChat.subtitle"></div>
            </div>
        </div>

        <!-- 5/4: 運営チャット案内（運営負荷軽減のためルールを提示） -->
        <div style="margin: 12px 16px; padding: 12px 14px; background: #fef3c7; border: 1px solid #fde68a; border-radius: 12px; font-size: 12px; color: #92400e; line-height: 1.6;">
            <div style="font-weight: 700; margin-bottom: 4px;" data-i18n="adminChat.guidanceTitle"></div>
            <ul style="margin: 0; padding-left: 18px;">
                <li data-i18n="adminChat.guidance1"></li>
                <li data-i18n="adminChat.guidance2"></li>
                <li data-i18n="adminChat.guidance3"></li>
            </ul>
        </div>

        <div class="chat-thread" id="chat-thread">
            <div class="chat-empty" data-i18n="adminChat.loading"></div>
        </div>

        <!-- 5/25 #90: 問い合わせカテゴリ選択（送信前に必須） -->
        <div class="chat-category-bar unset" id="category-bar">
            <label class="chat-category-bar__label" data-i18n="adminChat.categoryLabel" for="category-select"></label>
            <select class="chat-category-bar__select" id="category-select">
                <option value="" data-i18n="adminChat.categoryPlaceholder"></option>
                <option value="order" data-i18n="adminChat.categoryOrder"></option>
                <option value="payment" data-i18n="adminChat.categoryPayment"></option>
                <option value="delivery" data-i18n="adminChat.categoryDelivery"></option>
                <option value="posting" data-i18n="adminChat.categoryPosting"></option>
                <option value="account" data-i18n="adminChat.categoryAccount"></option>
                <option value="trouble" data-i18n="adminChat.categoryTrouble"></option>
                <option value="other" data-i18n="adminChat.categoryOther"></option>
            </select>
        </div>

        <div class="chat-input-bar">
            <input type="text" class="chat-input" id="chat-input"
                placeholder="" data-i18n-placeholder="adminChat.placeholder">
            <button class="send-btn" id="send-btn" aria-label="send">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            collection, query, orderBy, onSnapshot,
            addDoc, serverTimestamp, getDocs, where, updateDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');

        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        document.getElementById('back-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const role = window.currentUserData?.role;
            const fallback = role === 'farmer' ? '/pages/farmer/account.html' : '/pages/restaurant/account.html';
            if (history.length > 1) history.back();
            else location.href = fallback;
        });

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function fmtTime(ts) {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleString();
        }

        // 5/25 #90: カテゴリラベル解決
        function categoryLabel(cat) {
            if (!cat) return '';
            const key = `adminChat.category${cat.charAt(0).toUpperCase()}${cat.slice(1)}`;
            return i18next.exists(key) ? i18next.t(key) : cat;
        }

        function renderThread(snap) {
            const thread = document.getElementById('chat-thread');
            if (snap.empty) {
                thread.innerHTML = `<div class="chat-empty">${i18next.t('adminChat.empty')}</div>`;
                return;
            }
            thread.innerHTML = snap.docs.map(d => {
                const m = d.data();
                const cls = m.senderRole === 'user' ? 'user' : 'admin';
                const time = fmtTime(m.createdAt);
                // 5/25 #90: 問い合わせカテゴリのバッジを表示（ユーザー側メッセージのみ）
                const catBadge = (cls === 'user' && m.category)
                    ? `<div class="chat-msg__category">${escapeHtml(categoryLabel(m.category))}</div>`
                    : '';
                return `
                    <div class="chat-msg ${cls}">
                        ${catBadge}${escapeHtml(m.text || '')}
                        <div class="chat-msg__time">${time}</div>
                    </div>
                `;
            }).join('');
            requestAnimationFrame(() => {
                thread.scrollTop = thread.scrollHeight;
            });
        }

        async function markAdminMessagesRead(uid) {
            try {
                const snap = await getDocs(query(
                    collection(db, `adminChats/${uid}/messages`),
                    where('senderRole', '==', 'admin'),
                    where('isRead', '==', false)
                ));
                await Promise.all(snap.docs.map(d => updateDoc(d.ref, { isRead: true })));
            } catch (e) { /* ignore */ }
        }

        // 5/25 #91/#92 拡張: 過去メッセージの HTML を即時復元（onSnapshot 初回到達で上書きされる）
        let cachedThreadShown = false;
        waitForUserData(() => {
            const uid = window.currentUser.uid;
            try {
                const cached = loadRenderState(`admin_chat:${uid}`);
                if (cached?.threadHtml) {
                    document.getElementById('chat-thread').innerHTML = cached.threadHtml;
                    loading.classList.remove('show');
                    document.body.classList.add('app-ready');
                    cachedThreadShown = true;
                }
            } catch (e) { /* ignore */ }

            const q = query(
                collection(db, `adminChats/${uid}/messages`),
                orderBy('createdAt', 'asc')
            );
            // 5/25 #92: 初回 snapshot で spinner 解除（旧来は解除処理が無く i18n の 10 秒 failsafe 待ち）
            let firstSnapshot = true;
            onSnapshot(q, (snap) => {
                renderThread(snap);
                markAdminMessagesRead(uid);
                if (firstSnapshot) {
                    loading.classList.remove('show'); document.body.classList.add('app-ready');
                    firstSnapshot = false;
                }
                // 5/25 #91/#92 拡張: 次回訪問用に thread HTML を保存
                try {
                    saveRenderState(`admin_chat:${uid}`, {
                        threadHtml: document.getElementById('chat-thread').innerHTML,
                    });
                } catch (e) { /* ignore */ }
            });
            // フォールバック：onSnapshot 初回到達前にネットワーク不調で何も来なくても 2.5s で UI を有効化
            //   cachedThreadShown が true なら既に spinner 解除済みなのでスキップ
            setTimeout(() => {
                if (firstSnapshot && !cachedThreadShown) {
                    loading.classList.remove('show'); document.body.classList.add('app-ready');
                }
            }, 2500);

            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            // 5/25 #90: カテゴリ選択 UI のセットアップ
            const categoryBar = document.getElementById('category-bar');
            const categorySelect = document.getElementById('category-select');
            categorySelect.addEventListener('change', () => {
                if (categorySelect.value) categoryBar.classList.remove('unset');
                else categoryBar.classList.add('unset');
            });

            async function send() {
                const text = input.value.trim();
                if (!text) return;
                // 5/25 #90: カテゴリ未選択時は警告して送信させない
                const category = categorySelect.value;
                if (!category) {
                    alert(i18next.t('adminChat.categoryRequired'));
                    categorySelect.focus();
                    return;
                }
                sendBtn.disabled = true;
                try {
                    await addDoc(collection(db, `adminChats/${uid}/messages`), {
                        senderId: uid,
                        senderRole: 'user',
                        text,
                        category,                                // 5/25 #90
                        isRead: false,
                        createdAt: serverTimestamp(),
                    });
                    input.value = '';
                } catch (err) {
                    alert(err.message || 'Failed');
                } finally {
                    sendBtn.disabled = false;
                }
            }

            sendBtn.addEventListener('click', send);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    send();
                }
            });
        });

        onLanguageChange(() => {
            // i18n applies to placeholder/title automatically
        });
    </script>
</body>

</html>
