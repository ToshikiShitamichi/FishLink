<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .fish-card {
            background: var(--color-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .fish-card__img {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--color-bg);
            flex-shrink: 0;
        }

        .fish-card__img-placeholder {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .fish-card__body {
            flex: 1;
            min-width: 0;
        }

        .fish-card__name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .fish-card__meta {
            font-size: 13px;
            color: var(--color-text-sub);
            margin-bottom: 6px;
        }

        .fish-card__price {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-primary);
        }

        .fish-card__badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
            margin-left: 6px;
        }

        .badge-active {
            background: var(--color-primary-lt);
            color: var(--color-primary);
        }

        .badge-inactive {
            background: #f0f0f0;
            color: #888;
        }

        /* ボトムナビの「出品する」項目を強調表示 */
        .bottom-nav .nav-post .material-symbols-outlined {
            color: var(--color-primary);
            font-size: 32px;
        }
        .bottom-nav .nav-post {
            font-weight: 700;
            color: var(--color-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-sub);
        }

        .empty-state__icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state__text {
            font-size: 15px;
            margin-bottom: 20px;
        }

        .nav-badge {
            position: absolute;
            top: 6px;
            right: 50%;
            transform: translateX(18px);
            background: #ef4444;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .toggle-btn {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-pause {
            background: #fef2f2;
            color: #991b1b;
        }

        .toggle-resume {
            background: #f0fdf4;
            color: #166534;
        }

        .edit-btn {
            background: #eef2ff;
            color: #3730a3;
        }
        .edit-btn:hover { background: #e0e7ff; }
        .edit-btn .material-symbols-outlined { font-size: 14px; }

        .comment-link {
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fef3c7;
            color: #92400e;
        }
        .comment-link:hover { background: #fde68a; }
        .comment-link .material-symbols-outlined { font-size: 14px; }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        /* 5/7 #53: カード右上のケバブメニュー（削除メニュー用） */
        .fish-card { position: relative; }
        .card-menu-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            color: var(--color-text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .card-menu-btn:hover { background: #f3f4f6; }
        .card-menu-btn .material-symbols-outlined { font-size: 20px; }
        .card-menu {
            position: absolute;
            top: 40px;
            right: 8px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
            min-width: 160px;
            z-index: 5;
            overflow: hidden;
            display: none;
        }
        .card-menu.show { display: block; }
        .card-menu__item {
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b91c1c;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
        }
        .card-menu__item:hover { background: #fef2f2; }
        .card-menu__item.disabled {
            color: var(--color-text-sub);
            cursor: default;
        }
        .card-menu__item.disabled:hover { background: transparent; }
        .card-menu__item .material-symbols-outlined { font-size: 16px; }

        /* ===== 5/31 #104: 投稿一覧（ステータス別グルーピング） ===== */
        .page-title {
            font-size: 20px;
            font-weight: 700;
            padding: 14px 16px 6px;
        }
        .pl-group-head {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 16px 4px 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text);
        }
        .pl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .pl-dot.on { background: var(--color-primary); }
        .pl-dot.out { background: #e08600; }
        .pl-dot.stop { background: #9aa3b0; }
        .pl-count { color: var(--color-text-sub); font-weight: 600; }

        .pl-card {
            background: var(--color-surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            margin-bottom: 10px;
        }
        .pl-card-top { display: flex; gap: 12px; padding: 12px; }
        .pl-img {
            width: 88px; height: 88px; border-radius: var(--radius-sm);
            object-fit: cover; background: var(--color-bg); flex-shrink: 0; position: relative;
        }
        .pl-img-ph {
            width: 88px; height: 88px; border-radius: var(--radius-sm);
            background: var(--color-bg); display: flex; align-items: center; justify-content: center;
            color: #9dbed4; flex-shrink: 0;
        }
        .pl-img-wrap { position: relative; flex-shrink: 0; }
        .pl-img-wrap .gaqp-badge {
            position: absolute; top: 6px; left: 6px;
            background: var(--color-primary); color: #fff;
            font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 9px;
            display: inline-flex; align-items: center; gap: 2px;
            box-shadow: 0 1px 3px rgba(0,0,0,.2); white-space: nowrap;
        }
        .pl-img-wrap .gaqp-badge .material-symbols-outlined { font-size: 11px; color: #fff; }
        .pl-info { flex: 1; min-width: 0; }
        .pl-row1 { display: flex; align-items: center; gap: 8px; }
        .pl-name {
            font-size: 15px; font-weight: 700; color: var(--color-text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
        }
        .pl-status {
            font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
            flex-shrink: 0; letter-spacing: .2px;
        }
        .pl-status.on { background: var(--color-primary-lt); color: var(--color-primary); }
        .pl-status.out { background: #fcefd6; color: #b36a00; }
        .pl-status.stop { background: #eceef0; color: var(--color-text-sub); }
        .pl-sub { margin-top: 4px; font-size: 13px; color: var(--color-text-sub); }
        .pl-price { margin-top: 8px; color: var(--color-primary); }
        .pl-price .num { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
        .pl-price .unit { font-size: 12px; color: var(--color-text-sub); font-weight: 500; margin-left: 3px; }
        .pl-gut { font-size: 12px; color: var(--color-text-sub); margin-top: 3px; }

        .pl-actions { display: flex; align-items: center; border-top: 1px solid var(--color-border); }
        .pl-act {
            flex: 1; text-align: center; padding: 11px 4px;
            font-size: 12px; font-weight: 600; color: var(--color-text);
            cursor: pointer; background: none; border: none; border-right: 1px solid var(--color-border);
            display: flex; align-items: center; justify-content: center; gap: 4px;
            text-decoration: none; font-family: inherit;
        }
        .pl-act:last-child { border-right: none; }
        .pl-act:active { background: var(--color-bg); }
        .pl-act .material-symbols-outlined { font-size: 16px; }
        .pl-act.danger { color: var(--color-danger); }
        .pl-act.primary { color: var(--color-primary); }
        .pl-act.kebab { flex: 0 0 44px; }

        /* 停止中：カード全体グレーアウト（アクションバーは除く） */
        .pl-card.stopped .pl-card-top { filter: grayscale(1); opacity: .55; }

        /* ケバブメニューを下部アクションバーの上に表示 */
        .pl-card .card-menu { top: auto; bottom: 48px; right: 8px; }

        /* 5/7 #54: 「もっと見る」ボタン */
        #load-more-wrap {
            display: none;
            text-align: center;
            padding: 16px 0;
        }
        #load-more-btn {
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        #load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>

<body>

    <!-- ローディング -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page">

        <!-- ヘッダー -->
        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/farmer/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 投稿一覧（5/31 #104） -->
        <div class="page-title" data-i18n="dashboard.pageTitle"></div>
        <div id="fish-list"></div>
        <div id="load-more-wrap">
            <button type="button" id="load-more-btn" data-i18n="restaurant.loadMore"></button>
        </div>

    </div>

    <!-- 下部ナビ -->
    <nav class="bottom-nav">
        <a href="/pages/farmer/dashboard.html" class="bottom-nav__item active">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="dashboard.listings"></span>
        </a>
        <a href="/pages/farmer/post.html" class="bottom-nav__item nav-post">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">add_circle</span></span>
            <span data-i18n="dashboard.newPost"></span>
        </a>
        <a href="/pages/farmer/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">inbox</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="orders.navOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, auth } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, orderBy, getDocs, doc, updateDoc, onSnapshot,
            limit, startAfter, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');

        // 未ログインならログイン画面へ
        watchAuthState({ requireAuth: true });

        // i18n 初期化
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        // ログアウト
        // ログアウトはアカウントページ内に移動

        // 5/7 #54: ページネーション（10件ずつ）
        const PAGE_SIZE = 10;
        let lastListingDoc = null;
        let hasMoreListings = false;
        let isLoadingMore = false;
        const renderedListings = []; // {id, data}

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // 5/31 #104: ステータス導出（停止操作＋在庫から）
        //   停止中（手動 isActive=false）/ 売切れ（在庫0・自動）/ 販売中
        function deriveStatus(d) {
            if (!d.isActive) return 'stopped';
            if (Number(d.stock || 0) <= 0) return 'soldout';
            return 'selling';
        }

        function buildCardHtml(id, d) {
            const status = deriveStatus(d);
            const fishName = i18next.exists(`fish.${d.fishType}`)
                ? i18next.t(`fish.${d.fishType}`)
                : escapeHtml(d.fishType);

            // GAqP は農家単位（自分の認証状態）。取得済みなら全投稿カードに緑バッジ
            const gaqp = window.currentUserData?.gaqpCertified === true;
            const imgInner = d.photoUrl
                ? `<img class="pl-img" ${asCachedImgAttrs(d.photoUrl)} alt="${escapeHtml(fishName)}">`
                : `<div class="pl-img-ph"><span class="material-symbols-outlined" style="font-size:32px;">set_meal</span></div>`;
            const imgHtml = `<div class="pl-img-wrap">${imgInner}${gaqp
                ? `<span class="gaqp-badge"><span class="material-symbols-outlined">verified</span>${i18next.t('gaqp.badge')}</span>`
                : ''}</div>`;

            const statusBadge = {
                selling: `<span class="pl-status on">${i18next.t('dashboard.statusSelling')}</span>`,
                soldout: `<span class="pl-status out">${i18next.t('dashboard.statusSoldout')}</span>`,
                stopped: `<span class="pl-status stop">${i18next.t('dashboard.statusStopped')}</span>`,
            }[status];

            const stock = Number(d.stock || 0);
            const sub = `${escapeHtml(d.size || '')} head/kg ・ ${i18next.t('dashboard.stock')}${stock} kg`;
            const gutHtml = d.gutPrice
                ? `<div class="pl-gut">${i18next.t('post.gutPrice')} +${Number(d.gutPrice).toLocaleString()} KHR/kg</div>`
                : '';

            // アクションバー（状態別）。売切れは「✏編集」を「📦在庫を補充」に置換（在庫にフォーカス）
            const editOrRefill = status === 'soldout'
                ? `<a class="pl-act primary" href="/pages/farmer/post.html?id=${id}&focus=stock"><span class="material-symbols-outlined">inventory_2</span>${i18next.t('dashboard.refillStock')}</a>`
                : `<a class="pl-act" href="/pages/farmer/post.html?id=${id}"><span class="material-symbols-outlined">edit</span>${i18next.t('dashboard.edit')}</a>`;
            const questionBtn = `<a class="pl-act" href="/pages/restaurant/comments.html?id=${id}"><span class="material-symbols-outlined">chat_bubble</span>${i18next.t('dashboard.question')}</a>`;
            const stopResume = status === 'stopped'
                ? `<button type="button" class="pl-act primary" data-action="resume" data-id="${id}"><span class="material-symbols-outlined">play_arrow</span>${i18next.t('dashboard.resume')}</button>`
                : `<button type="button" class="pl-act danger" data-action="pause" data-id="${id}"><span class="material-symbols-outlined">pause</span>${i18next.t('dashboard.pause')}</button>`;
            const kebab = `<button type="button" class="pl-act kebab" data-menu-toggle="${id}" aria-label="menu"><span class="material-symbols-outlined">more_vert</span></button>`;

            // 削除: 販売中・売切れは不可（先に出品停止）。停止中のみ可。
            const menuItem = status !== 'stopped'
                ? `<button type="button" class="card-menu__item disabled">
                       <span class="material-symbols-outlined">info</span>
                       ${i18next.t('dashboard.deleteAfterPause')}
                   </button>`
                : `<button type="button" class="card-menu__item" data-action="delete" data-id="${id}">
                       <span class="material-symbols-outlined">delete</span>
                       ${i18next.t('dashboard.delete')}
                   </button>`;

            return `
                <div class="pl-card ${status === 'stopped' ? 'stopped' : ''}">
                    <div class="card-menu" data-menu-id="${id}">${menuItem}</div>
                    <div class="pl-card-top">
                        ${imgHtml}
                        <div class="pl-info">
                            <div class="pl-row1"><div class="pl-name">${fishName}</div>${statusBadge}</div>
                            <div class="pl-sub">${sub}</div>
                            <div class="pl-price"><span class="num">${Number(d.price || 0).toLocaleString()}</span><span class="unit">KHR /kg</span></div>
                            ${gutHtml}
                        </div>
                    </div>
                    <div class="pl-actions">
                        ${editOrRefill}${questionBtn}${stopResume}${kebab}
                    </div>
                </div>
            `;
        }

        function renderEmpty() {
            const listEl = document.getElementById('fish-list');
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:48px;">set_meal</span></div>
                    <div class="empty-state__text">${i18next.t('dashboard.empty')}</div>
                    <a href="/pages/farmer/post.html" class="btn btn-primary" style="display:inline-block; width:auto; padding:12px 24px;">
                        <span class="material-symbols-outlined" style="font-size:18px; margin-right:4px;">add_circle</span>
                        ${i18next.t('dashboard.newPost')}
                    </a>
                </div>
            `;
        }

        function renderAll() {
            const listEl = document.getElementById('fish-list');
            if (renderedListings.length === 0) {
                renderEmpty();
            } else {
                // 5/31 #104: ステータス別グルーピング（固定順: 販売中→売切れ・要補充→出品停止）
                const groups = { selling: [], soldout: [], stopped: [] };
                renderedListings.forEach(it => { groups[deriveStatus(it.data)].push(it); });
                const sections = [
                    { key: 'selling', dot: 'on', label: 'dashboard.groupSelling' },
                    { key: 'soldout', dot: 'out', label: 'dashboard.groupSoldout' },
                    { key: 'stopped', dot: 'stop', label: 'dashboard.groupStopped' },
                ];
                let html = '';
                for (const s of sections) {
                    const arr = groups[s.key];
                    if (arr.length === 0) continue;
                    html += `<div class="pl-group-head"><span class="pl-dot ${s.dot}"></span>${i18next.t(s.label)} <span class="pl-count">(${arr.length})</span></div>`;
                    html += arr.map(it => buildCardHtml(it.id, it.data)).join('');
                }
                listEl.innerHTML = html;
            }
            const moreWrap = document.getElementById('load-more-wrap');
            moreWrap.style.display = hasMoreListings ? 'block' : 'none';
        }

        // ── 自分の投稿一覧を取得（5/7 #54 ページネーション対応） ─────────────
        // 5/23 #69 Phase J: silent=true で spinner を出さない（cached 描画後の裏 fresh fetch 用）
        async function loadMyFishListings({ append = false, silent = false } = {}) {
            if (!append && !silent) loading.classList.add('show');

            try {
                const uid = window.currentUser?.uid;
                if (!uid) return;

                if (!append) {
                    lastListingDoc = null;
                    renderedListings.length = 0;
                }

                const conds = [
                    collection(db, 'fishListings'),
                    where('farmerId', '==', uid),
                    orderBy('createdAt', 'desc'),
                ];
                if (append && lastListingDoc) conds.push(startAfter(lastListingDoc));
                conds.push(limit(PAGE_SIZE));
                const snap = await getDocs(query(...conds));

                lastListingDoc = snap.docs.length > 0 ? snap.docs[snap.docs.length - 1] : lastListingDoc;
                hasMoreListings = snap.docs.length === PAGE_SIZE;

                // 5/7 #53: ソフトデリート済み（deletedAt あり）はクライアント側で除外。
                // 旧データには deletedAt フィールドがないため where では絞れない。
                snap.docs.forEach(d => {
                    const data = d.data();
                    if (data.deletedAt) return;
                    renderedListings.push({ id: d.id, data });
                });

                renderAll();

                // 5/23 #69 Phase J: 1ページ目（!append）のみ render-cache に保存
                //   - Timestamp 等は toMillis 化して JSON 化可能に
                if (!append) {
                    try {
                        const itemsForCache = renderedListings.map(it => ({
                            id: it.id,
                            data: serializeListing(it.data),
                        }));
                        saveRenderState(`farmer_dashboard:${uid}`, {
                            items: itemsForCache,
                            hasMoreListings,
                        });
                    } catch (e) { /* ignore */ }
                }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 5/23 #69 Phase J: Firestore Timestamp などを JSON 化可能な形に変換
        function serializeListing(data) {
            const out = { ...data };
            if (out.createdAt?.toMillis) out.createdAt = out.createdAt.toMillis();
            if (out.updatedAt?.toMillis) out.updatedAt = out.updatedAt.toMillis();
            if (out.deletedAt?.toMillis) out.deletedAt = out.deletedAt.toMillis();
            return out;
        }

        // 「もっと見る」
        document.getElementById('load-more-btn').addEventListener('click', async () => {
            if (isLoadingMore || !hasMoreListings) return;
            isLoadingMore = true;
            const btn = document.getElementById('load-more-btn');
            btn.disabled = true;
            try {
                await loadMyFishListings({ append: true });
            } finally {
                btn.disabled = false;
                btn.textContent = i18next.t('restaurant.loadMore');
                isLoadingMore = false;
            }
        });

        // 5/7 #53: ケバブメニュー＆削除のイベント委譲
        document.addEventListener('click', async (e) => {
            // 既存メニューを閉じる（メニュー外クリック）。5/31 #104: ケバブは [data-menu-toggle]
            const insideMenu = e.target.closest('.card-menu') || e.target.closest('[data-menu-toggle]');
            if (!insideMenu) {
                document.querySelectorAll('.card-menu.show').forEach(m => m.classList.remove('show'));
            }

            // メニュートグル
            const toggleBtn = e.target.closest('[data-menu-toggle]');
            if (toggleBtn) {
                e.stopPropagation();
                const id = toggleBtn.dataset.menuToggle;
                const menu = document.querySelector(`.card-menu[data-menu-id="${CSS.escape(id)}"]`);
                if (!menu) return;
                const willShow = !menu.classList.contains('show');
                document.querySelectorAll('.card-menu.show').forEach(m => m.classList.remove('show'));
                if (willShow) menu.classList.add('show');
                return;
            }

            // 削除アクション
            const delBtn = e.target.closest('[data-action="delete"]');
            if (delBtn) {
                e.stopPropagation();
                const listingId = delBtn.dataset.id;
                if (!confirm(i18next.t('dashboard.confirmDelete'))) return;
                document.querySelectorAll('.card-menu.show').forEach(m => m.classList.remove('show'));
                loading.classList.add('show');
                try {
                    await updateDoc(doc(db, 'fishListings', listingId), {
                        deletedAt: serverTimestamp(),
                        isActive: false,
                    });
                    // 削除後はリストから除外して再描画
                    const idx = renderedListings.findIndex(it => it.id === listingId);
                    if (idx >= 0) renderedListings.splice(idx, 1);
                    renderAll();
                } catch (err) {
                    console.error(err);
                    alert(i18next.t('dashboard.errorDelete'));
                } finally {
                    loading.classList.remove('show'); document.body.classList.add('app-ready');
                }
                return;
            }

            // 停止/再開ボタン（5/31 #104: data-action ベース）
            const toggleListingBtn = e.target.closest('[data-action="pause"], [data-action="resume"]');
            if (toggleListingBtn) {
                const listingId = toggleListingBtn.dataset.id;
                const isPause = toggleListingBtn.dataset.action === 'pause';
                toggleListingBtn.disabled = true;
                try {
                    await updateDoc(doc(db, 'fishListings', listingId), { isActive: !isPause });
                    // 再読み込みより、該当アイテムだけ更新する方が軽量
                    const item = renderedListings.find(it => it.id === listingId);
                    if (item) item.data = { ...item.data, isActive: !isPause };
                    renderAll();
                } catch (err) {
                    console.error(err);
                    toggleListingBtn.disabled = false;
                }
            }
        });

        // 注文バッジ（リアルタイム監視）
        function watchOrderBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;

            const lastSeen = parseInt(localStorage.getItem('fishlink_orders_seen') || '0');

            const q = query(
                collection(db, 'orders'),
                where('farmerId', '==', uid)
            );
            onSnapshot(q, (snap) => {
                const hasNew = snap.docs.some(d => {
                    const t = d.data().createdAt?.toMillis?.() || 0;
                    const s = d.data().status;
                    return t > lastSeen || (s === 'pending' && t > lastSeen - 60000);
                });
                const badge = document.getElementById('order-badge');
                badge.style.display = hasNew ? 'block' : 'none';
            });
        }

        // 言語変更時に投稿一覧を再描画
        onLanguageChange(() => loadMyFishListings());

        // 5/23 #69 Phase J: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        //   auth.currentUser は永続化されたセッションがあれば immediate に取得可能
        let cachedRendered = false;
        try {
            const initialUid = auth.currentUser?.uid;
            if (initialUid) {
                const cached = loadRenderState(`farmer_dashboard:${initialUid}`);
                if (cached?.items && Array.isArray(cached.items)) {
                    renderedListings.length = 0;
                    cached.items.forEach(it => renderedListings.push(it));
                    hasMoreListings = !!cached.hasMoreListings;
                    renderAll();
                    loading.classList.remove('show');
                    document.body.classList.add('app-ready');
                    cachedRendered = true;
                }
            }
        } catch (e) {
            console.warn('cached farmer dashboard render failed:', e);
        }

        // onAuthStateChanged 後にデータ取得
        setTimeout(() => {
            loadMyFishListings({ silent: cachedRendered });
            watchOrderBadge();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'farmer');
                subscribeNotifications(window.currentUser.uid);
            }
        }, 800);
    </script>

</body>
