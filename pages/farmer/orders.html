<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-card {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            overflow: hidden;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
        }

        /* コンパクトヘッダー（常時表示・対応中向けに情報充実版） */
        .order-row {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px;
            cursor: pointer;
            user-select: none;
            background: var(--color-surface);
        }
        .order-row:hover { background: #f8fafc; }
        .order-row__img {
            width: 76px; height: 76px; border-radius: 12px;
            background: #e2e8f0; flex-shrink: 0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .order-row__img img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .order-row__body { flex: 1; min-width: 0; }
        .order-row__deliv {
            font-size: 13px; font-weight: 700; color: #b45309;
            display: flex; align-items: center; gap: 4px;
        }
        .order-row__deliv .material-symbols-outlined { font-size: 15px; }
        .order-row__fish { font-size: 15px; font-weight: 700; color: var(--color-text); margin-top: 4px; }
        .order-row__rest { font-size: 12px; color: var(--color-text-sub); margin-top: 2px;
            display: flex; align-items: center; gap: 3px; }
        .order-row__rest .material-symbols-outlined { font-size: 13px; }
        .order-row__meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .order-row__status {
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 10px;
            white-space: nowrap; flex-shrink: 0;
        }
        .order-row__status.pending { background: #fef3c7; color: #92400e; }
        .order-row__status.approved { background: #dbeafe; color: #1e40af; }
        .order-row__status.preparing { background: #e2e8f0; color: #334155; }
        .order-row__status.delivering { background: #dbeafe; color: #1d4ed8; }
        .order-row__status.delivered { background: #ede9fe; color: #6d28d9; }
        .order-row__status.completed { background: #fef3c7; color: #854d0e; }
        .order-row__status.declined { background: #fee2e2; color: #991b1b; }

        /* 5/25 #88: 承認期限の緊急度に応じた強調 — カードのボーダーを警告色/危険色に */
        .order-card.deadline-warn { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, .15); }
        .order-card.deadline-danger {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, .2);
            animation: deadlinePulse 1.6s ease-in-out infinite;
        }
        @keyframes deadlinePulse {
            0%, 100% { box-shadow: 0 0 0 2px rgba(239, 68, 68, .2); }
            50%      { box-shadow: 0 0 0 4px rgba(239, 68, 68, .35); }
        }
        .deadline-text {
            font-weight: 700; font-size: 13px;
            margin-bottom: 8px;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .deadline-text .material-symbols-outlined { font-size: 16px; }
        .deadline-text--normal { color: #ea580c; }
        .deadline-text--warn { color: #d97706; }
        .deadline-text--danger { color: #b91c1c; }

        /* 6/4 #124②: キャンペーン割引は amber（🏷＋オレンジ）に統一。
           緑は GAqP/成功/送料無料専用。買い手のカート/注文確認の割引と同じ見た目。 */
        .price-line--discount {
            color: #b36a00;
            font-weight: 700;
        }
        .price-line--discount .material-symbols-outlined { font-size: 16px; vertical-align: middle; margin-right: 2px; }
        .order-row__chev {
            color: #cbd5e1; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .order-card.expanded .order-row__chev { transform: rotate(90deg); }

        .order-card__details { display: none; }
        .order-card.expanded .order-card__details { display: block; }

        /* 5/3-5/4: 注文カードに常時表示されるアクション（配送管理 / 送金 / レビュー / 報告） */
        /* 展開前から見られるよう quick-actions に集約。展開時は body 側の重複を削除済み */
        .order-card__quick-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 14px 12px;
            background: var(--color-surface);
            border-top: 1px dashed var(--color-border);
        }
        /* メインCTA：配送管理／送金状況（フル幅） */
        .order-card__quick-cta {
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
        }
        /* 6/1 #112: CTA は青で統一（オレンジ廃止）。問題報告のみ赤(danger)維持。 */
        .order-card__quick-cta--delivery { background: var(--color-cta); }
        .order-card__quick-cta--delivery:hover { background: var(--color-cta-dk); }
        .order-card__quick-cta--payment { background: #0ea5e9; }
        .order-card__quick-cta--payment:hover { background: #0284c7; }
        /* レビュー／報告：50/50 並び */
        .order-card__quick-action-row {
            display: flex;
            gap: 8px;
        }
        .order-card__quick-action {
            flex: 1;
            text-align: center;
            padding: 8px 6px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .order-card__quick-action--review {
            background: var(--color-cta);
            color: #fff;
        }
        .order-card__quick-action--review:hover { background: var(--color-cta-dk); }
        /* 5/4: レビュー済み（無効化表示） */
        .order-card__quick-action--reviewed {
            background: #f1f5f9; color: #64748b;
            border: 1px solid #e2e8f0;
            cursor: default; pointer-events: none;
        }
        .order-card__quick-action--report {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .order-card__quick-action--report:hover { background: #fee2e2; }
        .order-card__quick-action .material-symbols-outlined { font-size: 14px; }

        /* 5/5 #2: 承認画面の縦長写真がスクロールを邪魔していたため小型サムネイルに変更
           ヘッダー行の76pxサムネイルで主役は十分、ここは複数商品時の枚数バッジ用 */
        .order-card__img {
            display: none;
        }

        .order-card__img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-card__img-placeholder {
            font-size: 64px;
        }

        .order-card__fish-label {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-sub);
            padding: 10px 16px;
        }

        .order-card__section {
            padding: 0 16px 14px;
        }

        .order-card__row {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            padding: 3px 0;
        }

        .order-card__divider {
            border-top: 1px solid var(--color-border);
            margin: 12px 0;
        }

        .order-card__link {
            color: #0284c7;
            cursor: pointer;
            text-decoration: none;
        }

        /* 料金行 */
        .price-line {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            padding: 3px 0;
        }

        .price-line__note {
            font-size: 12px;
            color: var(--color-text-sub);
            padding: 2px 0;
        }

        .receive-section {
            border-top: 2px solid var(--color-text-sub);
            padding-top: 12px;
            margin-top: 8px;
        }

        .receive-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text-sub);
        }

        /* 6/4 #124①: 受取予定額は青（金額の主役）。赤/オレンジにしない＝赤はdanger専用 */
        .receive-amount {
            font-size: 30px;
            font-weight: 800;
            color: var(--color-cta);
            margin-top: 4px;
        }

        /* 6/4 #124 レイアウト: 注文内容/金額ブロック（薄グレーのラベルカード・新モック②） */
        .od-sec-label {
            font-size: 12px; font-weight: 800; color: var(--color-text-sub);
            margin: 14px 0 6px;
        }
        .od-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 2px 14px;
        }
        .od-irow {
            display: flex; justify-content: space-between; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid #f2f4f7;
            font-size: 14px;
        }
        .od-card .od-irow:last-child { border-bottom: none; }
        .od-irow__l { color: var(--color-text-sub); }
        .od-irow__v { font-weight: 700; text-align: right; }
        /* 金額の内訳サブ注記（魚代の (単価＋内臓処理×kg)） */
        .od-subnote { color: var(--color-text-sub); font-weight: 400; font-size: 11px; }
        .od-amt { display: flex; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f2f4f7; font-size: 14px; }
        .od-card .od-amt:last-of-type { border-bottom: none; }
        .od-amt__l { color: var(--color-text); }
        .od-amt__v { font-weight: 700; }
        .od-amt--discount .od-amt__l, .od-amt--discount .od-amt__v { color: #b36a00; font-weight: 700; }
        .od-amt--discount .material-symbols-outlined { font-size: 15px; vertical-align: -3px; margin-right: 2px; }
        .od-receive {
            display: flex; justify-content: space-between; align-items: baseline;
            border-top: 2px solid var(--color-border); margin-top: 6px; padding-top: 10px;
        }
        .od-receive__l { font-size: 13px; color: var(--color-text-sub); }
        .od-receive__v { font-size: 24px; font-weight: 800; color: var(--color-cta); }
        .od-rest { font-size: 13px; padding: 4px 0 0; }
        .od-rest__name { font-weight: 800; }

        /* 承認/辞退 */
        .response-section {
            border-radius: 16px;
            background: #f9fafb;
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .response-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .radio-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--color-border);
            flex-shrink: 0;
        }

        .radio-dot.active {
            border-color: var(--color-cta);
            background: var(--color-cta);
            box-shadow: 0 0 0 3px var(--color-cta-lt);
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: var(--color-cta);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
            margin-top: 12px;
        }

        .submit-btn:disabled {
            opacity: 0.5;
        }

        /* 辞退理由 */
        .decline-panel {
            border-radius: 16px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 14px;
            display: none;
        }

        .decline-panel.show {
            display: block;
        }

        .decline-reason {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: #f9fafb;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .decline-reason.active {
            border-color: #fdba74;
            background: #fff7ed;
            color: #9a3412;
        }

        .decline-detail {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: #f9fafb;
            padding: 14px;
            margin-top: 12px;
        }

        .decline-detail__label {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .decline-detail textarea {
            width: 100%;
            min-height: 80px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }

        .decline-detail__hint {
            font-size: 12px;
            color: var(--color-text-sub);
            margin-top: 6px;
        }

        .decline-submit {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: #1a1a1a;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
            margin-top: 14px;
        }

        .decline-submit:disabled {
            opacity: 0.5;
        }

        /* 処理済みバッジ */
        .status-badge {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .status-badge.approved {
            background: #f0fdf4;
            color: #166534;
        }

        .status-badge.declined {
            background: #fef2f2;
            color: #991b1b;
        }

        .section-label {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text);
            background: #f0fdf4;
            border-left: 4px solid #16a34a;
            margin: 16px 16px 8px;
            border-radius: 0 8px 8px 0;
        }

        .section-label.pending-label {
            background: #fef3c7;
            border-left-color: #f59e0b;
        }

        .section-label.waiting-label {
            background: #eff6ff;
            border-left-color: #0ea5e9;
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin: 16px 16px 0;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-sub);
            border: 1px solid var(--color-border);
        }

        .accordion-header:hover {
            background: #eee;
        }

        .accordion-body {
            display: none;
        }

        .accordion-body.open {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-sub);
        }

        .empty-state__icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state__text {
            font-size: 15px;
        }

        /* 6/1 #112 (diff5): 承認確認モーダル */
        .approve-modal {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none; align-items: flex-end; justify-content: center;
            z-index: 200;
        }
        .approve-modal.show { display: flex; }
        .approve-modal__sheet {
            width: 100%; max-width: 480px;
            background: #fff; border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
        }
        .approve-modal__title { font-size: 17px; font-weight: 700; margin-bottom: 12px; color: var(--color-text); }
        .approve-modal__summary {
            font-size: 13px; color: var(--color-text); line-height: 1.7;
            background: #f8fafc; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
            white-space: pre-wrap; word-break: break-word;
        }
        .approve-modal__ask { font-size: 12px; color: var(--color-text-sub); margin-bottom: 16px; }
        .approve-modal__actions { display: flex; gap: 8px; }
        .approve-modal__btn {
            flex: 1; padding: 13px; font-size: 15px; font-weight: 700;
            border-radius: 14px; cursor: pointer; font-family: inherit;
        }
        .approve-modal__btn--cancel { background: #fff; color: var(--color-text); border: 1px solid var(--color-border); }
        .approve-modal__btn--ok { background: var(--color-cta); color: #fff; border: none; }
        .approve-modal__btn--ok:hover { background: var(--color-cta-dk); }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page" style="padding-bottom:80px; max-width:480px; margin:0 auto;">

        <!-- ヘッダー -->
        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <a class="header-action-btn" href="/pages/farmer/account.html" aria-label="account">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center; font-size:20px; font-weight:700; margin-bottom:16px;" data-i18n="orders.title">
        </div>

        <!-- 注文一覧 -->
        <div id="orders-list"></div>

        <div id="load-more-wrap" style="display:none; padding:12px 16px 24px; text-align:center;">
            <button type="button" id="load-more-btn"
                style="padding:10px 24px; border:1px solid var(--color-border); background:var(--color-surface); color:var(--color-text); border-radius:999px; font-size:13px; font-weight:600; cursor:pointer;"
                data-i18n="restaurant.loadMore"></button>
        </div>

    </div>

    <!-- 下部ナビ -->
    <nav class="bottom-nav">
        <a href="/pages/farmer/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="dashboard.listings"></span>
        </a>
        <a href="/pages/farmer/post.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">add_circle</span></span>
            <span data-i18n="dashboard.newPost"></span>
        </a>
        <a href="/pages/farmer/orders.html" class="bottom-nav__item active">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">inbox</span></span>
            <span data-i18n="orders.navOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, orderBy, limit, startAfter, getDocs, doc, getDoc, updateDoc, onSnapshot, addDoc, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { getOrderNumber } from '/js/order-utils.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ（stale-while-revalidate）
        import { saveRenderState, loadRenderState, serializeTimestamps, reviveTimestamps } from '/js/render-cache.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';

        const loading = document.getElementById('loading');

        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        // ログアウトはアカウントページ内に移動

        // Haversine
        function calcDistanceKm(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2
                + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
                * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // 承認期限（注文時刻 + 1時間）を超過しているか
        function isOrderExpired(order) {
            if (!order.createdAt) return false;
            const createdMs = order.createdAt.toMillis ? order.createdAt.toMillis() : 0;
            return Date.now() > createdMs + 60 * 60 * 1000;
        }

        const ORDERS_PAGE_SIZE = 30;
        let ordersLastDoc = null;
        let ordersHasMore = false;
        let ordersLoadingMore = false;
        let allOrders = [];

        // 5/27: 新規注文監視（idle 時は 0 read・変化時のみ +N read）
        //   先頭5件のメタ情報だけ onSnapshot で持ち続け、増減があれば loadOrdersPage を再実行。
        //   重い join 処理は loadOrdersPage 側に任せる。
        let _watchUnsub = null;
        let _watchInitial = true;
        let _watchKnownIds = new Set();
        function watchForNewOrders(uid) {
            if (_watchUnsub) return; // 多重購読防止
            const q = query(
                collection(db, 'orders'),
                where('farmerId', '==', uid),
                orderBy('createdAt', 'desc'),
                limit(5)
            );
            _watchUnsub = onSnapshot(q, (snap) => {
                const ids = new Set(snap.docs.map(d => d.id));
                if (_watchInitial) {
                    _watchInitial = false;
                    _watchKnownIds = ids;
                    return;
                }
                // 差分検知（新規追加 or 既存削除）
                let changed = false;
                for (const id of ids) if (!_watchKnownIds.has(id)) { changed = true; break; }
                if (!changed) {
                    for (const id of _watchKnownIds) if (!ids.has(id)) { changed = true; break; }
                }
                if (changed) {
                    _watchKnownIds = ids;
                    // silent モードで再ロード（spinner なし・既存表示を上書き）
                    loadOrdersPage({ append: false, silent: true }).catch(() => {});
                }
            }, (err) => {
                console.warn('orders watch failed:', err.message);
            });
        }

        // 5/25 #91/#92 拡張: silent=true で spinner を出さない（cached 描画後の裏側 fresh fetch 用）
        async function loadOrdersPage({ append = false, silent = false } = {}) {
            if (!append) {
                if (!silent) loading.classList.add('show');
                ordersLastDoc = null;
                allOrders = [];
            }
            try {
                const uid = window.currentUser?.uid;
                if (!uid) return;
                if (!append) {
                    subscribeTodos(uid, 'farmer');
                    subscribeNotifications(uid);
                    // 5/27: 新規注文のリアルタイム検知（先頭5件のみ監視）
                    //   idle 時は 0 read、注文が増減した時のみ +N read。
                    //   検知したら loadOrders を呼び直すだけのライト監視。
                    watchForNewOrders(uid);
                }

                const myLoc = window.currentUserData?.location;

                const baseConds = [
                    collection(db, 'orders'),
                    where('farmerId', '==', uid),
                    orderBy('createdAt', 'desc'),
                ];
                if (append && ordersLastDoc) baseConds.push(startAfter(ordersLastDoc));
                baseConds.push(limit(ORDERS_PAGE_SIZE));
                const q = query(...baseConds);
                const snap = await getDocs(q);
                ordersLastDoc = snap.docs.length > 0 ? snap.docs[snap.docs.length - 1] : ordersLastDoc;
                ordersHasMore = snap.docs.length === ORDERS_PAGE_SIZE;

                if (!append && snap.empty) {
                    document.getElementById('orders-list').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:48px;">inbox</span></div>
                            <div class="empty-state__text">${i18next.t('orders.empty')}</div>
                        </div>
                    `;
                    document.getElementById('load-more-wrap').style.display = 'none';
                    return;
                }

                // 1) レストラン一覧を重複排除して並列取得
                const restIds = [...new Set(
                    snap.docs.map(d => d.data().restaurantId).filter(Boolean)
                )];
                const restCache = {};
                await Promise.all(restIds.map(async rid => {
                    try {
                        const rSnap = await getDoc(doc(db, 'users', rid));
                        restCache[rid] = rSnap.exists() ? rSnap.data() : {};
                    } catch (e) { restCache[rid] = {}; }
                }));

                // 2) fishListings は snapFishType が無い legacy 注文のみ取得
                const legacyListingIds = [...new Set(
                    snap.docs.map(d => d.data())
                        .filter(o => !o.snapFishType && o.listingId)
                        .map(o => o.listingId)
                )];
                const listingCache = {};
                await Promise.all(legacyListingIds.map(async lid => {
                    try {
                        const lSnap = await getDoc(doc(db, 'fishListings', lid));
                        listingCache[lid] = lSnap.exists() ? lSnap.data() : {};
                    } catch (e) { listingCache[lid] = {}; }
                }));

                // 3) 組み立て
                const newOrders = snap.docs.map(d => {
                    const data = d.data();
                    const listingData = listingCache[data.listingId] || {};
                    const restData = restCache[data.restaurantId] || {};
                    let distKm = 0;
                    if (myLoc && restData.location) {
                        distKm = calcDistanceKm(myLoc.lat, myLoc.lng, restData.location.lat, restData.location.lng);
                    }
                    return { id: d.id, ...data, listingData, restData, distKm, hasReview: false };
                });

                // 6/1 #112 (diff6): レビューは「完了」後のみ解禁。完了注文のみレビュー有無を取得。
                const reviewableNew = newOrders.filter(o => o.status === 'completed');
                await Promise.all(reviewableNew.map(async o => {
                    try {
                        const rs = await getDoc(doc(db, 'orders', o.id, 'reviews', 'farmer'));
                        o.hasReview = rs.exists();
                    } catch (e) { /* ignore */ }
                }));

                // 既存と結合（重複除去）
                const seen = new Set(allOrders.map(o => o.id));
                newOrders.forEach(o => { if (!seen.has(o.id)) allOrders.push(o); });

                // pendingを先頭にソート
                allOrders.sort((a, b) => {
                    if (a.status === 'pending' && b.status !== 'pending') return -1;
                    if (a.status !== 'pending' && b.status === 'pending') return 1;
                    return 0;
                });

                renderOrders();
                document.getElementById('load-more-wrap').style.display = ordersHasMore ? 'block' : 'none';

                // 5/25 #91/#92 拡張: 初回ページのみ render-cache に保存（追記分は保存しない）
                if (!append) {
                    try {
                        saveRenderState('farmer_orders', {
                            items: serializeTimestamps(allOrders),
                            hasMore: ordersHasMore,
                        });
                    } catch (e) { /* ignore */ }
                }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
                ordersLoadingMore = false;
            }
        }

        // 5/25 #91/#92 拡張: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        let cachedRendered = false;
        try {
            const cached = loadRenderState('farmer_orders');
            if (cached?.items?.length) {
                allOrders = reviveTimestamps(cached.items);
                ordersHasMore = !!cached.hasMore;
                renderOrders();
                const lm = document.getElementById('load-more-wrap');
                if (lm) lm.style.display = ordersHasMore ? 'block' : 'none';
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached farmer_orders render failed:', e);
        }

        // ── データ取得 & 描画 ──
        waitForUserData(async () => {
            localStorage.setItem('fishlink_orders_seen', String(Date.now()));
            await loadOrdersPage({ silent: cachedRendered });
        });

        document.getElementById('load-more-btn').addEventListener('click', async () => {
            if (ordersLoadingMore || !ordersHasMore) return;
            ordersLoadingMore = true;
            const btn = document.getElementById('load-more-btn');
            btn.disabled = true;
            btn.textContent = '...';
            try {
                await loadOrdersPage({ append: true });
            } finally {
                btn.disabled = false;
                btn.textContent = i18next.t('restaurant.loadMore');
            }
        });

        // 6/4 #124③: 納品日を曜日付き「6/5（金）」に（カート/注文確認/Homeと統一）
        const WEEKDAY_SHORT = {
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            km: ['អា', 'ច', 'អ', 'ពុ', 'ព្រ', 'សុ', 'ស'],
        };
        function fmtDeliveryDate(iso) {
            const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return iso || '';
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            const lang = (typeof i18next !== 'undefined' && i18next.language) || 'km';
            const wd = (WEEKDAY_SHORT[lang] || WEEKDAY_SHORT.en)[d.getDay()];
            return `${Number(m[2])}/${Number(m[3])}（${wd}）`;
        }

        function renderOrderCard(order) {
            // 注文時点のスナップショット優先（編集後も注文表示は不変）
            const fishTypeKey = order.snapFishType || order.listingData.fishType;
            const fishName = i18next.exists(`fish.${fishTypeKey}`)
                ? i18next.t(`fish.${fishTypeKey}`)
                : (fishTypeKey || '');
            const size = order.snapSize || order.listingData.size || '';
            const photoUrl = order.snapPhotoUrl || order.listingData.photoUrl;
            // 単価表示：注文時点の fishPrice / quantity から逆算（内臓処理込みの実効単価）
            // 旧注文で fishPrice が無い場合は snap → 現listing の順でフォールバック
            // 6/1 #112 (diff4): 魚単価と内臓処理を分解表示するため両方を保持（農家視点・手数料抜きの基本単価）
            const basePrice = (order.snapPrice != null) ? order.snapPrice : (order.listingData.price || 0);
            const gutFee = (order.snapGutPrice != null) ? order.snapGutPrice : (order.listingData.gutPrice || 0);
            let price = 0;
            if (order.fishPrice && order.quantity) {
                price = Math.round(order.fishPrice / order.quantity);
            } else {
                price = order.gutProcessing ? basePrice + gutFee : basePrice;
            }
            const dist = Math.floor(order.distKm * 10) / 10;
            const restName = order.restData.displayName || '';
            const restRating = order.restData.avgRating || 0;
            const restReviews = order.restData.reviewCount || 0;
            const restProvince = order.restData.province || '';
            const restDistrict = order.restData.district || '';
            const restPlace = restProvince + (restDistrict ? ', ' + restDistrict : '');

            // 5/4: 複数魚種注文の場合、写真の右上に「全N点」バッジを表示
            const itemCountForBadge = Array.isArray(order.items) ? order.items.length : 1;
            const photoCountBadge = itemCountForBadge > 1
                ? `<span style="position:absolute; top:8px; right:8px; background:rgba(220,38,38,0.92); color:#fff; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; box-shadow:0 1px 4px rgba(0,0,0,0.2);">${i18next.t('orders.totalItems', { count: itemCountForBadge })}</span>`
                : '';
            const imgInner = photoUrl
                ? `<img ${asCachedImgAttrs(photoUrl)} alt="${fishName}">`
                : `<span class="order-card__img-placeholder"><span class="material-symbols-outlined" style="font-size:40px;">set_meal</span></span>`;
            const imgHtml = `<div style="position:relative;">${imgInner}${photoCountBadge}</div>`;

            // 承認期限（注文時刻 + 1時間）
            // 5/25 #88: 残り時間に応じた緊急度（残 30 分以下: 警告 / 10 分以下: 危険）
            let deadlineHtml = '';
            let deadlineCardClass = '';
            const isExpiredPending = order.status === 'pending' && isOrderExpired(order);
            if (order.status === 'pending' && order.createdAt && !isExpiredPending) {
                const createdMs = order.createdAt.toMillis ? order.createdAt.toMillis() : 0;
                const deadlineMs = createdMs + 60 * 60 * 1000;
                const deadlineDate = new Date(deadlineMs);
                const timeStr = `${deadlineDate.getHours()}:${String(deadlineDate.getMinutes()).padStart(2, '0')}`;
                const remainMin = Math.max(0, Math.ceil((deadlineMs - Date.now()) / 60000));
                let level = 'normal';
                if (remainMin <= 10) { level = 'danger'; deadlineCardClass = ' deadline-danger'; }
                else if (remainMin <= 30) { level = 'warn'; deadlineCardClass = ' deadline-warn'; }
                deadlineHtml = `
                    <div class="deadline-text deadline-text--${level}">
                        <span class="material-symbols-outlined">schedule</span>
                        ${i18next.t('orders.deadline', { time: timeStr })}
                        ・${i18next.t('orders.deadlineRemain', { min: remainMin })}
                    </div>`;
            } else if (isExpiredPending) {
                deadlineHtml = `<div class="deadline-text deadline-text--danger" style="font-size:14px;">${i18next.t('orders.expired')}</div>`;
            }

            const fishTotal = order.fishPrice || (price * order.quantity);
            const deliveryFee = order.deliveryFee || 0;
            // 6/1 #112 (diff1): 手数料は「通常率の満額」を表示し、キャンペーン分を別行で戻す（+表示）。
            //   ラベル(5%)と額のズレを作らない。受取予定額は不変（純手数料ベース）。
            const commissionRate = (order.farmerRateUsed != null) ? (order.farmerRateUsed * 100) : 5;
            // 通常率満額の手数料（gross）
            const grossCommission = (order.farmerCommissionGross != null)
                ? order.farmerCommissionGross
                : Math.round(fishTotal * (commissionRate / 100));
            // 実際に差し引かれる純手数料（キャンペーン適用後）
            const netCommission = (order.farmerCommission != null) ? order.farmerCommission : grossCommission;
            // キャンペーンで戻す額（+表示）
            const farmerCampaignDiscount = (order.farmerCampaignDiscount != null)
                ? order.farmerCampaignDiscount
                : Math.max(0, grossCommission - netCommission);
            const receiveAmount = (order.farmerReceiveAmount != null)
                ? order.farmerReceiveAmount
                : (fishTotal - netCommission + deliveryFee);

            let statusBadge = '';
            if (order.status === 'approved') {
                statusBadge = `<div class="status-badge approved">${i18next.t('orders.approved')}</div>`;
            } else if (order.status === 'declined' || isExpiredPending) {
                statusBadge = `<div class="status-badge declined">${i18next.t('orders.declined')}</div>`;
            }

            const restLoc = order.restData.location;
            const mapsUrl = restLoc ? `https://www.google.com/maps?q=${restLoc.lat},${restLoc.lng}` : '#';

            const itemCount = Array.isArray(order.items) ? order.items.length : 1;
            const multiItemBadge = itemCount > 1
                ? `<div style="display:inline-block; margin-left:8px; padding:2px 10px; background:#fef3c7; color:#92400e; border-radius:10px; font-size:11px; font-weight:700;">+${itemCount - 1} ${i18next.t('orders.otherItems')}</div>`
                : '';

            // 5/5 #5: 「+N点」の中身が分かるよう、行内に各アイテムをインライン明細表示
            const multiItemsInline = (itemCount > 1 && Array.isArray(order.items))
                ? order.items.map(it => {
                    const itType = it.snapFishType || '';
                    const itName = itType
                        ? (i18next.exists(`fish.${itType}`) ? i18next.t(`fish.${itType}`) : itType).trim()
                        : '';
                    const gutText = it.gutProcessing
                        ? `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutYes')}`
                        : `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutNo')}`;
                    return `<div style="font-size:12px; color:#475569; padding-left:4px; line-height:1.5;">・${itName} ${it.quantity}kg・${gutText}</div>`;
                }).join('')
                : '';

            // コンパクト行用の表示値
            let statusKey = order.status || 'pending';
            if (isExpiredPending) statusKey = 'declined';
            const statusText = i18next.exists(`delivery.${statusKey}`) ? i18next.t(`delivery.${statusKey}`) : statusKey;
            // 初期開閉：承認待ち(未期限切れ)のみ展開（アクションが必要なため）
            const isPendingAction = order.status === 'pending' && !isExpiredPending;
            const expandedClass = isPendingAction ? ' expanded' : '';
            const rowThumb = photoUrl
                ? `<img ${asCachedImgAttrs(photoUrl)} alt="" loading="lazy">`
                : `<span class="material-symbols-outlined" style="font-size:36px; color:#94a3b8;">set_meal</span>`;

            // 配送先（レストラン名 + 場所）
            const restPlaceShort = (order.restData.province || '');
            const restWithPlace = restPlaceShort ? `${restName} (${restPlaceShort})` : restName;

            let html = `
                <div class="order-card${expandedClass}${deadlineCardClass}" id="order-${order.id}">
                    <div class="order-row" data-toggle="${order.id}">
                        <div class="order-row__img">${rowThumb}</div>
                        <div class="order-row__body">
                            <div class="order-row__deliv">
                                <span class="material-symbols-outlined">event</span>
                                ${[order.deliveryDate ? fmtDeliveryDate(order.deliveryDate) : '', order.deliveryTime || ''].filter(Boolean).join(' ')}
                            </div>
                            <div class="order-row__fish">${fishName}${size ? `（${size} head/kg）` : ''} ${order.quantity || 0}kg${multiItemBadge}</div>
                            ${multiItemsInline ? `<div style="margin-top:4px;">${multiItemsInline}</div>` : ''}
                            <div class="order-row__rest">
                                <span class="material-symbols-outlined">storefront</span>
                                ${restWithPlace}
                            </div>
                            <div class="order-row__meta">${getOrderNumber(order)}</div>
                        </div>
                        <span class="order-row__status ${statusKey}">${statusText}</span>
                        <span class="material-symbols-outlined order-row__chev">chevron_right</span>
                    </div>
                    <div class="order-card__details">
                    <div class="order-card__section">
                        ${statusBadge}
                        ${deadlineHtml}

                        <!-- 6/4 #124: 注文内容ブロック（数量／内臓処理／納品＝日+時間1行・曜日付き） -->
                        <div class="od-sec-label">${i18next.t('orders.sectionOrderContent')}</div>
                        <div class="od-card">
                            ${(Array.isArray(order.items) && order.items.length > 1) ? `
                                ${order.items.map(it => {
                                    const itType = it.snapFishType || '';
                                    const itName = itType ? (i18next.exists(`fish.${itType}`) ? i18next.t(`fish.${itType}`) : itType).trim() : '';
                                    const gutLabel = it.gutProcessing
                                        ? `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutYes')}`
                                        : `${i18next.t('orders.gutProcessing')}${i18next.t('orders.gutNo')}`;
                                    return `<div class="od-irow"><span class="od-irow__l">${itName}${it.snapSize ? '（' + it.snapSize + ' head/kg）' : ''}</span><span class="od-irow__v">${it.quantity}kg・${gutLabel}</span></div>`;
                                }).join('')}
                            ` : `
                                <div class="od-irow"><span class="od-irow__l">${i18next.t('orders.quantity')}</span><span class="od-irow__v">${order.quantity} kg</span></div>
                                <div class="od-irow"><span class="od-irow__l">${i18next.t('orders.gutProcessing')}</span><span class="od-irow__v">${order.gutProcessing ? i18next.t('orders.gutYes') : i18next.t('orders.gutNo')}</span></div>
                            `}
                            <div class="od-irow"><span class="od-irow__l">${i18next.t('orders.deliveryLabel')}</span><span class="od-irow__v">${[order.deliveryDate ? fmtDeliveryDate(order.deliveryDate) : '', order.deliveryTime || ''].filter(Boolean).join(' ')}</span></div>
                        </div>

                        <!-- レストラン（評価%／位置／Maps） -->
                        <div class="od-sec-label">${i18next.t('orders.sectionRestaurant')}</div>
                        <div class="od-rest">
                            <div class="order-card__row"><span class="od-rest__name">${restName}</span>　${restReviews > 0 ? `<span class="material-symbols-outlined" style="font-size:16px; color:#f59e0b;">star</span> ${Math.round(restRating)}%（${i18next.t('orders.reviewCount', { count: restReviews })}）` : i18next.t('fishlist.newFarmer')}</div>
                            <div class="order-card__row"><a class="order-card__link" href="/pages/farmer/restaurant.html?id=${order.restaurantId}">${i18next.t('orders.viewReviews')}</a></div>
                            <div class="order-card__row"><span class="material-symbols-outlined" style="font-size:16px;">location_on</span> ${restPlace}　${dist} km</div>
                            <div class="order-card__row"><a class="order-card__link" href="${mapsUrl}" target="_blank">${i18next.t('orders.openMaps')}</a></div>
                        </div>

                        <!-- 6/4 #124: 金額ブロック（魚代の内訳ラベル／手数料／割引amber／送料／受取予定額=青） -->
                        <div class="od-sec-label">${i18next.t('orders.sectionAmount')}</div>
                        <div class="od-card">
                            <div class="od-amt"><span class="od-amt__l">${i18next.t('orders.fishTotal')}${(!(Array.isArray(order.items) && order.items.length > 1)) ? ` <span class="od-subnote">${order.gutProcessing && gutFee > 0 ? `（${basePrice.toLocaleString()} ＋ ${i18next.t('orders.gutProcessing')} ${gutFee.toLocaleString()} ×${order.quantity}kg）` : `（${basePrice.toLocaleString()} ×${order.quantity}kg）`}</span>` : ''}</span><span class="od-amt__v">${fishTotal.toLocaleString()} KHR</span></div>
                            <div class="od-amt"><span class="od-amt__l">${i18next.t('orders.commission', { rate: commissionRate })}</span><span class="od-amt__v">-${grossCommission.toLocaleString()} KHR</span></div>
                            ${farmerCampaignDiscount > 0 ? `
                                <div class="od-amt od-amt--discount">
                                    <span class="od-amt__l"><span class="material-symbols-outlined">local_offer</span>${i18next.t('orders.farmerCampaignDiscount')}</span>
                                    <span class="od-amt__v">${i18next.t('orders.farmerCampaignDiscountValue', { amount: farmerCampaignDiscount.toLocaleString() })}</span>
                                </div>` : ''}
                            ${Number(order.referralBonusAmount || 0) > 0 ? `
                                <div class="od-amt od-amt--discount">
                                    <span class="od-amt__l"><span class="material-symbols-outlined">redeem</span>${i18next.t('order.referralBonus')}</span>
                                    <span class="od-amt__v">+${Number(order.referralBonusAmount).toLocaleString()} KHR</span>
                                </div>` : ''}
                            <div class="od-amt"><span class="od-amt__l">${i18next.t('orders.deliveryFee')} <span class="od-subnote">（${i18next.t('orders.deliveryNote')}）</span></span><span class="od-amt__v">+${deliveryFee.toLocaleString()} KHR</span></div>
                            <div class="od-receive"><span class="od-receive__l">${i18next.t('orders.receiveAmount')}</span><span class="od-receive__v">${receiveAmount.toLocaleString()} KHR</span></div>
                        </div>
                        <!-- 5/4: 配送管理／送金状況／レビュー／報告 ボタンは外側の order-card__quick-actions に移動済み -->
                    </div>`;

            if (order.status === 'pending' && !isExpiredPending) {
                html += `
                    <div class="response-section" id="response-${order.id}">
                        <div class="response-title">${i18next.t('orders.responseTitle')}</div>
                        <div class="radio-option" data-action="approve" data-order="${order.id}">
                            <div class="radio-dot" id="dot-approve-${order.id}"></div>
                            ${i18next.t('orders.approve')}
                        </div>
                        <div class="radio-option" data-action="decline" data-order="${order.id}">
                            <div class="radio-dot" id="dot-decline-${order.id}"></div>
                            ${i18next.t('orders.decline')}
                        </div>
                        <button class="submit-btn" data-order="${order.id}" data-restaurant="${order.restaurantId}" style="display:none;">${i18next.t('orders.submit')}</button>
                    </div>
                    <div class="decline-panel" id="decline-panel-${order.id}">
                        <div class="response-title">${i18next.t('orders.declineTitle')}</div>
                        ${['declineReason1', 'declineReason2', 'declineReason3', 'declineReason4', 'declineReason5'].map(key => `
                            <div class="decline-reason" data-order="${order.id}" data-reason="${i18next.t('orders.' + key)}">
                                <div class="radio-dot"></div>
                                ${i18next.t('orders.' + key)}
                            </div>
                        `).join('')}
                        <div class="decline-detail">
                            <div class="decline-detail__label">${i18next.t('orders.declineDetail')}</div>
                            <textarea id="decline-text-${order.id}" placeholder="${i18next.t('orders.declineDetailPlaceholder')}"></textarea>
                            <div class="decline-detail__hint">${i18next.t('orders.declineDetailHint')}</div>
                        </div>
                        <button class="decline-submit" data-order="${order.id}" data-restaurant="${order.restaurantId}" data-listing="${order.listingId}" data-qty="${order.quantity}">${i18next.t('orders.submit')}</button>
                    </div>`;
            }

            // close .order-card__details
            html += '</div>';

            // 5/4: 常時表示の操作ボタン群（配送管理／送金状況／レビュー／報告）
            // pending は別途 response-section で承認/辞退ラジオが出る、declined は何も表示しない
            const isActiveDelivery = ['approved', 'preparing', 'delivering'].includes(order.status);
            const isPostDelivery = ['delivered', 'completed'].includes(order.status);
            // 6/1 #112 (diff6): レビューは「完了」後のみ解禁（準備中・承認済みでは出さない）
            const canReview = order.status === 'completed';

            if (isActiveDelivery || isPostDelivery) {
                let actionsHtml = '<div class="order-card__quick-actions">';
                if (isActiveDelivery) {
                    actionsHtml += `<a class="order-card__quick-cta order-card__quick-cta--delivery" href="/pages/farmer/delivery.html?id=${order.id}">${i18next.t('delivery.goDelivery')}</a>`;
                }
                if (isPostDelivery) {
                    actionsHtml += `<a class="order-card__quick-cta order-card__quick-cta--payment" href="/pages/farmer/payment.html?id=${order.id}">${i18next.t('payment.goToRemittance')}</a>`;
                }
                // レビュー（完了後のみ）と問題報告。レビュー不可の段階では報告のみ表示。
                const reviewBtn = !canReview
                    ? ''
                    : (order.hasReview
                        ? `<span class="order-card__quick-action order-card__quick-action--reviewed">
                                <span class="material-symbols-outlined">check</span>
                                ${i18next.t('review.reviewed')}
                            </span>`
                        : `<a class="order-card__quick-action order-card__quick-action--review" href="/pages/farmer/review.html?id=${order.id}">
                                <span class="material-symbols-outlined">star</span>
                                ${i18next.t('review.submit')}
                            </a>`);
                actionsHtml += `
                    <div class="order-card__quick-action-row">
                        ${reviewBtn}
                        <a class="order-card__quick-action order-card__quick-action--report" href="/pages/farmer/report.html?id=${order.id}">
                            <span class="material-symbols-outlined">flag</span>
                            ${i18next.t('review.reportIssue')}
                        </a>
                    </div>`;
                actionsHtml += '</div>';
                html += actionsHtml;
            }

            // close .order-card
            html += '</div>';
            return html;
        }

        // カンボジア時間（UTC+7）の YYYY-MM-DD
        function todayIsoKHM() {
            const now = new Date();
            const khm = new Date(now.getTime() + 7 * 60 * 60 * 1000);
            const yy = khm.getUTCFullYear();
            const mm = String(khm.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(khm.getUTCDate()).padStart(2, '0');
            return `${yy}-${mm}-${dd}`;
        }

        // 納品日 → 時間帯の昇順ソート
        function sortByDelivery(a, b) {
            const da = a.deliveryDateIso || '';
            const dbb = b.deliveryDateIso || '';
            if (da !== dbb) return da.localeCompare(dbb);
            return (a.deliveryTime || '').localeCompare(b.deliveryTime || '');
        }

        function renderOrders() {
            const isRemitted = (o) => ['remitted', 'done'].includes(o.adminStatus);
            const today = todayIsoKHM();

            // 4/28: 対応中（pending未期限切れ + approved/preparing/delivering）を本日／明日以降で分割
            const inProgress = allOrders.filter(o =>
                ['pending', 'approved', 'preparing', 'delivering'].includes(o.status)
                && !(o.status === 'pending' && isOrderExpired(o))
            );
            const todayActive = inProgress
                .filter(o => (o.deliveryDateIso || '') && (o.deliveryDateIso || '') <= today)
                .sort(sortByDelivery);
            const futureActive = inProgress
                .filter(o => (o.deliveryDateIso || '') > today || !o.deliveryDateIso)
                .sort(sortByDelivery);

            // 期限切れpendingは辞退扱いへ
            const expiredOrders = allOrders.filter(o => o.status === 'pending' && isOrderExpired(o));

            // 5/4: 履歴系（完了済み・辞退済み）は新しい順、対応必要系はそのまま納品日順
            const sortByCreatedDesc = (a, b) =>
                (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0);

            // トグル群（送金待ち / 完了済み / 辞退済み）
            const waitingRemittanceOrders = allOrders.filter(o =>
                ['delivered', 'completed'].includes(o.status) && !isRemitted(o)
            ).sort(sortByDelivery);
            const completedOrders = allOrders.filter(o =>
                ['delivered', 'completed'].includes(o.status) && isRemitted(o)
            ).sort(sortByCreatedDesc);
            const declinedOrders = [
                ...allOrders.filter(o => o.status === 'declined'),
                ...expiredOrders,
            ].sort(sortByCreatedDesc);

            const listEl = document.getElementById('orders-list');
            listEl.innerHTML = '';

            if (allOrders.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon"><span class="material-symbols-outlined" style="font-size:48px;">inbox</span></div>
                        <div class="empty-state__text">${i18next.t('orders.empty')}</div>
                    </div>
                `;
                return;
            }

            // 大グループ① 本日の対応
            if (todayActive.length > 0) {
                listEl.innerHTML += `<div class="section-label">${i18next.t('orders.todaySection', { count: todayActive.length })}</div>`;
                todayActive.forEach(o => { listEl.innerHTML += renderOrderCard(o); });
            }

            // 大グループ② 明日以降の対応
            if (futureActive.length > 0) {
                listEl.innerHTML += `<div class="section-label">${i18next.t('orders.futureSection', { count: futureActive.length })}</div>`;
                futureActive.forEach(o => { listEl.innerHTML += renderOrderCard(o); });
            }

            // トグル① 送金待ち
            if (waitingRemittanceOrders.length > 0) {
                const html = waitingRemittanceOrders.map(o => renderOrderCard(o)).join('');
                listEl.innerHTML += `
                    <div class="accordion-header" id="acc-waiting-remit">
                        ${i18next.t('orders.waitingRemittanceClosed', { count: waitingRemittanceOrders.length })}
                    </div>
                    <div class="accordion-body" id="acc-waiting-remit-body">${html}</div>
                `;
            }

            // 5/4: 履歴系は最新N件のみ初期表示し、「もっと見る」で全件展開
            const TRUNCATE_INITIAL = 3;
            function renderTruncated(items, restId) {
                if (items.length <= TRUNCATE_INITIAL) {
                    return items.map(o => renderOrderCard(o)).join('');
                }
                const initial = items.slice(0, TRUNCATE_INITIAL).map(o => renderOrderCard(o)).join('');
                const rest = items.slice(TRUNCATE_INITIAL).map(o => renderOrderCard(o)).join('');
                const remainCount = items.length - TRUNCATE_INITIAL;
                return `
                    ${initial}
                    <div id="${restId}" style="display:none;">${rest}</div>
                    <button type="button" class="show-more-btn" data-target="${restId}"
                        style="display:block; width:100%; padding:10px; margin-top:8px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; color:#475569; font-weight:600; font-size:13px; cursor:pointer; font-family:inherit;">
                        ${i18next.t('orders.showMore', { count: remainCount })}
                    </button>
                `;
            }

            // トグル② 完了済み（送金完了）
            if (completedOrders.length > 0) {
                const html = renderTruncated(completedOrders, 'completed-rest');
                listEl.innerHTML += `
                    <div class="accordion-header" id="acc-completed">
                        ${i18next.t('orders.approvedSectionClosed', { count: completedOrders.length })}
                    </div>
                    <div class="accordion-body" id="acc-completed-body">${html}</div>
                `;
            }

            // トグル③ 辞退済み
            if (declinedOrders.length > 0) {
                const html = renderTruncated(declinedOrders, 'declined-rest');
                listEl.innerHTML += `
                    <div class="accordion-header" id="acc-declined">
                        ${i18next.t('orders.declinedSectionClosed', { count: declinedOrders.length })}
                    </div>
                    <div class="accordion-body" id="acc-declined-body">${html}</div>
                `;
            }

            // イベント登録
            const pendingOrders = inProgress.filter(o => o.status === 'pending');
            bindEvents(pendingOrders);

            const bindAcc = (id, bodyId, openKey, closedKey, count) => {
                document.getElementById(id)?.addEventListener('click', function () {
                    const body = document.getElementById(bodyId);
                    body.classList.toggle('open');
                    this.textContent = body.classList.contains('open')
                        ? i18next.t(openKey, { count })
                        : i18next.t(closedKey, { count });
                });
            };
            bindAcc('acc-waiting-remit', 'acc-waiting-remit-body',
                'orders.waitingRemittanceOpen', 'orders.waitingRemittanceClosed', waitingRemittanceOrders.length);
            bindAcc('acc-completed', 'acc-completed-body',
                'orders.approvedSectionOpen', 'orders.approvedSectionClosed', completedOrders.length);
            bindAcc('acc-declined', 'acc-declined-body',
                'orders.declinedSectionOpen', 'orders.declinedSectionClosed', declinedOrders.length);

            // 5/4: 「もっと見る」ボタン
            document.querySelectorAll('.show-more-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.dataset.target;
                    const target = document.getElementById(targetId);
                    if (target) target.style.display = 'block';
                    btn.style.display = 'none';
                });
            });

            scrollToHashTarget();
        }

        // URLハッシュ（通知からの遷移）で対象カードまで自動スクロール
        function scrollToHashTarget() {
            if (!location.hash) return;
            let target;
            try { target = document.querySelector(location.hash); } catch (e) { return; }
            if (!target) return;
            // 対象が order-card ならアコーディオン展開
            if (target.classList.contains('order-card')) {
                target.classList.add('expanded');
            }
            // アコーディオン（完了/辞退済みセクション）内にあれば開く
            const accBody = target.closest('.accordion-body');
            if (accBody && !accBody.classList.contains('open')) {
                const hdrId = accBody.id.replace('-body', '');
                document.getElementById(hdrId)?.click();
            }
            // レイアウト確定後にスクロール＋ハイライト
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    target.style.transition = 'box-shadow 0.4s, background-color 0.4s';
                    target.style.boxShadow = '0 0 0 3px #fbbf24';
                    setTimeout(() => {
                        target.style.boxShadow = '';
                    }, 2500);
                });
            });
        }

        // ── イベント ──
        const orderStates = {}; // { orderId: 'approve' | 'decline' }
        const declineReasons = {}; // { orderId: 'reason text' }

        function bindEvents(orders) {
            // アコーディオン開閉
            document.querySelectorAll('.order-row[data-toggle]').forEach(row => {
                row.addEventListener('click', (e) => {
                    // 既に開いているカードの中のリンク/ボタンは無視
                    if (e.target.closest('a,button,input,textarea')) return;
                    const card = row.closest('.order-card');
                    if (card) card.classList.toggle('expanded');
                });
            });

            // ラジオ切り替え
            document.querySelectorAll('.radio-option').forEach(el => {
                el.addEventListener('click', () => {
                    const orderId = el.dataset.order;
                    const action = el.dataset.action;
                    orderStates[orderId] = action;

                    document.getElementById(`dot-approve-${orderId}`).classList.toggle('active', action === 'approve');
                    document.getElementById(`dot-decline-${orderId}`).classList.toggle('active', action === 'decline');
                    document.getElementById(`decline-panel-${orderId}`).classList.toggle('show', action === 'decline');

                    // 承認選択時のみ送信ボタン表示、辞退時は非表示（辞退パネル内にボタンあり）
                    const submitBtn = document.querySelector(`.submit-btn[data-order="${orderId}"]`);
                    if (submitBtn) submitBtn.style.display = action === 'approve' ? 'block' : 'none';
                });
            });

            // 辞退理由選択
            document.querySelectorAll('.decline-reason').forEach(el => {
                el.addEventListener('click', () => {
                    const orderId = el.dataset.order;
                    declineReasons[orderId] = el.dataset.reason;

                    // 同じorder内の他のreasonをリセット
                    document.querySelectorAll(`.decline-reason[data-order="${orderId}"]`).forEach(r => {
                        r.classList.remove('active');
                        r.querySelector('.radio-dot').classList.remove('active');
                    });
                    el.classList.add('active');
                    el.querySelector('.radio-dot').classList.add('active');
                });
            });

            // 6/1 #112 (diff5): 承認ボタン → 自前モーダルで注文サマリを確認（ブラウザ標準ダイアログ廃止）
            document.querySelectorAll('.submit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const orderId = btn.dataset.order;
                    const action = orderStates[orderId] || 'approve';
                    if (action === 'decline') return; // decline-panelのボタンで処理
                    openApproveModal(orderId, btn);
                });
            });

            // 辞退送信ボタン
            document.querySelectorAll('.decline-submit').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const orderId = btn.dataset.order;
                    const restaurantId = btn.dataset.restaurant;
                    const reason = declineReasons[orderId] || '';
                    const detail = document.getElementById(`decline-text-${orderId}`)?.value?.trim() || '';
                    const fullReason = detail ? `${reason}: ${detail}` : reason;

                    btn.disabled = true;
                    loading.classList.add('show');

                    try {
                        await updateDoc(doc(db, 'orders', orderId), {
                            status: 'declined',
                            declineReason: fullReason
                        });

                        // 在庫復元・FCM通知はCloud Functionsが自動処理
                        location.reload();
                    } catch (err) {
                        console.error(err);
                    } finally {
                        btn.disabled = false;
                        loading.classList.remove('show'); document.body.classList.add('app-ready');
                    }
                });
            });
        }

        // 6/1 #112 (diff5): 承認確認モーダル制御
        let pendingApprove = null;   // { orderId, btn }
        function openApproveModal(orderId, btn) {
            const order = allOrders.find(o => o.id === orderId);
            const summaryEl = document.getElementById('approve-modal-summary');
            if (order && summaryEl) {
                const restName = order.restData?.displayName || '';
                const fishTotal = order.fishPrice || 0;
                const receiveAmount = order.farmerReceiveAmount != null
                    ? order.farmerReceiveAmount
                    : (fishTotal - (order.farmerCommission || 0) + (order.deliveryFee || 0));
                const isMulti = Array.isArray(order.items) && order.items.length > 1;
                const fishLines = [];
                // 6/1 #112 (diff8): 内臓処理は「(内臓処理あり)/(内臓処理なし)」フル表記
                const gutFull = (on) => `(${i18next.t('orders.gutProcessing')}${on ? i18next.t('orders.gutYes') : i18next.t('orders.gutNo')})`;
                if (isMulti) {
                    fishLines.push(`${i18next.t('orders.itemsList', { count: order.items.length })}:`);
                    order.items.forEach(it => {
                        const itType = it.snapFishType || '';
                        const itName = itType ? (i18next.exists(`fish.${itType}`) ? i18next.t(`fish.${itType}`) : itType).trim() : '';
                        const sizePart = it.snapSize ? ` (${it.snapSize} head/kg)` : '';
                        fishLines.push(`・${itName}${sizePart} ${it.quantity}kg ${gutFull(it.gutProcessing)}`);
                    });
                } else {
                    const fishTypeKey = order.snapFishType || order.listingData?.fishType || '';
                    const fishName = fishTypeKey ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey).trim() : '';
                    fishLines.push(`${i18next.t('orders.fishLabel')}: ${fishName}`);
                    fishLines.push(`${i18next.t('orders.quantity')} ${order.quantity || 0} kg ${gutFull(order.gutProcessing)}`);
                }
                const lines = [
                    ...fishLines,
                    `${i18next.t('orders.deliveryLabel')} ${[order.deliveryDate ? fmtDeliveryDate(order.deliveryDate) : '', order.deliveryTime || ''].filter(Boolean).join(' ')}`,
                    `${i18next.t('orders.restaurantLabel')}: ${restName}`,
                    `${i18next.t('orders.receiveAmount')} ${receiveAmount.toLocaleString()} KHR`,
                ];
                summaryEl.textContent = lines.join('\n');
            }
            pendingApprove = { orderId, btn };
            document.getElementById('approve-modal').classList.add('show');
        }
        function closeApproveModal() {
            document.getElementById('approve-modal').classList.remove('show');
            pendingApprove = null;
        }
        document.getElementById('approve-modal-cancel').addEventListener('click', closeApproveModal);
        document.getElementById('approve-modal').addEventListener('click', (e) => {
            if (e.target.id === 'approve-modal') closeApproveModal();
        });
        document.getElementById('approve-modal-ok').addEventListener('click', async () => {
            if (!pendingApprove) return;
            const { orderId, btn } = pendingApprove;
            document.getElementById('approve-modal-ok').disabled = true;
            if (btn) btn.disabled = true;
            loading.classList.add('show');
            try {
                await updateDoc(doc(db, 'orders', orderId), { status: 'approved' });
                // 6/4 #126: 配送管理チャットの起点に「注文が承認されました」システム行を残す
                //   type:'status' なので onMessageCreated は返信todo/FCM を作らない（承認FCMはステータス変更側で送信）
                try {
                    await addDoc(collection(db, 'orders', orderId, 'messages'), {
                        senderId: window.currentUser?.uid || '',
                        text: i18next.t('delivery.statusApprovedMsg'),
                        type: 'status',
                        statusKind: 'approved',
                        isRead: false,
                        createdAt: serverTimestamp(),
                    });
                } catch (e) { console.warn('approved system message failed:', e); }
                // FCM通知はCloud Functionsが自動送信。承認後はチャット（配送管理）へ遷移
                location.href = `/pages/farmer/delivery.html?id=${orderId}`;
            } catch (err) {
                console.error(err);
                if (btn) btn.disabled = false;
                document.getElementById('approve-modal-ok').disabled = false;
                loading.classList.remove('show'); document.body.classList.add('app-ready');
                closeApproveModal();
            }
        });

        // 言語変更時
        onLanguageChange(() => location.reload());
    </script>

    <!-- 6/1 #112 (diff5): 承認確認モーダル（ブラウザ標準ダイアログ置換・自前モーダル） -->
    <div class="approve-modal" id="approve-modal" role="dialog" aria-modal="true">
        <div class="approve-modal__sheet">
            <div class="approve-modal__title" data-i18n="orders.confirmApproveTitle"></div>
            <div class="approve-modal__summary" id="approve-modal-summary"></div>
            <div class="approve-modal__ask" data-i18n="orders.confirmApproveAsk"></div>
            <div class="approve-modal__actions">
                <button type="button" class="approve-modal__btn approve-modal__btn--cancel" id="approve-modal-cancel" data-i18n="orders.cancel"></button>
                <button type="button" class="approve-modal__btn approve-modal__btn--ok" id="approve-modal-ok" data-i18n="orders.approve"></button>
            </div>
        </div>
    </div>

</body>
