<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .order-card {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            overflow: hidden;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
        }

        /* コンパクトヘッダー（常時表示・対応中向けに情報充実版） */
        .order-row {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px;
            cursor: pointer;
            user-select: none;
            background: var(--color-surface);
        }
        .order-row:hover { background: #f8fafc; }
        .order-row__img {
            width: 76px; height: 76px; border-radius: 12px;
            background: #e2e8f0; flex-shrink: 0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .order-row__img img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .order-row__body { flex: 1; min-width: 0; }
        .order-row__deliv {
            font-size: 13px; font-weight: 700; color: #b45309;
            display: flex; align-items: center; gap: 4px;
        }
        .order-row__deliv .material-symbols-outlined { font-size: 15px; }
        .order-row__fish { font-size: 15px; font-weight: 700; color: var(--color-text); margin-top: 4px; }
        .order-row__rest { font-size: 12px; color: var(--color-text-sub); margin-top: 2px;
            display: flex; align-items: center; gap: 3px; }
        .order-row__rest .material-symbols-outlined { font-size: 13px; }
        .order-row__meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .order-row__status {
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 10px;
            white-space: nowrap; flex-shrink: 0;
        }
        .order-row__status.pending { background: #fef3c7; color: #92400e; }
        .order-row__status.approved { background: #dbeafe; color: #1e40af; }
        .order-row__status.preparing { background: #e2e8f0; color: #334155; }
        .order-row__status.delivering { background: #dbeafe; color: #1d4ed8; }
        .order-row__status.delivered { background: #ede9fe; color: #6d28d9; }
        .order-row__status.completed { background: #fef3c7; color: #854d0e; }
        .order-row__status.declined { background: #fee2e2; color: #991b1b; }

        /* 5/25 #88: 承認期限の緊急度に応じた強調 — カードのボーダーを警告色/危険色に */
        .order-card.deadline-warn { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, .15); }
        .order-card.deadline-danger {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, .2);
            animation: deadlinePulse 1.6s ease-in-out infinite;
        }
        @keyframes deadlinePulse {
            0%, 100% { box-shadow: 0 0 0 2px rgba(239, 68, 68, .2); }
            50%      { box-shadow: 0 0 0 4px rgba(239, 68, 68, .35); }
        }
        .deadline-text {
            font-weight: 700; font-size: 13px;
            margin-bottom: 8px;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .deadline-text .material-symbols-outlined { font-size: 16px; }
        .deadline-text--normal { color: #ea580c; }
        .deadline-text--warn { color: #d97706; }
        .deadline-text--danger { color: #b91c1c; }

        /* 6/4 #124②: キャンペーン割引は amber（🏷＋オレンジ）に統一。
           緑は GAqP/成功/送料無料専用。買い手のカート/注文確認の割引と同じ見た目。 */
        .price-line--discount {
            color: #b36a00;
            font-weight: 700;
        }
        .price-line--discount .material-symbols-outlined { font-size: 16px; vertical-align: middle; margin-right: 2px; }
        .order-row__chev {
            color: #cbd5e1; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .order-card.expanded .order-row__chev { transform: rotate(90deg); }

        .order-card__details { display: none; }
        .order-card.expanded .order-card__details { display: block; }

        /* 5/3-5/4: 注文カードに常時表示されるアクション（配送管理 / 送金 / レビュー / 報告） */
        /* 展開前から見られるよう quick-actions に集約。展開時は body 側の重複を削除済み */
        .order-card__quick-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 14px 12px;
            background: var(--color-surface);
            border-top: 1px dashed var(--color-border);
        }
        /* メインCTA：配送管理／送金状況（フル幅） */
        .order-card__quick-cta {
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
        }
        /* 6/1 #112: CTA は青で統一（オレンジ廃止）。問題報告のみ赤(danger)維持。 */
        .order-card__quick-cta--delivery { background: var(--color-cta); }
        .order-card__quick-cta--delivery:hover { background: var(--color-cta-dk); }
        .order-card__quick-cta--payment { background: #0ea5e9; }
        .order-card__quick-cta--payment:hover { background: #0284c7; }
        /* レビュー／報告：50/50 並び */
        .order-card__quick-action-row {
            display: flex;
            gap: 8px;
        }
        .order-card__quick-action {
            flex: 1;
            text-align: center;
            padding: 8px 6px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .order-card__quick-action--review {
            background: var(--color-cta);
            color: #fff;
        }
        .order-card__quick-action--review:hover { background: var(--color-cta-dk); }
        /* 5/4: レビュー済み（無効化表示） */
        .order-card__quick-action--reviewed {
            background: #f1f5f9; color: #64748b;
            border: 1px solid #e2e8f0;
            cursor: default; pointer-events: none;
        }
        .order-card__quick-action--report {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .order-card__quick-action--report:hover { background: #fee2e2; }
        /* 6/17 #150 §5: 報告済み・対応中（再送信不可・グレー無効化表示） */
        .order-card__quick-action--reported {
            background: #f1f5f9; color: #64748b;
            border: 1px solid #e2e8f0;
            cursor: default; pointer-events: none;
        }
        .order-card__quick-action .material-symbols-outlined { font-size: 14px; }
        /* 6/17 #150 §4: 報告期限の注記（本日◯時まで…） */
        .order-card__report-note { font-size: 11.5px; color: var(--color-text-sub); margin-top: 7px; line-height: 1.5; }

        /* 5/5 #2: 承認画面の縦長写真がスクロールを邪魔していたため小型サムネイルに変更
           ヘッダー行の76pxサムネイルで主役は十分、ここは複数商品時の枚数バッジ用 */
        .order-card__img {
            display: none;
        }

        .order-card__img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-card__img-placeholder {
            font-size: 64px;
        }

        .order-card__fish-label {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-sub);
            padding: 10px 16px;
        }

        .order-card__section {
            padding: 0 16px 14px;
        }

        .order-card__row {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            padding: 3px 0;
        }

        .order-card__divider {
            border-top: 1px solid var(--color-border);
            margin: 12px 0;
        }

        .order-card__link {
            color: #0284c7;
            cursor: pointer;
            text-decoration: none;
        }

        /* 料金行 */
        .price-line {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            padding: 3px 0;
        }

        .price-line__note {
            font-size: 12px;
            color: var(--color-text-sub);
            padding: 2px 0;
        }

        .receive-section {
            border-top: 2px solid var(--color-text-sub);
            padding-top: 12px;
            margin-top: 8px;
        }

        .receive-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text-sub);
        }

        /* 6/4 #124①: 受取予定額は青（金額の主役）。赤/オレンジにしない＝赤はdanger専用 */
        .receive-amount {
            font-size: 30px;
            font-weight: 800;
            color: var(--color-cta);
            margin-top: 4px;
        }

        /* 6/4 #124 レイアウト: 注文内容/金額ブロック（薄グレーのラベルカード・新モック②） */
        .od-sec-label {
            font-size: 12px; font-weight: 800; color: var(--color-text-sub);
            margin: 14px 0 6px;
        }
        .od-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 2px 14px;
        }
        .od-irow {
            display: flex; justify-content: space-between; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid #f2f4f7;
            font-size: 14px;
        }
        .od-card .od-irow:last-child { border-bottom: none; }
        .od-irow__l { color: var(--color-text-sub); }
        .od-irow__v { font-weight: 700; text-align: right; }
        /* 金額の内訳サブ注記（魚代の (単価＋内臓処理×kg)） */
        .od-subnote { color: var(--color-text-sub); font-weight: 400; font-size: 11px; }
        .od-amt { display: flex; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f2f4f7; font-size: 14px; }
        .od-card .od-amt:last-of-type { border-bottom: none; }
        .od-amt__l { color: var(--color-text); }
        .od-amt__v { font-weight: 700; }
        .od-amt--discount .od-amt__l, .od-amt--discount .od-amt__v { color: #b36a00; font-weight: 700; }
        .od-amt--discount .material-symbols-outlined { font-size: 15px; vertical-align: -3px; margin-right: 2px; }
        .od-receive {
            display: flex; justify-content: space-between; align-items: baseline;
            border-top: 2px solid var(--color-border); margin-top: 6px; padding-top: 10px;
        }
        .od-receive__l { font-size: 13px; color: var(--color-text-sub); }
        .od-receive__v { font-size: 24px; font-weight: 800; color: var(--color-cta); }
        .od-rest { font-size: 13px; padding: 4px 0 0; }
        .od-rest__name { font-weight: 800; }

        /* 承認/辞退 */
        .response-section {
            border-radius: 16px;
            background: #f9fafb;
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .response-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .radio-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--color-border);
            flex-shrink: 0;
        }

        .radio-dot.active {
            border-color: var(--color-cta);
            background: var(--color-cta);
            box-shadow: 0 0 0 3px var(--color-cta-lt);
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: var(--color-cta);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
            margin-top: 12px;
        }

        .submit-btn:disabled {
            opacity: 0.5;
        }

        /* 辞退理由 */
        .decline-panel {
            border-radius: 16px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: 16px;
            margin: 0 16px 14px;
            display: none;
        }

        .decline-panel.show {
            display: block;
        }

        .decline-reason {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: #f9fafb;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .decline-reason.active {
            border-color: #fdba74;
            background: #fff7ed;
            color: #9a3412;
        }

        .decline-detail {
            border-radius: 16px;
            border: 1px solid var(--color-border);
            background: #f9fafb;
            padding: 14px;
            margin-top: 12px;
        }

        .decline-detail__label {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .decline-detail textarea {
            width: 100%;
            min-height: 80px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }

        .decline-detail__hint {
            font-size: 12px;
            color: var(--color-text-sub);
            margin-top: 6px;
        }

        .decline-submit {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: #1a1a1a;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
            margin-top: 14px;
        }

        .decline-submit:disabled {
            opacity: 0.5;
        }

        /* 処理済みバッジ */
        .status-badge {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .status-badge.approved {
            background: #f0fdf4;
            color: #166534;
        }

        .status-badge.declined {
            background: #fef2f2;
            color: #991b1b;
        }

        .section-label {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text);
            background: #f0fdf4;
            border-left: 4px solid #16a34a;
            margin: 16px 16px 8px;
            border-radius: 0 8px 8px 0;
        }

        .section-label.pending-label {
            background: #fef3c7;
            border-left-color: #f59e0b;
        }

        .section-label.waiting-label {
            background: #eff6ff;
            border-left-color: #0ea5e9;
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin: 16px 16px 0;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-sub);
            border: 1px solid var(--color-border);
        }

        .accordion-header:hover {
            background: #eee;
        }

        .accordion-body {
            display: none;
        }

        .accordion-body.open {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-sub);
        }

        .empty-state__icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state__text {
            font-size: 15px;
        }

        /* 6/1 #112 (diff5): 承認確認モーダル */
        .approve-modal {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none; align-items: flex-end; justify-content: center;
            z-index: 200;
        }
        .approve-modal.show { display: flex; }
        .approve-modal__sheet {
            width: 100%; max-width: 480px;
            background: #fff; border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
        }
        .approve-modal__title { font-size: 17px; font-weight: 700; margin-bottom: 12px; color: var(--color-text); }
        .approve-modal__summary {
            font-size: 13px; color: var(--color-text); line-height: 1.7;
            background: #f8fafc; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
            white-space: pre-wrap; word-break: break-word;
        }
        .approve-modal__ask { font-size: 12px; color: var(--color-text-sub); margin-bottom: 16px; }
        .approve-modal__actions { display: flex; gap: 8px; }
        .approve-modal__btn {
            flex: 1; padding: 13px; font-size: 15px; font-weight: 700;
            border-radius: 14px; cursor: pointer; font-family: inherit;
        }
        .approve-modal__btn--cancel { background: #fff; color: var(--color-text); border: 1px solid var(--color-border); }
        .approve-modal__btn--ok { background: var(--color-cta); color: #fff; border: none; }
        .approve-modal__btn--ok:hover { background: var(--color-cta-dk); }

        /* #142 注文確認 A案フィード（対応が必要→進行中→取引履歴1行） */
        .fo-sec { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 800; margin: 16px 0 9px; }
        .fo-sec__n { background: #eef1f4; color: #5a6470; font-size: 11px; font-weight: 800; padding: 1px 9px; border-radius: 10px; }
        .fo-sec--act { color: #d14343; }
        .fo-sec--act .fo-sec__n { background: #fdecea; color: #d14343; }
        .fo-sec--hist { color: #5a6470; font-size: 13px; }
        .fo-card { background: #fff; border: 1px solid #eef1f4; border-radius: 14px; padding: 13px; margin-bottom: 11px; display: block; text-decoration: none; color: inherit; }
        .fo-card--urgent { border-color: #f3c0bd; box-shadow: 0 0 0 2px #fbe3e1 inset; }
        .fo-top { display: flex; gap: 11px; }
        .fo-th { width: 56px; height: 56px; border-radius: 9px; flex: 0 0 auto; background: #eef3f7; display: flex; align-items: center; justify-content: center; color: #9dbed4; overflow: hidden; }
        .fo-th img { width: 100%; height: 100%; object-fit: cover; }
        .fo-th .material-symbols-outlined { font-size: 26px; }
        .fo-ci { flex: 1; min-width: 0; }
        .fo-date { font-size: 11px; color: var(--color-text-sub); display: flex; align-items: center; gap: 4px; }
        .fo-date .material-symbols-outlined { font-size: 14px; }
        .fo-name { font-size: 15px; font-weight: 800; margin-top: 2px; }
        .fo-rest { font-size: 11px; color: var(--color-text-sub); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
        .fo-rest .material-symbols-outlined { font-size: 13px; }
        .fo-fl { font-size: 10px; color: #9aa3b0; margin-top: 2px; font-family: monospace; }
        .fo-badge { font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 10px; float: right; margin-left: 6px; }
        .fo-badge--wait { background: #fff3dc; color: #b36a00; }
        .fo-badge--prep { background: #eef1f4; color: #5a6470; }
        .fo-badge--deliv { background: var(--color-cta-lt); color: var(--color-cta); }
        .fo-badge--arrived { background: #e0f2ef; color: #0b7a6b; }
        .fo-deadline { display: flex; align-items: center; gap: 6px; background: #fdecea; color: #d14343; font-size: 12.5px; font-weight: 800; padding: 8px 11px; border-radius: 9px; margin-top: 10px; }
        .fo-deadline.warn { background: #fff7e6; color: #b36a00; }
        .fo-deadline .material-symbols-outlined { font-size: 16px; }
        .fo-arrivenote { display: flex; align-items: center; gap: 6px; background: #f0f4f8; color: #42566b; font-size: 12px; font-weight: 700; padding: 8px 11px; border-radius: 9px; margin-top: 10px; }
        .fo-arrivenote .material-symbols-outlined { font-size: 16px; }
        .fo-btn { display: block; width: 100%; box-sizing: border-box; text-align: center; font-size: 13px; font-weight: 800; padding: 11px; border-radius: 10px; margin-top: 11px; border: none; cursor: pointer; font-family: inherit; text-decoration: none; }
        .fo-btn--pri { background: var(--color-cta); color: #fff; }
        .fo-btn--sec { background: #fff; color: var(--color-cta); border: 1.5px solid var(--color-cta); }
        /* 6/17 #150 §4/§5: 進行中カード下の「問題を報告」入口（赤枠アウトライン維持）／報告済み／締切注記 */
        .fo-report-block { margin: -3px 2px 12px; }
        .fo-report-btn { display: inline-flex; align-items: center; gap: 5px; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 10px; padding: 8px 14px; font-size: 12.5px; font-weight: 700; text-decoration: none; }
        .fo-report-btn .material-symbols-outlined { font-size: 15px; }

        .fo-report-done .material-symbols-outlined { font-size: 15px; }

    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page" style="padding-bottom:80px; max-width:480px; margin:0 auto;">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>

            <div class="header-actions">
