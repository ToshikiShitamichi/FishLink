<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .acc-menu-page { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }
        .acc-menu-head { padding: 16px 0; }
        .acc-menu-head__sub { font-size: 12px; color: var(--color-text-sub); }
        .acc-menu-head__name { font-size: 22px; font-weight: 700; color: var(--color-text); margin-top: 4px; }
        /* 6/22 #164: マイページ top にアバター表示（公開ページで設定した avatarUrl・表示のみ・未設定はデフォルト） */
        .acc-profile { display: flex; align-items: center; gap: 14px; padding: 16px 0; }
        .acc-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: #e3ecf6; border: 1px solid #d7e1ed;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; color: var(--color-text-sub);
        }
        .acc-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .acc-avatar .material-symbols-outlined { font-size: 32px; }
        /* 6/22 #164: 紹介行の動的サブ文言（特典額・クーポン枚数）＝青アクセント／返金先「未登録」＝中立グレー */
        .acc-menu-item__meta--accent { color: var(--color-cta); font-weight: 600; }
        .acc-menu-item__meta--muted { color: var(--color-text-sub); }

        .acc-menu-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
        .acc-menu-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
        }
        .acc-menu-item:hover { background: #f8fafc; }
        .acc-menu-item__icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: #eef2ff;
            color: #3730a3;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .acc-menu-item__body { flex: 1; min-width: 0; }
        .acc-menu-item__title { font-size: 15px; font-weight: 700; color: var(--color-text); }
        .acc-menu-item__meta { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .acc-menu-item__chev {
            color: #cbd5e1;
            flex-shrink: 0;
        }

        /* 6/22 #164: ログアウトは破壊的でない＝中立グレー（赤は削除など danger 専用） */
        .logout-btn-full {
            width: 100%;
            background: var(--color-surface);
            color: var(--color-text-sub);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
        }

        .nav-badge {
            position: absolute;
            top: 6px;
            right: 50%;
            transform: translateX(18px);
            background: #ef4444;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* 6/22 #164: 紹介コードカード／紹介ボーナス枠カードは 1行メニュー化で廃止（CSS も削除）。
           コード/コピー/シェアは紹介専用ページ（account/referral.html）へ移動。 */
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="acc-menu-page">

            <!-- 6/22 #164: プロフィールヘッダー（アバター＋役割＋表示名・@ハンドルは出さない） -->
            <div class="acc-profile">
                <div class="acc-avatar" id="avatar"><span class="material-symbols-outlined">person</span></div>
                <div>
                    <div class="acc-menu-head__sub" data-i18n="role.farmer"></div>
                    <div class="acc-menu-head__name" id="display-name">-</div>
                </div>
            </div>

            <!-- 6/22 #164: 並び順＝基本情報→生産者ページ→送金先→配送設定→売上・取引→紹介→運営メッセージ -->
            <div class="acc-menu-list">
                <a class="acc-menu-item" href="/pages/farmer/account/basic.html">
                    <div class="acc-menu-item__icon"><span class="material-symbols-outlined">person</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.basic"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintBasic"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/11 #137 §10（農家側も同様）: 「生産者ページ」はプロフィール編集画面へ。公開プレビューは
                     編集画面内の「公開ページをプレビュー」リンクから（公開ページに編集導線は置かない）。
                     6/22 #164: 基本情報のすぐ下＝公開ページ。サブは「買い手に公開される〜」。 -->
                <a class="acc-menu-item" href="/pages/farmer/account/profile.html">
                    <div class="acc-menu-item__icon" style="background:#ecfdf5; color:#047857;"><span class="material-symbols-outlined">eco</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="profile.farmerTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintProfileFarmer"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/farmer/account/payment.html">
                    <div class="acc-menu-item__icon" style="background:#fef3c7; color:#92400e;"><span class="material-symbols-outlined">account_balance_wallet</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.remit"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintRemit"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/22 #164/#168: 配送設定（独立画面・farmerDelivery を出品フォームと共有） -->
                <a class="acc-menu-item" href="/pages/farmer/account/delivery.html">
                    <div class="acc-menu-item__icon" style="background:#e7f0fa; color:#1d4ed8;"><span class="material-symbols-outlined">local_shipping</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.deliverySetting"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintDelivery"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/farmer/account/sales.html">
                    <div class="acc-menu-item__icon" style="background:#dcfce7; color:#166534;"><span class="material-symbols-outlined">trending_up</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.salesTradeTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintSales"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <!-- 6/22 #164: 紹介＝1行メニュー化（巨大カード廃止）。サブ文言は状態で動的（金額は運営設定）。
                     コード/コピー/シェアは紹介専用ページ（account/referral.html）。 -->
                <a class="acc-menu-item" href="/pages/farmer/account/referral.html">
                    <div class="acc-menu-item__icon" style="background:#fbf0dc; color:#b45309;"><span class="material-symbols-outlined">redeem</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.referralFarmer"></div>
                        <div class="acc-menu-item__meta acc-menu-item__meta--accent" id="referral-sub"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/admin-chat.html" style="position:relative;">
                    <div class="acc-menu-item__icon" style="background:#ddd6fe; color:#5b21b6;"><span class="material-symbols-outlined">support_agent</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.adminChat"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.adminChatHint"></div>
                    </div>
                    <span class="nav-badge" id="admin-chat-badge" style="display:none; top:14px; right:50px; transform:none;"></span>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>
            </div>

            <button class="logout-btn-full" id="logout-btn">
                <span class="material-symbols-outlined">logout</span>
                <span data-i18n="account.logout"></span>
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/pages/farmer/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><img src="/images/role-fish.svg" alt=""></span>
            <span data-i18n="dashboard.listings"></span>
        </a>
        <a href="/pages/farmer/post.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">add_circle</span></span>
            <span data-i18n="dashboard.newPost"></span>
        </a>
        <a href="/pages/farmer/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">inbox</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="orders.navOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, onSnapshot, doc, getDoc
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ（紹介サブ文言など非同期描画分）
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/22 #164: アバター画像（公開ページで設定した avatarUrl・表示のみ・未設定はデフォルト）
        import { asCachedImgAttrs } from '/js/image-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function renderHead() {
            const d = window.currentUserData || {};
            document.getElementById('display-name').textContent = d.displayName || '-';
            // 6/22 #164: アバター（avatarUrl・未設定はデフォルトの人型アイコン）
            const av = document.getElementById('avatar');
            if (av) {
                av.innerHTML = d.avatarUrl
                    ? `<img ${asCachedImgAttrs(d.avatarUrl)} alt="">`
                    : `<span class="material-symbols-outlined">person</span>`;
            }
        }

        // 6/22 #164: 紹介行のサブ文言を即時復元（非同期算出分）
        (function applyAccountCache() {
            try {
                const cached = loadRenderState('farmer_account');
                if (cached && cached.referralSub != null) {
                    const el = document.getElementById('referral-sub');
                    if (el) el.textContent = cached.referralSub;
                }
            } catch (e) { /* ignore */ }
        })();
        function saveAccountRender() {
            try {
                saveRenderState('farmer_account', {
                    referralSub: document.getElementById('referral-sub')?.textContent || '',
                });
            } catch (e) { /* ignore */ }
        }

        function watchOrderBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const lastSeen = parseInt(localStorage.getItem('fishlink_orders_seen') || '0');
            const q = query(collection(db, 'orders'), where('farmerId', '==', uid));
            onSnapshot(q, (snap) => {
                const hasNew = snap.docs.some(d => {
                    const t = d.data().createdAt?.toMillis?.() || 0;
                    const s = d.data().status;
                    return t > lastSeen || (s === 'pending' && t > lastSeen - 60000);
                });
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
        }

        function watchAdminChatBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const q = query(
                collection(db, `adminChats/${uid}/messages`),
                where('senderRole', '==', 'admin'),
                where('isRead', '==', false)
            );
            onSnapshot(q, (snap) => {
                const badge = document.getElementById('admin-chat-badge');
                if (badge) badge.style.display = snap.empty ? 'none' : 'block';
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        // 6/22 #164: 紹介行の動的サブ文言（settings/referral の現在値＋本人の保留ボーナス数を反映）。
        //   コード/コピー/シェアは紹介専用ページ（account/referral.html）に移動。
        let referralState = null; // { enabled, amount, count }
        async function computeReferralSub() {
            try {
                const settingsSnap = await getDoc(doc(db, 'settings', 'referral'));
                const settings = settingsSnap.exists() ? settingsSnap.data() : null;
                const amount = Number(settings?.farmerBonusKhr || 0);
                const enabled = !!settings && settings.enabled === true && amount > 0;
                const count = Number(window.currentUserData?.pendingFarmerBonus || 0);
                referralState = { enabled, amount, count };
            } catch (e) {
                console.warn('computeReferralSub failed:', e);
                referralState = { enabled: false, amount: 0, count: 0 };
            }
            renderReferralSub();
        }
        function renderReferralSub() {
            const el = document.getElementById('referral-sub');
            if (!el) return;
            const s = referralState || { enabled: false, amount: 0, count: 0 };
            const amountStr = s.amount ? s.amount.toLocaleString() : '';
            if (s.enabled && s.count > 0) {
                el.textContent = i18next.t('account.referralSubFarmerActive', { count: s.count, amount: amountStr });
            } else if (s.enabled) {
                el.textContent = i18next.t('account.referralSubFarmerEmpty', { amount: amountStr });
            } else {
                el.textContent = i18next.t('account.referralSubDefault');
            }
        }

        waitForUserData(() => {
            renderHead();
            watchOrderBadge();
            watchAdminChatBadge();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'farmer');
                subscribeNotifications(window.currentUser.uid);
                // 6/22 #164: 紹介行の動的サブ文言を算出（完了後にキャッシュ更新）
                computeReferralSub().then(saveAccountRender);
            }
            // 5/23 #69 Phase C: 初期スピナー解除
            document.body.classList.add('app-ready');
        });

        onLanguageChange(() => { renderHead(); renderReferralSub(); });
    </script>
</body>

</html>
