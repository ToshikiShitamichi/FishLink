<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .acc-menu-page { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }
        .acc-menu-head { padding: 16px 0; }
        .acc-menu-head__sub { font-size: 12px; color: var(--color-text-sub); }
        .acc-menu-head__name { font-size: 22px; font-weight: 700; color: var(--color-text); margin-top: 4px; }
        .acc-menu-head__id { font-size: 13px; color: var(--color-text-sub); margin-top: 2px; }

        .acc-menu-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
        .acc-menu-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
        }
        .acc-menu-item:hover { background: #f8fafc; }
        .acc-menu-item__icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: #eef2ff;
            color: #3730a3;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .acc-menu-item__body { flex: 1; min-width: 0; }
        .acc-menu-item__title { font-size: 15px; font-weight: 700; color: var(--color-text); }
        .acc-menu-item__meta { font-size: 12px; color: var(--color-text-sub); margin-top: 2px; }
        .acc-menu-item__chev {
            color: #cbd5e1;
            flex-shrink: 0;
        }

        .logout-btn-full {
            width: 100%;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
        }

        .nav-badge {
            position: absolute;
            top: 6px;
            right: 50%;
            transform: translateX(18px);
            background: #ef4444;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub); margin-right:6px;">
                <option value="km">ខ្មែរ</option>
                <option value="en">EN</option>
                <option value="ja">JA</option>
            </select>
            <div class="header-actions">
                <button class="header-action-btn" data-popover="notif" type="button" aria-label="notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="header-action-btn__badge" id="notif-badge"></span>
                </button>
                <button class="header-action-btn" data-popover="todos" type="button" aria-label="todo list">
                    <span class="material-symbols-outlined">checklist</span>
                    <span class="header-action-btn__badge" id="todos-badge"></span>
                </button>
                <div class="header-popover" data-popover-for="notif">
                    <div class="header-popover__head" data-i18n="notifications.title"></div>
                    <div class="header-popover__body" id="notif-list">
                        <div class="header-popover__empty" data-i18n="notifications.empty"></div>
                    </div>
                </div>
                <div class="header-popover" data-popover-for="todos">
                    <div class="header-popover__head" data-i18n="todos.title"></div>
                    <div class="header-popover__body" id="todos-list">
                        <div class="header-popover__empty" data-i18n="todos.empty"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="acc-menu-page">

            <div class="acc-menu-head">
                <div class="acc-menu-head__sub" data-i18n="role.farmer"></div>
                <div class="acc-menu-head__name" id="display-name">-</div>
                <div class="acc-menu-head__id" id="login-id">-</div>
            </div>

            <div class="acc-menu-list">
                <a class="acc-menu-item" href="/pages/farmer/account/basic.html">
                    <div class="acc-menu-item__icon"><span class="material-symbols-outlined">person</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.basic"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintBasic"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/farmer/account/payment.html">
                    <div class="acc-menu-item__icon" style="background:#fef3c7; color:#92400e;"><span class="material-symbols-outlined">account_balance_wallet</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.remit"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintRemit"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/farmer/account/sales.html">
                    <div class="acc-menu-item__icon" style="background:#dcfce7; color:#166534;"><span class="material-symbols-outlined">trending_up</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="account.salesTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintSales"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>

                <a class="acc-menu-item" href="/pages/farmer/account/profile.html">
                    <div class="acc-menu-item__icon" style="background:#ecfdf5; color:#047857;"><span class="material-symbols-outlined">eco</span></div>
                    <div class="acc-menu-item__body">
                        <div class="acc-menu-item__title" data-i18n="profile.farmerTitle"></div>
                        <div class="acc-menu-item__meta" data-i18n="account.menuHintProfileFarmer"></div>
                    </div>
                    <span class="material-symbols-outlined acc-menu-item__chev">chevron_right</span>
                </a>
            </div>

            <button class="logout-btn-full" id="logout-btn">
                <span class="material-symbols-outlined">logout</span>
                <span data-i18n="account.logout"></span>
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/pages/farmer/dashboard.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">set_meal</span></span>
            <span data-i18n="dashboard.listings"></span>
        </a>
        <a href="/pages/farmer/post.html" class="bottom-nav__item">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">add_circle</span></span>
            <span data-i18n="dashboard.newPost"></span>
        </a>
        <a href="/pages/farmer/orders.html" class="bottom-nav__item" style="position:relative;">
            <span class="bottom-nav__icon"><span class="material-symbols-outlined">inbox</span></span>
            <span class="nav-badge" id="order-badge" style="display:none;"></span>
            <span data-i18n="orders.navOrders"></span>
        </a>
    </nav>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState, logout } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { initHeaderPopovers } from '/js/header-actions.js';
        import { subscribeTodos } from '/js/todos.js';
        import { subscribeNotifications } from '/js/notifications.js';
        import {
            collection, query, where, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();
        initHeaderPopovers();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        function renderHead() {
            const d = window.currentUserData || {};
            document.getElementById('display-name').textContent = d.displayName || '-';
            document.getElementById('login-id').textContent = d.loginId ? `@${d.loginId}` : '';
        }

        function watchOrderBadge() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const lastSeen = parseInt(localStorage.getItem('fishlink_orders_seen') || '0');
            const q = query(collection(db, 'orders'), where('farmerId', '==', uid));
            onSnapshot(q, (snap) => {
                const hasNew = snap.docs.some(d => {
                    const t = d.data().createdAt?.toMillis?.() || 0;
                    const s = d.data().status;
                    return t > lastSeen || (s === 'pending' && t > lastSeen - 60000);
                });
                document.getElementById('order-badge').style.display = hasNew ? 'block' : 'none';
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        waitForUserData(() => {
            renderHead();
            watchOrderBadge();
            if (window.currentUser?.uid) {
                subscribeTodos(window.currentUser.uid, 'farmer');
                subscribeNotifications(window.currentUser.uid);
            }
        });

        onLanguageChange(() => renderHead());
    </script>
</body>

</html>
