<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .profile-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }

        .hero-photo {
            width: 100%;
            height: 220px;
            border-radius: 18px;
            overflow: hidden;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }
        .hero-photo img { width: 100%; height: 100%; object-fit: cover; }

        .name-block { margin-bottom: 10px; }
        .name-block__name { font-size: 22px; font-weight: 700; color: var(--color-text); }
        .name-block__location { font-size: 13px; color: var(--color-text-sub); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        .name-block__rating { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
        .name-block__rating .material-symbols-outlined { color: #ef4444; font-size: 20px; font-variation-settings: 'FILL' 1; }
        .name-block__rating-value { font-size: 16px; font-weight: 700; }
        .name-block__rating-count { font-size: 13px; color: var(--color-text-sub); }

        .map-block {
            background: #f1f5f9;
            border-radius: 16px;
            height: 160px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }
        .map-iframe { width: 100%; height: 100%; border: none; }
        .map-footer {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,.95);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
        }
        .map-footer a { color: #0369a1; text-decoration: none; }

        .section { margin-bottom: 20px; }
        .section__title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }

        .subrating-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .subrating-card {
            border-radius: 14px;
            padding: 10px;
            text-align: center;
        }
        .subrating-card--orange { background: #fff7ed; }
        .subrating-card--blue { background: #eff6ff; }
        .subrating-card--green { background: #f0fdf4; }
        .subrating-card__label { font-size: 11px; color: var(--color-text-sub); }
        .subrating-card__sub { font-size: 10px; color: var(--color-text-sub); margin-top: 2px; }
        .subrating-card__value { font-size: 20px; font-weight: 700; margin-top: 2px; }
        .subrating-card--orange .subrating-card__value { color: #ea580c; }
        .subrating-card--blue .subrating-card__value { color: #2563eb; }
        .subrating-card--green .subrating-card__value { color: #16a34a; }

        .review-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 8px;
        }
        .review-card__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .review-card__name { font-size: 14px; font-weight: 700; }
        .review-card__date { font-size: 11px; color: var(--color-text-sub); }
        .review-card__stars { color: #ef4444; font-size: 14px; font-variation-settings: 'FILL' 1; margin-bottom: 4px; }
        .review-card__stars .material-symbols-outlined { font-size: 16px; }
        .review-card__comment { font-size: 13px; color: var(--color-text); line-height: 1.5; }
        /* 5/11 #64: レビュー者の名前+アバター */
        .review-card__reviewer {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px;
        }
        .review-card__avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: #e2e8f0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .review-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .review-card__avatar .material-symbols-outlined { font-size: 18px; color: #94a3b8; }
        .review-card__reviewer-name {
            font-size: 13px; font-weight: 600; color: var(--color-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }

        .empty-small { text-align: center; padding: 20px; color: var(--color-text-sub); font-size: 13px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="javascript:history.back()" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="profile.restTitle"></div>
    </div>

    <div class="profile-page">

        <!-- 5/12 #72: 自分自身のページを見ている場合のみ表示する編集ボタン -->
        <div id="self-edit-bar" style="display:none; margin-bottom:12px;">
            <a href="/pages/restaurant/account/profile.html" class="edit-btn" style="display:inline-flex; align-items:center; gap:4px; background:#eef2ff; color:#3730a3; border:none; border-radius:20px; padding:8px 14px; font-size:13px; font-weight:600; text-decoration:none;">
                <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
                <span data-i18n="account.editProfile"></span>
            </a>
        </div>

        <div class="hero-photo" id="hero-photo">
            <span class="material-symbols-outlined" style="font-size:60px; color:#94a3b8;">storefront</span>
        </div>

        <div class="name-block">
            <div class="name-block__name" id="name">-</div>
            <div class="name-block__location"><span class="material-symbols-outlined" style="font-size:16px;">location_on</span><span id="location">-</span></div>
            <div class="name-block__rating">
                <span class="material-symbols-outlined">star</span>
                <span class="name-block__rating-value" id="rating-value">0.0</span>
                <span class="name-block__rating-count" id="rating-count">0件のレビュー</span>
            </div>
        </div>

        <div class="map-block" id="map-block">
            <iframe class="map-iframe" id="map-iframe" style="display:none;"></iframe>
            <div class="map-footer">
                <a id="map-link-footer" href="#" target="_blank" data-i18n="profile.openMap"></a>
            </div>
        </div>

        <div class="section">
            <div class="section__title" data-i18n="profile.summary"></div>
            <div class="subrating-grid">
                <div class="subrating-card subrating-card--orange">
                    <div class="subrating-card__label" data-i18n="profile.ratingOverall"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-overall">0.0</div>
                </div>
                <div class="subrating-card subrating-card--blue">
                    <div class="subrating-card__label" data-i18n="profile.ratingCommunication"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-communication">0.0</div>
                </div>
                <div class="subrating-card subrating-card--green">
                    <div class="subrating-card__label" data-i18n="profile.ratingReception"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-reception">0.0</div>
                </div>
            </div>
        </div>

        <div class="section" id="reviews-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div class="section__title" style="margin:0;" data-i18n="profile.reviewComments"></div>
                <div id="review-count-label" style="font-size:12px; color:var(--color-text-sub);"></div>
            </div>
            <div id="reviews-list"></div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            doc, getDoc, collectionGroup, query, where, orderBy, getDocs
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { formatProvince, formatLocation } from '/js/province-utils.js';
        import { getReviewerAvatarUrl, getRestaurantPhotos } from '/js/profile-utils.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users の重複取得を抑止
        import { getCachedUser } from '/js/data-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const targetUid = new URLSearchParams(location.search).get('id');
        if (!targetUid) { history.back(); }

        // 5/12 #72: 自分自身を見ている場合は編集ボタンを表示
        (function waitForCurrent() {
            if (window.currentUser) {
                if (window.currentUser.uid === targetUid) {
                    const bar = document.getElementById('self-edit-bar');
                    if (bar) bar.style.display = 'block';
                }
                return;
            }
            setTimeout(waitForCurrent, 200);
        })();

        function fmtDate(ts) {
            const d = ts?.toDate?.() || new Date(ts || 0);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const da = String(d.getDate()).padStart(2, '0');
            return `${y}/${m}/${da}`;
        }

        function verdictBadge(verdict) {
            if (verdict === 'good') {
                return `<span style="display:inline-flex; align-items:center; gap:4px; background:#ecfdf5; color:#047857; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700;">
                    <span class="material-symbols-outlined" style="font-size:14px;">thumb_up</span>${i18next.t('review.verdictGood')}</span>`;
            }
            if (verdict === 'bad') {
                return `<span style="display:inline-flex; align-items:center; gap:4px; background:#fef2f2; color:#b91c1c; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700;">
                    <span class="material-symbols-outlined" style="font-size:14px;">thumb_down</span>${i18next.t('review.verdictBad')}</span>`;
            }
            return '';
        }
        function legacyToVerdict(r) {
            if (r.verdict) return r.verdict;
            const avg = Number(r.avgRating || r.overall || 0);
            return avg >= 4 ? 'good' : avg > 0 ? 'bad' : null;
        }

        // 5/7 #56: コメントを innerHTML に流し込むので XSS 防止のためエスケープ
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // 5/23 #69 Phase J: 描画ロジックを fetch から分離。cached / fresh 両方から呼ぶ。
        function renderRestaurantPage(user, reviewsWithComment, reviewerMap) {
            // 店舗写真
            const restPhotos = getRestaurantPhotos(user);
            const heroEl = document.getElementById('hero-photo');
            if (restPhotos.length === 1) {
                heroEl.innerHTML = `<img ${asCachedImgAttrs(restPhotos[0])} alt="${escapeHtml(user.displayName || '')}">`;
            } else if (restPhotos.length > 1) {
                heroEl.style.padding = '0';
                heroEl.style.background = '#000';
                heroEl.innerHTML = `
                    <div style="display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; width:100%; height:100%;">
                        ${restPhotos.map(u => `
                            <div style="flex:0 0 100%; scroll-snap-align:start; height:100%;">
                                <img ${asCachedImgAttrs(u)} alt="" loading="lazy" style="width:100%; height:100%; object-fit:cover; display:block;">
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            // 名前・場所
            document.getElementById('name').textContent = user.displayName || '-';
            const loc = formatLocation(user) || '-';
            document.getElementById('location').textContent = loc;

            // 評価
            const goodRate = Number(user.avgRating || 0);
            const count = Number(user.reviewCount || 0);
            document.getElementById('rating-value').textContent = `${Math.round(goodRate)}%`;
            document.getElementById('rating-count').textContent = `${count}${i18next.t('order.reviews')}`;
            document.getElementById('review-count-label').textContent = i18next.t('profile.reviewsCount', { count });

            const sub = user.subRatings || {};
            const fmtSubRate = (s) => {
                if (s && typeof s === 'object' && 'good' in s && 'total' in s && s.total > 0) {
                    return `${Math.round((s.good / s.total) * 100)}%`;
                }
                return '—';
            };
            document.getElementById('sub-overall').textContent = fmtSubRate(sub.overall);
            document.getElementById('sub-communication').textContent = fmtSubRate(sub.communication);
            document.getElementById('sub-reception').textContent = fmtSubRate(sub.reception);

            // 地図
            if (user.location?.lat && user.location?.lng) {
                const mapsUrl = `https://www.google.com/maps?q=${user.location.lat},${user.location.lng}`;
                document.getElementById('map-link-footer').href = mapsUrl;
                const iframe = document.getElementById('map-iframe');
                iframe.src = `https://www.google.com/maps?q=${user.location.lat},${user.location.lng}&z=15&output=embed`;
                iframe.style.display = 'block';
            }

            // レビュー
            const listEl = document.getElementById('reviews-list');
            if (!reviewsWithComment || reviewsWithComment.length === 0) {
                listEl.innerHTML = `<div class="empty-small">${i18next.t('profile.noReviews')}</div>`;
                return;
            }
            listEl.innerHTML = reviewsWithComment.map(r => {
                const v = legacyToVerdict(r);
                const reviewer = (reviewerMap && reviewerMap[r.fromUid]) || {};
                const reviewerName = reviewer.displayName || i18next.t('profile.anonymousReviewer');
                const reviewerAvatar = getReviewerAvatarUrl(reviewer);
                const avatarHtml = reviewerAvatar
                    ? `<img ${asCachedImgAttrs(reviewerAvatar)} alt="" loading="lazy">`
                    : `<span class="material-symbols-outlined">${reviewer.role === 'restaurant' ? 'restaurant' : 'person'}</span>`;
                return `
                    <div class="review-card">
                        <div class="review-card__reviewer">
                            <div class="review-card__avatar">${avatarHtml}</div>
                            <div class="review-card__reviewer-name">${escapeHtml(reviewerName)}</div>
                        </div>
                        <div class="review-card__head">
                            ${verdictBadge(v)}
                            <div class="review-card__date">${fmtDate(r.createdAt)}</div>
                        </div>
                        <div class="review-card__comment">${escapeHtml(r.comment)}</div>
                    </div>
                `;
            }).join('');
        }

        async function load({ silent = false } = {}) {
            if (!silent) loading.classList.add('show');
            try {
                const user = await getCachedUser(targetUid);
                if (!user) { history.back(); return; }

                let reviewsWithComment = [];
                let reviewerMap = {};
                try {
                    const q = query(
                        collectionGroup(db, 'reviews'),
                        where('toUid', '==', targetUid),
                        orderBy('createdAt', 'desc')
                    );
                    const reviewSnap = await getDocs(q);
                    const reviews = [];
                    reviewSnap.forEach(d => { reviews.push({ id: d.id, ...d.data() }); });
                    reviewsWithComment = reviews.filter(r => r.comment && String(r.comment).trim() !== '');
                    const reviewerIds = [...new Set(reviewsWithComment.map(r => r.fromUid).filter(Boolean))];
                    await Promise.all(reviewerIds.map(async (uid) => {
                        try { reviewerMap[uid] = (await getCachedUser(uid)) || {}; }
                        catch (e) { reviewerMap[uid] = {}; }
                    }));
                } catch (err) {
                    console.warn('collectionGroup reviews failed:', err);
                }

                renderRestaurantPage(user, reviewsWithComment, reviewerMap);

                // 5/23 #69 Phase J: 次回訪問用に cache 保存
                try {
                    const reviewsForCache = reviewsWithComment.map(r => ({
                        ...r,
                        createdAt: r.createdAt?.toMillis?.() || r.createdAt || null,
                    }));
                    saveRenderState(`restaurant:${targetUid}`, {
                        user,
                        reviewsWithComment: reviewsForCache,
                        reviewerMap,
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 5/23 #69 Phase J: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`restaurant:${targetUid}`);
            if (cached?.user) {
                renderRestaurantPage(
                    cached.user,
                    cached.reviewsWithComment || [],
                    cached.reviewerMap || {}
                );
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached restaurant render failed:', e);
        }

        load({ silent: cachedRendered });
    </script>
</body>

</html>
