<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .profile-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }

        /* 6/10 #137 §9: 自己プレビューの案内バナー（本人がプロフィールから read-only で開いたとき） */
        .self-note {
            display: none; align-items: center; gap: 8px;
            background: #eaf2fb; border: 1px solid #c5dbf2; color: #0b5fb0;
            font-size: 12px; font-weight: 700; padding: 9px 12px;
            border-radius: 10px; margin-bottom: 12px; line-height: 1.5;
        }
        .self-note .material-symbols-outlined { font-size: 18px; flex-shrink: 0; }

        /* 6/10 #137 §6: プロフィール（アイコン円形＋店名＋★%＋メタ行）。生産者ページと対称。 */
        .rest-prof { text-align: center; padding: 8px 0 4px; }
        .rest-avatar {
            width: 96px; height: 96px; border-radius: 50%;
            background: #e2e8f0; margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .rest-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .rest-name { font-size: 22px; font-weight: 700; }
        /* 6/10 #137: ★%（件数）。★は非赤（amber=評価バッジ・生産者ページと統一）。0件=新規=グレー。 */
        .rest-rating {
            display: inline-flex; align-items: center; gap: 4px;
            background: #fef3c7; color: #92400e;
            padding: 4px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 700; line-height: 1; margin-top: 8px;
        }
        .rest-rating .material-symbols-outlined {
            font-size: 16px; color: #f59e0b;
            font-variation-settings: 'FILL' 1, 'wght' 500, 'opsz' 24; line-height: 1;
        }
        .rest-rating__count { font-weight: 600; }
        .rest-rating--new { background: #eef1f4; color: #5a6470; }
        /* 6/10 #137 §5: 信頼ブロックのメタ行＝📍地区 ・ 取引N件 ・ YYYY/M〜 */
        .rest-meta {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
            font-size: 12.5px; color: var(--color-text-sub); margin-top: 9px; line-height: 1.6;
        }
        .rest-meta__pin { font-size: 15px; line-height: 1; vertical-align: -2px; }
        .rest-meta__dot { margin: 0 7px; color: #cbd5e1; }

        .map-block {
            background: #f1f5f9;
            border-radius: 16px;
            height: 160px;
            margin: 16px 0 14px;
            position: relative;
            overflow: hidden;
        }
        .map-iframe { width: 100%; height: 100%; border: none; }
        .map-footer {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,.95);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
        }
        .map-footer a { color: var(--color-cta); text-decoration: none; }

        .section { margin-bottom: 20px; }
        .section__title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }

        /* 6/10 #137 §2: お店の紹介（任意・中立ボックス・未記入なら非表示） */
        .intro-box { background: #f8fafc; border: 1px solid var(--color-border); border-radius: 14px; padding: 12px 14px; }
        .intro-box__label { font-size: 12px; font-weight: 700; color: var(--color-text-sub); margin-bottom: 4px; }
        .intro-box__text { font-size: 13px; color: var(--color-text); line-height: 1.6; white-space: pre-wrap; }

        /* 6/10 #137 §6: お店の様子（風景写真・任意・未登録なら非表示） */
        .scene-photo { width: 100%; border-radius: 14px; overflow: hidden; background: #e2e8f0; margin-bottom: 10px; }
        .scene-photo img { width: 100%; height: 100%; object-fit: cover; display: block; max-height: 220px; }

        /* 6/10 #137 §4: レビュー（3軸メトリクス）＝ニュートラル統一（薄グレーカード＋濃色数字・意味色を使わない） */
        .subrating-wrap {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .subrating-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .subrating-head__title { font-size: 14px; font-weight: 700; }
        .subrating-head__link { font-size: 12px; color: var(--color-cta); font-weight: 600; text-decoration: none; cursor: pointer; }
        .subrating-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .subrating-card { background: #f8fafc; border-radius: 12px; padding: 10px; text-align: center; }
        .subrating-card__label { font-size: 11px; color: var(--color-text-sub); }
        .subrating-card__sub { font-size: 10px; color: var(--color-text-sub); margin-top: 2px; }
        .subrating-card__value { font-size: 20px; font-weight: 700; margin-top: 4px; color: var(--color-text); }

        /* 6/10 #137 §8: レビューコメント（共通描画 js/review-card.js と対のスタイル） */
        .review-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 8px;
        }
        .review-card__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .review-card__date { font-size: 11px; color: var(--color-text-sub); }
        .review-card__comment { font-size: 13px; color: var(--color-text); line-height: 1.5; }
        .review-card__reviewer { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .review-card__avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: #e2e8f0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .review-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .review-card__avatar .material-symbols-outlined { font-size: 18px; color: #94a3b8; }
        .review-card__reviewer-name {
            font-size: 13px; font-weight: 600; color: var(--color-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }
        .reviews-more { display: block; text-align: center; font-size: 13px; font-weight: 700; color: var(--color-cta); cursor: pointer; padding: 8px; background: none; border: none; width: 100%; font-family: inherit; }

        .empty-small { text-align: center; padding: 20px; color: var(--color-text-sub); font-size: 13px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div style="max-width:480px; margin:0 auto;">
        <div class="page-header" style="align-items:center; padding:12px 16px;">
            <a href="javascript:history.back()" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="profile.restTitle"></div>
    </div>

    <div class="profile-page">

        <!-- 6/10 #137 §9: 自己プレビュー時のみ表示（本人＝農家から見える自分のページの確認）。編集導線は出さない（プロフィール画面側）。 -->
        <div class="self-note" id="self-note">
            <span class="material-symbols-outlined">visibility</span>
            <span data-i18n="profile.selfPreviewNote"></span>
        </div>

        <!-- プロフィール：アイコン（円形・常時）＋店名＋★%（件数）＋メタ行 -->
        <div class="rest-prof">
            <div class="rest-avatar" id="avatar">
                <span class="material-symbols-outlined" style="font-size:50px; color:#94a3b8;">storefront</span>
            </div>
            <div class="rest-name" id="name">-</div>
            <div class="rest-rating" id="rating-badge"></div>
            <div class="rest-meta" id="meta-line"></div>
        </div>

        <!-- 地図（農家向け＝配達先・常に表示・新規でも） -->
        <div class="map-block" id="map-block">
            <iframe class="map-iframe" id="map-iframe" style="display:none;"></iframe>
            <div class="map-footer">
                <a id="map-link-footer" href="#" target="_blank" data-i18n="profile.openMap"></a>
            </div>
        </div>

        <!-- お店の紹介（任意・未記入ならセクションごと非表示） -->
        <div class="section" id="intro-section" style="display:none;">
            <div class="section__title" data-i18n="profile.shopIntro"></div>
            <div class="intro-box">
                <div class="intro-box__label" data-i18n="profile.shopIntroFrom"></div>
                <div class="intro-box__text" id="intro-text"></div>
            </div>
        </div>

        <!-- お店の様子（任意・未登録ならセクションごと非表示） -->
        <div class="section" id="scene-section" style="display:none;">
            <div class="section__title" data-i18n="profile.shopScene"></div>
            <div id="scene-photos"></div>
        </div>

        <!-- レビュー（3軸メトリクス・ニュートラル統一） -->
        <div class="subrating-wrap">
            <div class="subrating-head">
                <div class="subrating-head__title" id="subrating-title" data-i18n="review.title"></div>
                <a class="subrating-head__link" id="reviews-link" href="#reviews-section" data-i18n="profile.viewReviews"></a>
            </div>
            <div class="subrating-grid">
                <div class="subrating-card">
                    <div class="subrating-card__label" data-i18n="profile.ratingOverall"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-overall">—</div>
                </div>
                <div class="subrating-card">
                    <div class="subrating-card__label" data-i18n="profile.ratingCommunication"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-communication">—</div>
                </div>
                <div class="subrating-card">
                    <div class="subrating-card__label" data-i18n="profile.ratingReception"></div>
                    <div class="subrating-card__sub" data-i18n="profile.goodRate"></div>
                    <div class="subrating-card__value" id="sub-reception">—</div>
                </div>
            </div>
        </div>

        <!-- レビューコメント（最新3件＋もっと見る・線画スマイリー） -->
        <div class="section" id="reviews-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div class="section__title" id="reviews-section-title" style="margin:0;" data-i18n="profile.reviewComments"></div>
            </div>
            <div id="reviews-list"></div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import {
            collectionGroup, query, where, orderBy, getDocs
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { formatLocation } from '/js/province-utils.js';
        import { getRestaurantPhotos } from '/js/profile-utils.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users の重複取得を抑止
        import { getCachedUser } from '/js/data-cache.js';
        // 5/23 #69 Phase J: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        // 6/10 #137/#138: レビューコメントの共通描画（線画スマイリー・3件＋もっと見る）
        import { renderReviewComments } from '/js/review-card.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const targetUid = new URLSearchParams(location.search).get('id');
        if (!targetUid) { history.back(); }

        // 6/10 #137 §9: 自分自身のページを見ている場合は自己プレビューバナーを表示（編集ボタンは出さない）
        (function waitForCurrent() {
            if (window.currentUser) {
                if (window.currentUser.uid === targetUid) {
                    const note = document.getElementById('self-note');
                    if (note) note.style.display = 'flex';
                }
                return;
            }
            setTimeout(waitForCurrent, 200);
        })();

        // 5/7 #56: コメント等を innerHTML に流し込むので XSS 防止のためエスケープ
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // 6/10 #137 §5: 登録時期の「YYYY/M」表示。Timestamp / millis 数値 / {seconds}（cache 復元）に対応。
        function fmtYearMonth(ts) {
            if (!ts) return '';
            let d;
            if (ts.toDate) d = ts.toDate();
            else if (typeof ts === 'number') d = new Date(ts);
            else if (ts.seconds != null) d = new Date(ts.seconds * 1000);
            else d = new Date(ts);
            if (isNaN(d.getTime())) return '';
            return `${d.getFullYear()}/${d.getMonth() + 1}`;
        }

        // 5/7 #56: 「レビューを見る」でレビューコメント欄へスムーズスクロール（同ページ内アンカー）
        document.addEventListener('click', (e) => {
            const link = e.target.closest('#reviews-link');
            if (!link) return;
            e.preventDefault();
            document.getElementById('reviews-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        // 5/23 #69 Phase J: 描画ロジックを fetch から分離。cached / fresh 両方から呼ぶ。
        function renderRestaurantPage(user, reviewsWithComment, reviewerMap) {
            // アイコン写真（円形・常時表示・未設定はデフォルト storefront アイコン）
            if (user.avatarUrl) {
                document.getElementById('avatar').innerHTML =
                    `<img ${asCachedImgAttrs(user.avatarUrl)} alt="${escapeHtml(user.displayName || '')}">`;
            }

            // 名前
            document.getElementById('name').textContent = user.displayName || '-';

            // 6/10 #137 §4: ★%（件数）。★は非赤。0件＝「新規」（％を出さない）。
            const goodRate = Number(user.avgRating || 0);
            const count = Number(user.reviewCount || 0);
            const ratingEl = document.getElementById('rating-badge');
            if (count === 0) {
                ratingEl.className = 'rest-rating rest-rating--new';
                ratingEl.innerHTML = `<span>${escapeHtml(i18next.t('fishlist.newFarmer'))}</span>`;
            } else {
                ratingEl.className = 'rest-rating';
                ratingEl.innerHTML = `<span class="material-symbols-outlined">star</span><span>${Math.round(goodRate)}%</span><span class="rest-rating__count">（${count}${i18next.t('order.reviews')}）</span>`;
            }

            // 6/10 #137 §5: メタ行＝📍地区 ・ 取引N件 ・ YYYY/M〜（“率”指標は出さない）
            const loc = formatLocation(user) || '-';
            const trade = Number(user.tradeCount || 0);
            const ym = fmtYearMonth(user.createdAt);
            const parts = [
                `<span class="material-symbols-outlined rest-meta__pin">location_on</span>${escapeHtml(loc)}`,
                escapeHtml(i18next.t('profile.tradeCount', { count: trade })),
            ];
            if (ym) parts.push(`${escapeHtml(ym)}〜`);
            document.getElementById('meta-line').innerHTML =
                parts.join('<span class="rest-meta__dot">・</span>');

            // 地図（常に表示・新規でも・場所は登録済み）
            if (user.location?.lat && user.location?.lng) {
                const mapsUrl = `https://www.google.com/maps?q=${user.location.lat},${user.location.lng}`;
                document.getElementById('map-link-footer').href = mapsUrl;
                const iframe = document.getElementById('map-iframe');
                iframe.src = `https://www.google.com/maps?q=${user.location.lat},${user.location.lng}&z=15&output=embed`;
                iframe.style.display = 'block';
            }

            // 6/10 #137 §2: お店の紹介（未記入ならセクションごと非表示）。編集UIはプロフィール画面側（別途）。
            const introText = String(user.restaurantMessage || user.introText || '').trim();
            const introSection = document.getElementById('intro-section');
            if (introText) {
                introSection.style.display = 'block';
                document.getElementById('intro-text').textContent = introText;
            } else {
                introSection.style.display = 'none';
            }

            // 6/10 #137 §6: お店の様子（風景写真・未登録ならセクションごと非表示）
            const scenePhotos = getRestaurantPhotos(user);
            const sceneSection = document.getElementById('scene-section');
            if (scenePhotos.length > 0) {
                sceneSection.style.display = 'block';
                document.getElementById('scene-photos').innerHTML = scenePhotos
                    .map(u => `<div class="scene-photo"><img ${asCachedImgAttrs(u)} alt="" loading="lazy"></div>`)
                    .join('');
            } else {
                sceneSection.style.display = 'none';
            }

            // レビュー（N件）＝総レビュー件数／コメント欄＝コメント付き件数
            const commentCount = Array.isArray(reviewsWithComment) ? reviewsWithComment.length : 0;
            const subTitleEl = document.getElementById('subrating-title');
            if (subTitleEl) subTitleEl.textContent = i18next.t('profile.reviewsTitleWithCount', { count });
            const reviewsTitleEl = document.getElementById('reviews-section-title');
            if (reviewsTitleEl) reviewsTitleEl.textContent = i18next.t('profile.reviewCommentsTitleWithCount', { count: commentCount });

            // 6/10 #137 §4: 3軸メトリクス（総合評価／やり取り／受取対応）の良かった率%
            const sub = user.subRatings || {};
            const fmtSubRate = (s) => {
                if (s && typeof s === 'object' && 'good' in s && 'total' in s && s.total > 0) {
                    return `${Math.round((s.good / s.total) * 100)}%`;
                }
                return '—';
            };
            document.getElementById('sub-overall').textContent = fmtSubRate(sub.overall);
            document.getElementById('sub-communication').textContent = fmtSubRate(sub.communication);
            document.getElementById('sub-reception').textContent = fmtSubRate(sub.reception);

            // 6/10 #137 §8: レビューコメント（最新3件＋もっと見る・線画スマイリー）＝共通描画
            renderReviewComments(document.getElementById('reviews-list'), reviewsWithComment, reviewerMap, 3);
        }

        async function load({ silent = false } = {}) {
            if (!silent) loading.classList.add('show');
            try {
                const user = await getCachedUser(targetUid);
                if (!user) { history.back(); return; }

                let reviewsWithComment = [];
                let reviewerMap = {};
                try {
                    const q = query(
                        collectionGroup(db, 'reviews'),
                        where('toUid', '==', targetUid),
                        orderBy('createdAt', 'desc')
                    );
                    const reviewSnap = await getDocs(q);
                    const reviews = [];
                    reviewSnap.forEach(d => { reviews.push({ id: d.id, ...d.data() }); });
                    // 6/5 #128: モデレーションで非表示(hidden)にされたレビューは公開から除外
                    reviewsWithComment = reviews.filter(r => !r.hidden && r.comment && String(r.comment).trim() !== '');
                    const reviewerIds = [...new Set(reviewsWithComment.map(r => r.fromUid).filter(Boolean))];
                    await Promise.all(reviewerIds.map(async (uid) => {
                        try { reviewerMap[uid] = (await getCachedUser(uid)) || {}; }
                        catch (e) { reviewerMap[uid] = {}; }
                    }));
                } catch (err) {
                    console.warn('collectionGroup reviews failed:', err);
                }

                renderRestaurantPage(user, reviewsWithComment, reviewerMap);

                // 5/23 #69 Phase J: 次回訪問用に cache 保存（Timestamp は millis 化して保存）
                try {
                    const reviewsForCache = reviewsWithComment.map(r => ({
                        ...r,
                        createdAt: r.createdAt?.toMillis?.() || r.createdAt || null,
                    }));
                    saveRenderState(`restaurant:${targetUid}`, {
                        user: { ...user, createdAt: user.createdAt?.toMillis?.() ?? user.createdAt ?? null },
                        reviewsWithComment: reviewsForCache,
                        reviewerMap,
                    });
                } catch (e) { /* ignore */ }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        }

        // 5/23 #69 Phase J: 描画キャッシュ確認 → HIT すれば即時表示してスピナー解除
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`restaurant:${targetUid}`);
            if (cached?.user) {
                renderRestaurantPage(
                    cached.user,
                    cached.reviewsWithComment || [],
                    cached.reviewerMap || {}
                );
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) {
            console.warn('cached restaurant render failed:', e);
        }

        load({ silent: cachedRendered });
    </script>
</body>

</html>
