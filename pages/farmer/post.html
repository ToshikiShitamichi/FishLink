<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 14px;
        }

        .section-block {
            margin-bottom: 20px;
        }

        .caa-card {
            border-radius: 20px;
            border: 2px solid #fdba74;
            background: #fff8ef;
            padding: 16px;
            margin-bottom: 20px;
        }
        /* 販売価格セクション内に表示する場合のバリアント */
        .caa-card--inline {
            border-width: 1px;
            padding: 12px 14px;
            margin-bottom: 14px;
        }
        .caa-card--inline .caa-header__title { font-size: 15px; }
        .caa-card--inline .caa-value { font-size: 22px; margin: 6px 0 2px; }
        .caa-card--inline .caa-region { font-size: 13px; }
        .caa-card--inline .caa-size { font-size: 13px; }
        .caa-card--inline .caa-note { font-size: 12px; margin-top: 6px; }

        .caa-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .caa-header__title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text);
        }

        .caa-header__badge {
            font-size: 12px;
            color: #888;
        }

        .caa-region {
            font-size: 16px;
            font-weight: 600;
            color: #555;
        }

        .caa-value {
            font-size: 30px;
            font-weight: 800;
            color: #16a34a;
            line-height: 1.2;
            margin: 8px 0 4px;
        }

        .caa-size {
            font-size: 16px;
            font-weight: 600;
            color: #555;
        }

        .caa-note {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .price-row label {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            margin: 0;
        }

        input.price-input {
            width: 120px;
            padding: 10px 12px;
            border: 1.5px solid var(--color-border);
            border-radius: 12px;
            font-size: 16px;
            text-align: right;
            font-family: inherit;
            background: #f9fafb;
        }

        input.price-input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: #fff;
        }

        .price-unit {
            font-size: 14px;
            color: var(--color-text-sub);
            white-space: nowrap;
            min-width: 48px;
        }

        .price-result {
            background: #fff4e3;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-top: 8px;
        }

        .price-result__label {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .price-result__hint {
            font-size: 12px;
            color: #ea580c;
            margin-top: 2px;
        }

        .price-result__value {
            font-size: 38px;
            font-weight: 800;
            color: #ea580c;
            line-height: 1;
        }

        .price-result__unit {
            font-size: 16px;
            font-weight: 700;
            color: #666;
            margin-bottom: 2px;
        }

        .photo-upload {
            border: 2px dashed var(--color-border);
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            cursor: pointer;
            background: #f9fafb;
            transition: border-color .15s;
        }

        .photo-upload:hover {
            border-color: var(--color-primary);
        }

        .photo-upload__icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .photo-upload__text {
            font-size: 14px;
            color: var(--color-text-sub);
        }

        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
        }

        .delivery-note {
            font-size: 13px;
            color: #16a34a;
            font-weight: 600;
            margin-top: 4px;
        }

        .optional-tag {
            font-size: 11px;
            background: #f0f0f0;
            color: #888;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 400;
        }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer>
    </script>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page" style="padding-top:0; max-width:480px; margin:0 auto;">

        <!-- ヘッダー -->
        <div class="page-header"
            style="padding:16px 16px 8px; position:sticky; top:0; background:var(--color-bg); z-index:10;">
            <a href="/pages/farmer/dashboard.html" class="page-header__back"><span class="material-symbols-outlined">arrow_back</span></a>
            <div class="page-header__title" id="page-title" data-i18n="post.title"></div>
        </div>

        <div style="padding:0 16px 100px;">

            <!-- 編集モード時のみ表示する案内 -->
            <div id="edit-notice" style="display:none; background:#eef2ff; border:1px solid #c7d2fe; color:#3730a3; border-radius:14px; padding:12px 14px; margin-bottom:14px; font-size:13px; line-height:1.6;" data-i18n="post.editNotice"></div>

            <!-- 送金先未登録の警告バナー -->
            <div id="bank-notice" style="display:none; background:#fef2f2; border:1px solid #fecaca; border-radius:14px; padding:14px; margin-bottom:14px; color:#7f1d1d;">
                <div style="display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; margin-bottom:6px;">
                    <span class="material-symbols-outlined" style="font-size:18px;">warning</span>
                    <span data-i18n="post.bankRequiredTitle"></span>
                </div>
                <div style="font-size:13px; line-height:1.5; margin-bottom:10px;" data-i18n="post.bankRequiredDesc"></div>
                <a href="/pages/farmer/account/payment.html" style="display:inline-flex; align-items:center; gap:4px; padding:8px 14px; background:#dc2626; color:#fff; border-radius:10px; text-decoration:none; font-weight:700; font-size:13px;">
                    <span class="material-symbols-outlined" style="font-size:16px;">account_balance_wallet</span>
                    <span data-i18n="post.goToBankRegister"></span>
                </a>
            </div>

            <!-- エラーメッセージ -->
            <div class="error-msg" id="error-msg"></div>

            <!-- 基本情報 -->
            <div class="section-block">
                <div class="section-title" data-i18n="post.sectionBasic"></div>

                <div class="form-group">
                    <label for="fish-type" data-i18n="post.fishType"></label>
                    <select id="fish-type">
                        <option value="" data-i18n="post.fishTypeSelect"></option>
                        <option value="striped_snakehead" data-i18n="fish.striped_snakehead"></option>
                        <option value="walking_catfish" data-i18n="fish.walking_catfish"></option>
                        <option value="red_tilapia" data-i18n="fish.red_tilapia"></option>
                        <option value="nile_tilapia" data-i18n="fish.nile_tilapia"></option>
                        <option value="silver_barb" data-i18n="fish.silver_barb"></option>
                        <option value="spot_pangasius" data-i18n="fish.spot_pangasius"></option>
                        <option value="pangasius" data-i18n="fish.pangasius"></option>
                        <option value="giant_snakehead" data-i18n="fish.giant_snakehead"></option>
                        <option value="climbing_perch" data-i18n="fish.climbing_perch"></option>
                        <option value="frog" data-i18n="fish.frog"></option>
                        <option value="other" data-i18n="fish.other"></option>
                    </select>
                </div>

                <!-- その他選択時の手入力 -->
                <div class="form-group" id="fish-type-other-group" style="display:none;">
                    <label for="fish-type-other" data-i18n="post.fishTypeOther"></label>
                    <input type="text" id="fish-type-other" data-i18n="[placeholder]post.fishTypeOtherPlaceholder">
                </div>

                <div class="form-group">
                    <label for="fish-size" data-i18n="post.fishSize"></label>
                    <input type="text" id="fish-size" data-i18n="[placeholder]post.fishSizePlaceholder">
                </div>

                <div class="form-group">
                    <label for="fish-stock" data-i18n="post.fishStock"></label>
                    <input type="number" id="fish-stock" data-i18n="[placeholder]post.fishStockPlaceholder" min="0"
                        style="width:100%; padding:12px 14px; border:1.5px solid var(--color-border); border-radius:12px; font-size:16px; font-family:inherit; background:var(--color-surface);">
                </div>

                <div class="form-group">
                    <label data-i18n="post.photo"></label>
                    <div class="photo-upload" id="photo-area" onclick="document.getElementById('photo-input').click()">
                        <div class="photo-upload__icon"><span class="material-symbols-outlined" style="font-size:32px;">photo_camera</span></div>
                        <div class="photo-upload__text" data-i18n="post.photoTap"></div>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
                    <div class="photo-preview" id="photo-preview"></div>
                </div>
            </div>

            <!-- 販売価格（目安から調整） -->
            <div class="section-block">
                <div class="section-title" data-i18n="post.sectionPrice"></div>

                <div class="price-row">
                    <label for="price-unit" data-i18n="post.priceUnit"></label>
                    <input type="number" class="price-input" id="price-unit" placeholder="5,500" min="0"
                        oninput="updateTotalPrice()">
                    <span class="price-unit">KHR/kg</span>
                </div>

                <div class="price-row">
                    <label for="gut-price" data-i18n="post.gutPrice"></label>
                    <input type="number" class="price-input" id="gut-price" placeholder="500" min="0"
                        oninput="updateTotalPrice()">
                    <span class="price-unit">KHR/kg</span>
                </div>

                <div class="price-result">
                    <div>
                        <div class="price-result__label" data-i18n="post.priceResult"></div>
                    </div>
                    <div style="display:flex; align-items:flex-end; gap:4px;">
                        <div class="price-result__value" id="total-price">0</div>
                        <div class="price-result__unit">KHR/kg</div>
                    </div>
                </div>

                <!-- CAA参考価格（販売価格の下に表示・参考用） -->
                <div class="caa-card caa-card--inline" style="margin-top:14px;">
                    <div class="caa-header">
                        <div class="caa-header__title" data-i18n="post.sectionCaaTitle"></div>
                        <div class="caa-header__badge" data-i18n="post.caaLabel"></div>
                    </div>
                    <div class="caa-region" id="caa-region" data-i18n="post.caaDefault"></div>
                    <div class="caa-value" id="caa-value" style="display:none;"></div>
                    <div class="caa-size" id="caa-size" style="display:none;"></div>
                    <div class="caa-note" data-i18n="post.caaNote"></div>
                </div>
            </div>

            <!-- 配送料（レストラン負担） -->
            <div class="section-block">
                <div class="section-title" data-i18n="post.sectionDelivery"></div>

                <div class="price-row">
                    <label for="delivery-rate" data-i18n="post.deliveryRate"></label>
                    <input type="number" class="price-input" id="delivery-rate" value="500" min="0">
                    <span class="price-unit">KHR/km</span>
                </div>

                <div class="price-row">
                    <label for="free-delivery-distance" data-i18n="post.freeDeliveryDistance"></label>
                    <input type="number" class="price-input" id="free-delivery-distance" placeholder="5" min="0">
                    <span class="price-unit">km</span>
                </div>

                <p class="delivery-note" data-i18n="post.deliveryNote1"></p>
                <p class="delivery-note" data-i18n="post.deliveryNote2"></p>
            </div>

            <!-- 取引条件（任意） -->
            <div class="section-block">
                <div class="section-title">
                    <span data-i18n="post.sectionTerms"></span>
                    <span class="optional-tag" data-i18n="post.optional"></span>
                </div>

                <div class="price-row">
                    <label for="min-order" data-i18n="post.minOrder"></label>
                    <input type="number" class="price-input" id="min-order" placeholder="5" min="0">
                    <span class="price-unit">kg</span>
                </div>

                <div class="price-row">
                    <label for="max-distance" data-i18n="post.maxDistance"></label>
                    <input type="number" class="price-input" id="max-distance" placeholder="30" min="0">
                    <span class="price-unit">km</span>
                </div>
            </div>

            <!-- 商品の説明（任意・ガイド付き） -->
            <div class="section-block">
                <div class="section-title">
                    <span data-i18n="post.sectionDescription"></span>
                    <span class="optional-tag" data-i18n="post.optional"></span>
                </div>
                <div style="font-size:13px; color:var(--color-text-sub); margin-bottom:8px; line-height:1.6;" data-i18n="post.descriptionHintIntro"></div>
                <ul style="margin:0 0 10px 18px; padding:0; font-size:13px; color:var(--color-text-sub); line-height:1.7;">
                    <li data-i18n="post.descriptionHintQuality"></li>
                    <li data-i18n="post.descriptionHintSafety"></li>
                    <li data-i18n="post.descriptionHintFeed"></li>
                    <li data-i18n="post.descriptionHintPond"></li>
                    <li data-i18n="post.descriptionHintAppeal"></li>
                </ul>
                <textarea id="description" rows="7"
                    data-i18n="[placeholder]post.descriptionPlaceholder"
                    style="width:100%; padding:12px; border:1.5px solid var(--color-border); border-radius:12px; font-size:16px; font-family:inherit; background:#f9fafb; resize:vertical; line-height:1.5;"></textarea>
            </div>

        </div><!-- /padding -->
    </div><!-- /page -->

    <!-- 投稿するボタン（固定） -->
    <div
        style="position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; padding:12px 16px; background:var(--color-surface); border-top:1px solid var(--color-border);">
        <button class="btn btn-primary" id="submit-btn"
            style="font-size:18px; background:#f97316; border:none; border-radius:16px;"
            data-i18n="post.submit">
        </button>
    </div>

    <script type="module">
        import { initI18n } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import {
            collection, addDoc, serverTimestamp, doc, getDoc, updateDoc,
            query, where, getDocs, writeBatch
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import {
            ref, uploadBytes, getDownloadURL
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';

        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');

        watchAuthState({ requireAuth: true });
        await initI18n();

        // ── 編集モード判定（?id=...） ──
        const editId = new URLSearchParams(location.search).get('id');
        const isEditMode = !!editId;
        let originalListing = null;  // 編集時：編集前の値（既存注文へのスナップショット用に保持）

        if (isEditMode) {
            document.getElementById('page-title').textContent = i18next.t('post.editTitle');
            document.getElementById('submit-btn').textContent = i18next.t('post.editSubmit');
            document.getElementById('edit-notice').style.display = 'block';
            // 編集モードでは写真変更は不可（既存写真のまま）
            const photoArea = document.getElementById('photo-area');
            const photoLabel = photoArea?.parentElement;
            if (photoLabel) photoLabel.style.display = 'none';
        }

        async function loadExistingForEdit() {
            const snap = await getDoc(doc(db, 'fishListings', editId));
            if (!snap.exists()) {
                alert(i18next.t('post.errorSubmit'));
                location.href = '/pages/farmer/dashboard.html';
                return;
            }
            const d = snap.data();
            // 自分の出品でなければ拒否
            if (d.farmerId !== window.currentUser?.uid) {
                alert('Not allowed');
                location.href = '/pages/farmer/dashboard.html';
                return;
            }
            originalListing = d;

            // フォームに値を流し込み
            const fishTypeSel = document.getElementById('fish-type');
            const knownTypes = Array.from(fishTypeSel.options).map(o => o.value);
            if (knownTypes.includes(d.fishType)) {
                fishTypeSel.value = d.fishType;
            } else {
                fishTypeSel.value = 'other';
                document.getElementById('fish-type-other-group').style.display = 'block';
                document.getElementById('fish-type-other').value = d.fishType || '';
            }
            document.getElementById('fish-size').value = d.size || '';
            document.getElementById('fish-stock').value = d.stock ?? '';
            document.getElementById('price-unit').value = d.price ?? '';
            document.getElementById('gut-price').value = d.gutPrice ?? '';
            document.getElementById('delivery-rate').value = d.deliveryRate ?? '';
            document.getElementById('free-delivery-distance').value = d.freeDeliveryDistance ?? '';
            document.getElementById('min-order').value = d.minOrder ?? '';
            document.getElementById('max-distance').value = d.maxDistance ?? '';
            document.getElementById('description').value = d.description || '';
            window.updateTotalPrice();
            updateCaaDisplay(fishTypeSel.value);
        }

        // ── CAA参考価格データ（管理者ページ pages/admin/caa.html で設定した値を Firestore から読み込む） ──
        // 対応10魚種（CLAUDE.mdのFISH_TYPES準拠、"other" は CAA参考価格なし扱い）
        const CAA_FISH_TYPES = [
            'striped_snakehead', 'walking_catfish', 'red_tilapia', 'nile_tilapia',
            'silver_barb', 'spot_pangasius', 'pangasius', 'giant_snakehead',
            'climbing_perch', 'frog'
        ];
        let CAA_DATA = {};      // { fishType: { province: {range, size} | null } }
        let caaDataLoaded = false;

        async function loadCaaData() {
            await Promise.all(CAA_FISH_TYPES.map(async (ft) => {
                try {
                    const snap = await getDoc(doc(db, 'caaPrice', ft));
                    CAA_DATA[ft] = snap.exists() ? snap.data() : {};
                } catch (e) {
                    console.warn('CAA load failed for', ft, e);
                    CAA_DATA[ft] = {};
                }
            }));
            caaDataLoaded = true;
        }

        // Google Maps の州名 → CAA_DATA のキーに変換
        const PROVINCE_MAP = {
            'Kandal': 'Kandal',
            'Takeo': 'Takeo', 'Takéo': 'Takeo', 'Takéo Province': 'Takeo', 'Takeo Province': 'Takeo',
            'Prey Veng': 'Prey Veng', 'Prey Veng Province': 'Prey Veng',
            'Kampong Cham': 'Kg. Cham', 'Kampong Cham Province': 'Kg. Cham',
            'Kampong Thom': 'Kg. Thom', 'Kampong Thom Province': 'Kg. Thom',
            'Siem Reap': 'Siemreap', 'Siem Reap Province': 'Siemreap',
            'Battambang': 'Battambang', 'Battambang Province': 'Battambang',
            'Pursat': 'Pursat', 'Pursat Province': 'Pursat',
            'Kampong Chhnang': 'Kg. Chhnang', 'Kampong Chhnang Province': 'Kg. Chhnang',
            'Banteay Meanchey': 'BMC', 'Banteay Meanchey Province': 'BMC',
            'Phnom Penh': 'Kandal',
        };

        // 農家の州名（登録時にFirestoreに保存済み）
        let farmerProvince = null;

        // CAA価格表示の更新
        function updateCaaDisplay(fishTypeValue) {
            const regionEl = document.getElementById('caa-region');
            const valueEl = document.getElementById('caa-value');
            const sizeEl = document.getElementById('caa-size');

            if (!fishTypeValue || fishTypeValue === 'other') {
                regionEl.textContent = i18next.t('post.caaNoData');
                regionEl.style.color = '#888';
                valueEl.style.display = 'none';
                sizeEl.style.display = 'none';
                return;
            }

            // Firestoreから読み込み中の場合
            if (!caaDataLoaded) {
                regionEl.textContent = i18next.t('post.caaLoading');
                regionEl.style.color = '#888';
                valueEl.style.display = 'none';
                sizeEl.style.display = 'none';
                return;
            }

            const provinceName = farmerProvince
                ? (PROVINCE_MAP[farmerProvince] || null)
                : null;

            const fishData = CAA_DATA[fishTypeValue];
            const priceData = provinceName && fishData
                ? fishData[provinceName]
                : null;

            const fishLabel = document.querySelector(`#fish-type option[value="${fishTypeValue}"]`)
                ?.textContent?.trim() || fishTypeValue;

            if (priceData) {
                regionEl.textContent = `${provinceName}・${fishLabel}`;
                regionEl.style.color = '#555';
                // 新形式（rangeMin/Max, sizeMin/Max）優先、旧形式（range/size 文字列）フォールバック
                let rangeText = '';
                let sizeText = '';
                if ('rangeMin' in priceData || 'rangeMax' in priceData) {
                    const rMin = priceData.rangeMin;
                    const rMax = priceData.rangeMax;
                    if (rMin != null && rMax != null) rangeText = `${rMin.toLocaleString()}–${rMax.toLocaleString()} KHR/kg`;
                    else if (rMin != null) rangeText = `${rMin.toLocaleString()} KHR/kg`;
                    else if (rMax != null) rangeText = `${rMax.toLocaleString()} KHR/kg`;
                    const sMin = priceData.sizeMin;
                    const sMax = priceData.sizeMax;
                    if (sMin != null && sMax != null) sizeText = `${sMin}–${sMax}kg`;
                    else if (sMin != null) sizeText = `${sMin}kg`;
                    else if (sMax != null) sizeText = `${sMax}kg`;
                } else {
                    rangeText = (priceData.range || '') + ' KHR/kg';
                    sizeText = priceData.size || '';
                }
                valueEl.textContent = rangeText;
                sizeEl.textContent = sizeText;
                valueEl.style.display = rangeText ? 'block' : 'none';
                sizeEl.style.display = sizeText ? 'block' : 'none';
            } else {
                regionEl.textContent = provinceName
                    ? `${provinceName}・${fishLabel} ${i18next.t('post.caaNotAvailable')}`
                    : i18next.t('post.caaLoading');
                regionEl.style.color = '#888';
                valueEl.style.display = 'none';
                sizeEl.style.display = 'none';
            }
        }

        // 魚種プルダウン変更時
        document.getElementById('fish-type').addEventListener('change', function () {
            const val = this.value;
            document.getElementById('fish-type-other-group').style.display =
                val === 'other' ? 'block' : 'none';
            updateCaaDisplay(val);
        });

        // currentUserData がセットされるまで待つ
        function waitForUserData(callback) {
            if (window.currentUserData) {
                callback();
            } else {
                setTimeout(() => waitForUserData(callback), 300);
            }
        }

        // currentUserData から province を読み取ってCAA表示を初期化
        waitForUserData(async () => {
            farmerProvince = window.currentUserData.province || null;

            // 送金先情報チェック（accountName と qrLink/qrImageUrl のどちらかが必須）
            const userData = window.currentUserData || {};
            const hasAccountName = !!(userData.accountName && String(userData.accountName).trim());
            const hasQr = !!(userData.qrLink || userData.qrImageUrl);
            if (!hasAccountName || !hasQr) {
                document.getElementById('bank-notice').style.display = 'block';
                const sb = document.getElementById('submit-btn');
                sb.disabled = true;
                sb.style.opacity = '0.5';
                sb.style.cursor = 'not-allowed';
            }

            // 編集モードの場合は既存データをロード
            if (isEditMode) await loadExistingForEdit();

            const currentVal = document.getElementById('fish-type').value;
            if (currentVal) updateCaaDisplay(currentVal);
        });

        // CAA参考価格データを Firestore から非同期ロード（完了後に再描画）
        loadCaaData().then(() => {
            const currentVal = document.getElementById('fish-type').value;
            if (currentVal) updateCaaDisplay(currentVal);
        });

        // 販売価格の合計表示
        window.updateTotalPrice = function () {
            const unit = parseInt(document.getElementById('price-unit').value) || 0;
            const gut = parseInt(document.getElementById('gut-price').value) || 0;
            document.getElementById('total-price').textContent =
                (unit + gut).toLocaleString();
        };

        // ── 写真プレビュー ──────────────────────────────────────────
        let selectedFiles = [];

        document.getElementById('photo-input').addEventListener('change', function () {
            selectedFiles = Array.from(this.files);
            const preview = document.getElementById('photo-preview');
            preview.innerHTML = '';
            selectedFiles.forEach(file => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                preview.appendChild(img);
            });
        });

        // ── 編集前の値を既存注文にスナップショット保存 ──
        // すでにスナップショットがある注文はスキップ（=既存値を保護）
        // ※ Firestoreルール（farmerId == auth.uid で許可）を満たすため farmerId も条件に追加
        async function snapshotOrdersForListing(listingId, originalData) {
            if (!originalData) return;
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const q = query(
                collection(db, 'orders'),
                where('farmerId', '==', uid),
                where('listingId', '==', listingId)
            );
            const snap = await getDocs(q);
            if (snap.empty) return;

            const batch = writeBatch(db);
            let updates = 0;
            snap.forEach(d => {
                const o = d.data();
                // 既にスナップショット済みはスキップ（編集前の値を保護）
                const hasSnap = o.snapFishType || o.snapPrice != null;
                if (hasSnap) return;
                batch.update(d.ref, {
                    snapFishType: originalData.fishType || null,
                    snapSize: originalData.size || null,
                    snapPhotoUrl: originalData.photoUrl || null,
                    snapPrice: originalData.price ?? null,
                    snapGutPrice: originalData.gutPrice ?? null,
                });
                updates++;
            });
            if (updates > 0) await batch.commit();
        }

        // ── 投稿処理 ────────────────────────────────────────────────
        const submitBtn = document.getElementById('submit-btn');

        submitBtn.addEventListener('click', async () => {
            errorMsg.classList.remove('show');

            // 送金先情報が未登録なら中断（UIでもdisabledだが念のため）
            const ud = window.currentUserData || {};
            const hasAccountNameSafe = !!(ud.accountName && String(ud.accountName).trim());
            const hasQrSafe = !!(ud.qrLink || ud.qrImageUrl);
            if (!hasAccountNameSafe || !hasQrSafe) {
                errorMsg.textContent = i18next.t('post.bankRequiredDesc');
                errorMsg.classList.add('show');
                return;
            }

            const fishTypeSelect = document.getElementById('fish-type').value;
            // コードで保存（例: "clarias_catfish"）。「その他」の場合のみ手入力テキスト
            const fishType = fishTypeSelect === 'other'
                ? document.getElementById('fish-type-other').value.trim()
                : fishTypeSelect;
            const fishSize = document.getElementById('fish-size').value.trim();
            const fishStock = parseFloat(document.getElementById('fish-stock').value) || 0;
            const priceUnit = parseInt(document.getElementById('price-unit').value) || 0;
            const gutPrice = parseInt(document.getElementById('gut-price').value) || 0;
            const delivRate = parseInt(document.getElementById('delivery-rate').value) || 500;
            const freeDelivDist = parseFloat(document.getElementById('free-delivery-distance').value) || 0;
            const minOrder = parseFloat(document.getElementById('min-order').value) || 0;
            const maxDistance = parseFloat(document.getElementById('max-distance').value) || 0;
            const description = document.getElementById('description').value.trim();

            // バリデーション
            if (!fishType) {
                errorMsg.textContent = i18next.t('post.errorFishType');
                errorMsg.classList.add('show');
                return;
            }
            if (!fishSize) {
                errorMsg.textContent = i18next.t('post.errorFishSize');
                errorMsg.classList.add('show');
                return;
            }
            if (fishStock <= 0) {
                errorMsg.textContent = i18next.t('post.errorFishStock');
                errorMsg.classList.add('show');
                return;
            }
            if (priceUnit <= 0) {
                errorMsg.textContent = i18next.t('post.errorPrice');
                errorMsg.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            loading.classList.add('show');

            try {
                const uid = window.currentUser?.uid;
                if (!uid) throw new Error(i18next.t('post.errorLogin'));

                // 写真アップロード
                const photoUrls = [];
                if (isEditMode) {
                    // ── 編集モード：既存の出品を更新 ──
                    // 写真は変更しない（編集モードでは photo セクション非表示）
                    // 既存の進行中・完了済みの注文に対しては編集前の値をスナップショット保存
                    await snapshotOrdersForListing(editId, originalListing);

                    await updateDoc(doc(db, 'fishListings', editId), {
                        fishType,
                        size: fishSize,
                        stock: fishStock,
                        price: priceUnit,
                        gutPrice,
                        deliveryRate: delivRate,
                        freeDeliveryDistance: freeDelivDist || null,
                        minOrder: minOrder || null,
                        maxDistance: maxDistance || null,
                        description: description || null,
                        updatedAt: serverTimestamp(),
                    });
                } else {
                    // ── 新規モード：写真アップロード＋addDoc ──
                    for (const file of selectedFiles) {
                        const storageRef = ref(storage, `fishListings/${uid}/${Date.now()}_${file.name}`);
                        await uploadBytes(storageRef, file, { cacheControl: 'public, max-age=31536000' });
                        const url = await getDownloadURL(storageRef);
                        photoUrls.push(url);
                    }

                    await addDoc(collection(db, 'fishListings'), {
                        farmerId: uid,
                        fishType,
                        size: fishSize,
                        stock: fishStock,
                        price: priceUnit,
                        gutPrice,
                        deliveryRate: delivRate,
                        freeDeliveryDistance: freeDelivDist || null,
                        minOrder: minOrder || null,
                        maxDistance: maxDistance || null,
                        description: description || null,
                        photos: photoUrls,
                        photoUrl: photoUrls[0] || null,
                        isActive: true,
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                    });
                }

                // 成功 → ダッシュボードへ
                window.location.href = '/pages/farmer/dashboard.html';

            } catch (err) {
                console.error(err);
                errorMsg.textContent = i18next.t('post.errorSubmit');
                errorMsg.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('show');
            }
        });
    </script>
</body>

</html>
