<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .payment-page { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

        .pay-head {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin: 4px 0 14px;
        }

        .status-card {
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .status-card__label {
            font-size: 13px;
            color: var(--color-text-sub);
            margin-bottom: 6px;
        }

        .status-box {
            border-radius: 14px;
            padding: 12px 14px;
        }

        .status-box.pending {
            background: #eef7ff;
            border: 1px solid #bae6fd;
            color: #0369a1;
        }

        .status-box.confirmed {
            background: #fff7ed;
            border: 1px solid #fdba74;
            color: #9a3412;
        }

        .status-box.remitted {
            background: #ecfdf5;
            border: 1px solid #86efac;
            color: #166534;
        }

        .status-box.done {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            color: #374151;
        }

        .status-box__title {
            font-size: 20px;
            font-weight: 700;
        }

        .status-box__desc {
            font-size: 13px;
            color: var(--color-text-sub);
            margin-top: 6px;
            line-height: 1.5;
        }

        .amount-card {
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .amount-label {
            font-size: 13px;
            color: var(--color-text-sub);
            margin-bottom: 4px;
        }

        /* 6/5 #129: 受取予定額＝青 */
        .amount-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-cta);
            line-height: 1.1;
        }

        .amount-breakdown {
            border-top: 1px solid var(--color-border);
            margin-top: 14px;
            padding-top: 12px;
        }

        .amount-line {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 0;
            color: var(--color-text);
        }

        .amount-line__label { color: var(--color-text-sub); }
        /* 6/5 #129: 手数料・送料は中立グレー（±符号で方向）。キャンペーン割引は amber */
        .amount-line__value.minus { color: var(--color-text-sub); }
        .amount-line__value.plus { color: var(--color-text-sub); }
        .amount-line__value.campaign { color: #b36a00; }
        .amount-line__label .material-symbols-outlined { font-size: 15px; vertical-align: middle; margin-right: 2px; }

        .info-box {
            background: #ecfdf5;
            border: 1px solid #86efac;
            border-radius: 14px;
            padding: 12px 14px;
            margin: 0 16px 14px;
            font-size: 13px;
            color: #166534;
            line-height: 1.6;
        }

        .info-box__title {
            font-size: 13px;
            font-weight: 700;
            color: #166534;
            margin-bottom: 4px;
        }

        /* 6/5 #129 ④: 問題報告で送金保留中は中立グレー（緑にしない） */
        .info-box.neutral {
            background: #f4f6f8;
            border-color: #e3e8ed;
            color: var(--color-text-sub);
        }
        .info-box.neutral .info-box__title { color: var(--color-text-sub); }

        /* 6/5 #129: レビューは支払い確認後のみ。それ以前は注記のみ */
        .review-hint-note {
            font-size: 11px;
            color: var(--color-text-sub);
            text-align: center;
            margin: 12px 16px 0;
        }

        .order-meta {
            border-radius: 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            padding: 16px;
            margin: 0 16px 14px;
        }

        .order-meta__row {
            font-size: 14px;
            color: var(--color-text);
            padding: 3px 0;
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="payment-page">
        <div class="page-header" style="align-items:center; padding:16px;">
            <a href="/pages/farmer/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub);"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/orders.html" class="page-header__title" style="text-decoration:none; color:inherit; flex:1;" data-i18n="payment.farmerTitle"></a>
            <select id="lang-selector" style="width:auto; flex:0 0 auto; font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
        </div>

        <!-- 注文概要 -->
        <div class="order-meta" id="order-info"></div>

        <!-- 送金状況 -->
        <div class="status-card">
            <div class="status-card__label" data-i18n="payment.currentStatus"></div>
            <div id="status-box"></div>
        </div>

        <!-- 受取予定額（6/5 #129: ラベルは renderStatus 側で制御＝保留中表記の切替のため） -->
        <div class="amount-card">
            <div class="amount-label" id="amount-label"></div>
            <div class="amount-value" id="receive-amount">0 KHR</div>
            <div class="amount-breakdown" id="breakdown"></div>
        </div>

        <!-- 送金についての説明（6/5 #129: テキストは renderStatus 側で制御＝保留中で中立グレーに切替） -->
        <div class="info-box" id="info-box">
            <div class="info-box__title" id="info-box-title"></div>
            <div id="info-box-desc"></div>
        </div>

        <!-- レビュー遷移ボタン（6/5 #129: 支払い確認後のみ表示・色は青(CTA)） -->
        <a id="review-btn" href="#" style="display:none; margin:14px 16px 0; padding:12px; background:var(--color-cta); color:#fff; border-radius:12px; font-weight:700; text-decoration:none; font-size:14px; align-items:center; justify-content:center; gap:6px; line-height:1;">
            <span class="material-symbols-outlined" style="font-size:18px; line-height:1;">star</span>
            <span data-i18n="review.submit" style="line-height:1;"></span>
        </a>
        <div id="reviewed-label" style="display:none; margin:14px 16px 0; padding:12px; background:#f3f4f6; color:#6b7280; border-radius:12px; font-weight:700; font-size:14px; text-align:center; line-height:1;" data-i18n="review.reviewed"></div>
        <div id="review-hint-note" class="review-hint-note" style="display:none;" data-i18n="payment.reviewAfterConfirm"></div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';
        import {
            doc, getDoc, onSnapshot
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        // 6/5 #129: FL番号表示
        import { getOrderNumber } from '/js/order-utils.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const params = new URLSearchParams(location.search);
        const orderId = params.get('id');
        if (!orderId) location.href = '/pages/farmer/orders.html';

        let myUid = null;
        let orderData = null;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // 5/3: 言語切替時に再描画できるよう必要な情報を保持
        let pageState = { fishTypeKey: '', size: '', restName: '', place: '' };

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`farmer_payment:${orderId}`);
            if (cached) {
                if (cached.orderInfoHtml) document.getElementById('order-info').innerHTML = cached.orderInfoHtml;
                if (cached.breakdownHtml) document.getElementById('breakdown').innerHTML = cached.breakdownHtml;
                if (cached.statusHtml) document.getElementById('status-box').innerHTML = cached.statusHtml;
                if (cached.receiveAmount) document.getElementById('receive-amount').textContent = cached.receiveAmount;
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { console.warn('cached farmer_payment render failed:', e); }

        // 5/25 #91/#92 拡張: 描画後に最新状態をキャッシュへ保存するヘルパー
        function saveCurrentPaymentRender() {
            try {
                saveRenderState(`farmer_payment:${orderId}`, {
                    orderInfoHtml: document.getElementById('order-info')?.innerHTML || '',
                    breakdownHtml: document.getElementById('breakdown')?.innerHTML || '',
                    statusHtml: document.getElementById('status-box')?.innerHTML || '',
                    receiveAmount: document.getElementById('receive-amount')?.textContent || '',
                });
            } catch (e) { /* ignore */ }
        }

        waitForUserData(async () => {
            if (!cachedRendered) loading.classList.add('show');
            myUid = window.currentUser.uid;

            const orderSnap = await getDoc(doc(db, 'orders', orderId));
            if (!orderSnap.exists()) { location.href = '/pages/farmer/orders.html'; return; }
            orderData = orderSnap.data();

            if (orderData.farmerId !== myUid) { location.href = '/pages/farmer/orders.html'; return; }

            // listing情報（注文時点のスナップショット優先）
            let fishTypeKey = orderData.snapFishType;
            let size = orderData.snapSize || '';
            if ((!fishTypeKey || !size) && orderData.listingId) {
                const lSnap = await getDoc(doc(db, 'fishListings', orderData.listingId));
                const lt = lSnap.data() || {};
                if (!fishTypeKey) fishTypeKey = lt.fishType;
                if (!size) size = lt.size || '';
            }

            // レストラン情報
            const restSnap = await getDoc(doc(db, 'users', orderData.restaurantId));
            const rest = restSnap.data() || {};
            pageState = {
                fishTypeKey: fishTypeKey || '',
                size,
                restName: rest.displayName || '',
                place: (rest.province || '') + (rest.district ? ', ' + rest.district : ''),
            };

            renderOrderInfo();
            renderBreakdown();
            renderStatus(orderData.adminStatus ?? null, orderData.paymentStatus || 'pending');

            // ステータスをリアルタイム購読
            onSnapshot(doc(db, 'orders', orderId), (snap) => {
                if (!snap.exists()) return;
                const d = snap.data();
                orderData = d;
                renderStatus(d.adminStatus ?? null, d.paymentStatus || 'pending');
                saveCurrentPaymentRender();
            });

            // 5/7 #55: レビュー済みかリアルタイム監視
            onSnapshot(doc(db, 'orders', orderId, 'reviews', 'farmer'), (snap) => {
                applyReviewedState(snap.exists());
            });

            loading.classList.remove('show'); document.body.classList.add('app-ready');
        });

        // 6/5 #129: 農家のレビュー解禁は「支払い確認後」のみ（運営が入金確認済 以降）
        function isPaymentConfirmedOrBeyond() {
            if (!orderData) return false;
            return ['payment_confirmed', 'remitted', 'done'].includes(orderData.adminStatus);
        }

        // 5/7 #55: レビュー済みなら詳細画面のレビューボタンを「レビュー済み」表示に
        let alreadyReviewed = false;
        function applyReviewedState(reviewed) {
            alreadyReviewed = reviewed;
            refreshReviewArea();
        }

        // 6/5 #129: レビュー導線の表示制御を一元化（支払い確認後・未レビューのみボタン表示）
        function refreshReviewArea() {
            const reviewBtn = document.getElementById('review-btn');
            const reviewedLabel = document.getElementById('reviewed-label');
            const hint = document.getElementById('review-hint-note');
            reviewBtn.href = `/pages/farmer/review.html?id=${orderId}`;
            if (!isPaymentConfirmedOrBeyond()) {
                reviewBtn.style.display = 'none';
                reviewedLabel.style.display = 'none';
                hint.style.display = 'block';
                return;
            }
            hint.style.display = 'none';
            if (alreadyReviewed) {
                reviewBtn.style.display = 'none';
                reviewedLabel.style.display = 'block';
            } else {
                reviewedLabel.style.display = 'none';
                reviewBtn.style.display = 'flex';
            }
        }

        // 5/3: innerHTML で組み立てた部分を関数化し、言語切替時に再描画できるように
        function renderOrderInfo() {
            if (!orderData) return;
            const { fishTypeKey, size, restName, place } = pageState;
            const fishName = fishTypeKey
                ? (i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey)
                : '';
            document.getElementById('order-info').innerHTML = `
                <div style="font-size:13px; color:var(--color-text-sub); margin-bottom:4px;">${i18next.t('orders.deliveryDate')} ${orderData.deliveryDate || ''} ${orderData.deliveryTime || ''}</div>
                <div style="font-size:16px; font-weight:700;">${fishName}${size ? `（${size} head/kg）` : ''}</div>
                <div style="font-size:14px; margin-top:4px;">${i18next.t('orders.quantity')} ${orderData.quantity} kg</div>
                <div style="font-size:13px; color:var(--color-text-sub); margin-top:6px;">
                    <span class="material-symbols-outlined" style="font-size:14px;">restaurant</span>
                    ${restName}${place ? ` · ${place}` : ''}
                </div>
                <div style="font-size:11px; color:#9aa3b0; font-family:ui-monospace,Menlo,monospace; margin-top:6px;">${getOrderNumber({ id: orderId, ...orderData })}</div>
            `;
        }

        function renderBreakdown() {
            if (!orderData) return;
            const fishTotal = orderData.fishPrice || 0;
            const deliveryFee = orderData.deliveryFee || 0;
            // 6/5 #129 ③: 手数料を「手数料(5%) -1,875 ＋ キャンペーン割引 +938」に分解（承認画面と統一）
            const commissionRate = (orderData.farmerRateUsed != null)
                ? (orderData.farmerRateUsed * 100)
                : 5;
            const grossCommission = (orderData.farmerCommissionGross != null)
                ? orderData.farmerCommissionGross
                : Math.round(fishTotal * (commissionRate / 100));
            const farmerCampaignDiscount = (orderData.farmerCampaignDiscount != null)
                ? orderData.farmerCampaignDiscount
                : 0;
            const netCommission = (orderData.farmerCommission != null)
                ? orderData.farmerCommission
                : (grossCommission - farmerCampaignDiscount);
            const receiveAmount = (orderData.farmerReceiveAmount != null)
                ? orderData.farmerReceiveAmount
                : (fishTotal - netCommission + deliveryFee);

            document.getElementById('receive-amount').textContent = `${receiveAmount.toLocaleString()} KHR`;
            // 5/27 #101 ④: 紹介ボーナス行を追加（適用済みのみ表示）
            const referralBonus = Number(orderData.referralBonusAmount || 0);
            const bonusLine = referralBonus > 0
                ? `<div class="amount-line"><span class="amount-line__label">${i18next.t('order.referralBonus')}</span><span class="amount-line__value campaign">+${referralBonus.toLocaleString()} KHR</span></div>`
                : '';
            // キャンペーン割引行（farmer 側・amber）。適用済みのみ表示
            const campaignLine = farmerCampaignDiscount > 0
                ? `<div class="amount-line"><span class="amount-line__label"><span class="material-symbols-outlined">local_offer</span>${i18next.t('orders.farmerCampaignDiscount')}</span><span class="amount-line__value campaign">${i18next.t('orders.farmerCampaignDiscountValue', { amount: farmerCampaignDiscount.toLocaleString() })}</span></div>`
                : '';
            document.getElementById('breakdown').innerHTML = `
                <div class="amount-line"><span class="amount-line__label">${i18next.t('orders.fishTotal')}</span><span class="amount-line__value">${fishTotal.toLocaleString()} KHR</span></div>
                <div class="amount-line"><span class="amount-line__label">${i18next.t('orders.commission', { rate: commissionRate })}</span><span class="amount-line__value minus">-${grossCommission.toLocaleString()} KHR</span></div>
                ${campaignLine}
                ${bonusLine}
                <div class="amount-line"><span class="amount-line__label">${i18next.t('orders.deliveryFee')}</span><span class="amount-line__value plus">+${deliveryFee.toLocaleString()} KHR</span></div>
            `;
        }

        // 言語切替時：data-i18n 要素は applyTranslations 自動更新、innerHTML 部分は手動再描画
        onLanguageChange(() => {
            renderOrderInfo();
            renderBreakdown();
            if (orderData) renderStatus(orderData.adminStatus ?? null, orderData.paymentStatus || 'pending');
        });

        function renderStatus(adminStatus, paymentStatus) {
            const box = document.getElementById('status-box');
            let cls = 'pending', titleKey = 'payment.statusWaitingPayment', descKey = 'payment.statusWaitingPaymentDesc';

            // 6/5 #129 ④: 問題報告で送金保留中＝「確認中（問題が報告されています）」。送金前のみ有効
            const hold = orderData?.paymentProblemHold === true
                && !['remitted', 'done'].includes(adminStatus);

            if (hold) {
                cls = 'confirmed'; titleKey = 'payment.statusProblemHold'; descKey = 'payment.statusProblemHoldDesc';
            } else if (adminStatus === 'done') {
                cls = 'done'; titleKey = 'payment.statusDone'; descKey = 'payment.statusDoneDesc';
            } else if (adminStatus === 'remitted') {
                cls = 'remitted'; titleKey = 'payment.statusRemitted'; descKey = 'payment.statusRemittedDesc';
            } else if (adminStatus === 'payment_confirmed') {
                cls = 'confirmed'; titleKey = 'payment.statusConfirmed'; descKey = 'payment.statusConfirmedDesc';
            } else if (paymentStatus === 'paid') {
                cls = 'confirmed'; titleKey = 'payment.statusPaidByRestaurant'; descKey = 'payment.statusPaidByRestaurantDesc';
            }

            box.innerHTML = `
                <div class="status-box ${cls}">
                    <div class="status-box__title">${i18next.t(titleKey)}</div>
                    <div class="status-box__desc">${i18next.t(descKey)}</div>
                </div>
            `;

            // 6/5 #129: 受取予定額ラベル＝保留中は「（保留中）」付き
            document.getElementById('amount-label').textContent =
                hold ? i18next.t('payment.receiveAmountHold') : i18next.t('payment.receiveAmount');

            // 6/5 #129: 送金についての説明＝保留中は中立グレー＋返金可能性を明記（緑にしない）
            const infoBox = document.getElementById('info-box');
            infoBox.classList.toggle('neutral', hold);
            document.getElementById('info-box-title').textContent = i18next.t('payment.aboutRemittance');
            document.getElementById('info-box-desc').textContent =
                hold ? i18next.t('payment.remittanceHoldDesc') : i18next.t('payment.remittanceDesc');

            // 6/5 #129: レビュー導線は支払い確認後のみ
            refreshReviewArea();
        }
    </script>
</body>
</html>
