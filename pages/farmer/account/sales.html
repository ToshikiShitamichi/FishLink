<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
        .tab-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .tab-chip { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--color-border); background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .tab-chip.active { background: #0f172a; color: #fff; border-color: #0f172a; }
        .custom-range { display: none; gap: 8px; flex-wrap: wrap; background: #f8fafc; border-radius: 14px; padding: 10px; margin-bottom: 12px; align-items: flex-end; }
        .custom-range.show { display: flex; }
        .custom-range > div { flex: 1; min-width: 120px; }
        .custom-range label { font-size: 11px; color: var(--color-text-sub); }
        .custom-range input { width: 100%; border: 1px solid var(--color-border); border-radius: 10px; padding: 6px 8px; font-size: 16px; font-family: inherit; margin-top: 2px; }
        .custom-range button { border: none; background: var(--color-primary); color: #fff; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .summary-card { background: #f8fafc; border-radius: 14px; padding: 10px; }
        .summary-card__label { font-size: 11px; color: var(--color-text-sub); }
        .summary-card__value { font-size: 15px; font-weight: 700; margin-top: 2px; }
        .trade-item { background: #fff; border: 1px solid var(--color-border); border-radius: 14px; padding: 12px; margin-bottom: 8px; }
        .trade-item__head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
        .trade-item__date { font-size: 12px; color: var(--color-text-sub); }
        .trade-item__counter { font-size: 14px; font-weight: 700; margin-top: 2px; }
        .trade-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
        .trade-badge.completed { background: #0f172a; color: #fff; }
        .trade-badge.remitted { background: #ccfbf1; color: #115e59; }
        .trade-badge.payment-confirmed { background: #dcfce7; color: #166534; }
        .trade-badge.delivered { background: #fef3c7; color: #92400e; }
        .trade-badge.other { background: #f1f5f9; color: #334155; }
        .trade-item__row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
        .trade-item__row .k { color: var(--color-text-sub); }
        .view-more { display: block; margin: 6px auto 0; background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--color-text); }
        .empty-small { text-align: center; padding: 20px; color: var(--color-text-sub); font-size: 13px; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="account.salesTitle"></div>

        <div class="sub-page">

        <div class="tab-row" id="period-tabs">
            <button class="tab-chip active" data-period="today" data-i18n="account.tabToday"></button>
            <button class="tab-chip" data-period="week" data-i18n="account.tabWeek"></button>
            <button class="tab-chip" data-period="month" data-i18n="account.tabMonth"></button>
            <button class="tab-chip" data-period="custom" data-i18n="account.tabCustom"></button>
        </div>

        <div class="custom-range" id="custom-range">
            <div><label data-i18n="account.customFrom"></label><input type="date" id="range-from"></div>
            <div><label data-i18n="account.customTo"></label><input type="date" id="range-to"></div>
            <button type="button" id="range-apply" data-i18n="account.customApply"></button>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="account.amountSales"></div>
                <div class="summary-card__value" id="sum-amount">0 KHR</div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="account.count"></div>
                <div class="summary-card__value" id="sum-count">0</div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label" data-i18n="account.avgSales"></div>
                <div class="summary-card__value" id="sum-avg">0 KHR</div>
            </div>
        </div>

        <div id="trade-list"></div>
        <button class="view-more" id="view-more" style="display:none;" data-i18n="account.viewMore"></button>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db } from '/js/firebase-config.js';
        import { doc, getDoc, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        let allTrades = [];
        let currentPeriod = 'today';
        let customFromMs = 0, customToMs = 0;
        let displayCount = 5;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        const fmtKhr = n => `${Number(n || 0).toLocaleString()} KHR`;
        function fmtDate(ts) {
            const d = ts?.toDate?.() || new Date(ts || 0);
            const y = d.getFullYear();
            const mo = String(d.getMonth() + 1).padStart(2, '0');
            const da = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${y}/${mo}/${da} ${hh}:${mm}`;
        }
        function statusBadge(o) {
            if (o.adminStatus === 'done') return { cls: 'completed', label: i18next.t('account.statusCompleted') };
            if (o.adminStatus === 'remitted') return { cls: 'remitted', label: i18next.t('account.statusRemitted') };
            if (o.adminStatus === 'payment_confirmed') return { cls: 'payment-confirmed', label: i18next.t('account.statusPaymentConfirmed') };
            if (o.status === 'completed' || o.status === 'delivered') return { cls: 'delivered', label: i18next.t('account.statusDelivered') };
            return { cls: 'other', label: i18next.t('account.statusOther') };
        }

        function filterByPeriod(trades) {
            if (currentPeriod === 'today') {
                const s = new Date(); s.setHours(0, 0, 0, 0);
                const e = new Date(); e.setHours(23, 59, 59, 999);
                return trades.filter(t => {
                    const ms = t.createdAt?.toMillis?.() || 0;
                    return ms >= s.getTime() && ms <= e.getTime();
                });
            }
            if (currentPeriod === 'week') {
                const e = new Date(); e.setHours(23, 59, 59, 999);
                const s = new Date(); s.setHours(0, 0, 0, 0); s.setDate(s.getDate() - 6); // 直近7日
                return trades.filter(t => {
                    const ms = t.createdAt?.toMillis?.() || 0;
                    return ms >= s.getTime() && ms <= e.getTime();
                });
            }
            if (currentPeriod === 'month') {
                const e = new Date(); e.setHours(23, 59, 59, 999);
                const s = new Date(); s.setHours(0, 0, 0, 0); s.setDate(s.getDate() - 29); // 直近30日
                return trades.filter(t => {
                    const ms = t.createdAt?.toMillis?.() || 0;
                    return ms >= s.getTime() && ms <= e.getTime();
                });
            }
            if (currentPeriod === 'custom') {
                if (!customFromMs && !customToMs) return trades;
                return trades.filter(t => {
                    const ms = t.createdAt?.toMillis?.() || 0;
                    if (customFromMs && ms < customFromMs) return false;
                    if (customToMs && ms > customToMs) return false;
                    return true;
                });
            }
            return trades;
        }

        function render() {
            const filtered = filterByPeriod(allTrades);
            const total = filtered.reduce((s, t) => s + (t.farmerReceiveAmount || 0), 0);
            const count = filtered.length;
            const avg = count > 0 ? Math.round(total / count) : 0;
            document.getElementById('sum-amount').textContent = fmtKhr(total);
            document.getElementById('sum-count').textContent = `${count}${i18next.t('account.countUnit')}`;
            document.getElementById('sum-avg').textContent = fmtKhr(avg);

            const listEl = document.getElementById('trade-list');
            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="empty-small">${i18next.t('account.emptyHistory')}</div>`;
                document.getElementById('view-more').style.display = 'none';
                return;
            }
            const shown = filtered.slice(0, displayCount);
            listEl.innerHTML = shown.map(t => {
                const b = statusBadge(t);
                return `
                    <div class="trade-item">
                        <div class="trade-item__head">
                            <div>
                                <div class="trade-item__date">${fmtDate(t.createdAt)}</div>
                                <div class="trade-item__counter">${t.restName || ''}</div>
                            </div>
                            <span class="trade-badge ${b.cls}">${b.label}</span>
                        </div>
                        <div class="trade-item__row"><span class="k">${i18next.t('order.quantity')}</span><span>${t.quantity || 0}kg</span></div>
                        <div class="trade-item__row"><span class="k">${i18next.t('account.amountSales')}</span><span style="font-weight:600;">${fmtKhr(t.farmerReceiveAmount)}</span></div>
                    </div>
                `;
            }).join('');
            document.getElementById('view-more').style.display = filtered.length > displayCount ? 'block' : 'none';
        }

        async function load() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const q = query(collection(db, 'orders'), where('farmerId', '==', uid), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            allTrades = [];
            const restIds = new Set();
            snap.forEach(d => {
                const o = d.data();
                if (!['delivered', 'completed'].includes(o.status)) return;
                allTrades.push({ id: d.id, ...o });
                if (o.restaurantId) restIds.add(o.restaurantId);
            });
            const restMap = {};
            await Promise.all([...restIds].map(async rid => {
                const s = await getDoc(doc(db, 'users', rid));
                restMap[rid] = s.exists() ? s.data() : {};
            }));
            allTrades.forEach(t => { t.restName = restMap[t.restaurantId]?.displayName || ''; });
            render();
        }

        document.getElementById('view-more').addEventListener('click', () => { displayCount += 10; render(); });
        document.getElementById('period-tabs').addEventListener('click', (e) => {
            const btn = e.target.closest('button.tab-chip');
            if (!btn) return;
            currentPeriod = btn.dataset.period;
            document.querySelectorAll('#period-tabs .tab-chip').forEach(c => c.classList.toggle('active', c === btn));
            document.getElementById('custom-range').classList.toggle('show', currentPeriod === 'custom');
            displayCount = 5;
            render();
        });
        document.getElementById('range-apply').addEventListener('click', () => {
            const from = document.getElementById('range-from').value;
            const to = document.getElementById('range-to').value;
            customFromMs = from ? new Date(from + 'T00:00:00').getTime() : 0;
            customToMs = to ? new Date(to + 'T23:59:59').getTime() : 0;
            displayCount = 5;
            render();
        });

        waitForUserData(async () => {
            loading.classList.add('show');
            try { await load(); } catch (e) { console.error(e); }
            finally { loading.classList.remove('show'); }
        });
    </script>
</body>
</html>
