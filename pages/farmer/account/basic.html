<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <!-- 5/25 #83: 位置情報の編集 UI で Google Maps + Geocoder を利用 -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&loading=async" async defer></script>
    <style>
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
        .acc-row { background: #f8fafc; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
        .acc-row__label { font-size: 12px; color: var(--color-text-sub); margin-bottom: 4px; }
        .acc-row__value-line {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .acc-row__value { font-size: 15px; font-weight: 600; word-break: break-all; flex: 1; }
        .acc-row__edit-btn {
            display: inline-flex; align-items: center; gap: 3px;
            background: transparent; border: 1px solid var(--color-border);
            border-radius: 999px; padding: 4px 10px;
            font-size: 12px; font-weight: 600; color: var(--color-text-sub);
            cursor: pointer; font-family: inherit; flex-shrink: 0;
        }
        .acc-row__edit-btn:hover { background: #fff; color: var(--color-text); }
        .acc-row__edit-btn .material-symbols-outlined { font-size: 14px; }

        /* 編集モード共通 */
        .acc-edit { margin-top: 10px; }
        .acc-edit input[type="text"] {
            width: 100%; padding: 10px 12px;
            border: 1px solid var(--color-border); border-radius: 10px;
            font-size: 16px; font-family: inherit; background: #fff;
            box-sizing: border-box;
        }
        .acc-edit__actions {
            display: flex; gap: 8px; margin-top: 10px;
        }
        .acc-edit__btn {
            flex: 1; padding: 10px 14px;
            border-radius: 10px; font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }
        /* 6/22 #165 (B3): 保存ボタン 緑→青（CTA は青／緑は GAqP・成功専用） */
        .acc-edit__btn--primary {
            background: var(--color-cta); color: #fff; border: none;
        }
        .acc-edit__btn--primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .acc-edit__btn--secondary {
            background: #fff; color: var(--color-text-sub);
            border: 1px solid var(--color-border);
        }

        /* 位置情報編集の地図 */
        #loc-map {
            width: 100%; height: 280px; border-radius: 12px;
            background: #f1f5f9; margin-top: 8px;
        }
        .loc-status {
            font-size: 12px; color: var(--color-text-sub);
            margin-top: 6px; padding: 8px 10px;
            background: #fff; border-radius: 8px; border: 1px solid var(--color-border);
        }
        /* 6/22 #165 (B4): 住所は情報表示（成功ではない）＝緑をやめて中立に（緑は GAqP/成功専用） */
        .loc-status.set { color: var(--color-text); border-color: var(--color-border); background: #fff; }
        .loc-help { font-size: 12px; color: var(--color-text-sub); margin-top: 6px; }
        /* 6/4 追加: 編集時にも「現在地を使う」ボタンを表示（初期登録と同様） */
        .loc-current-btn {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 8px; padding: 8px 14px;
            background: var(--color-cta-lt); color: var(--color-cta-dk);
            border: 1px solid var(--color-cta); border-radius: 999px;
            font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
        }
        .loc-current-btn .material-symbols-outlined { font-size: 18px; }
        .loc-current-btn:active { opacity: 0.85; }

        /* 6/22 #165/#166: 公開ヘルプ（青）／読み取り専用注記（グレー）／インラインエラー（赤）／電話入力／OTP */
        .acc-edit__help { font-size: 12px; color: var(--color-cta); margin-top: 7px; line-height: 1.5; }
        .acc-edit__note { font-size: 11.5px; color: var(--color-text-sub); margin-top: 6px; line-height: 1.5; }
        .acc-field-error { font-size: 12px; color: var(--color-danger, #b91c1c); margin-top: 6px; }
        .acc-edit input[type="tel"] {
            width: 100%; padding: 10px 12px;
            border: 1px solid var(--color-border); border-radius: 10px;
            font-size: 16px; font-family: inherit; background: #fff; box-sizing: border-box;
        }
        .pc-otp-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 80;
            display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .pc-otp-card { background: #fff; border-radius: 16px; padding: 22px 20px; max-width: 340px; width: 100%; }
        .pc-otp-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .pc-otp-sub { font-size: 13px; color: var(--color-text-sub); margin-bottom: 14px; line-height: 1.5; }
        .pc-otp-digits { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .pc-otp-d {
            width: 40px; height: 48px; text-align: center; font-size: 20px; font-weight: 700;
            border: 1px solid var(--color-border); border-radius: 10px; font-family: inherit;
        }
        .pc-otp-cancel {
            width: 100%; margin-top: 8px; background: none; border: none;
            color: var(--color-text-sub); font-size: 13px; cursor: pointer; font-family: inherit; padding: 8px;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FISHLINK" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="account.basic"></div>

        <div class="sub-page">
            <!-- 6/22 #166: 電話番号（ログインに使う番号）。編集＝新番号に SMS-OTP → 確認できたら変更。 -->
            <div class="acc-row" id="row-phone">
                <div class="acc-row__label" data-i18n="account.phone"></div>
                <div class="acc-row__value-line" id="view-phone">
                    <div class="acc-row__value" id="v-phone">-</div>
                    <button class="acc-row__edit-btn" type="button" data-act="edit-phone">
                        <span class="material-symbols-outlined">edit</span><span data-i18n="account.edit"></span>
                    </button>
                </div>
                <div class="acc-edit" id="edit-phone" style="display:none;">
                    <input id="input-phone" type="tel" inputmode="numeric" autocomplete="off" data-i18n="[placeholder]account.phonePlaceholder">
                    <div class="acc-field-error" id="err-phone" style="display:none;"></div>
                    <div class="acc-edit__note" data-i18n="account.phoneEditHelp"></div>
                    <div class="acc-edit__actions">
                        <button class="acc-edit__btn acc-edit__btn--secondary" type="button" data-act="cancel-phone" data-i18n="account.cancel"></button>
                        <button class="acc-edit__btn acc-edit__btn--primary" type="button" data-act="send-otp" data-i18n="account.phoneSendCode"></button>
                    </div>
                </div>
            </div>

            <!-- 表示名（編集可能・5/25 #83） -->
            <div class="acc-row" id="row-displayName">
                <div class="acc-row__label" data-i18n="account.displayName"></div>
                <div class="acc-row__value-line" id="view-displayName">
                    <div class="acc-row__value" id="v-displayName">-</div>
                    <button class="acc-row__edit-btn" type="button" data-act="edit-name">
                        <span class="material-symbols-outlined">edit</span><span data-i18n="account.edit"></span>
                    </button>
                </div>
                <div class="acc-edit" id="edit-displayName" style="display:none;">
                    <input id="input-displayName" type="text" maxlength="40" autocomplete="off">
                    <div class="acc-edit__help" data-i18n="account.displayNamePublicHelp"></div>
                    <div class="acc-field-error" id="err-displayName" style="display:none;"></div>
                    <div class="acc-edit__actions">
                        <button class="acc-edit__btn acc-edit__btn--secondary" type="button" data-act="cancel-name" data-i18n="account.cancel"></button>
                        <button class="acc-edit__btn acc-edit__btn--primary" type="button" data-act="save-name" data-i18n="account.save"></button>
                    </div>
                </div>
            </div>

            <!-- 位置情報（編集可能・5/25 #83） -->
            <div class="acc-row" id="row-location">
                <div class="acc-row__label" data-i18n="account.location"></div>
                <div class="acc-row__value-line" id="view-location">
                    <div class="acc-row__value" id="v-location">-</div>
                    <button class="acc-row__edit-btn" type="button" data-act="edit-loc">
                        <span class="material-symbols-outlined">edit</span><span data-i18n="account.edit"></span>
                    </button>
                </div>
                <div class="acc-edit" id="edit-location" style="display:none;">
                    <div class="loc-help" data-i18n="account.locationEditHelp"></div>
                    <div id="loc-map"></div>
                    <!-- 6/4 追加: 初期登録と同様に現在地へピン挿しするボタン -->
                    <button class="loc-current-btn" type="button" data-act="use-current-loc">
                        <span class="material-symbols-outlined">my_location</span>
                        <span data-i18n="register.useCurrentLocation"></span>
                    </button>
                    <div class="loc-status" id="loc-status" data-i18n="account.locationCurrent"></div>
                    <div class="acc-edit__note" data-i18n="account.locationReadOnlyNote"></div>
                    <div class="acc-field-error" id="err-location" style="display:none;"></div>
                    <div class="acc-edit__actions">
                        <button class="acc-edit__btn acc-edit__btn--secondary" type="button" data-act="cancel-loc" data-i18n="account.cancel"></button>
                        <button class="acc-edit__btn acc-edit__btn--primary" type="button" data-act="save-loc" id="save-loc-btn" data-i18n="account.save"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 6/22 #166: Firebase Phone Auth の invisible reCAPTCHA コンテナ（電話番号変更の番号確認） -->
    <div id="recaptcha-container"></div>

    <!-- 6/22 #166: 電話番号変更の OTP モーダル -->
    <div id="pc-otp-overlay" class="pc-otp-overlay" style="display:none;">
        <div class="pc-otp-card">
            <div class="pc-otp-title" data-i18n="register.otpTitle"></div>
            <div class="pc-otp-sub" id="pc-otp-sub"></div>
            <div class="pc-otp-digits">
                <input class="pc-otp-d" maxlength="1" inputmode="numeric" autocomplete="off">
                <input class="pc-otp-d" maxlength="1" inputmode="numeric" autocomplete="off">
                <input class="pc-otp-d" maxlength="1" inputmode="numeric" autocomplete="off">
                <input class="pc-otp-d" maxlength="1" inputmode="numeric" autocomplete="off">
                <input class="pc-otp-d" maxlength="1" inputmode="numeric" autocomplete="off">
                <input class="pc-otp-d" maxlength="1" inputmode="numeric" autocomplete="off">
            </div>
            <div class="acc-field-error" id="pc-otp-err" data-i18n="recover.codeError" style="display:none;"></div>
            <button class="acc-edit__btn acc-edit__btn--primary" id="pc-otp-verify" style="width:100%; margin-top:10px;" data-i18n="recover.verify"></button>
            <button type="button" class="pc-otp-cancel" id="pc-otp-cancel" data-i18n="register.otpCancel"></button>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, firebaseApp, auth, normalizePhone, isValidCambodiaPhone, formatPhoneDisplay } from '/js/firebase-config.js';
        import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { formatLocation, normalizeProvince } from '/js/province-utils.js';
        import { invalidate as invalidateDataCache } from '/js/data-cache.js';
        import { clearRenderState, saveRenderState, loadRenderState } from '/js/render-cache.js';
        import { showToast } from '/js/toast.js';
        // 6/22 #166: 電話番号の自己変更（OTP）。本人セッションを保つため OTP は secondary app で行う。
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-functions.js';

        // 6/22 #166: 本接続フラグ（#151 Phone Auth が ON 前提）。+855 到達 NG 時は send 失敗→運営手動案内へ。
        const PHONE_CHANGE_OTP_ENABLED = true;

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 表示モードに戻す
        function showView(name) {
            document.getElementById(`view-${name}`).style.display = '';
            document.getElementById(`edit-${name}`).style.display = 'none';
        }
        // 6/22 #165 (B5): 1項目ずつ編集（他の編集中行は表示に戻す＝保存ボタンは常に画面に1つ）
        const EDIT_ROWS = ['phone', 'displayName', 'location'];
        function closeAllEditors() {
            EDIT_ROWS.forEach((n) => {
                const v = document.getElementById(`view-${n}`);
                const e = document.getElementById(`edit-${n}`);
                if (v) v.style.display = '';
                if (e) e.style.display = 'none';
            });
        }
        function showEdit(name) {
            closeAllEditors();
            document.getElementById(`view-${name}`).style.display = 'none';
            document.getElementById(`edit-${name}`).style.display = '';
        }

        // 6/22 #165/#166: 次回訪問用の表示値キャッシュ（保存後にも更新）
        function saveBasicRender() {
            try {
                saveRenderState('farmer_account_basic', {
                    phone: document.getElementById('v-phone')?.textContent || '',
                    displayName: document.getElementById('v-displayName')?.textContent || '',
                    location: document.getElementById('v-location')?.textContent || '',
                });
            } catch (e) { /* ignore */ }
        }

        // ─── 表示名の編集 ───────────────────────────────
        function bindNameEdit() {
            const editBtn = document.querySelector('[data-act="edit-name"]');
            const cancelBtn = document.querySelector('[data-act="cancel-name"]');
            const saveBtn = document.querySelector('[data-act="save-name"]');
            const input = document.getElementById('input-displayName');
            const errEl = document.getElementById('err-displayName');

            editBtn.addEventListener('click', () => {
                input.value = window.currentUserData?.displayName || '';
                if (errEl) errEl.style.display = 'none';
                showEdit('displayName');
                input.focus();
            });
            cancelBtn.addEventListener('click', () => showView('displayName'));
            saveBtn.addEventListener('click', async () => {
                if (errEl) errEl.style.display = 'none';
                const newName = input.value.trim();
                if (!newName) {
                    if (errEl) { errEl.textContent = i18next.t('account.nameRequired'); errEl.style.display = 'block'; }
                    return;
                }
                if (newName === window.currentUserData?.displayName) {
                    showView('displayName');
                    return;
                }
                saveBtn.disabled = true;
                try {
                    const uid = window.currentUser.uid;
                    await updateDoc(doc(db, 'users', uid), { displayName: newName });
                    // 表示名は周辺画面の表示にも影響するため、cache を破棄
                    window.currentUserData.displayName = newName;
                    invalidateDataCache('users', uid);
                    // 自分の出品・自分のページ等の render-cache を破棄
                    clearRenderState();
                    document.getElementById('v-displayName').textContent = newName;
                    showView('displayName');
                    saveBasicRender();
                    showToast(i18next.t('account.saved'));   // 6/22 #165 (E): 保存トースト
                } catch (err) {
                    console.error('save displayName failed:', err);
                    if (errEl) { errEl.textContent = i18next.t('account.saveFailed'); errEl.style.display = 'block'; }
                } finally {
                    saveBtn.disabled = false;
                }
            });
        }

        // ─── 位置情報の編集 ─────────────────────────────
        let editMap = null;
        let editMarker = null;
        let pendingLocation = null;     // { lat, lng }
        let pendingProvince = null;     // raw english province name
        let pendingDistrict = null;     // english district
        let pendingDistrictKm = null;   // khmer district

        function waitForGoogleMaps(cb) {
            if (typeof google !== 'undefined' && google.maps) cb();
            else setTimeout(() => waitForGoogleMaps(cb), 200);
        }

        // 渡された位置を Geocoder で en/km 並列引いて pendingDistrict 等にセット
        async function reverseGeocode(latLng) {
            const geocodeWithLang = (lang) => new Promise((resolve) => {
                const geocoder = new google.maps.Geocoder();
                geocoder.geocode({ location: latLng, language: lang }, (results, status) => {
                    if (status === 'OK' && results[0]) {
                        const prov = results[0].address_components.find(c => c.types.includes('administrative_area_level_1'));
                        const dist = results[0].address_components.find(c => c.types.includes('administrative_area_level_2'));
                        resolve({ province: prov?.long_name || null, district: dist?.long_name || null, formatted: results[0].formatted_address || '' });
                    } else {
                        resolve({ province: null, district: null, formatted: '' });
                    }
                });
            });
            const [en, km] = await Promise.all([geocodeWithLang('en'), geocodeWithLang('km')]);
            pendingProvince = en.province;
            pendingDistrict = en.district;
            pendingDistrictKm = km.district;
            const useKm = (i18next.language === 'km');
            const formatted = useKm ? (km.formatted || en.formatted) : (en.formatted || km.formatted);
            const statusEl = document.getElementById('loc-status');
            statusEl.classList.add('set');
            statusEl.textContent = formatted || i18next.t('account.locationSet');
        }

        function placePin(latLng) {
            if (editMarker) editMarker.setMap(null);
            editMarker = new google.maps.Marker({ position: latLng, map: editMap, animation: google.maps.Animation.DROP });
            pendingLocation = { lat: latLng.lat(), lng: latLng.lng() };
            reverseGeocode(latLng);
        }

        function initEditMap() {
            if (editMap) return;
            const current = window.currentUserData?.location;
            const center = current?.lat
                ? { lat: current.lat, lng: current.lng }
                : { lat: 11.5564, lng: 104.9282 };
            editMap = new google.maps.Map(document.getElementById('loc-map'), {
                center, zoom: current?.lat ? 14 : 7,
                // 6/17 #152: 航空写真（衛星）への切替を付ける（地図/衛星トグル）
                mapTypeControl: true, streetViewControl: false, fullscreenControl: false,
            });
            if (current?.lat) {
                editMarker = new google.maps.Marker({ position: center, map: editMap });
                pendingLocation = { lat: current.lat, lng: current.lng };
                pendingProvince = window.currentUserData.province || null;
                pendingDistrict = window.currentUserData.district || null;
                pendingDistrictKm = window.currentUserData.districtKm || null;
            }
            editMap.addListener('click', (e) => placePin(e.latLng));
        }

        function bindLocationEdit() {
            const editBtn = document.querySelector('[data-act="edit-loc"]');
            const cancelBtn = document.querySelector('[data-act="cancel-loc"]');
            const saveBtn = document.getElementById('save-loc-btn');
            const errEl = document.getElementById('err-location');

            editBtn.addEventListener('click', () => {
                if (errEl) errEl.style.display = 'none';
                showEdit('location');
                waitForGoogleMaps(() => {
                    initEditMap();
                    // 地図が表示されてからリサイズしないと描画が壊れることがある
                    setTimeout(() => google.maps.event.trigger(editMap, 'resize'), 100);
                });
            });
            cancelBtn.addEventListener('click', () => showView('location'));

            // 6/4 追加: 「現在地を使う」ボタン（初期登録と同じ挙動）。地図初期化後に現在地取得→ピン設置。
            const useCurrentBtn = document.querySelector('[data-act="use-current-loc"]');
            useCurrentBtn?.addEventListener('click', () => {
                waitForGoogleMaps(() => {
                    initEditMap();
                    const statusEl = document.getElementById('loc-status');
                    if (!navigator.geolocation) {
                        statusEl.textContent = i18next.t('register.locationGeoUnavailable');
                        return;
                    }
                    statusEl.classList.remove('set');
                    statusEl.textContent = i18next.t('register.locationFinding');
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const latLng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                            editMap.setCenter(latLng);
                            editMap.setZoom(15);
                            placePin(latLng);
                        },
                        (err) => {
                            statusEl.textContent = err.code === 1
                                ? i18next.t('register.locationDenied')
                                : i18next.t('register.locationFailed');
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                    );
                });
            });

            saveBtn.addEventListener('click', async () => {
                if (errEl) errEl.style.display = 'none';
                if (!pendingLocation) {
                    if (errEl) { errEl.textContent = i18next.t('account.locationRequired'); errEl.style.display = 'block'; }
                    return;
                }
                saveBtn.disabled = true;
                try {
                    const uid = window.currentUser.uid;
                    const provinceKey = normalizeProvince(pendingProvince) || pendingProvince || null;
                    await updateDoc(doc(db, 'users', uid), {
                        location: pendingLocation,
                        province: provinceKey,
                        district: pendingDistrict || null,
                        districtKm: pendingDistrictKm || null,
                    });
                    Object.assign(window.currentUserData, {
                        location: pendingLocation,
                        province: provinceKey,
                        district: pendingDistrict,
                        districtKm: pendingDistrictKm,
                    });
                    invalidateDataCache('users', uid);
                    // 位置情報変更は距離計算結果に影響するため、関連 render-cache を全破棄
                    clearRenderState();
                    document.getElementById('v-location').textContent = formatLocation(window.currentUserData) || '-';
                    showView('location');
                    saveBasicRender();
                    showToast(i18next.t('account.saved'));   // 6/22 #165 (E): 保存トースト
                } catch (err) {
                    console.error('save location failed:', err);
                    if (errEl) { errEl.textContent = i18next.t('account.saveFailed'); errEl.style.display = 'block'; }
                } finally {
                    saveBtn.disabled = false;
                }
            });
        }

        // ─── 6/22 #166: 電話番号の編集（SMS-OTP・secondary app で本人セッションを保持） ───
        let secondaryApp = null, secondaryAuth = null;
        let pcRecaptcha = null, pcConfirmation = null, pcNewNorm = '';
        function getSecondaryAuth() {
            if (!secondaryAuth) {
                // 本人セッション（primary auth）を壊さないため、OTP は別アプリインスタンスで実行する。
                secondaryApp = initializeApp(firebaseApp.options, 'phone-change');
                secondaryAuth = getAuth(secondaryApp);
            }
            return secondaryAuth;
        }
        // 6/22 修正: 送信ごとに reCAPTCHA コンテナを作り直す。
        //   ⚠️ verifier を使い回すと再描画で "reCAPTCHA has already been rendered in this element" になる。
        //   古い verifier を clear し、コンテナ DOM を新しい空 div に置換してから verifier を再作成する。
        function freshRecaptcha() {
            if (pcRecaptcha) { try { pcRecaptcha.clear(); } catch (e) { /* ignore */ } pcRecaptcha = null; }
            const old = document.getElementById('recaptcha-container');
            if (old) {
                const fresh = document.createElement('div');
                fresh.id = 'recaptcha-container';
                old.replaceWith(fresh);
            }
            pcRecaptcha = new RecaptchaVerifier(getSecondaryAuth(), 'recaptcha-container', { size: 'invisible' });
            return pcRecaptcha;
        }

        function bindPhoneEdit() {
            const editBtn = document.querySelector('[data-act="edit-phone"]');
            const cancelBtn = document.querySelector('[data-act="cancel-phone"]');
            const sendBtn = document.querySelector('[data-act="send-otp"]');
            const input = document.getElementById('input-phone');
            const errEl = document.getElementById('err-phone');

            editBtn.addEventListener('click', () => {
                input.value = formatPhoneDisplay(window.currentUserData?.phone) || '';
                if (errEl) errEl.style.display = 'none';
                showEdit('phone');
                input.focus();
            });
            cancelBtn.addEventListener('click', () => showView('phone'));

            sendBtn.addEventListener('click', async () => {
                if (errEl) errEl.style.display = 'none';
                const norm = normalizePhone(input.value);
                if (!isValidCambodiaPhone(norm)) {
                    if (errEl) { errEl.textContent = i18next.t('error.phoneInvalid'); errEl.style.display = 'block'; }
                    return;
                }
                if (norm === normalizePhone(window.currentUserData?.phone || '')) {
                    if (errEl) { errEl.textContent = i18next.t('account.phoneSame'); errEl.style.display = 'block'; }
                    return;
                }
                if (!PHONE_CHANGE_OTP_ENABLED) {
                    if (errEl) { errEl.textContent = i18next.t('account.phoneChangeUnavailable'); errEl.style.display = 'block'; }
                    return;
                }
                sendBtn.disabled = true;
                loading.classList.add('show');
                try {
                    pcNewNorm = norm;
                    const verifier = freshRecaptcha();
                    pcConfirmation = await signInWithPhoneNumber(getSecondaryAuth(), '+' + norm, verifier);
                    loading.classList.remove('show');
                    document.getElementById('pc-otp-sub').textContent = i18next.t('register.otpSub', { phone: formatPhoneDisplay(norm) });
                    document.querySelectorAll('.pc-otp-d').forEach((d) => { d.value = ''; });
                    document.getElementById('pc-otp-err').style.display = 'none';
                    document.getElementById('pc-otp-overlay').style.display = 'flex';
                    document.querySelector('.pc-otp-d')?.focus();
                } catch (err) {
                    console.error('phone change OTP send failed:', err);
                    loading.classList.remove('show');
                    // +855 未到達・reCAPTCHA 失敗等 → 運営手動変更の案内へフォールバック
                    if (errEl) { errEl.textContent = i18next.t('account.phoneSendFailed'); errEl.style.display = 'block'; }
                    try { if (pcRecaptcha) { await pcRecaptcha.clear(); pcRecaptcha = null; } } catch (e) { /* ignore */ }
                } finally {
                    sendBtn.disabled = false;
                }
            });
        }

        function setupPcOtp() {
            const digits = Array.from(document.querySelectorAll('.pc-otp-d'));
            digits.forEach((d, i) => {
                d.addEventListener('input', () => {
                    d.value = d.value.replace(/\D/g, '').slice(0, 1);
                    if (d.value && i < digits.length - 1) digits[i + 1].focus();
                });
                d.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !d.value && i > 0) digits[i - 1].focus();
                });
            });
            document.getElementById('pc-otp-cancel').addEventListener('click', async () => {
                document.getElementById('pc-otp-overlay').style.display = 'none';
                try { await getSecondaryAuth().signOut(); } catch (e) { /* ignore */ }
            });
            document.getElementById('pc-otp-verify').addEventListener('click', async () => {
                const code = digits.map((d) => d.value).join('');
                const errEl = document.getElementById('pc-otp-err');
                if (code.length !== 6 || !pcConfirmation) { errEl.style.display = 'block'; return; }
                const vbtn = document.getElementById('pc-otp-verify');
                vbtn.disabled = true;
                loading.classList.add('show');
                try {
                    // secondary app で新番号を検証（phone provider セッション）→ IDトークンを取得。
                    await pcConfirmation.confirm(code);
                    const phoneIdToken = await getSecondaryAuth().currentUser.getIdToken();
                    // 本人セッション（primary）で callable を呼ぶ＝request.auth.uid＝本人。
                    const functions = getFunctions(undefined, 'asia-southeast1');
                    const changeFn = httpsCallable(functions, 'changePhoneWithOtp');
                    await changeFn({ phoneIdToken });
                    // secondary の phone-provider セッションを解除（本人セッションは無傷）。
                    try { await getSecondaryAuth().signOut(); } catch (e) { /* ignore */ }
                    // ローカル状態を更新（メール変更を反映するためトークンも更新）。
                    const uid = window.currentUser?.uid;
                    if (window.currentUserData) window.currentUserData.phone = pcNewNorm;
                    if (uid) invalidateDataCache('users', uid);
                    try { await auth.currentUser?.getIdToken(true); } catch (e) { /* ignore */ }
                    document.getElementById('v-phone').textContent = formatPhoneDisplay(pcNewNorm);
                    document.getElementById('pc-otp-overlay').style.display = 'none';
                    showView('phone');
                    loading.classList.remove('show');
                    saveBasicRender();
                    showToast(i18next.t('account.saved'));
                } catch (err) {
                    console.error('phone change failed:', err);
                    loading.classList.remove('show');
                    const code2 = String(err?.code || '');
                    if (code2 === 'functions/already-exists') {
                        errEl.textContent = i18next.t('error.phoneTaken');
                    } else if (code2.startsWith('functions/')) {
                        errEl.textContent = i18next.t('account.phoneChangeFailed');
                    } else {
                        errEl.textContent = i18next.t('recover.codeError');
                    }
                    errEl.style.display = 'block';
                    vbtn.disabled = false;
                }
            });
        }

        // 6/22 #165: 表示値を即時復元（電話番号は formatPhoneDisplay 済みの表示文字列をキャッシュ）
        (function applyCache() {
            try {
                const cached = loadRenderState('farmer_account_basic');
                if (!cached) return;
                if (cached.phone) document.getElementById('v-phone').textContent = cached.phone;
                if (cached.displayName) document.getElementById('v-displayName').textContent = cached.displayName;
                if (cached.location) document.getElementById('v-location').textContent = cached.location;
            } catch (e) { /* ignore */ }
        })();

        waitForUserData(() => {
            const d = window.currentUserData || {};
            // 6/22 #166: 電話番号表示（旧ログインIDアカウントは loginId フォールバック）
            document.getElementById('v-phone').textContent = formatPhoneDisplay(d.phone) || d.loginId || '-';
            document.getElementById('v-displayName').textContent = d.displayName || '-';
            const loc = formatLocation(d) || i18next.t('account.locationUnset');
            document.getElementById('v-location').textContent = loc;
            bindNameEdit();
            bindLocationEdit();
            bindPhoneEdit();
            setupPcOtp();
            loading.classList.remove('show'); document.body.classList.add('app-ready');
            saveBasicRender();   // 6/22: 次回訪問用に表示値をキャッシュ
        });
    </script>
</body>
</html>
