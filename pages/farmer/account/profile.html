<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
        .acc-row { background: #f8fafc; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
        .acc-row__label { font-size: 12px; color: var(--color-text-sub); margin-bottom: 4px; }
        .acc-row__value { font-size: 15px; font-weight: 600; word-break: break-word; white-space: pre-wrap; line-height: 1.5; }
        .acc-row textarea { width: 100%; border: 1px solid var(--color-border); border-radius: 10px; padding: 8px 10px; font-size: 16px; font-family: inherit; margin-top: 4px; min-height: 80px; resize: vertical; }
        .pond-box img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; display: block; }
        .pond-placeholder { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; color: #94a3b8; background: #fff; border-radius: 12px; border: 1px dashed var(--color-border); }
        /* 5/12 #72: 複数写真ギャラリー（編集・閲覧モード共通） */
        .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
        .photos-grid__cell { position: relative; aspect-ratio: 1 / 1; background: #fff; border: 1px dashed var(--color-border); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
        .photos-grid__cell img { width: 100%; height: 100%; object-fit: cover; }
        .photos-grid__remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(15,23,42,.7); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: inherit; }
        .photos-grid__remove .material-symbols-outlined { font-size: 16px; }
        .photos-grid__add { cursor: pointer; }
        .photos-grid__add:hover { background: #f1f5f9; }
        .avatar-box { display: flex; justify-content: center; }
        .avatar-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: #fff; border: 1px dashed var(--color-border);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .img-actions { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .img-actions button { background: #fff; border: 1px solid var(--color-border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--color-text); font-family: inherit; }
        .img-actions button.danger { color: #b91c1c; border-color: #fecaca; }
        .save-row { display: flex; gap: 8px; margin-top: 14px; }
        .save-row button { flex: 1; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .save-row .save { background: var(--color-primary); color: #fff; }
        .edit-toggle { display: flex; justify-content: flex-end; margin-bottom: 8px; }
        .edit-btn { background: #eef2ff; color: #3730a3; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="page">
        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="profile.farmerTitle"></div>

        <div class="sub-page">

        <div class="edit-toggle">
            <button class="edit-btn" id="btn-edit">
                <span class="material-symbols-outlined" style="font-size:14px;">edit</span>
                <span data-i18n="account.edit"></span>
            </button>
        </div>

        <div id="view-mode">
            <div class="acc-row">
                <div class="acc-row__label" data-i18n="profile.avatar"></div>
                <div class="avatar-box">
                    <div class="avatar-circle" id="v-avatar">
                        <span class="material-symbols-outlined" style="font-size:56px;">person</span>
                    </div>
                </div>
            </div>
            <div class="acc-row">
                <div class="acc-row__label" data-i18n="profile.farmerMessage"></div>
                <div class="acc-row__value" id="v-message">-</div>
            </div>
            <div class="acc-row">
                <div class="acc-row__label" data-i18n="profile.pondPhoto"></div>
                <!-- 5/12 #72: 複数枚対応（pondPhotos[]）。1枚以下なら従来通り単数表示。 -->
                <div id="v-pond-grid" class="photos-grid"></div>
            </div>
        </div>

        <div id="edit-mode" style="display:none;">
            <div class="acc-row">
                <div class="acc-row__label" data-i18n="profile.avatar"></div>
                <div class="avatar-box">
                    <div class="avatar-circle" id="e-avatar">
                        <span class="material-symbols-outlined" style="font-size:56px;">person</span>
                    </div>
                </div>
                <div class="img-actions">
                    <button type="button" id="btn-avatar-upload" data-i18n="profile.uploadPhoto"></button>
                    <button type="button" id="btn-avatar-remove" class="danger" data-i18n="profile.removePhoto"></button>
                    <input type="file" id="avatar-file" accept="image/*" style="display:none;">
                </div>
            </div>
            <div class="acc-row">
                <div class="acc-row__label" data-i18n="profile.farmerMessage"></div>
                <textarea id="in-message" rows="3" data-i18n="[placeholder]profile.messagePlaceholder"></textarea>
            </div>
            <div class="acc-row">
                <div class="acc-row__label" data-i18n="profile.pondPhoto"></div>
                <!-- 5/12 #72: 複数枚対応。最大5枚まで。 -->
                <div id="e-pond-grid" class="photos-grid"></div>
                <input type="file" id="pond-file" accept="image/*" multiple style="display:none;">
            </div>
            <div class="save-row">
                <button class="edit-btn" id="btn-cancel" style="flex:1;" data-i18n="account.cancel"></button>
                <button class="save" id="btn-save" data-i18n="account.save"></button>
            </div>
        </div>

        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { uploadImageResized } from '/js/image-resize.js';
        import { invalidate as invalidateDataCache } from '/js/data-cache.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const MAX_POND_PHOTOS = 5;
        let userData = null;
        // 5/12 #72: pondPhotos[] を一級扱い。pondPhotoUrl は配列の [0] として書き戻して互換維持。
        // editState.pond は配列。各要素は { url } か { file } のいずれか（新規アップロード分は file ベース）。
        let editState = {
            pond: [],
            avatarUrl: null, avatarFile: null, avatarRemoved: false,
        };

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        // 5/12 #72: 既存単数フィールドとの互換 — 配列が空の場合は単数を採用
        function readPondPhotos(u) {
            if (Array.isArray(u?.pondPhotos) && u.pondPhotos.length > 0) {
                return u.pondPhotos.filter(Boolean);
            }
            return u?.pondPhotoUrl ? [u.pondPhotoUrl] : [];
        }

        function renderViewPondGrid(urls) {
            const grid = document.getElementById('v-pond-grid');
            if (urls.length === 0) {
                grid.innerHTML = `<div class="photos-grid__cell"><span class="material-symbols-outlined" style="font-size:36px;">water</span></div>`;
                return;
            }
            grid.innerHTML = urls.map(u => `<div class="photos-grid__cell"><img ${asCachedImgAttrs(u)} alt="pond" loading="lazy"></div>`).join('');
        }

        function renderEditPondGrid() {
            const grid = document.getElementById('e-pond-grid');
            const cells = editState.pond.map((p, i) => {
                const src = p.url || p.previewDataUrl || '';
                return `<div class="photos-grid__cell" data-idx="${i}">
                    ${src ? `<img ${asCachedImgAttrs(src)} alt="">` : ''}
                    <button type="button" class="photos-grid__remove" data-act="remove" data-idx="${i}" aria-label="remove">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>`;
            }).join('');
            const addCell = editState.pond.length < MAX_POND_PHOTOS
                ? `<div class="photos-grid__cell photos-grid__add" id="pond-add-cell">
                        <span class="material-symbols-outlined" style="font-size:36px;">add_a_photo</span>
                   </div>` : '';
            grid.innerHTML = cells + addCell;
            // バインド
            grid.querySelectorAll('[data-act="remove"]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const i = Number(btn.dataset.idx);
                    editState.pond.splice(i, 1);
                    renderEditPondGrid();
                });
            });
            const addCellEl = document.getElementById('pond-add-cell');
            if (addCellEl) {
                addCellEl.addEventListener('click', () => document.getElementById('pond-file').click());
            }
        }

        function showAvatar(id, url) {
            const box = document.getElementById(id);
            if (url) {
                // data: の preview URL もそのまま通す（image-cache が透過処理）
                box.innerHTML = `<img ${asCachedImgAttrs(url)} alt="avatar">`;
            } else {
                box.innerHTML = `<span class="material-symbols-outlined" style="font-size:56px;">person</span>`;
            }
        }

        function renderView() {
            document.getElementById('v-message').textContent = userData.farmerMessage || '-';
            renderViewPondGrid(readPondPhotos(userData));
            showAvatar('v-avatar', userData.avatarUrl || null);
        }

        document.getElementById('btn-edit').addEventListener('click', () => {
            document.getElementById('in-message').value = userData.farmerMessage || '';
            // 5/12 #72: 既存写真をすべて編集セットに引き込む
            editState = {
                pond: readPondPhotos(userData).map(url => ({ url })),
                avatarUrl: userData.avatarUrl || null, avatarFile: null, avatarRemoved: false,
            };
            renderEditPondGrid();
            showAvatar('e-avatar', editState.avatarUrl);
            document.getElementById('view-mode').style.display = 'none';
            document.getElementById('edit-mode').style.display = 'block';
            document.getElementById('btn-edit').style.display = 'none';
        });
        document.getElementById('btn-cancel').addEventListener('click', () => {
            document.getElementById('view-mode').style.display = 'block';
            document.getElementById('edit-mode').style.display = 'none';
            document.getElementById('btn-edit').style.display = 'inline-flex';
        });
        // 5/12 #72: 複数ファイル選択に対応。MAX_POND_PHOTOS の上限まで追加。
        document.getElementById('pond-file').addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            for (const file of files) {
                if (editState.pond.length >= MAX_POND_PHOTOS) break;
                const entry = { file };
                editState.pond.push(entry);
                // プレビュー用 DataURL を非同期生成し、生成後に再描画
                const reader = new FileReader();
                reader.onload = (ev) => { entry.previewDataUrl = ev.target.result; renderEditPondGrid(); };
                reader.readAsDataURL(file);
            }
            renderEditPondGrid();
            // 同一ファイル再選択を許可するため value をリセット
            e.target.value = '';
        });
        document.getElementById('btn-avatar-upload').addEventListener('click', () => document.getElementById('avatar-file').click());
        document.getElementById('avatar-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            editState.avatarFile = file;
            editState.avatarRemoved = false;
            const reader = new FileReader();
            reader.onload = (ev) => showAvatar('e-avatar', ev.target.result);
            reader.readAsDataURL(file);
        });
        document.getElementById('btn-avatar-remove').addEventListener('click', () => {
            editState.avatarFile = null;
            editState.avatarRemoved = true;
            editState.avatarUrl = null;
            document.getElementById('avatar-file').value = '';
            showAvatar('e-avatar', null);
        });
        document.getElementById('btn-save').addEventListener('click', async () => {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            loading.classList.add('show');
            try {
                const farmerMessage = document.getElementById('in-message').value.trim();
                // 5/12 #72: pondPhotos[] を順序通りにアップロード（新規分のみ実アップロード）
                const pondPhotos = [];
                for (const p of editState.pond) {
                    if (p.url) {
                        pondPhotos.push(p.url);
                        continue;
                    }
                    if (p.file) {
                        const baseName = (p.file.name || 'pond').replace(/\.[^.]+$/, '');
                        const storageRef = ref(storage, `profile/${uid}/pond_${Date.now()}_${baseName}.jpg`);
                        const url = await uploadImageResized(storageRef, p.file);
                        pondPhotos.push(url);
                    }
                }
                // 互換維持: pondPhotoUrl は配列の [0] 相当
                const pondPhotoUrl = pondPhotos[0] || null;

                let avatarUrl = editState.avatarUrl;
                if (editState.avatarFile) {
                    // 5/11 #67: リサイズ+圧縮+リトライ（アバターは小さめでもOK）
                    const baseName = (editState.avatarFile.name || 'avatar').replace(/\.[^.]+$/, '');
                    const storageRef = ref(storage, `profile/${uid}/avatar_${Date.now()}_${baseName}.jpg`);
                    avatarUrl = await uploadImageResized(storageRef, editState.avatarFile, {
                        resize: { maxWidth: 512, maxHeight: 512 },
                    });
                } else if (editState.avatarRemoved) {
                    avatarUrl = null;
                }
                await updateDoc(doc(db, 'users', uid), {
                    farmerMessage: farmerMessage || null,
                    pondPhotos,
                    pondPhotoUrl,
                    avatarUrl: avatarUrl || null,
                });
                // 5/12 #69 追補：他画面のキャッシュにも反映させるため自分のドキュメントキャッシュを破棄
                invalidateDataCache('users', uid);
                userData.farmerMessage = farmerMessage || null;
                userData.pondPhotos = pondPhotos;
                userData.pondPhotoUrl = pondPhotoUrl;
                userData.avatarUrl = avatarUrl || null;
                renderView();
                document.getElementById('btn-cancel').click();
            } catch (err) {
                console.error(err);
                alert(i18next.t('account.saveFailed'));
            } finally {
                btn.disabled = false;
                loading.classList.remove('show'); document.body.classList.add('app-ready');
            }
        });

        waitForUserData(() => {
            userData = { ...window.currentUserData };
            renderView();
            loading.classList.remove('show'); document.body.classList.add('app-ready');
        });
    </script>
</body>
</html>
