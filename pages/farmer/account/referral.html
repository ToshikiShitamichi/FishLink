<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FISHLINK</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        /* 6/22 #164 / 6/27 #177: 紹介専用ページ（マイページ 1行メニューの遷移先）。
           コード/コピー/シェア＋紹介ボーナス（農家）。特典は稼働中（順次提供注記は廃止）。 */
        .sub-page { max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }
        .sub-page__title { text-align: center; font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
        .ref-card {
            background: var(--color-cta-lt);
            border: 1px solid #cfe0ee;
            border-radius: 14px;
            padding: 16px;
        }
        .ref-card__desc { font-size: 12.5px; color: #3e6a98; line-height: 1.6; margin-bottom: 12px; }
        .ref-card__label { font-size: 14px; font-weight: 700; color: var(--color-cta); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .ref-card__label .material-symbols-outlined { font-size: 18px; }
        .ref-card__code {
            background: #fff;
            border: 1px solid #d5e6f8;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #0b1b33;
            margin-bottom: 12px;
            user-select: all;
        }
        .ref-card__actions { display: flex; gap: 8px; }
        .ref-card__btn {
            flex: 1;
            background: #fff;
            border: 1px solid var(--color-cta);
            color: var(--color-cta);
            border-radius: 999px;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .ref-card__btn .material-symbols-outlined { font-size: 17px; }
        .ref-card__btn--primary { background: var(--color-cta); color: #fff; border-color: var(--color-cta); }

        /* 報酬カード（白） */
        .reward-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 14px;
            margin-top: 14px;
        }
        .reward-card__title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 11px; }
        .reward-card__title .material-symbols-outlined { font-size: 19px; color: #b36a00; }

        /* 農家ボーナス（amber） */
        .bonus-box { background: #fff7e6; border: 1px solid #f3d998; border-radius: 12px; padding: 13px; }
        .bonus-box__amt { font-size: 17px; font-weight: 700; color: #b36a00; }
        .bonus-box__st { font-size: 11.5px; color: #9a7430; margin-top: 5px; line-height: 1.5; }
        .bonus-box__tot { font-size: 12px; color: var(--color-text-sub); margin-top: 10px; border-top: 1px solid #f0e2c2; padding-top: 9px; }
        .reward-hint { font-size: 11.5px; color: var(--color-text-sub); line-height: 1.6; margin-top: 8px; }

        /* 報酬の空状態（共有を促す） */
        .reward-empty { text-align: center; padding: 14px 10px 6px; }
        .reward-empty .re-i { font-size: 30px; color: #c9a14a; }
        .reward-empty .re-t { font-size: 13px; color: var(--color-text-sub); margin-top: 7px; }
        .reward-empty .re-p { font-size: 13px; font-weight: 700; color: var(--color-cta); margin-top: 9px; line-height: 1.55; }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page">

        <div class="page-header" style="align-items:center;">
            <a href="/pages/farmer/account.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub); padding-right:8px;"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FISHLINK" class="brand-logo"></a>
            <select id="lang-selector"
                style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option>
                <option value="en">ENGLISH</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <div class="sub-page__title" data-i18n="account.referralFarmer"></div>

        <div class="sub-page">
            <div class="ref-card">
                <div class="ref-card__label"><span class="material-symbols-outlined">redeem</span><span data-i18n="referral.cardTitle"></span></div>
                <div class="ref-card__desc" data-i18n="referral.timingTwoStage"></div>
                <div class="ref-card__code" id="referral-code">--------</div>
                <div class="ref-card__actions">
                    <button type="button" id="referral-copy" class="ref-card__btn">
                        <span class="material-symbols-outlined">content_copy</span>
                        <span data-i18n="referral.copy"></span>
                    </button>
                    <button type="button" id="referral-share" class="ref-card__btn ref-card__btn--primary">
                        <span class="material-symbols-outlined">share</span>
                        <span data-i18n="referral.share"></span>
                    </button>
                </div>
            </div>

            <!-- 紹介ボーナス（農家・amber） -->
            <div class="reward-card">
                <div class="reward-card__title"><span class="material-symbols-outlined">redeem</span><span data-i18n="referral.bonusTitle"></span></div>
                <div id="bonus-body"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, onLanguageChange } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { ensureUserReferralCode, getReferralSettings } from '/js/referral.js';
        import { showToast } from '/js/toast.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 200);
        }

        let referralCode = '--------';

        async function showReferralCode() {
            const uid = window.currentUser?.uid;
            if (!uid) return;
            try {
                referralCode = await ensureUserReferralCode(uid, window.currentUserData);
            } catch (e) {
                console.warn('ensureUserReferralCode failed:', e);
                return;
            }
            document.getElementById('referral-code').textContent = referralCode;
        }

        // #177 A5/A6: 農家の紹介ボーナス状態（運営設定の動的値＋保留回数＋獲得合計）。
        //   pendingFarmerBonus = あと◯回 ／ settings.farmerBonusKhr = +◯◯（直書きしない）
        //   referralBonusTotalKhr = 獲得合計（CF で加算・新フィールド／default 0）。ボーナスは期限なし（B8）。
        let bonusState = null; // { count, amount, total }
        async function loadBonus() {
            const count = Number(window.currentUserData?.pendingFarmerBonus || 0);
            const total = Number(window.currentUserData?.referralBonusTotalKhr || 0);
            let amount = 0;
            try {
                const s = await getReferralSettings();
                amount = Number(s?.farmerBonusKhr || 0);
            } catch (e) { console.warn('getReferralSettings failed:', e); }
            bonusState = { count, amount, total };
            renderBonus();
        }
        function renderBonus() {
            const body = document.getElementById('bonus-body');
            if (!body || !bonusState) return;
            const { count, amount, total } = bonusState;
            // 2026-07-17 #210③: 桁区切りは 'en-US' 明示（引数なしだと端末ロケール依存で「5.000」に化ける）
            const amountStr = amount ? amount.toLocaleString('en-US') : '';
            if (count > 0) {
                body.innerHTML = `
                    <div class="bonus-box">
                        <div class="bonus-box__amt">${i18next.t('referral.bonusRemaining', { n: count, amount: amountStr })}</div>
                        <div class="bonus-box__st">${i18next.t('referral.bonusPending')}</div>
                        <div class="bonus-box__tot">${i18next.t('referral.bonusTotal', { amount: total.toLocaleString('en-US') })}</div>
                    </div>
                    <div class="reward-hint">${i18next.t('referral.amountDynamicHint')}</div>`;
            } else {
                body.innerHTML = `
                    <div class="reward-empty">
                        <div class="re-i"><span class="material-symbols-outlined" style="font-size:30px;">redeem</span></div>
                        <div class="re-t">${i18next.t('referral.emptyBonus')}</div>
                        <div class="re-p">${i18next.t('referral.shareToEarnBonus', { amount: amountStr })}</div>
                    </div>`;
            }
        }

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); } catch (_) { /* ignore */ }
                ta.remove();
            }
        }

        document.getElementById('referral-copy').addEventListener('click', async () => {
            await copyText(referralCode);
            showToast(i18next.t('referral.copied'));
        });

        document.getElementById('referral-share').addEventListener('click', async () => {
            const shareText = i18next.t('referral.shareText', { code: referralCode });
            if (navigator.share) {
                try { await navigator.share({ text: shareText }); } catch (e) { /* cancel */ }
            } else {
                await copyText(shareText);
                showToast(i18next.t('referral.copied'));
            }
        });

        waitForUserData(() => {
            showReferralCode();
            loadBonus();
            loading.classList.remove('show');
            document.body.classList.add('app-ready');
        });

        onLanguageChange(() => { renderBonus(); });
    </script>
</body>

</html>
