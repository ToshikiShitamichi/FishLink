<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        body { overflow: hidden; }
        .delivery-page {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .order-summary {
            padding: 8px 14px;
            color: var(--color-text-sub);
            line-height: 1.4;
            flex-shrink: 0;
            border-bottom: 1px solid var(--color-border);
        }

        .location-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            color: #3730a3;
            border-radius: 12px;
            padding: 3px 10px;
            margin-top: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }
        .location-link .material-symbols-outlined { font-size: 14px; }

        .timeline {
            padding: 0 16px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        /* 下部固定エリア：クイックステータス・チャット入力・配送完了ボタン */
        .delivery-bottom {
            flex-shrink: 0;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
        }

        .tl-status {
            width: 86%;
            margin-left: auto;
            border-radius: 16px;
            background: #bef264;
            padding: 14px;
            text-align: center;
            margin-bottom: 12px;
        }
        .tl-status__time { font-size: 13px; color: #555; }
        .tl-status__text { font-size: 18px; font-weight: 700; margin-top: 4px; }

        .tl-chat {
            max-width: 78%;
            border-radius: 14px;
            background: #e5e5e5;
            padding: 6px 12px 4px;
            margin-bottom: 3px;
        }
        .tl-chat.self { margin-left: auto; background: #dbeafe; }
        .tl-chat__img { max-width: 100%; border-radius: 8px; margin-top: 4px; }
        .tl-chat__time { font-size: 10px; color: #888; text-align: right; margin-top: 2px; }
        .tl-chat__text { font-size: 14px; line-height: 1.35; white-space: pre-wrap; word-break: break-word; }

        .quick-status {
            padding: 10px 14px;
            border-bottom: 1px solid var(--color-border);
        }
        .quick-status__title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--color-text-sub); }
        .quick-status__grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
        .quick-status__btn {
            border-radius: 10px;
            border: 1px solid var(--color-border);
            background: #f9fafb;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
        }
        .quick-status__btn:hover { background: #fff7ed; border-color: #fdba74; }
        .quick-status__hint { font-size: 11px; color: var(--color-text-sub); margin-top: 6px; }

        .chat-input {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--color-border);
        }
        .chat-input input {
            flex: 1;
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 16px; /* iOS Safari の自動ズーム回避（16px以上必須） */
        }
        .chat-input button {
            border: none;
            background: var(--color-primary);
            color: #fff;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .photo-preview-area {
            display: none;
            padding: 6px 14px;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
        }
        .photo-preview-area.show { display: flex; }
        .photo-preview-area img {
            width: 50px; height: 50px; object-fit: cover; border-radius: 8px;
        }
        .photo-preview-area .remove-all {
            font-size: 11px; color: #ef4444; cursor: pointer; margin-left: auto;
        }

        .delivery-footer {
            padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
            background: var(--color-surface);
        }
        .delivery-footer button {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: #f97316;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
        }
        .delivery-footer button:disabled { opacity: 0.5; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="delivery-page">
        <div class="page-header" style="align-items:center; padding:8px 12px;">
            <a href="/pages/farmer/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub);"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <a id="call-btn" href="#" style="display:none; width:36px; height:36px; border-radius:50%; background:#ecfdf5; color:#047857; align-items:center; justify-content:center; margin-right:6px; text-decoration:none;" aria-label="call">
                <span class="material-symbols-outlined" style="font-size:20px;">call</span>
            </a>
            <select id="lang-selector" style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
        </div>

        <div class="order-summary" id="order-summary"></div>
        <div class="timeline" id="timeline"></div>

        <!-- 下部固定エリア：クイックステータス + チャット入力 + 配送完了ボタン -->
        <div class="delivery-bottom">
            <!-- クイックステータス -->
            <div class="quick-status">
                <div class="quick-status__title" data-i18n="delivery.sendStatus"></div>
                <div class="quick-status__grid">
                    <button class="quick-status__btn" data-status="preparing" data-msg-key="statusPrepareMsg" data-order-status="preparing" data-i18n="delivery.statusPreparing"></button>
                    <button class="quick-status__btn" data-status="delivering" data-msg-key="statusDeliverMsg" data-order-status="delivering" data-i18n="delivery.statusDelivering"></button>
                    <button class="quick-status__btn" data-status="delayed" data-msg-key="statusDelayedMsg" data-i18n="delivery.statusDelayed"></button>
                    <button class="quick-status__btn" data-status="arrived" data-msg-key="statusArrivedMsg" data-i18n="delivery.statusArrived"></button>
                </div>
            </div>

            <!-- 写真プレビュー -->
            <div class="photo-preview-area" id="photo-preview"></div>

            <!-- チャット入力 -->
            <div class="chat-input">
                <button id="photo-btn" style="border:none; background:var(--color-surface); cursor:pointer; padding:6px 8px; border-radius:50%; color:var(--color-text-sub);"><span class="material-symbols-outlined">photo_camera</span></button>
                <input type="file" id="photo-input" accept="image/*" multiple style="display:none;">
                <input type="text" id="chat-text" data-i18n="[placeholder]delivery.chatPlaceholder">
                <button id="chat-send" data-i18n="delivery.send"></button>
            </div>

            <!-- 配送完了ボタン -->
            <div class="delivery-footer">
                <button id="complete-btn" data-i18n="delivery.deliveryComplete"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import {
            doc, getDoc, updateDoc, addDoc, collection, query, orderBy, onSnapshot, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import {
            ref, uploadBytes, getDownloadURL
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const params = new URLSearchParams(location.search);
        const orderId = params.get('id');
        if (!orderId) location.href = '/pages/farmer/orders.html';

        let orderData = null;
        let myUid = null;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        waitForUserData(async () => {
            loading.classList.add('show');
            myUid = window.currentUser.uid;

            const orderSnap = await getDoc(doc(db, 'orders', orderId));
            if (!orderSnap.exists()) { location.href = '/pages/farmer/orders.html'; return; }
            orderData = orderSnap.data();

            // listing情報（注文時点のスナップショット優先）
            let fishName = '';
            let fishTypeKey = orderData.snapFishType;
            if (!fishTypeKey && orderData.listingId) {
                const lSnap = await getDoc(doc(db, 'fishListings', orderData.listingId));
                fishTypeKey = lSnap.data()?.fishType;
            }
            if (fishTypeKey) {
                fishName = i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey;
            }

            // レストラン情報
            const restSnap = await getDoc(doc(db, 'users', orderData.restaurantId));
            const rest = restSnap.data() || {};
            const restName = rest.displayName || '';
            const restLoc = rest.location || null;
            const locLabel = [rest.province, rest.district].filter(Boolean).join(', ');

            // 電話ボタン：相手の電話番号があれば表示
            if (rest.phone) {
                const callBtn = document.getElementById('call-btn');
                callBtn.href = `tel:${rest.phone}`;
                callBtn.style.display = 'inline-flex';
            }

            const statusKey = `delivery.${orderData.status}`;
            const statusText = i18next.exists(statusKey) ? i18next.t(statusKey) : orderData.status;

            const mapLink = restLoc && restLoc.lat && restLoc.lng
                ? `https://www.google.com/maps/search/?api=1&query=${restLoc.lat},${restLoc.lng}`
                : null;

            const orderNo = orderData.orderNumber || `FL-${orderId.slice(0, 8).toUpperCase()}`;
            document.getElementById('order-summary').innerHTML = `
                <div style="font-weight:600; color:var(--color-text); font-size:14px;">
                    ${fishName} ${orderData.quantity}kg · ${restName}
                </div>
                <div style="font-size:12px; color:var(--color-text-sub); margin-top:2px;">
                    ${statusText} · ${i18next.t('orders.deliveryDate')} ${orderData.deliveryDate || ''} ${orderData.deliveryTime || ''}
                </div>
                <div style="font-family:monospace; font-size:11px; color:#94a3b8; margin-top:2px;">${orderNo}</div>
                ${mapLink ? `
                    <a class="location-link" href="${mapLink}" target="_blank" rel="noopener">
                        <span class="material-symbols-outlined">location_on</span>
                        <span>${locLabel ? locLabel + ' · ' : ''}${i18next.t('delivery.viewLocation')}</span>
                    </a>
                ` : ''}
            `;

            // タイムライン購読
            const msgQuery = query(
                collection(db, 'orders', orderId, 'messages'),
                orderBy('createdAt', 'asc')
            );
            onSnapshot(msgQuery, (snap) => {
                const timeline = document.getElementById('timeline');
                timeline.innerHTML = '';
                snap.forEach(d => {
                    const msg = d.data();
                    const time = msg.createdAt?.toDate();
                    const timeStr = time ? `${time.getMonth() + 1}/${time.getDate()} ${String(time.getHours()).padStart(2, '0')}:${String(time.getMinutes()).padStart(2, '0')}` : '';
                    const isSelf = msg.senderId === myUid;
                    const imgs = msg.imageUrls || (msg.imageUrl ? [msg.imageUrl] : []);
                    const imgHtml = imgs.map(url => `<img class="tl-chat__img" src="${url}">`).join('');

                    timeline.innerHTML += `
                        <div class="tl-chat ${isSelf ? 'self' : ''}">
                            ${msg.text ? `<div class="tl-chat__text">${msg.text}</div>` : ''}
                            ${imgHtml}
                            <div class="tl-chat__time">${timeStr}</div>
                        </div>`;
                });
                timeline.scrollTop = timeline.scrollHeight;
            });

            loading.classList.remove('show');
        });

        // クイックステータス：テンプレをチャット入力欄へ流し込む（送信は「送信」ボタンで）
        let pendingStatusChange = null;
        document.querySelectorAll('.quick-status__btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const msgKey = btn.dataset.msgKey;
                const orderStatus = btn.dataset.orderStatus || null;
                const text = i18next.t(`delivery.${msgKey}`);
                const input = document.getElementById('chat-text');
                input.value = text;
                pendingStatusChange = orderStatus;
                input.focus();
            });
        });

        // ── 写真プレビュー管理 ──
        let pendingFiles = [];

        function updatePhotoPreview() {
            const preview = document.getElementById('photo-preview');
            if (pendingFiles.length === 0) {
                preview.classList.remove('show');
                preview.innerHTML = '';
                return;
            }
            preview.classList.add('show');
            preview.innerHTML = pendingFiles.map((f, i) =>
                `<img src="${URL.createObjectURL(f)}">`
            ).join('') + `<span class="remove-all" id="clear-photos">✕</span>`;
            document.getElementById('clear-photos').addEventListener('click', () => {
                pendingFiles = [];
                updatePhotoPreview();
            });
        }

        document.getElementById('photo-btn').addEventListener('click', () => {
            document.getElementById('photo-input').click();
        });

        document.getElementById('photo-input').addEventListener('change', (e) => {
            pendingFiles = [...pendingFiles, ...Array.from(e.target.files)];
            e.target.value = '';
            updatePhotoPreview();
        });

        // ── チャット送信（テキスト＋写真まとめて） ──
        document.getElementById('chat-send').addEventListener('click', async () => {
            const input = document.getElementById('chat-text');
            const text = input.value.trim();
            if (!text && pendingFiles.length === 0) return;

            const sendBtn = document.getElementById('chat-send');
            sendBtn.disabled = true;

            // 写真アップロード
            const imageUrls = [];
            for (const file of pendingFiles) {
                const storageRef = ref(storage, `chat/${orderId}/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                imageUrls.push(await getDownloadURL(storageRef));
            }

            // テキストが空で画像のみの場合
            const msgText = text || (imageUrls.length > 0 ? i18next.t('delivery.imageSent') : '');

            await addDoc(collection(db, 'orders', orderId, 'messages'), {
                senderId: myUid,
                text: msgText,
                imageUrls: imageUrls.length > 0 ? imageUrls : null,
                type: 'chat',
                statusChange: pendingStatusChange || null,
                isRead: false,
                createdAt: serverTimestamp(),
            });

            // クイックステータスから流し込まれた場合、注文ステータスを更新
            if (pendingStatusChange) {
                await updateDoc(doc(db, 'orders', orderId), { status: pendingStatusChange });
                pendingStatusChange = null;
            }

            input.value = '';
            pendingFiles = [];
            updatePhotoPreview();
            sendBtn.disabled = false;
        });

        // Enterキーで送信
        document.getElementById('chat-text').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('chat-send').click();
        });

        // 配送完了
        document.getElementById('complete-btn').addEventListener('click', async () => {
            const btn = document.getElementById('complete-btn');
            // 誤送信防止の確認ダイアログ
            if (!confirm(i18next.t('delivery.confirmComplete'))) return;
            btn.disabled = true;

            // 4/28: delivered ステータス廃止。直接 completed に遷移
            await updateDoc(doc(db, 'orders', orderId), { status: 'completed' });
            await addDoc(collection(db, 'orders', orderId, 'messages'), {
                senderId: myUid,
                text: i18next.t('delivery.statusDeliveredMsg'),
                type: 'chat',
                isRead: false,
                createdAt: serverTimestamp(),
            });

            // 配達完了後はそのまま送金状況画面へ（評価導線の起点）
            location.href = `/pages/farmer/payment.html?id=${orderId}`;
        });
    </script>
</body>
</html>
