<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        body { overflow: hidden; }
        .delivery-page {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .order-summary {
            padding: 8px 14px;
            color: var(--color-text-sub);
            line-height: 1.4;
            flex-shrink: 0;
            border-bottom: 1px solid var(--color-border);
        }

        .location-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            color: #3730a3;
            border-radius: 12px;
            padding: 3px 10px;
            margin-top: 6px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }
        .location-link .material-symbols-outlined { font-size: 14px; }

        .timeline {
            padding: 0 16px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            /* 6/4 #126: システム行の中央寄せ・自分バブルの右寄せを確実にする */
            display: flex;
            flex-direction: column;
        }

        /* 下部固定エリア：クイックステータス・チャット入力・配送完了ボタン */
        .delivery-bottom {
            flex-shrink: 0;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
        }

        /* 6/4 #126: 会話バブル/システム行/日付区切りは css/style.css に共通化（.tl-chat / .tl-sys / .tl-datesep） */

        .quick-status {
            padding: 10px 14px;
            border-bottom: 1px solid var(--color-border);
        }
        .quick-status__title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--color-text-sub); }
        .quick-status__grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
        .quick-status__btn {
            border-radius: 10px;
            border: 1px solid var(--color-border);
            background: #f9fafb;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
        }
        .quick-status__btn:hover { background: var(--color-cta-lt); border-color: var(--color-cta); }
        .quick-status__hint { font-size: 11px; color: var(--color-text-sub); margin-top: 6px; }

        .chat-input {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--color-border);
        }
        /* 6/3 #120: 連絡先マスク警告（アンバー） */
        .mask-warn {
            display: flex; gap: 6px; align-items: flex-start;
            background: #fff7e6; border: 1px solid #f3d998; color: #b36a00;
            font-size: 12px; font-weight: 600; line-height: 1.5;
            border-radius: 10px; padding: 8px 10px; margin: 8px 14px 0;
        }
        .mask-warn .material-symbols-outlined { flex-shrink: 0; }
        .chat-input input {
            flex: 1;
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 16px; /* iOS Safari の自動ズーム回避（16px以上必須） */
        }
        .chat-input button {
            border: none;
            background: var(--color-cta);
            color: #fff;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .photo-preview-area {
            display: none;
            padding: 6px 14px;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
        }
        .photo-preview-area.show { display: flex; }
        /* 6/18 #156 ⑤: 写真は1枚ごとに小さな✕で個別削除（一括✕廃止） */
        .photo-preview-area .pp {
            position: relative;
            width: 50px; height: 50px;
        }
        .photo-preview-area .pp img {
            width: 50px; height: 50px; object-fit: cover; border-radius: 8px; display: block;
        }
        .photo-preview-area .pp__x {
            position: absolute; top: -6px; right: -6px;
            width: 19px; height: 19px; border-radius: 50%;
            background: #1a2733; color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; padding: 0;
        }
        .photo-preview-area .pp__x .material-symbols-outlined { font-size: 14px; }

        .delivery-footer {
            padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
            background: var(--color-surface);
        }
        /* 6/1 #112: 配送完了は青CTA（オレンジ廃止） */
        .delivery-footer button {
            width: 100%;
            border: none;
            border-radius: 16px;
            background: var(--color-cta);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
        }
        .delivery-footer button:disabled { opacity: 0.5; }

        /* 6/18 #156 ②③ → 6/19 #160: 確認系は中央モーダルに統一（ボトムシート→中央）。
           .chat-modal を全画面で再スタイルせず、このページ専用のclassを使う。 */
        .bsheet {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 1200; padding: 20px;
        }
        .bsheet.show { display: flex; }
        .bsheet__sheet {
            width: 100%; max-width: 400px;
            background: #fff; border-radius: 20px;
            padding: 20px 18px;
            box-sizing: border-box;
        }
        .bsheet__title { font-size: 15px; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .bsheet__title .material-symbols-outlined { font-size: 19px; vertical-align: -4px; margin-right: 4px; color: var(--color-cta); }
        .bsheet__body { font-size: 13px; line-height: 1.6; color: #5a6470; margin-bottom: 16px; text-align: center; }
        .bsheet__actions { display: flex; gap: 10px; }
        .bsheet__btn {
            flex: 1; border: none; border-radius: 12px;
            padding: 13px; font-size: 14px; font-weight: 800;
            cursor: pointer; font-family: inherit;
        }
        .bsheet__btn--cancel { background: #f1f3f5; color: #5a6470; }
        .bsheet__btn--ok { background: var(--color-cta); color: #fff; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

    <div class="delivery-page">
        <div class="page-header" style="align-items:center; padding:8px 12px;">
            <a href="/pages/farmer/orders.html" class="page-header__back" style="text-decoration:none; color:var(--color-text-sub);"><span class="material-symbols-outlined">arrow_back</span></a>
            <a href="/pages/farmer/dashboard.html" class="page-header__title" style="text-decoration:none; flex:1; display:flex; align-items:center;"><img src="/images/logo.png" alt="FishLink" class="brand-logo"></a>
            <a id="call-btn" href="#" style="display:none; width:36px; height:36px; border-radius:50%; background:#ecfdf5; color:#047857; align-items:center; justify-content:center; margin-right:6px; text-decoration:none;" aria-label="call">
                <span class="material-symbols-outlined" style="font-size:20px;">call</span>
            </a>
            <select id="lang-selector" style="font-size:13px; padding:6px 10px; border:1px solid var(--color-border); border-radius:20px; background:var(--color-surface); color:var(--color-text-sub);">
                <option value="km">ខ្មែរ</option><option value="en">ENGLISH</option><option value="ja">日本語</option>
            </select>
        </div>

        <div class="order-summary" id="order-summary"></div>
        <div class="timeline" id="timeline"></div>

        <!-- 下部固定エリア：クイックステータス + チャット入力 + 配送完了ボタン -->
        <div class="delivery-bottom">
            <!-- クイックステータス -->
            <div class="quick-status">
                <div class="quick-status__title" data-i18n="delivery.sendStatus"></div>
                <div class="quick-status__grid">
                    <button class="quick-status__btn" data-status="preparing" data-status-kind="prepare_start" data-msg-key="statusPrepareMsg" data-order-status="preparing" data-i18n="delivery.statusPreparing"></button>
                    <button class="quick-status__btn" data-status="delivering" data-status-kind="ship_start" data-msg-key="statusDeliverMsg" data-order-status="delivering" data-i18n="delivery.statusDelivering"></button>
                    <button class="quick-status__btn" data-status="delayed" data-status-kind="delay" data-msg-key="statusDelayedMsg" data-i18n="delivery.statusDelayed"></button>
                    <button class="quick-status__btn" data-status="arrived" data-status-kind="arrived" data-msg-key="statusArrivedMsg" data-i18n="delivery.statusArrived"></button>
                </div>
                <div class="quick-status__hint" data-i18n="delivery.statusSendHint"></div>
            </div>

            <!-- 写真プレビュー -->
            <div class="photo-preview-area" id="photo-preview"></div>

            <!-- 6/3 #120: 連絡先マスク警告（アンバー） -->
            <div class="mask-warn" id="mask-warn" style="display:none;">
                <span class="material-symbols-outlined" style="font-size:16px;">warning</span>
                <span data-i18n="comments.maskWarning"></span>
            </div>

            <!-- チャット入力 -->
            <div class="chat-input" id="chat-input-wrap">
                <button id="photo-btn" style="border:none; background:var(--color-surface); cursor:pointer; padding:6px 8px; border-radius:50%; color:var(--color-text-sub);"><span class="material-symbols-outlined">photo_camera</span></button>
                <input type="file" id="photo-input" accept="image/*" multiple style="display:none;">
                <input type="text" id="chat-text" data-i18n="[placeholder]delivery.chatPlaceholder">
                <button id="chat-send" data-i18n="delivery.send"></button>
            </div>

            <!-- 配送完了ボタン -->
            <div class="delivery-footer">
                <button id="complete-btn" data-i18n="delivery.deliveryComplete"></button>
            </div>
        </div>
    </div>

    <!-- 6/4 #126 (diff8) → 6/18 #156 ②: 配送完了の確認はボトムシート（中央モーダル廃止） -->
    <div class="bsheet" id="complete-modal">
        <div class="bsheet__sheet">
            <div class="bsheet__title" data-i18n="delivery.completeModalTitle"></div>
            <div class="bsheet__body" data-i18n="delivery.completeModalBody"></div>
            <div class="bsheet__actions">
                <button class="bsheet__btn bsheet__btn--cancel" id="complete-modal-cancel" data-i18n="delivery.completeModalCancel"></button>
                <button class="bsheet__btn bsheet__btn--ok" id="complete-modal-ok" data-i18n="delivery.completeModalOk"></button>
            </div>
        </div>
    </div>

    <!-- 6/18 #156 ①: 配送ステータス送信の確認ボトムシート（即時投稿しない・送信ゲート） -->
    <div class="bsheet" id="status-modal">
        <div class="bsheet__sheet">
            <div class="bsheet__title"><span class="material-symbols-outlined">inventory_2</span><span id="status-modal-title"></span></div>
            <div class="bsheet__body" data-i18n="delivery.statusSendConfirmBody"></div>
            <div class="bsheet__actions">
                <button class="bsheet__btn bsheet__btn--cancel" id="status-modal-cancel" data-i18n="delivery.statusSendConfirmCancel"></button>
                <button class="bsheet__btn bsheet__btn--ok" id="status-modal-ok" data-i18n="delivery.statusSendConfirmOk"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector } from '/js/i18n.js';
        import { watchAuthState } from '/js/auth.js';
        import { db, storage } from '/js/firebase-config.js';
        import {
            doc, getDoc, updateDoc, addDoc, collection, query, orderBy, onSnapshot, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';
        import {
            ref, uploadBytes, getDownloadURL
        } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js';
        import { uploadImageResized } from '/js/image-resize.js';
        // 6/3 #120: 連絡先マスク
        import { maskContacts } from '/js/contact-mask.js';
        // 5/23 #81: ボイスメッセージ
        import { initVoiceRecorder, renderVoiceBubble } from '/js/voice-message.js';
        // 6/4 #126: 配送管理チャットの共有レンダリング（システム行/日付区切り/バブル）
        import { renderChatTimelineHtml, statusKindOf, fmtDeliveryDateShort } from '/js/chat-timeline.js';
        // 5/23 #69 Phase B: メモリ画像キャッシュ
        import { asCachedImgAttrs } from '/js/image-cache.js';
        // 5/23 #69 Phase B: 同一タブ内 users/fishListings の重複取得を抑止
        import { getCachedUser, getCachedListing } from '/js/data-cache.js';
        // 5/25 #91/#92 拡張: 画面描画状態の永続キャッシュ
        import { saveRenderState, loadRenderState } from '/js/render-cache.js';

        const loading = document.getElementById('loading');
        watchAuthState({ requireAuth: true });
        await initI18n();
        initLangSelector();

        const params = new URLSearchParams(location.search);
        const orderId = params.get('id');
        if (!orderId) location.href = '/pages/farmer/orders.html';

        let orderData = null;
        let myUid = null;

        function waitForUserData(cb) {
            if (window.currentUserData) cb();
            else setTimeout(() => waitForUserData(cb), 300);
        }

        // 5/25 #91/#92 拡張: 画面 HTML を即時復元（描画関数抽出を避けるためのシンプル戦略）
        //   onSnapshot の初回到達で timeline は上書きされ、order-summary も fresh fetch で再描画される。
        let cachedRendered = false;
        try {
            const cached = loadRenderState(`farmer_delivery:${orderId}`);
            if (cached) {
                if (cached.summaryHtml) document.getElementById('order-summary').innerHTML = cached.summaryHtml;
                if (cached.timelineHtml) document.getElementById('timeline').innerHTML = cached.timelineHtml;
                if (cached.callHref) {
                    const cb = document.getElementById('call-btn');
                    if (cb) { cb.href = cached.callHref; cb.style.display = 'inline-flex'; }
                }
                loading.classList.remove('show');
                document.body.classList.add('app-ready');
                cachedRendered = true;
            }
        } catch (e) { console.warn('cached farmer_delivery render failed:', e); }

        waitForUserData(async () => {
            if (!cachedRendered) loading.classList.add('show');
            myUid = window.currentUser.uid;

            const orderSnap = await getDoc(doc(db, 'orders', orderId));
            if (!orderSnap.exists()) { location.href = '/pages/farmer/orders.html'; return; }
            orderData = orderSnap.data();

            // listing情報（注文時点のスナップショット優先）
            let fishName = '';
            let fishTypeKey = orderData.snapFishType;
            if (!fishTypeKey && orderData.listingId) {
                // 5/23 #69 Phase B: data-cache 経由
                const l = await getCachedListing(orderData.listingId);
                fishTypeKey = l?.fishType;
            }
            if (fishTypeKey) {
                fishName = i18next.exists(`fish.${fishTypeKey}`) ? i18next.t(`fish.${fishTypeKey}`) : fishTypeKey;
            }

            // レストラン情報（5/23 #69 Phase B: data-cache 経由）
            const rest = (await getCachedUser(orderData.restaurantId)) || {};
            const restName = rest.displayName || '';
            const restLoc = rest.location || null;
            const locLabel = [rest.province, rest.district].filter(Boolean).join(', ');

            // 電話ボタン：相手の電話番号があれば表示
            if (rest.phone) {
                const callBtn = document.getElementById('call-btn');
                callBtn.href = `tel:${rest.phone}`;
                callBtn.style.display = 'inline-flex';
            }

            const statusKey = `delivery.${orderData.status}`;
            const statusText = i18next.exists(statusKey) ? i18next.t(statusKey) : orderData.status;

            const mapLink = restLoc && restLoc.lat && restLoc.lng
                ? `https://www.google.com/maps/search/?api=1&query=${restLoc.lat},${restLoc.lng}`
                : null;

            const orderNo = orderData.orderNumber || `FL-${orderId.slice(0, 8).toUpperCase()}`;
            // 6/5 #126: ヘッダーをモック chat-head に統一（相手名＝レストラン＋右肩ステータスバッジ／魚種・数量・納品・FL／📍地区・地図を見る）
            const delivStr = [(orderData.deliveryDateIso || orderData.deliveryDate) ? fmtDeliveryDateShort(orderData.deliveryDateIso || orderData.deliveryDate) : '', orderData.deliveryTime || ''].filter(Boolean).join(' ');
            document.getElementById('order-summary').innerHTML = `
                <div class="ch-top">
                    <span class="ch-name">${restName}</span>
                    <span class="ch-status">${statusText}</span>
                </div>
                <div class="ch-sub">${fishName} ${orderData.quantity}kg ・ ${i18next.t('orders.deliveryDate')} ${delivStr} ・ <span class="ch-fl">${orderNo}</span></div>
                ${mapLink
                    ? `<a class="ch-loc" href="${mapLink}" target="_blank" rel="noopener"><span class="material-symbols-outlined">location_on</span>${locLabel ? locLabel + ' ・ ' : ''}${i18next.t('delivery.viewLocation')}</a>`
                    : (locLabel ? `<div class="ch-dist"><span class="material-symbols-outlined">location_on</span>${locLabel}</div>` : '')}
            `;

            // タイムライン購読
            const msgQuery = query(
                collection(db, 'orders', orderId, 'messages'),
                orderBy('createdAt', 'asc')
            );
            onSnapshot(msgQuery, (snap) => {
                const timeline = document.getElementById('timeline');
                // 6/4 #126: 新デザイン（システム行/日付区切り/時刻のみバブル）を共有モジュールで描画
                timeline.innerHTML = renderChatTimelineHtml(snap, myUid);
                timeline.scrollTop = timeline.scrollHeight;
                // 6/4 #126: 送信済みステータスから配送ステータスボタンの「緩い誘導」を更新
                const sentKinds = new Set();
                snap.forEach(d => { const k = statusKindOf(d.data()); if (k) sentKinds.add(k); });
                updateStatusButtons(sentKinds, orderData?.status);
                // 5/25 #91/#92 拡張: 次回訪問用に最新の summary + timeline HTML を保存
                try {
                    saveRenderState(`farmer_delivery:${orderId}`, {
                        summaryHtml: document.getElementById('order-summary').innerHTML,
                        timelineHtml: timeline.innerHTML,
                        callHref: document.getElementById('call-btn')?.href || '',
                    });
                } catch (e) { /* ignore */ }
            });

            // 5/23 #81: マイクボタンを chat-input に組み込む
            initVoiceRecorder({
                chatInputContainer: document.getElementById('chat-input-wrap'),
                getOrderId: () => orderId,
                getSenderUid: () => myUid,
            });

            loading.classList.remove('show'); document.body.classList.add('app-ready');
        });

        // 6/4 #126 (diff1,2,6) → 6/18 #156 ①: 配送ステータス送信＝押すと確認ボトムシート→「送信」で投稿。
        //   ⚠️ 送信データは type:'chat' + statusKind を維持（type:'status' にすると #125/#126 の FCM が相手へ届かない）。
        //   ロックしない・重複押し許容（鮮魚配達は段取りが前後する）。緩い誘導は updateStatusButtons で表現。
        let statusSending = false;

        // 送信本体（ロジックは従来どおり・確認BSの「送信」から呼ぶ）
        async function doStatusSend(statusKind, orderStatus, msgKey) {
            if (statusSending) return;
            statusSending = true;
            const text = i18next.t(`delivery.${msgKey}`);
            try {
                // 6/4 #126: 通知は既存経路を維持するため type:'chat'（onMessageCreated が相手へFCM）。
                //   描画は statusKind で中央システム行に振り分け（statusChange は注文ステータス連動・到着/遅延は null）。
                await addDoc(collection(db, 'orders', orderId, 'messages'), {
                    senderId: myUid,
                    text,
                    type: 'chat',
                    statusKind,
                    statusChange: orderStatus || null,
                    isRead: false,
                    createdAt: serverTimestamp(),
                });
                if (orderStatus) {
                    await updateDoc(doc(db, 'orders', orderId), { status: orderStatus });
                    if (orderData) orderData.status = orderStatus;
                } else if (statusKind === 'arrived') {
                    // #142: 到着＝注文ステータスは「配達中」のまま（spec §5）。
                    //   農家の注文確認リストで「📍到着」バッジ＋受け取り待ち注記を出すため arrivedAt を記録。
                    await updateDoc(doc(db, 'orders', orderId), { arrivedAt: serverTimestamp() });
                    if (orderData) orderData.arrivedAt = true;
                }
            } catch (e) {
                console.error('status send failed:', e);
            } finally {
                statusSending = false;
            }
        }

        // 確認ボトムシート（送信前のゲート）
        const statusModal = document.getElementById('status-modal');
        let pendingStatus = null; // { statusKind, orderStatus, msgKey }
        function closeStatusModal() { statusModal.classList.remove('show'); pendingStatus = null; }
        document.querySelectorAll('.quick-status__btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (statusSending) return;
                const statusKind = btn.dataset.statusKind;
                const orderStatus = btn.dataset.orderStatus || null;
                const msgKey = btn.dataset.msgKey;
                // タイトル＝「{{label}}」を送信しますか？（label＝ボタンの短いステータス名）
                const label = (btn.textContent || '').trim();
                pendingStatus = { statusKind, orderStatus, msgKey };
                document.getElementById('status-modal-title').textContent = i18next.t('delivery.statusSendConfirmTitle', { label });
                statusModal.classList.add('show');
            });
        });
        document.getElementById('status-modal-cancel').addEventListener('click', closeStatusModal);
        statusModal.addEventListener('click', (e) => { if (e.target === statusModal) closeStatusModal(); });
        document.getElementById('status-modal-ok').addEventListener('click', async () => {
            if (!pendingStatus) return;
            const { statusKind, orderStatus, msgKey } = pendingStatus;
            closeStatusModal();
            await doStatusSend(statusKind, orderStatus, msgKey);
        });

        // 6/4 #126 (diff6): 緩い誘導B案 — 次に押すべきを青強調／送信済みは淡色＋取り消し線／遅延はamber。
        const STATUS_RANK = { approved: 1, preparing: 2, delivering: 3, arrived: 3, completed: 4 };
        function updateStatusButtons(sentKinds, orderStatus) {
            const rank = STATUS_RANK[orderStatus] || 0;
            const prepareDone = sentKinds.has('prepare_start') || rank >= STATUS_RANK.preparing;
            const shipDone = sentKinds.has('ship_start') || rank >= STATUS_RANK.delivering;
            const arrivedDone = sentKinds.has('arrived');
            let nextKind = null;
            if (!prepareDone) nextKind = 'prepare_start';
            else if (!shipDone) nextKind = 'ship_start';
            else if (!arrivedDone) nextKind = 'arrived';
            const doneMap = { prepare_start: prepareDone, ship_start: shipDone, arrived: arrivedDone };
            document.querySelectorAll('.quick-status__btn').forEach(btn => {
                const k = btn.dataset.statusKind;
                btn.classList.remove('is-next', 'is-done', 'is-delay');
                if (k === 'delay') { btn.classList.add('is-delay'); return; } // 割り込み・常時押せる
                if (doneMap[k]) btn.classList.add('is-done');
                else if (k === nextKind) btn.classList.add('is-next');
            });
        }

        // ── 写真プレビュー管理 ──
        let pendingFiles = [];

        const photoPreviewEl = document.getElementById('photo-preview');

        function updatePhotoPreview() {
            if (pendingFiles.length === 0) {
                photoPreviewEl.classList.remove('show');
                photoPreviewEl.innerHTML = '';
                return;
            }
            photoPreviewEl.classList.add('show');
            // 6/18 #156 ⑤: 各サムネに個別✕（Material Symbols）。削除はイベント委譲で対象1枚だけ splice。
            photoPreviewEl.innerHTML = pendingFiles.map((f, i) =>
                `<div class="pp"><img src="${URL.createObjectURL(f)}"><button type="button" class="pp__x" data-idx="${i}" aria-label="remove"><span class="material-symbols-outlined">close</span></button></div>`
            ).join('');
        }

        // 個別✕（イベント委譲＝再描画後も有効）
        photoPreviewEl.addEventListener('click', (e) => {
            const x = e.target.closest('.pp__x');
            if (!x) return;
            const idx = Number(x.dataset.idx);
            if (Number.isInteger(idx)) {
                pendingFiles.splice(idx, 1);
                updatePhotoPreview();
            }
        });

        document.getElementById('photo-btn').addEventListener('click', () => {
            document.getElementById('photo-input').click();
        });

        document.getElementById('photo-input').addEventListener('change', (e) => {
            pendingFiles = [...pendingFiles, ...Array.from(e.target.files)];
            e.target.value = '';
            updatePhotoPreview();
        });

        // ── チャット送信（テキスト＋写真まとめて） ──
        document.getElementById('chat-send').addEventListener('click', async () => {
            const input = document.getElementById('chat-text');
            const text = input.value.trim();
            if (!text && pendingFiles.length === 0) return;

            const sendBtn = document.getElementById('chat-send');
            sendBtn.disabled = true;

            // 写真アップロード
            // 5/11 #67: リサイズ+圧縮+リトライ
            const imageUrls = [];
            for (const file of pendingFiles) {
                const baseName = (file.name || 'chat').replace(/\.[^.]+$/, '');
                const storageRef = ref(storage, `chat/${orderId}/${Date.now()}_${baseName}.jpg`);
                const url = await uploadImageResized(storageRef, file);
                imageUrls.push(url);
            }

            // 6/3 #120: 連絡先（電話番号・SNS・URL）を検知→伏字。発動時は警告表示。
            const maskRes = maskContacts(text, i18next.t('comments.maskedContact'));
            document.getElementById('mask-warn').style.display = maskRes.hit ? 'flex' : 'none';
            // 6/4 #126 (diff5): 画像のみの場合はラベルを付けない（サムネのみ＝空テキスト）
            const msgText = maskRes.masked || '';

            await addDoc(collection(db, 'orders', orderId, 'messages'), {
                senderId: myUid,
                text: msgText,
                imageUrls: imageUrls.length > 0 ? imageUrls : null,
                type: 'chat',
                isRead: false,
                ...(maskRes.hit ? { contactMasked: true } : {}),
                createdAt: serverTimestamp(),
            });

            input.value = '';
            pendingFiles = [];
            updatePhotoPreview();
            sendBtn.disabled = false;
        });

        // Enterキーで送信
        document.getElementById('chat-text').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('chat-send').click();
        });

        // 6/4 #126 (diff8): 配送完了は自前モーダルで確認（ブラウザ標準ダイアログ置換）
        const completeModal = document.getElementById('complete-modal');
        document.getElementById('complete-btn').addEventListener('click', () => {
            completeModal.classList.add('show');
        });
        document.getElementById('complete-modal-cancel').addEventListener('click', () => {
            completeModal.classList.remove('show');
        });
        completeModal.addEventListener('click', (e) => {
            if (e.target === completeModal) completeModal.classList.remove('show');
        });
        document.getElementById('complete-modal-ok').addEventListener('click', async () => {
            const okBtn = document.getElementById('complete-modal-ok');
            okBtn.disabled = true;
            document.getElementById('complete-btn').disabled = true;

            // 4/28: delivered ステータス廃止。直接 completed に遷移
            await updateDoc(doc(db, 'orders', orderId), { status: 'completed' });
            // システム自動メッセージは type: 'status' + statusKind:'completed'（システム行で表示）
            // → onMessageCreated は reply todo を作らず、FCM も送らない
            await addDoc(collection(db, 'orders', orderId, 'messages'), {
                senderId: myUid,
                text: i18next.t('delivery.statusDeliveredMsg'),
                type: 'status',
                statusKind: 'completed',
                isRead: false,
                createdAt: serverTimestamp(),
            });

            // 配達完了後はそのまま送金状況画面へ（評価導線の起点）
            location.href = `/pages/farmer/payment.html?id=${orderId}`;
        });
    </script>
</body>
</html>
