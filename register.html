<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 6/6 #131: 新規登録のインラインバリデーション（#115/#128 と統一）
           各必須フィールド直下に赤メッセージ＋枠を赤、最初のエラー欄へ自動スクロール。 */
        .field-error {
            display: none;
            color: var(--color-danger);
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
            line-height: 1.5;
        }
        .field-error.show { display: block; }
        .input-error,
        .input-error:focus { border-color: var(--color-danger) !important; background: #fff5f5 !important; }
        /* ロール未選択時のエラー枠 */
        .role-select.input-error { border: none !important; background: none !important; }
        .role-select.input-error .role-option__label { border-color: var(--color-danger) !important; }
        /* 6/6 #131: 暗黙同意の文言＋規約/プラポリリンク */
        .consent-note {
            font-size: 12px;
            color: var(--color-text-sub);
            line-height: 1.6;
            margin: 4px 0 12px;
        }
        .consent-note a {
            color: var(--color-cta);
            font-weight: 600;
            text-decoration: none;
        }
        .consent-note a:hover { text-decoration: underline; }
    </style>

    <!-- i18next -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>

    <script>
        let mapInitialized = false;
        function initMap() {
            if (mapInitialized) return;
            mapInitialized = true;
            const map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 11.5564, lng: 104.9282 },
                zoom: 7,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
            });

            let marker = null;

            // ピン設置＋ジオコーディング（共通処理）
            function placePin(latLng) {
                if (marker) marker.setMap(null);
                marker = new google.maps.Marker({
                    position: latLng,
                    map,
                    animation: google.maps.Animation.DROP,
                });

                window.selectedLocation = { lat: latLng.lat(), lng: latLng.lng() };
                window.selectedProvince = null;
                window.selectedDistrict = null;
                window.selectedDistrictKm = null;

                // 5/11 #65 拡張: en + km を並列でジオコーディングして、district はクメール語版も保存する
                //   - province は js/province-utils.js で内部キー正規化＋i18n（en/km/ja）
                //   - district は数が多すぎて i18n テーブル化できないので、km の Geocoder 結果をそのまま保存
                function geocodeWithLang(lang) {
                    return new Promise((resolve) => {
                        const geocoder = new google.maps.Geocoder();
                        geocoder.geocode({ location: window.selectedLocation, language: lang }, (results, status) => {
                            if (status === 'OK' && results[0]) {
                                const prov = results[0].address_components.find(c =>
                                    c.types.includes('administrative_area_level_1')
                                );
                                const dist = results[0].address_components.find(c =>
                                    c.types.includes('administrative_area_level_2')
                                );
                                resolve({
                                    province: prov?.long_name || null,
                                    district: dist?.long_name || null,
                                    formatted: results[0].formatted_address || '',
                                });
                            } else {
                                resolve({ province: null, district: null, formatted: '' });
                            }
                        });
                    });
                }

                window.provincePromise = (async () => {
                    const [en, km] = await Promise.all([
                        geocodeWithLang('en'),
                        geocodeWithLang('km'),
                    ]);
                    window.selectedProvince = en.province;
                    window.selectedDistrict = en.district;
                    window.selectedDistrictKm = km.district;

                    // 住所をステータス欄に表示（UI言語が km なら km 表記を優先）
                    const useKm = (window.i18next?.language === 'km');
                    const placeProvince = useKm ? (km.province || en.province) : en.province;
                    const placeDistrict = useKm ? (km.district || en.district) : en.district;
                    const formatted = (useKm ? km.formatted : en.formatted)
                        || [placeProvince, placeDistrict].filter(Boolean).join(', ');

                    const statusEl = document.getElementById('location-status');
                    statusEl.classList.add('set');
                    const setTxt = window.i18next?.exists?.('register.locationSet')
                        ? window.i18next.t('register.locationSet') : '位置情報を設定済み';
                    document.getElementById('location-status-text').innerHTML =
                        `<span style="font-weight:700;">${setTxt}</span>${formatted ? `<br><span style="font-size:12px; color:#475569;">${formatted}</span>` : ''}`;
                    return window.selectedProvince;
                })();

                const statusEl = document.getElementById('location-status');
                statusEl.classList.add('set');
                const setTxt = window.i18next?.exists?.('register.locationSet')
                    ? window.i18next.t('register.locationSet') : '位置情報を設定済み';
                document.getElementById('location-status-text').textContent = setTxt;
            }

            // 地図クリックでピン設置
            map.addListener('click', (e) => placePin(e.latLng));

            // 現在地を取得して自動ピン設置（失敗時はステータスにヒントを表示）
            function tryGeolocation(showError) {
                if (!navigator.geolocation) {
                    if (showError) {
                        document.getElementById('location-status-text').textContent =
                            window.i18next?.t?.('register.locationGeoUnavailable') || 'お使いの端末では現在地が取得できません。地図をタップしてピンを設置してください。';
                    }
                    return;
                }
                document.getElementById('location-status-text').textContent =
                    window.i18next?.t?.('register.locationFinding') || '現在地を取得しています...';
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const latLng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                        map.setCenter(latLng);
                        map.setZoom(15);
                        placePin(latLng);
                    },
                    (err) => {
                        // 失敗時はユーザーに状況を伝え、地図タップを促す
                        const reason = err.code === 1 // PERMISSION_DENIED
                            ? (window.i18next?.t?.('register.locationDenied') || '位置情報の利用が拒否されました。地図をタップしてピンを設置してください。')
                            : (window.i18next?.t?.('register.locationFailed') || '現在地が取得できませんでした。地図をタップしてピンを設置してください。');
                        document.getElementById('location-status-text').textContent = reason;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                );
            }

            // 初回ロード時：自動取得を試みる（失敗してもエラーは静か）
            tryGeolocation(false);

            // 「現在地を使う」ボタン：明示的に再試行（失敗時はエラー表示）
            document.getElementById('use-current-loc-btn')?.addEventListener('click', () => tryGeolocation(true));
        }

        window.gm_authFailure = function () {
            document.getElementById('map').style.display = 'none';
            document.getElementById('map-placeholder').style.display = 'flex';
        };
    </script>

    <!-- Google Maps API（6/6 #131 spec §10: 地図UIの言語をアプリ言語に同期） -->
    <script>
        (function loadGoogleMaps() {
            // アプリ言語（localStorage）を地図UIに反映。未設定はクメール語デフォルト。
            var lang = 'km';
            try { lang = localStorage.getItem('fishlink_lang') || 'km'; } catch (e) { /* ignore */ }
            if (['km', 'en', 'ja'].indexOf(lang) === -1) lang = 'km';
            var s = document.createElement('script');
            s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0'
                + '&callback=initMap&loading=async&language=' + lang + '&region=KH';
            s.async = true;
            s.defer = true;
            document.head.appendChild(s);
        })();
    </script>
</head>

<body>

    <!-- 言語セレクター -->
    <div class="lang-selector-wrap">
        <select id="lang-selector">
            <option value="km">ខ្មែរ</option>
            <option value="en">ENGLISH</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <!-- ローディング -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page-center" style="padding-top:60px; padding-bottom:40px;">
        <div style="width:100%; max-width:440px;">

            <!-- ロゴ（小） -->
            <div style="text-align:center; margin-bottom:24px;">
                <img src="/images/logo.png" alt="FishLink" style="width:70%; max-width:220px; height:auto; display:inline-block;">
            </div>

            <!-- 6/6 #131: PWA設定ボックスは撤去 → 登録後オンボーディング(onboarding.html)へ移動 -->

            <div class="card">
                <h1 class="card__title" data-i18n="register.title"></h1>

                <!-- エラーメッセージ（総括のみ・個別はインライン） -->
                <div class="error-msg" id="error-msg"></div>

                <!-- 6/6 #131: ログインID欄は削除（電話番号がID） -->

                <!-- ① 表示名 -->
                <div class="form-group">
                    <label for="display-name" data-i18n="register.displayName"></label>
                    <input type="text" id="display-name">
                    <div class="input-hint" data-i18n="register.displayNameHint"></div>
                    <div class="field-error" id="err-display-name" data-i18n="error.displayNameRequired"></div>
                </div>

                <!-- ② 電話番号（識別子） -->
                <div class="form-group">
                    <label for="phone" data-i18n="register.phone"></label>
                    <input type="tel" id="phone" inputmode="tel" autocomplete="tel" data-i18n="[placeholder]register.phonePlaceholder">
                    <div class="input-hint" data-i18n="register.phoneHint"></div>
                    <div class="field-error" id="err-phone" data-i18n="error.phoneInvalid"></div>
                </div>

                <!-- ③ パスワード -->
                <div class="form-group">
                    <label for="password" data-i18n="register.password"></label>
                    <div class="password-wrap">
                        <input type="password" id="password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="pw-toggle"><span class="material-symbols-outlined">visibility</span></button>
                    </div>
                    <div class="field-error" id="err-password" data-i18n="error.passwordTooShort"></div>
                </div>

                <div class="divider"></div>

                <!-- ④ ロール選択 -->
                <div class="form-group">
                    <div class="section-title" data-i18n="register.role"></div>
                    <div class="role-select">
                        <div class="role-option">
                            <input type="radio" name="role" id="role-farmer" value="farmer">
                            <label class="role-option__label" for="role-farmer">
                                <span class="role-option__icon"><img src="/images/role-fish.svg" alt="" width="32" height="32"></span>
                                <span class="role-option__text" data-i18n="register.roleFarmer"></span>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-restaurant" value="restaurant">
                            <label class="role-option__label" for="role-restaurant">
                                <span class="role-option__icon"><span class="material-symbols-outlined">restaurant</span></span>
                                <span class="role-option__text" data-i18n="register.roleRestaurant"></span>
                            </label>
                        </div>
                    </div>
                    <div class="field-error" id="err-role" data-i18n="error.roleRequired"></div>
                </div>

                <div class="divider"></div>

                <!-- ⑤ 位置情報 -->
                <div class="form-group">
                    <div class="section-title" data-i18n="register.location"></div>
                    <div class="input-hint" style="margin-bottom:8px;" data-i18n="register.locationHint"></div>
                    <div class="map-container">
                        <div id="map"></div>
                        <div class="map-placeholder" id="map-placeholder" style="display:none;">
                            <span class="material-symbols-outlined" style="font-size:28px;">map</span>
                            <span>Google Maps API key required</span>
                        </div>
                    </div>
                    <button type="button" id="use-current-loc-btn"
                        style="display:inline-flex; align-items:center; gap:6px; margin-top:8px; padding:8px 14px; border:1px solid var(--color-border); border-radius:20px; background:#fff; color:var(--color-text); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;">
                        <span class="material-symbols-outlined" style="font-size:16px;">my_location</span>
                        <span data-i18n="register.useCurrentLocation"></span>
                    </button>
                    <div class="location-status" id="location-status">
                        <div class="location-status__dot"></div>
                        <span id="location-status-text" data-i18n="register.locationTapHint"></span>
                    </div>
                    <div class="field-error" id="err-location" data-i18n="error.locationRequired"></div>
                </div>

                <!-- ⑥ 言語設定 -->
                <div class="form-group">
                    <label for="lang-pref" data-i18n="register.lang"></label>
                    <select id="lang-pref">
                        <option value="km">ភាសាខ្មែរ (Khmer)</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>

                <!-- ⑦ 紹介コード（任意・5/24 #82 Phase 2 Step A） -->
                <div class="form-group">
                    <label for="referral-code-input">
                        <span class="material-symbols-outlined" style="font-size:16px; vertical-align:middle; margin-right:4px; color:#0d6e4c;">card_giftcard</span>
                        <span data-i18n="referral.codeInputLabel"></span>
                    </label>
                    <input type="text" id="referral-code-input" maxlength="8"
                        autocapitalize="off" autocomplete="off" spellcheck="false"
                        data-i18n="[placeholder]referral.codeInputPlaceholder"
                        style="font-family:monospace; letter-spacing:1px;">
                    <div class="input-hint" data-i18n="referral.codeInputHelp"></div>
                    <div id="referral-code-status" style="font-size:12px; margin-top:6px; min-height:14px;"></div>
                </div>

                <!-- 6/6 #131: 暗黙同意（チェックボックスなし）＋規約/プラポリのリンク（アプリ内静的画面） -->
                <div class="consent-note">
                    <span data-i18n="register.consentPrefix"></span>
                    <a href="/terms.html" target="_blank" rel="noopener" data-i18n="register.termsLink"></a>
                    <span data-i18n="register.consentMid"></span>
                    <a href="/privacy.html" target="_blank" rel="noopener" data-i18n="register.privacyLink"></a>
                    <span data-i18n="register.consentSuffix"></span>
                </div>

                <!-- 登録ボタン（6/6 #131: CTA青） -->
                <button class="btn btn-primary btn-cta" id="register-btn" style="margin-top:4px;"
                    data-i18n="register.submit"></button>
            </div>

            <!-- ログインリンク（6/6 #131: リンク青） -->
            <div class="link-text link-text--cta">
                <span data-i18n="register.hasAccount"></span>
                <a href="/index.html" data-i18n="register.login"></a>
            </div>

        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, saveLang } from '/js/i18n.js';
        import { register, watchAuthState } from '/js/auth.js';
        import { validateReferralCode, isValidReferralCode } from '/js/referral.js';
        import { normalizePhone, isValidCambodiaPhone } from '/js/firebase-config.js';

        // PWA Service Worker 登録
        // 5/11: 新バージョンの SW を検出したら自動リロード（未ログインユーザー向け）
        //   登録画面で旧コード（en のみジオコーディング）が動かないようにするため。
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then((registration) => {
                    registration.update();
                    registration.addEventListener('updatefound', () => {
                        const newSW = registration.installing;
                        if (!newSW) return;
                        newSW.addEventListener('statechange', () => {
                            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(console.error);
        }

        // ログイン済みならダッシュボードへ（登録処理中はリダイレクトしない）
        window.isRegistering = false;
        watchAuthState({ requireAuth: false, redirectIfLoggedIn: true, skipRedirectIf: () => window.isRegistering });

        // i18n 初期化
        await initI18n();
        initLangSelector();
        // 5/23 #69 Phase G: 初期スピナーを解除
        document.body.classList.add('app-ready');

        // ── 登録処理 ───────────────────────────────────────────────
        const registerBtn = document.getElementById('register-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 6/6 #131: インラインバリデーション（#115/#128 と統一）
        function clearFieldErrors() {
            document.querySelectorAll('.field-error.show').forEach(e => e.classList.remove('show'));
            document.querySelectorAll('.input-error').forEach(e => e.classList.remove('input-error'));
            errorMsg.classList.remove('show');
        }
        function setFieldError(errId, inputEl) {
            const errEl = document.getElementById(errId);
            if (errEl) errEl.classList.add('show');
            if (inputEl) inputEl.classList.add('input-error');
        }
        // 入力/変更されたらそのフィールドのエラー表示を解除
        [
            ['display-name', 'err-display-name'], ['phone', 'err-phone'], ['password', 'err-password'],
        ].forEach(([inputId, errId]) => {
            const el = document.getElementById(inputId);
            if (!el) return;
            el.addEventListener('input', () => {
                el.classList.remove('input-error');
                document.getElementById(errId)?.classList.remove('show');
            });
        });
        document.querySelectorAll('input[name="role"]').forEach((el) => {
            el.addEventListener('change', () => {
                document.querySelector('.role-select')?.classList.remove('input-error');
                document.getElementById('err-role')?.classList.remove('show');
            });
        });

        // パスワード表示/非表示
        document.getElementById('pw-toggle').addEventListener('click', () => {
            const pw = document.getElementById('password');
            const isHidden = pw.type === 'password';
            pw.type = isHidden ? 'text' : 'password';
            document.getElementById('pw-toggle').innerHTML = isHidden
                ? '<span class="material-symbols-outlined">visibility_off</span>'
                : '<span class="material-symbols-outlined">visibility</span>';
        });

        // 5/24 #82 Phase 2 Step A: 紹介コードの blur 時インライン検証
        // 未入力は OK（任意項目）。形式 NG・存在しない・の場合のみエラー表示。
        // 自己コードチェックは register 前なのでスキップ可（自身がまだ uid を持たない）。
        (function setupReferralValidation() {
            const input = document.getElementById('referral-code-input');
            const statusEl = document.getElementById('referral-code-status');
            if (!input || !statusEl) return;
            async function checkReferral() {
                const raw = (input.value || '').trim();
                if (!raw) { statusEl.textContent = ''; return; }
                if (!isValidReferralCode(raw)) {
                    statusEl.textContent = i18next.t('referral.errorFormat');
                    statusEl.style.color = '#dc2626';
                    return;
                }
                statusEl.textContent = i18next.t('referral.checking');
                statusEl.style.color = 'var(--color-text-sub)';
                try {
                    const result = await validateReferralCode(raw, null);
                    if (!result.ok) {
                        statusEl.textContent = i18next.t(result.error);
                        statusEl.style.color = '#dc2626';
                    } else {
                        statusEl.textContent = i18next.t('referral.codeOk');
                        statusEl.style.color = '#047857';
                    }
                } catch (e) {
                    console.error('referral validation failed:', e);
                    statusEl.textContent = i18next.t('referral.errorGeneric');
                    statusEl.style.color = '#dc2626';
                }
            }
            input.addEventListener('blur', checkReferral);
            // 6/7 #134 B: シェアリンク（/register.html?ref=CODE）からの自動入力。
            //   コードを埋め込んでおき、開いた瞬間に欄へ入れてインライン検証（✓有効…）まで走らせる。
            try {
                const refParam = (new URLSearchParams(window.location.search).get('ref') || '').trim();
                if (refParam && isValidReferralCode(refParam)) {
                    input.value = refParam;
                    checkReferral();
                }
            } catch (e) { /* ignore */ }
        })();

        registerBtn.addEventListener('click', async () => {
            clearFieldErrors();

            const displayName = document.getElementById('display-name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const roleEl = document.querySelector('input[name="role"]:checked');
            const role = roleEl ? roleEl.value : '';
            const langPref = document.getElementById('lang-pref').value;
            const referralCodeRaw = (document.getElementById('referral-code-input').value || '').trim();

            // 6/6 #131: インラインバリデーション（押下時に全必須欄を一括検証・ボタンは無効化しない）
            const errors = [];  // { errId, inputEl }
            if (!displayName) errors.push({ errId: 'err-display-name', inputEl: document.getElementById('display-name') });
            // 電話番号：未入力 or カンボジア形式でない → 赤
            const normPhone = normalizePhone(phone);
            if (!phone || !isValidCambodiaPhone(normPhone)) {
                errors.push({ errId: 'err-phone', inputEl: document.getElementById('phone') });
            }
            if (!password || password.length < 6) errors.push({ errId: 'err-password', inputEl: document.getElementById('password') });
            if (!role) errors.push({ errId: 'err-role', inputEl: document.querySelector('.role-select') });
            if (!window.selectedLocation) errors.push({ errId: 'err-location', inputEl: document.getElementById('location-status') });

            if (errors.length > 0) {
                errors.forEach(e => setFieldError(e.errId, e.inputEl));
                errorMsg.textContent = i18next.t('error.requiredSummary');
                errorMsg.classList.add('show');
                const target = errors[0].inputEl;
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    if (typeof target.focus === 'function') target.focus({ preventScroll: true });
                }
                return;
            }

            // 5/24 #82 Phase 2: 紹介コードが入力されている場合は登録前に最終検証
            // 検証 OK ならそのまま register() に渡し pendingReferralCode として保存。
            // 検証 NG なら登録自体は止めずに pendingReferralCode を空で続行（ユーザーへ警告だけ）。
            let pendingReferralCode = null;
            if (referralCodeRaw) {
                if (!isValidReferralCode(referralCodeRaw)) {
                    showError(i18next.t('referral.errorFormat'));
                    return;
                }
                try {
                    const result = await validateReferralCode(referralCodeRaw, null);
                    if (!result.ok) {
                        showError(i18next.t(result.error));
                        return;
                    }
                    pendingReferralCode = referralCodeRaw;
                } catch (e) {
                    // 検証失敗時は登録を続行（ネット不調などで阻害しないため）。
                    console.warn('referral validation failed at submit:', e);
                }
            }

            registerBtn.disabled = true;
            loading.classList.add('show');
            window.isRegistering = true;

            try {
                // 逆ジオコーディングの完了を待つ（最大3秒でタイムアウト）
                if (window.provincePromise) {
                    await Promise.race([
                        window.provincePromise,
                        new Promise(resolve => setTimeout(resolve, 3000))
                    ]);
                }

                await register({ displayName, phone, password, role, location: window.selectedLocation, province: window.selectedProvince, district: window.selectedDistrict, districtKm: window.selectedDistrictKm, lang: langPref, pendingReferralCode });
                saveLang(langPref);
                // 6/6 #131: 登録成功 → 登録後オンボーディングへ（role を渡して農家のみ送金先ステップ表示）
                window.location.href = `/onboarding.html?role=${encodeURIComponent(role)}`;
            } catch (err) {
                // 電話重複/形式などは該当フィールドにも反映
                if (err?.message === 'error.phoneTaken' || err?.message === 'error.phoneInvalid') {
                    setFieldError('err-phone', document.getElementById('phone'));
                    document.getElementById('err-phone').textContent = i18next.t(err.message);
                }
                showError(i18next.t(err.message) || i18next.t('error.registerFailed'));
                registerBtn.disabled = false;
                loading.classList.remove('show');
            }
        });
    </script>

</body>

</html>
