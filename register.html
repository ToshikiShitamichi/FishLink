<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6e4c">
    <meta name="google" content="notranslate">
    <title>FishLink</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .setup-guide {
            background: #fff7ed;
            border: 1px solid #fdba74;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 20px;
            color: #7c2d12;
        }
        .setup-guide__title {
            font-size: 14px;
            font-weight: 700;
            color: #9a3412;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .setup-guide__list {
            margin: 0;
            padding-left: 22px;
            font-size: 13px;
            line-height: 1.7;
            color: #7c2d12;
        }
        .setup-guide__list li {
            margin-bottom: 2px;
        }
        .howto-details {
            margin-top: 10px;
            border-top: 1px dashed #fdba74;
            padding-top: 10px;
        }
        .howto-details > summary {
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #9a3412;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .howto-details > summary::-webkit-details-marker { display: none; }
        .howto-details > summary .chevron {
            transition: transform .2s;
            font-size: 18px;
        }
        .howto-details[open] > summary .chevron { transform: rotate(90deg); }
        .howto-block { margin-top: 10px; }
        .howto-block__title {
            font-size: 13px;
            font-weight: 700;
            color: #7c2d12;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .howto-steps {
            margin: 0;
            padding-left: 22px;
            font-size: 12.5px;
            line-height: 1.6;
            color: #7c2d12;
        }
        .howto-steps li {
            margin-bottom: 6px;
        }
        .howto-steps li > div {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .howto-steps .material-symbols-outlined {
            font-size: 18px;
            line-height: 1;
            color: #9a3412;
            flex-shrink: 0;
        }
    </style>

    <!-- i18next -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>

    <script>
        let mapInitialized = false;
        function initMap() {
            if (mapInitialized) return;
            mapInitialized = true;
            const map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 11.5564, lng: 104.9282 },
                zoom: 7,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
            });

            let marker = null;

            // ピン設置＋ジオコーディング（共通処理）
            function placePin(latLng) {
                if (marker) marker.setMap(null);
                marker = new google.maps.Marker({
                    position: latLng,
                    map,
                    animation: google.maps.Animation.DROP,
                });

                window.selectedLocation = { lat: latLng.lat(), lng: latLng.lng() };
                window.selectedProvince = null;

                window.provincePromise = new Promise((resolve) => {
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: window.selectedLocation, language: 'en' }, (results, status) => {
                        let formatted = '';
                        if (status === 'OK' && results[0]) {
                            const prov = results[0].address_components.find(c =>
                                c.types.includes('administrative_area_level_1')
                            );
                            window.selectedProvince = prov?.long_name || null;
                            const dist = results[0].address_components.find(c =>
                                c.types.includes('administrative_area_level_2')
                            );
                            window.selectedDistrict = dist?.long_name || null;
                            formatted = results[0].formatted_address || '';
                        }
                        // 住所をステータス欄に表示
                        const statusEl = document.getElementById('location-status');
                        statusEl.classList.add('set');
                        const setTxt = window.i18next?.exists?.('register.locationSet')
                            ? window.i18next.t('register.locationSet') : '位置情報を設定済み';
                        const addressTxt = formatted
                            || [window.selectedProvince, window.selectedDistrict].filter(Boolean).join(', ');
                        document.getElementById('location-status-text').innerHTML =
                            `<span style="font-weight:700;">${setTxt}</span>${addressTxt ? `<br><span style="font-size:12px; color:#475569;">${addressTxt}</span>` : ''}`;
                        resolve(window.selectedProvince);
                    });
                });

                const statusEl = document.getElementById('location-status');
                statusEl.classList.add('set');
                const setTxt = window.i18next?.exists?.('register.locationSet')
                    ? window.i18next.t('register.locationSet') : '位置情報を設定済み';
                document.getElementById('location-status-text').textContent = setTxt;
            }

            // 地図クリックでピン設置
            map.addListener('click', (e) => placePin(e.latLng));

            // 現在地を取得して自動ピン設置（失敗時はステータスにヒントを表示）
            function tryGeolocation(showError) {
                if (!navigator.geolocation) {
                    if (showError) {
                        document.getElementById('location-status-text').textContent =
                            window.i18next?.t?.('register.locationGeoUnavailable') || 'お使いの端末では現在地が取得できません。地図をタップしてピンを設置してください。';
                    }
                    return;
                }
                document.getElementById('location-status-text').textContent =
                    window.i18next?.t?.('register.locationFinding') || '現在地を取得しています...';
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const latLng = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                        map.setCenter(latLng);
                        map.setZoom(15);
                        placePin(latLng);
                    },
                    (err) => {
                        // 失敗時はユーザーに状況を伝え、地図タップを促す
                        const reason = err.code === 1 // PERMISSION_DENIED
                            ? (window.i18next?.t?.('register.locationDenied') || '位置情報の利用が拒否されました。地図をタップしてピンを設置してください。')
                            : (window.i18next?.t?.('register.locationFailed') || '現在地が取得できませんでした。地図をタップしてピンを設置してください。');
                        document.getElementById('location-status-text').textContent = reason;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                );
            }

            // 初回ロード時：自動取得を試みる（失敗してもエラーは静か）
            tryGeolocation(false);

            // 「現在地を使う」ボタン：明示的に再試行（失敗時はエラー表示）
            document.getElementById('use-current-loc-btn')?.addEventListener('click', () => tryGeolocation(true));
        }

        window.gm_authFailure = function () {
            document.getElementById('map').style.display = 'none';
            document.getElementById('map-placeholder').style.display = 'flex';
        };
    </script>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAR8k3SC1KSW7awepRV_tmujgs89_6Psl0&callback=initMap&loading=async"
        async defer>
        </script>
</head>

<body>

    <!-- 言語セレクター -->
    <div class="lang-selector-wrap">
        <select id="lang-selector">
            <option value="km">ខ្មែរ</option>
            <option value="en">ENGLISH</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <!-- ローディング -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="page-center" style="padding-top:60px; padding-bottom:40px;">
        <div style="width:100%; max-width:440px;">

            <!-- ロゴ（小） -->
            <div style="text-align:center; margin-bottom:24px;">
                <img src="/images/logo.png" alt="FishLink" style="width:70%; max-width:220px; height:auto; display:inline-block;">
            </div>

            <!-- 初回セットアップ案内 -->
            <div class="setup-guide">
                <div class="setup-guide__title">
                    <span class="material-symbols-outlined" style="font-size:20px; margin-right:4px;">info</span>
                    <span data-i18n="register.setupGuide.title"></span>
                </div>
                <ol class="setup-guide__list">
                    <li data-i18n="register.setupGuide.item1"></li>
                    <li data-i18n="register.setupGuide.item2"></li>
                    <li data-i18n="register.setupGuide.item3"></li>
                </ol>

                <details class="howto-details">
                    <summary>
                        <span class="material-symbols-outlined chevron">chevron_right</span>
                        <span data-i18n="register.setupGuide.howToTitle"></span>
                    </summary>

                    <div class="howto-block">
                        <div class="howto-block__title">
                            <span class="material-symbols-outlined" style="font-size:18px;">phone_iphone</span>
                            <span data-i18n="register.setupGuide.howToIos"></span>
                        </div>
                        <ol class="howto-steps">
                            <li><div><span data-i18n="register.setupGuide.howToIosStep1"></span></div></li>
                            <li>
                                <div>
                                    <span data-i18n="register.setupGuide.howToIosStep2"></span>
                                    <span class="material-symbols-outlined">ios_share</span>
                                </div>
                            </li>
                            <li>
                                <div>
                                    <span class="material-symbols-outlined">add_box</span>
                                    <span data-i18n="register.setupGuide.howToIosStep3"></span>
                                </div>
                            </li>
                            <li><div><span data-i18n="register.setupGuide.howToIosStep4"></span></div></li>
                        </ol>
                    </div>

                    <div class="howto-block">
                        <div class="howto-block__title">
                            <span class="material-symbols-outlined" style="font-size:18px;">smartphone</span>
                            <span data-i18n="register.setupGuide.howToAndroid"></span>
                        </div>
                        <ol class="howto-steps">
                            <li><div><span data-i18n="register.setupGuide.howToAndroidStep1"></span></div></li>
                            <li>
                                <div>
                                    <span data-i18n="register.setupGuide.howToAndroidStep2"></span>
                                    <span class="material-symbols-outlined">more_vert</span>
                                </div>
                            </li>
                            <li>
                                <div>
                                    <span class="material-symbols-outlined">add_to_home_screen</span>
                                    <span data-i18n="register.setupGuide.howToAndroidStep3"></span>
                                </div>
                            </li>
                            <li><div><span data-i18n="register.setupGuide.howToAndroidStep4"></span></div></li>
                        </ol>
                    </div>
                </details>
            </div>

            <div class="card">
                <h1 class="card__title" data-i18n="register.title"></h1>

                <!-- エラーメッセージ -->
                <div class="error-msg" id="error-msg"></div>

                <!-- ① ログインID -->
                <div class="form-group">
                    <label for="login-id" data-i18n="register.loginId"></label>
                    <input type="text" id="login-id" autocapitalize="none" spellcheck="false"
                        placeholder="e.g. sakana_farm">
                    <div class="input-hint" data-i18n="register.loginIdHint"></div>
                </div>

                <!-- ② 表示名 -->
                <div class="form-group">
                    <label for="display-name" data-i18n="register.displayName"></label>
                    <input type="text" id="display-name">
                    <div class="input-hint" data-i18n="register.displayNameHint"></div>
                </div>

                <!-- ③ 電話番号 -->
                <div class="form-group">
                    <label for="phone" data-i18n="register.phone"></label>
                    <input type="tel" id="phone" inputmode="tel" autocomplete="tel" data-i18n="[placeholder]register.phonePlaceholder">
                    <div class="input-hint" data-i18n="register.phoneHint"></div>
                </div>

                <!-- ④ パスワード -->
                <div class="form-group">
                    <label for="password" data-i18n="register.password"></label>
                    <div class="password-wrap">
                        <input type="password" id="password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="pw-toggle"><span class="material-symbols-outlined">visibility</span></button>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- ④ ロール選択 -->
                <div class="form-group">
                    <div class="section-title" data-i18n="register.role"></div>
                    <div class="role-select">
                        <div class="role-option">
                            <input type="radio" name="role" id="role-farmer" value="farmer">
                            <label class="role-option__label" for="role-farmer">
                                <span class="role-option__icon"><span class="material-symbols-outlined">agriculture</span></span>
                                <span class="role-option__text" data-i18n="register.roleFarmer"></span>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-restaurant" value="restaurant">
                            <label class="role-option__label" for="role-restaurant">
                                <span class="role-option__icon"><span class="material-symbols-outlined">restaurant</span></span>
                                <span class="role-option__text" data-i18n="register.roleRestaurant"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- ⑤ 位置情報 -->
                <div class="form-group">
                    <div class="section-title" data-i18n="register.location"></div>
                    <div class="input-hint" style="margin-bottom:8px;" data-i18n="register.locationHint"></div>
                    <div class="map-container">
                        <div id="map"></div>
                        <div class="map-placeholder" id="map-placeholder" style="display:none;">
                            <span class="material-symbols-outlined" style="font-size:28px;">map</span>
                            <span>Google Maps API key required</span>
                        </div>
                    </div>
                    <button type="button" id="use-current-loc-btn"
                        style="display:inline-flex; align-items:center; gap:6px; margin-top:8px; padding:8px 14px; border:1px solid var(--color-border); border-radius:20px; background:#fff; color:var(--color-text); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;">
                        <span class="material-symbols-outlined" style="font-size:16px;">my_location</span>
                        <span data-i18n="register.useCurrentLocation"></span>
                    </button>
                    <div class="location-status" id="location-status">
                        <div class="location-status__dot"></div>
                        <span id="location-status-text" data-i18n="register.locationTapHint"></span>
                    </div>
                </div>

                <!-- ⑥ 言語設定 -->
                <div class="form-group">
                    <label for="lang-pref" data-i18n="register.lang"></label>
                    <select id="lang-pref">
                        <option value="km">ភាសាខ្មែរ (Khmer)</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>

                <!-- 登録ボタン -->
                <button class="btn btn-primary" id="register-btn" style="margin-top:8px;"
                    data-i18n="register.submit"></button>
            </div>

            <!-- ログインリンク -->
            <div class="link-text">
                <span data-i18n="register.hasAccount"></span>
                <a href="/index.html" data-i18n="register.login"></a>
            </div>

        </div>
    </div>

    <script type="module">
        import { initI18n, initLangSelector, saveLang } from '/js/i18n.js';
        import { register, watchAuthState } from '/js/auth.js';

        // PWA Service Worker 登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.error);
        }

        // ログイン済みならダッシュボードへ（登録処理中はリダイレクトしない）
        window.isRegistering = false;
        watchAuthState({ requireAuth: false, redirectIfLoggedIn: true, skipRedirectIf: () => window.isRegistering });

        // i18n 初期化
        await initI18n();
        initLangSelector();

        // ── 登録処理 ───────────────────────────────────────────────
        const registerBtn = document.getElementById('register-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // パスワード表示/非表示
        document.getElementById('pw-toggle').addEventListener('click', () => {
            const pw = document.getElementById('password');
            const isHidden = pw.type === 'password';
            pw.type = isHidden ? 'text' : 'password';
            document.getElementById('pw-toggle').innerHTML = isHidden
                ? '<span class="material-symbols-outlined">visibility_off</span>'
                : '<span class="material-symbols-outlined">visibility</span>';
        });

        registerBtn.addEventListener('click', async () => {
            errorMsg.classList.remove('show');

            const loginId = document.getElementById('login-id').value.trim();
            const displayName = document.getElementById('display-name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const roleEl = document.querySelector('input[name="role"]:checked');
            const role = roleEl ? roleEl.value : '';
            const langPref = document.getElementById('lang-pref').value;

            // 電話番号の必須チェック（数字7桁以上）
            if (!phone || !/^[0-9+\-\s()]{7,}$/.test(phone)) {
                showError(i18next.t('register.errorPhone') || 'Phone number is required');
                return;
            }

            registerBtn.disabled = true;
            loading.classList.add('show');
            window.isRegistering = true;

            try {
                // 逆ジオコーディングの完了を待つ（最大3秒でタイムアウト）
                if (window.provincePromise) {
                    await Promise.race([
                        window.provincePromise,
                        new Promise(resolve => setTimeout(resolve, 3000))
                    ]);
                }

                await register({ loginId, displayName, phone, password, role, location: window.selectedLocation, province: window.selectedProvince, district: window.selectedDistrict, lang: langPref });
                saveLang(langPref);
                // 登録成功 → ダッシュボードへ遷移
                const dest = role === 'farmer' ? '/pages/farmer/dashboard.html' : '/pages/restaurant/dashboard.html';
                window.location.href = dest;
            } catch (err) {
                showError(i18next.t(err.message) || i18next.t('error.registerFailed'));
                registerBtn.disabled = false;
                loading.classList.remove('show');
            }
        });
    </script>

</body>

</html>
